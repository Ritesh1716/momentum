function NotifModal({t,close,enabled,setEnabled,plan,reminders,setReminders,notifSound,setNotifSound}){
  const[status,setStatus]=useState(typeof Notification!=="undefined"?Notification.permission:"denied");
  const[newTime,setNewTime]=useState("08:00");
  const[newLabel,setNewLabel]=useState("");
  const maxReminders=plan.maxRem!==undefined?plan.maxRem:2;
  const canAdd=reminders.length<maxReminders||maxReminders===Infinity;
  const SOUNDS=[["bell","🔔 Bell"],["beep","📣 Beep"],["chime","🎵 Chime"],["alarm","⏰ Alarm"]];

  async function enable(){
    if(typeof Notification==="undefined"){
      alert("Notifications not supported here.\n\nTry:\n1. Install app (Add to Home Screen)\n2. Use Chrome on Android\n3. Use desktop Chrome/Firefox");
      return;
    }
    if(Notification.permission==="denied"){
      alert("Notifications blocked!\n\nTo fix:\n1. Tap 🔒 in address bar\n2. Set Notifications → Allow\n3. Refresh page");
      return;
    }
    const p=await Notification.requestPermission();
    setStatus(p);
    if(p==="granted"){setEnabled(true);localStorage.setItem("hg_notif","1");
      new Notification("⚡ Momentum",{body:"Notifications enabled! 🎉",icon:"/icon-192.png"});
    }
  }
  function disable(){setEnabled(false);localStorage.setItem("hg_notif","0");}
  function addReminder(){
    if(!newTime)return;
    if(reminders.length>=maxReminders&&maxReminders!==Infinity)return;
    const label=newLabel.trim()||"Habit Reminder";
    const updated=[...reminders,{id:Date.now(),time:newTime,label,enabled:true}];
    setReminders(updated);localStorage.setItem("hg_reminders",JSON.stringify(updated));
    setNewTime("08:00");setNewLabel("");
  }
  function removeReminder(id){const u=reminders.filter(r=>r.id!==id);setReminders(u);localStorage.setItem("hg_reminders",JSON.stringify(u));}
  function toggleReminder(id){const u=reminders.map(r=>r.id===id?{...r,enabled:!r.enabled}:r);setReminders(u);localStorage.setItem("hg_reminders",JSON.stringify(u));}
  function pickSound(s){setNotifSound(s);localStorage.setItem("hg_notif_sound",s);playSound(s);}

  return(<Modal t={t} close={close} title="🔔 Notifications">
    {/* Status */}
    <div style={{background:status==="granted"?t.success+"18":t.danger+"18",border:`1px solid ${status==="granted"?t.success+"44":t.danger+"44"}`,borderRadius:10,padding:"10px 12px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontSize:12,fontWeight:700,color:status==="granted"?t.success:t.danger}}>{status==="granted"?"✅ Notifications enabled":"❌ Notifications disabled"}</div>
        <div style={{fontSize:10,color:t.muted,marginTop:2}}>{status==="granted"?"Reminders will appear in notification bar":"Tap Enable below to allow"}</div>
      </div>
      {status==="granted"&&<button onClick={()=>new Notification("⚡ Momentum Test",{body:"Working! 🎉",icon:"/icon-192.png"})} style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${t.success}44`,background:t.success+"18",color:t.success,cursor:"pointer",fontSize:11,fontWeight:700,flexShrink:0}}>Test</button>}
    </div>

    {/* Mobile tip */}
    <div style={{background:t.surface,borderRadius:9,padding:"8px 12px",marginBottom:12,fontSize:11,color:t.muted,lineHeight:1.6}}>
      📱 <strong style={{color:t.text}}>Best on mobile:</strong> Install as PWA (Add to Home Screen) then enable. iOS Safari has limited notification support.
    </div>

    {/* Enable/Disable toggle */}
    {status!=="denied"&&<button onClick={enabled?disable:enable} style={{width:"100%",padding:"11px",borderRadius:11,border:`1px solid ${enabled?t.danger+"44":t.accent}`,background:enabled?t.danger+"12":t.accent,color:enabled?t.danger:"#000",fontWeight:700,cursor:"pointer",fontSize:14,marginBottom:12}}>{enabled?"🔕 Disable Notifications":"🔔 Enable Notifications"}</button>}
    {status==="denied"&&<div style={{background:t.danger+"12",border:`1px solid ${t.danger}44`,borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:11,color:t.danger}}>⚠️ Blocked by browser. Tap 🔒 in address bar → Notifications → Allow, then refresh.</div>}

    {/* Sound selector */}
    {enabled&&status==="granted"&&<div style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Notification Sound</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {SOUNDS.map(([id,lbl])=>(
          <button key={id} onClick={()=>pickSound(id)} style={{padding:"6px 12px",borderRadius:20,border:`2px solid ${notifSound===id?t.accent:t.border}`,background:notifSound===id?t.accent+"22":t.surface,color:notifSound===id?t.accent:t.muted,cursor:"pointer",fontSize:11,fontWeight:notifSound===id?700:400}}>{lbl}</button>
        ))}
      </div>
    </div>}

    {/* Reminders */}
    {enabled&&status==="granted"&&<>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Reminders ({reminders.length}/{maxReminders===Infinity?"∞":maxReminders})</div>
      {reminders.map(r=>(
        <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 11px",background:r.enabled?t.accent+"10":t.surface,border:`1px solid ${r.enabled?t.accent+"33":t.border}`,borderRadius:10,marginBottom:7}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:t.text}}>{r.label}</div>
            <div style={{fontSize:11,color:t.muted}}>🕐 {fmt12(r.time)}</div>
          </div>
          <button onClick={()=>toggleReminder(r.id)} style={{background:r.enabled?t.accent+"22":"none",border:`1px solid ${r.enabled?t.accent:t.border}`,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,color:r.enabled?t.accent:t.muted,fontWeight:600}}>{r.enabled?"ON":"OFF"}</button>
          <button onClick={()=>removeReminder(r.id)} style={{background:"none",border:"none",color:t.danger,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
        </div>
      ))}
      {!canAdd&&maxReminders!==Infinity&&<div style={{background:t.accent+"12",borderRadius:9,padding:"8px 12px",marginBottom:10,fontSize:11,color:t.accent}}>⚡ Upgrade to Pro for unlimited reminders</div>}
      {canAdd&&<div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
        <input type="time" value={newTime} onChange={e=>setNewTime(e.target.value)} style={{padding:"8px 10px",borderRadius:9,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:14,colorScheme:"dark",flex:"0 0 auto"}}/>
        <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="Label (optional)" style={{padding:"8px 10px",borderRadius:9,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,flex:1,minWidth:100}}/>
        <button onClick={addReminder} style={{padding:"8px 14px",borderRadius:9,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:13,flexShrink:0}}>+ Add</button>
      </div>}
    </>}
    <div style={{fontSize:10,color:t.muted,textAlign:"center",marginTop:10}}>ℹ️ App must be open for reminders to ring. Install as PWA for background notifications.</div>
  </Modal>);
}

function ExportPanel({t,habits,goals,journals,displayName}){
  const[exporting,setExporting]=useState(null); // null | "habits_csv" | "goals_csv" | "journal_csv" | "pdf"
  const[range,setRange]=useState("30"); // "30" | "90" | "all"

  function downloadCSV(filename,rows){
    const csv=rows.map(r=>r.map(cell=>{
      const s=String(cell==null?"":cell);
      return s.includes(",")||s.includes('"')||s.includes("\n")?`"${s.replace(/"/g,'""')}"`:s;
    }).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
  }

  function exportHabitsCSV(){
    setExporting("habits_csv");
    const cutoffDays=range==="all"?3650:parseInt(range);
    const dates=[];
    for(let i=0;i<cutoffDays;i++){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toISOString().split("T")[0]);}
    const rows=[["Habit","Category","Icon","Date","Completed","Streak","Best Streak","Total Done"]];
    habits.forEach(h=>{
      dates.forEach(date=>{
        const done=!!(h.log&&h.log[date]);
        rows.push([h.name,h.cat||"",h.icon||"",date,done?"Yes":"No",h.streak||0,h.best||0,Object.values(h.log||{}).filter(Boolean).length]);
      });
    });
    downloadCSV(`momentum-habits-${range}days-${new Date().toISOString().split("T")[0]}.csv`,rows);
    setTimeout(()=>setExporting(null),1000);
  }

  function exportGoalsCSV(){
    setExporting("goals_csv");
    const rows=[["Goal","Priority","Deadline","Created","Progress%","Actions Total","Actions Done","Action","Action Done","Completed Date","Expected Result"]];
    goals.forEach(g=>{
      const done=g.actions.filter(a=>a.done).length;
      const pct=g.actions.length>0?Math.round(done/g.actions.length*100):0;
      if(g.actions.length===0){
        rows.push([g.title,g.priority||"",g.deadline||"",g.createdAt||"",pct+"%",0,0,"","","",""]);
      } else {
        g.actions.forEach((a,i)=>{
          rows.push([i===0?g.title:"",i===0?g.priority||"":"",i===0?g.deadline||"":"",i===0?g.createdAt||"":"",i===0?pct+"%":"",i===0?g.actions.length:"",i===0?done:"",a.action||"",a.done?"Yes":"No",a.doneAt||"",a.result||""]);
        });
      }
    });
    downloadCSV(`momentum-goals-${new Date().toISOString().split("T")[0]}.csv`,rows);
    setTimeout(()=>setExporting(null),1000);
  }

  function exportJournalCSV(){
    setExporting("journal_csv");
    const MOODS=["Rough","Low","Okay","Good","Great"];
    const cutoffDays=range==="all"?3650:parseInt(range);
    const rows=[["Date","Title","Mood","Mood Score","Tags","Entry","Word Count"]];
    Object.entries(journals).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,raw])=>{
      const daysAgo=Math.floor((new Date()-new Date(date+"T12:00:00"))/86400000);
      if(daysAgo>cutoffDays)return;
      const e=typeof raw==="object"?raw:{note:raw||"",mood:null,tags:[],title:""};
      const wc=(e.note||"").trim().split(/\s+/).filter(Boolean).length;
      rows.push([date,e.title||"",e.mood!=null?MOODS[e.mood]:"",e.mood!=null?e.mood+1:"",(e.tags||[]).join("; "),e.note||"",wc]);
    });
    downloadCSV(`momentum-journal-${range}days-${new Date().toISOString().split("T")[0]}.csv`,rows);
    setTimeout(()=>setExporting(null),1000);
  }

  function exportPDF(){
    setExporting("pdf");
    const MOODS=["Rough","Low","Okay","Good","Great"];
    const cutoffDays=range==="all"?3650:parseInt(range);
    const totalHabitDone=habits.reduce((s,h)=>s+Object.values(h.log||{}).filter(Boolean).length,0);
    const completedGoals=goals.filter(g=>g.actions.length>0&&g.actions.every(a=>a.done)).length;
    const recentJournals=Object.entries(journals).sort((a,b)=>b[0].localeCompare(a[0])).filter(([d])=>Math.floor((new Date()-new Date(d+"T12:00:00"))/86400000)<=cutoffDays).slice(0,10);

    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/>

function ReferralCard({t,user,pk,plan}){
  const[copied,setCopied]=useState(false);
  const[referralCount,setReferralCount]=useState(0);
  const[referrals,setReferrals]=useState([]);
  const[loading,setLoading]=useState(true);

  // Generate unique referral code from user UID
  const refCode=user?.uid?user.uid.slice(0,8).toUpperCase():"";
  const refLink=`https://momentum-tracker-v01.vercel.app?ref=${refCode}`;

  useEffect(()=>{
    if(!user?.uid)return;
    // Load referral count from Firestore
    async function loadReferrals(){
      try{
        const db=fb.getFirestore();
        const refQ=fb.query(
          fb.collection(db,"users"),
          fb.where("referredBy","==",user.uid)
        );
        const snap=await fb.getDocs(refQ);
        setReferralCount(snap.size);
        setReferrals(snap.docs.map(d=>({email:d.data().email||"Anonymous",date:d.data().signupDate||""})));
      }catch(e){
        // Silently fail if query fails
      }finally{setLoading(false);}
    }
    loadReferrals();
  },[user?.uid]);

  function copyLink(){
    navigator.clipboard.writeText(refLink).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false),2500);
    });
  }

  function shareLink(){
    const text=`I've been using Momentum to build habits & crush goals 🔥\n\nJoin me — use my link and we both get 7 days Pro free!\n\n${refLink}`;
    if(navigator.share){
      navigator.share({title:"Join Momentum",text,url:refLink});
    } else {
      copyLink();
    }
  }

  const REWARDS=[
    {count:1,reward:"7 days Pro free",icon:"🎁"},
    {count:3,reward:"1 month Pro free",icon:"⚡"},
    {count:5,reward:"3 months Pro free",icon:"🏆"},
    {count:10,reward:"6 months Pro free",icon:"👑"},
  ];
  const nextReward=REWARDS.find(r=>r.count>referralCount);
  const toNext=nextReward?nextReward.count-referralCount:0;

  return(
    <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:16,marginBottom:12}}>

        </div>
        {nextReward&&<>
          <div style={{fontSize:11,color:t.muted,marginBottom:6}}>
            {toNext>0?`${toNext} more to unlock ${nextReward.reward} ${nextReward.icon}`:`🎉 Reward unlocked! ${nextReward.icon}`}
          </div>
          <div style={{height:5,background:t.surface,borderRadius:4}}>
            <div style={{height:"100%",width:`${Math.min((referralCount/nextReward.count)*100,100)}%`,background:t.accent,borderRadius:4,transition:"width 0.5s"}}/>

          <button onClick={copyLink} style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${copied?t.success:t.accent}44`,background:copied?t.success+"18":t.accent+"12",color:copied?t.success:t.accent,cursor:"pointer",fontSize:11,fontWeight:700,flexShrink:0}}>{copied?"✅ Copied":"📋 Copy"}</button>

        <button onClick={shareLink} style={{width:"100%",padding:"11px",borderRadius:11,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>📤 Share Link</button>
      </div>

      {/* Reward tiers */}
      <div style={{marginBottom:referrals.length>0?12:0}}>

        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {REWARDS.map(r=>{
            const unlocked=referralCount>=r.count;
            return(<div key={r.count} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:9,background:unlocked?t.success+"14":t.surface,border:`1px solid ${unlocked?t.success+"44":t.border}`}}>

      </div>
    </div>
  );

function StreakShareModal({t,habit,onClose}){
  const canvasRef=useRef();
  const[generated,setGenerated]=useState(false);
  const[copied,setCopied]=useState(false);
  const accentColor=habit.color||"#f5c842";

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const W=canvas.width=540,H=canvas.height=540;

    // Background — dark with accent glow
    ctx.fillStyle="#0d0d0f";
    ctx.fillRect(0,0,W,H);

    // Accent glow top-left
    const grd=ctx.createRadialGradient(0,0,10,0,0,280);
    grd.addColorStop(0,accentColor+"44");
    grd.addColorStop(1,"transparent");
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,W,H);

    // Border
    ctx.strokeStyle=accentColor+"66";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.roundRect(12,12,W-24,H-24,24);
    ctx.stroke();

    // Momentum branding
    ctx.fillStyle=accentColor;
    ctx.font="bold 22px system-ui,sans-serif";
    ctx.textAlign="left";
    ctx.fillText("⚡ Momentum",36,58);

    // Habit icon + name
    ctx.font="72px system-ui";
    ctx.textAlign="center";
    ctx.fillText(habit.icon||"🔥",W/2,180);

    ctx.fillStyle="#f0eff4";
    ctx.font="bold 34px system-ui,sans-serif";
    ctx.textAlign="center";
    const name=habit.name.length>18?habit.name.slice(0,17)+"…":habit.name;
    ctx.fillText(name,W/2,228);

    // Streak number — big
    ctx.fillStyle=accentColor;
    ctx.font="bold 120px system-ui,sans-serif";
    ctx.textAlign="center";
    ctx.fillText(habit.streak,W/2,360);

    // "DAY STREAK" label
    ctx.fillStyle="#7a7a8c";
    ctx.font="bold 26px system-ui,sans-serif";
    ctx.textAlign="center";
    ctx.fillText("DAY STREAK 🔥",W/2,400);

    // Week dots
    const dotSpacing=40,dotY=445,startX=W/2-(3.5*dotSpacing);
    const week7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week7.push(d.toISOString().split("T")[0]);}
    week7.forEach((d,i)=>{
      const done=habit.log&&habit.log[d];
      ctx.beginPath();
      ctx.arc(startX+(i+0.5)*dotSpacing,dotY,10,0,Math.PI*2);
      ctx.fillStyle=done?"#4ade80":"#2a2a32";
      ctx.fill();
      if(done){ctx.strokeStyle="#4ade8066";ctx.lineWidth=2;ctx.stroke();}
    });

    // App URL
    ctx.fillStyle="#4a4a5a";
    ctx.font="16px system-ui,sans-serif";
    ctx.textAlign="center";
    ctx.fillText("momentum-tracker-v01.vercel.app",W/2,505);

    setGenerated(true);
  },[habit,accentColor]);

  function shareCard(){
    const canvas=canvasRef.current;
    if(!canvas)return;
    canvas.toBlob(async blob=>{
      const file=new File([blob],"momentum-streak.png",{type:"image/png"});
      const txt=`🔥 ${habit.streak}-day streak on ${habit.icon} ${habit.name}! Building momentum daily. Track yours → https://momentum-tracker-v01.vercel.app`;
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],text:txt});
      } else if(navigator.share){
        await navigator.share({title:"My Streak",text:txt,url:"https://momentum-tracker-v01.vercel.app"});
      } else {
        const url=canvas.toDataURL("image/png");
        const a=document.createElement("a");a.href=url;a.download=`momentum-${habit.name}-${habit.streak}d.png`;a.click();
      }
    },"image/png");
  }

  function copyText(){
    const txt=`🔥 ${habit.streak}-day streak on ${habit.icon} ${habit.name}! Building momentum daily. Track yours → https://momentum-tracker-v01.vercel.app`;
    navigator.clipboard.writeText(txt).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2500,padding:20}}>
      <div style={{background:"#18181c",border:"1px solid #2a2a32",borderRadius:24,padding:24,width:"100%",maxWidth:360,textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:800,color:"#f0eff4"}}>📤 Share Your Streak</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#7a7a8c",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>
        </div>

        {/* Canvas preview */}
        <div style={{borderRadius:16,overflow:"hidden",marginBottom:16,border:"1px solid #2a2a32"}}>
          <canvas ref={canvasRef} style={{width:"100%",height:"auto",display:"block"}}/>
        </div>

        {generated&&<>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <button onClick={shareCard} style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:"#25D366",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>📱 Share Image</button>
            <button onClick={copyText} style={{flex:1,padding:"12px",borderRadius:12,border:"1px solid #2a2a32",background:"none",color:copied?"#4ade80":"#f0eff4",fontWeight:700,cursor:"pointer",fontSize:13}}>{copied?"✅ Copied!":"📋 Copy Text"}</button>
          </div>
          <div style={{fontSize:11,color:"#4a4a5a",marginBottom:4}}>Share to WhatsApp, Instagram, or anywhere!</div>
        </>}
        <button onClick={onClose} style={{width:"100%",padding:"10px",borderRadius:12,border:"1px solid #2a2a32",background:"none",color:"#7a7a8c",cursor:"pointer",fontSize:13,marginTop:6}}>Close</button>
      </div>
    </div>
  );
}

function App(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[signingIn,setSigningIn]=useState(false);
  const[tk,setTk]=useState("obsidian");
  const[habits,setHabits]=useState([]);
  const[goals,setGoals]=useState([]);
  const[journals,setJournals]=useState({});
  const[pk,setPk]=useState("free");
  const[pe,setPe]=useState(null);
  const[signupDate,setSignupDate]=useState(null);
  const[userNumber,setUserNumber]=useState(null);
  const[page,setPage]=useState("dashboard");
  const[modal,setModal]=useState(null);
  const[confetti,setConfetti]=useState(false);
  const[toast,setToast]=useState(null);
  const[saving,setSaving]=useState(false);
  const[notif,setNotif]=useState(localStorage.getItem("hg_notif")==="1");
  const[notifSound,setNotifSound]=useState(localStorage.getItem("hg_notif_sound")||"bell");
  const[reminders,setReminders]=useState(()=>{try{return JSON.parse(localStorage.getItem("hg_reminders")||"[]");}catch{return[];}});
  const[showReview,setShowReview]=useState(false);
  const[shareHabit,setShareHabit]=useState(null);
  const[upReason,setUpReason]=useState("");
  const[displayName,setDisplayName]=useState("");
  // INPUT REFS — using useRef so typing never re-renders App = keyboard stays open permanently
  const _newHName=useRef(""),_newHCat=useRef("Health"),_newHIcon=useRef("⭐");
  const _newHColor=useRef(t.accent),_newHFreq=useRef("daily"),_newHGoalCount=useRef(0),_newHGoalUnit=useRef(""),_newHRemTime=useRef("");
  const _newGTitle=useRef(""),_newGPriority=useRef("Medium"),_newGDeadline=useRef(""),_newGNotes=useRef("");
  const _newAGid=useRef(null),_newAAction=useRef(""),_newAResult=useRef(""),_newADueDate=useRef(""),_newADueTime=useRef("");
  const _bulk=useRef(""),_editGTitle=useRef(""),_editGPriority=useRef("Medium"),_editGDeadline=useRef(""),_editGNotes=useRef("");
  // Thin setters that update ref without re-rendering App
  const setNewHName=v=>_newHName.current=v, setNewHCat=v=>_newHCat.current=v, setNewHIcon=v=>_newHIcon.current=v;
  const setNewGTitle=v=>_newGTitle.current=v, setNewGPriority=v=>_newGPriority.current=v, setNewGDeadline=v=>_newGDeadline.current=v, setNewGNotes=v=>_newGNotes.current=v;
  const setNewAGid=v=>_newAGid.current=v, setNewAAction=v=>_newAAction.current=v, setNewAResult=v=>_newAResult.current=v, setNewADueDate=v=>_newADueDate.current=v, setNewADueTime=v=>_newADueTime.current=v;
  const setBulk=v=>_bulk.current=v, setEditGTitle=v=>_editGTitle.current=v, setEditGPriority=v=>_editGPriority.current=v, setEditGDeadline=v=>_editGDeadline.current=v, setEditGNotes=v=>_editGNotes.current=v;
  // Getters (used in functions that read values)
  const newHName=_newHName.current,newHCat=_newHCat.current,newHIcon=_newHIcon.current;
  const newGTitle=_newGTitle.current,newGPriority=_newGPriority.current,newGDeadline=_newGDeadline.current,newGNotes=_newGNotes.current;
  const newAGid=_newAGid.current,newAAction=_newAAction.current,newAResult=_newAResult.current,newADueDate=_newADueDate.current,newADueTime=_newADueTime.current;
  const bulk=_bulk.current,editGTitle=_editGTitle.current,editGPriority=_editGPriority.current,editGDeadline=_editGDeadline.current,editGNotes=_editGNotes.current;
  // UI toggle states — these control visibility, not text input, so useState is fine
  const[showTpl,setShowTpl]=useState(false);
  const[expH,setExpH]=useState(null);
  const[showGF,setShowGF]=useState(false);
  const[newGActions,setNewGActions]=useState([]);
  const[newGPriorityState,setNewGPriorityState]=useState("Medium");
  const[expG,setExpG]=useState(null);
  const[showNewAExtra,setShowNewAExtra]=useState(null);
  const[showBulk,setShowBulk]=useState(null);
  const[editG,setEditG]=useState(null);
  // Page-level state lifted to App to prevent keyboard dismiss on re-render
  const[viewD,setViewD]=useState(()=>td());
  const[catFilter,setCatFilter]=useState("All");
  const[analyticsTab,setAnalyticsTab]=useState("overview");
  const[editingHabit,setEditingHabit]=useState(null);// habit being edited (U1)
  const[detailHabit,setDetailHabit]=useState(null);// habit detail page (U2)

  const fb=window._fb;
  const today=td();
  const t=TH[tk]||TH.obsidian;

  function getPlan(){
    if(user&&ADMINS.includes(user.email))return PLANS.plus;
    if(pk==="early_access"&&pe&&new Date()>new Date(pe))return PLANS.free;
    return PLANS[pk]||PLANS.free;
  }
  const plan=getPlan();
  function showUp(r){setUpReason(r||"");setModal("upgrade");}
  function showToast(msg,type="ok"){setToast({msg,type});setTimeout(()=>setToast(null),3000);}
  showToastGlobal=showToast;

  // Auth
  useEffect(()=>{
    if(!fb){setLoading(false);return;}
    // First check if we're returning from a redirect
    fb.getRedirectResult(fb.auth).then(result=>{
      if(result&&result.user){
        // Redirect login succeeded - onAuthStateChanged will handle it
        console.log("Redirect success");
      }
    }).catch(e=>console.error("Redirect err:",e));
    // Listen for auth state
    const unsub=fb.onAuthStateChanged(fb.auth,async u=>{
      if(u){
        setUser(u);setDisplayName(u.displayName||"");
        await loadData(u.uid,u.email);
      } else {
        setUser(null);
      }
      setLoading(false);
    });
    return()=>unsub();
  },[]);

  // Notifications — default 8PM + custom reminders
  useEffect(()=>{
    if(!notif)return;
    const timers=[];
    // Schedule a reminder at given time string "HH:MM"
    function scheduleAt(timeStr,label){
      const[h,m]=timeStr.split(":").map(Number);
      const now=new Date(),rem=new Date();
      rem.setHours(h,m,0,0);
      if(now>=rem)rem.setDate(rem.getDate()+1);
      const delay=rem-now;
      const timer=setTimeout(()=>{
        if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
          if(habits.length>0){
            const today=td();
            const undone=habits.filter(hb=>!hb.log||!hb.log[today]);
            if(undone.length>0){
              new Notification("⚡ Momentum",{body:`${label} — ${undone.length} habit${undone.length>1?"s":""} left today! 🔥`});
              playSound(notifSound);
            }
          }
        }
      },delay);
      timers.push(timer);
    }
    // Default 8PM reminder
    scheduleAt("20:00","Daily Reminder");
    // Custom reminders
    reminders.filter(r=>r.enabled).forEach(r=>scheduleAt(r.time,r.label));
    return()=>timers.forEach(clearTimeout);
  },[habits,notif,reminders]);

  async function handleLogin(){
    setSigningIn(true);
    try{
      // Try popup first (works on most browsers)
      await fb.signInWithPopup(fb.auth,fb.provider);
    }catch(e){
      if(e.code==="auth/popup-blocked"||e.code==="auth/popup-closed-by-user"||e.code==="auth/cancelled-popup-request"){
        // Popup blocked — fallback to redirect
        try{await fb.signInWithRedirect(fb.auth,fb.provider);}
        catch(e2){console.error(e2);setSigningIn(false);}
      } else {
        console.error(e);
        setSigningIn(false);
      }
    }
  }
  async function handleLogout(){
    await fb.signOut(fb.auth);
    setUser(null);setHabits([]);setGoals([]);setJournals({});setPk("free");setPe(null);
  }

  async function loadData(uid,email){
    try{
      const ref=fb.doc(fb.db,"users",uid);
      const snap=await fb.getDoc(ref);
      if(snap.exists()){
        const d=snap.data();
        setHabits(d.habits||[]);setGoals(d.goals||[]);setJournals(d.journals||{});
        setTk(d.themeKey||"obsidian");setPk(d.plan||"free");setPe(d.planExpiry||null);
        if(d.displayName)setDisplayName(d.displayName);
        if(d.signupDate)setSignupDate(d.signupDate);
        if(d.userNumber)setUserNumber(d.userNumber);
      } else {
        // New user
        let num=101;
        await fb.runTransaction(fb.db,async tx=>{
          const cRef=fb.doc(fb.db,"meta","userCount");
          const cSnap=await tx.get(cRef);
          num=cSnap.exists()?(cSnap.data().count||0)+1:1;
          tx.set(cRef,{count:num},{merge:true});
        });
        const isEarly=num<=100;
        const exp=new Date();exp.setDate(exp.getDate()+30);
        const expStr=isEarly?exp.toISOString().split("T")[0]:null;
        const plan2=isEarly?"early_access":"free";
        setPk(plan2);setPe(expStr);
        // Check for referral code in URL
        const urlRef=new URLSearchParams(window.location.search).get("ref");
        const referredBy=urlRef?urlRef.toLowerCase():null;

        await fb.setDoc(ref,{habits:[],goals:[],journals:{},themeKey:"obsidian",plan:plan2,planExpiry:expStr,signupDate:today,userNumber:num,email,isEarlyUser:isEarly,referredBy:referredBy||null});
        if(isEarly)showToast(`🎉 You're user #${num} — 30 days Pro FREE!`,"badge");
      }
    }catch(e){console.error("Load err:",e);}
  }

  async function save(h,g,j,theme){
    if(!user)return;
    setSaving(true);
    try{await fb.setDoc(fb.doc(fb.db,"users",user.uid),{habits:h,goals:g,journals:j,themeKey:theme,displayName:displayName||user.displayName||""},{merge:true});}
    catch(e){console.error("Save err:",e);}
    setSaving(false);
  }

  // Habits
  function addH(){
    const name=_newHName.current.trim();
    if(!name)return;
    if(habits.length>=plan.maxH){showUp(`Free plan: max ${PLANS.free.maxH} habits. Upgrade to Pro for unlimited!`);return;}
    const newHabit={
      id:Date.now(),name,cat:_newHCat.current,icon:_newHIcon.current,
      color:_newHColor.current||t.accent,
      freq:_newHFreq.current||"daily",
      goalCount:_newHGoalCount.current||0,
      goalUnit:_newHGoalUnit.current||"",
      remTime:_newHRemTime.current||"",
      streak:0,best:0,log:{}
    };
    const h=[...habits,newHabit];
    _newHName.current="";_newHIcon.current="⭐";_newHCat.current="Health";
    _newHColor.current=t.accent;_newHFreq.current="daily";_newHGoalCount.current=0;_newHGoalUnit.current="";_newHRemTime.current="";
    setHabits(h);save(h,goals,journals,tk);showToast("Habit added! 🌱");
  }
  function addTpl(tpl){
    if(habits.length>=plan.maxH){showUp(`Free plan: max ${PLANS.free.maxH} habits. Upgrade to Pro for unlimited!`);return;}
    const h=[...habits,{id:Date.now(),name:tpl.name,cat:tpl.cat,icon:tpl.icon,streak:0,best:0,log:{}}];
    setHabits(h);save(h,goals,journals,tk);showToast(`Added "${tpl.name}"!`);
  }
  function toggleH(id){
    const h=habits.map(hb=>{
      if(hb.id!==id)return hb;
      const log={...hb.log};const was=!!log[today];
      if(was)delete log[today];else log[today]=true;
      let streak=0,best=hb.best||0;
      const d=new Date();
      while(true){const s=d.toISOString().split("T")[0];if(!log[s])break;streak++;d.setDate(d.getDate()-1);}
      if(streak>best)best=streak;
      if(!was&&BADGES.some(b=>b.d===streak)){setConfetti(true);showToast(`🏆 ${streak}-day streak badge!`,"badge");}
      // Ask for review at 7-day streak (only once)
      if(!was&&streak===7&&!localStorage.getItem("hg_reviewed")){
        setTimeout(()=>setShowReview(true),2000);
      }
      return{...hb,log,streak,best};
    });
    setHabits(h);save(h,goals,journals,tk);
  }
  function delH(id){const h=habits.filter(x=>x.id!==id);setHabits(h);save(h,goals,journals,tk);}
  function updateH(updated){const h=habits.map(x=>x.id!==updated.id?x:updated);setHabits(h);save(h,goals,journals,tk);showToast("Habit updated! ✅");}

  // Goals
  function addG(){
    const title=_newGTitle.current.trim();
    if(!title)return;
    if(goals.length>=plan.maxG){showUp(`Free plan: max ${PLANS.free.maxG} goals. Upgrade to Pro for unlimited!`);return;}
    const actions=newGActions.filter(a=>a.action.trim()).map(a=>({...a,id:Date.now()+Math.random(),done:false,doneAt:null}));
    const g=[...goals,{id:Date.now(),title,priority:_newGPriority.current,deadline:_newGDeadline.current,notes:_newGNotes.current,actions,createdAt:today}];
    _newGTitle.current="";_newGPriority.current="Medium";_newGDeadline.current="";_newGNotes.current="";
    setNewGActions([]);
    setGoals(g);setShowGF(false);save(habits,g,journals,tk);showToast("Goal added! 🎯");
  }
  function addA(gid){
    const action=_newAAction.current.trim();

        </div>);
      })}
    </div>
  );}

                        {(rate===null||isFuture)&&<span style={{fontSize:8,color:t.border}}>—</span>}
                        <div style={{width:"100%",height:barH||4,background:col,borderRadius:"3px 3px 0 0",opacity:isFuture?0.2:1,border:isNow?`1px solid ${t.accent}`:"none",transition:"height 0.4s"}}/>

              {done.map(a=>(
                <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 9px",background:t.success+"12",borderRadius:8,marginBottom:4}}>
                  <span style={{fontSize:12,color:t.success,flexShrink:0}}>✓</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:t.text,fontWeight:500}}>{a.action}</div>
                    {a.result&&<div style={{fontSize:10,color:t.muted}}>→ {a.result}</div>}
                  </div>
                  {a.doneAt&&<span style={{fontSize:10,color:t.muted,flexShrink:0}}>{timeAgo(a.doneAt)}</span>}
                </div>
              ))}
              </div>
            </details>}
            {g.actions.length===0&&<div style={{fontSize:12,color:t.muted,textAlign:"center",padding:"8px 0"}}>No action steps added yet</div>}
          </div>);
        })}
      </div>}
      {analyticsTab==="badges"&&<div>
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>🏅 Streak Badges</div>
          {!plan.heat
            ?<div onClick={()=>showUp("Unlock all 7 badges with Pro!")} style={{background:t.surface,border:`1px dashed ${t.border}`,borderRadius:10,padding:16,textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:28,marginBottom:6}}>🏅</div>
              <div style={{fontSize:13,fontWeight:700,color:t.text,marginBottom:4}}>Streak Badges — Pro Feature</div>
              <div style={{fontSize:11,color:t.muted,marginBottom:10}}>Earn 7 badges from Starter (3d) to Centurion (100d)</div>
              <span style={{fontSize:11,fontWeight:700,color:"#000",background:t.accent,padding:"5px 14px",borderRadius:20}}>⚡ Upgrade to unlock</span>
            </div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(86px,1fr))",gap:7}}>
              {BADGES.map(b=>{const earned=habits.some(h=>(h.best||h.streak)>=b.d);return(<div key={b.d} style={{padding:"9px 7px",borderRadius:10,background:earned?b.c+"22":t.surface,border:`1px solid ${earned?b.c+"66":t.border}`,textAlign:"center",opacity:earned?1:0.35}}>
                <div style={{fontSize:22}}>{b.i}</div>
                <div style={{fontSize:10,fontWeight:700,color:earned?b.c:t.muted,marginTop:3}}>{b.l}</div>
                <div style={{fontSize:9,color:t.muted,marginTop:1}}>🔥{b.d} days</div>
              </div>);})}
            </div>}
        </div>
        {habits.length===0&&<div style={{textAlign:"center",color:t.muted,fontSize:13}}>Build habits to earn badges! 🌱</div>}
      </div>}

      {/* U-E: Reviews Tab */}
      {analyticsTab==="reviews"&&<ReviewsTab t={t} habits={habits} goals={goals} journals={journals} plan={plan} showUp={showUp} today={today}/>}
    </div>
  );}

  return(
    <div style={{minHeight:"100vh",background:t.bg,fontFamily:"'Sora',system-ui,sans-serif",color:t.text}}>
      <style>{`*{box-sizing:border-box;}input,textarea,select{outline:none;font-family:inherit;}
      @keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
      .page-content{animation:pageIn 0.22s ease;}
      `}</style>
      {saving&&<div style={{position:"fixed",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${t.accent},${t.accent}88,${t.accent})`,zIndex:9999,animation:"slideIn 0.3s ease"}}/>}
      {toast&&<div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",zIndex:9998,background:toast.type==="badge"?t.accent:t.success,color:"#000",padding:"9px 18px",borderRadius:20,fontWeight:700,fontSize:13,boxShadow:"0 8px 32px rgba(0,0,0,0.3)",whiteSpace:"nowrap",animation:"slideIn 0.3s ease"}}>{toast.msg}</div>}
      <Confetti on={confetti} done={()=>setConfetti(false)}/>
      {showReview&&<ReviewPopup t={t} onClose={()=>setShowReview(false)}/>}
      {shareHabit&&<StreakShareModal t={t} habit={shareHabit} onClose={()=>setShareHabit(null)}/>}
      {editingHabit&&<EditHabitModal t={t} close={()=>setEditingHabit(null)} habit={editingHabit} onSave={updateH}/>}
      {modal==="upgrade"&&<UpgradeModal t={t} close={()=>setModal(null)} reason={upReason}/>}
      {modal==="pomodoro"&&<Pomodoro t={t} close={()=>setModal(null)} plan={plan} showUp={showUp}/>}
      {modal==="activity"&&<ActivityTimer t={t} close={()=>setModal(null)} plan={plan} showUp={showUp}/>}
      {modal==="calendar"&&<CalModal t={t} close={()=>setModal(null)} habits={habits} goals={goals}/>}
      {modal==="journal"&&<JournalModal t={t} close={()=>setModal(null)} journals={journals} onSave={saveJ} plan={plan}/>}
      {modal==="ai"&&<AIModal t={t} close={()=>setModal(null)} plan={plan} showUp={showUp}/>}
      {modal==="notif"&&<NotifModal t={t} close={()=>setModal(null)} enabled={notif} setEnabled={setNotif} plan={plan} reminders={reminders} setReminders={setReminders} notifSound={notifSound} setNotifSound={setNotifSound}/>}
      <div style={{display:"flex",minHeight:"100vh"}}>
      {/* Habit detail page — full screen overlay */}
      {detailHabit&&<div style={{position:"fixed",inset:0,zIndex:800,overflowY:"auto",background:t.bg}}>
        <HabitDetailPage t={t} habit={habits.find(h=>h.id===detailHabit)||detailHabit} habits={habits} setHabits={setHabits} saveF={h=>save(h,goals,journals,tk)} back={()=>setDetailHabit(null)} onShare={h=>setShareHabit(h)}/>
      </div>}
        <div className="sb" style={{width:216,background:t.card,borderRight:`1px solid ${t.border}`,flexDirection:"column",padding:"22px 14px",position:"sticky",top:0,height:"100vh",flexShrink:0,overflowY:"auto"}}>
          <div style={{marginBottom:18}}><div style={{fontSize:19,fontWeight:800,color:t.accent}}>⚡ Momentum</div><div style={{fontSize:10,color:t.muted,marginTop:1}}>Habit & Goal Tracker</div></div>
          <div style={{display:"flex",alignItems:"center",gap:7,padding:"8px 9px",background:t.surface,borderRadius:10,marginBottom:14}}>
            <img src={user.photoURL} style={{width:26,height:26,borderRadius:"50%"}} alt=""/>
            <div style={{flex:1,overflow:"hidden"}}>
              <div style={{fontSize:11,fontWeight:700,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{displayName||user.displayName}</div>
              <div style={{fontSize:9,color:pk==="plus"?"#a78bfa":pk==="pro"?t.accent:pk==="early_access"?"#4ade80":t.muted}}>{pk==="plus"?"💎 Plus":pk==="pro"?"⚡ Pro":pk==="early_access"?"🎁 Early Access":"Free Plan"}</div>
            </div>
          </div>
          <nav style={{flex:1}}>
            {NAV.map(item=>(<button key={item.id} onClick={()=>setPage(item.id)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"9px 11px",borderRadius:10,border:"none",cursor:"pointer",background:page===item.id?t.accent+"22":"none",color:page===item.id?t.accent:t.muted,fontWeight:page===item.id?700:400,fontSize:13,marginBottom:3,textAlign:"left"}}><span>{item.icon}</span>{item.label}</button>))}
            <div style={{height:1,background:t.border,margin:"12px 0"}}/>
            {[["🍅","Pomodoro","pomodoro"],["⏱️","Activity Timer","activity"],["📅","Calendar","calendar"],["📓","Journal","journal"],["🤖","AI Coach","ai"],["🔔","Notifications","notif"]].map(([icon,label,id])=>(
              <button key={id} onClick={()=>setModal(id)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"7px 11px",borderRadius:10,border:"none",cursor:"pointer",background:"none",color:t.muted,fontSize:12,marginBottom:3,textAlign:"left"}}>
                <span>{icon}</span>{label}
                {id==="ai"&&!plan.plus&&<span style={{marginLeft:"auto",fontSize:9,color:"#a78bfa",background:"#a78bfa22",padding:"1px 5px",borderRadius:8}}>PLUS</span>}
                {id==="activity"&&!plan.plus&&<span style={{marginLeft:"auto",fontSize:9,color:"#a78bfa",background:"#a78bfa22",padding:"1px 5px",borderRadius:8}}>PLUS</span>}
              </button>
            ))}
          </nav>
          {pk!=="pro"&&pk!=="plus"&&<button onClick={()=>showUp("Unlock unlimited habits, goals, analytics and more!")} style={{width:"100%",padding:"9px",borderRadius:10,border:"none",background:t.accent,color:"#000",cursor:"pointer",fontSize:12,fontWeight:700,marginBottom:7}}>⚡ Upgrade</button>}
          <button onClick={()=>setPage("settings")} style={{width:"100%",padding:"7px",borderRadius:10,border:`1px solid ${t.border}`,background:"none",color:t.muted,cursor:"pointer",fontSize:11,marginBottom:5}}>⚙️ Settings</button>
          <button onClick={handleLogout} style={{width:"100%",padding:"7px",borderRadius:10,border:`1px solid ${t.danger}33`,background:t.danger+"0a",color:t.danger,cursor:"pointer",fontSize:11,fontWeight:600}}>Sign out</button>
        </div>
        <div className="ma page-content" style={{flex:1,overflowY:"auto"}}>
          {page==="dashboard"&&<Dashboard/>}
          {page==="habits"&&<HabitsPage/>}
          {page==="goals"&&<GoalsPage/>}
          {page==="analytics"&&<AnalyticsPage/>}
          {page==="settings"&&<SettingsPage t={t} tk={tk} chTheme={chTheme} user={user} pk={pk} pe={pe} plan={plan} handleLogout={handleLogout} showUp={showUp} displayName={displayName} onSaveName={onSaveName} habits={habits} goals={goals} journals={journals} signupDate={signupDate} userNumber={userNumber}/>}
        </div>
      </div>
      <div className="bn" style={{position:"fixed",bottom:0,left:0,right:0,background:t.card,borderTop:`1px solid ${t.border}`,zIndex:500}}>
        <div style={{display:"flex",justifyContent:"space-around",padding:"5px 8px 3px",borderBottom:`1px solid ${t.border}`}}>
          {[["🍅","pomodoro"],["⏱️","activity"],["📅","calendar"],["📓","journal"],["🤖","ai"],["🔔","notif"]].map(([icon,id])=>(
            <button key={id} onClick={()=>setModal(id)} style={{background:"none",border:"none",cursor:"pointer",padding:"3px 5px",position:"relative"}}>
              <span style={{fontSize:17}}>{icon}</span>
              {id==="ai"&&!plan.plus&&<span style={{position:"absolute",top:0,right:0,width:5,height:5,borderRadius:"50%",background:"#a78bfa"}}/>}
              {id==="activity"&&!plan.plus&&<span style={{position:"absolute",top:0,right:0,width:5,height:5,borderRadius:"50%",background:"#a78bfa"}}/>}
            </button>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-around",padding:"5px 8px 7px"}}>
          {NAV.map(item=>(<button key={item.id} onClick={()=>setPage(item.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"3px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,flex:1}}>
            <span style={{fontSize:21}}>{item.icon}</span>
            <span style={{fontSize:10,fontWeight:page===item.id?700:400,color:page===item.id?t.accent:t.muted}}>{item.label}</span>
            {page===item.id&&<div style={{width:4,height:4,borderRadius:"50%",background:t.accent}}/>}
          </button>))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(r=>{
        console.log('⚡ SW ready:',r.scope);
        r.addEventListener('updatefound',()=>{
          const nw=r.installing;
          nw.addEventListener('statechange',()=>{
            if(nw.state==='installed'&&navigator.serviceWorker.controller){
              nw.postMessage({type:'SKIP_WAITING'});
            }
          });
        });
        let refreshing=false;
        navigator.serviceWorker.addEventListener('controllerchange',()=>{
          if(!refreshing){refreshing=true;window.location.reload();}
        });
        navigator.serviceWorker.ready.then(reg=>{
          if(reg.active){
            const rem=localStorage.getItem('hg_reminders');
            const notifOn=localStorage.getItem('hg_notif');
            if(rem)reg.active.postMessage({type:'SYNC_STORAGE',key:'hg_reminders',value:rem});
            if(notifOn)reg.active.postMessage({type:'SYNC_STORAGE',key:'hg_notif',value:notifOn});
            reg.active.postMessage({type:'UPDATE_REMINDERS'});
          }
        });
      })
      .catch(e=>console.error('SW error:',e));
  });
}
</script>
</body>
</html>
