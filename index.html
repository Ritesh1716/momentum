<style>
*{margin:0;padding:0;box-sizing:border-box;}

<script type="text/babel">
function OverviewTab({t,habits,goals,journals,plan,today,todayPct,goalPct,weekGoalPct,doneH,totalH,doneA,totalA,compG,totalG,timeRange,setTimeRange}){
  const now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
  const week7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week7.push(d.toISOString().split("T")[0]);}
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const monthDates=Array.from({length:daysInMonth},(_,i)=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`).filter(d=>d<=today);

  function getRangeStats(){
    if(timeRange==="today"){return{habitsLabel:"Today's Habits",habitsPct:todayPct,habitsSub:`${doneH}/${totalH}`,actionsLabel:"Today's Actions",actionsPct:goalPct,actionsSub:`${doneA}/${totalA}`,goalsLabel:"Goals Progress",goalsPct:weekGoalPct,goalsSub:`${compG}/${totalG}`};}
    if(timeRange==="week"){
      const wDone=habits.reduce((s,h)=>s+week7.filter(d=>h.log&&h.log[d]).length,0);
      const wTotal=habits.length*7;
      const wPct=wTotal>0?Math.round(wDone/wTotal*100):0;
      const wActDone=goals.reduce((s,g)=>s+g.actions.filter(a=>a.done&&a.doneAt&&week7.includes(a.doneAt)).length,0);
      const wActPct=wTotal>0?Math.round(wActDone/goals.reduce((s,g)=>s+g.actions.length,0)*100||0):0;
      return{habitsLabel:"This Week's Habits",habitsPct:wPct,habitsSub:`${wDone}/${wTotal} days`,actionsLabel:"Actions This Week",actionsPct:wActPct,actionsSub:`${wActDone} done`,goalsLabel:"Goals Progress",goalsPct:weekGoalPct,goalsSub:`${compG}/${totalG}`};
    }
    if(timeRange==="month"){
      const mDone=habits.reduce((s,h)=>s+monthDates.filter(d=>h.log&&h.log[d]).length,0);
      const mTotal=habits.length*monthDates.length;
      const mPct=mTotal>0?Math.round(mDone/mTotal*100):0;
      const mActDone=goals.reduce((s,g)=>s+g.actions.filter(a=>a.done&&a.doneAt&&monthDates.includes(a.doneAt)).length,0);
      const mActPct=mTotal>0?Math.round(mActDone/goals.reduce((s,g)=>s+g.actions.length,0)*100||0):0;
      return{habitsLabel:"This Month's Habits",habitsPct:mPct,habitsSub:`${mDone}/${mTotal} days`,actionsLabel:"Actions This Month",actionsPct:mActPct,actionsSub:`${mActDone} done`,goalsLabel:"Goals Progress",goalsPct:weekGoalPct,goalsSub:`${compG}/${totalG}`};
    }
    return{habitsLabel:"Today's Habits",habitsPct:todayPct,habitsSub:`${doneH}/${totalH}`,actionsLabel:"Today's Actions",actionsPct:goalPct,actionsSub:`${doneA}/${totalA}`,goalsLabel:"Goals Progress",goalsPct:weekGoalPct,goalsSub:`${compG}/${totalG}`};
  }
  const rs=getRangeStats();
  const allTimeTotal=habits.reduce((s,h)=>s+Object.values(h.log||{}).filter(Boolean).length,0);
  const longestStreak=Math.max(...habits.map(h=>h.best||h.streak||0),0);
  const totalJournalDays=Object.keys(journals).length;

  // Mood data
  const MCOLS=["#f87171","#fb923c","#fbbf24","#86efac","#4ade80"];
  const MEMOJI=["😞","😕","😐","🙂","😄"];
  const MLABELS=["Rough","Low","Okay","Good","Great"];
  const moodData=week7.map(d=>{const e=journals[d];if(!e)return null;return typeof e==="object"?e.mood:null;});
  const hasAny=moodData.some(m=>m!=null);
  const avgMood=hasAny?Math.round(moodData.filter(m=>m!=null).reduce((s,m)=>s+m,0)/moodData.filter(m=>m!=null).length):null;

  return(<div>
    {/* Summary with time selector */}
    <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:13}}>📊 Summary</div>
        <div style={{display:"flex",gap:4,background:t.surface,borderRadius:9,padding:3}}>
          {[["today","Today"],["week","Week"],["month","Month"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTimeRange(k)} style={{padding:"4px 10px",borderRadius:7,border:"none",cursor:"pointer",background:timeRange===k?t.accent:"none",color:timeRange===k?"#000":t.muted,fontWeight:timeRange===k?700:400,fontSize:11}}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-around"}}>
        <Ring pct={rs.habitsPct} sz={88} sw={9} col={t.accent} lbl={rs.habitsLabel} sub={rs.habitsSub} t={t}/>
        <Ring pct={rs.actionsPct} sz={88} sw={9} col={t.info} lbl={rs.actionsLabel} sub={rs.actionsSub} t={t}/>
        <Ring pct={rs.goalsPct} sz={88} sw={9} col={t.success} lbl={rs.goalsLabel} sub={rs.goalsSub} t={t}/>
      </div>
    </div>

    {/* All-time stats */}
    {habits.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
      {[[allTimeTotal,"✅","All-Time",t.success],[longestStreak+"d","🏆","Best Streak",t.accent],[totalJournalDays,"📓","Journal Days",t.info]].map(([v,ic,l,c])=>(
        <div key={l} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
          <div style={{fontSize:9,marginBottom:2}}>{ic}</div>
          <div style={{fontSize:17,fontWeight:800,color:c}}>{v}</div>
          <div style={{fontSize:9,color:t.muted,textTransform:"uppercase",letterSpacing:0.4,marginTop:2}}>{l}</div>
        </div>
      ))}
    </div>}

    {/* Streak leaderboard */}
    {habits.length>0&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>🏆 Streak Leaderboard</div>
      {[...habits].sort((a,b)=>b.streak-a.streak).map((h,i)=>{
        const badge=getBadge(h.streak),total=Object.values(h.log||{}).filter(Boolean).length;
        return(<div key={h.id} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 0",borderBottom:`1px solid ${t.border}`}}>
          <span style={{fontSize:13,fontWeight:800,color:i===0?t.accent:t.muted,width:18,textAlign:"center"}}>{i+1}</span>
          <span style={{fontSize:15}}>{h.icon}</span>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{h.name}</div><div style={{fontSize:10,color:t.muted}}>{total} total done</div></div>
          {badge&&plan.heat&&<span>{badge.i}</span>}
          <span style={{fontWeight:700,color:t.accent,fontSize:12}}>🔥{h.streak}d</span>
        </div>);
      })}
    </div>}

    {/* Goal breakdown */}
    {goals.length>0&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>Goal Breakdown</div>
      {goals.map(g=>{
        const done=g.actions.filter(a=>a.done).length,pct=g.actions.length>0?Math.round((done/g.actions.length)*100):0;
        const pCol=g.priority==="High"?t.danger:g.priority==="Medium"?t.accent:t.success;
        return(<div key={g.id} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div><span style={{fontWeight:600,fontSize:13}}>{g.title}</span><span style={{fontSize:9,fontWeight:700,marginLeft:5,padding:"1px 6px",borderRadius:10,background:pCol+"22",color:pCol}}>{g.priority}</span></div>
            <span style={{fontSize:13,fontWeight:700,color:pct===100?t.success:t.accent}}>{pct}%</span>
          </div>
          <div style={{height:6,background:t.surface,borderRadius:10}}><div style={{height:"100%",width:`${pct}%`,background:pct===100?t.success:t.accent,borderRadius:10,transition:"width 0.5s"}}/></div>
          <div style={{fontSize:10,color:t.muted,marginTop:2}}>{done}/{g.actions.length} actions</div>
        </div>);
      })}
    </div>}

    {/* Mood chart */}
    <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:13}}>😊 Mood This Week</div>
        {avgMood!=null&&<div style={{fontSize:11,color:MCOLS[avgMood],fontWeight:700,background:MCOLS[avgMood]+"22",padding:"2px 10px",borderRadius:20}}>Avg: {MEMOJI[avgMood]} {MLABELS[avgMood]}</div>}
      </div>
      {!hasAny?<div style={{textAlign:"center",color:t.muted,fontSize:12,padding:"16px 0"}}>No mood data yet. Add mood in journal! 📓</div>:(
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-around",height:120,gap:4}}>
          {week7.map((d,i)=>{
            const m=moodData[i];
            const barH=m!=null?Math.max(12,((m+1)/5)*80):4;
            const col=m!=null?MCOLS[m]:t.border;
            const dayLbl=new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"narrow"});
            return(<div key={d} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,flex:1}}>
              {m!=null&&<span style={{fontSize:13}}>{MEMOJI[m]}</span>}
              {m==null&&<span style={{fontSize:10,color:t.muted}}>—</span>}
              <div style={{width:"100%",maxWidth:28,height:barH,background:col,borderRadius:"4px 4px 0 0",transition:"height 0.5s",opacity:m!=null?1:0.3}}/>
              <span style={{fontSize:9,color:d===today?t.accent:t.muted,fontWeight:d===today?700:400}}>{dayLbl}</span>
            </div>);
          })}
        </div>
      )}
    </div>

    {habits.length===0&&goals.length===0&&<div style={{textAlign:"center",color:t.muted,padding:36}}>Add habits and goals to see analytics! 📈</div>}
  </div>);
}

function ReviewsTab({t,habits,goals,journals,plan,showUp,today}){
  const[sub,setSub]=React.useState("week");
  const now=new Date();
  const yr=now.getFullYear(),mo=now.getMonth();
  const week7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week7.push(d.toISOString().split("T")[0]);}
  const monthDates=Array.from({length:Math.min(new Date(yr,mo+1,0).getDate(),now.getDate())},(_,i)=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`);
  const qNum=Math.floor(mo/3);
  const qDates=[];
  [qNum*3,qNum*3+1,qNum*3+2].forEach(m2=>{const dim=new Date(yr,m2+1,0).getDate();for(let d=1;d<=dim;d++){const ds=`${yr}-${String(m2+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;if(ds<=today)qDates.push(ds);}});
  const wHabDone=habits.reduce((s,h)=>s+week7.filter(d=>h.log&&h.log[d]).length,0);
  const wHabTotal=habits.length*7;
  const wHabPct=wHabTotal>0?Math.round(wHabDone/wHabTotal*100):0;
  const wJournalDays=week7.filter(d=>journals[d]).length;
  const wPomoMins=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_history")||"[]").filter(s=>week7.includes(s.date)).reduce((s,x)=>s+(x.mins||0),0);}catch{return 0;}})();
  const wBestHabit=habits.length>0?[...habits].sort((a,b)=>week7.filter(d=>b.log&&b.log[d]).length-week7.filter(d=>a.log&&a.log[d]).length)[0]:null;
  const mHabDone=habits.reduce((s,h)=>s+monthDates.filter(d=>h.log&&h.log[d]).length,0);
  const mHabPct=monthDates.length>0&&habits.length>0?Math.round(mHabDone/(habits.length*monthDates.length)*100):0;
  const mPomoMins=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_history")||"[]").filter(s=>s.date&&s.date.startsWith(`${yr}-${String(mo+1).padStart(2,"0")}`)).reduce((s,x)=>s+(x.mins||0),0);}catch{return 0;}})();
  const yHabDone=habits.reduce((s,h)=>s+Object.keys(h.log||{}).filter(d=>d.startsWith(`${yr}`)&&h.log[d]).length,0);
  const yJDays=Object.keys(journals).filter(d=>d.startsWith(`${yr}`)).length;
  const yBest=Math.max(...habits.map(h=>h.best||h.streak||0),0);
  const qHabPct=habits.length>0&&qDates.length>0?Math.round(habits.reduce((s,h)=>s+qDates.filter(d=>h.log&&h.log[d]).length,0)/(habits.length*qDates.length)*100):0;
  const QLBLS=["Q1","Q2","Q3","Q4"];
  const SC=({icon,value,label,color})=>(<div style={{flex:1,background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 6px",textAlign:"center"}}><div style={{fontSize:12,marginBottom:3}}>{icon}</div><div style={{fontSize:17,fontWeight:800,color:color||t.accent}}>{value}</div><div style={{fontSize:9,color:t.muted,marginTop:2,textTransform:"uppercase"}}>{label}</div></div>);
  return(<div>
    <div style={{display:"flex",gap:4,background:t.surface,borderRadius:12,padding:3,marginBottom:14}}>
      {[["week","📅 Week",true],["month","🗓 Month",plan.heat],["year","📆 Year",plan.plus],["quarter","📊 Quarter",plan.plus]].map(([k,l,ok])=>(
        <button key={k} onClick={()=>ok?setSub(k):showUp(plan.heat?"💎 Yearly & Quarterly are Plus!":"⚡ Monthly reviews are Pro!")} style={{flex:1,padding:"7px 2px",borderRadius:9,border:"none",cursor:ok?"pointer":"not-allowed",background:sub===k?t.accent:"none",color:sub===k?"#000":ok?t.muted:t.border,fontWeight:sub===k?700:400,fontSize:10}}>{l}{!ok&&<span style={{fontSize:7}}> {plan.heat?"PLUS":"PRO"}</span>}</button>
      ))}
    </div>
    {sub==="week"&&<div>
      <div style={{background:t.accent+"12",border:`1px solid ${t.accent}33`,borderRadius:11,padding:"10px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:800,color:t.accent}}>📅 This Week</div><div style={{fontSize:11,color:t.muted}}>{week7[0]} → {week7[6]}</div></div>
      <div style={{display:"flex",gap:8,marginBottom:10}}><SC icon="🔥" value={`${wHabPct}%`} label="Habit Rate" color={t.accent}/><SC icon="📓" value={`${wJournalDays}/7`} label="Journaled" color={t.info}/><SC icon="🍅" value={`${wPomoMins}m`} label="Focus" color={t.muted}/></div>
      <div style={{display:"flex",gap:8,marginBottom:14}}><SC icon="✅" value={`${wHabDone}/${wHabTotal}`} label="Done" color={t.success}/><SC icon="📈" value={wHabPct>=80?"🌟 Great":wHabPct>=50?"💪 Good":"🎯 Keep going"} label="Grade" color={wHabPct>=80?t.success:wHabPct>=50?t.accent:t.danger}/><SC icon="🔥" value={habits.length>0?Math.max(...habits.map(h=>h.streak||0))+"d":"—"} label="Top Streak" color={t.accent}/></div>
      {wBestHabit&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:12,marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:t.muted,marginBottom:8,textTransform:"uppercase"}}>🏆 Star Habit This Week</div><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>{wBestHabit.icon}</span><div><div style={{fontWeight:700,fontSize:14}}>{wBestHabit.name}</div><div style={{fontSize:11,color:t.muted}}>{week7.filter(d=>wBestHabit.log&&wBestHabit.log[d]).length}/7 days · 🔥{wBestHabit.streak}d</div></div></div></div>}
    </div>}
    {sub==="month"&&plan.heat&&<div>
      <div style={{background:t.accent+"12",border:`1px solid ${t.accent}33`,borderRadius:11,padding:"10px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:800,color:t.accent}}>🗓 {now.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</div></div>
      <div style={{display:"flex",gap:8,marginBottom:14}}><SC icon="🔥" value={`${mHabPct}%`} label="Habit Rate" color={t.accent}/><SC icon="✅" value={mHabDone} label="Done" color={t.success}/><SC icon="🍅" value={`${Math.round(mPomoMins/60*10)/10}h`} label="Focus" color={t.muted}/></div>
      <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14}}><div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:10,textTransform:"uppercase"}}>Per Habit</div>{habits.map(h=>{const done=monthDates.filter(d=>h.log&&h.log[d]).length;const pct=monthDates.length>0?Math.round(done/monthDates.length*100):0;const col=pct>=75?t.success:pct>=50?t.accent:t.danger;return(<div key={h.id} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12,fontWeight:600}}>{h.icon} {h.name}</span><span style={{fontSize:12,color:col,fontWeight:700}}>{pct}%</span></div><div style={{height:5,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:`${pct}%`,background:col,borderRadius:4}}/></div></div>);})}</div>
    </div>}
    {sub==="year"&&plan.plus&&<div>
      <div style={{background:"#a78bfa18",border:"1px solid #a78bfa44",borderRadius:11,padding:"10px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:800,color:"#a78bfa"}}>📆 Year {yr}</div></div>
      <div style={{display:"flex",gap:8}}><SC icon="✅" value={yHabDone} label="Total Done" color={"#a78bfa"}/><SC icon="📓" value={yJDays} label="Journal Days" color={t.info}/><SC icon="🏆" value={`${yBest}d`} label="Best Streak" color={t.accent}/></div>
    </div>}
    {sub==="quarter"&&plan.plus&&<div>
      <div style={{background:"#a78bfa18",border:"1px solid #a78bfa44",borderRadius:11,padding:"10px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:800,color:"#a78bfa"}}>📊 {QLBLS[qNum]} {yr} · {qDates.length} days</div></div>
      <div style={{display:"flex",gap:8}}><SC icon="🔥" value={`${qHabPct}%`} label="Habit Rate" color={t.accent}/><SC icon="✅" value={habits.reduce((s,h)=>s+qDates.filter(d=>h.log&&h.log[d]).length,0)} label="Done" color={t.success}/><SC icon="🎯" value={goals.filter(g=>g.actions.every(a=>a.done)&&g.actions.length>0).length} label="Goals" color={t.info}/></div>
    </div>}

function Confetti({on,done}){
  const r=useRef();
  useEffect(()=>{
    if(!on)return;
    const c=r.current;if(!c)return;
    c.width=window.innerWidth;c.height=window.innerHeight;
    const ctx=c.getContext("2d");
    const cols=["#f5c842","#e8853d","#4ade80","#60a5fa","#a78bfa","#f87171"];
    const ps=Array.from({length:90},()=>({x:Math.random()*c.width,y:-20,r:3+Math.random()*5,spd:1.5+Math.random()*2,col:cols[Math.floor(Math.random()*6)],ang:0,ts:0.1+Math.random()*0.3}));
    let raf;
    const draw=()=>{ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.y+=p.spd;p.ang+=p.ts;ctx.beginPath();ctx.lineWidth=p.r;ctx.strokeStyle=p.col;ctx.moveTo(p.x+Math.sin(p.ang)*8,p.y);ctx.lineTo(p.x+Math.sin(p.ang)*8+p.r*2,p.y+p.r*2);ctx.stroke();});if(ps.some(p=>p.y<c.height))raf=requestAnimationFrame(draw);else{ctx.clearRect(0,0,c.width,c.height);done&&done();}};
    draw();return()=>cancelAnimationFrame(raf);
  },[on]);
  if(!on)return null;
  return React.createElement("canvas",{ref:r,style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999}});
}

  const[durations,setDurations]=useState({focus:25,short:5,long:15});
  const[editing,setEditing]=useState(null);
  const[editVal,setEditVal]=useState("");
  const[sessionLabel,setSessionLabel]=useState("Focus");
  const[customLabel,setCustomLabel]=useState("");
  const[showLabelInput,setShowLabelInput]=useState(false);
  const[history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_history")||"[]");}catch{return[];}});
  const[analyticsTab,setAnalyticsTab]=useState("week");
  const iv=useRef();
  const today=new Date().toISOString().split("T")[0];

  const MODES=[["focus","🍅","Focus"],["short","☕","Short Break"],["long","🌿","Long Break"]];
  const QUICK_LABELS=["Focus","Study","Work","Exercise","Reading","Meditation","Practice","Research"];
  const CHIPS=[15,30,45,60];

  useEffect(()=>{
    if(run){
      iv.current=setInterval(()=>setSecs(s=>{
        if(s<=1){
          clearInterval(iv.current);setRun(false);
          const label=customLabel||sessionLabel;
          const mins=durations[mode];
          const entry={id:Date.now(),label,mode,mins,time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),date:today};
          const updated=[entry,...history.slice(0,199)];
          setHistory(updated);
          localStorage.setItem("hg_pomo_history",JSON.stringify(updated));
          if(Notification.permission==="granted")new Notification("⚡ Session Complete!",{body:`${label} — ${mins}m done! 🎉`,icon:"/icon-192.png"});
          return 0;
        }
        return s-1;
      }),1000);
    } else clearInterval(iv.current);
    return()=>clearInterval(iv.current);
  },[run,mode,durations,sessionLabel,customLabel]);

  function switchMode(m){setMode(m);setSecs(durations[m]*60);setRun(false);}
  function setChip(mins){const nd={...durations,[mode]:mins};setDurations(nd);setSecs(mins*60);setRun(false);}
  function startEdit(m){setEditing(m);setEditVal(String(durations[m]));}
  function saveEdit(m){
    const v=parseInt(editVal);
    if(v>0&&v<=240){const nd={...durations,[m]:v};setDurations(nd);if(mode===m){setSecs(v*60);setRun(false);}}
    setEditing(null);
  }

  const totalSecs=durations[mode]*60;
  const pct=((totalSecs-secs)/totalSecs)*100;
  const r2=80,ci=2*Math.PI*r2;
  const mm=String(Math.floor(secs/60)).padStart(2,"0"),ss2=String(secs%60).padStart(2,"0");
  const todaySess=history.filter(s=>s.date===today);
  const todayMins=todaySess.reduce((s,x)=>s+(x.mins||0),0);

  // ── ANALYTICS HELPERS ──────────────────────────────────────────
  function getWeekData(){
    const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split("T")[0]);}
    return days.map(d=>{
      const sess=history.filter(s=>s.date===d);
      const mins=sess.reduce((s,x)=>s+(x.mins||0),0);
      return{date:d,mins,label:new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"})};
    });
  }

  function getMonthData(){
    const now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
    const days=new Date(yr,mo+1,0).getDate();
    return Array.from({length:days},(_,i)=>{
      const d=`${yr}-${String(mo+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;
      const mins=history.filter(s=>s.date===d).reduce((s,x)=>s+(x.mins||0),0);
      return{day:i+1,mins};
    });
  }

  function getYearData(){
    const yr=new Date().getFullYear();
    const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return MONTHS.map((m,mi)=>{
      const prefix=`${yr}-${String(mi+1).padStart(2,"0")}`;
      const mins=history.filter(s=>s.date&&s.date.startsWith(prefix)).reduce((s,x)=>s+(x.mins||0),0);
      return{month:m,mins,hrs:Math.round(mins/60*10)/10};
    });
  }

  function getLabelBreakdown(data){
    const map={};
    data.forEach(s=>{const k=s.label||"Focus";map[k]=(map[k]||0)+(s.mins||0);});
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,6);
  }

  // ── TIMER TAB ──────────────────────────────────────────────────
  function TimerTab(){
    return(<div>
      {/* Mode switcher */}
      <div style={{display:"flex",gap:6,background:t.surface,borderRadius:12,padding:4,marginBottom:20}}>
        {MODES.map(([m,ic,l])=>(
          <button key={m} onClick={()=>switchMode(m)} style={{flex:1,padding:"8px 4px",borderRadius:9,border:"none",cursor:"pointer",background:mode===m?t.accent:"none",color:mode===m?"#000":t.muted,fontWeight:700,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
            <span>{ic}</span><span>{l}</span>
          </button>
        ))}
      </div>

      {/* Session label */}
      <div style={{marginBottom:16,textAlign:"center"}}>
        {!showLabelInput?(
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
            {QUICK_LABELS.slice(0,6).map(l=>(
              <button key={l} onClick={()=>{setSessionLabel(l);setCustomLabel("");}} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${sessionLabel===l&&!customLabel?t.accent:t.border}`,background:sessionLabel===l&&!customLabel?t.accent+"18":t.surface,color:sessionLabel===l&&!customLabel?t.accent:t.muted,cursor:"pointer",fontSize:11,fontWeight:sessionLabel===l&&!customLabel?700:400}}>{l}</button>
            ))}
            <button onClick={()=>setShowLabelInput(true)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${t.border}`,background:t.surface,color:t.muted,cursor:"pointer",fontSize:11}}>✏️ Custom</button>
          </div>
        ):(
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <input autoFocus value={customLabel} onChange={e=>setCustomLabel(e.target.value)} placeholder="Session name..." style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1px solid ${t.accent}`,background:t.surface,color:t.text,fontSize:13}}/>
            <button onClick={()=>setShowLabelInput(false)} style={{padding:"8px 12px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>✓</button>
          </div>
        )}
      </div>

      {/* Duration chips */}
      <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:8,flexWrap:"wrap"}}>
        {CHIPS.map(c=>(
          <button key={c} onClick={()=>setChip(c)} style={{padding:"5px 14px",borderRadius:20,border:`1px solid ${durations[mode]===c?t.accent:t.border}`,background:durations[mode]===c?t.accent+"18":t.surface,color:durations[mode]===c?t.accent:t.muted,cursor:"pointer",fontSize:12,fontWeight:durations[mode]===c?700:400}}>{c}m</button>
        ))}
        {/* Custom duration */}
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          {editing===mode?(
            <>
              <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEdit(mode);if(e.key==="Escape")setEditing(null);}} style={{width:44,padding:"4px 6px",borderRadius:8,border:`1px solid ${t.accent}`,background:t.surface,color:t.text,fontSize:12,textAlign:"center"}}/>
              <span style={{fontSize:10,color:t.muted}}>m</span>
              <button onClick={()=>saveEdit(mode)} style={{background:"none",border:"none",color:t.success,cursor:"pointer",fontSize:13}}>✓</button>
            </>
          ):(
            <button onClick={()=>startEdit(mode)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${t.border}`,background:t.surface,color:t.muted,cursor:"pointer",fontSize:11}}>Custom</button>
          )}
        </div>
      </div>

      {/* Timer ring */}
      <div style={{position:"relative",width:200,height:200,margin:"16px auto 20px"}}>
        <svg width={200} height={200} style={{transform:"rotate(-90deg)"}}>
          <circle cx={100} cy={100} r={r2} fill="none" stroke={t.border} strokeWidth={12}/>
          <circle cx={100} cy={100} r={r2} fill="none" stroke={run?t.accent:secs===0?t.success:t.accent} strokeWidth={12} strokeDasharray={ci} strokeDashoffset={ci-(pct/100)*ci} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:42,fontWeight:800,color:secs===0?t.success:t.text,letterSpacing:-2,fontVariantNumeric:"tabular-nums"}}>{mm}:{ss2}</span>
          <span style={{fontSize:11,color:t.muted,textTransform:"uppercase",letterSpacing:2,marginTop:2}}>{customLabel||sessionLabel}</span>
          {run&&<span style={{fontSize:10,color:t.accent,marginTop:4,animation:"fadeIn 1s infinite alternate"}}>● LIVE</span>}
        </div>
      </div>

      {/* Controls */}
      <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
        <button onClick={()=>setRun(r=>!r)} style={{padding:"13px 36px",borderRadius:14,border:"none",cursor:"pointer",background:t.accent,color:"#000",fontWeight:700,fontSize:17}}>{run?"⏸ Pause":"▶ Start"}</button>
        <button onClick={()=>{setSecs(durations[mode]*60);setRun(false);}} style={{padding:"13px 18px",borderRadius:14,border:`1px solid ${t.border}`,cursor:"pointer",background:"none",color:t.text,fontWeight:600}}>↺ Reset</button>
      </div>

      {/* Today stats */}
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        {[[`${todaySess.length}`,"Sessions Today",t.accent],[`${todayMins}m`,"Focus Today",t.success],[`${Math.round(todayMins/60*10)/10}h`,"Hours",t.info]].map(([v,l,c])=>(
          <div key={l} style={{flex:1,background:t.surface,border:`1px solid ${t.border}`,borderRadius:10,padding:"8px 6px",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:9,color:t.muted,marginTop:2,textTransform:"uppercase",letterSpacing:0.3}}>{l}</div>
          </div>
        ))}
      </div>
    </div>);
  }

  // ── HISTORY TAB ────────────────────────────────────────────────
  function HistoryTab(){
    const grouped={};
    history.forEach(s=>{
      const k=s.date||today;
      if(!grouped[k])grouped[k]=[];
      grouped[k].push(s);
    });
    const sortedDates=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
    if(history.length===0)return(
      <div style={{textAlign:"center",padding:"48px 16px"}}>
        <div style={{fontSize:40,marginBottom:12}}>🍅</div>
        <div style={{fontSize:15,fontWeight:700,color:t.text,marginBottom:6}}>No sessions yet</div>
        <div style={{fontSize:13,color:t.muted}}>Complete a session to see your history</div>
      </div>
    );
    return(<div>
      {sortedDates.map(date=>{
        const sess=grouped[date];
        const totalM=sess.reduce((s,x)=>s+(x.mins||0),0);
        const label=date===today?"Today":timeAgo(date);
        return(<div key={date} style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:t.accent}}>{label}</div>
            <div style={{fontSize:11,color:t.muted,background:t.surface,padding:"2px 8px",borderRadius:10}}>{sess.length} session{sess.length!==1?"s":""} · {totalM}m</div>
          </div>
          {sess.map((s,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:t.card,border:`1px solid ${t.border}`,borderRadius:10,marginBottom:6}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:s.mode==="focus"?t.accent:s.mode==="short"?t.success:t.info,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:t.text}}>{s.label||"Focus"}</div>
                <div style={{fontSize:10,color:t.muted,marginTop:1}}>{s.mode==="focus"?"🍅 Focus":s.mode==="short"?"☕ Short Break":"🌿 Long Break"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:13,fontWeight:700,color:t.success}}>{s.mins}m</div>
                <div style={{fontSize:10,color:t.muted}}>{s.time||""}</div>
              </div>
            </div>
          ))}
        </div>);
      })}
    </div>);
  }

  // ── ANALYTICS TAB ──────────────────────────────────────────────
  function AnalyticsTab(){
    const weekData=getWeekData();
    const weekTotal=weekData.reduce((s,d)=>s+d.mins,0);
    const weekSessions=history.filter(s=>{const d=new Date(s.date+"T12:00:00");return(new Date()-d)/86400000<=7;});
    const weekLabels=getLabelBreakdown(weekSessions);
    const maxBar=Math.max(...weekData.map(d=>d.mins),1);

    return(<div>
      {/* Week selector — Free for all */}
      <div style={{display:"flex",gap:6,background:t.surface,borderRadius:10,padding:3,marginBottom:16}}>
        {[["week","Week",true],["month","Month",plan.heat],["year","Year",plan.plus]].map(([k,l,allowed])=>(
          <button key={k} onClick={()=>allowed?setAnalyticsTab(k):showUp&&showUp(k==="month"?"📊 Monthly analytics is a Pro feature!":"💎 Yearly analytics is a Plus feature!")} style={{flex:1,padding:"7px",borderRadius:8,border:"none",cursor:allowed?"pointer":"not-allowed",background:analyticsTab===k?t.accent:"none",color:analyticsTab===k?"#000":allowed?t.muted:t.border,fontWeight:analyticsTab===k?700:400,fontSize:12,position:"relative"}}>
            {l}{!allowed&&<span style={{fontSize:8,marginLeft:3,color:k==="month"?t.accent:"#a78bfa"}}>{k==="month"?"PRO":"PLUS"}</span>}
          </button>
        ))}
      </div>

      {/* Weekly view */}
      {analyticsTab==="week"&&<div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[[`${weekTotal}m`,"This Week",t.accent],[`${weekSessions.length}`,"Sessions",t.success],[`${Math.round(weekTotal/7)}m`,"Daily Avg",t.info]].map(([v,l,c])=>(
            <div key={l} style={{flex:1,background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:9,color:t.muted,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
        {/* Bar chart */}
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:12}}>Daily Focus Time</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80}}>
            {weekData.map((d,i)=>{
              const h2=d.mins>0?Math.max(8,(d.mins/maxBar)*72):3;
              const isT=d.date===today;
              return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                {d.mins>0&&<span style={{fontSize:8,color:isT?t.accent:t.muted,fontWeight:700}}>{d.mins}m</span>}
                <div style={{width:"100%",height:h2,background:isT?t.accent:d.mins>0?t.success+"88":t.border,borderRadius:"4px 4px 0 0",transition:"height 0.4s"}}/>
                <span style={{fontSize:9,color:isT?t.accent:t.muted,fontWeight:isT?700:400}}>{d.label}</span>
              </div>);
            })}
          </div>
        </div>
        {/* Per-label breakdown */}
        {weekLabels.length>0&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14}}>
          <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:10}}>By Activity</div>
          {weekLabels.map(([label,mins])=>(
            <div key={label} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:12,color:t.text,fontWeight:600}}>{label}</span>
                <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{mins}m · {Math.round(mins/60*10)/10}h</span>
              </div>
              <div style={{height:5,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:`${(mins/weekTotal)*100}%`,background:t.accent,borderRadius:4}}/></div>
            </div>
          ))}
        </div>}
      </div>}

      {/* Monthly view — Pro */}
      {analyticsTab==="month"&&plan.heat&&(()=>{
        const monthData=getMonthData();
        const monthTotal=monthData.reduce((s,d)=>s+d.mins,0);
        const now=new Date();
        const monthSessions=history.filter(s=>{const d=new Date(s.date+"T12:00:00");return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();});
        const monthLabels=getLabelBreakdown(monthSessions);
        const maxM=Math.max(...monthData.map(d=>d.mins),1);
        return(<div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {[[`${monthTotal}m`,"This Month",t.accent],[`${monthSessions.length}`,"Sessions",t.success],[`${Math.round(monthTotal/now.getDate())}m`,"Daily Avg",t.info]].map(([v,l,c])=>(
              <div key={l} style={{flex:1,background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:t.muted,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:12}}>Daily Focus — {now.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:1.5,height:60,overflowX:"auto"}}>
              {monthData.map((d,i)=>{
                const h2=d.mins>0?Math.max(6,(d.mins/maxM)*56):2;
                const isT=d.day===now.getDate();
                return(<div key={i} style={{minWidth:8,flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{width:"100%",height:h2,background:isT?t.accent:d.mins>0?t.success+"99":t.border,borderRadius:"2px 2px 0 0"}}/>
                  {(d.day===1||d.day%5===0)&&<span style={{fontSize:7,color:t.muted}}>{d.day}</span>}
                </div>);
              })}
            </div>
          </div>
          {monthLabels.length>0&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:10}}>By Activity — This Month</div>
            {monthLabels.map(([label,mins])=>(
              <div key={label} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:t.text,fontWeight:600}}>{label}</span>
                  <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{mins}m · {Math.round(mins/60*10)/10}h</span>
                </div>
                <div style={{height:5,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:`${(mins/monthTotal)*100}%`,background:t.accent,borderRadius:4}}/></div>
              </div>
            ))}
          </div>}
        </div>);
      })()}

      {/* Yearly view — Plus */}
      {analyticsTab==="year"&&plan.plus&&(()=>{
        const yearData=getYearData();
        const yearTotal=yearData.reduce((s,d)=>s+d.mins,0);
        const allLabels=getLabelBreakdown(history);
        const maxY=Math.max(...yearData.map(d=>d.mins),1);
        const now=new Date();
        return(<div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {[[`${Math.round(yearTotal/60)}h`,"Total Hours",t.accent],[`${history.length}`,"All Sessions",t.success],[`${Math.round(yearTotal/365)}m`,"Daily Avg",t.info]].map(([v,l,c])=>(
              <div key={l} style={{flex:1,background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:t.muted,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:12}}>Monthly Focus — {now.getFullYear()}</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:3,height:80}}>
              {yearData.map((d,i)=>{
                const h2=d.mins>0?Math.max(6,(d.mins/maxY)*72):3;
                const isPast=i<now.getMonth();
                const isCurrent=i===now.getMonth();
                const col=isCurrent?t.accent:d.mins>=120?t.success:d.mins>0?t.success+"66":t.border;
                return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  {d.hrs>0&&<span style={{fontSize:7,color:isCurrent?t.accent:t.muted,fontWeight:isCurrent?700:400}}>{d.hrs}h</span>}
                  <div style={{width:"100%",height:h2,background:col,borderRadius:"3px 3px 0 0",opacity:!isPast&&!isCurrent?0.3:1,transition:"height 0.4s"}}/>
                  <span style={{fontSize:8,color:isCurrent?t.accent:t.muted,fontWeight:isCurrent?700:400}}>{d.month}</span>
                </div>);
              })}
            </div>
          </div>
          {allLabels.length>0&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:10}}>All-Time by Activity</div>
            {allLabels.map(([label,mins])=>(
              <div key={label} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:t.text,fontWeight:600}}>{label}</span>
                  <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{Math.round(mins/60*10)/10}h total</span>
                </div>
                <div style={{height:5,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:`${(mins/yearTotal)*100}%`,background:"#a78bfa",borderRadius:4}}/></div>
              </div>
            ))}
          </div>}
        </div>);
      })()}
    </div>);
  }

  return(
    <div style={{position:"fixed",inset:0,background:t.bg,zIndex:1000,display:"flex",flexDirection:"column",fontFamily:"'Sora',system-ui,sans-serif"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px 0",flexShrink:0}}>
        <div style={{fontSize:18,fontWeight:800,color:t.text}}>🍅 Pomodoro</div>
        <button onClick={close} style={{background:`${t.surface}`,border:`1px solid ${t.border}`,borderRadius:"50%",width:32,height:32,cursor:"pointer",color:t.muted,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>

      {/* Tab switcher */}
      <div style={{display:"flex",gap:0,margin:"14px 20px 0",background:t.surface,borderRadius:12,padding:3,flexShrink:0}}>
        {[["timer","⏱️ Timer"],["history","📋 History"],["analytics","📊 Analytics"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px",borderRadius:9,border:"none",cursor:"pointer",background:tab===k?t.accent:"none",color:tab===k?"#000":t.muted,fontWeight:tab===k?700:500,fontSize:12}}>{l}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px 32px"}}>
        {tab==="timer"&&<TimerTab/>}
        {tab==="history"&&<HistoryTab/>}
        {tab==="analytics"&&<AnalyticsTab/>}
      </div>
    </div>
  );
}

function ActivityTimer({t,close,plan,showUp}){
  const CATS=[
    {id:"student",icon:"🎓",label:"Student",activities:["Study Session","Revision","Assignment","Reading","Practice Problems"]},
    {id:"fitness",icon:"💪",label:"Fitness",activities:["Workout","Running","Yoga","Stretching","HIIT"]},
    {id:"wellness",icon:"🧘",label:"Wellness",activities:["Meditation","Breathing","Journaling","Walk","Rest"]},
    {id:"work",icon:"💼",label:"Work",activities:["Deep Work","Meeting","Planning","Email","Review"]},
  ];
  const CHIPS=[15,30,45,60];
  const[cat,setCat]=useState(null);
  const[activity,setActivity]=useState("");
  const[customActivity,setCustomActivity]=useState("");
  const[mode,setMode]=useState("countdown"); // "countdown" | "stopwatch"
  const[duration,setDuration]=useState(25);
  const[customDur,setCustomDur]=useState("");
  const[showCustomDur,setShowCustomDur]=useState(false);
  const[secs,setSecs]=useState(25*60);
  const[run,setRun]=useState(false);
  const[done,setDone]=useState(false);
  const[history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem("hg_activity_history")||"[]");}catch{return[];}});
  const iv=useRef();

  // Gate: Plus only
  if(!plan.plus) return(
    <Modal t={t} close={close} title="⏱️ Activity Timer">
      <div style={{textAlign:"center",padding:"20px 0"}}>
        <div style={{fontSize:48,marginBottom:12}}>⏱️</div>
        <div style={{fontSize:16,fontWeight:800,color:t.text,marginBottom:8}}>Activity Timer</div>
        <div style={{background:"#a78bfa18",border:"1px solid #a78bfa44",borderRadius:10,padding:"9px 12px",marginBottom:16,fontSize:12,color:"#a78bfa",fontWeight:600}}>💎 Plus Feature</div>
        <div style={{fontSize:12,color:t.muted,lineHeight:1.7,marginBottom:20}}>Track focused work sessions by category. Student, Fitness, Wellness, Work — with session history feeding into Analytics.</div>
        <button onClick={()=>{close();showUp("💎 Upgrade to Plus to unlock Activity Timer!");}} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:"#a78bfa",color:"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>💎 Upgrade to Plus</button>
      </div>
    </Modal>
  );

  useEffect(()=>{
    if(run){
      iv.current=setInterval(()=>{
        setSecs(s=>{
          if(mode==="countdown"){
            if(s<=1){
              clearInterval(iv.current);setRun(false);setDone(true);
              saveSession();
              if(Notification.permission==="granted")new Notification("⏱️ Done!",{body:`${activity||"Session"} complete!`});
              return 0;
            }return s-1;
          } else {
            return s+1;
          }
        });
      },1000);
    } else clearInterval(iv.current);
    return()=>clearInterval(iv.current);
  },[run,mode,activity]);

  function saveSession(){
    const mins=mode==="countdown"?duration:Math.round(secs/60);
    const entry={id:Date.now(),activity:activity||customActivity||"Session",cat:cat?.label||"General",icon:cat?.icon||"⏱️",mins,mode,time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),date:new Date().toISOString().split("T")[0]};
    const updated=[entry,...history.slice(0,19)];
    setHistory(updated);
    localStorage.setItem("hg_activity_history",JSON.stringify(updated));
    // Also save to pomo history for analytics
    const ph=JSON.parse(localStorage.getItem("hg_pomo_history")||"[]");
    ph.unshift({...entry,type:"activity",duration:mins});
    localStorage.setItem("hg_pomo_history",JSON.stringify(ph.slice(0,50)));
  }

  function startTimer(){
    if(!activity&&!customActivity){return;}
    setDone(false);
    if(mode==="countdown"){setSecs(duration*60);}
    else{setSecs(0);}
    setRun(true);
  }

  function reset(){setRun(false);setDone(false);setSecs(mode==="countdown"?duration*60:0);}

  const totalSecs=mode==="countdown"?duration*60:Math.max(duration*60,secs||1);
  const pct=mode==="countdown"?((totalSecs-secs)/totalSecs)*100:(secs/(totalSecs))*100;
  const r=75,ci=2*Math.PI*r;
  const mm=String(Math.floor(secs/60)).padStart(2,"0"),ss2=String(secs%60).padStart(2,"0");
  const actLabel=activity||customActivity||"Pick activity";
  const catObj=cat;

  // Setup screen
  if(!run&&!done&&secs===(mode==="countdown"?duration*60:0)&&!activity&&!customActivity){
    return(<Modal t={t} close={close} title="⏱️ Activity Timer">
      {/* Category picker */}
      <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Choose Category</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
        {CATS.map(c=>(
          <button key={c.id} onClick={()=>{setCat(c);setActivity("");}} style={{padding:"12px 8px",borderRadius:12,border:`2px solid ${cat?.id===c.id?t.accent:t.border}`,background:cat?.id===c.id?t.accent+"18":t.surface,cursor:"pointer",textAlign:"center",transition:"all 0.15s"}}>
            <div style={{fontSize:22,marginBottom:4}}>{c.icon}</div>
            <div style={{fontSize:12,fontWeight:700,color:cat?.id===c.id?t.accent:t.text}}>{c.label}</div>
          </button>
        ))}
      </div>

      {/* Activity picker */}
      {cat&&<>
        <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Activity</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
          {cat.activities.map(a=>(
            <button key={a} onClick={()=>{setActivity(a);setCustomActivity("");}} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${activity===a?t.accent:t.border}`,background:activity===a?t.accent+"18":t.surface,color:activity===a?t.accent:t.text,cursor:"pointer",fontSize:12,fontWeight:activity===a?700:400}}>{a}</button>
          ))}
        </div>
        <input value={customActivity} onChange={e=>{setCustomActivity(e.target.value);setActivity("");}} placeholder="Or type custom activity..." style={{width:"100%",padding:"8px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,marginBottom:14}}/>
      </>}

      {/* Mode + Duration */}
      {(activity||customActivity)&&<>
        <div style={{display:"flex",gap:6,marginBottom:12,background:t.surface,borderRadius:10,padding:4}}>
          {[["countdown","⏳ Countdown"],["stopwatch","⏱️ Stopwatch"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);reset();}} style={{flex:1,padding:"7px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,background:mode===m?t.accent:"none",color:mode===m?"#000":t.muted}}>{l}</button>
          ))}
        </div>
        {mode==="countdown"&&<>
          <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Duration</div>
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {CHIPS.map(d=>(
              <button key={d} onClick={()=>{setDuration(d);setSecs(d*60);setShowCustomDur(false);}} style={{padding:"7px 14px",borderRadius:20,border:`1px solid ${duration===d&&!showCustomDur?t.accent:t.border}`,background:duration===d&&!showCustomDur?t.accent+"18":t.surface,color:duration===d&&!showCustomDur?t.accent:t.text,cursor:"pointer",fontSize:12,fontWeight:duration===d&&!showCustomDur?700:400}}>{d}m</button>
            ))}
            <button onClick={()=>setShowCustomDur(v=>!v)} style={{padding:"7px 14px",borderRadius:20,border:`1px solid ${showCustomDur?t.accent:t.border}`,background:showCustomDur?t.accent+"18":t.surface,color:showCustomDur?t.accent:t.text,cursor:"pointer",fontSize:12}}>Custom</button>
          </div>
          {showCustomDur&&<input type="number" value={customDur} onChange={e=>{setCustomDur(e.target.value);const v=parseInt(e.target.value);if(v>0&&v<=240){setDuration(v);setSecs(v*60);}}} placeholder="Minutes (1-240)" style={{width:"100%",padding:"8px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,marginBottom:10}}/>}
        </>}
        <button onClick={startTimer} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:15,marginTop:4}}>▶ Start {cat?.icon} {activity||customActivity}</button>
      </>}

      {/* Today's history */}
      {history.length>0&&<div style={{marginTop:16}}>
        <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Today's Sessions</div>
        {history.filter(h=>h.date===new Date().toISOString().split("T")[0]).slice(0,5).map((h,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:t.surface,borderRadius:8,marginBottom:5}}>
            <span style={{fontSize:16}}>{h.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:t.text}}>{h.activity}</div>
              <div style={{fontSize:10,color:t.muted}}>{h.cat}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:12,fontWeight:700,color:t.success}}>{h.mins}m</div>
              <div style={{fontSize:9,color:t.muted}}>{h.time}</div>
            </div>
          </div>
        ))}
      </div>}
    </Modal>);
  }

  // Timer running / done screen
  return(<Modal t={t} close={close} title={`${catObj?.icon||"⏱️"} ${actLabel}`}>
    {done&&<div style={{background:t.success+"18",border:`1px solid ${t.success}44`,borderRadius:10,padding:"10px 12px",marginBottom:14,textAlign:"center",animation:"fadeIn 0.4s ease"}}>
      <div style={{fontSize:22,marginBottom:4}}>🎉</div>
      <div style={{fontSize:14,fontWeight:800,color:t.success}}>{actLabel} Complete!</div>
      <div style={{fontSize:11,color:t.muted,marginTop:2}}>{duration} minutes of focused work ✅</div>
    </div>}

    {/* Ring */}
    <div style={{position:"relative",width:180,height:180,margin:"0 auto 16px"}}>
      <svg width={180} height={180} style={{transform:"rotate(-90deg)"}}>
        <circle cx={90} cy={90} r={r} fill="none" stroke={t.border} strokeWidth={10}/>
        <circle cx={90} cy={90} r={r} fill="none" stroke={done?t.success:t.accent} strokeWidth={10} strokeDasharray={ci} strokeDashoffset={ci-(pct/100)*ci} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:34,fontWeight:800,color:done?t.success:t.text,letterSpacing:-2}}>{mm}:{ss2}</span>
        <span style={{fontSize:10,color:t.muted,marginTop:2}}>{mode==="countdown"?"remaining":"elapsed"}</span>
        {catObj&&<span style={{fontSize:18,marginTop:4}}>{catObj.icon}</span>}
      </div>
    </div>

    <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:14}}>
      {!done&&<button onClick={()=>setRun(r=>!r)} style={{padding:"12px 28px",borderRadius:12,border:"none",cursor:"pointer",background:t.accent,color:"#000",fontWeight:700,fontSize:15}}>{run?"Pause":"Resume"}</button>}
      {done&&mode==="stopwatch"&&<button onClick={saveSession} style={{padding:"12px 20px",borderRadius:12,border:"none",cursor:"pointer",background:t.success,color:"#000",fontWeight:700,fontSize:13}}>Save Session</button>}
      <button onClick={reset} style={{padding:"12px 16px",borderRadius:12,border:`1px solid ${t.border}`,cursor:"pointer",background:"none",color:t.text,fontWeight:600}}>Reset</button>
      <button onClick={()=>{reset();setActivity("");setCustomActivity("");setCat(null);}} style={{padding:"12px 14px",borderRadius:12,border:`1px solid ${t.border}`,cursor:"pointer",background:"none",color:t.muted,fontWeight:600,fontSize:12}}>New</button>
    </div>
    {run&&<div style={{textAlign:"center",fontSize:12,color:t.muted,fontStyle:"italic"}}>Stay focused! You've got this 💪</div>}
  </Modal>);
}
function CalModal({t,close,habits,goals}){
  const now=new Date();
  const[yr,setYr]=useState(now.getFullYear());
  const[mo,setMo]=useState(now.getMonth());
  const[selDay,setSelDay]=useState(null);
  const[dayNote,setDayNote]=useState("");
  const[saved,setSaved]=useState(false);
  const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const days=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay(),today=td();
  const ds=d=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

  function openDay(dateStr){
    setSelDay(dateStr);setSaved(false);
    try{const n=JSON.parse(localStorage.getItem("hg_day_notes")||"{}");setDayNote(n[dateStr]||"");}
    catch{setDayNote("");}
  }
  function saveNote(){
    try{const n=JSON.parse(localStorage.getItem("hg_day_notes")||"{}");n[selDay]=dayNote;localStorage.setItem("hg_day_notes",JSON.stringify(n));setSaved(true);setTimeout(()=>setSaved(false),1500);}
    catch{}
  }

  if(selDay){
    const isFuture=selDay>today;
    const isPast=selDay<=today;
    const doneHabits=habits.filter(h=>h.log&&h.log[selDay]);
    const missedHabits=habits.filter(h=>!h.log||!h.log[selDay]);
    const doneActions=goals.flatMap(g=>g.actions.filter(a=>a.doneAt===selDay).map(a=>({...a,goalTitle:g.title})));
    const deadlineGoals=goals.filter(g=>g.deadline===selDay);
    const displayDate=new Date(selDay+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

    return(<Modal t={t} close={close} title="📅 Calendar">
      <button onClick={()=>setSelDay(null)} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:13,marginBottom:14,padding:0}}>← Back to {MN[mo]}</button>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:16,fontWeight:800,color:t.text,marginBottom:3}}>{displayDate}</div>
        <div style={{fontSize:11,fontWeight:600,color:selDay===today?t.accent:isFuture?t.info:t.muted}}>{selDay===today?"Today — check in below":isFuture?"Future — Day Planner":"Past day"}</div>
      </div>

      {/* PAST / TODAY: Day Detail */}
      {isPast&&<div>
        {doneHabits.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.success,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>✅ Habits Done ({doneHabits.length})</div>
          {doneHabits.map(h=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:t.success+"18",borderRadius:8,marginBottom:5,fontSize:13}}>
              <span>{h.icon}</span><span style={{fontWeight:600}}>{h.name}</span>
            </div>
          ))}
        </div>}
        {missedHabits.length>0&&habits.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.danger,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>❌ Missed ({missedHabits.length})</div>
          {missedHabits.map(h=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:t.danger+"12",borderRadius:8,marginBottom:5,fontSize:13,opacity:0.7}}>
              <span>{h.icon}</span><span>{h.name}</span>
            </div>
          ))}
        </div>}
        {doneActions.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.info,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>🎯 Actions Completed ({doneActions.length})</div>
          {doneActions.map(a=>(
            <div key={a.id} style={{padding:"7px 10px",background:t.info+"18",borderRadius:8,marginBottom:5}}>
              <div style={{fontSize:12,fontWeight:600,color:t.text}}>{a.action}</div>
              <div style={{fontSize:10,color:t.muted}}>{a.goalTitle}</div>
            </div>
          ))}
        </div>}
        {deadlineGoals.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.accent,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>📌 Goal Deadlines</div>
          {deadlineGoals.map(g=><div key={g.id} style={{fontSize:12,color:t.text,padding:"5px 10px",background:t.accent+"18",borderRadius:8,marginBottom:5,fontWeight:600}}>{g.title}</div>)}
        </div>}
        {habits.length===0&&<div style={{textAlign:"center",color:t.muted,padding:20,fontSize:13}}>No habit data for this day yet.</div>}
        {/* Day note */}
        <div style={{marginTop:4}}>
          <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>📝 Day Note</div>
          <textarea value={dayNote} onChange={e=>setDayNote(e.target.value)} placeholder="Add a personal note for this day..." style={{width:"100%",height:72,padding:"9px 11px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,resize:"none",lineHeight:1.5}}/>
          <button onClick={saveNote} style={{marginTop:7,padding:"8px 18px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>{saved?"Saved ✓":"Save Note"}</button>
        </div>
      </div>}

      {/* FUTURE: Day Planner */}
      {isFuture&&<div>
        <div style={{background:t.info+"18",border:`1px solid ${t.info}44`,borderRadius:10,padding:"9px 12px",marginBottom:14,fontSize:12,color:t.info}}>📋 Plan your day ahead — notes save locally</div>
        <textarea value={dayNote} onChange={e=>setDayNote(e.target.value)} placeholder="Plan your day, set intentions, list tasks..." style={{width:"100%",height:110,padding:"10px 12px",borderRadius:12,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,resize:"none",lineHeight:1.6,marginBottom:10}}/>
        <button onClick={saveNote} style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>{saved?"Saved ✓ ":"Save Plan"}</button>
      </div>}
    </Modal>);
  }

  // Calendar grid view
  return(<Modal t={t} close={close} title="📅 Calendar">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <button onClick={()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}} style={{background:t.surface,border:"none",color:t.text,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:18}}>‹</button>
      <span style={{fontWeight:700,fontSize:15,color:t.text}}>{MN[mo]} {yr}</span>
      <button onClick={()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}} style={{background:t.surface,border:"none",color:t.text,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:18}}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:5}}>
      {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:t.muted}}>{d}</div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
      {Array.from({length:fd}).map((_,i)=><div key={`e${i}`}/>)}
      {Array.from({length:days}).map((_,i)=>{
        const d=i+1,ds2=ds(d);
        const hd=habits.filter(h=>h.log&&h.log[ds2]).length;
        const hg=goals.some(g=>g.deadline===ds2);
        const isT=ds2===today,isFut=ds2>today;
        const intensity=habits.length>0?hd/habits.length:0;
        // Fix: use rgba for proper intensity gradient (20%→100%)
        const intensityBg=intensity>=1?"rgba(74,222,128,0.95)":intensity>=0.75?"rgba(74,222,128,0.75)":intensity>=0.5?"rgba(74,222,128,0.5)":intensity>0?"rgba(74,222,128,0.25)":t.surface;
        const textCol=isT?t.accent:isFut?t.info:intensity>=0.75?"#000":t.text;
        return(<div key={d} onClick={()=>openDay(ds2)} style={{borderRadius:6,padding:"4px 1px",textAlign:"center",background:isT?t.accent+"30":isFut?t.surface:intensityBg,border:isT?`2px solid ${t.accent}`:isFut?`1px solid ${t.info}33`:intensity>=0.5?`1px solid rgba(74,222,128,0.4)`:`1px solid ${t.border}`,minHeight:34,cursor:"pointer",transition:"background 0.2s"}}>
          <div style={{fontSize:10,fontWeight:isT?800:400,color:textCol}}>{d}</div>
          {hd>0&&!isT&&<div style={{fontSize:8,color:intensity>=0.75?"#000":t.success,fontWeight:700}}>{hd}✓</div>}
          {isT&&hd>0&&<div style={{fontSize:8,color:t.accent,fontWeight:700}}>{hd}✓</div>}
          {hg&&<div style={{fontSize:9}}>📌</div>}
        </div>);
      })}
    </div>

function JournalModal({t,close,journals,onSave,plan}){
  const today=td();
  function parseEntry(raw){if(raw&&typeof raw==="object")return raw;return{note:raw||"",mood:null,tags:[],title:""};}
  const[sel,setSel]=useState(today);
  const init=parseEntry(journals[today]);
  const[note,setNote]=useState(init.note);
  const[mood,setMood]=useState(init.mood);
  const[tags,setTags]=useState(init.tags||[]);
  const[title,setTitle]=useState(init.title||"");
  const cutoff=plan.jDays===Infinity?null:new Date(Date.now()-plan.jDays*86400000).toISOString().split("T")[0];
  const entries=Object.entries(journals).sort((a,b)=>b[0].localeCompare(a[0])).filter(([d])=>!cutoff||d>=cutoff);
  const wordCount=note.trim().split(/\s+/).filter(Boolean).length;
  const prompt=JPROMPTS[new Date().getDate()%JPROMPTS.length];

  function loadDate(d){
    setSel(d);
    const e=parseEntry(journals[d]);
    setNote(e.note);setMood(e.mood);setTags(e.tags||[]);setTitle(e.title||"");
  }
  function toggleTag(tag){setTags(prev=>prev.includes(tag)?prev.filter(x=>x!==tag):[...prev,tag]);}

        ))}
      </div>
    </div>

    {/* Note textarea */}
    <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder={prompt} style={{width:"100%",height:100,background:t.surface,border:`1px solid ${t.border}`,borderRadius:12,padding:12,color:t.text,fontSize:13,resize:"vertical",lineHeight:1.6}}/>

function HabitDetailPage({t,habit,habits,setHabits,saveF,back,onShare}){
  const today=td();
  const log=habit.log||{};
  const doneToday=!!log[today];
  const total=Object.values(log).filter(Boolean).length;
  const createdDaysAgo=habit.createdAt?Math.max(1,Math.ceil((new Date()-new Date(habit.createdAt))/86400000)):Math.max(1,Object.keys(log).length);
  const rate=Math.round((total/createdDaysAgo)*100);
  const hColor=habit.color||t.accent;
  const hasGoal=habit.goalCount>0&&habit.goalUnit;
  // Tile count per date — stored in habit log as number or true
  const todayCount=typeof log[today]==="number"?log[today]:doneToday?habit.goalCount:0;
  const goalCount=habit.goalCount||1;
  const tilePct=hasGoal?Math.min(100,Math.round((todayCount/goalCount)*100)):doneToday?100:0;
  // This week
  const week7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week7.push(d.toISOString().split("T")[0]);}
  const WLBLS=["Mo","Tu","We","Th","Fr","Sa","Su"];
  // Month calendar
  const now=new Date();const yr=now.getFullYear();const mo=now.getMonth();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const firstDay=new Date(yr,mo,1).getDay();

  // Week/month rates
  const weekDone=week7.filter(d=>!!log[d]).length;
  const weekRate=Math.round((weekDone/7)*100);
  const monthRate=Math.round((monthDone/daysInMonth)*100);
  // Note
  const noteKey=`hg_habit_notes_${habit.id}_${today}`;
  const[note,setNote]=useState(()=>localStorage.getItem(noteKey)||"");
  function saveNote(v){setNote(v);localStorage.setItem(noteKey,v);}
  // History — last 6 months
  function getHistory(){
    const months={};Object.entries(log).forEach(([d,v])=>{if(!v)return;const[y,m]=d.split("-");const k=`${y}-${m}`;if(!months[k])months[k]=[];months[k].push(d);});

  }
  // Toggle tile

    const newHabits=habits.map(h=>h.id!==habit.id?h:{...h,log:newLog,streak:h.streak});
    setHabits(newHabits);saveF(newHabits);
  }
  function toggleDone(){
    const newLog={...log};
    if(doneToday)delete newLog[today];else newLog[today]=hasGoal?goalCount:true;
    let streak=0,best=habit.best||0;
    const d=new Date();
    while(true){const s=d.toISOString().split("T")[0];if(!newLog[s])break;streak++;d.setDate(d.getDate()-1);}
    if(streak>best)best=streak;
    const newHabits=habits.map(h=>h.id!==habit.id?h:{...h,log:newLog,streak,best});
    setHabits(newHabits);saveF(newHabits);
  }
  const isDone=hasGoal?(todayCount>=goalCount):doneToday;

          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={toggleDone} style={{padding:"11px 28px",borderRadius:12,border:"none",background:isDone?t.success:hColor,color:"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>{isDone?"Undo ✕":"Mark Done ✓"}</button>
            {habit.streak>=7&&<button onClick={()=>onShare&&onShare(habit)} style={{padding:"11px 14px",borderRadius:12,border:`1px solid ${hColor}44`,background:hColor+"18",color:hColor,fontWeight:700,cursor:"pointer",fontSize:13}}>📤 Share</button>}
          </div>
        </div>
        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:16}}>
          {[["🔥",habit.streak||0,"d","Streak",t.accent],["🏆",habit.best||0,"d","Best",t.info],["✅",total,"","Total",t.success],["📈",rate,"%","Rate",t.accent2]].map(([ic,v,u,l,c])=>(
            <div key={l} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"9px 5px",textAlign:"center"}}>
              <div style={{fontSize:14}}>{ic}</div>
              <div style={{fontSize:16,fontWeight:800,color:c}}>{v}{u}</div>
              <div style={{fontSize:9,color:t.muted,textTransform:"uppercase",letterSpacing:0.5}}>{l}</div>
            </div>
          ))}
        </div>
        {/* Tile grid */}
        {hasGoal&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>Today — {habit.goalUnit}</div>

            {Array.from({length:goalCount}).map((_,i)=>(

                {i<todayCount&&<span style={{color:"#000",fontSize:16,fontWeight:900}}>✓</span>}
              </div>

          </div>
          {isDone&&<div style={{fontSize:12,color:t.success,fontWeight:700,marginTop:10,textAlign:"center"}}>All done for Today! ✓</div>}
        </div>}
        {/* This week strip */}
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>This Week</div>
          <div style={{display:"flex",justifyContent:"space-around"}}>
            {week7.map((d,i)=>{const done2=!!log[d];const isT=d===today;return(<div key={d} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:done2?t.success:t.surface,border:`2px solid ${isT?hColor:done2?t.success:t.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}>

              </div>

          {[["This Week",weekRate,`${weekDone}/7 days`],["This Month",monthRate,`${monthDone}/${daysInMonth} days`]].map(([l,p,sub])=>(
            <div key={l} style={{marginBottom:10}}>

              <div style={{height:6,background:t.surface,borderRadius:10}}><div style={{height:"100%",width:`${p}%`,background:p>=70?t.success:p>=40?t.accent:t.danger,borderRadius:10,transition:"width 0.5s"}}/></div>
            </div>
          ))}
        </div>
        {/* Monthly mini-calendar */}
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontWeight:700,fontSize:13}}>📅 This Month</div>
            <div style={{fontSize:11,color:t.accent,fontWeight:700}}>{monthDone}/{daysInMonth} days · {monthRate}%</div>
          </div>
          {(()=>{
            const now=new Date();
            const yr2=now.getFullYear(),mo2=now.getMonth();
            const firstDay=new Date(yr2,mo2,1).getDay();
            const days2=new Date(yr2,mo2+1,0).getDate();
            const dayLabels=["S","M","T","W","T","F","S"];
            return(<div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
                {dayLabels.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,color:t.muted,fontWeight:600,padding:"2px 0"}}>{d}</div>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
                {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
                {Array.from({length:days2}).map((_,i)=>{
                  const d=i+1;
                  const dateStr=`${yr2}-${String(mo2+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                  const done2=!!(log[dateStr]);
                  const isToday2=dateStr===today;
                  const isFuture=dateStr>today;
                  return(<div key={d} style={{aspectRatio:"1",borderRadius:4,background:done2?t.success:isToday2?t.accent+"33":t.surface,border:`1px solid ${isToday2?t.accent:done2?t.success+"66":t.border}`,display:"flex",alignItems:"center",justifyContent:"center",opacity:isFuture?0.3:1}}>
                    <span style={{fontSize:9,color:done2?"#000":isToday2?t.accent:t.muted,fontWeight:isToday2?700:400}}>{d}</span>
                  </div>);
                })}
              </div>
            </div>);
          })()}
        </div>
        {/* Daily note */}
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>📝 Today's Note</div>
          <textarea value={note} onChange={e=>saveNote(e.target.value)} placeholder="How did it go today? Any thoughts..." style={{width:"100%",height:72,padding:"9px 11px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,resize:"none",lineHeight:1.5}}/>
        </div>
        {/* History */}
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>History</div>
          {getHistory().length===0&&<div style={{color:t.muted,fontSize:12,textAlign:"center",padding:"8px 0"}}>No history yet. Start logging!</div>}
          {getHistory().map(([monthKey,dates])=>{
            const[y,m]=monthKey.split("-");const mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(m)-1];
            const dInMonth=new Date(parseInt(y),parseInt(m),0).getDate();
            return(<div key={monthKey} style={{marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:t.accent,marginBottom:6}}>{mn} {y} — {dates.length}/{dInMonth} done</div>
              {dates.sort((a,b)=>b.localeCompare(a)).slice(0,5).map(d=>{
                const wd=new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
                return(<div key={d} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",background:t.surface,borderRadius:8,marginBottom:4}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:t.success,flexShrink:0}}/>
                  <span style={{fontSize:12,color:t.text,flex:1}}>{wd}</span>
                  <span style={{fontSize:11,color:t.success,fontWeight:700}}>✅</span>

          })}
        </div>
      </div>
    </div>
  );
}

// Web Audio sound player
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const g=ctx.createGain();g.connect(ctx.destination);
    if(type==="bell"){
      const o=ctx.createOscillator();o.connect(g);o.type="sine";
      o.frequency.setValueAtTime(880,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.5);
      g.gain.setValueAtTime(0.4,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);
      o.start();o.stop(ctx.currentTime+0.6);
    }else if(type==="beep"){
      const o=ctx.createOscillator();o.connect(g);o.type="square";o.frequency.value=880;
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
      o.start();o.stop(ctx.currentTime+0.2);
    }else if(type==="chime"){
      [523,659,784].forEach((f,i)=>{
        const o=ctx.createOscillator();const gn=ctx.createGain();o.connect(gn);gn.connect(ctx.destination);
        o.type="sine";o.frequency.value=f;
        gn.gain.setValueAtTime(0,ctx.currentTime+i*0.15);
        gn.gain.linearRampToValueAtTime(0.3,ctx.currentTime+i*0.15+0.05);
        gn.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.4);
        o.start(ctx.currentTime+i*0.15);o.stop(ctx.currentTime+i*0.15+0.4);
      });
    }else if(type==="alarm"){
      [440,550,440,550].forEach((f,i)=>{
        const o=ctx.createOscillator();const gn=ctx.createGain();o.connect(gn);gn.connect(ctx.destination);
        o.type="sawtooth";o.frequency.value=f;
        gn.gain.setValueAtTime(0.2,ctx.currentTime+i*0.12);
        gn.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.1);
        o.start(ctx.currentTime+i*0.12);o.stop(ctx.currentTime+i*0.12+0.1);
      });
    }
    setTimeout(()=>ctx.close(),2000);
  }catch(e){}
}

function fmt12(timeStr){
  if(!timeStr)return"";
  const[h,m]=timeStr.split(":").map(Number);
  const ampm=h>=12?"PM":"AM";
  const h12=h%12||12;
  return`${h12}:${String(m).padStart(2,"0")} ${ampm}`;
}
