                  </div>
              }
            </div>
          </div>

          {/* ROW 2: Pomodoro | Journal */}
          <div style={{display:"flex",gap:10}}>
            {/* ── UI-D6: Pomodoro card — N4: live timer display ── */}
            {(()=>{
              // N4-A/B/C: read live timer from localStorage
              const activeRaw=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_active")||"null");}catch{return null;}})();
              const isLive=activeRaw&&activeRaw.running&&activeRaw.secs>0;
              let liveDisplay="00:00";
              let liveSecs=0;
              if(isLive){
                const elapsed=Math.floor((Date.now()-(activeRaw.timestamp||Date.now()))/1000);
                liveSecs=Math.max(0,activeRaw.secs-elapsed);
                const mm=String(Math.floor(liveSecs/60)).padStart(2,"0");
                const ss=String(liveSecs%60).padStart(2,"0");
                liveDisplay=mm+":"+ss;
              }
              return(
              <div onClick={()=>openModal("pomodoro")} style={{flex:1,background:isLive?premiumCard(t,t.accent):premiumCard(t),border:"1px solid "+(isLive?t.accent+"55":t.border),borderRadius:14,padding:"12px",boxShadow:isLive?premiumShadow(t,t.accent):premiumShadow(t),minHeight:110,display:"flex",flexDirection:"column",justifyContent:"space-between",cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>{IC.pomodoro(isLive?t.accent:t.text,14)}<span style={{fontSize:9,color:isLive?t.accent:t.text,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>Pomodoro</span></div>
                {isLive
                  ?<div>
                      <div style={{fontSize:22,fontWeight:900,color:t.accent,lineHeight:1,fontVariantNumeric:"tabular-nums",letterSpacing:-0.5}}>{liveDisplay}</div>
                      <div style={{fontSize:9,color:t.accent,marginTop:3,fontWeight:600}}>Focus in progress ▶</div>
                    </div>
                  :todaySessions>0
                    ?<div>
                        <div style={{fontSize:18,fontWeight:800,color:t.accent,lineHeight:1}}>{todaySessions}</div>
                        <div style={{fontSize:10,color:t.muted,marginTop:2}}>{todaySessions===1?"session":"sessions"} · {todayMins}m</div>
                        <div style={{fontSize:24,fontWeight:500,color:t.muted,fontVariantNumeric:"tabular-nums",opacity:0.35,letterSpacing:-0.5,marginTop:2}}>00:00</div>
                      </div>
                    :<div>
                        <div style={{fontSize:24,fontWeight:500,color:t.accent,fontVariantNumeric:"tabular-nums",opacity:0.5,letterSpacing:-0.5,marginBottom:4}}>00:00</div>
                        <div style={{fontSize:10,color:t.accent,fontWeight:700}}>Start focus →</div>
                      </div>
                }
              </div>
              );
            })()}
            {/* ── UI-D7: Journal card ── */}
            <div onClick={()=>openModal("journal")} style={{flex:1,background:todayJournal?premiumCard(t,t.success):premiumCard(t),border:"1px solid "+(todayJournal?t.success+"44":t.border),borderRadius:14,padding:"12px",boxShadow:todayJournal?premiumShadow(t,t.success):premiumShadow(t),minHeight:110,display:"flex",flexDirection:"column",justifyContent:"space-between",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>{IC.journal(t.text,14)}<span style={{fontSize:9,color:t.text,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>Journal</span></div>
              {todayJournal
                ?<div>
                    <div style={{fontSize:24,lineHeight:1,marginBottom:2}}>{MOODS[todayJournal.mood??2]}</div>
                    <div style={{fontSize:10,color:t.success,fontWeight:700}}>Logged today ✓</div>
                  </div>
                :<div>
                    <div style={{fontSize:11,color:t.muted,lineHeight:1.4,marginBottom:2}}>Not logged yet</div>
                    <div style={{fontSize:10,color:t.accent,fontWeight:700}}>Log today →</div>
                  </div>
              }
            </div>
          </div>
        </div>
        );
      })()}

      {/* ── UI-D3: Progress & Insights capsule — full width, after card grid ── */}
      <div onClick={()=>navigateTo("analytics")} style={{background:premiumCard(t,t.accent),border:"1px solid "+t.accent+"33",borderRadius:16,padding:"16px 20px",marginBottom:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:premiumShadow(t,t.accent)}}>
        <div>
          <div style={{fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:6}}>{IC.analytics(t.accent,16)}<span style={{...gradText(t)}}>Progress & Insights</span></div>
          <div style={{fontSize:11,color:t.muted,marginTop:2}}>Streaks, heatmaps, badges & full analytics</div>
        </div>
        <span style={{color:t.accent,fontSize:20}}>→</span>
      </div>
    </div>
  );}

  // ── UI-PA1–PA6: Profile & Achievements Page ──────────────────────────────────
  function ProfilePage(){
    // PA2: birthday local edit state
    const[editBday,setEditBday]=React.useState(false);
    const[bdayVal,setBdayVal]=React.useState(birthday||"");
    // PA3: badge tap bottom sheet
    const[badgeSheet,setBadgeSheet]=React.useState(null);// {badge,earnedDate}
    // PA5: show QR toggle
    const[showQR,setShowQR]=React.useState(false);

    // ── PA4: Stats grid values ──────────────────────────────────────────────
    const bestStreak=habits.length>0?Math.max(...habits.map(h=>h.best||h.streak||0)):0;
    const flNow=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_focuslog")||"{}");}catch{return{};}})();
    const scoreData=getScoreWithDelta(habits,goals,journals,flNow,{active:false,wins:0,activeDays:0});
    const currentScore=scoreData.score;
    // Lifetime habits done: count all log entries that are fully done across all habits
    const lifetimeHabitsDone=habits.reduce((s,h)=>s+Object.keys(h.log||{}).filter(d=>isFullDoneOn(h,d,h.log[d])).length,0);
    // Goals completed: active fully-done + goalStats snapshots
    const goalsCompleted=(goals.filter(g=>g.actions.length>0&&g.actions.every(a=>a.done)).length)+(goalStats||[]).length;

    // ── PA3: Badge showcase — all 14 badges, earned vs locked ──────────────
    const earnedSet=new Set();
    habits.forEach(h=>{BADGES.forEach(b=>{if((h.best||h.streak||0)>=b.d)earnedSet.add(b.d);});});
    // Earned date approximation: find a habit with that streak, use today as fallback
    function earnedDateFor(badge){
      const h=habits.find(hb=>(hb.best||hb.streak||0)>=badge.d);
      if(!h)return today;
      // Find the earliest date in log where streak was first hit (approx: createdAt + badge.d days)
      const start=h.createdAt||Object.keys(h.log||{}).sort()[0]||today;
      const d=new Date(start+"T12:00:00");d.setDate(d.getDate()+badge.d-1);
      return d.toLocaleDateString("en-CA");
    }

    // ── PA5: Momentum ID — generate once and persist ────────────────────────
    function generateMomentumId(){
      const name=(displayName||user?.displayName||"User").replace(/[^a-zA-Z0-9]/g,"").slice(0,12)||"User";
      const code=Math.random().toString(36).substring(2,6).toUpperCase();
      const id="MO-"+name+"-"+code;
      setMomentumId(id);
      if(user?.uid)window._fb.setDoc(window._fb.doc(window._fb.db,"users",user.uid),{momentumId:id},{merge:true});
      return id;
    }
    const moId=momentumId||(user?"":"-");
    const appDeepLink="https://app.momentum-trackerapp.com/?ref="+encodeURIComponent(moId);
    const qrUrl=moId?"https://api.qrserver.com/v1/create-qr-code/?size=160x160&data="+encodeURIComponent(appDeepLink):"";

    // ── PA6: Journey days ────────────────────────────────────────────────────
    const journeyDays=signupDate?Math.max(1,Math.ceil((new Date()-new Date(signupDate+"T00:00:00"))/86400000)):null;
    const joinedLabel=signupDate?new Date(signupDate+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}):"";

    function saveBirthday(val){
      setBirthday(val);setEditBday(false);
      if(user?.uid)window._fb.setDoc(window._fb.doc(window._fb.db,"users",user.uid),{birthday:val},{merge:true});
    }

    return(
    <div style={{position:"fixed",inset:0,background:t.bg,zIndex:800,display:"flex",flexDirection:"column",animation:"slideInRight 0.25s ease"}}>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px 12px",background:t.card,borderBottom:"1px solid "+t.border,flexShrink:0}}>
        <button onClick={()=>navigateTo("dashboard")} style={{background:"none",border:"none",color:t.muted,fontSize:22,cursor:"pointer",padding:"2px 6px",lineHeight:1}}>‹</button>
        <div style={{fontSize:16,fontWeight:800,color:t.text}}>My Profile</div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px 20px 100px"}}>

        {/* ── PA1: Profile card — photo + name + email + birthday ── */}
        <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:16,padding:"18px 16px",marginBottom:14,boxShadow:premiumShadow(t),textAlign:"center"}}>
          {/* Photo */}
          <div style={{width:72,height:72,borderRadius:"50%",overflow:"hidden",margin:"0 auto 10px",border:"3px solid "+t.accent+"55"}}>
            {user?.photoURL
              ?<img src={user.photoURL} style={{width:"100%",height:"100%",display:"block"}} alt=""/>
              :<div style={{width:"100%",height:"100%",background:t.accent+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:900,color:t.accent}}>
                {(displayName||user?.displayName||"?").charAt(0).toUpperCase()}
              </div>
            }
          </div>
          {/* Name */}
          <div style={{fontSize:18,fontWeight:800,color:t.text,marginBottom:2}}>{displayName||user?.displayName}</div>
          {/* Email */}
          <div style={{fontSize:11,color:t.muted,marginBottom:12}}>{user?.email}</div>
          {/* Birthday — PA2 */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <span style={{fontSize:11,color:t.muted}}>🎂 Birthday:</span>
            {editBday
              ?<div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input type="date" value={bdayVal} onChange={e=>setBdayVal(e.target.value)}
                    style={{padding:"5px 8px",borderRadius:8,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:11,colorScheme:t.mode||"dark"}}/>
                  <button onClick={()=>saveBirthday(bdayVal)}
                    style={{padding:"5px 10px",borderRadius:8,border:"none",background:t.accent,color:"#000",fontWeight:700,fontSize:11,cursor:"pointer"}}>Save</button>
                  <button onClick={()=>setEditBday(false)}
                    style={{padding:"5px 8px",borderRadius:8,border:"none",background:"none",color:t.muted,fontSize:12,cursor:"pointer"}}>✕</button>
                </div>
              :<div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,color:birthday?t.text:t.muted}}>
                    {birthday?new Date(birthday+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"Not set"}
                  </span>
                  <button onClick={()=>{setBdayVal(birthday||"");setEditBday(true);}}
                    style={{padding:"3px 8px",borderRadius:7,border:"1px solid "+t.border,background:"none",color:t.muted,fontSize:10,cursor:"pointer"}}>Edit</button>
                </div>
            }
          </div>
        </div>

        {/* ── PA3: Badge carousel — horizontal scroll, R12 ── */}
        <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:16,padding:"14px 0 14px 16px",marginBottom:14,boxShadow:premiumShadow(t)}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,paddingRight:16}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text}}>Achievements</div>
            <div style={{fontSize:10,color:t.accent,fontWeight:700}}>{earnedSet.size}/{BADGES.length} earned</div>
          </div>
          {/* Scrollable carousel — earned first, then locked */}
          <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:6,paddingRight:16,scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
            {[...BADGES.filter(b=>earnedSet.has(b.d)),...BADGES.filter(b=>!earnedSet.has(b.d))].map(b=>{
              const earned=earnedSet.has(b.d);
              return(
              <button key={b.d} onClick={()=>earned&&setBadgeSheet({badge:b,earnedDate:earnedDateFor(b)})}
                style={{flexShrink:0,width:68,padding:"10px 6px 8px",borderRadius:14,
                  border:"1px solid "+(earned?b.c+"66":t.border),
                  background:earned?"linear-gradient(135deg,"+b.c+"22,"+b.c+"0a)":t.surface,
                  cursor:earned?"pointer":"default",textAlign:"center",position:"relative",
                  opacity:earned?1:0.4,
                  boxShadow:earned?"0 0 12px "+b.c+"44":"none",
                  transition:"transform 0.15s ease",
                  transform:earned?"scale(1)":"scale(0.92)"}}>
                <div style={{fontSize:26,marginBottom:3,lineHeight:1}}>{b.i}</div>
                <div style={{fontSize:8,fontWeight:700,color:earned?b.c:t.muted,lineHeight:1.2,marginBottom:2}}>{b.l}</div>
                <div style={{fontSize:7,color:t.muted}}>{b.d}-day</div>
                {earned&&<div style={{position:"absolute",top:4,right:4,width:8,height:8,borderRadius:"50%",background:b.c,boxShadow:"0 0 6px "+b.c}}/>}
              </button>
              );
            })}
          </div>
          <div style={{fontSize:10,color:t.muted,marginTop:6,paddingRight:16}}>Tap any earned badge for details</div>
        </div>

        {/* ── PA4: Stats grid 2×3 — N2-A/B: context labels + current streak + today's focus ── */}
        {(()=>{
          // N2-B: current streak = streak of best performing habit right now
          const currentStreak=habits.length>0?Math.max(...habits.map(h=>h.streak||0)):0;
          // N2-D: today's focus from focusLog
          const todayFocusMin=flNow[new Date().toLocaleDateString("en-CA")]?.totalMin||0;
          const statCells=[
            {ic:(c)=>IC.flame(c,16),label:"Best Streak",val:bestStreak>0?bestStreak+"d":"—",ctx:"all time",col:t.accent},
            {ic:(c)=>IC.score(c,16),label:"Momentum Score",val:currentScore,ctx:"/ 1000 today",col:"#a78bfa"},
            {ic:(c)=>IC.flame(c,16),label:"Current Streak",val:currentStreak>0?currentStreak+"d":"—",ctx:"right now",col:t.success},
            {ic:(c)=>IC.target(c,16),label:"Goals Done",val:goalsCompleted,ctx:"total completed",col:t.info},
            {ic:(c)=>IC.habits(c,16),label:"Habits Active",val:habits.length,ctx:"currently tracking",col:t.success},
            {ic:(c)=>IC.pomodoro(c,16),label:"Today's Focus",val:todayFocusMin>0?todayFocusMin+"m":"—",ctx:"focus today",col:t.accent},
          ];
          return(
          <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:16,padding:"14px 16px",marginBottom:14,boxShadow:premiumShadow(t)}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:12}}>Momentum Stats</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {statCells.map(({ic,label,val,ctx,col})=>(
                <div key={label} style={{background:t.surface,borderRadius:12,padding:"10px 8px",textAlign:"center",border:"1px solid "+t.border}}>
                  <div style={{display:"flex",justifyContent:"center",marginBottom:3}}>{ic(col)}</div>
                  <div style={{fontSize:19,fontWeight:900,color:col,lineHeight:1}}>{val}</div>
                  <div style={{fontSize:8,color:t.muted,marginTop:1,textTransform:"uppercase",letterSpacing:0.3}}>{label}</div>
                  <div style={{fontSize:8,color:t.muted,opacity:0.7,marginTop:1}}>{ctx}</div>
                </div>
              ))}
            </div>
          </div>
          );
        })()}

        {/* ── PA4b: 30-day dot grid — N2-C: GitHub-style habit completion ── */}
        {habits.length>0&&(()=>{
          const today2=new Date().toLocaleDateString("en-CA");
          const days30=Array.from({length:30},(_,i)=>{
            const d=new Date();d.setDate(d.getDate()-(29-i));
            return d.toLocaleDateString("en-CA");
          });
          const dotsPerRow=10;
          const rows=[];
          for(let r=0;r<3;r++) rows.push(days30.slice(r*dotsPerRow,(r+1)*dotsPerRow));
          return(
          <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:16,padding:"14px 16px",marginBottom:14,boxShadow:premiumShadow(t)}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:700,color:t.text}}>Last 30 Days</div>
              <div style={{fontSize:10,color:t.muted}}>Daily habit completion</div>
            </div>
            {rows.map((row,ri)=>(
              <div key={ri} style={{display:"flex",gap:5,marginBottom:5}}>
                {row.map(d=>{
                  const doneCnt=habits.filter(h=>{const v=h.log&&h.log[d];return isFullDoneOn(h,d,v);}).length;
                  const total=habits.length;
                  const pct=total>0?doneCnt/total:0;
                  const isToday=d===today2;
                  const isFuture=d>today2;
                  const bg=isFuture?t.border:pct>=0.8?t.success:pct>=0.5?t.accent:pct>0?t.accent+"66":t.surface;
                  const border=isToday?"2px solid "+t.accent:"1px solid "+t.border+"88";
                  return(
                    <div key={d} title={d+(doneCnt>0?" · "+doneCnt+"/"+total+" habits":"")} style={{
                      flex:1,aspectRatio:"1",borderRadius:4,background:bg,border:border,
                      opacity:isFuture?0.2:1,
                      boxShadow:pct>=0.8?"0 0 4px "+t.success+"66":isToday?"0 0 4px "+t.accent+"88":"none",
                      transition:"background 0.2s"
                    }}/>
                  );
                })}
              </div>
            ))}
            {/* Legend */}
            <div style={{display:"flex",alignItems:"center",gap:12,marginTop:8,justifyContent:"flex-end"}}>
              {[["None",t.surface],["50%+",t.accent+"66"],["80%+",t.accent],["100%",t.success]].map(([lbl,col])=>(
                <div key={lbl} style={{display:"flex",alignItems:"center",gap:3}}>
                  <div style={{width:10,height:10,borderRadius:2,background:col,border:"1px solid "+t.border+"55"}}/>
                  <span style={{fontSize:8,color:t.muted}}>{lbl}</span>
                </div>
              ))}
            </div>
          </div>
          );
        })()}

        {/* ── PA5: Momentum ID ── */}
        <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:16,padding:"14px 16px",marginBottom:14,boxShadow:premiumShadow(t)}}>
          <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:10}}>Momentum ID</div>
          {moId
            ?<>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{flex:1,background:t.surface,border:"1px solid "+t.border,borderRadius:10,padding:"9px 12px",fontFamily:"monospace",fontSize:13,fontWeight:700,color:t.accent,letterSpacing:0.5}}>
                  {moId}
                </div>
                <button onClick={()=>{setShowQR(v=>!v);}}
                  style={{padding:"9px 10px",borderRadius:10,border:"1px solid "+t.border,background:showQR?t.accent+"22":"none",color:showQR?t.accent:t.muted,cursor:"pointer",fontSize:14}}>🔲</button>
                <button onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(moId);showToast("Momentum ID copied!");}}
                  style={{padding:"9px 10px",borderRadius:10,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:12,fontWeight:700}}>📋</button>
              </div>
              {showQR&&<div style={{textAlign:"center",padding:"12px 0"}}>
                <img src={qrUrl} alt="Momentum ID QR Code" style={{width:160,height:160,borderRadius:12,border:"4px solid "+t.border}} onError={e=>{e.target.alt="QR unavailable offline";}}/>
                <div style={{fontSize:10,color:t.muted,marginTop:6}}>Share to add as a friend</div>
              </div>}
            </>
            :<div style={{textAlign:"center",padding:"8px 0"}}>
              <div style={{fontSize:11,color:t.muted,marginBottom:10}}>Generate your unique Momentum ID to connect with friends.</div>
              <button onClick={generateMomentumId}
                style={{padding:"10px 20px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                Generate My ID →
              </button>
            </div>
          }
        </div>

        {/* ── PA6: Journey started ── */}
        {journeyDays&&(
        <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:16,padding:"14px 16px",marginBottom:14,boxShadow:premiumShadow(t)}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:t.text}}>Day {journeyDays} of your Momentum journey</div>
              <div style={{fontSize:11,color:t.muted,marginTop:3}}>Joined {joinedLabel}</div>
            </div>
            <div style={{fontSize:28}}>🚀</div>
          </div>
        </div>
        )}

      </div>

      {/* ── PA3: Badge bottom sheet ── */}
      {badgeSheet&&<div style={{position:"fixed",inset:0,background:"#000a",zIndex:1200,display:"flex",alignItems:"flex-end"}} onClick={()=>setBadgeSheet(null)}>
        <div style={{width:"100%",background:t.card,borderRadius:"20px 20px 0 0",padding:"20px",boxShadow:"0 -8px 32px #0006"}} onClick={e=>e.stopPropagation()}>
          <div style={{width:40,height:4,borderRadius:2,background:t.border,margin:"0 auto 16px"}}/>
          <div style={{textAlign:"center",marginBottom:14}}>
            <div style={{fontSize:40,marginBottom:6}}>{badgeSheet.badge.i}</div>
            <div style={{fontSize:17,fontWeight:800,color:badgeSheet.badge.c}}>{badgeSheet.badge.l}</div>
            <div style={{fontSize:11,color:t.muted,marginTop:4}}>
              {badgeSheet.badge.d}-day streak · Earned {new Date(badgeSheet.earnedDate+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}
            </div>
          </div>
          <div style={{background:t.surface,borderRadius:12,padding:"10px 14px",marginBottom:14,fontSize:11,color:t.muted,lineHeight:1.6,textAlign:"center"}}>
            {"You completed a "+badgeSheet.badge.d+"-day streak — "+badgeSheet.badge.l+"! Every day you showed up and built something lasting."}
          </div>
          <button onClick={()=>setBadgeSheet(null)}
            style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:t.surface,color:t.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>
            Close
          </button>
        </div>
      </div>}

    </div>
    );

  // Habits page — Updates 11-14: stats bar, day nav, week dots, category filter
  function HabitsPage(){
    const isToday=viewD===today;
    const[dragId,setDragId]=useState(null); // Item 6: id of habit currently being drag-reordered

    // Day navigation helpers
    function prevDay(){const d=new Date(viewD+"T12:00:00");d.setDate(d.getDate()-1);setViewD(d.toISOString().split("T")[0]);}
    function nextDay(){if(isToday)return;const d=new Date(viewD+"T12:00:00");d.setDate(d.getDate()+1);setViewD(d.toISOString().split("T")[0]);}

    // Update 11: stats bar values
    const doneForDay=habits.filter(h=>{const v=h.log&&h.log[viewD];return isFullDoneOn(h,viewD,v);}).length;
    const bestStreak=habits.length>0?Math.max(...habits.map(h=>h.streak||0)):0;
    // TODAY% — count-based for current day, or past day's completion %
    const viewDUnitsTotal=habits.reduce((s,h)=>{const gc=goalCountAt(h,viewD);if(gc>0)return s+gc;return s+1;},0);
    const viewDUnitsDone=habits.reduce((s,h)=>{const v=h.log&&h.log[viewD];if(!v)return s;const gc=goalCountAt(h,viewD);if(gc>0)return s+(typeof v==="number"?Math.min(v,gc):0);return s+1;},0);
    const todayPctBar=viewDUnitsTotal>0?Math.round(viewDUnitsDone/viewDUnitsTotal*100):0;
    // Streak on that day — for past days, recalculate from that date
    const streakOnDay=isToday?bestStreak:(()=>{
      const best=habits.length>0?Math.max(...habits.map(h=>{
        let s=0;const d=new Date(viewD+"T12:00:00");
        while(true){const ds=d.toLocaleDateString("en-CA");const v=h.log&&h.log[ds];const full=isFullDoneOn(h,ds,v);if(!full)break;s++;d.setDate(d.getDate()-1);}
        return s;
      }),0):0;
      return best;
    })();

    // Update 13: last 7 days for week dots
    function getLast7(){const arr=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);arr.push(d.toLocaleDateString("en-CA"));}return arr;}
    const week7=getLast7();

    // Update 14: unique cats for filter tabs
    const allCats=["All",...[...new Set(habits.map(h=>h.cat))].filter(Boolean)];
    const filtered=catFilter==="All"?habits:habits.filter(h=>h.cat===catFilter);

    // Item 6: drag-to-reorder — long-press grip handle, drag swaps positions in full habits array (works within filtered views too)
    useEffect(()=>{
      if(!dragId)return;
      function getXY(e){
        if(e.touches&&e.touches[0])return{x:e.touches[0].clientX,y:e.touches[0].clientY};
        return{x:e.clientX,y:e.clientY};
      }
      function onMove(e){
        e.preventDefault();
        const{x,y}=getXY(e);
        const el=document.elementFromPoint(x,y);
        const card=el&&el.closest("[data-habit-id]");
        if(!card)return;
        const overId=Number(card.dataset.habitId);
        if(overId&&overId!==dragId){
          setHabits(prev=>{
            const arr=[...prev];
            const ia=arr.findIndex(h=>h.id===dragId);
            const ib=arr.findIndex(h=>h.id===overId);
            if(ia===-1||ib===-1||ia===ib)return prev;
            [arr[ia],arr[ib]]=[arr[ib],arr[ia]];
            return arr;
          });
        }
      }
      function onUp(){
        setDragId(null);
        setHabits(current=>{save(current,goals,journals,tk);return current;});
      }
      window.addEventListener("pointermove",onMove,{passive:false});
      window.addEventListener("pointerup",onUp);
      window.addEventListener("touchmove",onMove,{passive:false});
      window.addEventListener("touchend",onUp);
      return()=>{
        window.removeEventListener("pointermove",onMove);
        window.removeEventListener("pointerup",onUp);
        window.removeEventListener("touchmove",onMove);
        window.removeEventListener("touchend",onUp);
      };
    },[dragId]);

    return(
    <div>

            <button onClick={()=>setNewGActions(a=>[...a,{action:"",result:"",dueDate:"",dueTime:""}])} style={{padding:"4px 10px",borderRadius:8,border:"1px solid "+t.accent+"44",background:t.accent+"12",color:t.accent,cursor:"pointer",fontSize:11,fontWeight:700}}>+ Add Step</button>
          </div>
          {newGActions.length===0&&<div style={{fontSize:12,color:t.muted,padding:"10px 12px",background:t.surface,borderRadius:9,textAlign:"center"}}>No steps yet — tap "+ Add Step" to break this goal down</div>}
          {newGActions.map((a,i)=>(
            <div key={i} style={{background:t.surface,borderRadius:10,padding:10,marginBottom:8,border:"1px solid "+t.border}}>
              <div style={{display:"flex",gap:7,marginBottom:7,alignItems:"center"}}>
                <span style={{fontSize:11,color:t.muted,fontWeight:700,flexShrink:0}}>#{i+1}</span>
                <input
                  defaultValue={a.action}
                  onBlur={e=>{const u=[...newGActions];u[i]={...u[i],action:e.target.value};setNewGActions(u);}}
                  placeholder="Action step..."
                  style={{flex:1,padding:"7px 10px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:13}}
                />
                <button onClick={()=>setNewGActions(aa=>aa.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:t.danger,cursor:"pointer",fontSize:16,flexShrink:0,padding:"0 2px"}}>×</button>
              </div>
              <input
                defaultValue={a.result}
                onBlur={e=>{const u=[...newGActions];u[i]={...u[i],result:e.target.value};setNewGActions(u);}}
                placeholder="Expected result (optional)"
                style={{width:"100%",padding:"6px 10px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:12,marginBottom:7}}
              />
              <div style={{display:"flex",gap:6}}>
                <input type="date" defaultValue={a.dueDate} onBlur={e=>{const u=[...newGActions];u[i]={...u[i],dueDate:e.target.value};setNewGActions(u);}} style={{flex:1,padding:"6px 8px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:11,colorScheme:t.mode||"dark"}}/>
                <input type="time" defaultValue={a.dueTime} onBlur={e=>{const u=[...newGActions];u[i]={...u[i],dueTime:e.target.value};setNewGActions(u);}} style={{flex:1,padding:"6px 8px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:11,colorScheme:t.mode||"dark"}}/>
              </div>
            </div>
          ))}
        </div>

        {/* Actions */}
        <div style={{display:"flex",gap:8}}>
          <button onClick={addG} style={{flex:1,padding:"11px",borderRadius:11,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>🎯 Create Goal{newGActions.length>0?" + "+newGActions.length+" Steps":""}</button>
          <button onClick={()=>{setShowGF(false);setNewGActions([]);setNewGPriorityState("Medium");}} style={{padding:"11px 14px",borderRadius:11,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:13}}>Cancel</button>
        </div>
      </div>}
      {goals.length===0&&<div style={{textAlign:"center",color:t.muted,padding:36}}>No goals yet. Create your first! 🚀</div>}

      {sortGoals(goals).map(g=>{
        const done=g.actions.filter(a=>a.done).length,pct=g.actions.length>0?Math.round((done/g.actions.length)*100):0;
        const dl=g.deadline?Math.ceil((new Date(g.deadline)-new Date())/86400000):null;
        const exp=expG===g.id,pCol=g.priority==="High"?t.danger:g.priority==="Medium"?t.accent:t.success;
        const isEditing=editG===g.id;
        return(<div key={g.id} style={{background:pct===100?premiumCard(t,t.success):premiumCard(t,pCol),border:"1px solid "+t.border,borderRadius:"8px 14px 14px 8px",overflow:"hidden",marginBottom:10,borderLeft:"4px solid "+(pct===100?t.success:pCol),boxShadow:pct===100?premiumShadow(t,t.success):premiumShadow(t,pCol)}}>
          <div style={{padding:"13px 13px"}}>
            {/* G1: Controlled edit mode — all saved together on Done ✓ */}
            {isEditing?(
              <div>
                <div style={{fontSize:11,fontWeight:700,color:t.accent,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Editing Goal</div>
                <input defaultValue={_editGTitle.current} onChange={e=>setEditGTitle(e.target.value)} placeholder="Goal title..." maxLength={150} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:"1px solid "+t.accent,background:t.surface,color:t.text,fontSize:14,fontWeight:700,marginBottom:9}}/>
                <div style={{display:"flex",gap:7,marginBottom:9}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:t.muted,marginBottom:4,fontWeight:600}}>Priority</div>
                    <select defaultValue={_editGPriority.current} onChange={e=>setEditGPriority(e.target.value)} style={{width:"100%",padding:"8px 9px",borderRadius:9,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12}}>
                      {["High","Medium","Low"].map(p=><option key={p}>{p}</option>)}
                    </select>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:t.muted,marginBottom:4,fontWeight:600}}>Deadline <span style={{fontWeight:400}}>(optional)</span></div>
                    <input type="date" defaultValue={_editGDeadline.current} onChange={e=>setEditGDeadline(e.target.value)} style={{width:"100%",padding:"8px 9px",borderRadius:9,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12}}/>
                  </div>
                </div>
                <textarea defaultValue={_editGNotes.current} onChange={e=>setEditGNotes(e.target.value)} placeholder="Notes (optional)..." maxLength={500} style={{width:"100%",height:52,padding:"8px 9px",borderRadius:9,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12,resize:"none",marginBottom:9}}/>
                <div style={{display:"flex",gap:7}}>
                  <button onClick={saveEditG} style={{padding:"9px 20px",borderRadius:9,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>Save Changes ✓</button>
                  <button onClick={()=>setEditG(null)} style={{padding:"9px 12px",borderRadius:9,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:12}}>Cancel</button>
                </div>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"flex-start",gap:7}}>
                <div style={{flex:1,cursor:"pointer"}} onClick={()=>setExpG(exp?null:g.id)}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:14}}>{g.title}</span>
                    <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20,background:pCol+"22",color:pCol}}>{g.priority}</span>
                    {pct===100&&<span>✅</span>}
                  </div>
                  {g.deadline&&<div style={{fontSize:11,color:dl!==null&&dl<3?t.danger:t.muted,marginBottom:7}}>📅 {dl===null?"":dl<0?"Overdue!":dl===0?"Due today!":dl+"d left"} · {fmt(g.deadline)}</div>}
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:t.muted,marginBottom:3}}><span>{done}/{g.actions.length} actions</span><span style={{fontWeight:700,color:t.accent}}>{pct}%</span></div>
                  <div style={{height:6,background:t.surface,borderRadius:10}}><div style={{height:"100%",width:pct+"%",background:pct===100?t.success:"linear-gradient(90deg,"+t.accent+","+t.accent2+")",borderRadius:10,transition:"width 0.5s",boxShadow:pct===100?"0 0 8px "+t.success+"99":"0 0 8px "+t.accent+"66"}}/></div>
                </div>
                <div style={{display:"flex",gap:3,flexShrink:0}}>
                  <button onClick={()=>openEditG(g)} style={{background:t.surface,border:"none",color:navMuted,cursor:"pointer",borderRadius:8,padding:"4px 8px",display:"flex",alignItems:"center"}}>{IC.edit(navMuted,15)}</button>
                  <button onClick={()=>setExpG(exp?null:g.id)} style={{background:t.surface,border:"none",color:t.muted,cursor:"pointer",borderRadius:8,padding:"4px 8px",fontSize:11}}>{exp?"▲":"▼"}</button>
                  <button onClick={()=>delG(g.id)} style={{background:"none",border:"none",color:t.danger,cursor:"pointer",padding:"0 2px",display:"flex",alignItems:"center"}}>{IC.trash(t.danger,15)}</button>
                </div>
              </div>
            )}
          </div>
          {exp&&!isEditing&&<div style={{borderTop:"1px solid "+t.border,padding:"12px 13px",background:t.surface}}>
            {g.notes&&<div style={{fontSize:12,color:t.muted,fontStyle:"italic",marginBottom:10,padding:"7px 10px",background:t.card,borderRadius:8}}>📝 {g.notes}</div>}
            {sortActions(g.actions).map(a=>(
              editA===a.id?(
              <div key={a.id} style={{padding:"10px 11px",borderRadius:10,marginBottom:5,background:t.card,border:"1px solid "+t.accent}}>
                <input defaultValue={_editAAction.current} onChange={e=>setEditAAction(e.target.value)} placeholder="Action step..." style={{width:"100%",padding:"7px 9px",borderRadius:8,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12,marginBottom:6}}/>
                <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                  <input type="date" defaultValue={_editADueDate.current} onChange={e=>setEditADueDate(e.target.value)} style={{padding:"6px 9px",borderRadius:7,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12,colorScheme:t.mode||"dark"}}/>
                  <input type="time" defaultValue={_editADueTime.current} onChange={e=>setEditADueTime(e.target.value)} style={{padding:"6px 9px",borderRadius:7,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12,colorScheme:t.mode||"dark"}}/>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={saveEditA} style={{padding:"7px 16px",borderRadius:8,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>Save ✓</button>
                  <button onClick={()=>setEditA(null)} style={{padding:"7px 12px",borderRadius:8,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:12}}>Cancel</button>
                </div>
              </div>
              ):(
              <div key={a.id} style={{display:"flex",alignItems:"flex-start",gap:9,padding:"9px 10px",borderRadius:10,marginBottom:5,background:a.done?"linear-gradient(90deg,"+t.success+"15,"+t.card+")":t.card,border:"1px solid "+(a.done?t.success+"44":t.border),boxShadow:a.done?premiumShadow(t,t.success):"none"}}>
                <div onClick={()=>toggleA(g.id,a.id)} style={{width:16,height:16,borderRadius:4,border:"2px solid "+(a.done?t.success:t.muted),background:a.done?t.success:"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2,cursor:"pointer"}}>
                  {a.done&&<span style={{color:"#000",fontSize:10,fontWeight:900}}>✓</span>}
                </div>
                <div style={{flex:1,cursor:"pointer"}} onClick={()=>toggleA(g.id,a.id)}>
                  <div style={{fontSize:13,color:a.done?t.muted:t.text,textDecoration:a.done?"line-through":"none"}}>{a.action}</div>
                  {a.result&&<div style={{fontSize:11,color:t.info,marginTop:1}}>→ {a.result}</div>}
                  {/* G2: Show due date + time */}
                  {(a.dueDate||a.dueTime)&&<div style={{fontSize:10,color:a.dueDate===today?t.danger:t.accent,marginTop:3,fontWeight:600}}>
                    📅 {a.dueDate?fmt(a.dueDate):""}{a.dueTime?" · "+fmt12(a.dueTime):""}
                    {a.dueDate===today&&!a.done&&<span style={{marginLeft:4,color:t.danger}}>— Due today!</span>}
                  </div>}
                </div>
                <button onClick={()=>openEditA(g.id,a)} style={{background:"none",border:"none",color:navMuted,cursor:"pointer",padding:"0 2px",flexShrink:0,display:"flex",alignItems:"center"}}>{IC.edit(navMuted,14)}</button>
                <button onClick={()=>delA(g.id,a.id)} style={{background:"none",border:"none",color:t.danger,cursor:"pointer",fontSize:13,padding:"0 2px",flexShrink:0,opacity:0.7}}>✕</button>
              </div>
              )
            ))}
            {/* G2: Add action row with optional due date + time */}
            <div style={{marginTop:9,marginBottom:7}}>
              <div style={{display:"flex",gap:5,marginBottom:5,flexWrap:"wrap"}}>
                <input defaultValue="" onChange={e=>{setNewAGid(g.id);setNewAAction(e.target.value);}} onKeyDown={e=>e.key==="Enter"&&addA(g.id)} placeholder="Action step..." style={{flex:2,minWidth:100,padding:"7px 9px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:12}}/>
                <input defaultValue="" onChange={e=>{setNewAGid(g.id);setNewAResult(e.target.value);}} placeholder="Expected result..." style={{flex:2,minWidth:100,padding:"7px 9px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:12}}/>
                <button onClick={()=>addA(g.id)} style={{padding:"7px 12px",borderRadius:8,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer"}}>+</button>
              </div>
              {/* Due date + time toggle */}
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <button onClick={()=>setShowNewAExtra(showNewAExtra===g.id?null:g.id)} style={{fontSize:11,color:t.info,background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:3}}>
                  📅 {showNewAExtra===g.id?"Hide":"Add due date & time"}
                </button>
                {showNewAExtra===g.id&&<>
                  <input type="date" defaultValue="" onChange={e=>{setNewAGid(g.id);setNewADueDate(e.target.value);}} style={{padding:"6px 10px",borderRadius:7,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12,colorScheme:t.mode||"dark"}}/>
                  <input type="time" defaultValue="" onChange={e=>{setNewAGid(g.id);setNewADueTime(e.target.value);}} style={{padding:"6px 10px",borderRadius:7,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12,colorScheme:t.mode||"dark"}}/>
                </>}
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:2}}>
              <button onClick={()=>setShowBulk(showBulk===g.id?null:g.id)} style={{fontSize:12,color:t.info,background:"none",border:"none",cursor:"pointer",padding:0}}>📋 Bulk upload</button>
              <button onClick={()=>completeGoal(g.id)} style={{padding:"5px 12px",borderRadius:20,border:"1px solid "+t.success+"66",background:t.success+"15",color:t.success,fontWeight:700,cursor:"pointer",fontSize:10,fontFamily:"inherit",flexShrink:0}}>✅ Complete</button>
            </div>
            {showBulk===g.id&&<div style={{marginTop:7}}>
              <textarea defaultValue="" onChange={e=>setBulk(e.target.value)} placeholder={"ACTION | EXPECTED RESULT\nStudy Chapter 1 | Understand basics"} style={{width:"100%",height:70,padding:"8px 9px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:12,resize:"none",marginBottom:7}}/>
              <button onClick={()=>bulkUp(g.id)} style={{padding:"7px 14px",borderRadius:8,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>Upload</button>
            </div>}
          </div>}
        </div>);
      })}
    </div>
  </>);}

  // Analytics page — Update 18: 4 tabs
  function AnalyticsPage(){
    const TABS=[["reviews","Reviews"],["habits","Habits"],["goals","Goals"],["badges","Badges"]];
    
    function getLast7(){const arr=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);arr.push(d.toLocaleDateString("en-CA"));}return arr;}
    const week7=getLast7();
    return(
    <div>
      {/* N7-A: AppHeader — missing from Analytics page */}
      <AppHeader t={t} user={user} displayName={displayName} pk={pk} onCalendar={()=>openModal("calendar")} onNotif={()=>openModal("notif")} onProfile={()=>{window.history.pushState({showHamburger:true,page:page},"","/");setShowHamburger(true);}} navMuted={navMuted}/>
      <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:2}}>
        {TABS.map(([id,lbl])=>(
          <button key={id} onClick={()=>setAnalyticsTab(id)} style={{padding:"7px 14px",borderRadius:20,border:"1px solid "+(analyticsTab===id?t.accent:t.border),background:analyticsTab===id?t.accent+"22":t.surface,color:analyticsTab===id?t.accent:t.muted,cursor:"pointer",fontSize:12,fontWeight:analyticsTab===id?700:400,flexShrink:0,boxShadow:analyticsTab===id?"0 0 8px "+t.accent+"55":"none"}}>{lbl}</button>
        ))}
      </div>
      {analyticsTab==="reviews"&&<ReviewsTab t={t} habits={habits} goals={goals} journals={journals} plan={plan} showUp={showUp} today={today}/>}
      {analyticsTab==="habits"&&<div>
        {habits.length===0&&<div style={{textAlign:"center",color:t.muted,padding:36}}>Add habits to see habit analytics! 🔥</div>}
        {habits.length>0&&<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,marginBottom:14,boxShadow:premiumShadow(t)}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:5}}>{IC.calendar(t.text,13)} This Week</div>
            <div style={{fontSize:10,color:t.muted}}>{week7.filter(d=>habits.some(h=>{const v=h.log&&h.log[d];return isFullDoneOn(h,d,v);})).length}/7 active days</div>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:260}}>
              <thead><tr>
                <th style={{textAlign:"left",color:t.muted,padding:"3px 6px",fontWeight:600,width:80}}>Habit</th>
                {week7.map(d=><th key={d} style={{textAlign:"center",color:d===today?t.accent:t.muted,padding:"3px 2px",fontWeight:d===today?800:500,fontSize:10,minWidth:24}}>
                  {new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"narrow"})}<br/><span style={{fontSize:9}}>{new Date(d+"T12:00:00").getDate()}</span>
                </th>)}
                <th style={{textAlign:"center",color:t.muted,padding:"3px 3px",fontWeight:600,fontSize:10}}>Rate</th>
                <th style={{textAlign:"center",color:t.muted,padding:"3px 3px",fontWeight:600,fontSize:10}}>🔥</th>
              </tr></thead>
              <tbody>{habits.map(h=>{
                const wd=week7.filter(d=>{const v=h.log&&h.log[d];return isFullDoneOn(h,d,v);}).length;
                const rate=Math.round(wd/7*100);
                return(<tr key={h.id}>
                  <td style={{color:t.text,padding:"5px 6px",fontWeight:600,fontSize:11,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.icon} {h.name}</td>
                  {week7.map(d=>{const v=h.log&&h.log[d];const isFullDone=isFullDoneOn(h,d,v);return(<td key={d} style={{textAlign:"center",padding:"4px 2px"}}>
                    <div style={{width:16,height:16,borderRadius:4,background:isFullDone?t.success:t.surface,border:"1px solid "+(d===today?t.accent:t.border),margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {isFullDone&&<span style={{fontSize:9,color:"#000",fontWeight:900}}>✓</span>}
                    </div>
                  </td>);})}
                  <td style={{textAlign:"center",padding:"4px 3px",fontSize:10,fontWeight:700,color:rate>=71?t.success:rate>=43?t.accent:t.danger}}>{rate}%</td>
                  <td style={{textAlign:"center",padding:"4px 3px",fontSize:11,fontWeight:700,color:t.accent}}>{h.streak>0?h.streak:"-"}</td>
                </tr>);
              })}</tbody>
            </table>
          </div>
        </div>}
        {/* Item 29: Monthly Habits Completed graph (replaces redundant 90-Day Heatmaps — per-habit heatmaps remain on each habit's detail page) */}
        {habits.length>0&&<MonthlyHabitsGraph habits={habits} t={t} monthOffset={habitsMonthOffset} setMonthOffset={setHabitsMonthOffset}/>}

        {/* V3: Yearly Bar Chart — Plus only */}
        {(()=>{
          if(!plan.plus) return(
            <div onClick={()=>showUp("💎 Yearly chart is a Plus feature!")} style={{background:t.card,border:"1px dashed "+t.border,borderRadius:12,padding:16,marginBottom:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:t.text,marginBottom:2}}>📅 Yearly Completion Chart</div>
                <div style={{fontSize:11,color:t.muted}}>12-month habit completion overview</div>
              </div>
              <span style={{fontSize:10,fontWeight:700,color:"#a78bfa",background:"#a78bfa22",padding:"3px 9px",borderRadius:12,flexShrink:0}}>💎 Plus</span>
            </div>
          );
          const yr=new Date().getFullYear();
          const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
          const monthData=MONTHS.map((_,mi)=>{
            const daysInMonth=new Date(yr,mi+1,0).getDate();
            let done=0;
            const possible=habits.length*daysInMonth;
            habits.forEach(h=>{
              for(let d=1;d<=daysInMonth;d++){
                const key=yr+"-"+String(mi+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
                if(h.log&&h.log[key])done++;
              }
            });
            const rate=possible>0?Math.round((done/possible)*100):null;
            return{month:MONTHS[mi],rate};
          });
          const hasData=monthData.some(m=>m.rate!==null&&m.rate>0);
          const currentMonth=new Date().getMonth();
          return(
            <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,marginBottom:12,boxShadow:premiumShadow(t)}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontWeight:700,fontSize:13}}>📅 {yr} — Yearly Overview</div>
                <div style={{display:"flex",gap:8,fontSize:9,color:t.muted}}>
                  <span style={{display:"flex",alignItems:"center",gap:2}}><span style={{width:8,height:8,borderRadius:2,background:t.success,display:"inline-block"}}/>≥70%</span>
                  <span style={{display:"flex",alignItems:"center",gap:2}}><span style={{width:8,height:8,borderRadius:2,background:t.accent,display:"inline-block"}}/>≥40%</span>
                  <span style={{display:"flex",alignItems:"center",gap:2}}><span style={{width:8,height:8,borderRadius:2,background:t.danger,display:"inline-block"}}/>&lt;40%</span>
                </div>

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>

<script>
(function(){
  function runApp(){
    try{
      var src=document.getElementById('app-src').textContent;
      var out=Babel.transform(src,{presets:[["react",{runtime:"classic"}]]}).code;
      var s=document.createElement('script');
      s.textContent=out;
      document.body.appendChild(s);
    }catch(e){
      console.error('App transform/execute failed:',e);
      var st=document.getElementById('splash-status');
      if(st)st.textContent='Error loading app — check console';
    }
  }
  function waitBabel(tries){
    if(typeof Babel!=='undefined'&&typeof Babel.transform==='function'){
      runApp();
    } else if(tries>0){
      setTimeout(function(){waitBabel(tries-1);},200);
    } else {
      console.error('Babel failed to load after timeout');
    }
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){waitBabel(75);});
  } else {
    waitBabel(75);
  }
})();
</script>
<script>
// ── PWA Install prompt handler ──────────────────────────────────────────────
let _deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  // Expose globally so Settings page can trigger it
  window._pwaInstallPrompt = e;
});
window.addEventListener('appinstalled', () => {
  _deferredInstallPrompt = null;
  window._pwaInstallPrompt = null;
  console.log('✅ Momentum PWA installed');
});

if('serviceWorker' in navigator){
  window.addEventListener('load',async()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(r=>{
        console.log('⚡ SW ready:',r.scope);
        // Force check for SW update immediately
        r.update();
        r.addEventListener('updatefound',()=>{
          const nw=r.installing;
          nw.addEventListener('statechange',()=>{
            if(nw.state==='installed'&&navigator.serviceWorker.controller){
              nw.postMessage({type:'SKIP_WAITING'});
            }
          });
        });
        let refreshing=false;
        navigator.serviceWorker.addEventListener('controllerchange',()=>{
          if(!refreshing){refreshing=true;window.location.reload();}
        });
        navigator.serviceWorker.ready.then(reg=>{
          if(reg.active){
            const rem=localStorage.getItem('hg_reminders');
            const notifOn=localStorage.getItem('hg_notif');
            if(rem)reg.active.postMessage({type:'SYNC_STORAGE',key:'hg_reminders',value:rem});
            if(notifOn)reg.active.postMessage({type:'SYNC_STORAGE',key:'hg_notif',value:notifOn});
            reg.active.postMessage({type:'UPDATE_REMINDERS'});
          }
        });
      })
      .catch(e=>console.error('SW error:',e));
  });
}
</script>
