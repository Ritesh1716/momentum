      {/* Momentum Score — headline metric */}
      <div style={{display:"flex",alignItems:"center",gap:14,background:premiumCard(t,"#a78bfa"),border:"1px solid "+t.border,borderRadius:16,padding:14,marginBottom:10,boxShadow:premiumShadow(t,"#a78bfa")}}>
        <Ring pct={Math.round(momentumScore/10)} sz={64} sw={6} col="#a78bfa" t={t} glow/>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:800,color:t.text,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>Momentum Score</div>
          <div style={{fontSize:18,fontWeight:900,color:"#a78bfa",lineHeight:1,marginBottom:2}}>{momentumScore} <span style={{fontSize:11,fontWeight:500,color:t.muted}}>/ 1000</span></div>
          <div style={{fontSize:12,fontWeight:700,color:momentumDelta>0?t.success:momentumDelta<0?t.danger:t.muted}}>{momentumDelta>0?"↑ +"+momentumDelta:momentumDelta<0?"↓ "+momentumDelta:"→ Same"} vs last week</div>
          <div style={{fontSize:10,color:t.muted,marginTop:2}}>{momentumLabel}</div>
        </div>
      </div>

      {/* Today's ONE Move — always visible, single highest-leverage action */}
      <div style={{display:"flex",alignItems:"flex-start",gap:10,background:premiumCard(t,"#f59e0b"),border:"1px solid #f59e0b44",borderLeft:"3px solid #f59e0b",borderRadius:12,padding:"12px 14px",marginBottom:12,boxShadow:premiumShadow(t,"#f59e0b")}}>
        <span style={{fontSize:20,flexShrink:0}}>{oneMove.icon}</span>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#f59e0b",textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>Today's ONE Move</div>
          <div style={{fontSize:13,color:t.text,fontWeight:600,lineHeight:1.4}}>{oneMove.text}</div>
        </div>
      </div>

      {/* Patterns / Forecast / Coach's Take — collapsible cards */}
      {insights.slice(2).map((ins,i)=>(
        <div key={i} style={{background:premiumCard(t,"#a78bfa"),border:"1px solid "+t.border,borderRadius:14,marginBottom:8,overflow:"hidden",borderLeft:"3px solid #a78bfa",boxShadow:premiumShadow(t,"#a78bfa")}}>
          <div onClick={()=>setExpandedIns(prev=>({...prev,[i]:!prev[i]}))}
            style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",cursor:"pointer"}}>
            <div style={{fontSize:20,flexShrink:0}}>{ins.icon}</div>
            <div style={{flex:1,fontSize:11,fontWeight:700,color:"#a78bfa",textTransform:"uppercase",letterSpacing:0.5}}>{ins.label}</div>
            <div style={{fontSize:11,color:t.muted,fontWeight:600,flexShrink:0}}>{expandedIns[i]?"▲ hide":"▼ view"}</div>
          </div>
          {expandedIns[i]&&<div style={{padding:"0 14px 12px",borderTop:"1px solid "+t.border}}>
            {(ins.points||[ins.text]).map((pt,j)=>(
              <div key={j} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"4px 0"}}>
                <span style={{color:"#a78bfa",flexShrink:0,marginTop:2,fontSize:11}}>•</span>
                <span style={{fontSize:12,color:t.text,lineHeight:1.55}}>{pt}</span>
              </div>
            ))}
          </div>}
        </div>
      ))}

      {/* Coach's Take — loading / not-yet-generated states */}
      {insLoading&&<div style={{textAlign:"center",padding:24,color:t.muted}}>
        <div style={{fontSize:28,marginBottom:6}}>🧠</div>
        <div style={{fontSize:12}}>Coach is thinking...</div>
      </div>}
      {!insLoading&&coachCard===null&&<div style={{textAlign:"center",padding:24,color:t.muted}}>
        <div style={{fontSize:28,marginBottom:8}}>🤖</div>
        {(credits||0)>0
          ?<button onClick={()=>generateCoachCard(false)} style={{padding:"8px 18px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#a78bfa,#7c3aed)",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12,boxShadow:"0 4px 14px #a78bfa66"}}>Get Coach's Take</button>
          :<div style={{fontSize:12}}>🤖 Coach's Take needs AI credits — refills monthly.</div>
        }
      </div>}

      {insights.length>0&&<div style={{fontSize:10,color:t.muted,textAlign:"center",marginTop:6,padding:"7px 12px",background:t.surface,borderRadius:8,border:"1px solid "+t.border}}><svg width="11" height="11" viewBox="0 0 24 24" fill="#f5c842" stroke="#f5c842" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:"inline",marginRight:4}}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Tap the star button above to save these insights to History</div>}
    </div>}

    {/* ── TAB: GOAL PLANNER ── */}
    {tab==="planner"&&<div>
      {!planResult&&<div>
        <div style={{fontSize:12,color:t.muted,marginBottom:14,lineHeight:1.6}}>Type a goal and AI will build a complete {planDeadlineDays}-day action plan. Costs <strong style={{color:t.accent}}>2 credits</strong>. You have {credits} remaining.</div>
        <input value={planInput} onChange={e=>setPlanInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&generatePlan()} maxLength={200} placeholder='e.g. "Learn Python in 60 days" or "Run a 5K"' style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid "+t.accent+"44",background:t.surface,color:t.text,fontSize:13,marginBottom:12,outline:"none"}}/>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:t.muted,fontWeight:700,marginBottom:6,textTransform:"uppercase"}}>Difficulty</div>
            <div style={{display:"flex",gap:4}}>
              {[
              ["easy",<><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22V12M12 12C12 12 8 8 8 5a4 4 0 0 1 8 0c0 3-4 7-4 7z"/></svg> Easy</>],
              ["medium",<><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Medium</>],
              ["hard",<><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2c0 0-5 4-5 9a5 5 0 0 0 10 0c0-5-5-9-5-9z"/><path d="M12 12c0 0-2 1.5-2 3a2 2 0 0 0 4 0c0-1.5-2-3-2-3z"/></svg> Hard</>],
            ].map(([v,l])=>(
                <button key={v} onClick={()=>setPlanDifficulty(v)} style={{flex:1,padding:"6px 4px",borderRadius:8,border:"1px solid "+(planDifficulty===v?t.accent:t.border),background:planDifficulty===v?t.accent+"18":"none",color:planDifficulty===v?t.accent:t.muted,cursor:"pointer",fontSize:10,fontWeight:planDifficulty===v?700:400,fontFamily:"inherit",boxShadow:planDifficulty===v?"0 0 6px "+t.accent+"66":"none",display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>{l}</button>
              ))}
            </div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:t.muted,fontWeight:700,marginBottom:6,textTransform:"uppercase"}}>Duration</div>
            <div style={{display:"flex",gap:4}}>
              {[[21,"21d"],[30,"30d"],[60,"60d"],[90,"90d"]].map(([v,l])=>(
                <button key={v} onClick={()=>setPlanDeadlineDays(v)} style={{flex:1,padding:"6px 4px",borderRadius:8,border:"1px solid "+(planDeadlineDays===v?t.accent:t.border),background:planDeadlineDays===v?t.accent+"18":"none",color:planDeadlineDays===v?t.accent:t.muted,cursor:"pointer",fontSize:10,fontWeight:planDeadlineDays===v?700:400,fontFamily:"inherit",boxShadow:planDeadlineDays===v?"0 0 6px "+t.accent+"66":"none"}}>{l}</button>
              ))}
            </div>
          </div>
        </div>
        <button onClick={generatePlan} disabled={planLoading||!planInput.trim()||(credits||0)<2} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:(credits||0)>=2?"linear-gradient(135deg,#a78bfa,#7c3aed)":"#555",color:(credits||0)>=2?"#fff":t.muted,fontWeight:700,cursor:(credits||0)>=2?"pointer":"not-allowed",fontSize:14,fontFamily:"inherit",boxShadow:(credits||0)>=2?"0 4px 18px #a78bfa66":"none"}}>
          {planLoading?<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{animation:"spin 1s linear infinite"}}><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Building your plan...</>:<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="12" y2="15"/></svg> Generate Plan (2 credits)</>}
        </button>
      </div>}

      {planResult&&<div>
        {/* Goal Overview */}
        <div style={{display:"flex",alignItems:"center",gap:14,background:premiumCard(t,"#a78bfa"),border:"1px solid #a78bfa44",borderRadius:16,padding:14,marginBottom:10,borderLeft:"4px solid #a78bfa",boxShadow:premiumShadow(t,"#a78bfa")}}>
          <Ring pct={planResult.successProbability||0} sz={60} sw={6} col="#a78bfa" t={t} glow/>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:800,marginBottom:4,...gradText(t,"#a78bfa","#7c3aed")}}>{planResult.title}</div>
            <div style={{fontSize:11,color:t.muted,marginBottom:3}}>{planResult.priority} Priority · Deadline: {planResult.deadline}</div>
            <div style={{fontSize:9,color:"#a78bfa",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>Success Probability</div>
          </div>
        </div>
        {planResult.overview&&<div style={{fontSize:12,color:t.text,lineHeight:1.5,marginBottom:12,background:t.card,padding:"10px 12px",borderRadius:10}}>{planResult.overview}</div>}

        {/* Today's Task */}
        {planResult.todayTask&&<div style={{display:"flex",alignItems:"flex-start",gap:10,background:premiumCard(t,"#f59e0b"),border:"1px solid #f59e0b44",borderLeft:"3px solid #f59e0b",borderRadius:12,padding:"12px 14px",marginBottom:12,boxShadow:premiumShadow(t,"#f59e0b")}}>
          <span style={{fontSize:20,flexShrink:0}}>🎯</span>
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:"#f59e0b",textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>Today's Task</div>
            <div style={{fontSize:13,color:t.text,fontWeight:600,lineHeight:1.4}}>{planResult.todayTask.action}</div>
            <div style={{fontSize:10,color:t.muted,marginTop:3}}>⏱ {planResult.todayTask.time}{planResult.todayTask.successCriteria?" · ✓ "+planResult.todayTask.successCriteria:""}</div>
          </div>
        </div>}

        {/* Phases — Phase 1 expanded by default */}
        <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",marginBottom:8}}>Roadmap</div>
        {(planResult.phases||[]).map((ph,pi)=>(
          <div key={pi} style={{background:premiumCard(t,"#a78bfa"),border:"1px solid "+t.border,borderRadius:14,marginBottom:8,overflow:"hidden",borderLeft:"3px solid #a78bfa",boxShadow:premiumShadow(t,"#a78bfa")}}>
            <div onClick={()=>setExpandedPhase(expandedPhase===pi?null:pi)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",cursor:"pointer"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700,color:"#a78bfa"}}>{ph.title}</div>
                <div style={{fontSize:10,color:t.muted,marginTop:1}}>{ph.dayRange} · {(ph.tasks||[]).length} tasks</div>
              </div>
              <div style={{fontSize:11,color:t.muted,fontWeight:600,flexShrink:0}}>{expandedPhase===pi?"▲ hide":"▼ view"}</div>
            </div>
            {expandedPhase===pi&&<div style={{padding:"0 14px 12px",borderTop:"1px solid "+t.border}}>
              {(ph.tasks||[]).map((task,ti)=>(
                <div key={ti} style={{display:"flex",gap:8,padding:"8px 0",alignItems:"flex-start",borderBottom:ti<(ph.tasks.length-1)?"1px solid "+t.border:"none"}}>
                  <div style={{width:18,height:18,borderRadius:"50%",background:"linear-gradient(135deg,#a78bfa,#7c3aed)",color:"#fff",fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,boxShadow:"0 0 6px #a78bfa88"}}>{ti+1}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:600,color:t.text}}>{task.action}</div>
                    <div style={{fontSize:10,color:t.muted,marginTop:2}}>📅 {task.dueDate} · ⏱ {task.time}{task.successCriteria?" · ✓ "+task.successCriteria:""}</div>
                  </div>
                </div>
              ))}
            </div>}
          </div>
        ))}

        {/* Risk Factors */}
        {planResult.riskFactors&&planResult.riskFactors.length>0&&<div style={{background:premiumCard(t,t.danger),border:"1px solid "+t.danger+"44",borderLeft:"3px solid "+t.danger,borderRadius:12,padding:"11px 14px",marginBottom:8,boxShadow:premiumShadow(t,t.danger)}}>
          <div style={{fontSize:10,fontWeight:700,color:t.danger,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>⚠️ Risk Factors</div>
          {planResult.riskFactors.map((r,i)=>(
            <div key={i} style={{display:"flex",gap:8,padding:"3px 0",fontSize:12,color:t.text,lineHeight:1.5}}><span style={{color:t.danger,flexShrink:0}}>•</span>{r}</div>
          ))}
        </div>}

        {/* Recovery Plan */}
        {planResult.recoveryPlan&&planResult.recoveryPlan.length>0&&<div style={{background:premiumCard(t,t.info),border:"1px solid "+t.info+"44",borderLeft:"3px solid "+t.info,borderRadius:12,padding:"11px 14px",marginBottom:12,boxShadow:premiumShadow(t,t.info)}}>
          <div style={{fontSize:10,fontWeight:700,color:t.info,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>🔄 If You Fall Behind</div>
          {planResult.recoveryPlan.map((r,i)=>(
            <div key={i} style={{display:"flex",gap:8,padding:"3px 0",fontSize:12,color:t.text,lineHeight:1.5}}><span style={{color:t.info,flexShrink:0}}>•</span>{r}</div>
          ))}
        </div>}

        {/* Habit Bridge */}
        {planResult.suggestedHabits&&planResult.suggestedHabits.length>0&&<div style={{background:premiumCard(t,t.success),border:"1px solid "+t.success+"44",borderLeft:"3px solid "+t.success,borderRadius:12,padding:"11px 14px",marginBottom:12,boxShadow:premiumShadow(t,t.success)}}>
          <div style={{fontSize:10,fontWeight:700,color:t.success,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>💪 Suggested Habits — Add to Tracker</div>
          {planResult.suggestedHabits.map((h,i)=>(
            <div key={i} onClick={()=>setSelectedHabits(prev=>({...prev,[i]:!prev[i]}))} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",background:t.card,borderRadius:8,marginBottom:5,cursor:"pointer"}}>
              <div style={{width:18,height:18,borderRadius:5,border:"2px solid "+t.success,background:selectedHabits[i]?t.success:"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#000",fontSize:11,fontWeight:800}}>{selectedHabits[i]?"✓":""}</div>
              <span style={{fontSize:16}}>{h.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,color:t.text}}>{h.name}</div>
                <div style={{fontSize:10,color:t.muted}}>{h.cat}{(h.goalCount>0)?" · "+h.goalCount+" "+h.goalUnit:""}</div>
              </div>
            </div>
          ))}
          <button onClick={addSuggestedHabits} disabled={Object.values(selectedHabits).every(v=>!v)} style={{width:"100%",marginTop:4,padding:"9px",borderRadius:10,border:"none",background:t.success,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12,fontFamily:"inherit",opacity:Object.values(selectedHabits).every(v=>!v)?0.5:1}}>➕ Add Selected Habits</button>
        </div>}

        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>addPlanToGoals()} style={{flex:2,padding:"12px",borderRadius:11,border:"none",background:t.success,color:"#000",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit",boxShadow:premiumShadow(t,t.success)}}>✅ Add to Goals Section</button>
          <button onClick={()=>{setPlanResult(null);generatePlan();}} disabled={planLoading||(credits||0)<1} style={{flex:1,padding:"12px",borderRadius:11,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>🔄 Regenerate</button>
        </div>
        <button onClick={()=>setPlanResult(null)} style={{width:"100%",marginTop:8,padding:"9px",borderRadius:11,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>← Back to Planner</button>
      </div>}
    </div>}

    {/* ── TAB: CHAT ── */}
    {tab==="chat"&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div style={{fontSize:11,color:t.muted,marginBottom:4}}>AI knows your habits, goals & mood. <strong style={{color:t.accent}}>1 credit per message.</strong></div>
      {/* Star save note */}
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:8,background:t.accent+"08",border:"1px dashed "+t.accent+"33",marginBottom:8}}>
        <span style={{fontSize:13}}>⭐</span>
        <span style={{fontSize:10,color:t.muted}}>Press ⭐ to save this chat to history</span>
        {chatHistory.length>0&&<button onClick={()=>{
          const lastUser=chatHistory.filter(m=>m.role==="user").slice(-1)[0];
          const lastAI=chatHistory.filter(m=>m.role==="assistant").slice(-1)[0];
          if(lastUser&&lastAI){saveHistory("chat",lastUser.content.slice(0,50),{q:lastUser.content,a:lastAI.content});showToastGlobal("⭐ Chat saved to History!");}
        }} style={{marginLeft:"auto",padding:"3px 10px",borderRadius:8,border:"1px solid "+t.accent+"44",background:t.accent+"18",color:t.accent,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>⭐ Save</button>}
      </div>
      <div style={{minHeight:200,maxHeight:300,overflowY:"auto",display:"flex",flexDirection:"column",gap:8,padding:"4px 0"}}>
        {chatHistory.length===0&&<div style={{textAlign:"center",padding:24,color:t.muted}}>
          <div style={{fontSize:24,marginBottom:8}}>💬</div>
          <div style={{fontSize:12,lineHeight:1.7}}>Ask me anything about your habits or goals. I already know your data!</div>
        </div>}
        {chatHistory.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"88%",padding:"10px 13px",borderRadius:14,background:m.role==="user"?premiumCard(t,t.accent):premiumCard(t,"#a78bfa"),border:"1px solid "+(m.role==="user"?t.accent+"44":"#a78bfa44"),borderLeft:m.role==="user"?"none":"3px solid #a78bfa",color:m.role==="user"?t.accent:t.text,boxShadow:m.role==="user"?premiumShadow(t,t.accent):premiumShadow(t,"#a78bfa")}}>
              {m.role==="assistant"&&<div style={{fontSize:9,color:"#a78bfa",fontWeight:700,marginBottom:6,textTransform:"uppercase"}}>AI Coach · {tone}</div>}
              {m.role==="assistant"
                ?m.content.split("\n").filter(l=>l.trim()).map((line,j)=>(
                    <div key={j} style={{fontSize:12,lineHeight:1.55,marginBottom:j<m.content.split("\n").filter(l=>l.trim()).length-1?4:0,color:t.text}}>{line}</div>
                  ))
                :<div style={{fontSize:12,lineHeight:1.5}}>{m.content}</div>
              }
            </div>
          </div>
        ))}
        {chatLoading&&<div style={{textAlign:"center",padding:8,color:t.muted,fontSize:12}}>🧠 Thinking...</div>}
      </div>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
        {QUICK_PROMPTS.map(([emoji,text])=>(
          <button key={text} onClick={()=>sendChat(text)} disabled={chatLoading||(credits||0)<1} style={{flexShrink:0,padding:"6px 12px",borderRadius:20,border:"1px solid #a78bfa44",background:"#a78bfa12",color:"#a78bfa",cursor:(credits||0)<1?"default":"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap",opacity:(credits||0)<1?0.5:1}}>{emoji} {text}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()} maxLength={1000} placeholder="Ask your AI Coach..." style={{flex:1,padding:"10px 14px",borderRadius:11,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:13,outline:"none"}}/>
        <button onClick={()=>sendChat()} disabled={chatLoading||!chatInput.trim()||(credits||0)<1} style={{padding:"10px 16px",borderRadius:11,border:"none",background:(credits||0)>=1?"linear-gradient(135deg,#a78bfa,#7c3aed)":"#555",color:(credits||0)>=1?"#fff":t.muted,fontWeight:700,cursor:"pointer",fontSize:13,flexShrink:0,fontFamily:"inherit",boxShadow:(credits||0)>=1?"0 4px 14px #a78bfa66":"none"}}>Send</button>
      </div>
    </div>}

    {/* ── TAB: HISTORY ── */}
    {tab==="history"&&<div>
      {openHistItem!==null
        ?<div>
          <button onClick={()=>setOpenHistItem(null)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:12,marginBottom:14,padding:0,fontFamily:"inherit"}}>← Back to History</button>
          {(()=>{
            const h=aiHistory[openHistItem];
            if(!h)return null;
            return(<div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <span style={{fontSize:11,fontWeight:700,color:"#a78bfa",textTransform:"uppercase"}}>{h.type==="insights"?"⭐ Starred Insights":h.type==="plan"?"📋 Goal Plan":"💬 Chat"}</span>
                <span style={{fontSize:10,color:t.muted}}>{h.date}</span>
              </div>
              {/* INSIGHTS detail */}
              {h.type==="insights"&&(h.data||[]).map((ins,i)=>(
                <div key={i} style={{background:t.surface,border:"1px solid "+t.border,borderRadius:11,marginBottom:8,padding:"11px 13px"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                    <span style={{fontSize:18}}>{ins.icon}</span>
                    <span style={{fontSize:11,fontWeight:700,color:"#a78bfa",textTransform:"uppercase"}}>{ins.label}</span>

  </Modal>);
}

const HCOLORS=["#f5c842","#e8853d","#f472b6","#4ade80","#60a5fa","#a78bfa","#34d399","#fb7185","#fbbf24","#38bdf8","#818cf8","#e879f9"];

function EditHabitModal({t,close,habit,onSave}){

  const[cat,setCat]=useState(habit.cat||"Health");

  const[freq,setFreq]=useState(habit.freq||"daily");
  const[freqDays,setFreqDays]=useState(habit.freqDays||[]);
  const[freqTimes,setFreqTimes]=useState(habit.freqTimes||3);
  const[goalCount,setGoalCount]=useState(habit.goalCount||"");
  const[goalUnit,setGoalUnit]=useState(habit.goalUnit||"");
  const[durType,setDurType]=useState(habit.durType||"ongoing");
  const[durDays,setDurDays]=useState(habit.durDays||21);
  const[durEnd,setDurEnd]=useState(habit.durEnd||"");

  const[remTime,setRemTime]=useState(habit.reminder?.time||"08:00");
  const DAYS=["Mo","Tu","We","Th","Fr","Sa","Su"];

    const newGoalCount=parseInt(goalCount)||0;
    onSave({...habit,name:name.trim()||habit.name,icon,cat,color,freq,freqDays,freqTimes:parseInt(freqTimes)||3,goalCount:newGoalCount,goalCountHistory:updateGoalCountHistory(habit,newGoalCount),goalUnit:goalUnit.trim(),durType,durDays:parseInt(durDays)||21,durEnd,reminder:{enabled:remEnabled,time:remTime}});

        <span style={{fontSize:12,color:t.muted}}>day challenge</span>

    </div>
    {/* Per-habit reminder */}
    <div style={{marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:7,textTransform:"uppercase",letterSpacing:1}}>Habit Reminder</div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:remEnabled?8:0}}>

        <span style={{fontSize:12,color:t.muted}}>Daily reminder for this habit</span>
      </div>
      {remEnabled&&<input type="time" value={remTime} onChange={e=>setRemTime(e.target.value)} style={{padding:"8px 12px",borderRadius:9,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:14}}/>}
    </div>
    <div style={{display:"flex",gap:8}}>
      <button onClick={handleSave} style={{flex:1,padding:"11px",borderRadius:11,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>Save Changes ✓</button>
      <button onClick={close} style={{padding:"11px 16px",borderRadius:11,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:13}}>Cancel</button>
    </div>
  </Modal>);
}

function HabitDetailPage({t,habit,habits,setHabits,saveF,back,onShare,onFreeze,plan}){
  const today=td();

  const doneToday=!!log[today];
  const total=Object.entries(log).filter(([d,v])=>isFullDoneOn(habit,d,v)).length;
  const createdDaysAgo=habit.createdAt?Math.max(1,Math.ceil((new Date()-new Date(habit.createdAt))/86400000)):Math.max(1,Object.keys(log).length);
  const rate=Math.min(100,Math.round((total/createdDaysAgo)*100));
  const hColor=habit.color||t.accent;
  const hasGoal=habit.goalCount>0&&habit.goalUnit;
  // Tile count per date — stored in habit log as number or true
  const todayCount=typeof log[today]==="number"?log[today]:doneToday?habit.goalCount:0;
  const goalCount=habit.goalCount||1;
  const tilePct=hasGoal?Math.min(100,Math.round((todayCount/goalCount)*100)):doneToday?100:0;

  const week7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week7.push(d.toLocaleDateString("en-CA"));}

    const months={};Object.entries(log).forEach(([d,v])=>{if(!v)return;const[y,m]=d.split("-");const k=y+"-"+m;if(!months[k])months[k]=[];months[k].push(d);});

// Web Audio sound player
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Resume context (required after user gesture on mobile)
    if(ctx.state==="suspended")ctx.resume();
    const master=ctx.createGain();
    master.connect(ctx.destination);

    if(type==="bell"){
      // Rich bell — doubled oscillators for fullness, much louder
      [880,1760].forEach((freq,layer)=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="sine";
        o.frequency.setValueAtTime(freq,ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(freq/2,ctx.currentTime+1.2);
        g.gain.setValueAtTime(layer===0?0.9:0.4,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.4);
        o.start();o.stop(ctx.currentTime+1.4);
      });

    }else if(type==="beep"){
      // 3 loud sharp beeps
      [0,0.25,0.5].forEach(t2=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="square";o.frequency.value=1000;
        g.gain.setValueAtTime(0.8,ctx.currentTime+t2);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t2+0.18);
        o.start(ctx.currentTime+t2);o.stop(ctx.currentTime+t2+0.2);
      });

    }else if(type==="chime"){
      // Ascending chime — C5 E5 G5 C6
      [523,659,784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="sine";o.frequency.value=f;
        g.gain.setValueAtTime(0,ctx.currentTime+i*0.18);
        g.gain.linearRampToValueAtTime(0.85,ctx.currentTime+i*0.18+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.55);
        o.start(ctx.currentTime+i*0.18);o.stop(ctx.currentTime+i*0.18+0.6);
      });

    }else if(type==="alarm"){
      // Urgent pulsing alarm — 8 fast bursts
      for(let i=0;i<8;i++){
        const f=i%2===0?880:1100;
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="sawtooth";o.frequency.value=f;
        g.gain.setValueAtTime(0.85,ctx.currentTime+i*0.13);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.13+0.11);
        o.start(ctx.currentTime+i*0.13);o.stop(ctx.currentTime+i*0.13+0.12);
      }

    }else if(type==="siren"){
      // Rising siren — good for important reminders
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(master);o.type="sawtooth";
      o.frequency.setValueAtTime(300,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(900,ctx.currentTime+0.4);
      o.frequency.linearRampToValueAtTime(300,ctx.currentTime+0.8);
      o.frequency.linearRampToValueAtTime(900,ctx.currentTime+1.2);
      g.gain.setValueAtTime(0.8,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.4);
      o.start();o.stop(ctx.currentTime+1.4);

    }else if(type==="ding"){
      // Single sharp high ding — minimal, clean
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(master);o.type="sine";o.frequency.value=1400;
      g.gain.setValueAtTime(0.95,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);
      o.start();o.stop(ctx.currentTime+0.85);

    }else if(type==="drum"){
      // Bold percussion thud — great on mobile speakers
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(master);o.type="sine";
      o.frequency.setValueAtTime(200,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(40,ctx.currentTime+0.3);
      g.gain.setValueAtTime(1.0,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
      o.start();o.stop(ctx.currentTime+0.4);
      // noise layer
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.1,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.4;
      const src=ctx.createBufferSource();src.buffer=buf;
      const ng=ctx.createGain();src.connect(ng);ng.connect(master);
      ng.gain.setValueAtTime(0.6,ctx.currentTime);
      ng.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1);
      src.start();

    }else if(type==="trumpet"){
      // Bold fanfare — memorable, hard to miss
      [[392,0],[523,0.15],[659,0.3],[784,0.45]].forEach(([f,t2])=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="square";o.frequency.value=f;
        g.gain.setValueAtTime(0,ctx.currentTime+t2);
        g.gain.linearRampToValueAtTime(0.7,ctx.currentTime+t2+0.05);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t2+0.35);
        o.start(ctx.currentTime+t2);o.stop(ctx.currentTime+t2+0.4);
      });
    }

    setTimeout(()=>ctx.close(),3000);
  }catch(e){console.log("Sound error:",e);}
}

function fmt12(timeStr){
  if(!timeStr)return"";
  const[h,m]=timeStr.split(":").map(Number);
  const ampm=h>=12?"PM":"AM";
  const h12=h%12||12;
  return h12+":"+String(m).padStart(2,"0")+" "+ampm;
}

  // ── ACTIVE ──────────────────────────────────────────────────

function ExportPanel({t,habits,goals,journals,goalStats,displayName,canPDF=false,user,isPlus=false}){
  const[exporting,setExporting]=useState(null); // null | "habits_csv" | "goals_csv" | "journal_csv" | "pdf"
  const[range,setRange]=useState("30"); // "30" | "90" | "all"

  function downloadCSV(filename,rows){
    const csv=rows.map(r=>r.map(cell=>{
      const s=String(cell==null?"":cell);
      return s.includes(",") || s.includes('"')||s.includes("\n") ? '"'+s.replace(/"/g,'""')+'"' : s;
    }).join(",")).join("\n");
    // Item 33: prepend UTF-8 BOM — without it, Excel/Sheets misreads emoji/multi-byte characters as garbled text
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
  }

  // Item 36: strips emoji/symbols down to plain ASCII — used by the Plain Text fallback export for apps (e.g. Google Sheets Android) that misrender emoji on import
  function toPlainAscii(str){
    return String(str||"")
      .replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{2190}-\u{21FF}\u{FE0F}\u{200D}]/gu,"")
      .replace(/\s{2,}/g," ")
      .trim();
  }

  // Item: extracted so both the standalone Habits CSV export and the new Data Pack ZIP can reuse identical logic
  function habitSummaryRows(plain){
    const cutoffDays=range==="all"?3650:parseInt(range);
    const rows=[["Habit","Category","Streak","Best Streak","Total Done","Completion Rate","Days Tracked","Created On"]];
    habits.forEach(h=>{
      const total=Object.keys(h.log||{}).filter(d=>isFullDoneOn(h,d,h.log[d])).length;
      const createdAt=h.createdAt||Object.keys(h.log||{}).sort()[0]||new Date().toLocaleDateString("en-CA");
      const createdDaysAgo=Math.max(1,Math.ceil((new Date()-new Date(createdAt+"T00:00:00"))/86400000));
      const daysTracked=Math.min(cutoffDays,createdDaysAgo);
      const rate=Math.min(100,Math.round((total/createdDaysAgo)*100));
      rows.push([plain?toPlainAscii(h.name):(h.icon||"")+" "+h.name,h.cat||"",(h.streak||0)+"d",(h.best||0)+"d",total,rate+"%",daysTracked+" days",createdAt]);
    });
    return rows;
  }
  function habitDailyLogRows(datesAsc,plain){
    const rows=[["Date",...habits.map(h=>plain?toPlainAscii(h.name):(h.icon||"")+" "+h.name)]];
    datesAsc.forEach(date=>{
      const row=[date];
      habits.forEach(h=>{
        const v=h.log&&h.log[date];
        if(!v){row.push("");}
        else if(goalCountAt(h,date)>0&&h.goalUnit){const gc=goalCountAt(h,date);row.push(typeof v==="number"?v+"/"+gc:"✓");}
        else{row.push("✓");}
      });
      rows.push(row);
    });
    return rows;
  }

  function exportHabitsCSV(){
    setExporting("habits_csv");
    const cutoffDays=range==="all"?3650:parseInt(range);
    const dates=[];
    for(let i=0;i<cutoffDays;i++){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toLocaleDateString("en-CA"));}
    const datesAsc=[...dates].reverse(); // oldest → newest for daily log
    const rows=[["HABIT SUMMARY"],...habitSummaryRows(),[],["DAILY LOG"],...habitDailyLogRows(datesAsc)];
    downloadCSV("momentum-habits-"+range+"days-"+new Date().toISOString().split("T")[0]+".csv",rows);
    setTimeout(()=>setExporting(null),1000);
  }

  // Item 36: plain-ASCII fallback — identical data, habit names stripped of emoji for apps that misrender them on CSV import
  function exportHabitsCSVPlain(){
    setExporting("habits_csv_plain");
    const cutoffDays=range==="all"?3650:parseInt(range);
    const dates=[];
    for(let i=0;i<cutoffDays;i++){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toLocaleDateString("en-CA"));}
    const datesAsc=[...dates].reverse();
    const rows=[["HABIT SUMMARY"],...habitSummaryRows(true),[],["DAILY LOG"],...habitDailyLogRows(datesAsc,true)];
    downloadCSV("momentum-habits-plain-"+range+"days-"+new Date().toISOString().split("T")[0]+".csv",rows);
    setTimeout(()=>setExporting(null),1000);
  }

  function goalsRows(){
    const rows=[["Goal","Priority","Deadline","Created","Progress%","Actions Total","Actions Done","Action","Action Done","Completed Date","Expected Result"]];
    goals.forEach(g=>{
      const done=g.actions.filter(a=>a.done).length;
      const pct=g.actions.length>0?Math.round(done/g.actions.length*100):0;
      if(g.actions.length===0){
        rows.push([g.title,g.priority||"",g.deadline||"",g.createdAt||"",pct+"%",0,0,"","","",""]);
      } else {
        g.actions.forEach((a,i)=>{
          rows.push([i===0?g.title:"",i===0?g.priority||"":"",i===0?g.deadline||"":"",i===0?g.createdAt||"":"",i===0?pct+"%":"",i===0?g.actions.length:"",i===0?done:"",a.action||"",a.done?"Yes":"No",a.doneAt||"",a.result||""]);
        });
      }
    });
    return rows;
  }
  function exportGoalsCSV(){
    setExporting("goals_csv");
    downloadCSV("momentum-goals-"+new Date().toISOString().split("T")[0]+".csv",goalsRows());
    setTimeout(()=>setExporting(null),1000);
  }

  function journalRows(){
    const MOODS=["Rough","Low","Okay","Good","Great"];
    const cutoffDays=range==="all"?3650:parseInt(range);
    const rows=[["Date","Title","Mood","Mood Score","Tags","Entry","Word Count"]];
    Object.entries(journals).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,raw])=>{
      const daysAgo=Math.floor((new Date()-new Date(date+"T12:00:00"))/86400000);
      if(daysAgo>cutoffDays)return;
      const e=typeof raw==="object"?raw:{note:raw||"",mood:null,tags:[],title:""};
      const wc=(e.note||"").trim().split(/\s+/).filter(Boolean).length;
      rows.push([date,e.title||"",e.mood!=null?MOODS[e.mood]:"",e.mood!=null?e.mood+1:"",(e.tags||[]).join("; "),e.note||"",wc]);
    });
    return rows;
  }
  function exportJournalCSV(){
    setExporting("journal_csv");
    downloadCSV("momentum-journal-"+range+"days-"+new Date().toISOString().split("T")[0]+".csv",journalRows());
    setTimeout(()=>setExporting(null),1000);
  }

  // AI Coach Review credit check — reads/writes the SAME shared credit pool AIModal uses (hg_ai_credits_{uid} / Firebase aiCredits), Firebase as source of truth
  async function checkAndDeductAICredits(n){
    const uid=user?.uid;
    const thisMonth=new Date().toISOString().slice(0,7);
    const key="hg_ai_credits_"+(uid||"guest");
    const resetKey="hg_ai_reset_"+(uid||"guest");
    const maxC=isPlus?50:0;
    let current=maxC;
    if(uid&&window._fb){
      try{
        const fbR=window._fb;
        const snap=await fbR.getDoc(fbR.doc(fbR.db,"users",uid));
        const data=snap.exists()?snap.data():{};
        current=data.aiCreditsResetMonth===thisMonth&&typeof data.aiCredits==="number"?data.aiCredits:maxC;
      }catch(e){
        const stored=localStorage.getItem(key),resetDate=localStorage.getItem(resetKey);
        current=resetDate===thisMonth&&stored!==null?parseInt(stored):maxC;
      }
    } else {
      const stored=localStorage.getItem(key),resetDate=localStorage.getItem(resetKey);
      current=resetDate===thisMonth&&stored!==null?parseInt(stored):maxC;
    }
    if(current<n)return false;
    const newC=current-n;
    localStorage.setItem(key,String(newC));
    localStorage.setItem(resetKey,thisMonth);
    if(uid&&window._fb){
      const fbR=window._fb;
      fbR.setDoc(fbR.doc(fbR.db,"users",uid),{aiCredits:newC,aiCreditsResetMonth:thisMonth},{merge:true}).catch(e=>console.error("PDF AI credit save err:",e));
    }
    return true;
  }
  // 3 credits per report — only this section costs anything; the rest of the PDF is pure calculation
  async function buildAICoachReview(habitRows,goalRiskRows,moodSummary){
    if(!isPlus)return{error:"plus"};
    const got=await checkAndDeductAICredits(3);
    if(!got)return{error:"credits"};
    try{
      const habitCtx=habitRows.slice(0,8).map(r=>r.name+": "+r.rate+"% ("+r.streak+"d streak)").join("; ");
      const goalCtx=goalRiskRows.slice(0,6).map(r=>r.title+": "+r.pct+"% done, "+r.riskLabel).join("; ");
      const idToken4=await firebase.auth().currentUser.getIdToken();
      const resp=await fetch("/api/ai",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+idToken4},
        body:JSON.stringify({
          creditCost:3,
          usageType:"pdf_report",
          model:"claude-haiku-4-5-20251001",
          max_tokens:900,
          system:"You are an AI habit and goal coach reviewing a user's Momentum app performance data. Return ONLY valid JSON, no markdown backticks. Format: {\"wentWell\":[\"...\"],\"needsImprovement\":[\"...\"],\"bottleneck\":\"...\",\"strategy\":[\"...\"]}. Rules: wentWell = 2-3 specific observations (max 15 words each) using the actual habit/goal names given; needsImprovement = 2-3 specific observations (max 15 words each); bottleneck = one sentence (max 22 words) naming the single biggest blocker; strategy = exactly 4 short concrete actions (max 14 words each) for the next 30 days. Be specific and direct, not generic.",
          messages:[{role:"user",content:"Habits (rate, streak): "+(habitCtx||"none")+"\nGoals (progress, risk): "+(goalCtx||"none")+"\nMood: "+moodSummary}]
        })
      });
      const data=await resp.json();
      if(!resp.ok||data.error)throw new Error("API error");
      const raw=data.content[0].text.replace(/```json|```/g,"").trim();
      return JSON.parse(raw);
    }catch(e){
      console.error("AI Coach Review error:",e);
      return{error:"failed"};
    }
  }

  async function exportPDF(){
    setExporting("pdf");
    const MOODS=["Rough","Low","Okay","Good","Great"];
    const MOOD_EMOJI=["😩","😞","😐","🙂","😊"];
    const WD=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const cutoffDays=range==="all"?3650:parseInt(range);
    const cutoffDate=(()=>{const d=new Date();d.setDate(d.getDate()-(cutoffDays-1));return d.toLocaleDateString("en-CA");})();
    const totalHabitDone=habits.reduce((s,h)=>s+Object.keys(h.log||{}).filter(d=>d>=cutoffDate&&isFullDoneOn(h,d,h.log[d])).length,0);
    const recentJournals=Object.entries(journals).sort((a,b)=>b[0].localeCompare(a[0])).filter(([d])=>Math.floor((new Date()-new Date(d+"T12:00:00"))/86400000)<=cutoffDays).slice(0,10);

    // ── Habit ranking + category performance (pure calc) ──
    const habitRows=habits.map(h=>{
      const total=Object.keys(h.log||{}).filter(d=>isFullDoneOn(h,d,h.log[d])).length;
      const firstDay=h.createdAt||Object.keys(h.log||{}).sort()[0]||new Date().toISOString().split("T")[0];
      const days=Math.max(1,Math.ceil((new Date()-new Date(firstDay+"T00:00:00"))/86400000));
      const rate=Math.min(100,Math.round(total/days*100));
      return{name:(h.icon||"")+" "+h.name,cat:h.cat||"Other",streak:h.streak||0,best:h.best||0,total,rate};
    }).sort((a,b)=>b.rate-a.rate);
    const catMap={};
    habitRows.forEach(r=>{if(!catMap[r.cat])catMap[r.cat]={sum:0,n:0};catMap[r.cat].sum+=r.rate;catMap[r.cat].n++;});
    const catRows=Object.entries(catMap).map(([cat,v])=>({cat,avg:Math.round(v.sum/v.n)})).sort((a,b)=>b.avg-a.avg);
    const bestStreakEver=habits.length>0?Math.max(0,...habits.map(h=>h.best||0)):0;

    // ── Goal deadline-risk analysis (pure calc — threshold logic, not AI) ──
    const goalRiskRows=goals.map(g=>{
      const done=g.actions.filter(a=>a.done).length;
      const pct=g.actions.length>0?Math.round(done/g.actions.length*100):0;
      let daysLeft=null;
      if(g.deadline)daysLeft=Math.ceil((new Date(g.deadline+"T00:00:00")-new Date())/86400000);
      let risk="green",riskLabel="On Track";
      if(daysLeft!=null){
        if(daysLeft<0){risk="red";riskLabel="Overdue";}
        else if(daysLeft<7&&pct<70){risk="red";riskLabel="Critical";}
        else if(daysLeft<14&&pct<50){risk="yellow";riskLabel="Behind Schedule";}
      }
      return{title:g.title,priority:g.priority||"",pct,deadline:g.deadline||"-",done,total:g.actions.length,risk,riskLabel};
    });
    // Goals Completed — from goalStats (permanent, never capped), since completed goals move out of the active goals array
    const goalsCompleted=(goalStats||[]).filter(s=>s.completedAt&&s.completedAt>=cutoffDate).length;

    // ── Mood distribution (pure calc) ──
    const moodCounts=[0,0,0,0,0];
    let moodDaysTotal=0;
    Object.entries(journals).forEach(([d,raw])=>{
      if(d<cutoffDate)return;
      const e=typeof raw==="object"?raw:{mood:null};

  // ── Analytics Summary CSV — single-page rollup, pure calculation, no AI cost ──
  function analyticsSummaryRows(){
    const cutoffDays=range==="all"?3650:parseInt(range);
    const todayStr=new Date().toLocaleDateString("en-CA");
    const cutoffDate=(()=>{const d=new Date();d.setDate(d.getDate()-(cutoffDays-1));return d.toLocaleDateString("en-CA");})();

    // Aggregate completion rate across all habits within the selected range
    let totalDone=0,totalTracked=0;
    habits.forEach(h=>{
      const createdAt=h.createdAt||Object.keys(h.log||{}).sort()[0]||todayStr;
      const createdDaysAgo=Math.max(1,Math.ceil((new Date()-new Date(createdAt+"T00:00:00"))/86400000));
      const daysTracked=Math.min(cutoffDays,createdDaysAgo);
      const done=Object.keys(h.log||{}).filter(d=>d>=cutoffDate&&isFullDoneOn(h,d,h.log[d])).length;
      totalDone+=done;totalTracked+=daysTracked;
    });
    const completionRate=totalTracked>0?Math.round((totalDone/totalTracked)*100):0;
    const bestStreakEver=habits.length>0?Math.max(0,...habits.map(h=>h.best||0)):0;

    // Focus hours from Pomodoro history (localStorage — same source FocusChart uses)
    let focusMins=0;
    try{
      const hist=JSON.parse(localStorage.getItem("hg_pomo_history")||"[]");
      focusMins=hist.filter(s=>s.date&&s.date>=cutoffDate).reduce((s,x)=>s+(x.mins||0),0);
    }catch(e){}

    // Journal days with actual content, within range
    const journalDays=Object.entries(journals).filter(([d,e])=>{
      if(d<cutoffDate)return false;
      const entry=typeof e==="object"?e:{note:e||"",mood:null};
      return (entry.note&&entry.note.trim())||entry.mood!=null;
    }).length;

    // Goals completed within range (goalStats is permanent, never capped — accurate even after goalHistory trims)
    const goalsCompleted=(goalStats||[]).filter(s=>s.completedAt&&s.completedAt>=cutoffDate).length;

    // Best day of week — highest average habits-completed count
    const weekdayTotals=[0,0,0,0,0,0,0],weekdayCounts=[0,0,0,0,0,0,0];
    for(let i=0;i<cutoffDays;i++){
      const d=new Date();d.setDate(d.getDate()-i);
      const dateStr=d.toLocaleDateString("en-CA");
      const doneCount=habits.filter(h=>{const v=h.log&&h.log[dateStr];return isFullDoneOn(h,dateStr,v);}).length;
      weekdayTotals[d.getDay()]+=doneCount;weekdayCounts[d.getDay()]++;
    }
    const WD=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    let bestDay="-",bestAvg=-1;
    weekdayTotals.forEach((tot,i)=>{
      if(weekdayCounts[i]===0)return;
      const avg=tot/weekdayCounts[i];
      if(avg>bestAvg){bestAvg=avg;bestDay=WD[i];}
    });

    return [
      ["Metric","Value"],
      ["Active Habits",habits.length],
      ["Completion Rate",completionRate+"%"],
      ["Best Streak Ever",bestStreakEver+"d"],
      ["Total Focus Hours",(focusMins/60).toFixed(1)],
      ["Journal Days",journalDays],
      ["Goals Completed",goalsCompleted],
      ["Best Day",bestDay],
    ];
  }

  // ── Data Pack ZIP — bundles every export into one download (Momentum_DataPack_*.zip) ──
  async function exportDataPack(){
    setExporting("datapack");
    try{
      const cutoffDays=range==="all"?3650:parseInt(range);
      const dates=[];
      for(let i=0;i<cutoffDays;i++){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toLocaleDateString("en-CA"));}
      const datesAsc=[...dates].reverse();
      const toCSV=rows=>rows.map(r=>r.map(cell=>{
        const s=String(cell==null?"":cell);
        return s.includes(",")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s;
      }).join(",")).join("\n");
      const zip=new JSZip();
      zip.file("analytics_summary.csv","\uFEFF"+toCSV(analyticsSummaryRows()));
      zip.file("habits_summary.csv","\uFEFF"+toCSV(habitSummaryRows()));
      zip.file("habits_daily.csv","\uFEFF"+toCSV(habitDailyLogRows(datesAsc)));
      zip.file("goals.csv","\uFEFF"+toCSV(goalsRows()));
      zip.file("journal.csv","\uFEFF"+toCSV(journalRows()));
      const blob=await zip.generateAsync({type:"blob"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download="Momentum_DataPack_"+range+"days_"+new Date().toISOString().split("T")[0]+".zip";a.click();
      URL.revokeObjectURL(url);
    }catch(e){
      console.error("Data Pack export error:",e);
    }
    setTimeout(()=>setExporting(null),1000);
  }

// Item 39: new referral tier ladder — 1→7d, 5→1mo, 10→2mo, 15→3mo, nothing beyond 15. Hard 90-day lifetime cap regardless of timing/order.
const REFERRAL_TIERS=[{count:1,days:7},{count:5,days:30},{count:10,days:60},{count:15,days:90}];
const REFERRAL_LIFETIME_CAP_DAYS=90;
function referralEntitledDays(referralCount){
  let entitled=0;
  REFERRAL_TIERS.forEach(tier=>{if(referralCount>=tier.count)entitled=tier.days;});
  return Math.min(REFERRAL_LIFETIME_CAP_DAYS,entitled);
}
// Computes what to merge-write for a referrer's OWN milestone ladder (separate from any signup bonus they personally received).
// currentPlan/currentExpiry should be the plan ignoring this grant (e.g. "free" if just expired). Returns null if nothing to change —
// either already on Plus (banked silently, untouched) or no new tier has been crossed since the last grant.
function computeReferralGrant(currentPlan,currentExpiry,alreadyGranted,referralCount){
  if(currentPlan==="plus")return null;
  const entitled=referralEntitledDays(referralCount);
  const delta=entitled-(alreadyGranted||0);
  if(delta<=0)return null;
  const now=new Date();
  const curExp=currentExpiry?new Date(currentExpiry):null;
  const base=(curExp&&curExp>now)?curExp:now; // never reduces existing/paid time — only ever extends forward
  const newExpiry=new Date(base.getTime()+delta*86400000);
  return{plan:"pro",planExpiry:newExpiry.toISOString(),referralBonusDaysGranted:entitled};
}

  function getMoImage(){
    const now=new Date();
    const mo=now.getMonth()+1,dd=now.getDate(),hr=now.getHours();
    const today=now.toISOString().split('T')[0];

    // 1. Seasonal (date-based — highest priority)
    if((mo===10&&dd>=20)||(mo===11&&dd<=5)) return '/mo/mo-diwali.png';
    if(mo===12&&(dd===24||dd===25||dd===26)) return '/mo/mo-christmas.png';
    if((mo===12&&dd===31)||(mo===1&&dd===1)) return '/mo/mo-newyear.png';

    // 2. Achievement (just happened — check localStorage flags set by app on events)
    const ach=localStorage.getItem('mo_ach_flag');
    if(ach){
      try{const a=JSON.parse(ach);if((Date.now()-a.ts)<300000){// within 5min
        if(a.type==='all_habits') return '/mo/mo-jump.png';
        if(a.type==='badge')      return '/mo/mo-shocked.png';
        if(a.type==='challenge')  return '/mo/mo-trophy.png';
        if(a.type==='milestone')  return '/mo/mo-celebrate.png';
      }else{localStorage.removeItem('mo_ach_flag');}}catch(e){}
    }

    // 3. Habit data checks
    const hh=habits||[];
    const todayH=hh.filter(h=>{
      const lg=h.log&&h.log[today];
      if(!lg) return false;
      if(h.goalCount>0) return (lg.count||0)>=h.goalCount;
      return !!lg.done;
    });
    const allDoneToday=hh.length>0&&todayH.length===hh.length;
    const bestStreak=hh.length>0?Math.max(...hh.map(h=>h.streak||0)):0;
    const lastLogin=parseInt(localStorage.getItem('mo_last_login')||'0');
    const daysSince=lastLogin?Math.floor((Date.now()-lastLogin)/(86400000)):0;

    // Update last login timestamp
    if(!lastLogin||daysSince>0) localStorage.setItem('mo_last_login',Date.now().toString());

    // 3a. Urgency / Warning
    if(daysSince>=3) return '/mo/mo-comeback.png';
    if(hr>=19&&!allDoneToday&&bestStreak>=3) return '/mo/mo-clock.png';

    // 3b. Positive achievement state
    if(allDoneToday) return '/mo/mo-jump.png';
    if(bestStreak>=30) return '/mo/mo-flex.png';
    if(bestStreak>=7) return '/mo/mo-fist-pump.png';
    if(hr<10&&todayH.length===0&&hh.length>0) return '/mo/mo-stretch.png';

    // 4. Idle rotation — changes every 4-6 hours, stored in localStorage
    const IDLE=['/mo/mo-meditate.png','/mo/mo-idle.png','/mo/mo-sit-relax.png','/mo/mo-thinking.png','/mo/mo-wink.png'];
    const INTERVAL=5*3600*1000;// 5 hours
    const stored=localStorage.getItem('mo_idle_state');
    let idx=0,ts=0;
    try{const p=JSON.parse(stored||'{}');idx=p.idx||0;ts=p.ts||0;}catch(e){}
    if(Date.now()-ts>INTERVAL){
      idx=(idx+1)%IDLE.length;
      localStorage.setItem('mo_idle_state',JSON.stringify({idx,ts:Date.now()}));
    }
    return IDLE[idx];
  }

  React.useEffect(()=>{
    setMoImg(getMoImage());
    // Refresh every 30 minutes while app is open
    const interval=setInterval(()=>setMoImg(getMoImage()),30*60*1000);
    return()=>clearInterval(interval);
  },[habits,goals]);

  React.useEffect(()=>{
    if(!window.visualViewport)return;
    const h=()=>setVis(window.visualViewport.height>=window.innerHeight*0.72);
    window.visualViewport.addEventListener('resize',h);
    return()=>window.visualViewport.removeEventListener('resize',h);
  },[]);

  function pd(e){
    e.preventDefault();
    dr.current={on:false,sx:e.clientX,sy:e.clientY,ex:pos.x,ey:pos.y};
    lt.current=setTimeout(()=>{dr.current.on=true;setDrag(true);if(ref.current)ref.current.style.transform='scale(1.18)';},300);
  }
  function pm(e){
    if(!dr.current.on)return;
    e.preventDefault();
    var nx=dr.current.ex+(e.clientX-dr.current.sx);
    var ny=dr.current.ey+(e.clientY-dr.current.sy);
    nx=Math.max(0,Math.min(window.innerWidth-SIZE,nx));
    ny=Math.max(0,Math.min(window.innerHeight-SIZE-55,ny));
    setPos({x:nx,y:ny});
  }
  function pu(e){
    clearTimeout(lt.current);
    if(dr.current.on){
      dr.current.on=false;setDrag(false);
      if(ref.current)ref.current.style.transform='scale(1)';
      var snapX=pos.x<window.innerWidth/2?14:window.innerWidth-SIZE-14;
      var np={x:snapX,y:pos.y};
      setPos(np);
      try{localStorage.setItem(PK,JSON.stringify(np));}catch(err){}
    } else {
      var dx=Math.abs(e.clientX-dr.current.sx),dy=Math.abs(e.clientY-dr.current.sy);
      if(dx<10&&dy<10)openAIModal();
    }
  }
  // R9-C/R11-B: suppress on upgrade paywall and journal writing
  if(!user||!vis||activeModal==="upgrade"||activeModal==="journal")return null;
  return(
    <div ref={ref} onPointerDown={pd} onPointerMove={pm} onPointerUp={pu}
      onPointerCancel={()=>{clearTimeout(lt.current);dr.current.on=false;setDrag(false);}}
      style={{position:'fixed',left:pos.x,top:pos.y,width:SIZE,height:SIZE,
        borderRadius:'50%',zIndex:1200,cursor:drag?'grabbing':'pointer',
        touchAction:'none',userSelect:'none',WebkitUserSelect:'none',
        display:'flex',alignItems:'center',justifyContent:'center',
        background:'radial-gradient(circle,rgba(245,180,50,0.18) 0%,transparent 70%)',
        boxShadow:'0 0 0 2px rgba(245,200,66,0.35),0 4px 24px rgba(0,0,0,0.6)',
        animation:drag?'none':'moFloatBtn 3s ease-in-out infinite',
      }}>
      <img src={moImg} alt="Mo" draggable={false}
        style={{width:96,height:96,objectFit:'cover',objectPosition:'center top',
          pointerEvents:'none',filter:'drop-shadow(0 0 12px rgba(245,180,50,0.7))'}}
        onError={e=>{e.target.onerror=null;e.target.src='/mo/mo-meditate.png';}}/>
    </div>
  );
}

function DeleteAccountModal({t,user,handleLogout,onClose}){
  const[step,setStep]=React.useState(1);
  const[deleting,setDeleting]=React.useState(false);
  const[confirmText,setConfirmText]=React.useState("");
  const fb=window._fb;

  async function handleDelete(){
    if(confirmText.trim().toUpperCase()!=="DELETE")return;
    setDeleting(true);
    try{
      // 1. Delete goalHistory subcollection
      try{
        const ghRef=fb.collection(fb.db,"users",user.uid,"goalHistory");
        const ghSnap=await fb.getDocs(ghRef);
        const batch=fb.writeBatch(fb.db);
        ghSnap.forEach(d=>batch.delete(d.ref));
        await batch.commit();
      }catch(e){console.warn("Subcollection delete err:",e);}
      // 2. Delete main Firestore document
      await fb.deleteDoc(fb.doc(fb.db,"users",user.uid));
      // 3. Re-authenticate then delete Firebase Auth user
      try{
        await fb.reauthenticateWithPopup(fb.auth.currentUser,fb.provider);
        await fb.deleteUser(fb.auth.currentUser);
      }catch(e){console.warn("Reauth/delete err:",e);}
      // 4. Clear local storage
      try{
        localStorage.removeItem("momentum_gh_"+user.uid);
        localStorage.removeItem("momentum_gs_"+user.uid);
        localStorage.removeItem("hg_notif");
        localStorage.removeItem("hg_reminders");
        localStorage.removeItem("mo_pos3");
      }catch(e){}
      await handleLogout();
    }catch(e){
      console.error("Delete account err:",e);
      alert("Something went wrong. Please contact momentumtrackerappofficial@gmail.com");
      setDeleting(false);
    }
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:9500}}>
      <div style={{background:"#18181c",border:"1px solid #2a2a32",borderRadius:"24px 24px 0 0",padding:"28px 22px 40px",width:"100%",maxWidth:480,animation:"pageIn 0.3s ease"}}>
        {step===1&&(
          <>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:36,marginBottom:8}}>⚠️</div>
              <div style={{fontSize:17,fontWeight:800,color:"#ff4444",marginBottom:8}}>Delete Account?</div>
              <div style={{fontSize:12,color:"#7a7a8c",lineHeight:1.7}}>This will permanently delete your Momentum account and all data. This action <strong style={{color:"#ff4444"}}>cannot be undone</strong>.</div>
            </div>
            <div style={{background:"#1a0a0a",border:"1px solid #ff444433",borderRadius:14,padding:"14px 16px",marginBottom:20,fontSize:12,color:"#aaa",lineHeight:1.8}}>
              <div style={{fontWeight:700,color:"#ff6666",marginBottom:6}}>Permanently deleted:</div>
              <div>• All habits, streaks, and completion history</div>
              <div>• All goals and actions</div>
              <div>• All journal entries and mood logs</div>
              <div>• Your account and login</div>
              <div style={{marginTop:8,color:"#666"}}>Active subscriptions are not automatically cancelled — cancel in Razorpay/Play Store first.</div>
            </div>
            <button onClick={()=>setStep(2)} style={{width:"100%",padding:"13px",borderRadius:14,border:"1px solid #ff444444",background:"#ff444422",color:"#ff6666",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:10}}>Continue to Delete</button>
            <button onClick={onClose} style={{width:"100%",padding:"12px",borderRadius:14,border:"1px solid #2a2a32",background:"transparent",color:"#888",fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancel</button>
          </>
        )}
        {step===2&&(
          <>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:17,fontWeight:800,color:"#ff4444",marginBottom:8}}>Final Confirmation</div>
              <div style={{fontSize:12,color:"#7a7a8c",lineHeight:1.6}}>Type <strong style={{color:"#ff6666",fontFamily:"monospace"}}>DELETE</strong> to permanently delete your account.</div>
            </div>
            <input
              value={confirmText}
              onChange={e=>setConfirmText(e.target.value)}
              maxLength={10}
              placeholder="Type DELETE to confirm"
              style={{width:"100%",padding:"13px 16px",borderRadius:12,border:"1px solid "+(confirmText.trim().toUpperCase()==="DELETE"?"#ff4444":"#2a2a32"),background:"#111116",color:"#f5f5f5",fontSize:14,fontFamily:"monospace",textAlign:"center",marginBottom:16,boxSizing:"border-box"}}
            />
            <button
              onClick={handleDelete}
              disabled={deleting||confirmText.trim().toUpperCase()!=="DELETE"}
              style={{width:"100%",padding:"13px",borderRadius:14,border:"none",background:confirmText.trim().toUpperCase()==="DELETE"?"#ff4444":"#222",color:confirmText.trim().toUpperCase()==="DELETE"?"#fff":"#555",fontWeight:800,fontSize:14,cursor:deleting||confirmText.trim().toUpperCase()!=="DELETE"?"not-allowed":"pointer",marginBottom:10,transition:"all 0.2s"}}>

          </>
        )}
      </div>
    </div>
  );
}

  // Notifications — poll every 30s, fire when time matches
  useEffect(()=>{
    if(!notif)return;
    if(typeof Notification==="undefined"||Notification.permission!=="granted")return;

    const firedKey="hg_notif_fired"; // track fired reminders today
    function getFired(){try{return JSON.parse(localStorage.getItem(firedKey)||"{}");}catch{return{};}}
    function markFired(id){const f=getFired();f[id]=td();localStorage.setItem(firedKey,JSON.stringify(f));}
    function wasFiredToday(id){return getFired()[id]===td();}
    function cleanOldFired(){const f=getFired();const today2=td();Object.keys(f).forEach(k=>{if(f[k]!==today2)delete f[k];});localStorage.setItem(firedKey,JSON.stringify(f));}

    function checkAndFire(){
      cleanOldFired();
      const now=new Date();
      const hh=String(now.getHours()).padStart(2,"0");
      const mm=String(now.getMinutes()).padStart(2,"0");
      const currentTime=hh+":"+mm;
      const today2=td();

      // Also check habit-specific reminders
      const habitReminders=habits.filter(h=>h.reminder&&h.reminder.enabled&&h.reminder.time&&h.reminder.time.length===5);
      const globalReminders=reminders.filter(r=>r.enabled&&r.time);
      const allReminders=[
        ...globalReminders.map(r=>({id:r.id||r.label,time:r.time,label:r.label,isHabit:false})),
        ...habitReminders.map(h=>({id:"habit_"+h.id,time:h.reminder.time,label:h.icon+" "+h.name,isHabit:true,habitId:h.id})),
      ];

      allReminders.forEach(r=>{
        if(!r.time||r.time!==currentTime)return;
        const fireId=r.id+"_"+r.time+"_"+today2;
        if(wasFiredToday(fireId))return;

        // Build notification body
        let body="";
        if(r.isHabit){
          const h=habits.find(hb=>hb.id===r.habitId);
          const done=h&&h.log&&h.log[today2];
          const hasGoal=h&&h.goalCount>0&&h.goalUnit;
          const count=h&&typeof h.log[today2]==="number"?h.log[today2]:done?h.goalCount:0;
          body=done
            ?(hasGoal?r.label+" — "+count+"/"+h.goalCount+" "+h.goalUnit+" done! ✅":r.label+" — Already done today! 🎉")
            :r.label+" — Time to build that streak! 🔥";
        } else {
          const undone=habits.filter(hb=>{
            const hasGoal=hb.goalCount>0&&hb.goalUnit;
            const logVal=hb.log&&hb.log[today2];
            return hasGoal?(!(typeof logVal==="number"&&logVal>=hb.goalCount)):!logVal;
          });
          body=undone.length>0
            ?(r.label+" — "+undone.length+" habit"+(undone.length>1?"s":"")+" remaining today! 🔥")
            :r.label+" — All habits done today! 🎉";
        }

        // Show browser notification
        try{
          const n=new Notification("⚡ Momentum",{
            body,
            icon:"/icon-192.png",
            badge:"/icon-192.png",
            tag:fireId,
            requireInteraction:false,
            vibrate:[200,100,200],
          });
          n.onclick=()=>{window.focus();n.close();};
        }catch(e){
          // Try SW notification as fallback
          try{
            if(navigator.serviceWorker&&navigator.serviceWorker.controller){
              navigator.serviceWorker.ready.then(reg=>{
                reg.showNotification("⚡ Momentum",{body,icon:"/icon-192.png",tag:fireId,vibrate:[200,100,200]});
              });
            }
          }catch(e2){}
        }

        // Vibrate (mobile)
        try{if(navigator.vibrate)navigator.vibrate([300,100,300,100,500]);}catch(e){}

        // Play selected sound
        try{playSound(notifSound);}catch(e){}

        markFired(fireId);
      });
    }

    // Check immediately and every 30 seconds
    checkAndFire();
    const iv=setInterval(checkAndFire,30000);
    return()=>clearInterval(iv);
  },[notif,reminders,habits,notifSound]);

        setHabits(d.habits||[]);setGoals(d.goals||[]);setJournals(d.journals||{});
        // Fix 12: Load goalHistory from localStorage cache first (instant), then sync from subcollection
        const ghCacheKey="momentum_gh_"+uid;
        const ghCached=localStorage.getItem(ghCacheKey);
        if(ghCached){try{setGoalHistory(JSON.parse(ghCached));}catch(e){}}
        // Load from subcollection in background
        try{
          const ghRef=fb.collection(fb.db,"users",uid,"goalHistory");
          const ghSnap=await fb.getDocs(ghRef);
          const ghArr=[];ghSnap.forEach(d2=>ghArr.push({id:d2.id,...d2.data()}));
          ghArr.sort((a,b)=>(a.completedAt||"").localeCompare(b.completedAt||""));
          setGoalHistory(ghArr);
          localStorage.setItem(ghCacheKey,JSON.stringify(ghArr));
        }catch(e){}
        // Permanent goalStats — never capped/deleted, used for Yearly Review accuracy
        const gsCacheKey="momentum_gs_"+uid;
        const gsCached=localStorage.getItem(gsCacheKey);
        if(gsCached){try{setGoalStats(JSON.parse(gsCached));}catch(e){}}
        if(d.goalStats)setGoalStats(d.goalStats);
        const loadedPlan=d.plan||"free";
        const loadedExpiry=d.planExpiry||null;
        setTk(d.themeKey||"obsidian");setPk(loadedPlan);setPe(loadedExpiry);
        // Auto-downgrade: plan expired or legacy early_access — figure out the base plan first, ignoring referrals
        const isExpiredPlan=(loadedPlan==="pro"||loadedPlan==="plus")&&loadedExpiry&&new Date()>new Date(loadedExpiry);
        const isLegacyEarly=loadedPlan==="early_access";
        const basePlan=(isExpiredPlan||isLegacyEarly)?"free":loadedPlan;
        const baseExpiry=(isExpiredPlan||isLegacyEarly)?null:loadedExpiry;
        let finalWrite=(isExpiredPlan||isLegacyEarly)?{plan:"free",planExpiry:null}:null;
        // Item 39: check referral milestones every login — covers normal Free/Pro accumulation AND Plus-banked rewards becoming
        // redeemable the moment Plus lapses (uses their CURRENT live referral count, not a frozen snapshot from while on Plus)
        try{
          const refQ=fb.query(fb.collection(fb.db,"users"),fb.where("referredBy","==",uid));
          const refSnap=await fb.getDocs(refQ);
          const grant=computeReferralGrant(basePlan,baseExpiry,d.referralBonusDaysGranted||0,refSnap.size);
          if(grant)finalWrite={...(finalWrite||{}),...grant};
        }catch(e){console.error("Referral grant check err:",e);}
        if(finalWrite){
          await fb.setDoc(ref,finalWrite,{merge:true});
          setPk(finalWrite.plan);setPe(finalWrite.planExpiry||null);
        }
        if(d.displayName)setDisplayName(d.displayName);
        if(d.signupDate)setSignupDate(d.signupDate);
        if(d.userNumber)setUserNumber(d.userNumber);
        if(d.birthday)setBirthday(d.birthday);
        if(d.momentumId)setMomentumId(d.momentumId);
      } else {
        // New user
        let num=101;
        await fb.runTransaction(fb.db,async tx=>{
          const cRef=fb.doc(fb.db,"meta","userCount");
          const cSnap=await tx.get(cRef);
          num=cSnap.exists()?(cSnap.data().count||0)+1:1;
          tx.set(cRef,{count:num},{merge:true});
        });
        // Check for referral code in URL — Item 39: full UIDs are case-sensitive, so no upper/lowercasing here
        const urlRef=new URLSearchParams(window.location.search).get("ref");
        const referredBy=urlRef||null;
        // Item 39: referred signups get 7 days Pro free immediately — a one-time, isolated grant separate from
        // this user's own future referrer ladder (which starts fresh at 0 the moment THEY make their first referral)
        let plan2="free",expStr=null;
        if(referredBy){
          plan2="pro";
          const exp=new Date();exp.setDate(exp.getDate()+7);
          expStr=exp.toISOString();
        }
        setPk(plan2);setPe(expStr);

        await fb.setDoc(ref,{habits:[],goals:[],journals:{},themeKey:"obsidian",plan:plan2,planExpiry:expStr,signupDate:today,userNumber:num,email,referredBy:referredBy||null,referralBonusDaysGranted:0});
      }
    }catch(e){console.error("Load err:",e);}
  }

  function toggleH(id){
    const h=habits.map(hb=>{
      if(hb.id!==id)return hb;
      const log={...hb.log};
      const hasGoal=hb.goalCount>0&&hb.goalUnit;
      if(hasGoal){
        // Count-based: increment count, mark done only when count >= goalCount
        const current=typeof log[today]==="number"?log[today]:log[today]?hb.goalCount:0;
        if(current>=hb.goalCount){
          // Already complete — reset to 0 (untick all)
          delete log[today];
        } else {
          // Increment by 1
          const next=current+1;
          log[today]=next>=hb.goalCount?hb.goalCount:next;
        }
      } else {
        // Simple toggle
        const was=!!log[today];
        if(was)delete log[today];else log[today]=true;
      }
      const isDone=hasGoal?(typeof log[today]==="number"&&log[today]>=hb.goalCount):!!log[today];
      // Streak requires FULL completion only
      const isFullDone=(dateStr,lg,hbObj)=>isFullDoneOn(hbObj,dateStr,lg[dateStr]);
      let streak=0,best=hb.best||0;
      const d=new Date();
      while(true){const s=d.toLocaleDateString("en-CA");if(!isFullDone(s,log,hb))break;streak++;d.setDate(d.getDate()-1);}
      if(streak>best)best=streak;
      if(isDone&&BADGES.some(b=>b.d===streak)){setConfetti(true);showToast("🏆 "+streak+"-day streak badge!","badge");}
      if(isDone&&streak===7&&!localStorage.getItem("hg_reviewed")){
        setTimeout(()=>setShowReview(true),2000);
      }
      return{...hb,log,streak,best};
    });
    setHabits(h);save(h,goals,journals,tk);
  }

  // Streak Freeze — Plus only, 1 use per calendar month per habit
  function applyStreakFreeze(id){
    if(!plan.streakFreeze){showUp("🛡️ Streak Freeze is a Plus feature! Protect your streak once a month.");return;}
    const monthKey=today.slice(0,7); // "2026-05"
    const freezeKey="hg_freeze_"+id+"_"+monthKey;
    if(localStorage.getItem(freezeKey)){showToast("Streak Freeze already used this month for this habit.","info");return;}
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    const yd=yesterday.toLocaleDateString("en-CA");
    const h=habits.map(hb=>{
      if(hb.id!==id)return hb;
      const log={...hb.log};
      // Mark yesterday as "freeze" so streak continues
      if(!log[yd])log[yd]="freeze";
      // Recalculate streak — full completion only (Fix 1 consistency); "freeze" marker always counts as full
      const isFullDone=(dateStr,lg,hbObj)=>{const v=lg[dateStr];if(v==="freeze")return true;return isFullDoneOn(hbObj,dateStr,v);};
      let streak=0,best=hb.best||0;
      const d=new Date();
      while(true){const s=d.toLocaleDateString("en-CA");if(!isFullDone(s,log,hb))break;streak++;d.setDate(d.getDate()-1);}
      if(streak>best)best=streak;
      return{...hb,log,streak,best};
    });
    setHabits(h);save(h,goals,journals,tk);
    localStorage.setItem(freezeKey,"1");
    showToast("🛡️ Streak Freeze used! Streak protected.","badge");
  }
