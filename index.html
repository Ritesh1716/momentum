const UNIT_SUGGESTIONS={Health:["glasses","litres","ml","cups"],Fitness:["minutes","km","reps","sets","steps"],Learning:["pages","hours","problems","chapters"],Mindfulness:["minutes","sessions"],Work:["hours","tasks","calls"],Personal:["minutes","times"],Finance:["minutes","tasks"],Social:["minutes","calls"],Focus:["minutes","sessions"],default:["times","minutes","hours"]};

// AddHabitForm — defined OUTSIDE App so it never re-renders on App state changes
function AddHabitForm({t,onAdd,onClose}){
  const[name,setName]=React.useState("");
  const[icon,setIcon]=React.useState("⭐");
  const[cat,setCat]=React.useState("Health");
  const[color,setColor]=React.useState("#f5c842");
  const[freq,setFreq]=React.useState("daily");
  const[freqDays,setFreqDays]=React.useState([]);
  const[freqTimes,setFreqTimes]=React.useState(3);
  const[goalCount,setGoalCount]=React.useState("");
  const[goalUnit,setGoalUnit]=React.useState("");
  const[remTime,setRemTime]=React.useState("");

  const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const sug={Health:["glasses","litres","ml"],Fitness:["minutes","km","reps","steps"],Learning:["pages","hours","problems"],Mindfulness:["minutes","sessions"],Work:["hours","tasks","calls"]}[cat]||["minutes","sessions"];

  function handleAdd(){
    if(!name.trim())return;
    onAdd({name:name.trim(),icon,cat,color,freq,freqDays,freqTimes:parseInt(freqTimes)||3,goalCount:parseInt(goalCount)||0,goalUnit,remTime});
  }

  return React.createElement("div",{style:{background:t.card,border:`1px solid ${t.accent}44`,borderRadius:14,padding:16}},
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      React.createElement("div",{style:{fontSize:13,fontWeight:800,color:t.text}},"✨ Add New Habit"),
      React.createElement("button",{onClick:onClose,style:{background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:20,lineHeight:1,padding:"0 4px"}},"×")
    ),
    // Icon + Name
    React.createElement("div",{style:{display:"flex",gap:8,marginBottom:12}},
      React.createElement("input",{value:icon,onChange:e=>setIcon(e.target.value),style:{width:48,padding:"10px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,textAlign:"center",fontSize:20,flexShrink:0}}),
      React.createElement("input",{value:name,onChange:e=>setName(e.target.value),onKeyDown:e=>e.key==="Enter"&&handleAdd(),placeholder:"Habit name...",style:{flex:1,padding:"10px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:14}})
    ),
    // Category + Color

function HabitDetailPage({t,habit,habits,setHabits,saveF,back,onShare,onFreeze,plan}){
  const today=td();
  const log=habit.log||{};
  const doneToday=!!log[today];
  const total=Object.values(log).filter(Boolean).length;
  const createdDaysAgo=habit.createdAt?Math.max(1,Math.ceil((new Date()-new Date(habit.createdAt))/86400000)):Math.max(1,Object.keys(log).length);
  const rate=Math.round((total/createdDaysAgo)*100);
  const hColor=habit.color||t.accent;
  const hasGoal=habit.goalCount>0&&habit.goalUnit;
  // Tile count per date — stored in habit log as number or true
  const todayCount=typeof log[today]==="number"?log[today]:doneToday?habit.goalCount:0;
  const goalCount=habit.goalCount||1;
  const tilePct=hasGoal?Math.min(100,Math.round((todayCount/goalCount)*100)):doneToday?100:0;
  // This week
  const week7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week7.push(d.toISOString().split("T")[0]);}
  const WLBLS=["Mo","Tu","We","Th","Fr","Sa","Su"];
  // Month calendar
  const now=new Date();const yr=now.getFullYear();const mo=now.getMonth();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const firstDay=new Date(yr,mo,1).getDay();
  const monthDone=Array.from({length:daysInMonth}).filter((_,i)=>{const d=`${yr}-${String(mo+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;return!!log[d];}).length;
  // Week/month rates
  const weekDone=week7.filter(d=>!!log[d]).length;
  const weekRate=Math.round((weekDone/7)*100);
  const monthRate=Math.round((monthDone/daysInMonth)*100);
  // Note
  const noteKey=`hg_habit_notes_${habit.id}_${today}`;
  const[note,setNote]=useState(()=>localStorage.getItem(noteKey)||"");
  function saveNote(v){setNote(v);localStorage.setItem(noteKey,v);}
  // History — last 6 months
  function getHistory(){
    const months={};Object.entries(log).forEach(([d,v])=>{if(!v)return;const[y,m]=d.split("-");const k=`${y}-${m}`;if(!months[k])months[k]=[];months[k].push(d);});
    return Object.entries(months).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);
  }
  // Toggle tile
  function tapTile(i){
    if(!hasGoal){return;}
    const newCount=i+1===todayCount?i:i+1;
    const newLog={...log,[today]:newCount>=goalCount?goalCount:newCount};
    const newHabits=habits.map(h=>h.id!==habit.id?h:{...h,log:newLog,streak:h.streak});
    setHabits(newHabits);saveF(newHabits);
  }
  function toggleDone(){
    const newLog={...log};
    if(doneToday)delete newLog[today];else newLog[today]=hasGoal?goalCount:true;
    let streak=0,best=habit.best||0;
    const d=new Date();
    while(true){const s=d.toISOString().split("T")[0];if(!newLog[s])break;streak++;d.setDate(d.getDate()-1);}
    if(streak>best)best=streak;
    const newHabits=habits.map(h=>h.id!==habit.id?h:{...h,log:newLog,streak,best});
    setHabits(newHabits);saveF(newHabits);
  }
  const isDone=hasGoal?(todayCount>=goalCount):doneToday;
  return(
    <div style={{minHeight:"100vh",background:t.bg,color:t.text}}>
      {/* Colored header */}
      <div style={{background:hColor+"22",borderBottom:`3px solid ${hColor}`,padding:"16px 16px 14px"}}>
        <button onClick={back} style={{background:"none",border:"none",color:hColor,cursor:"pointer",fontSize:13,fontWeight:700,marginBottom:10,padding:0}}>← Back</button>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:32}}>{habit.icon}</span>
          <div>
            <div style={{fontSize:18,fontWeight:800,color:t.text}}>{habit.name}</div>
            <span style={{fontSize:11,padding:"2px 9px",borderRadius:20,background:hColor+"33",color:hColor,fontWeight:600}}>{habit.cat}</span>
          </div>
        </div>
      </div>
      <div style={{padding:"16px 16px 120px"}}>
        {/* Ring + done button */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:18}}>
          <Ring pct={tilePct} sz={110} sw={11} col={isDone?t.success:hColor} lbl={hasGoal?`${todayCount}/${goalCount} ${habit.goalUnit}`:"Today"} t={t}/>
          <div style={{fontSize:13,fontWeight:700,color:isDone?t.success:t.muted,marginTop:8,marginBottom:12}}>{isDone?"DONE TODAY ✅":"LET'S GO! 💪"}</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={toggleDone} style={{padding:"11px 28px",borderRadius:12,border:"none",background:isDone?t.success:hColor,color:"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>{isDone?"Undo ✕":"Mark Done ✓"}</button>
            {habit.streak>=7&&<button onClick={()=>onShare&&onShare(habit)} style={{padding:"11px 14px",borderRadius:12,border:`1px solid ${hColor}44`,background:hColor+"18",color:hColor,fontWeight:700,cursor:"pointer",fontSize:13}}>📤 Share</button>}
            {habit.streak>0&&(()=>{
              const monthKey=new Date().toISOString().slice(0,7);
              const freezeKey=`hg_freeze_${habit.id}_${monthKey}`;

// Web Audio sound player
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Resume context (required after user gesture on mobile)
    if(ctx.state==="suspended")ctx.resume();
    const master=ctx.createGain();
    master.connect(ctx.destination);

    if(type==="bell"){
      // Rich bell — doubled oscillators for fullness, much louder
      [880,1760].forEach((freq,layer)=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="sine";
        o.frequency.setValueAtTime(freq,ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(freq/2,ctx.currentTime+1.2);
        g.gain.setValueAtTime(layer===0?0.9:0.4,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.4);
        o.start();o.stop(ctx.currentTime+1.4);
      });

    }else if(type==="beep"){
      // 3 loud sharp beeps
      [0,0.25,0.5].forEach(t2=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="square";o.frequency.value=1000;
        g.gain.setValueAtTime(0.8,ctx.currentTime+t2);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t2+0.18);
        o.start(ctx.currentTime+t2);o.stop(ctx.currentTime+t2+0.2);
      });

    }else if(type==="chime"){
      // Ascending chime — C5 E5 G5 C6
      [523,659,784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="sine";o.frequency.value=f;
        g.gain.setValueAtTime(0,ctx.currentTime+i*0.18);
        g.gain.linearRampToValueAtTime(0.85,ctx.currentTime+i*0.18+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.55);
        o.start(ctx.currentTime+i*0.18);o.stop(ctx.currentTime+i*0.18+0.6);
      });

    }else if(type==="alarm"){
      // Urgent pulsing alarm — 8 fast bursts
      for(let i=0;i<8;i++){
        const f=i%2===0?880:1100;
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="sawtooth";o.frequency.value=f;
        g.gain.setValueAtTime(0.85,ctx.currentTime+i*0.13);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.13+0.11);
        o.start(ctx.currentTime+i*0.13);o.stop(ctx.currentTime+i*0.13+0.12);
      }

    }else if(type==="siren"){
      // Rising siren — good for important reminders
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(master);o.type="sawtooth";
      o.frequency.setValueAtTime(300,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(900,ctx.currentTime+0.4);
      o.frequency.linearRampToValueAtTime(300,ctx.currentTime+0.8);
      o.frequency.linearRampToValueAtTime(900,ctx.currentTime+1.2);
      g.gain.setValueAtTime(0.8,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.4);
      o.start();o.stop(ctx.currentTime+1.4);

    }else if(type==="ding"){
      // Single sharp high ding — minimal, clean
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(master);o.type="sine";o.frequency.value=1400;
      g.gain.setValueAtTime(0.95,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);
      o.start();o.stop(ctx.currentTime+0.85);

    }else if(type==="drum"){
      // Bold percussion thud — great on mobile speakers
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(master);o.type="sine";
      o.frequency.setValueAtTime(200,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(40,ctx.currentTime+0.3);
      g.gain.setValueAtTime(1.0,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
      o.start();o.stop(ctx.currentTime+0.4);
      // noise layer
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.1,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.4;
      const src=ctx.createBufferSource();src.buffer=buf;
      const ng=ctx.createGain();src.connect(ng);ng.connect(master);
      ng.gain.setValueAtTime(0.6,ctx.currentTime);
      ng.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1);
      src.start();

    }else if(type==="trumpet"){
      // Bold fanfare — memorable, hard to miss
      [[392,0],[523,0.15],[659,0.3],[784,0.45]].forEach(([f,t2])=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="square";o.frequency.value=f;
        g.gain.setValueAtTime(0,ctx.currentTime+t2);
        g.gain.linearRampToValueAtTime(0.7,ctx.currentTime+t2+0.05);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t2+0.35);
        o.start(ctx.currentTime+t2);o.stop(ctx.currentTime+t2+0.4);
      });
    }

    setTimeout(()=>ctx.close(),3000);
  }catch(e){console.log("Sound error:",e);}
}

function fmt12(timeStr){
  if(!timeStr)return"";
  const[h,m]=timeStr.split(":").map(Number);
  const ampm=h>=12?"PM":"AM";
  const h12=h%12||12;
  return`${h12}:${String(m).padStart(2,"0")} ${ampm}`;
}

}

function ExportPanel({t,habits,goals,journals,displayName,canPDF=false}){
  const[exporting,setExporting]=useState(null); // null | "habits_csv" | "goals_csv" | "journal_csv" | "pdf"
  const[range,setRange]=useState("30"); // "30" | "90" | "all"

  function downloadCSV(filename,rows){
    const csv=rows.map(r=>r.map(cell=>{
      const s=String(cell==null?"":cell);
      return s.includes(",")||s.includes('"')||s.includes("\n")?`"${s.replace(/"/g,'""')}"`:s;
    }).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
  }

  function exportHabitsCSV(){
    setExporting("habits_csv");
    const cutoffDays=range==="all"?3650:parseInt(range);
    const dates=[];
    for(let i=0;i<cutoffDays;i++){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toISOString().split("T")[0]);}
    const rows=[["Habit","Category","Icon","Date","Completed","Streak","Best Streak","Total Done"]];
    habits.forEach(h=>{
      dates.forEach(date=>{
        const done=!!(h.log&&h.log[date]);
        rows.push([h.name,h.cat||"",h.icon||"",date,done?"Yes":"No",h.streak||0,h.best||0,Object.values(h.log||{}).filter(Boolean).length]);
      });
    });
    downloadCSV(`momentum-habits-${range}days-${new Date().toISOString().split("T")[0]}.csv`,rows);
    setTimeout(()=>setExporting(null),1000);
  }

  function exportGoalsCSV(){
    setExporting("goals_csv");
    const rows=[["Goal","Priority","Deadline","Created","Progress%","Actions Total","Actions Done","Action","Action Done","Completed Date","Expected Result"]];
    goals.forEach(g=>{
      const done=g.actions.filter(a=>a.done).length;
      const pct=g.actions.length>0?Math.round(done/g.actions.length*100):0;
      if(g.actions.length===0){
        rows.push([g.title,g.priority||"",g.deadline||"",g.createdAt||"",pct+"%",0,0,"","","",""]);
      } else {
        g.actions.forEach((a,i)=>{
          rows.push([i===0?g.title:"",i===0?g.priority||"":"",i===0?g.deadline||"":"",i===0?g.createdAt||"":"",i===0?pct+"%":"",i===0?g.actions.length:"",i===0?done:"",a.action||"",a.done?"Yes":"No",a.doneAt||"",a.result||""]);
        });
      }
    });

function ReferralCard({t,user,pk,plan}){
  const[copied,setCopied]=useState(false);

  const[referrals,setReferrals]=useState([]);
  const[loading,setLoading]=useState(true);

  const refLink=`https://momentum-tracker-v01.vercel.app?ref=${refCode}`;

  useEffect(()=>{
    if(!user?.uid)return;
    // Load referral count from Firestore
    async function loadReferrals(){
      try{
        const db=fb.getFirestore();
        const refQ=fb.query(
          fb.collection(db,"users"),
          fb.where("referredBy","==",user.uid)
        );
        const snap=await fb.getDocs(refQ);
        setReferralCount(snap.size);
        setReferrals(snap.docs.map(d=>({email:d.data().email||"Anonymous",date:d.data().signupDate||""})));

function StreakShareModal({t,habit,onClose}){
  const canvasRef=useRef();
  const[generated,setGenerated]=useState(false);
  const[copied,setCopied]=useState(false);
  const accentColor=habit.color||"#f5c842";

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const W=canvas.width=540,H=canvas.height=540;

    // Background — dark with accent glow
    ctx.fillStyle="#0d0d0f";
    ctx.fillRect(0,0,W,H);

    // Accent glow top-left
    const grd=ctx.createRadialGradient(0,0,10,0,0,280);
    grd.addColorStop(0,accentColor+"44");
    grd.addColorStop(1,"transparent");
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,W,H);

    // Border
    ctx.strokeStyle=accentColor+"66";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.roundRect(12,12,W-24,H-24,24);
    ctx.stroke();

    // Momentum branding
    ctx.fillStyle=accentColor;
    ctx.font="bold 22px system-ui,sans-serif";
    ctx.textAlign="left";
    ctx.fillText("⚡ Momentum",36,58);

    // Habit icon + name
    ctx.font="72px system-ui";
    ctx.textAlign="center";
    ctx.fillText(habit.icon||"🔥",W/2,180);

    ctx.fillStyle="#f0eff4";
    ctx.font="bold 34px system-ui,sans-serif";
    ctx.textAlign="center";
    const name=habit.name.length>18?habit.name.slice(0,17)+"…":habit.name;
    ctx.fillText(name,W/2,228);

    // Streak number — big
    ctx.fillStyle=accentColor;
    ctx.font="bold 120px system-ui,sans-serif";
    ctx.textAlign="center";
    ctx.fillText(habit.streak,W/2,360);

    // "DAY STREAK" label
    ctx.fillStyle="#7a7a8c";
    ctx.font="bold 26px system-ui,sans-serif";
    ctx.textAlign="center";
    ctx.fillText("DAY STREAK 🔥",W/2,400);

    // Week dots
    const dotSpacing=40,dotY=445,startX=W/2-(3.5*dotSpacing);
    const week7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week7.push(d.toISOString().split("T")[0]);}
    week7.forEach((d,i)=>{
      const done=habit.log&&habit.log[d];
      ctx.beginPath();
      ctx.arc(startX+(i+0.5)*dotSpacing,dotY,10,0,Math.PI*2);
      ctx.fillStyle=done?"#4ade80":"#2a2a32";
      ctx.fill();
      if(done){ctx.strokeStyle="#4ade8066";ctx.lineWidth=2;ctx.stroke();}
    });

    // App URL
    ctx.fillStyle="#4a4a5a";
    ctx.font="16px system-ui,sans-serif";
    ctx.textAlign="center";
    ctx.fillText("momentum-tracker-v01.vercel.app",W/2,505);

    setGenerated(true);
  },[habit,accentColor]);

  function shareCard(){
    const canvas=canvasRef.current;
    if(!canvas)return;
    canvas.toBlob(async blob=>{
      const file=new File([blob],"momentum-streak.png",{type:"image/png"});
      const txt=`🔥 ${habit.streak}-day streak on ${habit.icon} ${habit.name}! Building momentum daily. Track yours → https://momentum-tracker-v01.vercel.app`;
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],text:txt});
      } else if(navigator.share){
        await navigator.share({title:"My Streak",text:txt,url:"https://momentum-tracker-v01.vercel.app"});
      } else {
        const url=canvas.toDataURL("image/png");
        const a=document.createElement("a");a.href=url;a.download=`momentum-${habit.name}-${habit.streak}d.png`;a.click();
      }
    },"image/png");
  }

  function copyText(){
    const txt=`🔥 ${habit.streak}-day streak on ${habit.icon} ${habit.name}! Building momentum daily. Track yours → https://momentum-tracker-v01.vercel.app`;
    navigator.clipboard.writeText(txt).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2500,padding:20}}>
      <div style={{background:"#18181c",border:"1px solid #2a2a32",borderRadius:24,padding:24,width:"100%",maxWidth:360,textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:800,color:"#f0eff4"}}>📤 Share Your Streak</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#7a7a8c",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>
        </div>

        {/* Canvas preview */}
        <div style={{borderRadius:16,overflow:"hidden",marginBottom:16,border:"1px solid #2a2a32"}}>
          <canvas ref={canvasRef} style={{width:"100%",height:"auto",display:"block"}}/>
        </div>

        {generated&&<>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <button onClick={shareCard} style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:"#25D366",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>📱 Share Image</button>
            <button onClick={copyText} style={{flex:1,padding:"12px",borderRadius:12,border:"1px solid #2a2a32",background:"none",color:copied?"#4ade80":"#f0eff4",fontWeight:700,cursor:"pointer",fontSize:13}}>{copied?"✅ Copied!":"📋 Copy Text"}</button>
          </div>
          <div style={{fontSize:11,color:"#4a4a5a",marginBottom:4}}>Share to WhatsApp, Instagram, or anywhere!</div>
        </>}
        <button onClick={onClose} style={{width:"100%",padding:"10px",borderRadius:12,border:"1px solid #2a2a32",background:"none",color:"#7a7a8c",cursor:"pointer",fontSize:13,marginTop:6}}>Close</button>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[signingIn,setSigningIn]=useState(false);
  const[tk,setTk]=useState("obsidian");
  const[habits,setHabits]=useState([]);
  const[goals,setGoals]=useState([]);
  const[journals,setJournals]=useState({});
  const[pk,setPk]=useState("free");
  const[pe,setPe]=useState(null);
  const[signupDate,setSignupDate]=useState(null);
  const[userNumber,setUserNumber]=useState(null);
  const[page,setPage]=useState("dashboard");
  const[modal,setModal]=useState(null);
  const[detailHabit,setDetailHabit]=useState(null);

  // ── BROWSER HISTORY NAVIGATION ─────────────────────────────────
  function navigateTo(newPage){
    window.history.pushState({page:newPage,modal:null,detail:null},"","/");
    setPage(newPage);setModal(null);setDetailHabit(null);setShowUpdates(false);
  }
  function openModal(id){
    window.history.pushState({page,modal:id,detail:null},"","/");
    setModal(id);
  }
  function openDetail(habitId){
    window.history.pushState({page,modal:null,detail:habitId},"","/");
    setDetailHabit(habitId);
  }
  function openUpdates(){
    window.history.pushState({page,modal:null,detail:null,updates:true},"","/");
    setShowUpdates(true);
  }
  function goBack(){window.history.back();}

  // Handle browser back/forward buttons
  useEffect(()=>{
    // Push initial state
    window.history.replaceState({page:"dashboard",modal:null,detail:null},"","/");

    function onPop(e){
      const s=e.state;
      if(!s){
        window.history.pushState({page:"dashboard",modal:null,detail:null},"","/");
        setPage("dashboard");setModal(null);setDetailHabit(null);setShowUpdates(false);
        return;
      }
      // Restore state directly (no push — we're going back/forward)
      setPage(s.page||"dashboard");
      setModal(s.modal||null);
      setDetailHabit(s.detail||null);
      setShowUpdates(s.updates||false);
    }
    window.addEventListener("popstate",onPop);

    function checkAndFire(){
      cleanOldFired();
      const now=new Date();
      const hh=String(now.getHours()).padStart(2,"0");
      const mm=String(now.getMinutes()).padStart(2,"0");
      const currentTime=`${hh}:${mm}`;

        ...habitReminders.map(h=>({id:`habit_${h.id}`,time:h.remTime,label:`${h.icon} ${h.name}`,isHabit:true,habitId:h.id})),
      ];

      allReminders.forEach(r=>{
        if(!r.time||r.time!==currentTime)return;
        const fireId=`${r.id}_${r.time}_${today2}`;
        if(wasFiredToday(fireId))return;

        // Build notification body
        let body="";
        if(r.isHabit){
          const h=habits.find(hb=>hb.id===r.habitId);
          const done=h&&h.log&&h.log[today2];
          const hasGoal=h&&h.goalCount>0&&h.goalUnit;
          const count=h&&typeof h.log[today2]==="number"?h.log[today2]:done?h.goalCount:0;
          body=done
            ?(hasGoal?`${r.label} — ${count}/${h.goalCount} ${h.goalUnit} done! ✅`:`${r.label} — Already done today! 🎉`)
            :`${r.label} — Time to build that streak! 🔥`;
        } else {
          const undone=habits.filter(hb=>{
            const hasGoal=hb.goalCount>0&&hb.goalUnit;
            const logVal=hb.log&&hb.log[today2];
            return hasGoal?(!(typeof logVal==="number"&&logVal>=hb.goalCount)):!logVal;
          });
          body=undone.length>0
            ?`${r.label} — ${undone.length} habit${undone.length>1?"s":""} remaining today! 🔥`
            :`${r.label} — All habits done today! 🎉`;
        }

        // Show browser notification
        try{
          const n=new Notification("⚡ Momentum",{
            body,
            icon:"/icon-192.png",
            badge:"/icon-192.png",
            tag:fireId,
            requireInteraction:false,
            vibrate:[200,100,200],
          });
          n.onclick=()=>{window.focus();n.close();};
        }catch(e){
          // Try SW notification as fallback
          try{
            if(navigator.serviceWorker&&navigator.serviceWorker.controller){
              navigator.serviceWorker.ready.then(reg=>{
                reg.showNotification("⚡ Momentum",{body,icon:"/icon-192.png",tag:fireId,vibrate:[200,100,200]});
              });
            }
          }catch(e2){}
        }

        // Vibrate (mobile)
        try{if(navigator.vibrate)navigator.vibrate([300,100,300,100,500]);}catch(e){}

        // Play selected sound
        try{playSound(notifSound);}catch(e){}

        markFired(fireId);
      });
    }

    // Check immediately and every 30 seconds

        const current=typeof log[today]==="number"?log[today]:log[today]?hb.goalCount:0;

                [`${compG}/${totalG}`,"Goals Done",t.success],
                [`${doneActions}/${totalActions}`,"Actions Done",t.info],
                [`${actionsThisWeek}/${totalActionsThisWeek||"—"}`,"Done This Week",t.accent],
                [`${overdueGoals}`,"Overdue",overdueGoals>0?t.danger:t.muted]
              ].map(([v,l,c])=>(
                <div key={l} style={{flex:1,minWidth:70,background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
                  <div style={{fontSize:9,color:t.muted,marginTop:2,textTransform:"uppercase",letterSpacing:0.4}}>{l}</div>
                </div>
              ))}
            </div>
          </>);
        })()}
        {goals.length===0&&<div style={{textAlign:"center",color:t.muted,padding:36}}>Add goals to see analytics! 🎯</div>}
        {/* Sort: incomplete goals first, completed goals at bottom */}
        {[...goals].sort((a,b)=>{
          const aComp=a.actions.length>0&&a.actions.every(x=>x.done)?1:0;
          const bComp=b.actions.length>0&&b.actions.every(x=>x.done)?1:0;
          return aComp-bComp;
        }).map(g=>{
          const done=g.actions.filter(a=>a.done),remaining=g.actions.filter(a=>!a.done);
          const pct=g.actions.length>0?Math.round((done.length/g.actions.length)*100):0;
          const dl2=g.deadline?dLeft(g.deadline):null;
          const pCol=g.priority==="High"?t.danger:g.priority==="Medium"?t.accent:t.success;
          const isOverdue=dl2!==null&&dl2<0&&pct<100;
          const isComplete=pct===100;
          const status=isComplete?"completed":isOverdue?"overdue":dl2!==null&&dl2<=7?"due_soon":"active";
          const sCols={completed:t.success,overdue:t.danger,due_soon:t.accent,active:t.info};
          const sLabels={completed:"✅ Completed",overdue:`⚠️ ${Math.abs(dl2)}d overdue`,due_soon:`⏰ Due in ${dl2}d`,active:"🔵 Active"};
          const thisWeek7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);thisWeek7.push(d.toISOString().split("T")[0]);}
          const weekActsDone=done.filter(a=>a.doneAt&&thisWeek7.includes(a.doneAt)).length;
          const weekActsDue=g.actions.filter(a=>a.dueDate&&thisWeek7.includes(a.dueDate)).length;
          return(<div key={g.id} style={{background:t.card,border:`1px solid ${isOverdue?t.danger+"66":isComplete?t.success+"44":t.border}`,borderRadius:12,padding:14,marginBottom:12,opacity:isComplete?0.8:1}}>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,marginBottom:5}}>{g.title}</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:pCol+"22",color:pCol,fontWeight:700}}>{g.priority}</span>
                  <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:sCols[status]+"22",color:sCols[status],fontWeight:700}}>{sLabels[status]}</span>
                  {weekActsDue>0&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:t.info+"22",color:t.info,fontWeight:700}}>📅 {weekActsDone}/{weekActsDue} done this week</span>}
                </div>
              </div>
              <span style={{fontSize:18,fontWeight:800,color:isComplete?t.success:isOverdue?t.danger:t.accent,flexShrink:0,marginLeft:8}}>{pct}%</span>
            </div>
            {/* Progress bar */}
            <div style={{height:6,background:t.surface,borderRadius:10,marginBottom:12}}><div style={{height:"100%",width:`${pct}%`,background:isComplete?t.success:isOverdue?t.danger:t.accent,borderRadius:10,transition:"width 0.5s"}}/></div>
            {/* Remaining actions — collapsible */}
            {remaining.length>0&&<details style={{marginBottom:done.length>0?10:0}}>
              <summary style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:6,cursor:"pointer",listStyle:"none",display:"flex",alignItems:"center",gap:5}}>
                <span>⏳ Remaining ({remaining.length})</span>
                <span style={{fontSize:9,color:t.muted}}>▼ tap to view</span>
              </summary>
              <div style={{marginTop:8}}>
              {remaining.map(a=>{
                const aDL=a.dueDate?dLeft(a.dueDate):null;
                const aDLLabel=aDL===null?"":aDL<0?`${Math.abs(aDL)}d overdue!`:aDL===0?"Due today!":aDL===1?"Due tomorrow!":a.dueDate?`${aDL}d left · ${a.dueDate}`:"";
                return(<div key={a.id} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"6px 9px",background:isOverdue?t.danger+"0a":t.surface,borderRadius:8,marginBottom:4,border:isOverdue?`1px solid ${t.danger}22`:"none"}}>
                  <span style={{fontSize:12,color:t.muted,flexShrink:0,marginTop:1}}>○</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:t.text}}>{a.action}</div>
                    {a.result&&<div style={{fontSize:10,color:t.muted}}>→ {a.result}</div>}
                    {aDLLabel&&<div style={{fontSize:10,color:aDL!==null&&aDL<0?t.danger:aDL===0?t.danger:aDL<=3?t.accent:t.muted,marginTop:2,fontWeight:600}}>📅 {aDLLabel}</div>}
                  </div>
                </div>);
              })}
              </div>
            </details>}
            {/* Completed actions — collapsible */}
            {done.length>0&&<details style={{marginBottom:0}}>
              <summary style={{fontSize:11,fontWeight:700,color:t.success,marginBottom:6,cursor:"pointer",listStyle:"none",display:"flex",alignItems:"center",gap:5}}>
                <span>✅ Completed ({done.length})</span>
                <span style={{fontSize:9,color:t.muted}}>▼ tap to view</span>
              </summary>
              <div style={{marginTop:8}}>
              {done.map(a=>(
                <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 9px",background:t.success+"12",borderRadius:8,marginBottom:4}}>
                  <span style={{fontSize:12,color:t.success,flexShrink:0}}>✓</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:t.text,fontWeight:500}}>{a.action}</div>
                    {a.result&&<div style={{fontSize:10,color:t.muted}}>→ {a.result}</div>}
                  </div>
                  {a.doneAt&&<span style={{fontSize:10,color:t.muted,flexShrink:0}}>{timeAgo(a.doneAt)}</span>}
                </div>
              ))}
              </div>
            </details>}
            {g.actions.length===0&&<div style={{fontSize:12,color:t.muted,textAlign:"center",padding:"8px 0"}}>No action steps added yet</div>}
          </div>);
        })}
      </div>}
      {analyticsTab==="badges"&&<div>
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>🏅 Streak Badges</div>
          {!plan.heat
            ?<div onClick={()=>showUp("Unlock all 7 badges with Pro!")} style={{background:t.surface,border:`1px dashed ${t.border}`,borderRadius:10,padding:16,textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:28,marginBottom:6}}>🏅</div>
              <div style={{fontSize:13,fontWeight:700,color:t.text,marginBottom:4}}>Streak Badges — Pro Feature</div>
              <div style={{fontSize:11,color:t.muted,marginBottom:10}}>Earn 7 badges from Starter (3d) to Centurion (100d)</div>
              <span style={{fontSize:11,fontWeight:700,color:"#000",background:t.accent,padding:"5px 14px",borderRadius:20}}>⚡ Upgrade to unlock</span>
            </div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(86px,1fr))",gap:7}}>
              {BADGES.map(b=>{const earned=habits.some(h=>(h.best||h.streak)>=b.d);return(<div key={b.d} style={{padding:"9px 7px",borderRadius:10,background:earned?b.c+"22":t.surface,border:`1px solid ${earned?b.c+"66":t.border}`,textAlign:"center",opacity:earned?1:0.35}}>
                <div style={{fontSize:22}}>{b.i}</div>
                <div style={{fontSize:10,fontWeight:700,color:earned?b.c:t.muted,marginTop:3}}>{b.l}</div>
                <div style={{fontSize:9,color:t.muted,marginTop:1}}>🔥{b.d} days</div>
              </div>);})}
            </div>}
        </div>
        {habits.length===0&&<div style={{textAlign:"center",color:t.muted,fontSize:13}}>Build habits to earn badges! 🌱</div>}
      </div>}

    </div>
  );}

  return(
    <div style={{minHeight:"100vh",background:t.bg,fontFamily:"'Sora',system-ui,sans-serif",color:t.text}}>
      <style>{`*{box-sizing:border-box;}input,textarea,select{outline:none;font-family:inherit;}
      @keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
      .page-content{animation:pageIn 0.22s ease;}
      `}</style>
      {saving&&<div style={{position:"fixed",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${t.accent},${t.accent}88,${t.accent})`,zIndex:9999,animation:"slideIn 0.3s ease"}}/>}
      {toast&&<div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",zIndex:9998,background:toast.type==="badge"?t.accent:t.success,color:"#000",padding:"9px 18px",borderRadius:20,fontWeight:700,fontSize:13,boxShadow:"0 8px 32px rgba(0,0,0,0.3)",whiteSpace:"nowrap",animation:"slideIn 0.3s ease"}}>{toast.msg}</div>}
      <Confetti on={confetti} done={()=>setConfetti(false)}/>
      {showReview&&<ReviewPopup t={t} onClose={()=>setShowReview(false)}/>}
      {shareHabit&&<StreakShareModal t={t} habit={shareHabit} onClose={()=>setShareHabit(null)}/>}
      {editingHabit&&<EditHabitModal t={t} close={()=>setEditingHabit(null)} habit={editingHabit} onSave={updateH}/>}
      {modal==="upgrade"&&<UpgradeModal t={t} close={()=>window.history.back()} reason={upReason} user={user}/>}
      {modal==="pomodoro"&&<Pomodoro t={t} close={()=>window.history.back()} plan={plan} showUp={showUp}/>}
      {modal==="calendar"&&<CalModal t={t} close={()=>window.history.back()} habits={habits} goals={goals}/>}
      {modal==="journal"&&<JournalModal t={t} close={()=>window.history.back()} journals={journals} onSave={saveJ} plan={plan}/>}
      {modal==="ai"&&<AIModal t={t} close={()=>window.history.back()} plan={plan} showUp={showUp} habits={habits} goals={goals} journals={journals} user={user} setGoals={setGoals} save={save} tk={tk}/>}
      {modal==="notif"&&<NotifModal t={t} close={()=>window.history.back()} enabled={notif} setEnabled={setNotif} plan={plan} reminders={reminders} setReminders={setReminders} notifSound={notifSound} setNotifSound={setNotifSound}/>}
      <div style={{display:"flex",minHeight:"100vh"}}>
      {/* Habit detail page — full screen overlay */}
      {detailHabit&&<div style={{position:"fixed",inset:0,zIndex:800,overflowY:"auto",background:t.bg}}>
        <HabitDetailPage t={t} habit={habits.find(h=>h.id===detailHabit)||detailHabit} habits={habits} setHabits={setHabits} saveF={h=>save(h,goals,journals,tk)} back={()=>window.history.back()} onShare={h=>setShareHabit(h)} onFreeze={applyStreakFreeze} plan={plan}/>
      </div>}
        <div className="sb" style={{width:216,background:t.card,borderRight:`1px solid ${t.border}`,flexDirection:"column",padding:"22px 14px",position:"sticky",top:0,height:"100vh",flexShrink:0,overflowY:"auto"}}>
          <div style={{marginBottom:18}}><div style={{fontSize:19,fontWeight:800,color:t.accent}}>⚡ Momentum</div><div style={{fontSize:10,color:t.muted,marginTop:1}}>Habit & Goal Tracker</div></div>
          <div style={{display:"flex",alignItems:"center",gap:7,padding:"8px 9px",background:t.surface,borderRadius:10,marginBottom:14}}>
            <img src={user.photoURL} style={{width:26,height:26,borderRadius:"50%"}} alt=""/>
            <div style={{flex:1,overflow:"hidden"}}>
              <div style={{fontSize:11,fontWeight:700,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{displayName||user.displayName}</div>
              <div style={{fontSize:9,color:pk==="plus"?"#a78bfa":pk==="pro"?t.accent:t.muted}}>{pk==="plus"?"💎 Plus":pk==="pro"?"⚡ Pro":"Free Plan"}</div>
            </div>
          </div>
          <nav style={{flex:1}}>
            {NAV.map(item=>(<button key={item.id} onClick={()=>navigateTo(item.id)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"9px 11px",borderRadius:10,border:"none",cursor:"pointer",background:page===item.id?t.accent+"22":"none",color:page===item.id?t.accent:t.muted,fontWeight:page===item.id?700:400,fontSize:13,marginBottom:3,textAlign:"left"}}><span>{item.icon}</span>{item.label}</button>))}
            <div style={{height:1,background:t.border,margin:"12px 0"}}/>
            {[["⏱️","Pomodoro","pomodoro"],["📅","Calendar","calendar"],["📓","Journal","journal"],["🤖","AI Coach","ai"],["🔔","Notifications","notif"]].map(([icon,label,id])=>(
              <button key={id} onClick={()=>openModal(id)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"7px 11px",borderRadius:10,border:"none",cursor:"pointer",background:"none",color:t.muted,fontSize:12,marginBottom:3,textAlign:"left"}}>
                <span>{icon}</span>{label}
                {id==="ai"&&!plan.plus&&<span style={{marginLeft:"auto",fontSize:9,color:"#a78bfa",background:"#a78bfa22",padding:"1px 5px",borderRadius:8}}>PLUS</span>}
              </button>
            ))}
          </nav>
          {pk!=="pro"&&pk!=="plus"&&<button onClick={()=>showUp("Unlock unlimited habits, goals, analytics and more!")} style={{width:"100%",padding:"9px",borderRadius:10,border:"none",background:t.accent,color:"#000",cursor:"pointer",fontSize:12,fontWeight:700,marginBottom:7}}>⚡ Upgrade</button>}
          <button onClick={()=>navigateTo("settings")} style={{width:"100%",padding:"7px",borderRadius:10,border:`1px solid ${t.border}`,background:"none",color:t.muted,cursor:"pointer",fontSize:11,marginBottom:5}}>⚙️ Settings</button>
          <button onClick={handleLogout} style={{width:"100%",padding:"7px",borderRadius:10,border:`1px solid ${t.danger}33`,background:t.danger+"0a",color:t.danger,cursor:"pointer",fontSize:11,fontWeight:600}}>Sign out</button>
        </div>
        <div className="ma page-content" style={{flex:1,overflowY:"auto"}}>
          {page==="dashboard"&&<Dashboard/>}
          {page==="habits"&&<HabitsPage/>}
          {page==="goals"&&<GoalsPage/>}
          {page==="analytics"&&<AnalyticsPage/>}
          {page==="settings"&&<SettingsPage t={t} tk={tk} chTheme={chTheme} user={user} pk={pk} pe={pe} plan={plan} handleLogout={handleLogout} showUp={showUp} displayName={displayName} onSaveName={onSaveName} habits={habits} goals={goals} journals={journals} signupDate={signupDate} userNumber={userNumber}/>}
        </div>
      </div>
      <div className="bn" style={{position:"fixed",bottom:0,left:0,right:0,background:t.card,borderTop:`1px solid ${t.border}`,zIndex:500}}>
        <div style={{display:"flex",justifyContent:"space-around",padding:"5px 8px 3px",borderBottom:`1px solid ${t.border}`}}>
          {[["⏱️","pomodoro"],["📅","calendar"],["📓","journal"],["🤖","ai"],["🔔","notif"]].map(([icon,id])=>(
            <button key={id} onClick={()=>openModal(id)} style={{background:"none",border:"none",cursor:"pointer",padding:"3px 5px",position:"relative"}}>
              <span style={{fontSize:17}}>{icon}</span>
              {id==="ai"&&!plan.plus&&<span style={{position:"absolute",top:0,right:0,width:5,height:5,borderRadius:"50%",background:"#a78bfa"}}/>}
            </button>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-around",padding:"5px 8px 7px"}}>
          {NAV.map(item=>(<button key={item.id} onClick={()=>navigateTo(item.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"3px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,flex:1}}>
            <span style={{fontSize:21}}>{item.icon}</span>
            <span style={{fontSize:10,fontWeight:page===item.id?700:400,color:page===item.id?t.accent:t.muted}}>{item.label}</span>
            {page===item.id&&<div style={{width:4,height:4,borderRadius:"50%",background:t.accent}}/>}
          </button>))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(r=>{
        console.log('⚡ SW ready:',r.scope);
        r.addEventListener('updatefound',()=>{
          const nw=r.installing;
          nw.addEventListener('statechange',()=>{
            if(nw.state==='installed'&&navigator.serviceWorker.controller){
              nw.postMessage({type:'SKIP_WAITING'});
            }
          });
        });
        let refreshing=false;
        navigator.serviceWorker.addEventListener('controllerchange',()=>{
          if(!refreshing){refreshing=true;window.location.reload();}
        });
        navigator.serviceWorker.ready.then(reg=>{
          if(reg.active){
            const rem=localStorage.getItem('hg_reminders');
            const notifOn=localStorage.getItem('hg_notif');
            if(rem)reg.active.postMessage({type:'SYNC_STORAGE',key:'hg_reminders',value:rem});
            if(notifOn)reg.active.postMessage({type:'SYNC_STORAGE',key:'hg_notif',value:notifOn});
            reg.active.postMessage({type:'UPDATE_REMINDERS'});
          }
        });
      })
      .catch(e=>console.error('SW error:',e));
  });
}
</script>
</body>
</html>
