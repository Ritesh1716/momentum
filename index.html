// Item 39: referral tier ladder — 1→7d, 5→20d, 10→40d, 15→60d, nothing beyond 15. Hard 60-day lifetime cap regardless of timing/order.
const REFERRAL_TIERS=[{count:1,days:7},{count:5,days:20},{count:10,days:40},{count:15,days:60}];
const REFERRAL_LIFETIME_CAP_DAYS=60;
function referralEntitledDays(referralCount){
  let entitled=0;
  REFERRAL_TIERS.forEach(tier=>{if(referralCount>=tier.count)entitled=tier.days;});
  return Math.min(REFERRAL_LIFETIME_CAP_DAYS,entitled);
}
// Computes what to merge-write for a referrer's OWN milestone ladder (separate from any signup bonus they personally received).
// currentPlan/currentExpiry should be the plan ignoring this grant (e.g. "free" if just expired). Returns null if nothing to change —
// either already on Plus (banked silently, untouched) or no new tier has been crossed since the last grant.
function computeReferralGrant(currentPlan,currentExpiry,alreadyGranted,referralCount){
  if(currentPlan==="plus")return null;
  const entitled=referralEntitledDays(referralCount);
  const delta=entitled-(alreadyGranted||0);
  if(delta<=0)return null;
  const now=new Date();
  const curExp=currentExpiry?new Date(currentExpiry):null;
  const base=(curExp&&curExp>now)?curExp:now; // never reduces existing/paid time — only ever extends forward
  const newExpiry=new Date(base.getTime()+delta*86400000);
  return{plan:"pro",planExpiry:newExpiry.toISOString(),referralBonusDaysGranted:entitled};
}
// F1: shared avatar circle — photo if present, else initial letter on a tinted background
// F1: full-screen QR scanner — decodes a friend's Momentum ID from their QR code via jsQR.
// Never auto-sends a request; just hands the decoded ID back so the person can review and tap Send.
function QRScannerModal({t,onScanned,onClose}){
  const videoRef=useRef();
  const canvasRef=useRef();
  const streamRef=useRef();
  const rafRef=useRef();
  const[error,setError]=useState("");
  const[manualVal,setManualVal]=useState("");

  useEffect(()=>{
    let cancelled=false;
    function stop(){
      cancelled=true;
      if(rafRef.current)cancelAnimationFrame(rafRef.current);
      if(streamRef.current)streamRef.current.getTracks().forEach(tr=>tr.stop());
    }
    function tick(){
      if(cancelled)return;
      const video=videoRef.current,canvas=canvasRef.current;
      if(video&&canvas&&video.readyState===video.HAVE_ENOUGH_DATA&&window.jsQR){
        canvas.width=video.videoWidth;canvas.height=video.videoHeight;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        try{
          const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
          const code=window.jsQR(imgData.data,imgData.width,imgData.height);
          if(code&&code.data){
            const match=code.data.match(/MO-[A-Za-z0-9]+-[A-Za-z0-9]+/);
            if(match){stop();onScanned(match[0]);return;}
          }
        }catch(e){}
      }
      rafRef.current=requestAnimationFrame(tick);
    }
    async function start(){
      try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
        if(cancelled){stream.getTracks().forEach(tr=>tr.stop());return;}
        streamRef.current=stream;
        if(videoRef.current){videoRef.current.srcObject=stream;await videoRef.current.play();}
        tick();
      }catch(e){setError("Camera access denied or unavailable. You can type the code manually below.");}
    }
    start();
    return stop;
  },[]);

  function submitManual(){
    const v=manualVal.trim();
    if(!v)return;
    const match=v.match(/MO-[A-Za-z0-9]+-[A-Za-z0-9]+/);
    onScanned(match?match[0]:v);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:3000,display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",background:"rgba(0,0,0,0.6)",position:"absolute",top:0,left:0,right:0,zIndex:2}}>
        <div style={{color:"#fff",fontSize:15,fontWeight:800}}>Scan Momentum ID</div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#fff",fontSize:24,cursor:"pointer",lineHeight:1}}>×</button>
      </div>
      {!error?(
        <div style={{flex:1,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
          <video ref={videoRef} playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          <canvas ref={canvasRef} style={{display:"none"}}/>
          <div style={{position:"absolute",width:220,height:220,border:"3px solid "+t.accent,borderRadius:20,boxShadow:"0 0 0 2000px rgba(0,0,0,0.45)"}}/>
          <div style={{position:"absolute",bottom:40,left:0,right:0,textAlign:"center",color:"#fff",fontSize:13,padding:"0 30px"}}>Point your camera at a friend's Momentum QR code</div>
        </div>
      ):(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,gap:14}}>
          <div style={{color:"#fff",fontSize:13,textAlign:"center",maxWidth:280}}>{error}</div>
          <input value={manualVal} onChange={e=>setManualVal(e.target.value)} placeholder="MO-Name-Code" style={{width:"100%",maxWidth:280,background:"#1a1a1e",border:"1px solid #333",borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,fontFamily:"monospace"}}/>
          <button onClick={submitManual} style={{padding:"10px 24px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,fontSize:13,cursor:"pointer"}}>Use this code</button>
        </div>
      )}
    </div>
  );
}

// H-Cards: renders a milestone card from a permanent snapshot {id,habitId,habitName,icon,color,streak,date,shared}.
// No longer takes a live habit — snapshot-based so it looks identical no matter how much later it's reopened/reshared from the Cards tab.
function StreakShareModal({t,card,onClose,onShared}){
  const canvasRef=useRef();
  const[generated,setGenerated]=useState(false);
  const[copied,setCopied]=useState(false);
  const accentColor=card.color||"#f5c842";

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const W=canvas.width=540,H=canvas.height=540;

    function drawCard(moImg){
    // Background — dark with accent glow
    ctx.fillStyle="#0d0d0f";
    ctx.fillRect(0,0,W,H);

    // Accent glow top-left
    const grd=ctx.createRadialGradient(0,0,10,0,0,280);
    grd.addColorStop(0,accentColor+"44");
    grd.addColorStop(1,"transparent");
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,W,H);

    // Border
    ctx.strokeStyle=accentColor+"66";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.roundRect(12,12,W-24,H-24,24);
    ctx.stroke();

    // Mo flexing — top-right corner, celebrating the streak
    if(moImg){
      const moW=92,moH=moW*(moImg.height/moImg.width);
      ctx.save();
      ctx.shadowColor=accentColor+"88";
      ctx.shadowBlur=18;
      ctx.drawImage(moImg,W-moW-22,22,moW,moH);
      ctx.restore();
    }

    // Momentum branding
    ctx.fillStyle=accentColor;
    ctx.font="bold 22px system-ui,sans-serif";
    ctx.textAlign="left";
    ctx.fillText("⚡ Momentum",36,58);

    // Habit icon + name
    ctx.font="72px system-ui";
    ctx.textAlign="center";
    ctx.fillText(card.icon||"🔥",W/2,190);

    ctx.fillStyle="#f0eff4";
    ctx.font="bold 34px system-ui,sans-serif";
    ctx.textAlign="center";
    const name=card.habitName.length>18?card.habitName.slice(0,17)+"…":card.habitName;
    ctx.fillText(name,W/2,240);

    // Streak number — big
    ctx.fillStyle=accentColor;
    ctx.font="bold 130px system-ui,sans-serif";
    ctx.textAlign="center";
    ctx.fillText(card.streak,W/2,385);

    // "DAY STREAK" label
    ctx.fillStyle="#7a7a8c";
    ctx.font="bold 26px system-ui,sans-serif";
    ctx.textAlign="center";
    ctx.fillText("DAY STREAK 🔥",W/2,425);

    // Milestone date
    ctx.fillStyle="#5a5a6a";
    ctx.font="14px system-ui,sans-serif";
    ctx.textAlign="center";
    ctx.fillText(new Date(card.date+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}),W/2,458);

    // App URL
    ctx.fillStyle="#4a4a5a";
    ctx.font="16px system-ui,sans-serif";
    ctx.textAlign="center";
    ctx.fillText("app.momentum-trackerapp.com",W/2,505);

    setGenerated(true);
    }

    const moImg=new Image();
    moImg.crossOrigin="anonymous";
    moImg.onload=()=>drawCard(moImg);
    moImg.onerror=()=>drawCard(null); // draw the card without Mo if the image fails to load
    moImg.src="https://raw.githubusercontent.com/Ritesh1716/momentum/main/mo/mo-flex.png";
  },[card,accentColor]);

  function shareCard(){
    const canvas=canvasRef.current;
    if(!canvas)return;
    canvas.toBlob(async blob=>{
      const file=new File([blob],"momentum-streak.png",{type:"image/png"});
      const txt="🔥 "+card.streak+"-day streak on "+card.icon+" "+card.habitName+"! Building momentum daily. Track yours → https://app.momentum-trackerapp.com/share-milestone.html";
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],text:txt});
      } else if(navigator.share){
        await navigator.share({title:"My Streak",text:txt});
      } else {
        const url=canvas.toDataURL("image/png");
        const a=document.createElement("a");a.href=url;a.download="momentum-"+card.habitName+"-"+card.streak+"d.png";a.click();
      }
      if(onShared)onShared();
    },"image/png");
  }

  function copyText(){
    const txt="🔥 "+card.streak+"-day streak on "+card.icon+" "+card.habitName+"! Building momentum daily. Track yours → https://app.momentum-trackerapp.com/share-milestone.html";
    navigator.clipboard.writeText(txt).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);if(onShared)onShared();});
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2500,padding:20}}>
      <div style={{background:"#18181c",border:"1px solid #2a2a32",borderRadius:24,padding:24,width:"100%",maxWidth:360,textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:800,color:"#f0eff4",display:"flex",alignItems:"center",gap:6}}>{IC.share("#f0eff4",15)} Share Your Streak</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#7a7a8c",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>
        </div>

        {/* Canvas preview */}
        <div style={{borderRadius:16,overflow:"hidden",marginBottom:16,border:"1px solid #2a2a32"}}>
          <canvas ref={canvasRef} style={{width:"100%",height:"auto",display:"block"}}/>
        </div>

        {generated&&<>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <button onClick={shareCard} style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:"#25D366",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13,display:"inline-flex",alignItems:"center",gap:5}}>{IC.mobile("#fff",14)} Share Image</button>
            <button onClick={copyText} style={{flex:1,padding:"12px",borderRadius:12,border:"1px solid #2a2a32",background:"none",color:copied?"#4ade80":"#f0eff4",fontWeight:700,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>{copied?<>{IC.check("#4ade80",13)} Copied!</>:<>{IC.plan("#f0eff4",13)} Copy Text</>}</button>
          </div>
          <div style={{fontSize:11,color:"#4a4a5a",marginBottom:4}}>Share to WhatsApp, Instagram, or anywhere!</div>
        </>}
        <button onClick={onClose} style={{width:"100%",padding:"10px",borderRadius:12,border:"1px solid #2a2a32",background:"none",color:"#7a7a8c",cursor:"pointer",fontSize:13,marginTop:6}}>Close</button>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function FloatingMo({user,habits,goals,openAIModal,activeModal}){
  const PK='mo_pos3';
  const SIZE=88;
  const IMG=96;
  const getDefault=()=>({x:window.innerWidth-SIZE-14,y:window.innerHeight-SIZE-90});
  const [pos,setPos]=React.useState(()=>{try{const s=localStorage.getItem(PK);return s?JSON.parse(s):getDefault();}catch(e){return getDefault();}});
  const [drag,setDrag]=React.useState(false);
  const [vis,setVis]=React.useState(true);
  const [moImg,setMoImg]=React.useState('/mo/mo-meditate.png');
  const ref=React.useRef(null);
  const dr=React.useRef({on:false,sx:0,sy:0,ex:0,ey:0});
  const lt=React.useRef(null);

  // ── Mo Expression Logic ──────────────────────────────────────────────────
  function getMoImage(){
    const now=new Date();
    const mo=now.getMonth()+1,dd=now.getDate(),hr=now.getHours();
    const today=now.toISOString().split('T')[0];

    // 0. First 30 minutes after signup/login this session: always meditate pose
    // (calm, welcoming presence while user is still getting oriented)
    try{
      let sessionStart=sessionStorage.getItem('mo_session_start');
      if(!sessionStart){
        sessionStart=Date.now().toString();
        sessionStorage.setItem('mo_session_start',sessionStart);
      }
      const minutesSinceStart=(Date.now()-parseInt(sessionStart,10))/60000;
      if(minutesSinceStart<30) return '/mo/mo-meditate.png';
    }catch(e){}

    // 1. Seasonal (date-based — highest priority)
    if((mo===10&&dd>=20)||(mo===11&&dd<=5)) return '/mo/mo-diwali.png';
    if(mo===12&&(dd===24||dd===25||dd===26)) return '/mo/mo-christmas.png';
    if((mo===12&&dd===31)||(mo===1&&dd===1)) return '/mo/mo-newyear.png';

    // 2. Achievement (just happened — check localStorage flags set by app on events)
    const ach=localStorage.getItem('mo_ach_flag');
    if(ach){
      try{const a=JSON.parse(ach);if((Date.now()-a.ts)<300000){// within 5min
        if(a.type==='all_habits') return '/mo/mo-jump.png';
        if(a.type==='badge')      return '/mo/mo-shocked.png';
        if(a.type==='challenge')  return '/mo/mo-trophy.png';
        if(a.type==='milestone')  return '/mo/mo-celebrate.png';
      }else{localStorage.removeItem('mo_ach_flag');}}catch(e){}
    }

    // 3. Habit data checks
    const hh=habits||[];
    const todayH=hh.filter(h=>{
      const lg=h.log&&h.log[today];
      if(!lg) return false;
      if(h.goalCount>0) return (lg.count||0)>=h.goalCount;
      return !!lg.done;
    });
    const allDoneToday=hh.length>0&&todayH.length===hh.length;
    const bestStreak=hh.length>0?Math.max(...hh.map(h=>h.streak||0)):0;
    const lastLogin=parseInt(localStorage.getItem('mo_last_login')||'0');
    const daysSince=lastLogin?Math.floor((Date.now()-lastLogin)/(86400000)):0;

    // Update last login timestamp
    if(!lastLogin||daysSince>0) localStorage.setItem('mo_last_login',Date.now().toString());

    // 3a. Urgency / Warning
    if(daysSince>=3) return '/mo/mo-comeback.png';
    if(hr>=19&&!allDoneToday&&bestStreak>=3) return '/mo/mo-clock.png';

    // 3b. Positive achievement state
    if(allDoneToday) return '/mo/mo-jump.png';
    if(bestStreak>=30) return '/mo/mo-flex.png';
    if(bestStreak>=7) return '/mo/mo-fist-pump.png';
    if(hr<10&&todayH.length===0&&hh.length>0) return '/mo/mo-standing.png';

    // 4. Idle rotation — changes every 5 hours, stored in localStorage
    const IDLE=['/mo/mo-meditate.png','/mo/mo-sit-relax.png','/mo/mo-thinking.png','/mo/mo-wink.png','/mo/mo-standing.png','/mo/mo-shrug.png'];
    const INTERVAL=5*3600*1000;// 5 hours
    const stored=localStorage.getItem('mo_idle_state');
    let idx=0,ts=0;
    try{const p=JSON.parse(stored||'{}');idx=p.idx||0;ts=p.ts||0;}catch(e){}
    if(Date.now()-ts>INTERVAL){
      idx=(idx+1)%IDLE.length;
      localStorage.setItem('mo_idle_state',JSON.stringify({idx,ts:Date.now()}));
    }
    return IDLE[idx];
  }

  React.useEffect(()=>{
    setMoImg(getMoImage());
    // Refresh every 30 minutes while app is open
    const interval=setInterval(()=>setMoImg(getMoImage()),30*60*1000);
    return()=>clearInterval(interval);
  },[habits,goals]);

  React.useEffect(()=>{
    if(!window.visualViewport)return;
    const h=()=>setVis(window.visualViewport.height>=window.innerHeight*0.72);
    window.visualViewport.addEventListener('resize',h);
    return()=>window.visualViewport.removeEventListener('resize',h);
  },[]);

  function pd(e){
    e.preventDefault();
    dr.current={on:false,sx:e.clientX,sy:e.clientY,ex:pos.x,ey:pos.y};
    lt.current=setTimeout(()=>{dr.current.on=true;setDrag(true);if(ref.current)ref.current.style.transform='scale(1.18)';},300);
  }
  function pm(e){
    if(!dr.current.on)return;
    e.preventDefault();
    var nx=dr.current.ex+(e.clientX-dr.current.sx);
    var ny=dr.current.ey+(e.clientY-dr.current.sy);
    nx=Math.max(0,Math.min(window.innerWidth-SIZE,nx));
    ny=Math.max(0,Math.min(window.innerHeight-SIZE-55,ny));
    setPos({x:nx,y:ny});
  }
  function pu(e){
    clearTimeout(lt.current);
    if(dr.current.on){
      dr.current.on=false;setDrag(false);
      if(ref.current)ref.current.style.transform='scale(1)';
      var snapX=pos.x<window.innerWidth/2?14:window.innerWidth-SIZE-14;
      var np={x:snapX,y:pos.y};
      setPos(np);
      try{localStorage.setItem(PK,JSON.stringify(np));}catch(err){}
    } else {
      var dx=Math.abs(e.clientX-dr.current.sx),dy=Math.abs(e.clientY-dr.current.sy);
      if(dx<10&&dy<10)openAIModal();
    }
  }
  // R9-C/R11-B: suppress on upgrade paywall and journal writing
  if(!user||!vis||activeModal==="upgrade"||activeModal==="journal")return null;
  return(
    <div ref={ref} data-tour="mo-floating" onPointerDown={pd} onPointerMove={pm} onPointerUp={pu}
      onPointerCancel={()=>{clearTimeout(lt.current);dr.current.on=false;setDrag(false);}}
      style={{position:'fixed',left:pos.x,top:pos.y,width:SIZE,height:SIZE,
        borderRadius:'50%',zIndex:1200,cursor:drag?'grabbing':'pointer',
        touchAction:'none',userSelect:'none',WebkitUserSelect:'none',
        display:'flex',alignItems:'center',justifyContent:'center',
        background:'radial-gradient(circle,rgba(245,180,50,0.18) 0%,transparent 70%)',
        boxShadow:'0 0 0 2px rgba(245,200,66,0.35),0 4px 24px rgba(0,0,0,0.6)',
        animation:drag?'none':'moFloatBtn 3s ease-in-out infinite',
      }}>
      <MoImg src={moImg} size={96} alt="Mo" style={{pointerEvents:'none'}}/>
    </div>
  );
}

// ── L3: DELETE ACCOUNT MODAL ─────────────────────────────────────────────────
function DeleteAccountModal({t,user,handleLogout,onClose}){
  const[step,setStep]=React.useState(1);
  const[deleting,setDeleting]=React.useState(false);
  const[confirmText,setConfirmText]=React.useState("");
  const fb=window._fb;

  async function handleDelete(){
    if(confirmText.trim().toUpperCase()!=="DELETE")return;
    setDeleting(true);
    let dataDeleted=false,authDeleted=false;
    try{
      // 1. Delete goalHistory subcollection
      try{
        const ghRef=fb.collection(fb.db,"users",user.uid,"goalHistory");
        const ghSnap=await fb.getDocs(ghRef);
        const batch=fb.writeBatch(fb.db);
        ghSnap.forEach(d=>batch.delete(d.ref));
        await batch.commit();
      }catch(e){console.warn("Subcollection delete err:",e?.code,e?.message);}
      // 2. Delete main Firestore document
      // #10: if this throws, it's almost certainly a Firestore security-rules issue —
      // check the rules actually grant `delete` on users/{uid} for the owning user, not
      // just read/write. Logging the real error code here so that's confirmable.
      await fb.deleteDoc(fb.doc(fb.db,"users",user.uid));
      dataDeleted=true;
      // 3. Re-authenticate then delete Firebase Auth user
      // #10: reauthenticateWithPopup is known to fail silently on mobile PWAs where popup
      // windows are commonly blocked by the OS/browser — that's the most likely reason this
      // step doesn't complete on mobile specifically. A redirect-based reauth fallback would
      // need boot-time state to resume the deletion after the redirect returns; flagging
      // that as the real fix rather than guessing at it here without being able to test
      // against a live mobile device or the actual Firestore rules.
      try{
        await fb.reauthenticateWithPopup(fb.auth.currentUser,fb.provider);
        await fb.deleteUser(fb.auth.currentUser);
        authDeleted=true;
      }catch(e){console.warn("Reauth/delete err:",e?.code,e?.message);}
      // 4. Clear local storage
      try{
        localStorage.removeItem("momentum_gh_"+user.uid);
        localStorage.removeItem("momentum_gs_"+user.uid);
        localStorage.removeItem("hg_notif");
        localStorage.removeItem("hg_reminders");
        localStorage.removeItem("mo_pos3");
      }catch(e){}
      if(dataDeleted&&!authDeleted){
        // Real partial-success case: data is gone, but the login itself couldn't be removed
        // (most likely the mobile popup-blocking issue above). Be honest about this instead
        // of implying total failure — the person's data really is deleted at this point.
        alert("Your Momentum data has been deleted. We couldn't remove your login on this device — email momentumtrackerappofficial@gmail.com and we'll close it out.");
      }
      await handleLogout();
    }catch(e){
      console.error("Delete account err:",e?.code,e?.message,e);
      if(dataDeleted){
        alert("Your data was deleted, but something went wrong finishing up. Email momentumtrackerappofficial@gmail.com if anything still looks off.");
      }else{
        alert("Something went wrong and your data was NOT deleted. Please contact momentumtrackerappofficial@gmail.com — include what happened so this can be fixed properly.");
      }
      setDeleting(false);
    }
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:9500}}>
      <div style={{background:"#18181c",border:"1px solid #2a2a32",borderRadius:"24px 24px 0 0",padding:"28px 22px 40px",width:"100%",maxWidth:480,animation:"pageIn 0.3s ease"}}>
        {step===1&&(
          <>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{marginBottom:8}}>{IC.warning(t.danger,36)}</div>
              <div style={{fontSize:17,fontWeight:800,color:"#ff4444",marginBottom:8}}>Delete Account?</div>
              <div style={{fontSize:12,color:"#7a7a8c",lineHeight:1.7}}>This will permanently delete your Momentum account and all data. This action <strong style={{color:"#ff4444"}}>cannot be undone</strong>.</div>
            </div>
            <div style={{background:"#1a0a0a",border:"1px solid #ff444433",borderRadius:14,padding:"14px 16px",marginBottom:20,fontSize:12,color:"#aaa",lineHeight:1.8}}>
              <div style={{fontWeight:700,color:"#ff6666",marginBottom:6}}>Permanently deleted:</div>
              <div>• All habits, streaks, and completion history</div>
              <div>• All goals and actions</div>
              <div>• All journal entries and mood logs</div>
              <div>• Your account and login</div>
              <div style={{marginTop:8,color:"#666"}}>Active subscriptions are not automatically cancelled — cancel in Razorpay/Play Store first.</div>
            </div>
            <button onClick={()=>setStep(2)} style={{width:"100%",padding:"13px",borderRadius:14,border:"1px solid #ff444444",background:"#ff444422",color:"#ff6666",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:10}}>Continue to Delete</button>
            <button onClick={onClose} style={{width:"100%",padding:"12px",borderRadius:14,border:"1px solid #2a2a32",background:"transparent",color:"#888",fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancel</button>
          </>
        )}
        {step===2&&(
          <>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:17,fontWeight:800,color:"#ff4444",marginBottom:8}}>Final Confirmation</div>
              <div style={{fontSize:12,color:"#7a7a8c",lineHeight:1.6}}>Type <strong style={{color:"#ff6666",fontFamily:"monospace"}}>DELETE</strong> to permanently delete your account.</div>
            </div>
            <input
              value={confirmText}
              onChange={e=>setConfirmText(e.target.value)}
              maxLength={10}
              placeholder="Type DELETE to confirm"
              style={{width:"100%",padding:"13px 16px",borderRadius:12,border:"1px solid "+(confirmText.trim().toUpperCase()==="DELETE"?"#ff4444":"#2a2a32"),background:"#111116",color:"#f5f5f5",fontSize:14,fontFamily:"monospace",textAlign:"center",marginBottom:16,boxSizing:"border-box"}}
            />
            <button
              onClick={handleDelete}
              disabled={deleting||confirmText.trim().toUpperCase()!=="DELETE"}
              style={{width:"100%",padding:"13px",borderRadius:14,border:"none",background:confirmText.trim().toUpperCase()==="DELETE"?"#ff4444":"#222",color:confirmText.trim().toUpperCase()==="DELETE"?"#fff":"#555",fontWeight:800,fontSize:14,cursor:deleting||confirmText.trim().toUpperCase()!=="DELETE"?"not-allowed":"pointer",marginBottom:10,transition:"all 0.2s"}}>
              {deleting?"Deleting... Please wait":<span style={{display:"inline-flex",alignItems:"center",gap:5}}>{IC.trash(t.danger,14)} Permanently Delete My Account</span>}
            </button>
            <button onClick={()=>setStep(1)} disabled={deleting} style={{width:"100%",padding:"12px",borderRadius:14,border:"1px solid #2a2a32",background:"transparent",color:"#888",fontWeight:600,fontSize:13,cursor:"pointer"}}>{"← Go Back"}</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── C10: Error Boundary ─────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){
    console.error("Momentum ErrorBoundary caught:",error,info);
    // C5: report to Sentry if it's loaded (safe no-op pre-consent or if Sentry hasn't finished loading yet)
    try{
      if(window.Sentry&&window.Sentry.captureException){
        window.Sentry.captureException(error,{extra:{componentLabel:this.props.label||"unknown",componentStack:info?.componentStack}});
      }
    }catch(e){}
  }
  reset(){this.setState({hasError:false,error:null});}
  render(){
    if(this.state.hasError){
      const t=this.props.t||{bg:"#0d0d0f",card:"#18181c",border:"#2a2a32",text:"#f0eff4",muted:"#7a7a8c",accent:"#f5c842",danger:"#ef4444",surface:"#1a1a20"};
      return(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:220,padding:"32px 20px",textAlign:"center",background:t.card,borderRadius:16,border:"1px solid "+t.border,margin:16}}>
          <div style={{marginBottom:12}}>{typeof IC!=="undefined"?IC.warning(t.danger,40):<span style={{fontSize:36}}>⚠️</span>}</div>
          <div style={{fontSize:16,fontWeight:800,color:t.text,marginBottom:6}}>Something went wrong</div>
          <div style={{fontSize:12,color:t.muted,marginBottom:16,lineHeight:1.6,maxWidth:280}}>
            {this.props.label||"This section"} ran into a problem. Your data is safe — tap Try Again or reload the page.
          </div>
          <button onClick={()=>this.reset()} style={{padding:"10px 22px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
            Try Again
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}


// ── MoImg: Canvas-based white background removal for all Mo images ──────────
// Uses BFS flood-fill from edges — same algorithm as splash screen
// Works on ANY background color, not just pure black
// ── MoImg: simple, instant Mo image renderer ─────────────────────────────────
// All 50 Mo poses are properly exported transparent PNGs (alpha channel
// baked in) — no canvas, no flood-fill, no processing needed. Just a
// plain <img> tag with a glow shadow. Loads instantly, zero corruption
// risk, clean edges with no whitish halo.
//
// MO_ASSET_VERSION: bump this whenever Mo image FILES change in the repo
// (new poses, re-exported transparency fixes, etc.) even if no other app
// code changed. It's appended as a query string to every Mo image URL,
// which guarantees a genuinely new URL the browser's HTTP cache, any CDN
// edge cache, and the Service Worker have never seen before — bypassing
// every caching layer at once, no matter how aggressively configured.
const MO_ASSET_VERSION="2";
function MoImg({src,size=130,alt="Mo",style={}}){
  const versionedSrc=src?(src+(src.includes("?")?"&":"?")+"v="+MO_ASSET_VERSION):src;
  return(
    <img src={versionedSrc} alt={alt}
      style={{
        width:size,height:size,objectFit:"contain",
        filter:"drop-shadow(0 8px 28px rgba(245,185,50,0.55))",
        flexShrink:0,
        ...style,
      }}
      onError={e=>{e.target.style.display="none";}}
    />
  );
}

    ];

  },[]);
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[signingIn,setSigningIn]=useState(false);
  const[tk,setTk]=useState("obsidian");
  const[habits,setHabits]=useState([]);
  const[goals,setGoals]=useState([]);
  const[journals,setJournals]=useState({});
  const[goalHistory,setGoalHistory]=useState([]);// completed goals history (browsable, capped at 50, user-deletable)
  const[goalStats,setGoalStats]=useState([]);// permanent completion snapshots for Yearly Review — never capped or deleted
  const[streakCards,setStreakCards]=useState([]);// H-Cards: permanent snapshots of milestone streak-share cards (habitId,habitName,icon,color,streak,date,shared)
  const[milestoneCard,setMilestoneCard]=useState(null);// card object just earned — triggers the Mo "Share now?" popup
  const[viewCard,setViewCard]=useState(null);// card tapped open from the Cards tab / milestone popup — feeds StreakShareModal
  const[showGoalHistory,setShowGoalHistory]=useState(false);// history modal open
  const[expandedHistGoal,setExpandedHistGoal]=useState(null);// which history goal's actions are expanded
  const[pk,setPk]=useState("free");
  const[pe,setPe]=useState(null);
  const[signupDate,setSignupDate]=useState(null);
  const[userNumber,setUserNumber]=useState(null);
  const[birthday,setBirthday]=useState("");// UI-PA2: ISO date string e.g. "2004-06-27"
  const[momentumId,setMomentumId]=useState("");// UI-PA5: MO-DisplayName-UniqueCode
  const[friendReqCount,setFriendReqCount]=useState(0);// F1: pending incoming friend requests badge
  const[pendingScanCode,setPendingScanCode]=useState("");// carries a QR-scanned Momentum ID from Profile → Friends' Add tab
  const[page,setPage]=useState(null);// null = waiting for loadData to set it
  const[modal,setModal]=useState(null);
  const[detailHabit,setDetailHabit]=useState(null);
  // C1: Offline
  const[isOffline,setIsOffline]=useState(!navigator.onLine);
  const[offlineBanner,setOfflineBanner]=useState(!navigator.onLine);
  // #33: the online-event listener below is registered once on mount ([] deps) — without
  // this ref, its closure would keep calling whatever `save`/`user` looked like at that first
  // render (often before auth has even resolved), silently no-op'ing forever after. This ref
  // is updated every render so the effect always calls the current, correct save().
  const saveRef=React.useRef(null);
  // C2: Onboarding
  const[showOnboarding,setShowOnboarding]=useState(false);
  // C2: Onboarding state
  const[showDashTour,setShowDashTour]=useState(false);
  const[showDay7Challenge,setShowDay7Challenge]=useState(false);
  const[showMonthlySummary,setShowMonthlySummary]=useState(false);
  const[monthlyRecapData,setMonthlyRecapData]=useState(null);
  const[showGoalsTour,setShowGoalsTour]=useState(false);
  const[showAnalyticsTour,setShowAnalyticsTour]=useState(false);
  const[pendingDashTour,setPendingDashTour]=useState(false);
  const[showPushReask,setShowPushReask]=useState(false);// C3: meaningful re-ask after tour if push wasn't granted in onboarding
  const[moBubbleMsg,setMoBubbleMsg]=useState(null);
  // L1/L2: Consent modals
  const[showDpdpConsent,setShowDpdpConsent]=useState(false);// pendingDashTour declared near showDashTour
  const[showAiConsent,setShowAiConsent]=useState(false);
  const[pendingAiOpen,setPendingAiOpen]=useState(false);
  // L3: Delete account
  const[showDeleteAccount,setShowDeleteAccount]=useState(false);

  // ── BROWSER HISTORY NAVIGATION ─────────────────────────────────
  function navigateTo(newPage,fromPanel=false){
    if(fromPanel){
      // N8-A: push panel-open state first, then sub-page — back restores panel
      window.history.pushState({page:page,modal:null,detail:null,showHamburger:true},"","/");
    }
    window.history.pushState({page:newPage,modal:null,detail:null},"","/");
    setPage(newPage);setModal(null);setDetailHabit(null);setShowUpdates(false);setShowHamburger(false);
    // First-time page tours — fire once per page, never again
    if(newPage==="goals"&&!localStorage.getItem("hg_goals_tour_done")&&!showOnboarding){
      setTimeout(()=>setShowGoalsTour(true),500);
    }
    if(newPage==="analytics"&&!localStorage.getItem("hg_analytics_tour_done")&&!showOnboarding){
      setTimeout(()=>setShowAnalyticsTour(true),500);
    }
  }
  function openModal(id){
    window.history.pushState({page,modal:id,detail:null},"","/");
    setModal(id);
  }
  function openDetail(habitId){
    window.history.pushState({page,modal:null,detail:habitId},"","/");
    setDetailHabit(habitId);
  }
  function openUpdates(){
    window.history.pushState({page,modal:null,detail:null,updates:true},"","/");
    setShowUpdates(true);
  }
  function goBack(){window.history.back();}

  // Handle browser back/forward buttons
  useEffect(()=>{
    // Push initial state
    // page starts null — replaced when loadData completes

    function onPop(e){
      const s=e.state;
      if(!s){
        window.history.pushState({page:"dashboard",modal:null,detail:null},"","/");
        setPage("dashboard");setModal(null);setDetailHabit(null);setShowUpdates(false);setShowHamburger(false);
        return;
      }
      // N8-B: close panel sheets before restoring page state
      setShowPanelTheme(false);
      setShowPanelRefer(false);
      setShowPanelExport(false);
      setShowManageSub(false);
      setShowSignOutConfirm(false);
      setShowAboutSheet(false);
      // N8-A: restore panel-open state if pushed by navigateTo(fromPanel)
      if(s.showHamburger){
        setShowHamburger(true);
        setPage(s.page||"dashboard");
        setModal(null);setDetailHabit(null);setShowUpdates(false);
        return;
      }
      // N8-B: close named panel sheet (back from sheet)
      if(s.panelSheet){
        setShowHamburger(true);// keep panel open
        return;
      }
      // Restore state directly
      setPage(s.page||"dashboard");
      setModal(s.modal||null);
      setDetailHabit(s.detail||null);
      setShowUpdates(s.updates||false);
      setShowHamburger(false);
    }
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[]);
  // N.4: Notification deep-linking. When the app opens from a notification tap
  // carrying ?tab=, navigate to that page (or open the right modal) once boot is
  // complete, then strip the param so it doesn't re-fire on refresh/back. Unknown/
  // unsupported tabs are ignored (safe no-op). Runs once, after page is set and
  // onboarding isn't showing.
  const _deepLinkHandled=React.useRef(false);
  useEffect(()=>{
    if(_deepLinkHandled.current)return;
    if(page===null||showOnboarding)return;// wait for boot / don't interrupt onboarding
    let tab=null;
    try{tab=new URLSearchParams(window.location.search).get("tab");}catch(e){}
    _deepLinkHandled.current=true;
    if(!tab)return;
    // Real pages navigate directly. journal/pomodoro/coach are MODALS, not pages —
    // they render on top of dashboard, so route there first, then open the modal.
    const PAGES={dashboard:"dashboard",habits:"habits",goals:"goals",analytics:"analytics",score:"score",friends:"friends",profile:"profile"};
    const MODALS={journal:"journal",pomodoro:"pomodoro"};// coach handled separately (consent-gated)
    // Always clean the param regardless, so a stale ?tab= never sticks.
    try{window.history.replaceState(window.history.state||{page:page},"","/");}catch(e){}
    if(tab==="coach"){
      if(page!=="dashboard")navigateTo("dashboard");
      setTimeout(()=>{try{openAIModal();}catch(e){}},350);// consent-gated: shows AI disclosure first if not yet accepted
      return;

      // Deep-link tab travels via the SW notification (closed) OR onclick (open tab).
      const url="/?tab="+(item.tab||"dashboard");
      // Same routing rule as the boot-time deep-link handler: journal/pomodoro are
      // modals (open on dashboard), coach is consent-gated via openAIModal, everything
      // else is a real page via navigateTo.
      function goToTarget(){
        const tb=item.tab;
        if(tb==="coach"){if(page!=="dashboard")navigateTo("dashboard");setTimeout(()=>{try{openAIModal();}catch(e){}},300);return;}
        if(tb==="journal"||tb==="pomodoro"){if(page!=="dashboard")navigateTo("dashboard");setTimeout(()=>{try{openModal(tb);}catch(e){}},300);return;}
        try{navigateTo(tb||"dashboard");}catch(e){}
      }
      // M7: Mo face per notification type, instead of the generic app icon for every single one.
      const MO_ICON_MAP={milestone:"/mo/mo-fist-pump.png",perfectday:"/mo/mo-celebrate.png",scoredigest:"/mo/mo-analyse.png",comeback:"/mo/mo-comeback.png",challengenudge:"/mo/mo-flex.png",challengestatus:"/mo/mo-trophy.png",features:"/mo/mo-presenting.png",aiteaser:"/mo/mo-thinking.png",encouragement:"/mo/mo-thumbs-up.png"};
      const moIcon=MO_ICON_MAP[item.type]||"/icon-192.png";
      try{
        const n=new Notification("⚡ Momentum",{body:item.body,icon:moIcon,image:moIcon,badge:"/icon-192.png",tag:"n2_"+item.type+"_"+n2Today(),vibrate:[200,100,200],data:{url}});
        n.onclick=()=>{window.focus();goToTarget();n.close();};
      }catch(e){
        try{if(navigator.serviceWorker&&navigator.serviceWorker.controller){navigator.serviceWorker.ready.then(reg=>reg.showNotification("⚡ Momentum",{body:item.body,icon:moIcon,image:moIcon,tag:"n2_"+item.type+"_"+n2Today(),vibrate:[200,100,200],data:{url}}));}}catch(e2){}
      }
      try{playSound(notifSound);}catch(e){}
    }

    // Build context + evaluate. Score delta from the already-loaded score store.
    const flNow=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_focuslog")||"{}");}catch{return{};}})();
    const sd=getScoreWithDelta(habits||[],goals||[],journals||{},flNow,{active:false,wins:0,activeDays:0},goalStats);
    const dripDone=_notifStore.freeDripDay>=7||(signupDate&&n2DaysBetween(signupDate,n2Today())>=7);
    const ctx={
      habits:habits||[],goals:goals||[],journals:journals||{},
      pk,name:(displayName||user.displayName||"").trim().split(" ")[0]||"",
      signupDate,lastShown:_notifStore.lastShown,prefs:_notifStore.prefs,
      milestonesNotified:_notifStore.milestonesNotified,
      scoreVal:sd.score,scoreDelta:sd.delta,dowSun:new Date().getDay()===0,dripDone,
      challengeSummary:_challengeSummary,// N.2 challenge wiring: cheap summary from FriendsPage
    };
    const eligible=n2Evaluate(ctx);

    // ── FREE 7-DAY DRIP (overrides rotation for Free users in their first week) ──
    // One fixed message per day, sequenced. Uses signupDate to derive the day index.
    const isPaidUser=pk==="pro"||pk==="plus";
    if(!isPaidUser&&signupDate){
      const dayIdx=n2DaysBetween(signupDate,n2Today()); // 0 on signup day
      if(dayIdx>=0&&dayIdx<7){
        const dripKey="drip_"+dayIdx;
        if(!_notifStore.lastShown[dripKey]){
          const dripItem={type:dripKey,slot:"reward",tab:(dayIdx===6?"coach":dayIdx===1?"journal":dayIdx===2?"pomodoro":dayIdx===3?"analytics":dayIdx===4?"goals":"dashboard"),
            body:n2Fill(N2_DRIP[dayIdx],ctx.name)};
          const t2=setTimeout(()=>{fireN2(dripItem);},2500);
          return()=>clearTimeout(t2);
        }
      }
    }

    if(eligible.length===0)return;

    // SLOT 1 (reward): prefer a reward-slot item; else the top item. Fire ~2s after open.
    const reward=eligible.find(e=>e.slot==="reward")||eligible[0];
    const rewardTimer=setTimeout(()=>{fireN2(reward);},2500);

    // SLOT 2 (nudge): a different-type nudge, only if user still active ~6 min in.
    const nudge=eligible.find(e=>e.slot==="nudge"&&e.type!==reward.type);
    let nudgeTimer=null;
    if(nudge){
      nudgeTimer=setTimeout(()=>{
        // Active = interacted within the last 90s. Otherwise skip (never fire into idle).
        if(Date.now()-_n2LastActivity.current<=90000)fireN2(nudge);
      },6*60000);
    }
    return()=>{clearTimeout(rewardTimer);if(nudgeTimer)clearTimeout(nudgeTimer);};
  },[user,page,showOnboarding,habits,notif]);

  // Reliability fix: self-heal accounts whose initial profile write silently failed (e.g. a dropped
  // connection during signup), leaving habits/onboarding data but no email/plan/signupDate/userNumber.
  // email + displayName are fully recoverable from Firebase Auth (always present the instant sign-in
  // succeeds). plan/signupDate/userNumber/referredBy cannot be truly recovered — these get safe
  // defaults (free plan, today's date, next counter number, no referral credit) rather than left blank.
  async function ensureProfileFields(uid,authEmail,authDisplayName){
    try{
      const ref=fb.doc(fb.db,"users",uid);
      const snap=await fb.getDoc(ref);
      if(!snap.exists())return; // nothing to heal — normal creation path will handle it
      const d=snap.data();
      if(d.email&&d.plan)return; // profile already intact, nothing to do
      let num=d.userNumber;
      if(!num){
        await fb.runTransaction(fb.db,async tx=>{
          const cRef=fb.doc(fb.db,"meta","userCount");
          const cSnap=await tx.get(cRef);
          num=cSnap.exists()?(cSnap.data().count||0)+1:1;
          tx.set(cRef,{count:num},{merge:true});
        });
      }
      const patch={};
      if(!d.email)patch.email=authEmail||null;
      if(!d.displayName&&authDisplayName)patch.displayName=authDisplayName;
      if(!d.plan)patch.plan="free";
      if(d.planExpiry===undefined)patch.planExpiry=null;
      if(!d.signupDate)patch.signupDate=today;
      if(!d.userNumber)patch.userNumber=num;
      if(d.referredBy===undefined)patch.referredBy=null;
      if(!d.referralBonusDaysGranted)patch.referralBonusDaysGranted=0;
      patch.dataRecovered=true;
      patch.dataRecoveredAt=new Date().toISOString();
      await fb.setDoc(ref,patch,{merge:true});
      console.warn("Self-healed incomplete profile for uid:",uid,patch);
    }catch(e){console.error("Profile self-heal err:",e);}
  }

        const isExpiredPlan=(loadedPlan==="pro"||loadedPlan==="plus")&&loadedExpiry&&new Date()>new Date(loadedExpiry);
        const isLegacyEarly=loadedPlan==="early_access";
        const basePlan=(isExpiredPlan||isLegacyEarly)?"free":loadedPlan;
        const baseExpiry=(isExpiredPlan||isLegacyEarly)?null:loadedExpiry;
        let finalWrite=(isExpiredPlan||isLegacyEarly)?{plan:"free",planExpiry:null}:null;
        // Item 39: check referral milestones every login — covers normal Free/Pro accumulation AND Plus-banked rewards becoming
        // redeemable the moment Plus lapses (uses their CURRENT live referral count, not a frozen snapshot from while on Plus)
        try{
          const refQ=fb.query(fb.collection(fb.db,"users"),fb.where("referredBy","==",uid),fb.where("onboardingCompleted","==",true));
          const refSnap=await fb.getDocs(refQ);

          if(grant)finalWrite={...(finalWrite||{}),...grant};

        loadScoreStore(d);// SC2: load dated score history (scoreHistory + scoreMonthly) for real deltas
        loadNotifStore(d);// N.2: load notification rotation state (lastShown, prefs, milestones, drip)
        refreshFriendReqCount(uid).catch(()=>{});// F1: background, non-blocking
        // C2: Firestore is primary truth — localStorage only a cache
        if(d.onboardingCompleted===true){
          localStorage.setItem("hg_onboard_done","1");
          setPage("dashboard");
        } else if(d.onboardingCompleted===false){
          localStorage.removeItem("hg_onboard_done");
          setShowOnboarding(true);
          setPage("dashboard");// onboarding overlay covers this
        } else {
          // Old account, no field → treat as done
          localStorage.setItem("hg_onboard_done","1");
          setPage("dashboard");
        }
      } else {
        localStorage.removeItem("hg_onboard_done");
        setShowOnboarding(true);
        setPage("dashboard");// onboarding overlay covers dashboard
        let num=101;
        await fb.runTransaction(fb.db,async tx=>{
          const cRef=fb.doc(fb.db,"meta","userCount");
          const cSnap=await tx.get(cRef);
          num=cSnap.exists()?(cSnap.data().count||0)+1:1;
          tx.set(cRef,{count:num},{merge:true});
        });
        // Check for referral code in URL — Item 39: full UIDs are case-sensitive, so no upper/lowercasing here
        // REFERRAL FIX: fall back to the localStorage value captured on app load, since a
        // mobile Google sign-in redirect wipes the URL params before we reach this point.
        let urlRef=new URLSearchParams(window.location.search).get("ref");
        if(!urlRef){try{urlRef=localStorage.getItem("hg_pending_ref");}catch(e){}}
        // A user cannot refer themselves.
        if(urlRef===uid)urlRef=null;
        const referredBy=urlRef||null;
        // Item 39: referred signups get 7 days Pro free immediately — a one-time, isolated grant separate from
        // this user's own future referrer ladder (which starts fresh at 0 the moment THEY make their first referral)
        let plan2="free",expStr=null;
        if(referredBy){
          plan2="pro";
          const exp=new Date();exp.setDate(exp.getDate()+7);
          expStr=exp.toISOString();
        }
        setPk(plan2);setPe(expStr);

        const newAccountData={habits:[],goals:[],journals:{},themeKey:"obsidian",plan:plan2,planExpiry:expStr,signupDate:today,userNumber:num,email,referredBy:referredBy||null,referralBonusDaysGranted:0,onboardingCompleted:false};
        // Reliability fix: account creation is critical — retry silently on transient failures
        // (flaky mobile connections) instead of letting the write fail silently and leaving
        // a user with no profile fields once onboarding's own save creates a bare-bones doc.
        let created=false;
        for(let attempt=0;attempt<3&&!created;attempt++){
          try{
            await fb.setDoc(ref,newAccountData);
            created=true;
          }catch(e){
            console.warn("Account creation attempt "+(attempt+1)+" failed:",e);
            if(attempt<2)await new Promise(r=>setTimeout(r,600*(attempt+1)));
          }
        }
        if(!created)console.error("Account creation failed after 3 attempts — will self-heal on next login via the existing-account backfill check.");
        // REFERRAL FIX: consume the pending ref so it can't attach to a different account
        // created later on the same device.
        try{localStorage.removeItem("hg_pending_ref");}catch(e){}
      }
    }catch(e){console.error("Load err:",e);setPage("dashboard");}// Always unblock on error
  }

  // S7: XSS sanitizer — strip HTML tags before any Firebase write
  function sanitizeInput(str,maxLen=200){
    if(typeof str!=="string")return str;
    return str.replace(/<[^>]*>/g,"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]||c)).slice(0,maxLen);
  }

  async function save(h,g,j,theme,gh){
    if(!user)return;
    // #33: offline mode was never actually wired up — saveOfflineAware() existed but was
    // never called anywhere, so every habit/goal tap while offline just let fb.setDoc hang
    // (no IndexedDB persistence is configured on this Firestore instance) with zero durable
    // record of the attempt. Handling it here instead of at each of the 28+ call sites means
    // every existing mutation gets offline support automatically, with nothing else to change.
    if(isOffline){
      try{
        localStorage.setItem("hg_offline_pending",JSON.stringify({habits:h,goals:g,journals:j,themeKey:theme,timestamp:Date.now()}));
        showToast("Saved locally — will sync when you're back online");
      }catch(e){console.warn("Offline snapshot err:",e);}
      return;// skip the Firestore write attempt entirely — nothing to hang on
    }
    setSaving(true);
    // SC3+SC4: compute score + components and persist to Firestore alongside user data
    const flNow=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_focuslog")||"{}");}catch{return{};}})();
    const scoreResult=calculateMomentumScore(h||[],g||[],j||{},flNow,{active:false,wins:0,activeDays:0},goalStats);
    // SC2: record today's score into dated history (365-day daily + permanent monthly)
    const scoreSnap=recordScoreSnapshot(scoreResult.total);
    // Fix 12: goalHistory no longer stored in main document — uses subcollection instead
    try{await fb.setDoc(fb.doc(fb.db,"users",user.uid),{
      habits:h,goals:g,journals:j,themeKey:theme,
      displayName:sanitizeInput(displayName||user.displayName||"",50),
      momentumScore:scoreResult.total,
      momentumScoreUpdated:new Date().toISOString(),
      scoreComponents:scoreResult.components,
      scoreHistory:scoreSnap.scoreHistory,
      scoreMonthly:scoreSnap.scoreMonthly
    },{merge:true});
    // #33: a pending offline snapshot exists only if a save happened while offline and
    // hasn't synced yet. Once a real online save succeeds, whatever's pending is now stale
    // (this save is newer) — clear it so a later reconnect doesn't re-push old data over new.
    try{localStorage.removeItem("hg_offline_pending");}catch(e){}
    }
    catch(e){console.error("Save err:",e);}
    setSaving(false);
  }

  // addTpl() removed (H4 fix) — was only used by the deleted legacy pill-style template picker
  function toggleH(id){
    const h=habits.map(hb=>{
      if(hb.id!==id)return hb;
      const log={...hb.log};
      const hasGoal=hb.goalCount>0&&hb.goalUnit;
      if(hasGoal){
        // Count-based: increment count, mark done only when count >= goalCount
        const current=typeof log[today]==="number"?log[today]:log[today]?hb.goalCount:0;
        if(current>=hb.goalCount){
          // Already complete — reset to 0 (untick all)
          delete log[today];
        } else {
          // Increment by 1
          const next=current+1;
          log[today]=next>=hb.goalCount?hb.goalCount:next;
        }
      } else {
        // Simple toggle
        const was=!!log[today];
        if(was)delete log[today];else log[today]=true;
      }
      const isDone=hasGoal?(typeof log[today]==="number"&&log[today]>=hb.goalCount):!!log[today];
      // Streak requires FULL completion only
      const isFullDone=(dateStr,lg,hbObj)=>isFullDoneOn(hbObj,dateStr,lg[dateStr]);
      let streak=0,best=hb.best||0;
      const d=new Date();
      while(true){const s=d.toLocaleDateString("en-CA");if(!isFullDone(s,log,hb))break;streak++;d.setDate(d.getDate()-1);}
      if(streak>best)best=streak;
      if(isDone&&BADGES.some(b=>b.d===streak)){setConfetti(true);showToast("🏆 "+streak+"-day streak badge!","badge");pushStreakCard(hb,streak);}
      if(isDone&&streak===7&&!localStorage.getItem("hg_reviewed")){
        setTimeout(()=>setShowReview(true),2000);
      }
      return{...hb,log,streak,best};
    });
    setHabits(h);save(h,goals,journals,tk);
  }

  // H5: Pomodoro → Habit time link. Adds focused minutes to a time-based habit's log for today.
  // Auto-completes the habit once the target is reached — manual +1 tap (toggleH) still works independently and untouched.
  // Not capped at goalCount: going over shows as "+extra" (e.g. 75/60 min) so overtime focus is visible, not hidden.
  function logHabitTime(habitId,minutesAdded){
    if(!habitId||!minutesAdded)return null;
    let result=null;
    const h=habits.map(hb=>{
      if(hb.id!==habitId)return hb;
      if(!(hb.goalCount>0&&isTimeUnit(hb.goalUnit))){result={skipped:true};return hb;}
      const mult=timeUnitMinutesMultiplier(hb.goalUnit);
      const unitsToAdd=minutesAdded/mult;
      const log={...hb.log};
      const before=typeof log[today]==="number"?log[today]:(log[today]?hb.goalCount:0);
      const wasComplete=before>=hb.goalCount;
      const after=Math.round((before+unitsToAdd)*100)/100;
      log[today]=after;
      const nowComplete=after>=hb.goalCount;
      const isFullDone=(dateStr,lg,hbObj)=>isFullDoneOn(hbObj,dateStr,lg[dateStr]);
      let streak=0,best=hb.best||0;
      const d=new Date();
      while(true){const s=d.toLocaleDateString("en-CA");if(!isFullDone(s,log,hb))break;streak++;d.setDate(d.getDate()-1);}
      if(streak>best)best=streak;
      if(!wasComplete&&nowComplete&&BADGES.some(b=>b.d===streak)){setConfetti(true);showToast("🏆 "+streak+"-day streak badge!","badge");pushStreakCard(hb,streak);}
      result={justCompleted:!wasComplete&&nowComplete,habitName:hb.name,goalCount:hb.goalCount,goalUnit:hb.goalUnit,total:after,extra:Math.max(0,Math.round((after-hb.goalCount)*100)/100)};
      return{...hb,log,streak,best};
    });
    setHabits(h);save(h,goals,journals,tk);
    return result;
  }
  function applyStreakFreeze(id){
    if(!plan.streakFreeze){showUp("Streak Freeze is a Plus feature — protect your streak once a month.");return;}
    const monthKey=today.slice(0,7); // "2026-05"
    const freezeKey="hg_freeze_"+id+"_"+monthKey;
    if(localStorage.getItem(freezeKey)){showToast("Streak Freeze already used this month for this habit.","info");return;}
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    const yd=yesterday.toLocaleDateString("en-CA");
    const h=habits.map(hb=>{
      if(hb.id!==id)return hb;
      const log={...hb.log};
      // Mark yesterday as "freeze" so streak continues
      if(!log[yd])log[yd]="freeze";
      // Recalculate streak — full completion only (Fix 1 consistency); "freeze" marker always counts as full
      const isFullDone=(dateStr,lg,hbObj)=>{const v=lg[dateStr];if(v==="freeze")return true;return isFullDoneOn(hbObj,dateStr,v);};
      let streak=0,best=hb.best||0;
      const d=new Date();
      while(true){const s=d.toLocaleDateString("en-CA");if(!isFullDone(s,log,hb))break;streak++;d.setDate(d.getDate()-1);}
      if(streak>best)best=streak;
      return{...hb,log,streak,best};
    });

  async function saveGoalHistory(newGH){

    // Cap at 50 — remove oldest if exceeded
    const capped=newGH.length>50?newGH.slice(newGH.length-50):newGH;
    setGoalHistory(capped);
    localStorage.setItem(cacheKey,JSON.stringify(capped));
    // Sync to Firestore subcollection
    try{
      const ghRef=fb.collection(fb.db,"users",uid,"goalHistory");
      const existing=await fb.getDocs(ghRef);
      const batch=fb.writeBatch(fb.db);
      existing.forEach(d=>batch.delete(d.ref));
      await batch.commit();
      for(const g of capped){
        const docRef=fb.doc(fb.collection(fb.db,"users",uid,"goalHistory"),String(g.id||Date.now()));
        await fb.setDoc(docRef,g,{merge:true});

  // ── F1/F3–F6: Friends Page (Phase 9, Block 1) ─────────────────────────────
  function FriendsPage(){

    const[showScanner,setShowScanner]=React.useState(false);
    const[confirmUnfriend,setConfirmUnfriend]=React.useState(null);// double-confirm before removing a friend
    const[viewFriend,setViewFriend]=React.useState(null);// friend profile modal

    // F7–F9: Challenges (Phase 9 Block 2)
    const[myChallenges,setMyChallenges]=React.useState([]);

    const[loadingC,setLoadingC]=React.useState(true);

    const[newTitle,setNewTitle]=React.useState("");
    const[newHabitId,setNewHabitId]=React.useState("");
    const[newDuration,setNewDuration]=React.useState(7);
    const[newFriendUids,setNewFriendUids]=React.useState([]);
    const[newHabitTextC,setNewHabitTextC]=React.useState("");// inline "+ Create new habit" input — Create Challenge form
    const[winnerCard,setWinnerCard]=React.useState(null);// {challenge,winnerName}

    const friendLimit=pk==="plus"?Infinity:pk==="pro"?3:1;// R9-E: Free can accept (not send) up to 1 friend, enough to join a challenge
    const challengeLimit=pk==="plus"?Infinity:pk==="pro"?3:1;// R9-E: Free can join (not create) 1 active challenge
    const myOwnScore=(()=>{try{const fl=JSON.parse(localStorage.getItem("hg_pomo_focuslog")||"{}");return getScoreWithDelta(habits,goals,journals,fl,{active:false,wins:0,activeDays:0},goalStats).score;}catch{return null;}})();// R9-G: for the corner comparison capsule

    async function loadAll(){
      if(!user?.uid)return;
      setLoadingF(true);
      try{
        const[inSnap,outSnap,frSnap]=await Promise.all([
          fb.getDocs(fb.query(fb.collection(fb.db,"friendRequests"),fb.where("toUid","==",user.uid),fb.where("status","==","pending"))),
          fb.getDocs(fb.query(fb.collection(fb.db,"friendRequests"),fb.where("fromUid","==",user.uid),fb.where("status","==","pending"))),
          fb.getDocs(fb.collection(fb.db,"users",user.uid,"friends"))
        ]);
        const inc=[];inSnap.forEach(d=>inc.push({id:d.id,...d.data()}));
        const out=[];outSnap.forEach(d=>out.push({id:d.id,...d.data()}));
        const frList=[];frSnap.forEach(d=>frList.push({id:d.id,...d.data()}));
        const enriched=await Promise.all(frList.map(async f=>{
          try{
            const pSnap=await fb.getDoc(fb.doc(fb.db,"publicProfiles",f.uid));
            const pd=pSnap.exists()?pSnap.data():{};
            return{...f,score:pd.score??null,streak:pd.streak??null,habitCount:pd.habitCount??null,challengeWins:pd.challengeWins||0};
          }catch(e){return{...f,score:null,streak:null,habitCount:null,challengeWins:0};}
        }));

      }catch(e){console.error("Friends load err:",e);}
      setLoadingF(false);
    }
    React.useEffect(()=>{loadAll();},[]);

    async function syncMyPublicProfile(){
      if(!user?.uid||!momentumId)return;
      try{
        const flNow=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_focuslog")||"{}");}catch{return{};}})();
        const scoreData=getScoreWithDelta(habits,goals,journals,flNow,{active:false,wins:0,activeDays:0},goalStats);
        const bestStreak=habits.length>0?Math.max(...habits.map(h=>h.best||h.streak||0)):0;
        await fb.setDoc(fb.doc(fb.db,"publicProfiles",user.uid),{
          momentumId,displayName:displayName||user.displayName||"User",photoURL:user.photoURL||null,
          score:scoreData.score,streak:bestStreak,habitCount:habits.length,
          challengeWins:0,// F9: wired once Challenges (Block 2) ship
          updatedAt:new Date().toISOString()
        },{merge:true});
      }catch(e){/* publicProfiles rules not deployed yet — expected until rules session */}
    }
    React.useEffect(()=>{if(momentumId)syncMyPublicProfile();},[momentumId]);

    async function sendRequest(){
      if(pk==="free"){showUp("Adding friends is a Pro feature — add up to 3 on Pro, unlimited on Plus.");return;}
      const targetId=sanitizeInput(searchVal.trim(),40);
      if(!targetId){showToast("Enter a Momentum ID","err");return;}
      if(friendsList.length>=friendLimit){showUp("You've reached your friend limit — upgrade for more room.");return;}
      if(friendsList.some(f=>f.momentumId===targetId)){showToast("Already friends","err");return;}
      if(outgoing.some(o=>o.toMomentumId===targetId)){showToast("Request already sent","err");return;}
      setBusy(true);
      try{
        const idxSnap=await fb.getDoc(fb.doc(fb.db,"momentumIdIndex",targetId));
        if(!idxSnap.exists()){showToast("No user found with that Momentum ID","err");setBusy(false);return;}
        const targetUid=idxSnap.data().uid;
        if(targetUid===user.uid){showToast("That's your own Momentum ID","err");setBusy(false);return;}
        const reqId=user.uid+"_"+targetUid;
        await fb.setDoc(fb.doc(fb.db,"friendRequests",reqId),{
          fromUid:user.uid,toUid:targetUid,
          fromMomentumId:momentumId,fromDisplayName:displayName||user.displayName||"User",fromPhotoURL:user.photoURL||null,
          toMomentumId:targetId,
          status:"pending",createdAt:new Date().toISOString()
        },{merge:true});
        showToast("Friend request sent!");
        setSearchVal("");
        loadAll();
      }catch(e){console.error(e);showToast("Couldn't send request — try again","err");}
      setBusy(false);
    }

    async function respond(req,accept){
      setBusy(true);
      try{
        if(accept){
          if(friendsList.length>=friendLimit){showUp("You've reached your friend limit — upgrade for more room.");setBusy(false);return;}
          const batch=fb.writeBatch(fb.db);
          batch.set(fb.doc(fb.db,"friendRequests",req.id),{status:"accepted",respondedAt:new Date().toISOString()},{merge:true});
          batch.set(fb.doc(fb.db,"users",user.uid,"friends",req.fromUid),{uid:req.fromUid,momentumId:req.fromMomentumId,displayName:req.fromDisplayName,photoURL:req.fromPhotoURL||null,addedAt:new Date().toISOString()},{merge:true});
          batch.set(fb.doc(fb.db,"users",req.fromUid,"friends",user.uid),{uid:user.uid,momentumId,displayName:displayName||user.displayName||"User",photoURL:user.photoURL||null,addedAt:new Date().toISOString()},{merge:true});
          await batch.commit();
          showToast("Friend added!");
        }else{
          await fb.deleteDoc(fb.doc(fb.db,"friendRequests",req.id));
        }
        loadAll();
      }catch(e){console.error(e);showToast("Couldn't complete — try again","err");}
      setBusy(false);
    }

      setBusy(true);

    // ── F7–F9: Challenges (Phase 9 Block 2) ─────────────────────────────────
    function habitById(id){return habits.find(h=>h.id===id);}

    function computeProgress(habitId,startDate,endDate){
      const habit=habitById(habitId);
      const todayStr=today;
      const end=endDate<todayStr?endDate:todayStr;// never score past today
      let d=new Date(startDate+"T12:00:00");
      const endD=new Date(end+"T12:00:00");
      let daysCompleted=0,streakFreezeUsed=0;const completedDates=[];
      while(d<=endD){
        const ds=d.toLocaleDateString("en-CA");
        if(habit){
          if(isChallengeDayDone(habit,ds)){daysCompleted++;completedDates.push(ds);}
          if(habit.log&&habit.log[ds]==="freeze")streakFreezeUsed++;
        }
        d.setDate(d.getDate()+1);
      }
      return{daysCompleted,completedDates,streakFreezeUsed};
    }

    async function loadChallenges(){
      if(!user?.uid)return;
      setLoadingC(true);
      try{
        const[mineSnap,invSnap]=await Promise.all([
          fb.getDocs(fb.query(fb.collection(fb.db,"challenges"),fb.where("participants","array-contains",user.uid))),
          fb.getDocs(fb.query(fb.collection(fb.db,"challenges"),fb.where("invitedUids","array-contains",user.uid)))
        ]);
        const mine=[];mineSnap.forEach(d=>mine.push({id:d.id,...d.data()}));
        const inv=[];invSnap.forEach(d=>inv.push({id:d.id,...d.data()}));
        // enrich each of my challenges with the participants' progress + sync my own first
        const enriched=await Promise.all(mine.map(async c=>{
          const myProg=(c.participantHabits||{})[user.uid];
          if(myProg){
            try{
              const p=computeProgress(myProg.habitId,c.startDate,c.endDate);
              await fb.setDoc(fb.doc(fb.db,"challenges",c.id,"progress",user.uid),{
                uid:user.uid,momentumId,displayName:displayName||user.displayName||"User",photoURL:user.photoURL||null,
                linkedHabitId:myProg.habitId,linkedHabitName:myProg.habitName,
                ...p,lastSyncedAt:new Date().toISOString()
              },{merge:true});
            }catch(e){/* progress rules not deployed yet */}
          }
          let progressList=[];
          try{
            const pSnap=await fb.getDocs(fb.collection(fb.db,"challenges",c.id,"progress"));
            pSnap.forEach(pd=>progressList.push(pd.data()));
          }catch(e){}
          progressList.sort((a,b)=>(b.daysCompleted||0)-(a.daysCompleted||0));
          const ended=c.endDate<today;
          return{...c,progressList,ended};
        }));
        setMyChallenges(enriched);
        setChallengeInvites(inv);
        // N.2 challenge-notif wiring: report a LIGHTWEIGHT summary to the shared store
        // instead of duplicating this expensive multi-query load inside the App-scope
        // engine. The engine reads _challengeSummary (cheap, already-computed) rather
        // than re-querying challenges/progress on every notification evaluation.
        try{
          const active=enriched.filter(c=>!c.ended);
          _challengeSummary.hasActive=active.length>0;
          _challengeSummary.hasFriendsNoChallenge=(friendsList?.length||0)>0&&active.length===0;
          _challengeSummary.standings=active.map(c=>{
            const mine=c.progressList.find(p=>p.uid===user.uid);
            const others=c.progressList.filter(p=>p.uid!==user.uid);
            const topOther=others.sort((a,b)=>(b.daysCompleted||0)-(a.daysCompleted||0))[0];
            if(!mine||!topOther)return null;
            const diff=(mine.daysCompleted||0)-(topOther.daysCompleted||0);
            return{challengeId:c.id,leading:diff>0,tied:diff===0,friendName:topOther.displayName||"a friend",diff:Math.abs(diff)};
          }).filter(Boolean);
        }catch(e){}
      }catch(e){console.error("Challenges load err:",e);}
      setLoadingC(false);
    }
    React.useEffect(()=>{loadChallenges();},[]);

    async function createChallenge(){
      if(pk==="free"){showUp("Creating challenges is a Pro feature — join is free, creating needs Pro or Plus.");return;}
      if(challengeLimit!==Infinity&&myChallenges.filter(c=>!c.ended).length>=challengeLimit){
        showUp("You've reached your active challenge limit — upgrade to Plus for unlimited challenges.");return;
      }
      if(!newHabitId||newHabitId==="__new__"){showToast("Pick or create a habit to track","err");return;}
      if(newFriendUids.length===0){showToast("Pick at least one friend","err");return;}
      const maxMembers=pk==="plus"?50:20;
      if(newFriendUids.length+1>maxMembers){showToast("Too many members for this plan","err");return;}
      setBusy(true);
      try{
        const habit=habitById(newHabitId);
        const start=today;
        const endD=new Date(start+"T12:00:00");endD.setDate(endD.getDate()+newDuration-1);
        const end=endD.toLocaleDateString("en-CA");
        const title=sanitizeInput(newTitle.trim(),60)||((habit?.name||"Habit")+" — "+newDuration+" Day Challenge");
        // habitTemplate: the creator's exact habit settings (name/icon/category/color/frequency/
        // goal count+unit — NOT reminder time, streak, or log, which are personal/fresh per
        // person) so every invitee who joins gets an identical habit auto-created, rather than
        // having to pick or build their own from scratch.
        const habitTemplate=habit?{name:habit.name,cat:habit.cat,icon:habit.icon,color:habit.color,freq:habit.freq,goalCount:habit.goalCount||0,goalUnit:habit.goalUnit||""}:null;
        const ref=await fb.addDoc(fb.collection(fb.db,"challenges"),{
          creatorUid:user.uid,title,durationDays:newDuration,startDate:start,endDate:end,
          participants:[user.uid],invitedUids:newFriendUids,maxMembers,status:"active",
          participantHabits:{[user.uid]:{habitId:newHabitId,habitName:habit?.name||"Habit"}},
          habitTemplate,
          createdAt:new Date().toISOString()
        });
        await fb.setDoc(fb.doc(fb.db,"challenges",ref.id,"progress",user.uid),{
          uid:user.uid,momentumId,displayName:displayName||user.displayName||"User",photoURL:user.photoURL||null,
          linkedHabitId:newHabitId,linkedHabitName:habit?.name||"Habit",
          daysCompleted:0,completedDates:[],streakFreezeUsed:0,lastSyncedAt:new Date().toISOString()
        },{merge:true});
        showToast("Challenge created!");
        setShowCreateChallenge(false);setNewTitle("");setNewHabitId("");setNewDuration(7);setNewFriendUids([]);
        loadChallenges();
      }catch(e){console.error(e);showToast("Couldn't create challenge — try again","err");}
      setBusy(false);
    }

    async function acceptInvite(c){
      if(challengeLimit!==Infinity&&myChallenges.filter(x=>!x.ended).length>=challengeLimit){
        showUp("You've reached your active challenge limit — upgrade to Plus for unlimited challenges.");return;
      }
      if((c.participants||[]).length>=(c.maxMembers||20)){showToast("This challenge is full","err");return;}
      if(habits.length>=plan.maxH){showUp("Free plan: max "+PLANS.free.maxH+" habits. Upgrade to Pro for unlimited!");return;}
      setBusy(true);
      try{
        // Auto-clone the creator's exact habit settings — no more manual habit picking.
        // Older challenges created before this change won't have habitTemplate; for those,
        // fall back to a plain habit named after the challenge so joining still works.
        const tmpl=c.habitTemplate||{name:c.title,cat:"Health",icon:"⭐",color:t.accent,freq:"daily",goalCount:0,goalUnit:""};
        const newHabitId=Date.now();
        const newHabit={
          id:newHabitId,name:tmpl.name,cat:tmpl.cat,icon:tmpl.icon,color:tmpl.color,freq:tmpl.freq,
          goalCount:tmpl.goalCount||0,goalUnit:tmpl.goalUnit||"",remTime:"",streak:0,best:0,log:{},
          challengeId:c.id,challengeEndDate:c.endDate// tags this habit as challenge-linked for the badge + auto-cleanup of the tag
        };
        const updatedHabits=[...habits,newHabit];
        setHabits(updatedHabits);save(updatedHabits,goals,journals,tk);
        await fb.setDoc(fb.doc(fb.db,"challenges",c.id),{
          participants:fb.arrayUnion(user.uid),
          invitedUids:fb.arrayRemove(user.uid),
          [`participantHabits.${user.uid}`]:{habitId:newHabitId,habitName:tmpl.name}
        },{merge:true});
        await fb.setDoc(fb.doc(fb.db,"challenges",c.id,"progress",user.uid),{
          uid:user.uid,momentumId,displayName:displayName||user.displayName||"User",photoURL:user.photoURL||null,
          linkedHabitId:newHabitId,linkedHabitName:tmpl.name,
          daysCompleted:0,completedDates:[],streakFreezeUsed:0,lastSyncedAt:new Date().toISOString()
        },{merge:true});
        showToast(tmpl.icon+" "+tmpl.name+" added to your habits — challenge joined!");
        try{window.trackEvent&&window.trackEvent("challenge_joined",{});}catch(e){}
        loadChallenges();
      }catch(e){console.error(e);showToast("Couldn't join — try again","err");}
      setBusy(false);
    }

                      <div style={{fontSize:10,color:t.muted,marginTop:1}}>{p.linkedHabitName||"—"}{p.streakFreezeUsed>0?" · 🛡 "+p.streakFreezeUsed+" freeze used":""}</div>
