  cyber:{bg:"#020510",card:"#080d1f",border:"#0f2040",text:"#e0f0ff",muted:"#4a6080",accent:"#00f5d4",accent2:"#7b2fff",surface:"#0a1228",success:"#00f5d4",danger:"#ff4d6d",info:"#7b2fff",name:"Cyber"},

function today(){return new Date().toISOString().split("T")[0];}
function fmtDate(d){return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function getBadge(streak){let b=null;for(const x of BADGES)if(streak>=x.days)b=x;return b;}

function Confetti({active,onDone}){
  const ref=useRef();
  useEffect(()=>{
    if(!active)return;
    const c=ref.current;if(!c)return;
    c.width=window.innerWidth;c.height=window.innerHeight;
    const ctx=c.getContext("2d");
    const cols=["#f5c842","#e8853d","#4ade80","#60a5fa","#a78bfa","#f87171"];
    const ps=Array.from({length:100},()=>({x:Math.random()*c.width,y:-10-Math.random()*100,r:4+Math.random()*5,d:1.5+Math.random()*2.5,color:cols[Math.floor(Math.random()*cols.length)],angle:0,tiltSpd:0.1+Math.random()*0.3}));
    let raf;
    function draw(){
      ctx.clearRect(0,0,c.width,c.height);
      ps.forEach(p=>{p.y+=p.d;p.angle+=p.tiltSpd;ctx.beginPath();ctx.lineWidth=p.r;ctx.strokeStyle=p.color;ctx.moveTo(p.x+Math.sin(p.angle)*10,p.y);ctx.lineTo(p.x+Math.sin(p.angle)*10+p.r*2,p.y+p.r*2);ctx.stroke();});
      if(ps.some(p=>p.y<c.height))raf=requestAnimationFrame(draw);
      else{ctx.clearRect(0,0,c.width,c.height);onDone&&onDone();}
    }
    draw();
    return()=>cancelAnimationFrame(raf);
  },[active]);
  if(!active)return null;
  return React.createElement("canvas",{ref,style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999}});
}

function Ring({pct,size=80,stroke=8,color,label,sub,t}){
  const r=(size-stroke)/2,circ=2*Math.PI*r;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={t.border} strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={circ-(pct/100)*circ} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.6s ease"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:size>70?16:12,fontWeight:800,color:t.text}}>{pct}%</span>
        </div>
      </div>
      {label&&<span style={{fontSize:11,color:t.muted,marginTop:5,textAlign:"center"}}>{label}</span>}
      {sub&&<span style={{fontSize:10,color,fontWeight:700}}>{sub}</span>}
    </div>
  );
}

function Heatmap({habit,t}){
  const days=[];const now=new Date();
  for(let i=89;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);days.push(d.toISOString().split("T")[0]);}
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
      {days.map(d=><div key={d} title={d} style={{width:9,height:9,borderRadius:2,background:habit.log&&habit.log[d]?t.success:t.surface,border:`1px solid ${t.border}`,flexShrink:0}}/>)}
    </div>
  );
}

function Modal({t,onClose,title,children}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:"24px 24px 0 0",padding:"20px 20px 36px",width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <span style={{fontSize:18,fontWeight:700,color:t.text}}>{title}</span>
          <button onClick={onClose} style={{background:t.surface,border:"none",color:t.muted,cursor:"pointer",fontSize:16,width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function PomodoroModal({t,onClose}){
  const[mode,setMode]=useState("work");
  const[secs,setSecs]=useState(25*60);
  const[running,setRunning]=useState(false);
  const[sessions,setSessions]=useState(0);
  const iv=useRef();
  const MODES={work:25*60,short:5*60,long:15*60};
  useEffect(()=>{
    if(running){iv.current=setInterval(()=>setSecs(s=>{if(s<=1){clearInterval(iv.current);setRunning(false);setSessions(x=>x+1);return 0;}return s-1;}),1000);}
    else clearInterval(iv.current);
    return()=>clearInterval(iv.current);
  },[running]);
  function sw(m){setMode(m);setSecs(MODES[m]);setRunning(false);}
  const pct=((MODES[mode]-secs)/MODES[mode])*100;
  const mm=String(Math.floor(secs/60)).padStart(2,"0"),ss2=String(secs%60).padStart(2,"0");
  const r=75,circ=2*Math.PI*r;
  return(
    <Modal t={t} onClose={onClose} title="🍅 Pomodoro">
      <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:24}}>
        {[["work","Focus"],["short","Short"],["long","Long"]].map(([m,l])=>(
          <button key={m} onClick={()=>sw(m)} style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:mode===m?t.accent:t.surface,color:mode===m?"#000":t.muted}}>{l}</button>
        ))}
      </div>
      <div style={{position:"relative",width:180,height:180,margin:"0 auto 24px"}}>
        <svg width={180} height={180} style={{transform:"rotate(-90deg)"}}>
          <circle cx={90} cy={90} r={r} fill="none" stroke={t.border} strokeWidth={10}/>
          <circle cx={90} cy={90} r={r} fill="none" stroke={t.accent} strokeWidth={10} strokeDasharray={circ} strokeDashoffset={circ-(pct/100)*circ} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:38,fontWeight:800,color:t.text,letterSpacing:-2}}>{mm}:{ss2}</span>
          <span style={{fontSize:11,color:t.muted,textTransform:"uppercase",letterSpacing:2}}>{mode}</span>
        </div>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
        <button onClick={()=>setRunning(r=>!r)} style={{padding:"12px 32px",borderRadius:12,border:"none",cursor:"pointer",background:t.accent,color:"#000",fontWeight:700,fontSize:16}}>{running?"Pause":"Start"}</button>
        <button onClick={()=>{setSecs(MODES[mode]);setRunning(false);}} style={{padding:"12px 18px",borderRadius:12,border:`1px solid ${t.border}`,cursor:"pointer",background:"none",color:t.text,fontWeight:600}}>Reset</button>
      </div>
      <div style={{textAlign:"center",color:t.muted,fontSize:13}}>Sessions today: <strong style={{color:t.accent}}>{sessions}</strong></div>
    </Modal>
  );
}

function CalendarModal({t,habits,goals,onClose}){
  const now=new Date();
  const[yr,setYr]=useState(now.getFullYear());
  const[mo,setMo]=useState(now.getMonth());
  const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const days=new Date(yr,mo+1,0).getDate();
  const firstDay=new Date(yr,mo,1).getDay();
  const td=today();
  function ds(d){return `${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
  return(
    <Modal t={t} onClose={onClose} title="📅 Calendar">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}} style={{background:t.surface,border:"none",color:t.text,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:18}}>‹</button>
        <span style={{fontWeight:700,fontSize:16,color:t.text}}>{MONTHS[mo]} {yr}</span>
        <button onClick={()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}} style={{background:t.surface,border:"none",color:t.text,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:18}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:6}}>
        {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:t.muted,padding:"3px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
        {Array.from({length:days}).map((_,i)=>{
          const d=i+1,dateStr=ds(d);
          const habDone=habits.filter(h=>h.log&&h.log[dateStr]).length;
          const hasGoal=goals.some(g=>g.deadline===dateStr);
          const isToday=dateStr===td;
          const intensity=habits.length>0?habDone/habits.length:0;
          return(
            <div key={d} style={{borderRadius:6,padding:"5px 2px",textAlign:"center",background:isToday?t.accent+"30":intensity>0?`${t.success}${Math.floor(intensity*160).toString(16).padStart(2,"0")}`:t.surface,border:isToday?`2px solid ${t.accent}`:`1px solid ${t.border}`,minHeight:38}}>
              <div style={{fontSize:11,fontWeight:isToday?800:500,color:isToday?t.accent:t.text}}>{d}</div>
              {habDone>0&&<div style={{fontSize:8,color:t.success,fontWeight:700}}>{habDone}✓</div>}
              {hasGoal&&<div style={{fontSize:10}}>📌</div>}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:12,marginTop:16,fontSize:11,color:t.muted,flexWrap:"wrap"}}>
        <span>🟩 Habits done</span><span>📌 Goal deadline</span><span style={{color:t.accent}}>● Today</span>
      </div>
    </Modal>
  );
}

function JournalModal({t,journals,setJournals,onClose}){
  const td=today();
  const[selDate,setSelDate]=useState(td);
  const[note,setNote]=useState(journals[td]||"");
  function save(){setJournals(p=>({...p,[selDate]:note}));}
  const entries=Object.entries(journals).sort((a,b)=>b[0].localeCompare(a[0]));
  return(
    <Modal t={t} onClose={onClose} title="📓 Daily Journal">
      <input type="date" value={selDate} onChange={e=>{setSelDate(e.target.value);setNote(journals[e.target.value]||"");}} style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:14,marginBottom:10}}/>
      <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="What did you do today? How do you feel? What are you grateful for?" style={{width:"100%",height:120,background:t.surface,border:`1px solid ${t.border}`,borderRadius:12,padding:12,color:t.text,fontSize:14,resize:"vertical"}}/>
      <button onClick={save} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",marginTop:10,marginBottom:20}}>Save ✓</button>
      {entries.length>0&&<div style={{borderTop:`1px solid ${t.border}`,paddingTop:14}}>
        <div style={{fontSize:12,fontWeight:700,color:t.muted,marginBottom:10}}>PAST ENTRIES</div>
        {entries.map(([date,txt])=>(
          <div key={date} onClick={()=>{setSelDate(date);setNote(txt);}} style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 12px",marginBottom:8,cursor:"pointer"}}>
            <div style={{fontSize:11,color:t.accent,fontWeight:700,marginBottom:3}}>{fmtDate(date)}</div>
            <div style={{fontSize:12,color:t.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{txt}</div>
          </div>
        ))}
      </div>}
    </Modal>
  );
}

function AICoachModal({t,habits,goals,journals,onClose}){
  const[loading,setLoading]=useState(false);
  const[response,setResponse]=useState("");
  async function getInsights(){
    setLoading(true);setResponse("");
    const td=today();
    const hSum=habits.map(h=>`- ${h.name}: streak ${h.streak}d, done today: ${h.log&&h.log[td]?"yes":"no"}`).join("\n");
    const gSum=goals.map(g=>`- ${g.title}: ${g.actions.filter(a=>a.done).length}/${g.actions.length} done, priority: ${g.priority}`).join("\n");
    const jEntry=journals[td]||"No entry today.";
    const prompt=`You are an encouraging productivity coach. Here is my tracker data:\n\nHABITS:\n${hSum||"None yet."}\n\nGOALS:\n${gSum||"None yet."}\n\nTODAY'S JOURNAL:\n${jEntry}\n\nGive me:\n1. Brief analysis of my progress (2-3 sentences)\n2. What I'm doing well (1-2 things)\n3. What to focus on this week (2-3 tips)\n4. A motivational closing message\n\nKeep it warm, specific, and encouraging. Use emojis.`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      setResponse(data.content&&data.content[0]?data.content[0].text:"Could not get response.");
    }catch{setResponse("Error connecting. Please try again.");}
    setLoading(false);
  }
  return(
    <Modal t={t} onClose={onClose} title="🤖 AI Coach">
      <p style={{color:t.muted,fontSize:13,marginBottom:20}}>Get personalized insights based on your habits, goals & journal.</p>
      {!response&&!loading&&<button onClick={getInsights} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:15}}>✨ Get My Weekly Insights</button>}
      {loading&&<div style={{textAlign:"center",padding:40}}><div style={{fontSize:32,marginBottom:12}}>🧠</div><div style={{color:t.muted}}>Analyzing your progress...</div></div>}
      {response&&<>
        <div style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:14,padding:18,lineHeight:1.7,color:t.text,fontSize:13,whiteSpace:"pre-wrap"}}>{response}</div>
        <button onClick={getInsights} style={{width:"100%",padding:"11px",borderRadius:12,border:`1px solid ${t.border}`,background:"none",color:t.text,fontWeight:600,cursor:"pointer",marginTop:10}}>🔄 Refresh</button>
      </>}
    </Modal>
  );
}

function ThemeModal({t,themeKey,setThemeKey,onClose}){
  return(
    <Modal t={t} onClose={onClose} title="🎨 Choose Theme">
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {Object.entries(THEMES).map(([key,th])=>(
          <button key={key} onClick={()=>{setThemeKey(key);onClose();}} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",borderRadius:14,border:`2px solid ${themeKey===key?th.accent:t.border}`,background:themeKey===key?th.accent+"18":t.surface,cursor:"pointer",width:"100%"}}>
            <div style={{width:32,height:32,borderRadius:"50%",background:th.accent,flexShrink:0}}/>
            <div style={{textAlign:"left"}}>
              <div style={{fontWeight:700,fontSize:15,color:t.text}}>{th.name}</div>
              <div style={{fontSize:12,color:t.muted}}>{key==="obsidian"?"Dark gold":key==="ivory"?"Warm light":"Neon dark"}</div>
            </div>
            {themeKey===key&&<span style={{marginLeft:"auto",color:th.accent,fontSize:20}}>✓</span>}
          </button>
        ))}
      </div>
    </Modal>
  );
}

function App(){
  const[themeKey,setThemeKey]=useState(()=>{const s=localStorage.getItem("hg_theme");return s&&THEMES[s]?s:"obsidian";});
  const[habits,setHabits]=useState(()=>JSON.parse(localStorage.getItem("hg_habits")||"[]"));
  const[goals,setGoals]=useState(()=>JSON.parse(localStorage.getItem("hg_goals")||"[]"));
  const[journals,setJournals]=useState(()=>JSON.parse(localStorage.getItem("hg_journals")||"{}"));
  const[page,setPage]=useState("dashboard");
  const[modal,setModal]=useState(null);
  const[confetti,setConfetti]=useState(false);
  const[toast,setToast]=useState(null);
  const[newHabit,setNewHabit]=useState({name:"",category:"Health",icon:"⭐"});
  const[showTpl,setShowTpl]=useState(false);
  const[expandH,setExpandH]=useState(null);
  const[newGoal,setNewGoal]=useState({title:"",priority:"Medium",deadline:"",notes:""});
  const[showGoalForm,setShowGoalForm]=useState(false);
  const[expandG,setExpandG]=useState(null);
  const[newAction,setNewAction]=useState({goalId:null,action:"",result:""});
  const[bulkText,setBulkText]=useState("");
  const[showBulk,setShowBulk]=useState(null);

  const t=THEMES[themeKey]||THEMES.obsidian;
  const td=today();
  const quote=QUOTES[new Date().getDate()%QUOTES.length];

  useEffect(()=>{localStorage.setItem("hg_habits",JSON.stringify(habits));},[habits]);
  useEffect(()=>{localStorage.setItem("hg_goals",JSON.stringify(goals));},[goals]);
  useEffect(()=>{localStorage.setItem("hg_journals",JSON.stringify(journals));},[journals]);
  useEffect(()=>{localStorage.setItem("hg_theme",themeKey);},[themeKey]);

  function showToast(msg,type="ok"){setToast({msg,type});setTimeout(()=>setToast(null),2800);}

  function addHabit(){
    if(!newHabit.name.trim())return;
    setHabits(p=>[...p,{id:Date.now(),name:newHabit.name.trim(),category:newHabit.category,icon:newHabit.icon,streak:0,bestStreak:0,log:{}}]);
    setNewHabit({name:"",category:"Health",icon:"⭐"});
    showToast("Habit added! 🌱");
  }
  function addFromTpl(tpl){
    setHabits(p=>[...p,{id:Date.now(),name:tpl.name,category:tpl.category,icon:tpl.icon,streak:0,bestStreak:0,log:{}}]);
    showToast(`Added "${tpl.name}"!`);
  }
  function toggleHabit(id){
    setHabits(p=>p.map(h=>{
      if(h.id!==id)return h;
      const log={...h.log};const was=!!log[td];
      if(was)delete log[td];else log[td]=true;
      let streak=0,best=h.bestStreak||0;
      const d=new Date();
      while(true){const s=d.toISOString().split("T")[0];if(!log[s])break;streak++;d.setDate(d.getDate()-1);}
      if(streak>best)best=streak;
      if(!was&&BADGES.some(b=>b.days===streak)){setConfetti(true);showToast(`🏆 ${streak}-day streak badge!`,"badge");}

            {goals.map(g=>{
              const done=g.actions.filter(a=>a.done).length;const pct=g.actions.length>0?Math.round((done/g.actions.length)*100):0;
              const prioColor=g.priority==="High"?t.danger:g.priority==="Medium"?t.accent:t.success;
              return(
                <div key={g.id} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                    <div><span style={{fontWeight:600,fontSize:13}}>{g.title}</span><span style={{fontSize:9,fontWeight:700,marginLeft:6,padding:"1px 6px",borderRadius:10,background:prioColor+"22",color:prioColor}}>{g.priority}</span></div>
                    <span style={{fontSize:13,fontWeight:700,color:pct===100?t.success:t.accent}}>{pct}%</span>
                  </div>
                  <div style={{height:7,background:t.surface,borderRadius:10}}><div style={{height:"100%",width:`${pct}%`,background:pct===100?t.success:t.accent,borderRadius:10,transition:"width 0.5s"}}/></div>
                  <div style={{fontSize:10,color:t.muted,marginTop:3}}>{done}/{g.actions.length} actions</div>
                </div>
              );
            })}
          </div>
        )}
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:16,marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>🏅 Badges</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:8}}>
            {BADGES.map(b=>{
              const earned=habits.some(h=>(h.bestStreak||h.streak)>=b.days);
              return(<div key={b.days} style={{padding:"10px 8px",borderRadius:12,background:earned?b.color+"22":t.surface,border:`1px solid ${earned?b.color+"66":t.border}`,textAlign:"center",opacity:earned?1:0.35}}>
                <div style={{fontSize:22}}>{b.icon}</div>
                <div style={{fontSize:10,fontWeight:700,color:earned?b.color:t.muted,marginTop:4}}>{b.label}</div>
                <div style={{fontSize:9,color:t.muted}}>{b.days}d streak</div>
              </div>);
            })}
          </div>
        </div>
        {habits.map(h=>(
          <div key={h.id} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:10}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>{h.icon} {h.name} — 90 Days</div>
            <Heatmap habit={h} t={t}/>
          </div>
        ))}
        {habits.length===0&&goals.length===0&&<div style={{textAlign:"center",color:t.muted,padding:40}}>Add habits and goals to see analytics! 📈</div>}
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:t.bg,fontFamily:"'Sora',system-ui,sans-serif",color:t.text}}>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:9998,background:toast.type==="badge"?t.accent:t.success,color:"#000",padding:"10px 20px",borderRadius:20,fontWeight:700,fontSize:13,boxShadow:"0 8px 32px rgba(0,0,0,0.3)",whiteSpace:"nowrap",animation:"slideIn 0.3s ease"}}>{toast.msg}</div>}
      <Confetti active={confetti} onDone={()=>setConfetti(false)}/>
      {modal==="pomodoro"&&<PomodoroModal t={t} onClose={()=>setModal(null)}/>}
      {modal==="calendar"&&<CalendarModal t={t} habits={habits} goals={goals} onClose={()=>setModal(null)}/>}
      {modal==="journal"&&<JournalModal t={t} journals={journals} setJournals={j=>{setJournals(j);localStorage.setItem("hg_journals",JSON.stringify(j));}} onClose={()=>setModal(null)}/>}
      {modal==="ai"&&<AICoachModal t={t} habits={habits} goals={goals} journals={journals} onClose={()=>setModal(null)}/>}
      {modal==="theme"&&<ThemeModal t={t} themeKey={themeKey} setThemeKey={setThemeKey} onClose={()=>setModal(null)}/>}
      <div style={{display:"flex",minHeight:"100vh"}}>
        <div className="desktop-sidebar" style={{width:220,background:t.card,borderRight:`1px solid ${t.border}`,flexDirection:"column",padding:"24px 16px",position:"sticky",top:0,height:"100vh",flexShrink:0}}>
          <div style={{marginBottom:28}}>
            <div style={{fontSize:20,fontWeight:800,letterSpacing:-1,color:t.accent}}>⚡ Momentum</div>
            <div style={{fontSize:11,color:t.muted,marginTop:2}}>Habit & Goal Tracker</div>
          </div>
          <nav style={{flex:1}}>
            {NAV.map(item=>(
              <button key={item.id} onClick={()=>setPage(item.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 12px",borderRadius:10,border:"none",cursor:"pointer",background:page===item.id?t.accent+"22":"none",color:page===item.id?t.accent:t.muted,fontWeight:page===item.id?700:500,fontSize:14,marginBottom:4,textAlign:"left"}}>
                <span>{item.icon}</span>{item.label}
              </button>
            ))}
            <div style={{height:1,background:t.border,margin:"14px 0"}}/>
            <div style={{fontSize:10,fontWeight:700,color:t.muted,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Tools</div>
            {[["🍅","Pomodoro","pomodoro"],["📅","Calendar","calendar"],["📓","Journal","journal"],["🤖","AI Coach","ai"],["🎨","Theme","theme"]].map(([icon,label,id])=>(
              <button key={id} onClick={()=>setModal(id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"8px 12px",borderRadius:10,border:"none",cursor:"pointer",background:"none",color:t.muted,fontSize:13,marginBottom:4,textAlign:"left"}}>
                <span>{icon}</span>{label}
              </button>
            ))}
          </nav>
          <div style={{display:"flex",gap:8,marginTop:8}}>
            {Object.entries(THEMES).map(([key,th])=>(
              <button key={key} onClick={()=>setThemeKey(key)} title={th.name} style={{width:24,height:24,borderRadius:"50%",border:themeKey===key?`2px solid ${t.accent}`:"2px solid transparent",background:th.accent,cursor:"pointer"}}/>
            ))}
          </div>
        </div>
        <div className="main-area" style={{flex:1,overflowY:"auto",paddingBottom:40}}>
          {page==="dashboard"&&<Dashboard/>}
          {page==="habits"&&<HabitsPage/>}
          {page==="goals"&&<GoalsPage/>}
          {page==="analytics"&&<AnalyticsPage/>}
        </div>
      </div>
      <div className="mobile-bottom-nav" style={{position:"fixed",bottom:0,left:0,right:0,background:t.card,borderTop:`1px solid ${t.border}`,zIndex:500}}>
        <div style={{display:"flex",justifyContent:"space-around",padding:"6px 8px 4px",borderBottom:`1px solid ${t.border}`}}>
          {[["🍅","pomodoro"],["📅","calendar"],["📓","journal"],["🤖","ai"],["🎨","theme"]].map(([icon,id])=>(
            <button key={id} onClick={()=>setModal(id)} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 8px"}}>
              <span style={{fontSize:20}}>{icon}</span>
            </button>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-around",padding:"6px 8px 8px"}}>
          {NAV.map(item=>(
            <button key={item.id} onClick={()=>setPage(item.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,flex:1}}>
              <span style={{fontSize:24}}>{item.icon}</span>
              <span style={{fontSize:10,fontWeight:page===item.id?700:400,color:page===item.id?t.accent:t.muted}}>{item.label}</span>
              {page===item.id&&<div style={{width:4,height:4,borderRadius:"50%",background:t.accent}}/>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
