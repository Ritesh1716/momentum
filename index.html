function Confetti({on,done}){
  const r=useRef();
  useEffect(()=>{
    if(!on)return;
    const c=r.current;if(!c)return;
    c.width=window.innerWidth;c.height=window.innerHeight;
    const ctx=c.getContext("2d");
    const cols=["#f5c842","#e8853d","#4ade80","#60a5fa","#a78bfa","#f87171"];
    const ps=Array.from({length:90},()=>({x:Math.random()*c.width,y:-20,r:3+Math.random()*5,spd:1.5+Math.random()*2,col:cols[Math.floor(Math.random()*6)],ang:0,ts:0.1+Math.random()*0.3}));
    let raf;
    const draw=()=>{ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.y+=p.spd;p.ang+=p.ts;ctx.beginPath();ctx.lineWidth=p.r;ctx.strokeStyle=p.col;ctx.moveTo(p.x+Math.sin(p.ang)*8,p.y);ctx.lineTo(p.x+Math.sin(p.ang)*8+p.r*2,p.y+p.r*2);ctx.stroke();});if(ps.some(p=>p.y<c.height))raf=requestAnimationFrame(draw);else{ctx.clearRect(0,0,c.width,c.height);done&&done();}};
    draw();return()=>cancelAnimationFrame(raf);
  },[on]);
  if(!on)return null;
  return React.createElement("canvas",{ref:r,style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999}});
}

}

function Pomodoro({t,close}){
  const[mode,setMode]=useState("work");
  const[run,setRun]=useState(false);
  const[sess,setSess]=useState(0);
  const[history,setHistory]=useState([]);
  const[durations,setDurations]=useState({work:25,short:5,long:15});
  const[editing,setEditing]=useState(null);
  const[editVal,setEditVal]=useState("");
  const[secs,setSecs]=useState(25*60);
  const iv=useRef();
  const LABELS={work:"Focus",short:"Short Break",long:"Long Break"};

  useEffect(()=>{
    if(run){iv.current=setInterval(()=>setSecs(s=>{
      if(s<=1){
        clearInterval(iv.current);setRun(false);
        const label=LABELS[mode];
        setHistory(h=>[{label,mins:durations[mode],time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})},...h.slice(0,9)]);
        setSess(x=>x+1);
        if(Notification.permission==="granted")new Notification("🍅 Done!",{body:`${label} complete!`});
        return 0;
      }return s-1;
    }),1000);}
    else clearInterval(iv.current);
    return()=>clearInterval(iv.current);
  },[run,mode,durations]);

  function sw(m){setMode(m);setSecs(durations[m]*60);setRun(false);setEditing(null);}
  function startEdit(m){setEditing(m);setEditVal(String(durations[m]));}
  function saveEdit(m){
    const v=parseInt(editVal);
    if(v>0&&v<=99){
      const nd={...durations,[m]:v};
      setDurations(nd);
      if(mode===m){setSecs(v*60);setRun(false);}
    }
    setEditing(null);
  }

  const totalSecs=durations[mode]*60;
  const pct=((totalSecs-secs)/totalSecs)*100,r2=75,ci=2*Math.PI*r2;
  const mm=String(Math.floor(secs/60)).padStart(2,"0"),ss=String(secs%60).padStart(2,"0");

  return(<Modal t={t} close={close} title="🍅 Pomodoro">
    {/* Mode tabs with editable durations */}
    <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:20}}>
      {[["work","Focus"],["short","Short"],["long","Long"]].map(([m,l])=>(
        <div key={m} style={{textAlign:"center"}}>
          <button onClick={()=>sw(m)} style={{display:"block",padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:mode===m?t.accent:t.surface,color:mode===m?"#000":t.muted,marginBottom:4}}>{l}</button>
          {editing===m?(
            <div style={{display:"flex",alignItems:"center",gap:3,justifyContent:"center"}}>
              <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEdit(m);if(e.key==="Escape")setEditing(null);}} style={{width:34,padding:"2px 4px",borderRadius:6,border:`1px solid ${t.accent}`,background:t.surface,color:t.text,fontSize:11,textAlign:"center"}}/>
              <span style={{fontSize:9,color:t.muted}}>m</span>
              <button onClick={()=>saveEdit(m)} style={{background:"none",border:"none",color:t.success,cursor:"pointer",fontSize:12,padding:0}}>✓</button>
            </div>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:3,justifyContent:"center"}}>
              <span style={{fontSize:10,color:t.muted}}>{durations[m]}m</span>
              <button onClick={()=>startEdit(m)} style={{background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:10,padding:0,opacity:0.6}}>✏️</button>
            </div>
          )}
        </div>
      ))}
    </div>

    {/* Timer ring */}
    <div style={{position:"relative",width:180,height:180,margin:"0 auto 20px"}}>
      <svg width={180} height={180} style={{transform:"rotate(-90deg)"}}>
        <circle cx={90} cy={90} r={r2} fill="none" stroke={t.border} strokeWidth={10}/>
        <circle cx={90} cy={90} r={r2} fill="none" stroke={t.accent} strokeWidth={10} strokeDasharray={ci} strokeDashoffset={ci-(pct/100)*ci} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:36,fontWeight:800,color:t.text,letterSpacing:-2}}>{mm}:{ss}</span>
        <span style={{fontSize:10,color:t.muted,textTransform:"uppercase",letterSpacing:2}}>{LABELS[mode]}</span>
      </div>
    </div>

    <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:14}}>
      <button onClick={()=>setRun(r=>!r)} style={{padding:"12px 30px",borderRadius:12,border:"none",cursor:"pointer",background:t.accent,color:"#000",fontWeight:700,fontSize:16}}>{run?"Pause":"Start"}</button>
      <button onClick={()=>{setSecs(durations[mode]*60);setRun(false);}} style={{padding:"12px 16px",borderRadius:12,border:`1px solid ${t.border}`,cursor:"pointer",background:"none",color:t.text,fontWeight:600}}>Reset</button>
    </div>
    <div style={{textAlign:"center",color:t.muted,fontSize:13,marginBottom:history.length?14:0}}>Sessions today: <strong style={{color:t.accent}}>{sess}</strong></div>

    {/* Session history */}
    {history.length>0&&<div style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 12px"}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Session History</div>
      {history.map((h,i)=>(
        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:i<history.length-1?`1px solid ${t.border}`:"none"}}>
          <span style={{fontSize:12,color:t.text,fontWeight:600}}>{h.label}</span>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:11,color:t.success,fontWeight:700}}>{h.mins}m</span>
            <span style={{fontSize:10,color:t.muted}}>{h.time}</span>
          </div>
        </div>
      ))}
    </div>}
  </Modal>);
}

function CalModal({t,close,habits,goals}){
  const now=new Date();
  const[yr,setYr]=useState(now.getFullYear());
  const[mo,setMo]=useState(now.getMonth());
  const[selDay,setSelDay]=useState(null);
  const[dayNote,setDayNote]=useState("");
  const[saved,setSaved]=useState(false);
  const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const days=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay(),today=td();
  const ds=d=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

  function openDay(dateStr){
    setSelDay(dateStr);setSaved(false);
    try{const n=JSON.parse(localStorage.getItem("hg_day_notes")||"{}");setDayNote(n[dateStr]||"");}
    catch{setDayNote("");}
  }
  function saveNote(){
    try{const n=JSON.parse(localStorage.getItem("hg_day_notes")||"{}");n[selDay]=dayNote;localStorage.setItem("hg_day_notes",JSON.stringify(n));setSaved(true);setTimeout(()=>setSaved(false),1500);}
    catch{}
  }

  if(selDay){
    const isFuture=selDay>today;
    const isPast=selDay<=today;
    const doneHabits=habits.filter(h=>h.log&&h.log[selDay]);
    const missedHabits=habits.filter(h=>!h.log||!h.log[selDay]);
    const doneActions=goals.flatMap(g=>g.actions.filter(a=>a.doneAt===selDay).map(a=>({...a,goalTitle:g.title})));
    const deadlineGoals=goals.filter(g=>g.deadline===selDay);
    const displayDate=new Date(selDay+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

    return(<Modal t={t} close={close} title="📅 Calendar">
      <button onClick={()=>setSelDay(null)} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:13,marginBottom:14,padding:0}}>← Back to {MN[mo]}</button>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:16,fontWeight:800,color:t.text,marginBottom:3}}>{displayDate}</div>
        <div style={{fontSize:11,fontWeight:600,color:selDay===today?t.accent:isFuture?t.info:t.muted}}>{selDay===today?"Today — check in below":isFuture?"Future — Day Planner":"Past day"}</div>
      </div>

      {/* PAST / TODAY: Day Detail */}
      {isPast&&<div>
        {doneHabits.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.success,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>✅ Habits Done ({doneHabits.length})</div>
          {doneHabits.map(h=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:t.success+"18",borderRadius:8,marginBottom:5,fontSize:13}}>
              <span>{h.icon}</span><span style={{fontWeight:600}}>{h.name}</span>
            </div>
          ))}
        </div>}
        {missedHabits.length>0&&habits.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.danger,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>❌ Missed ({missedHabits.length})</div>

        {doneActions.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.info,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>🎯 Actions Completed ({doneActions.length})</div>
          {doneActions.map(a=>(
            <div key={a.id} style={{padding:"7px 10px",background:t.info+"18",borderRadius:8,marginBottom:5}}>
              <div style={{fontSize:12,fontWeight:600,color:t.text}}>{a.action}</div>
              <div style={{fontSize:10,color:t.muted}}>{a.goalTitle}</div>
            </div>
          ))}
        </div>}
        {deadlineGoals.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.accent,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>📌 Goal Deadlines</div>
          {deadlineGoals.map(g=><div key={g.id} style={{fontSize:12,color:t.text,padding:"5px 10px",background:t.accent+"18",borderRadius:8,marginBottom:5,fontWeight:600}}>{g.title}</div>)}
        </div>}
        {habits.length===0&&<div style={{textAlign:"center",color:t.muted,padding:20,fontSize:13}}>No habit data for this day yet.</div>}
        {/* Day note */}
        <div style={{marginTop:4}}>
          <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>📝 Day Note</div>
          <textarea value={dayNote} onChange={e=>setDayNote(e.target.value)} placeholder="Add a personal note for this day..." style={{width:"100%",height:72,padding:"9px 11px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,resize:"none",lineHeight:1.5}}/>
          <button onClick={saveNote} style={{marginTop:7,padding:"8px 18px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>{saved?"Saved ✓":"Save Note"}</button>
        </div>
      </div>}

      {/* FUTURE: Day Planner */}
      {isFuture&&<div>
        <div style={{background:t.info+"18",border:`1px solid ${t.info}44`,borderRadius:10,padding:"9px 12px",marginBottom:14,fontSize:12,color:t.info}}>📋 Plan your day ahead — notes save locally</div>
        <textarea value={dayNote} onChange={e=>setDayNote(e.target.value)} placeholder="Plan your day, set intentions, list tasks..." style={{width:"100%",height:110,padding:"10px 12px",borderRadius:12,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,resize:"none",lineHeight:1.6,marginBottom:10}}/>
        <button onClick={saveNote} style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>{saved?"Saved ✓ ":"Save Plan"}</button>
      </div>}
    </Modal>);
  }

  // Calendar grid view
  return(<Modal t={t} close={close} title="📅 Calendar">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <button onClick={()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}} style={{background:t.surface,border:"none",color:t.text,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:18}}>‹</button>
      <span style={{fontWeight:700,fontSize:15,color:t.text}}>{MN[mo]} {yr}</span>
      <button onClick={()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}} style={{background:t.surface,border:"none",color:t.text,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:18}}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:5}}>
      {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:t.muted}}>{d}</div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
      {Array.from({length:fd}).map((_,i)=><div key={`e${i}`}/>)}
      {Array.from({length:days}).map((_,i)=>{
        const d=i+1,ds2=ds(d);
        const hd=habits.filter(h=>h.log&&h.log[ds2]).length;
        const hg=goals.some(g=>g.deadline===ds2);
        const isT=ds2===today,isFut=ds2>today;
        const intensity=habits.length>0?hd/habits.length:0;
        return(<div key={d} onClick={()=>openDay(ds2)} style={{borderRadius:6,padding:"4px 1px",textAlign:"center",background:isT?t.accent+"30":isFut?t.surface:intensity>0?`${t.success}${Math.floor(intensity*150).toString(16).padStart(2,"0")}`:t.surface,border:isT?`2px solid ${t.accent}`:isFut?`1px solid ${t.info}33`:`1px solid ${t.border}`,minHeight:34,cursor:"pointer"}}>
          <div style={{fontSize:10,fontWeight:isT?800:400,color:isT?t.accent:isFut?t.info:t.text}}>{d}</div>
          {hd>0&&<div style={{fontSize:8,color:t.success,fontWeight:700}}>{hd}✓</div>}
          {hg&&<div style={{fontSize:9}}>📌</div>}
        </div>);
      })}
    </div>
    <div style={{display:"flex",gap:10,marginTop:14,fontSize:10,color:t.muted,flexWrap:"wrap"}}>
      <span>🟩 Habits done</span><span>📌 Deadline</span><span style={{color:t.accent}}>● Today</span><span style={{color:t.info}}>Future</span>
    </div>
    <div style={{marginTop:10,fontSize:11,color:t.muted,textAlign:"center"}}>Tap any date for details or to plan ahead</div>
  </Modal>);
}

const MOODS=[{e:"😞",l:"Rough"},{e:"😕",l:"Low"},{e:"😐",l:"Okay"},{e:"🙂",l:"Good"},{e:"😄",l:"Great"}];
const JTAGS=["Motivated","Peaceful","Focused","Grateful","Sad","Anxious","Excited","Tired"];
const JPROMPTS=["What made today meaningful?","What are you grateful for today?","What challenged you and how did you handle it?","What's one thing you'd do differently tomorrow?","Describe your energy and mood today."];

function JournalModal({t,close,journals,onSave,plan}){
  const today=td();
  function parseEntry(raw){if(raw&&typeof raw==="object")return raw;return{note:raw||"",mood:null,tags:[],title:""};}
  const[sel,setSel]=useState(today);
  const init=parseEntry(journals[today]);
  const[note,setNote]=useState(init.note);
  const[mood,setMood]=useState(init.mood);
  const[tags,setTags]=useState(init.tags||[]);
  const[title,setTitle]=useState(init.title||"");
  const cutoff=plan.jDays===Infinity?null:new Date(Date.now()-plan.jDays*86400000).toISOString().split("T")[0];
  const entries=Object.entries(journals).sort((a,b)=>b[0].localeCompare(a[0])).filter(([d])=>!cutoff||d>=cutoff);
  const wordCount=note.trim().split(/\s+/).filter(Boolean).length;
  const prompt=JPROMPTS[new Date().getDate()%JPROMPTS.length];

  function loadDate(d){
    setSel(d);
    const e=parseEntry(journals[d]);
    setNote(e.note);setMood(e.mood);setTags(e.tags||[]);setTitle(e.title||"");
  }
  function toggleTag(tag){setTags(prev=>prev.includes(tag)?prev.filter(x=>x!==tag):[...prev,tag]);}
  function doSave(){onSave(sel,{note,mood,tags,title});}

  return(<Modal t={t} close={close} title="📓 Journal">
    <input type="date" value={sel} onChange={e=>loadDate(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:14,marginBottom:9}}/>

    {/* Title */}
    <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Entry title (optional)..." style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,marginBottom:9}}/>

    {/* Mood selector */}
    <div style={{marginBottom:9}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Mood</div>
      <div style={{display:"flex",gap:6}}>
        {MOODS.map((m,i)=>(
          <button key={i} onClick={()=>setMood(mood===i?null:i)} style={{flex:1,padding:"7px 4px",borderRadius:10,border:`2px solid ${mood===i?t.accent:t.border}`,background:mood===i?t.accent+"22":t.surface,cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:18}}>{m.e}</div>
            <div style={{fontSize:9,color:mood===i?t.accent:t.muted,fontWeight:700,marginTop:2}}>{m.l}</div>
          </button>
        ))}
      </div>
    </div>

    {/* Tags */}
    <div style={{marginBottom:9}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Tags</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {JTAGS.map(tag=>(
          <button key={tag} onClick={()=>toggleTag(tag)} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${tags.includes(tag)?t.accent:t.border}`,background:tags.includes(tag)?t.accent+"22":t.surface,color:tags.includes(tag)?t.accent:t.muted,cursor:"pointer",fontSize:11,fontWeight:tags.includes(tag)?700:400}}>{tag}</button>
        ))}
      </div>
    </div>

    {/* Note textarea */}
    <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder={prompt} style={{width:"100%",height:100,background:t.surface,border:`1px solid ${t.border}`,borderRadius:12,padding:12,color:t.text,fontSize:13,resize:"vertical",lineHeight:1.6}}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4,marginBottom:10}}>
      <div style={{fontSize:10,color:t.muted}}>{wordCount} word{wordCount!==1?"s":""}</div>
      {cutoff&&<div style={{fontSize:10,color:t.accent}}>📅 Free: last 7 days only</div>}
    </div>

    <button onClick={doSave} style={{width:"100%",padding:"11px",borderRadius:12,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",marginBottom:18}}>Save ✓</button>

    {/* Past entries — improved */}
    {entries.length>0&&<div>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Past Entries</div>
      {entries.map(([date,raw])=>{
        const e=parseEntry(raw);
        return(
          <div key={date} onClick={()=>loadDate(date)} style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 12px",marginBottom:8,cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
              <span style={{fontSize:11,color:t.accent,fontWeight:700}}>{fmt(date)}</span>
              {e.mood!=null&&<span style={{fontSize:15}}>{MOODS[e.mood]?.e}</span>}
              {e.title&&<span style={{fontSize:11,fontWeight:700,color:t.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</span>}
            </div>
            {e.tags&&e.tags.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>
              {e.tags.map(tag=><span key={tag} style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:t.accent+"22",color:t.accent}}>{tag}</span>)}
            </div>}
            {e.note&&<div style={{fontSize:12,color:t.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.note}</div>}
          </div>
        );
      })}
    </div>}
  </Modal>);
}

const UNIT_SUGGESTIONS={Health:["glasses","litres","ml","cups"],Fitness:["minutes","km","reps","sets","steps"],Learning:["pages","hours","problems","chapters"],Mindfulness:["minutes","sessions"],Work:["hours","tasks","calls"],Personal:["minutes","times"],Finance:["minutes","tasks"],Social:["minutes","calls"],Focus:["minutes","sessions"],default:["times","minutes","hours"]};
const HCOLORS=["#f5c842","#e8853d","#f472b6","#4ade80","#60a5fa","#a78bfa","#34d399","#fb7185","#fbbf24","#38bdf8","#818cf8","#e879f9"];

function EditHabitModal({t,close,habit,onSave}){
  const[name,setName]=useState(habit.name);
  const[icon,setIcon]=useState(habit.icon||"⭐");
  const[cat,setCat]=useState(habit.cat||"Health");
  const[color,setColor]=useState(habit.color||HCOLORS[0]);
  const[freq,setFreq]=useState(habit.freq||"daily");
  const[freqDays,setFreqDays]=useState(habit.freqDays||[]);
  const[freqTimes,setFreqTimes]=useState(habit.freqTimes||3);
  const[goalCount,setGoalCount]=useState(habit.goalCount||"");
  const[goalUnit,setGoalUnit]=useState(habit.goalUnit||"");
  const[durType,setDurType]=useState(habit.durType||"ongoing");
  const[durDays,setDurDays]=useState(habit.durDays||21);
  const[durEnd,setDurEnd]=useState(habit.durEnd||"");
  const[remEnabled,setRemEnabled]=useState(habit.reminder?.enabled||false);
  const[remTime,setRemTime]=useState(habit.reminder?.time||"08:00");
  const DAYS=["Mo","Tu","We","Th","Fr","Sa","Su"];
  const DAYVALS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

      <input value={name} onChange={e=>setName(e.target.value)} style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:14}}/>
    </div>
    {/* Category */}
    <select value={cat} onChange={e=>setCat(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,marginBottom:12}}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
    {/* Color picker */}
    <div style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:7,textTransform:"uppercase",letterSpacing:1}}>Color</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
        {HCOLORS.map(c=><div key={c} onClick={()=>setColor(c)} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",border:color===c?`3px solid ${t.text}`:"3px solid transparent",boxSizing:"border-box"}}/>)}
      </div>
    </div>
    {/* Frequency */}
    <div style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:7,textTransform:"uppercase",letterSpacing:1}}>Frequency</div>

    </div>

function HabitDetailPage({t,habit,habits,setHabits,saveF,back}){
  const today=td();
  const log=habit.log||{};
  const doneToday=!!log[today];
  const total=Object.values(log).filter(Boolean).length;
  const createdDaysAgo=habit.createdAt?Math.max(1,Math.ceil((new Date()-new Date(habit.createdAt))/86400000)):Math.max(1,Object.keys(log).length);
  const rate=Math.round((total/createdDaysAgo)*100);
  const hColor=habit.color||t.accent;
  const hasGoal=habit.goalCount>0&&habit.goalUnit;
  // Tile count per date — stored in habit log as number or true
  const todayCount=typeof log[today]==="number"?log[today]:doneToday?habit.goalCount:0;
  const goalCount=habit.goalCount||1;
  const tilePct=hasGoal?Math.min(100,Math.round((todayCount/goalCount)*100)):doneToday?100:0;
  // This week
  const week7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week7.push(d.toISOString().split("T")[0]);}
  const WLBLS=["Mo","Tu","We","Th","Fr","Sa","Su"];
  // Month calendar
  const now=new Date();const yr=now.getFullYear();const mo=now.getMonth();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const firstDay=new Date(yr,mo,1).getDay();
  const monthDone=Array.from({length:daysInMonth}).filter((_,i)=>{const d=`${yr}-${String(mo+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;return!!log[d];}).length;
  // Week/month rates
  const weekDone=week7.filter(d=>!!log[d]).length;
  const weekRate=Math.round((weekDone/7)*100);
  const monthRate=Math.round((monthDone/daysInMonth)*100);
  // Note
  const noteKey=`hg_habit_notes_${habit.id}_${today}`;
  const[note,setNote]=useState(()=>localStorage.getItem(noteKey)||"");
  function saveNote(v){setNote(v);localStorage.setItem(noteKey,v);}
  // History — last 6 months
  function getHistory(){
    const months={};Object.entries(log).forEach(([d,v])=>{if(!v)return;const[y,m]=d.split("-");const k=`${y}-${m}`;if(!months[k])months[k]=[];months[k].push(d);});
    return Object.entries(months).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);
  }
  // Toggle tile
  function tapTile(i){
    if(!hasGoal){return;}
    const newCount=i+1===todayCount?i:i+1;
    const newLog={...log,[today]:newCount>=goalCount?goalCount:newCount};
    const newHabits=habits.map(h=>h.id!==habit.id?h:{...h,log:newLog,streak:h.streak});
    setHabits(newHabits);saveF(newHabits);
  }
  function toggleDone(){
    const newLog={...log};
    if(doneToday)delete newLog[today];else newLog[today]=hasGoal?goalCount:true;
    let streak=0,best=habit.best||0;
    const d=new Date();
    while(true){const s=d.toISOString().split("T")[0];if(!newLog[s])break;streak++;d.setDate(d.getDate()-1);}
    if(streak>best)best=streak;
    const newHabits=habits.map(h=>h.id!==habit.id?h:{...h,log:newLog,streak,best});
    setHabits(newHabits);saveF(newHabits);
  }
  const isDone=hasGoal?(todayCount>=goalCount):doneToday;
  return(
    <div style={{minHeight:"100vh",background:t.bg,color:t.text}}>
      {/* Colored header */}
      <div style={{background:hColor+"22",borderBottom:`3px solid ${hColor}`,padding:"16px 16px 14px"}}>
        <button onClick={back} style={{background:"none",border:"none",color:hColor,cursor:"pointer",fontSize:13,fontWeight:700,marginBottom:10,padding:0}}>← Back</button>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:32}}>{habit.icon}</span>
          <div>
            <div style={{fontSize:18,fontWeight:800,color:t.text}}>{habit.name}</div>
            <span style={{fontSize:11,padding:"2px 9px",borderRadius:20,background:hColor+"33",color:hColor,fontWeight:600}}>{habit.cat}</span>
          </div>
        </div>
      </div>
      <div style={{padding:"16px 16px 120px"}}>
        {/* Ring + done button */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:18}}>
          <Ring pct={tilePct} sz={110} sw={11} col={isDone?t.success:hColor} lbl={hasGoal?`${todayCount}/${goalCount} ${habit.goalUnit}`:"Today"} t={t}/>
          <div style={{fontSize:13,fontWeight:700,color:isDone?t.success:t.muted,marginTop:8,marginBottom:12}}>{isDone?"DONE TODAY ✅":"LET'S GO! 💪"}</div>
          <button onClick={toggleDone} style={{padding:"11px 28px",borderRadius:12,border:"none",background:isDone?t.success:hColor,color:"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>{isDone?"Undo ✕":"Mark Done ✓"}</button>
        </div>
        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:16}}>
          {[["🔥",habit.streak||0,"d","Streak",t.accent],["🏆",habit.best||0,"d","Best",t.info],["✅",total,"","Total",t.success],["📈",rate,"%","Rate",t.accent2]].map(([ic,v,u,l,c])=>(
            <div key={l} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"9px 5px",textAlign:"center"}}>
              <div style={{fontSize:14}}>{ic}</div>
              <div style={{fontSize:16,fontWeight:800,color:c}}>{v}{u}</div>
              <div style={{fontSize:9,color:t.muted,textTransform:"uppercase",letterSpacing:0.5}}>{l}</div>
            </div>
          ))}
        </div>
        {/* Tile grid */}
        {hasGoal&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>Today — {habit.goalUnit}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {Array.from({length:goalCount}).map((_,i)=>(
              <div key={i} onClick={()=>tapTile(i)} style={{width:36,height:36,borderRadius:9,background:i<todayCount?t.success:t.surface,border:`2px solid ${i<todayCount?t.success:t.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.2s"}}>
                {i<todayCount&&<span style={{color:"#000",fontSize:16,fontWeight:900}}>✓</span>}
              </div>
            ))}
          </div>
          {isDone&&<div style={{fontSize:12,color:t.success,fontWeight:700,marginTop:10,textAlign:"center"}}>All done for Today! ✓</div>}
        </div>}
        {/* This week strip */}
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>This Week</div>
          <div style={{display:"flex",justifyContent:"space-around"}}>
            {week7.map((d,i)=>{const done2=!!log[d];const isT=d===today;return(<div key={d} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:done2?t.success:t.surface,border:`2px solid ${isT?hColor:done2?t.success:t.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {done2&&<span style={{color:"#000",fontSize:14,fontWeight:900}}>✓</span>}
              </div>
              <span style={{fontSize:9,color:isT?hColor:t.muted,fontWeight:isT?700:400}}>{WLBLS[i]}</span>
            </div>);})}
          </div>
        </div>
        {/* Completion rates */}
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>Completion Rate</div>
          {[["This Week",weekRate,`${weekDone}/7 days`],["This Month",monthRate,`${monthDone}/${daysInMonth} days`]].map(([l,p,sub])=>(
            <div key={l} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:12,color:t.text,fontWeight:600}}>{l}</span>
                <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{p}% <span style={{color:t.muted,fontWeight:400}}>({sub})</span></span>
              </div>
              <div style={{height:6,background:t.surface,borderRadius:10}}><div style={{height:"100%",width:`${p}%`,background:p>=70?t.success:p>=40?t.accent:t.danger,borderRadius:10,transition:"width 0.5s"}}/></div>
            </div>
          ))}
        </div>
        {/* Daily note */}
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>📝 Today's Note</div>
          <textarea value={note} onChange={e=>saveNote(e.target.value)} placeholder="How did it go today? Any thoughts..." style={{width:"100%",height:72,padding:"9px 11px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,resize:"none",lineHeight:1.5}}/>

        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>

          {getHistory().length===0&&<div style={{color:t.muted,fontSize:12,textAlign:"center",padding:"8px 0"}}>No history yet. Start logging!</div>}
          {getHistory().map(([monthKey,dates])=>{
            const[y,m]=monthKey.split("-");const mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(m)-1];

    </div>
  );
}

// Web Audio sound player
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const g=ctx.createGain();g.connect(ctx.destination);
    if(type==="bell"){
      const o=ctx.createOscillator();o.connect(g);o.type="sine";
      o.frequency.setValueAtTime(880,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.5);
      g.gain.setValueAtTime(0.4,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);
      o.start();o.stop(ctx.currentTime+0.6);
    }else if(type==="beep"){
      const o=ctx.createOscillator();o.connect(g);o.type="square";o.frequency.value=880;
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
      o.start();o.stop(ctx.currentTime+0.2);
    }else if(type==="chime"){
      [523,659,784].forEach((f,i)=>{
        const o=ctx.createOscillator();const gn=ctx.createGain();o.connect(gn);gn.connect(ctx.destination);
        o.type="sine";o.frequency.value=f;
        gn.gain.setValueAtTime(0,ctx.currentTime+i*0.15);
        gn.gain.linearRampToValueAtTime(0.3,ctx.currentTime+i*0.15+0.05);
        gn.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.4);
        o.start(ctx.currentTime+i*0.15);o.stop(ctx.currentTime+i*0.15+0.4);
      });
    }else if(type==="alarm"){
      [440,550,440,550].forEach((f,i)=>{
        const o=ctx.createOscillator();const gn=ctx.createGain();o.connect(gn);gn.connect(ctx.destination);
        o.type="sawtooth";o.frequency.value=f;
        gn.gain.setValueAtTime(0.2,ctx.currentTime+i*0.12);
        gn.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.1);
        o.start(ctx.currentTime+i*0.12);o.stop(ctx.currentTime+i*0.12+0.1);
      });
    }
    setTimeout(()=>ctx.close(),2000);
  }catch(e){}
}

function fmt12(timeStr){
  if(!timeStr)return"";
  const[h,m]=timeStr.split(":").map(Number);
  const ampm=h>=12?"PM":"AM";
  const h12=h%12||12;
  return`${h12}:${String(m).padStart(2,"0")} ${ampm}`;
}

function NotifModal({t,close,enabled,setEnabled,plan,reminders,setReminders,notifSound,setNotifSound}){
  const[status,setStatus]=useState(typeof Notification!=="undefined"?Notification.permission:"denied");
  const[newTime,setNewTime]=useState("08:00");
  const[newLabel,setNewLabel]=useState("");
  const maxReminders=plan.ai?Infinity:2;
  const SOUNDS=[["bell","🔔 Bell"],["beep","📣 Beep"],["chime","🎵 Chime"],["alarm","⏰ Alarm"]];

  async function enable(){
    if(typeof Notification==="undefined"){alert("Notifications not supported in this browser.");return;}
    const p=await Notification.requestPermission();
    setStatus(p);
    if(p==="granted"){setEnabled(true);localStorage.setItem("hg_notif","1");}
  }
  function disable(){setEnabled(false);localStorage.setItem("hg_notif","0");}

  function addReminder(){
    if(!newTime)return;
    if(reminders.length>=maxReminders&&maxReminders!==Infinity){return;}
    const label=newLabel.trim()||"Habit Reminder";
    const updated=[...reminders,{id:Date.now(),time:newTime,label,enabled:true}];
    setReminders(updated);
    localStorage.setItem("hg_reminders",JSON.stringify(updated));
    setNewTime("08:00");setNewLabel("");
  }
  function removeReminder(id){const updated=reminders.filter(r=>r.id!==id);setReminders(updated);localStorage.setItem("hg_reminders",JSON.stringify(updated));}
  function toggleReminder(id){const updated=reminders.map(r=>r.id===id?{...r,enabled:!r.enabled}:r);setReminders(updated);localStorage.setItem("hg_reminders",JSON.stringify(updated));}
  function pickSound(s){setNotifSound(s);localStorage.setItem("hg_notif_sound",s);playSound(s);}
  const canAdd=reminders.length<maxReminders||maxReminders===Infinity;

  return(<Modal t={t} close={close} title="🔔 Notifications">

      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {SOUNDS.map(([id,lbl])=>(
          <button key={id} onClick={()=>pickSound(id)} style={{padding:"6px 12px",borderRadius:20,border:`2px solid ${notifSound===id?t.accent:t.border}`,background:notifSound===id?t.accent+"22":t.surface,color:notifSound===id?t.accent:t.muted,cursor:"pointer",fontSize:11,fontWeight:notifSound===id?700:400}}>{lbl}</button>
        ))}
      </div>
      <div style={{fontSize:10,color:t.muted,marginTop:5}}>Tap to preview · Selected plays on reminders</div>
    </div>

    {/* Custom reminders list — Update 9: 12hr time display */}
    {reminders.length>0&&<div style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Your Custom Reminders</div>

  const setNewAGid=v=>_newAGid.current=v, setNewAAction=v=>_newAAction.current=v, setNewAResult=v=>_newAResult.current=v, setNewADueDate=v=>_newADueDate.current=v, setNewADueTime=v=>_newADueTime.current=v;
  const setBulk=v=>_bulk.current=v, setEditGTitle=v=>_editGTitle.current=v, setEditGPriority=v=>_editGPriority.current=v, setEditGDeadline=v=>_editGDeadline.current=v, setEditGNotes=v=>_editGNotes.current=v;
  // Getters (used in functions that read values)
  const newHName=_newHName.current,newHCat=_newHCat.current,newHIcon=_newHIcon.current;
  const newGTitle=_newGTitle.current,newGPriority=_newGPriority.current,newGDeadline=_newGDeadline.current,newGNotes=_newGNotes.current;

  const bulk=_bulk.current,editGTitle=_editGTitle.current,editGPriority=_editGPriority.current,editGDeadline=_editGDeadline.current,editGNotes=_editGNotes.current;
  // UI toggle states — these control visibility, not text input, so useState is fine
  const[showTpl,setShowTpl]=useState(false);
  const[expH,setExpH]=useState(null);
  const[showGF,setShowGF]=useState(false);
  const[expG,setExpG]=useState(null);
  const[showNewAExtra,setShowNewAExtra]=useState(null);
  const[showBulk,setShowBulk]=useState(null);
  const[editG,setEditG]=useState(null);
  // Page-level state lifted to App to prevent keyboard dismiss on re-render
  const[viewD,setViewD]=useState(()=>td());
  const[catFilter,setCatFilter]=useState("All");
  const[analyticsTab,setAnalyticsTab]=useState("overview");
  const[editingHabit,setEditingHabit]=useState(null);// habit being edited (U1)
  const[detailHabit,setDetailHabit]=useState(null);// habit detail page (U2)

  const fb=window._fb;
  const today=td();
  const t=TH[tk]||TH.obsidian;

  function getPlan(){
    if(user&&ADMINS.includes(user.email))return PLANS.pro;
    if(pk==="early_access"&&pe&&new Date()>new Date(pe))return PLANS.free;
    return PLANS[pk]||PLANS.free;
  }
  const plan=getPlan();
  function showUp(r){setUpReason(r||"");setModal("upgrade");}
  function showToast(msg,type="ok"){setToast({msg,type});setTimeout(()=>setToast(null),3000);}
  showToastGlobal=showToast;

  // Auth
  useEffect(()=>{
    if(!fb){setLoading(false);return;}
    // First check if we're returning from a redirect
    fb.getRedirectResult(fb.auth).then(result=>{
      if(result&&result.user){
        // Redirect login succeeded - onAuthStateChanged will handle it
        console.log("Redirect success");
      }
    }).catch(e=>console.error("Redirect err:",e));
    // Listen for auth state
    const unsub=fb.onAuthStateChanged(fb.auth,async u=>{
      if(u){
        setUser(u);setDisplayName(u.displayName||"");
        await loadData(u.uid,u.email);
      } else {
        setUser(null);
      }
      setLoading(false);
    });
    return()=>unsub();
  },[]);

  // Notifications — default 8PM + custom reminders
  useEffect(()=>{
    if(!notif)return;
    const timers=[];
    // Schedule a reminder at given time string "HH:MM"
    function scheduleAt(timeStr,label){
      const[h,m]=timeStr.split(":").map(Number);
      const now=new Date(),rem=new Date();
      rem.setHours(h,m,0,0);
      if(now>=rem)rem.setDate(rem.getDate()+1);
      const delay=rem-now;
      const timer=setTimeout(()=>{
        if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
          if(habits.length>0){
            const today=td();
            const undone=habits.filter(hb=>!hb.log||!hb.log[today]);
            if(undone.length>0){
              new Notification("⚡ Momentum",{body:`${label} — ${undone.length} habit${undone.length>1?"s":""} left today! 🔥`});
              playSound(notifSound);
            }
          }
        }
      },delay);
      timers.push(timer);
    }
    // Default 8PM reminder
    scheduleAt("20:00","Daily Reminder");
    // Custom reminders
    reminders.filter(r=>r.enabled).forEach(r=>scheduleAt(r.time,r.label));
    return()=>timers.forEach(clearTimeout);
  },[habits,notif,reminders]);

  async function handleLogin(){
    setSigningIn(true);
    try{
      // Try popup first (works on most browsers)
      await fb.signInWithPopup(fb.auth,fb.provider);
    }catch(e){
      if(e.code==="auth/popup-blocked"||e.code==="auth/popup-closed-by-user"||e.code==="auth/cancelled-popup-request"){
        // Popup blocked — fallback to redirect
        try{await fb.signInWithRedirect(fb.auth,fb.provider);}
        catch(e2){console.error(e2);setSigningIn(false);}
      } else {
        console.error(e);
        setSigningIn(false);
      }
    }
  }
  async function handleLogout(){
    await fb.signOut(fb.auth);
    setUser(null);setHabits([]);setGoals([]);setJournals({});setPk("free");setPe(null);
  }

  async function loadData(uid,email){
    try{
      const ref=fb.doc(fb.db,"users",uid);
      const snap=await fb.getDoc(ref);
      if(snap.exists()){
        const d=snap.data();
        setHabits(d.habits||[]);setGoals(d.goals||[]);setJournals(d.journals||{});
        setTk(d.themeKey||"obsidian");setPk(d.plan||"free");setPe(d.planExpiry||null);
        if(d.displayName)setDisplayName(d.displayName);
      } else {
        // New user
        let num=101;
        await fb.runTransaction(fb.db,async tx=>{
          const cRef=fb.doc(fb.db,"meta","userCount");
          const cSnap=await tx.get(cRef);
          num=cSnap.exists()?(cSnap.data().count||0)+1:1;
          tx.set(cRef,{count:num},{merge:true});
        });
        const isEarly=num<=100;
        const exp=new Date();exp.setDate(exp.getDate()+30);
        const expStr=isEarly?exp.toISOString().split("T")[0]:null;
        const plan2=isEarly?"early_access":"free";
        setPk(plan2);setPe(expStr);
        await fb.setDoc(ref,{habits:[],goals:[],journals:{},themeKey:"obsidian",plan:plan2,planExpiry:expStr,signupDate:today,userNumber:num,email,isEarlyUser:isEarly});
        if(isEarly)showToast(`🎉 You're user #${num} — 30 days Pro FREE!`,"badge");
      }
    }catch(e){console.error("Load err:",e);}
  }

  async function save(h,g,j,theme){
    if(!user)return;
    setSaving(true);
    try{await fb.setDoc(fb.doc(fb.db,"users",user.uid),{habits:h,goals:g,journals:j,themeKey:theme,displayName:displayName||user.displayName||""},{merge:true});}
    catch(e){console.error("Save err:",e);}
    setSaving(false);
  }

  // Habits
  function addH(){
    const name=_newHName.current.trim();
    if(!name)return;
    if(habits.length>=plan.maxH){showUp(`Free plan: max ${PLANS.free.maxH} habits. Upgrade for unlimited!`);return;}
    const h=[...habits,{id:Date.now(),name,cat:_newHCat.current,icon:_newHIcon.current,streak:0,best:0,log:{}}];
    _newHName.current="";_newHIcon.current="⭐";_newHCat.current="Health";
    setHabits(h);save(h,goals,journals,tk);showToast("Habit added! 🌱");
  }
  function addTpl(tpl){
    if(habits.length>=plan.maxH){showUp(`Free plan: max ${PLANS.free.maxH} habits.`);return;}
    const h=[...habits,{id:Date.now(),name:tpl.name,cat:tpl.cat,icon:tpl.icon,streak:0,best:0,log:{}}];
    setHabits(h);save(h,goals,journals,tk);showToast(`Added "${tpl.name}"!`);
  }
  function toggleH(id){
    const h=habits.map(hb=>{
      if(hb.id!==id)return hb;
      const log={...hb.log};const was=!!log[today];
      if(was)delete log[today];else log[today]=true;
      let streak=0,best=hb.best||0;
      const d=new Date();
      while(true){const s=d.toISOString().split("T")[0];if(!log[s])break;streak++;d.setDate(d.getDate()-1);}
      if(streak>best)best=streak;
      if(!was&&BADGES.some(b=>b.d===streak)){setConfetti(true);showToast(`🏆 ${streak}-day streak badge!`,"badge");}
      // Ask for review at 7-day streak (only once)
      if(!was&&streak===7&&!localStorage.getItem("hg_reviewed")){
        setTimeout(()=>setShowReview(true),2000);
      }
      return{...hb,log,streak,best};
    });
    setHabits(h);save(h,goals,journals,tk);
  }
  function delH(id){const h=habits.filter(x=>x.id!==id);setHabits(h);save(h,goals,journals,tk);}
  function updateH(updated){const h=habits.map(x=>x.id!==updated.id?x:updated);setHabits(h);save(h,goals,journals,tk);showToast("Habit updated! ✅");}

  // Goals
  function addG(){
    const title=_newGTitle.current.trim();
    if(!title)return;
    if(goals.length>=plan.maxG){showUp(`Free plan: max ${PLANS.free.maxG} goals. Upgrade for unlimited!`);return;}
    const g=[...goals,{id:Date.now(),title,priority:_newGPriority.current,deadline:_newGDeadline.current,notes:_newGNotes.current,actions:[],createdAt:today}];

  }
  function addA(gid){
    const action=_newAAction.current.trim();

    const g=goals.map(x=>x.id!==gid?x:{...x,actions:[...x.actions,{id:Date.now(),action,result:_newAResult.current,dueDate:_newADueDate.current,dueTime:_newADueTime.current,done:false,doneAt:null}]});
    _newAGid.current=null;_newAAction.current="";_newAResult.current="";_newADueDate.current="";_newADueTime.current="";

  function bulkUp(gid){
    const acts=bulk.trim().split("\n").filter(l=>l.trim()).map(l=>{
      const p=l.split("|");return{id:Date.now()+Math.random(),action:(p[0]||"").trim(),result:(p[1]||"").trim(),done:false,doneAt:null};

  }

  function saveEditG(){updateG(editG,{title:_editGTitle.current.trim()||"Untitled",priority:_editGPriority.current,deadline:_editGDeadline.current,notes:_editGNotes.current});setEditG(null);showToast("Goal updated! ✅");}
  function bulkUp(gid){
    const acts=_bulk.current.trim().split("\n").filter(l=>l.trim()).map(l=>{const p=l.split("|");return{id:Date.now()+Math.random(),action:(p[0]||"").trim(),result:(p[1]||"").trim(),done:false,doneAt:null};});
    const g=goals.map(x=>x.id!==gid?x:{...x,actions:[...x.actions,...acts]});

  function chTheme(k){setTk(k);save(habits,goals,journals,k);}

  // Stats
  const totalH=habits.length,doneH=habits.filter(h=>h.log&&h.log[today]).length;
  const todayPct=totalH>0?Math.round((doneH/totalH)*100):0;
  const totalG=goals.length,compG=goals.filter(g=>g.actions.length>0&&g.actions.every(a=>a.done)).length;
  const totalA=goals.reduce((s,g)=>s+g.actions.length,0),doneA=goals.reduce((s,g)=>s+g.actions.filter(a=>a.done).length,0);
  const goalPct=totalA>0?Math.round((doneA/totalA)*100):0;
  const weekGoalPct=totalG>0?Math.round((compG/totalG)*100):0;
  // U5: Journal consecutive streak
  const jStreak=(()=>{let s=0;const d=new Date();while(true){const ds=d.toISOString().split("T")[0];const e=journals[ds];const hasEntry=e&&(typeof e==="object"?(e.note||e.mood!=null):(!!e));if(!hasEntry)break;s++;d.setDate(d.getDate()-1);}return s;})();
  const hr=new Date().getHours();
  const greet=hr<12?"Morning":hr<17?"Afternoon":"Evening";

          <Ring pct={goalPct} col={t.info} lbl="Today's Actions" sub={`${doneA}/${totalA}`} t={t}/>

            <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${h.log&&h.log[today]?t.success:t.muted}`,background:h.log&&h.log[today]?t.success:"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>

        <div>

  // Habits page — Updates 11-14: stats bar, day nav, week dots, category filter
  function HabitsPage(){
    const isToday=viewD===today;

    // Day navigation helpers
    function prevDay(){const d=new Date(viewD+"T12:00:00");d.setDate(d.getDate()-1);setViewD(d.toISOString().split("T")[0]);}
    function nextDay(){if(isToday)return;const d=new Date(viewD+"T12:00:00");d.setDate(d.getDate()+1);setViewD(d.toISOString().split("T")[0]);}

    // Update 11: stats bar values
    const doneForDay=habits.filter(h=>h.log&&h.log[viewD]).length;
    const bestStreak=habits.length>0?Math.max(...habits.map(h=>h.streak||0)):0;
    const totalDays=Object.keys(habits.reduce((acc,h)=>({...acc,...(h.log||{})}),{})).length||1;
    const totalDone=habits.reduce((s,h)=>s+Object.values(h.log||{}).filter(Boolean).length,0);
    const rateVal=habits.length>0?Math.round(totalDone/(habits.length*totalDays)*100):0;

    // Update 13: last 7 days for week dots
    function getLast7(){const arr=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);arr.push(d.toISOString().split("T")[0]);}return arr;}
    const week7=getLast7();

    // Update 14: unique cats for filter tabs
    const allCats=["All",...[...new Set(habits.map(h=>h.cat))].filter(Boolean)];
    const filtered=catFilter==="All"?habits:habits.filter(h=>h.cat===catFilter);

    return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h1 style={{fontSize:22,fontWeight:800,margin:0}}>🔥 Habits</h1>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setModal("notif")} style={{padding:"7px 10px",borderRadius:10,border:`1px solid ${t.border}`,background:notif?t.success+"22":t.surface,color:notif?t.success:t.muted,cursor:"pointer",fontSize:14}}>{notif?"🔔":"🔕"}</button>
          <button onClick={()=>setShowTpl(!showTpl)} style={{padding:"7px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,cursor:"pointer",fontSize:12,fontWeight:600}}>📋</button>
        </div>
      </div>

      {/* Update 11: Stats bar */}
      <div style={{display:"flex",background:t.card,border:`1px solid ${t.border}`,borderRadius:12,marginBottom:12,overflow:"hidden"}}>
        {[["Total",habits.length,t.text],[`Done`,`${doneForDay}/${habits.length}`,t.success],[`Streak`,`${bestStreak}d`,t.accent],[`Rate`,`${rateVal}%`,t.info]].map(([lbl,val,col],i)=>(
          <div key={lbl} style={{flex:1,padding:"10px 6px",textAlign:"center",borderRight:i<3?`1px solid ${t.border}`:"none"}}>
            <div style={{fontSize:15,fontWeight:800,color:col}}>{val}</div>
            <div style={{fontSize:9,color:t.muted,textTransform:"uppercase",letterSpacing:0.5,marginTop:2}}>{lbl}</div>
          </div>
        ))}
      </div>

      {/* Update 12: Day navigation */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:"9px 14px",marginBottom:12}}>
        <button onClick={prevDay} style={{background:t.surface,border:"none",color:t.text,cursor:"pointer",borderRadius:8,padding:"4px 11px",fontSize:16}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontWeight:700,fontSize:13,color:isToday?t.accent:t.text}}>{isToday?"Today":new Date(viewD+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
          {!isToday&&<div style={{fontSize:10,color:t.muted,marginTop:1}}>Read-only · past day</div>}
        </div>
        <button onClick={nextDay} disabled={isToday} style={{background:isToday?t.surface+"60":t.surface,border:"none",color:isToday?t.border:t.text,cursor:isToday?"not-allowed":"pointer",borderRadius:8,padding:"4px 11px",fontSize:16}}>›</button>
      </div>

      {!plan.heat&&<div style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:8,padding:"7px 12px",marginBottom:10,fontSize:11,color:t.muted}}>Using {habits.length}/{PLANS.free.maxH} habit slots (Free plan)</div>}

      {showTpl&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Quick Add Templates</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>{TMPLS.map((tp,i)=><button key={i} onClick={()=>addTpl(tp)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${t.border}`,background:t.surface,color:t.text,cursor:"pointer",fontSize:12}}>{tp.icon} {tp.name}</button>)}</div>
      </div>}

      {isToday&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Add New Habit</div>
        <div style={{display:"flex",gap:7,marginBottom:8}}>
          <input defaultValue={_newHIcon.current} onChange={e=>setNewHIcon(e.target.value)} style={{width:44,padding:"8px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,textAlign:"center",fontSize:18}}/>
          <input defaultValue={_newHName.current} onChange={e=>setNewHName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addH()} placeholder="Habit name..." style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:14}}/>
        </div>
        <div style={{display:"flex",gap:7}}>
          <select defaultValue={_newHCat.current} onChange={e=>setNewHCat(e.target.value)} style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13}}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
          <button onClick={addH} style={{padding:"8px 18px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer"}}>+ Add</button>
        </div>
      </div>}

      {/* Update 14: Category filter tabs */}
      {habits.length>0&&<div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:12}}>
        {allCats.map(c=>(
          <button key={c} onClick={()=>setCatFilter(c)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${catFilter===c?t.accent:t.border}`,background:catFilter===c?t.accent+"22":t.surface,color:catFilter===c?t.accent:t.muted,cursor:"pointer",fontSize:11,fontWeight:catFilter===c?700:400,flexShrink:0,whiteSpace:"nowrap"}}>{c}</button>
        ))}
      </div>}

      {filtered.length===0&&habits.length===0&&<div style={{textAlign:"center",color:t.muted,padding:36}}>No habits yet. Add one or use templates! 🌱</div>}
      {filtered.length===0&&habits.length>0&&<div style={{textAlign:"center",color:t.muted,padding:24,fontSize:13}}>No habits in "{catFilter}" category.</div>}

      {filtered.map(h=>{
        const badge=getBadge(h.streak),total=Object.values(h.log||{}).filter(Boolean).length,exp=expH===h.id;
        const doneOnDay=!!(h.log&&h.log[viewD]);
        const hColor=h.color||t.accent;
        return(<div key={h.id} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,overflow:"hidden",marginBottom:9,borderLeft:`4px solid ${hColor}`}}>
          <div style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
            <div onClick={()=>isToday&&toggleH(h.id)} style={{width:24,height:24,borderRadius:7,border:`2px solid ${doneOnDay?t.success:t.border}`,background:doneOnDay?t.success:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:isToday?"pointer":"default",flexShrink:0}}>
              {doneOnDay&&<span style={{color:"#000",fontSize:13,fontWeight:900}}>✓</span>}
            </div>
            <span style={{fontSize:18}}>{h.icon}</span>
            <div style={{flex:1,cursor:"pointer"}} onClick={()=>setDetailHabit(h.id)}>
              <div style={{fontWeight:600,fontSize:14,color:doneOnDay?t.success:t.text}}>{h.name}</div>
              <div style={{fontSize:10,color:t.muted,marginBottom:5}}>{h.cat} · {total} done{h.goalCount>0?` · goal: ${h.goalCount} ${h.goalUnit}`:""}</div>
              <div style={{display:"flex",gap:3,alignItems:"center"}}>
                {week7.map(d=>(<div key={d} title={d} style={{width:9,height:9,borderRadius:"50%",background:h.log&&h.log[d]?hColor:t.surface,border:`1.5px solid ${d===today?hColor:t.border}`,flexShrink:0}}/>))}
              </div>
            </div>
            {h.streak>0&&<span style={{fontSize:11,fontWeight:700,color:t.accent}}>🔥{h.streak}d</span>}
            {badge&&plan.heat&&<span title={badge.l}>{badge.i}</span>}
            <button onClick={()=>setEditingHabit(h)} style={{background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:13,padding:"0 2px"}}>✏️</button>
            <button onClick={()=>setExpH(exp?null:h.id)} style={{background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:13,padding:"0 3px"}}>{exp?"▲":"▼"}</button>
            <button onClick={()=>delH(h.id)} style={{background:"none",border:"none",color:t.danger,cursor:"pointer",fontSize:14}}>🗑</button>
          </div>
          {exp&&<div style={{borderTop:`1px solid ${t.border}`,padding:"12px 14px",background:t.surface}}>
            <div style={{display:"flex",gap:18,marginBottom:12}}>
              {[["🔥","Current",h.streak,"d",t.accent],["🏅","Best",h.best||h.streak,"d",t.info],["✅","Total",total,"",t.success]].map(([ic,lb,val,u,col])=>(
                <div key={lb}><div style={{fontSize:17,fontWeight:800,color:col}}>{val}{u}</div><div style={{fontSize:10,color:t.muted}}>{lb}</div></div>
              ))}
              {badge&&plan.heat&&<div><div style={{fontSize:20}}>{badge.i}</div><div style={{fontSize:10,color:t.muted}}>{badge.l}</div></div>}
            </div>
            <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:7}}>90-DAY HEATMAP</div>
            {plan.heat?<Heatmap h={h} t={t}/>:<div onClick={()=>showUp("Heatmaps are a Pro feature!")} style={{height:34,background:t.card,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:`1px dashed ${t.border}`}}><span style={{fontSize:12,color:t.muted}}>🔒 Upgrade to unlock heatmaps</span></div>}
          </div>}
        </div>);
      })}
    </div>
  );}

  // Goals page
  function GoalsPage(){return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h1 style={{fontSize:22,fontWeight:800,margin:0}}>🎯 Goals</h1>
        <button onClick={()=>setShowGF(!showGF)} style={{padding:"8px 14px",borderRadius:10,border:"none",background:t.accent,color:"#000",cursor:"pointer",fontSize:13,fontWeight:700}}>+ New</button>
      </div>
      {!plan.heat&&<div style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:8,padding:"7px 12px",marginBottom:10,fontSize:11,color:t.muted}}>Using {goals.length}/{PLANS.free.maxG} goal slots (Free plan)</div>}
      {showGF&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:12}}>
        <input defaultValue={_newGTitle.current} onChange={e=>setNewGTitle(e.target.value)} placeholder="Goal title..." style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:14,marginBottom:9}}/>
        <div style={{display:"flex",gap:7,marginBottom:9}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:t.muted,fontWeight:600,marginBottom:4}}>Priority</div>
            <select defaultValue={_newGPriority.current} onChange={e=>setNewGPriority(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text}}>{["High","Medium","Low"].map(p=><option key={p}>{p}</option>)}</select>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:t.muted,fontWeight:600,marginBottom:4}}>Deadline <span style={{fontWeight:400}}>(optional)</span></div>
            <input type="date" defaultValue={_newGDeadline.current} onChange={e=>setNewGDeadline(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text}}/>
          </div>
        </div>
        <textarea defaultValue={_newGNotes.current} onChange={e=>setNewGNotes(e.target.value)} placeholder="Notes..." style={{width:"100%",height:56,padding:"8px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,resize:"none",marginBottom:9}}/>
        <div style={{display:"flex",gap:7}}>
          <button onClick={addG} style={{padding:"9px 20px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer"}}>Add Goal</button>
          <button onClick={()=>setShowGF(false)} style={{padding:"9px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:"none",color:t.text,cursor:"pointer"}}>Cancel</button>
        </div>
      </div>}
      {goals.length===0&&<div style={{textAlign:"center",color:t.muted,padding:36}}>No goals yet. Create your first! 🚀</div>}
      {goals.map(g=>{

            <div style={{height:6,background:t.surface,borderRadius:10,marginBottom:12}}><div style={{height:"100%",width:`${pct}%`,background:isComplete?t.success:t.accent,borderRadius:10,transition:"width 0.5s"}}/></div>
            {/* Completed actions */}
            {done.length>0&&<div style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:t.success,marginBottom:6}}>✅ Completed ({done.length})</div>
              {done.map(a=>(
                <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 9px",background:t.success+"12",borderRadius:8,marginBottom:4}}>
                  <span style={{fontSize:13,color:t.success,flexShrink:0}}>✓</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:t.text,fontWeight:500}}>{a.action}</div>
                    {a.result&&<div style={{fontSize:10,color:t.muted}}>→ {a.result}</div>}
                  </div>
                  {a.doneAt&&<span style={{fontSize:10,color:t.muted,flexShrink:0}}>{fmt(a.doneAt)}</span>}
                </div>
              ))}
            </div>}
            {/* Remaining actions */}
            {remaining.length>0&&<div style={{marginBottom:6}}>
              <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:6}}>⏳ Remaining ({remaining.length})</div>
              {remaining.map(a=>(
                <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 9px",background:t.surface,borderRadius:8,marginBottom:4}}>
                  <span style={{fontSize:13,color:t.muted,flexShrink:0}}>○</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:t.muted}}>{a.action}</div>
                    {a.result&&<div style={{fontSize:10,color:t.border}}>→ {a.result}</div>}
                  </div>
                </div>
              ))}
            </div>}
            {g.actions.length===0&&<div style={{fontSize:12,color:t.muted,textAlign:"center",padding:"8px 0"}}>No action steps added yet</div>}
          </div>);
        })}
      </div>}
      {analyticsTab==="badges"&&<div>
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>🏅 Streak Badges</div>
          {!plan.heat
            ?<div onClick={()=>showUp("Badges are a Pro feature!")} style={{background:t.surface,border:`1px dashed ${t.border}`,borderRadius:10,padding:12,textAlign:"center",cursor:"pointer"}}><span style={{fontSize:12,color:t.muted}}>🔒 Upgrade to unlock all badges</span></div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(86px,1fr))",gap:7}}>
              {BADGES.map(b=>{const earned=habits.some(h=>(h.best||h.streak)>=b.d);return(<div key={b.d} style={{padding:"9px 7px",borderRadius:10,background:earned?b.c+"22":t.surface,border:`1px solid ${earned?b.c+"66":t.border}`,textAlign:"center",opacity:earned?1:0.35}}>
                <div style={{fontSize:22}}>{b.i}</div>
                <div style={{fontSize:10,fontWeight:700,color:earned?b.c:t.muted,marginTop:3}}>{b.l}</div>
                <div style={{fontSize:9,color:t.muted,marginTop:1}}>🔥{b.d} days</div>
              </div>);})}
            </div>}
        </div>
        {habits.length===0&&<div style={{textAlign:"center",color:t.muted,fontSize:13}}>Build habits to earn badges! 🌱</div>}
      </div>}
    </div>
  );}

  return(
    <div style={{minHeight:"100vh",background:t.bg,fontFamily:"'Sora',system-ui,sans-serif",color:t.text}}>
      <style>{`*{box-sizing:border-box;}input,textarea,select{outline:none;font-family:inherit;}`}</style>
      {toast&&<div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",zIndex:9998,background:toast.type==="badge"?t.accent:t.success,color:"#000",padding:"9px 18px",borderRadius:20,fontWeight:700,fontSize:13,boxShadow:"0 8px 32px rgba(0,0,0,0.3)",whiteSpace:"nowrap",animation:"slideIn 0.3s ease"}}>{toast.msg}</div>}
      <Confetti on={confetti} done={()=>setConfetti(false)}/>
      {showReview&&<ReviewPopup t={t} onClose={()=>setShowReview(false)}/>}
      {editingHabit&&<EditHabitModal t={t} close={()=>setEditingHabit(null)} habit={editingHabit} onSave={updateH}/>}
      {modal==="upgrade"&&<UpgradeModal t={t} close={()=>setModal(null)} reason={upReason}/>}
      {modal==="pomodoro"&&<Pomodoro t={t} close={()=>setModal(null)}/>}
      {modal==="calendar"&&<CalModal t={t} close={()=>setModal(null)} habits={habits} goals={goals}/>}
      {modal==="journal"&&<JournalModal t={t} close={()=>setModal(null)} journals={journals} onSave={saveJ} plan={plan}/>}
      {modal==="ai"&&(plan.ai?<AIModal t={t} close={()=>setModal(null)} plan={plan} showUp={showUp}/>:<UpgradeModal t={t} close={()=>setModal(null)} reason="AI Coach is a Pro feature!"/>)}
      {modal==="notif"&&<NotifModal t={t} close={()=>setModal(null)} enabled={notif} setEnabled={setNotif} plan={plan} reminders={reminders} setReminders={setReminders} notifSound={notifSound} setNotifSound={setNotifSound}/>}
      <div style={{display:"flex",minHeight:"100vh"}}>
      {/* Habit detail page — full screen overlay */}
      {detailHabit&&<div style={{position:"fixed",inset:0,zIndex:800,overflowY:"auto",background:t.bg}}>
        <HabitDetailPage t={t} habit={habits.find(h=>h.id===detailHabit)||detailHabit} habits={habits} setHabits={setHabits} saveF={h=>save(h,goals,journals,tk)} back={()=>setDetailHabit(null)}/>
      </div>}
        <div className="sb" style={{width:216,background:t.card,borderRight:`1px solid ${t.border}`,flexDirection:"column",padding:"22px 14px",position:"sticky",top:0,height:"100vh",flexShrink:0,overflowY:"auto"}}>
          <div style={{marginBottom:18}}><div style={{fontSize:19,fontWeight:800,color:t.accent}}>⚡ Momentum</div><div style={{fontSize:10,color:t.muted,marginTop:1}}>Habit & Goal Tracker</div></div>
          <div style={{display:"flex",alignItems:"center",gap:7,padding:"8px 9px",background:t.surface,borderRadius:10,marginBottom:14}}>
            <img src={user.photoURL} style={{width:26,height:26,borderRadius:"50%"}} alt=""/>
            <div style={{flex:1,overflow:"hidden"}}>
              <div style={{fontSize:11,fontWeight:700,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{displayName||user.displayName}</div>
              <div style={{fontSize:9,color:pk==="pro"?t.accent:pk==="early_access"?"#4ade80":t.muted}}>{pk==="pro"?"⚡ Pro":pk==="early_access"?"🎁 Early Access":"Free Plan"}</div>
            </div>
          </div>
          <nav style={{flex:1}}>
            {NAV.map(item=>(<button key={item.id} onClick={()=>setPage(item.id)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"9px 11px",borderRadius:10,border:"none",cursor:"pointer",background:page===item.id?t.accent+"22":"none",color:page===item.id?t.accent:t.muted,fontWeight:page===item.id?700:400,fontSize:13,marginBottom:3,textAlign:"left"}}><span>{item.icon}</span>{item.label}</button>))}
            <div style={{height:1,background:t.border,margin:"12px 0"}}/>
            {[["🍅","Pomodoro","pomodoro"],["📅","Calendar","calendar"],["📓","Journal","journal"],["🤖","AI Coach","ai"],["🔔","Notifications","notif"]].map(([icon,label,id])=>(
              <button key={id} onClick={()=>setModal(id)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"7px 11px",borderRadius:10,border:"none",cursor:"pointer",background:"none",color:t.muted,fontSize:12,marginBottom:3,textAlign:"left"}}>
                <span>{icon}</span>{label}{id==="ai"&&!plan.ai&&<span style={{marginLeft:"auto",fontSize:9,color:t.accent,background:t.accent+"22",padding:"1px 5px",borderRadius:8}}>PRO</span>}
              </button>
            ))}
          </nav>
          {pk!=="pro"&&<button onClick={()=>showUp("Get full Pro access!")} style={{width:"100%",padding:"9px",borderRadius:10,border:"none",background:t.accent,color:"#000",cursor:"pointer",fontSize:12,fontWeight:700,marginBottom:7}}>⚡ Upgrade to Pro</button>}
          <button onClick={()=>setPage("settings")} style={{width:"100%",padding:"7px",borderRadius:10,border:`1px solid ${t.border}`,background:"none",color:t.muted,cursor:"pointer",fontSize:11,marginBottom:5}}>⚙️ Settings</button>
          <button onClick={handleLogout} style={{width:"100%",padding:"7px",borderRadius:10,border:`1px solid ${t.danger}33`,background:t.danger+"0a",color:t.danger,cursor:"pointer",fontSize:11,fontWeight:600}}>Sign out</button>
        </div>
        <div className="ma" style={{flex:1,overflowY:"auto"}}>
          {page==="dashboard"&&<Dashboard/>}
          {page==="habits"&&<HabitsPage/>}
          {page==="goals"&&<GoalsPage/>}
          {page==="analytics"&&<AnalyticsPage/>}
          {page==="settings"&&<SettingsPage t={t} tk={tk} chTheme={chTheme} user={user} pk={pk} pe={pe} plan={plan} handleLogout={handleLogout} showUp={showUp} displayName={displayName} onSaveName={onSaveName}/>}
        </div>
      </div>
      <div className="bn" style={{position:"fixed",bottom:0,left:0,right:0,background:t.card,borderTop:`1px solid ${t.border}`,zIndex:500}}>
        <div style={{display:"flex",justifyContent:"space-around",padding:"5px 8px 3px",borderBottom:`1px solid ${t.border}`}}>
          {[["🍅","pomodoro"],["📅","calendar"],["📓","journal"],["🤖","ai"],["🔔","notif"]].map(([icon,id])=>(
            <button key={id} onClick={()=>setModal(id)} style={{background:"none",border:"none",cursor:"pointer",padding:"3px 5px",position:"relative"}}>
              <span style={{fontSize:17}}>{icon}</span>
              {id==="ai"&&!plan.ai&&<span style={{position:"absolute",top:0,right:0,width:5,height:5,borderRadius:"50%",background:t.accent}}/>}
            </button>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-around",padding:"5px 8px 7px"}}>
          {NAV.map(item=>(<button key={item.id} onClick={()=>setPage(item.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"3px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,flex:1}}>
            <span style={{fontSize:21}}>{item.icon}</span>
            <span style={{fontSize:10,fontWeight:page===item.id?700:400,color:page===item.id?t.accent:t.muted}}>{item.label}</span>
            {page===item.id&&<div style={{width:4,height:4,borderRadius:"50%",background:t.accent}}/>}
          </button>))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
