function Confetti({on,done}){
  const r=useRef();
  useEffect(()=>{
    if(!on)return;
    const c=r.current;if(!c)return;
    c.width=window.innerWidth;c.height=window.innerHeight;
    const ctx=c.getContext("2d");
    const cols=["#f5c842","#e8853d","#4ade80","#60a5fa","#a78bfa","#f87171"];
    const ps=Array.from({length:90},()=>({x:Math.random()*c.width,y:-20,r:3+Math.random()*5,spd:1.5+Math.random()*2,col:cols[Math.floor(Math.random()*6)],ang:0,ts:0.1+Math.random()*0.3}));
    let raf;
    const draw=()=>{ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.y+=p.spd;p.ang+=p.ts;ctx.beginPath();ctx.lineWidth=p.r;ctx.strokeStyle=p.col;ctx.moveTo(p.x+Math.sin(p.ang)*8,p.y);ctx.lineTo(p.x+Math.sin(p.ang)*8+p.r*2,p.y+p.r*2);ctx.stroke();});if(ps.some(p=>p.y<c.height))raf=requestAnimationFrame(draw);else{ctx.clearRect(0,0,c.width,c.height);done&&done();}};
    draw();return()=>cancelAnimationFrame(raf);
  },[on]);
  if(!on)return null;
  return React.createElement("canvas",{ref:r,style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999}});
}

}

function Pomodoro({t,close}){
  const[mode,setMode]=useState("work");
  const[secs,setSecs]=useState(25*60);
  const[run,setRun]=useState(false);
  const[sess,setSess]=useState(0);
  const iv=useRef();
  const MODES={work:25*60,short:5*60,long:15*60};
  useEffect(()=>{
    if(run){iv.current=setInterval(()=>setSecs(s=>{if(s<=1){clearInterval(iv.current);setRun(false);setSess(x=>x+1);if(Notification.permission==="granted")new Notification("🍅 Done!",{body:"Session complete!"});return 0;}return s-1;}),1000);}
    else clearInterval(iv.current);
    return()=>clearInterval(iv.current);
  },[run]);
  function sw(m){setMode(m);setSecs(MODES[m]);setRun(false);}
  const pct=((MODES[mode]-secs)/MODES[mode])*100,r2=75,ci=2*Math.PI*r2;
  const mm=String(Math.floor(secs/60)).padStart(2,"0"),ss=String(secs%60).padStart(2,"0");
  return(<Modal t={t} close={close} title="🍅 Pomodoro">
    <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:20}}>
      {[["work","Focus"],["short","Short"],["long","Long"]].map(([m,l])=>(
        <button key={m} onClick={()=>sw(m)} style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:mode===m?t.accent:t.surface,color:mode===m?"#000":t.muted}}>{l}</button>
      ))}
    </div>
    <div style={{position:"relative",width:180,height:180,margin:"0 auto 20px"}}>
      <svg width={180} height={180} style={{transform:"rotate(-90deg)"}}>
        <circle cx={90} cy={90} r={r2} fill="none" stroke={t.border} strokeWidth={10}/>
        <circle cx={90} cy={90} r={r2} fill="none" stroke={t.accent} strokeWidth={10} strokeDasharray={ci} strokeDashoffset={ci-(pct/100)*ci} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:36,fontWeight:800,color:t.text,letterSpacing:-2}}>{mm}:{ss}</span>
        <span style={{fontSize:10,color:t.muted,textTransform:"uppercase",letterSpacing:2}}>{mode}</span>
      </div>
    </div>
    <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:14}}>
      <button onClick={()=>setRun(r=>!r)} style={{padding:"12px 30px",borderRadius:12,border:"none",cursor:"pointer",background:t.accent,color:"#000",fontWeight:700,fontSize:16}}>{run?"Pause":"Start"}</button>
      <button onClick={()=>{setSecs(MODES[mode]);setRun(false);}} style={{padding:"12px 16px",borderRadius:12,border:`1px solid ${t.border}`,cursor:"pointer",background:"none",color:t.text,fontWeight:600}}>Reset</button>
    </div>
    <div style={{textAlign:"center",color:t.muted,fontSize:13}}>Sessions: <strong style={{color:t.accent}}>{sess}</strong></div>
  </Modal>);
}

  const ds=d=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  return(<Modal t={t} close={close} title="📅 Calendar">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>

    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:5}}>
      {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:t.muted}}>{d}</div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
      {Array.from({length:fd}).map((_,i)=><div key={`e${i}`}/>)}
      {Array.from({length:days}).map((_,i)=>{
        const d=i+1,ds2=ds(d);

      <span>🟩 Habits</span><span>📌 Deadline</span><span style={{color:t.accent}}>● Today</span>

}

    setLoading(false);

function NotifModal({t,close,enabled,setEnabled,plan,reminders,setReminders}){
  const[status,setStatus]=useState(typeof Notification!=="undefined"?Notification.permission:"denied");
  const[newTime,setNewTime]=useState("08:00");
  const[newLabel,setNewLabel]=useState("");
  const maxReminders=plan.ai?Infinity:2;

  async function enable(){
    if(typeof Notification==="undefined"){alert("Notifications not supported in this browser.");return;}
    const p=await Notification.requestPermission();
    setStatus(p);
    if(p==="granted"){setEnabled(true);localStorage.setItem("hg_notif","1");}
  }
  function disable(){setEnabled(false);localStorage.setItem("hg_notif","0");}

  function addReminder(){
    if(!newTime)return;
    if(reminders.length>=maxReminders&&maxReminders!==Infinity){return;}
    const label=newLabel.trim()||"Habit Reminder";
    const updated=[...reminders,{id:Date.now(),time:newTime,label,enabled:true}];
    setReminders(updated);
    localStorage.setItem("hg_reminders",JSON.stringify(updated));
    setNewTime("08:00");setNewLabel("");
  }

  function removeReminder(id){
    const updated=reminders.filter(r=>r.id!==id);
    setReminders(updated);
    localStorage.setItem("hg_reminders",JSON.stringify(updated));
  }

  function toggleReminder(id){
    const updated=reminders.map(r=>r.id===id?{...r,enabled:!r.enabled}:r);
    setReminders(updated);
    localStorage.setItem("hg_reminders",JSON.stringify(updated));
  }

  const canAdd=reminders.length<maxReminders||maxReminders===Infinity;

  return(<Modal t={t} close={close} title="🔔 Notifications">
    <p style={{color:t.muted,fontSize:13,lineHeight:1.6,marginBottom:16}}>Set custom reminders to check your habits. Never break your streak!</p>

    {/* Default 8PM reminder info */}
    <div style={{display:"flex",gap:12,padding:"10px 12px",background:t.success+"18",borderRadius:10,border:`1px solid ${t.success}44`,marginBottom:16}}>
      <span style={{fontSize:20}}>⏰</span>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:600,color:t.text}}>Default Daily Reminder</div>
        <div style={{fontSize:11,color:t.muted}}>8:00 PM every day — for all users</div>
      </div>
      <div style={{fontSize:11,color:t.success,fontWeight:700}}>Always ON</div>
    </div>

    {/* Custom reminders list */}
    {reminders.length>0&&<div style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Your Custom Reminders</div>
      {reminders.map(r=>(
        <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:r.enabled?t.accent+"12":t.surface,border:`1px solid ${r.enabled?t.accent+"44":t.border}`,borderRadius:10,marginBottom:7}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:t.text}}>{r.label}</div>
            <div style={{fontSize:11,color:t.muted}}>🕐 {r.time}</div>
          </div>
          <button onClick={()=>toggleReminder(r.id)} style={{background:r.enabled?t.accent+"22":"none",border:`1px solid ${r.enabled?t.accent:t.border}`,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,color:r.enabled?t.accent:t.muted,fontWeight:600}}>{r.enabled?"ON":"OFF"}</button>
          <button onClick={()=>removeReminder(r.id)} style={{background:"none",border:"none",color:t.danger,cursor:"pointer",fontSize:16}}>✕</button>
        </div>
      ))}
    </div>}

    {/* Add new reminder */}
    {canAdd&&enabled&&<div style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:t.muted,marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>Add Reminder</div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input type="time" value={newTime} onChange={e=>setNewTime(e.target.value)} style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.card,color:t.text,fontSize:14}}/>
        <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="Label (e.g. Morning check)" style={{flex:2,padding:"8px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.card,color:t.text,fontSize:13}}/>
      </div>
      <button onClick={addReminder} style={{width:"100%",padding:"9px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Add Reminder</button>
    </div>}

    {/* Free plan limit notice */}
    {!plan.ai&&<div style={{background:t.accent+"18",border:`1px solid ${t.accent}44`,borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:12,color:t.accent}}>
      🔒 Free plan: {reminders.length}/{maxReminders} custom reminders used. <strong>Upgrade to Pro for unlimited reminders!</strong>
    </div>}

    {!canAdd&&!plan.ai&&<div style={{background:"#f8717122",border:"1px solid #f8717166",borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:12,color:"#f87171"}}>
      ⚠️ Free plan limit reached (2 reminders). Upgrade to Pro for unlimited custom reminders!
    </div>}

    {status==="denied"&&<div style={{background:"#f8717122",border:"1px solid #f8717166",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#f87171"}}>⚠️ Blocked. Go to Chrome → Settings → Site Settings → Notifications → Allow this site.</div>}

    {status!=="denied"&&<button onClick={enabled?disable:enable} style={{width:"100%",padding:"12px",borderRadius:12,border:`1px solid ${enabled?"#f87171":t.accent}`,background:enabled?"#f8717122":t.accent,color:enabled?"#f87171":"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>{enabled?"🔕 Disable All Notifications":"🔔 Enable Notifications"}</button>}
  </Modal>);
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[signingIn,setSigningIn]=useState(false);
  const[tk,setTk]=useState("obsidian");
  const[habits,setHabits]=useState([]);
  const[goals,setGoals]=useState([]);
  const[journals,setJournals]=useState({});
  const[pk,setPk]=useState("free");
  const[pe,setPe]=useState(null);
  const[page,setPage]=useState("dashboard");
  const[modal,setModal]=useState(null);
  const[confetti,setConfetti]=useState(false);
  const[toast,setToast]=useState(null);
  const[saving,setSaving]=useState(false);
  const[notif,setNotif]=useState(localStorage.getItem("hg_notif")==="1");
  const[reminders,setReminders]=useState(()=>{try{return JSON.parse(localStorage.getItem("hg_reminders")||"[]");}catch{return[];}});
  const[showReview,setShowReview]=useState(false);
  const[upReason,setUpReason]=useState("");
  const[newH,setNewH]=useState({name:"",cat:"Health",icon:"⭐"});
  const[showTpl,setShowTpl]=useState(false);
  const[expH,setExpH]=useState(null);
  const[newG,setNewG]=useState({title:"",priority:"Medium",deadline:"",notes:""});
  const[showGF,setShowGF]=useState(false);
  const[expG,setExpG]=useState(null);
  const[newA,setNewA]=useState({gid:null,action:"",result:""});
  const[bulk,setBulk]=useState("");
  const[showBulk,setShowBulk]=useState(null);

  const fb=window._fb;
  const today=td();
  const t=TH[tk]||TH.obsidian;
  const quote=QUOTES[new Date().getDate()%QUOTES.length];

  function getPlan(){
    if(user&&ADMINS.includes(user.email))return PLANS.pro;
    if(pk==="early_access"&&pe&&new Date()>new Date(pe))return PLANS.free;
    return PLANS[pk]||PLANS.free;
  }
  const plan=getPlan();
  function showUp(r){setUpReason(r||"");setModal("upgrade");}
  function showToast(msg,type="ok"){setToast({msg,type});setTimeout(()=>setToast(null),3000);}

  // Auth
  useEffect(()=>{
    if(!fb){setLoading(false);return;}
    // First check if we're returning from a redirect
    fb.getRedirectResult(fb.auth).then(result=>{
      if(result&&result.user){
        // Redirect login succeeded - onAuthStateChanged will handle it
        console.log("Redirect success");
      }
    }).catch(e=>console.error("Redirect err:",e));
    // Listen for auth state
    const unsub=fb.onAuthStateChanged(fb.auth,async u=>{
      if(u){
        setUser(u);
        await loadData(u.uid,u.email);
      } else {
        setUser(null);
      }
      setLoading(false);
    });
    return()=>unsub();
  },[]);

  // Notifications — default 8PM + custom reminders
  useEffect(()=>{
    if(!notif)return;
    const timers=[];
    // Schedule a reminder at given time string "HH:MM"
    function scheduleAt(timeStr,label){
      const[h,m]=timeStr.split(":").map(Number);
      const now=new Date(),rem=new Date();
      rem.setHours(h,m,0,0);
      if(now>=rem)rem.setDate(rem.getDate()+1);
      const delay=rem-now;
      const timer=setTimeout(()=>{
        if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
          if(habits.length>0){
            const today=td();
            const undone=habits.filter(hb=>!hb.log||!hb.log[today]);
            if(undone.length>0){
              new Notification("⚡ Momentum",{body:`${label} — ${undone.length} habit${undone.length>1?"s":""} left today! 🔥`});
            }
          }
        }
      },delay);
      timers.push(timer);
    }
    // Default 8PM reminder
    scheduleAt("20:00","Daily Reminder");
    // Custom reminders
    reminders.filter(r=>r.enabled).forEach(r=>scheduleAt(r.time,r.label));
    return()=>timers.forEach(clearTimeout);
  },[habits,notif,reminders]);

  async function handleLogin(){
    setSigningIn(true);
    try{
      // Try popup first (works on most browsers)
      await fb.signInWithPopup(fb.auth,fb.provider);
    }catch(e){
      if(e.code==="auth/popup-blocked"||e.code==="auth/popup-closed-by-user"||e.code==="auth/cancelled-popup-request"){
        // Popup blocked — fallback to redirect
        try{await fb.signInWithRedirect(fb.auth,fb.provider);}
        catch(e2){console.error(e2);setSigningIn(false);}
      } else {
        console.error(e);
        setSigningIn(false);
      }
    }
  }
  async function handleLogout(){
    await fb.signOut(fb.auth);
    setUser(null);setHabits([]);setGoals([]);setJournals({});setPk("free");setPe(null);
  }

  async function loadData(uid,email){
    try{
      const ref=fb.doc(fb.db,"users",uid);
      const snap=await fb.getDoc(ref);
      if(snap.exists()){
        const d=snap.data();
        setHabits(d.habits||[]);setGoals(d.goals||[]);setJournals(d.journals||{});
        setTk(d.themeKey||"obsidian");setPk(d.plan||"free");setPe(d.planExpiry||null);
      } else {
        // New user
        let num=101;
        await fb.runTransaction(fb.db,async tx=>{
          const cRef=fb.doc(fb.db,"meta","userCount");
          const cSnap=await tx.get(cRef);
          num=cSnap.exists()?(cSnap.data().count||0)+1:1;
          tx.set(cRef,{count:num},{merge:true});
        });
        const isEarly=num<=100;
        const exp=new Date();exp.setDate(exp.getDate()+30);
        const expStr=isEarly?exp.toISOString().split("T")[0]:null;
        const plan2=isEarly?"early_access":"free";
        setPk(plan2);setPe(expStr);
        await fb.setDoc(ref,{habits:[],goals:[],journals:{},themeKey:"obsidian",plan:plan2,planExpiry:expStr,signupDate:today,userNumber:num,email,isEarlyUser:isEarly});
        if(isEarly)showToast(`🎉 You're user #${num} — 30 days Pro FREE!`,"badge");
      }
    }catch(e){console.error("Load err:",e);}
  }

  async function save(h,g,j,theme){
    if(!user)return;
    setSaving(true);
    try{await fb.setDoc(fb.doc(fb.db,"users",user.uid),{habits:h,goals:g,journals:j,themeKey:theme},{merge:true});}
    catch(e){console.error("Save err:",e);}
    setSaving(false);
  }

  // Habits
  function addH(){
    if(!newH.name.trim())return;
    if(habits.length>=plan.maxH){showUp(`Free plan: max ${PLANS.free.maxH} habits. Upgrade for unlimited!`);return;}
    const h=[...habits,{id:Date.now(),name:newH.name.trim(),cat:newH.cat,icon:newH.icon,streak:0,best:0,log:{}}];
    setHabits(h);setNewH({name:"",cat:"Health",icon:"⭐"});save(h,goals,journals,tk);showToast("Habit added! 🌱");
  }
  function addTpl(tpl){
    if(habits.length>=plan.maxH){showUp(`Free plan: max ${PLANS.free.maxH} habits.`);return;}
    const h=[...habits,{id:Date.now(),name:tpl.name,cat:tpl.cat,icon:tpl.icon,streak:0,best:0,log:{}}];
    setHabits(h);save(h,goals,journals,tk);showToast(`Added "${tpl.name}"!`);
  }
  function toggleH(id){
    const h=habits.map(hb=>{
      if(hb.id!==id)return hb;
      const log={...hb.log};const was=!!log[today];
      if(was)delete log[today];else log[today]=true;
      let streak=0,best=hb.best||0;
      const d=new Date();
      while(true){const s=d.toISOString().split("T")[0];if(!log[s])break;streak++;d.setDate(d.getDate()-1);}
      if(streak>best)best=streak;
      if(!was&&BADGES.some(b=>b.d===streak)){setConfetti(true);showToast(`🏆 ${streak}-day streak badge!`,"badge");}
      // Ask for review at 7-day streak (only once)
      if(!was&&streak===7&&!localStorage.getItem("hg_reviewed")){
        setTimeout(()=>setShowReview(true),2000);
      }
      return{...hb,log,streak,best};
    });
    setHabits(h);save(h,goals,journals,tk);
  }
  function delH(id){const h=habits.filter(x=>x.id!==id);setHabits(h);save(h,goals,journals,tk);}

  // Goals
  function addG(){
    if(!newG.title.trim())return;
    if(goals.length>=plan.maxG){showUp(`Free plan: max ${PLANS.free.maxG} goals. Upgrade for unlimited!`);return;}
    const g=[...goals,{id:Date.now(),...newG,actions:[],createdAt:today}];
    setGoals(g);setNewG({title:"",priority:"Medium",deadline:"",notes:""});setShowGF(false);save(habits,g,journals,tk);showToast("Goal added! 🎯");
  }
  function addA(gid){
    if(!newA.action.trim())return;
    const g=goals.map(x=>x.id!==gid?x:{...x,actions:[...x.actions,{id:Date.now(),action:newA.action,result:newA.result,done:false,doneAt:null}]});
    setGoals(g);setNewA({gid:null,action:"",result:""});save(habits,g,journals,tk);
  }
  function toggleA(gid,aid){
    const g=goals.map(gl=>{
      if(gl.id!==gid)return gl;
      const actions=gl.actions.map(a=>a.id!==aid?a:{...a,done:!a.done,doneAt:!a.done?today:null});
      if(actions.every(a=>a.done)&&actions.length>0){setConfetti(true);showToast("🎯 Goal complete!");}
      return{...gl,actions};
    });
    setGoals(g);save(habits,g,journals,tk);
  }
  function delG(id){const g=goals.filter(x=>x.id!==id);setGoals(g);save(habits,g,journals,tk);}
  function bulkUp(gid){
    const acts=bulk.trim().split("\n").filter(l=>l.trim()).map(l=>{
      const p=l.split("|");return{id:Date.now()+Math.random(),action:(p[0]||"").trim(),result:(p[1]||"").trim(),done:false,doneAt:null};
    });
    const g=goals.map(x=>x.id!==gid?x:{...x,actions:[...x.actions,...acts]});
    setGoals(g);setBulk("");setShowBulk(null);save(habits,g,journals,tk);showToast(`${acts.length} actions added!`);
  }
  function saveJ(date,note){const j={...journals,[date]:note};setJournals(j);save(habits,goals,j,tk);showToast("Journal saved! 📓");}
  function chTheme(k){setTk(k);save(habits,goals,journals,k);}

  // Stats
  const totalH=habits.length,doneH=habits.filter(h=>h.log&&h.log[today]).length;
  const todayPct=totalH>0?Math.round((doneH/totalH)*100):0;
  const totalG=goals.length,compG=goals.filter(g=>g.actions.length>0&&g.actions.every(a=>a.done)).length;
  const totalA=goals.reduce((s,g)=>s+g.actions.length,0),doneA=goals.reduce((s,g)=>s+g.actions.filter(a=>a.done).length,0);
  const goalPct=totalA>0?Math.round((doneA/totalA)*100):0;
  const hr=new Date().getHours();
  const greet=hr<12?"Morning":hr<17?"Afternoon":"Evening";
  const NAV=[{id:"dashboard",icon:"⚡",label:"Dashboard"},{id:"habits",icon:"🔥",label:"Habits"},{id:"goals",icon:"🎯",label:"Goals"},{id:"analytics",icon:"📊",label:"Analytics"}];

  // Login screen
  if(loading){return(<div style={{minHeight:"100vh",background:"#0d0d0f",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center",color:"#7a7a8c"}}><div style={{fontSize:56,marginBottom:14}}>⚡</div><div style={{fontSize:15,color:"#f5c842",fontWeight:700,marginBottom:6}}>Momentum</div><div style={{fontSize:13}}>Loading your data...</div></div></div>);}
  if(!user){return(
    <div style={{minHeight:"100vh",background:"#0d0d0f",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#18181c",border:"1px solid #2a2a32",borderRadius:24,padding:"40px 28px",width:"100%",maxWidth:360,textAlign:"center",animation:"fadeIn 0.5s ease"}}>
        <div style={{fontSize:52,marginBottom:14}}>⚡</div>
        <h1 style={{fontSize:26,fontWeight:800,color:"#f5c842",letterSpacing:-1,marginBottom:8}}>Momentum</h1>
        <p style={{color:"#7a7a8c",fontSize:13,marginBottom:14,lineHeight:1.6}}>Your personal Habit & Goal Tracker. Sign in to sync across all devices.</p>
        <div style={{background:"#4ade8022",border:"1px solid #4ade8066",borderRadius:10,padding:"9px 14px",marginBottom:24,fontSize:12,color:"#4ade80",fontWeight:600}}>🎁 First 100 users get 30 days Pro FREE!</div>
        <button onClick={handleLogin} disabled={signingIn} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:signingIn?"#2a2a32":"#fff",color:"#000",fontWeight:700,fontSize:15,cursor:signingIn?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.4-5l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.3 0-9.6-2.9-11.3-7.2l-6.5 5C9.6 39.5 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.4-2.4 4.4-4.5 5.8l6.2 5.2C40.8 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/></svg>

        <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>🏅 Badges</div>
        {!plan.heat
          ?<div onClick={()=>showUp("Badges are a Pro feature!")} style={{background:t.surface,border:`1px dashed ${t.border}`,borderRadius:10,padding:"12px",textAlign:"center",cursor:"pointer"}}><span style={{fontSize:12,color:t.muted}}>🔒 Upgrade to unlock all badges</span></div>
          :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(86px,1fr))",gap:7}}>
            {BADGES.map(b=>{const earned=habits.some(h=>(h.best||h.streak)>=b.d);return(<div key={b.d} style={{padding:"9px 7px",borderRadius:10,background:earned?b.c+"22":t.surface,border:`1px solid ${earned?b.c+"66":t.border}`,textAlign:"center",opacity:earned?1:0.35}}>
              <div style={{fontSize:20}}>{b.i}</div>
              <div style={{fontSize:10,fontWeight:700,color:earned?b.c:t.muted,marginTop:3}}>{b.l}</div>
              <div style={{fontSize:9,color:t.muted}}>{b.d}d</div>
            </div>);
            })}
          </div>
        }
      </div>
      {habits.map(h=>(
        <div key={h.id} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:13,marginBottom:9}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:7}}>{h.icon} {h.name} — 90 Days</div>
          {plan.heat?<Heatmap h={h} t={t}/>:<div onClick={()=>showUp("Heatmaps are Pro only!")} style={{height:32,background:t.surface,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:`1px dashed ${t.border}`}}><span style={{fontSize:11,color:t.muted}}>🔒 Upgrade to unlock</span></div>}
        </div>
      ))}
      {habits.length===0&&goals.length===0&&<div style={{textAlign:"center",color:t.muted,padding:36}}>Add habits and goals to see analytics! 📈</div>}
      <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:20,marginTop:8,textAlign:"center"}}>
        <div style={{fontSize:22,marginBottom:6}}>⭐</div>
        <div style={{fontWeight:700,fontSize:14,color:t.text,marginBottom:4}}>Enjoying Momentum?</div>
        <div style={{fontSize:12,color:t.muted,marginBottom:12,lineHeight:1.5}}>Takes 2 minutes. Helps us grow!</div>
        <a href={REVIEW_FORM} target="_blank" style={{display:"inline-block",padding:"10px 22px",borderRadius:12,background:t.accent,color:"#000",fontWeight:700,fontSize:13,textDecoration:"none"}}>⭐ Leave a Review</a>
      </div>
    </div>
  );}

  return(
    <div style={{minHeight:"100vh",background:t.bg,fontFamily:"'Sora',system-ui,sans-serif",color:t.text}}>
      <style>{`*{box-sizing:border-box;}input,textarea,select{outline:none;font-family:inherit;}`}</style>
      {toast&&<div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",zIndex:9998,background:toast.type==="badge"?t.accent:t.success,color:"#000",padding:"9px 18px",borderRadius:20,fontWeight:700,fontSize:13,boxShadow:"0 8px 32px rgba(0,0,0,0.3)",whiteSpace:"nowrap",animation:"slideIn 0.3s ease"}}>{toast.msg}</div>}
      <Confetti on={confetti} done={()=>setConfetti(false)}/>
      {showReview&&<ReviewPopup t={t} onClose={()=>setShowReview(false)}/>}
      {modal==="upgrade"&&<UpgradeModal t={t} close={()=>setModal(null)} reason={upReason}/>}
      {modal==="pomodoro"&&<Pomodoro t={t} close={()=>setModal(null)}/>}
      {modal==="calendar"&&<CalModal t={t} close={()=>setModal(null)} habits={habits} goals={goals}/>}
      {modal==="journal"&&<JournalModal t={t} close={()=>setModal(null)} journals={journals} onSave={saveJ} plan={plan}/>}
      {modal==="ai"&&(plan.ai?<AIModal t={t} close={()=>setModal(null)} habits={habits} goals={goals} journals={journals}/>:<UpgradeModal t={t} close={()=>setModal(null)} reason="AI Coach is a Pro feature!"/>)}
      {modal==="theme"&&<ThemeModal t={t} tk={tk} setTk={chTheme} close={()=>setModal(null)}/>}
      {modal==="notif"&&<NotifModal t={t} close={()=>setModal(null)} enabled={notif} setEnabled={setNotif} plan={plan} reminders={reminders} setReminders={setReminders}/>}
      <div style={{display:"flex",minHeight:"100vh"}}>
        <div className="sb" style={{width:216,background:t.card,borderRight:`1px solid ${t.border}`,flexDirection:"column",padding:"22px 14px",position:"sticky",top:0,height:"100vh",flexShrink:0,overflowY:"auto"}}>
          <div style={{marginBottom:18}}><div style={{fontSize:19,fontWeight:800,color:t.accent}}>⚡ Momentum</div><div style={{fontSize:10,color:t.muted,marginTop:1}}>Habit & Goal Tracker</div></div>
          <div style={{display:"flex",alignItems:"center",gap:7,padding:"8px 9px",background:t.surface,borderRadius:10,marginBottom:14}}>
            <img src={user.photoURL} style={{width:26,height:26,borderRadius:"50%"}} alt=""/>
            <div style={{flex:1,overflow:"hidden"}}>
              <div style={{fontSize:11,fontWeight:700,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.displayName}</div>
              <div style={{fontSize:9,color:pk==="pro"?t.accent:pk==="early_access"?"#4ade80":t.muted}}>{pk==="pro"?"⚡ Pro":pk==="early_access"?"🎁 Early Access":"Free Plan"}</div>
            </div>
          </div>
          <nav style={{flex:1}}>
            {NAV.map(item=>(<button key={item.id} onClick={()=>setPage(item.id)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"9px 11px",borderRadius:10,border:"none",cursor:"pointer",background:page===item.id?t.accent+"22":"none",color:page===item.id?t.accent:t.muted,fontWeight:page===item.id?700:400,fontSize:13,marginBottom:3,textAlign:"left"}}><span>{item.icon}</span>{item.label}</button>))}
            <div style={{height:1,background:t.border,margin:"12px 0"}}/>
            {[["🍅","Pomodoro","pomodoro"],["📅","Calendar","calendar"],["📓","Journal","journal"],["🤖","AI Coach","ai"],["🔔","Notifications","notif"],["🎨","Theme","theme"]].map(([icon,label,id])=>(
              <button key={id} onClick={()=>setModal(id)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"7px 11px",borderRadius:10,border:"none",cursor:"pointer",background:"none",color:t.muted,fontSize:12,marginBottom:3,textAlign:"left"}}>
                <span>{icon}</span>{label}{id==="ai"&&!plan.ai&&<span style={{marginLeft:"auto",fontSize:9,color:t.accent,background:t.accent+"22",padding:"1px 5px",borderRadius:8}}>PRO</span>}
              </button>
            ))}
            <a href={REVIEW_FORM} target="_blank" style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"7px 11px",borderRadius:10,color:t.accent,fontSize:12,marginBottom:3,textDecoration:"none",fontWeight:600}}>
              <span>⭐</span>Leave a Review
            </a>
          </nav>
          {pk!=="pro"&&<button onClick={()=>showUp("Get full Pro access!")} style={{width:"100%",padding:"9px",borderRadius:10,border:"none",background:t.accent,color:"#000",cursor:"pointer",fontSize:12,fontWeight:700,marginBottom:7}}>⚡ Upgrade to Pro</button>}
          <button onClick={handleLogout} style={{width:"100%",padding:"7px",borderRadius:10,border:`1px solid ${t.border}`,background:"none",color:t.muted,cursor:"pointer",fontSize:11}}>Sign out</button>
          <div style={{display:"flex",gap:7,marginTop:9}}>{Object.entries(TH).map(([k,th])=>(<button key={k} onClick={()=>chTheme(k)} style={{width:22,height:22,borderRadius:"50%",border:tk===k?`2px solid ${t.accent}`:"2px solid transparent",background:th.accent,cursor:"pointer"}}/>))}</div>
        </div>
        <div className="ma" style={{flex:1,overflowY:"auto"}}>
          {page==="dashboard"&&<Dashboard/>}
          {page==="habits"&&<HabitsPage/>}
          {page==="goals"&&<GoalsPage/>}
          {page==="analytics"&&<AnalyticsPage/>}
        </div>
      </div>
      <div className="bn" style={{position:"fixed",bottom:0,left:0,right:0,background:t.card,borderTop:`1px solid ${t.border}`,zIndex:500}}>
        <div style={{display:"flex",justifyContent:"space-around",padding:"5px 8px 3px",borderBottom:`1px solid ${t.border}`}}>
          {[["🍅","pomodoro"],["📅","calendar"],["📓","journal"],["🤖","ai"],["🔔","notif"],["🎨","theme"]].map(([icon,id])=>(
            <button key={id} onClick={()=>setModal(id)} style={{background:"none",border:"none",cursor:"pointer",padding:"3px 5px",position:"relative"}}>
              <span style={{fontSize:17}}>{icon}</span>
              {id==="ai"&&!plan.ai&&<span style={{position:"absolute",top:0,right:0,width:5,height:5,borderRadius:"50%",background:t.accent}}/>}
            </button>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-around",padding:"5px 8px 7px"}}>
          {NAV.map(item=>(<button key={item.id} onClick={()=>setPage(item.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"3px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,flex:1}}>
            <span style={{fontSize:21}}>{item.icon}</span>
            <span style={{fontSize:10,fontWeight:page===item.id?700:400,color:page===item.id?t.accent:t.muted}}>{item.label}</span>
            {page===item.id&&<div style={{width:4,height:4,borderRadius:"50%",background:t.accent}}/>}
          </button>))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
