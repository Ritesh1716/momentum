        <PIco name="xCircle" color={t.muted} size={16}/>
      </button>

      {/* Mo — large, inside card, centred */}
      <div style={{textAlign:"center",marginBottom:8}}>
        <img src="/mo/mo-meditate.png" alt="Mo" style={{width:80,height:80,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/>
      </div>

      {/* DROP-FIRST hero */}
      <div style={{textAlign:"center",marginBottom:10}}>
        {isNewUser
          ? <div style={{fontSize:20,fontWeight:900,letterSpacing:-0.5,marginBottom:4,...gradText(t)}}>Mo can help you build real momentum.</div>
          : scoreDrop!==null
          ? <div style={{fontSize:20,fontWeight:900,letterSpacing:-0.5,marginBottom:4,...gradText(t)}}>You lost {scoreDrop} momentum points this week.</div>
          : scoreNum!==null
            ? <div style={{fontSize:20,fontWeight:900,letterSpacing:-0.5,marginBottom:4,...gradText(t)}}>You're losing momentum.</div>
            : <div style={{fontSize:20,fontWeight:900,letterSpacing:-0.5,marginBottom:4,...gradText(t)}}>Mo sees patterns you're missing.</div>
        }
        <div style={{fontSize:13,fontWeight:700,color:t.muted,marginBottom:scoreNum!==null?6:0}}>{isNewUser?"Let's find out what works for you.":"Mo already knows why."}</div>
        {scoreNum!==null&&<div style={{display:"inline-flex",alignItems:"center",gap:6,background:t.surface,border:"1px solid "+t.border,borderRadius:20,padding:"3px 14px",fontSize:11,color:t.muted,marginBottom:4}}>Momentum Score: <strong style={{color:t.text,marginLeft:3}}>{scoreNum}</strong><span style={{color:t.muted}}>/1000</span></div>}
        {reason&&<div style={{fontSize:11,color:t.accent,background:t.accent+"18",border:"1px solid "+t.accent+"33",borderRadius:8,padding:"4px 12px",display:"inline-block",marginTop:4}}>{reason}</div>}

      {/* 3 blurred teaser cards */}

function Pomodoro({t,close,plan,showUp,user,habits,logHabitTime}){
  // Item 21: restore an in-progress session (if any) so closing/reopening this modal doesn't reset the timer
  const restoredRef=useRef(undefined);
  if(restoredRef.current===undefined){
    restoredRef.current=(()=>{
      try{
        const raw=localStorage.getItem("hg_pomo_active");
        if(!raw)return null;
        const p=JSON.parse(raw);
        if(!p||typeof p.secs!=="number")return null;
        if(p.running){
          const elapsed=Math.floor((Date.now()-p.timestamp)/1000);
          const remaining=p.secs-elapsed;
          return{...p,secs:Math.max(0,remaining),justCompleted:remaining<=0};
        }
        return{...p,justCompleted:false};
      }catch(e){return null;}
    })();
  }
  const restored=restoredRef.current;
  // B10: previously, a session that was still running when the modal was closed would just
  // silently auto-resume counting down on reopen — no confirmation, easy to not even notice
  // time had passed. Now it pauses and asks explicitly instead.
  const[showResumePrompt,setShowResumePrompt]=useState(!!(restored&&restored.running&&!restored.justCompleted));
  const[tab,setTab]=useState("timer"); // timer | history | analytics
  const[mode,setMode]=useState(restored?restored.mode:"focus");
  const[run,setRun]=useState(false);
  const[secs,setSecs]=useState(restored?restored.secs:25*60);
  const[durations,setDurations]=useState({focus:25,short:5,long:15});
  const[editing,setEditing]=useState(null);
  const[editVal,setEditVal]=useState("");
  const[sessionLabel,setSessionLabel]=useState(restored&&restored.label?restored.label:"Focus");
  const[customLabel,setCustomLabel]=useState(()=>{
    const quick=["Focus","Study","Work","Exercise","Reading","Meditation","Practice","Research"];
    return restored&&restored.label&&!quick.includes(restored.label)?restored.label:"";
  });
  const[showLabelInput,setShowLabelInput]=useState(false);
  const[history,setHistory]=useState(()=>{try{return trim30DayHistory(JSON.parse(localStorage.getItem("hg_pomo_history")||"[]"));}catch{return[];}});
  const[focusLog,setFocusLog]=useState(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_focuslog")||"{}");}catch{return{};}}); // date-keyed aggregate, never pruned — decouples analytics from the 30-entry history cap
  // H5: habit linked to this Pomodoro session — restored from active session snapshot so it survives modal close/reopen
  const[linkedHabitId,setLinkedHabitId]=useState(restored&&restored.linkedHabitId?restored.linkedHabitId:null);
  const[moExtend,setMoExtend]=useState(null); // {justCompleted,habitName,goalCount,goalUnit,total,extra} — shown when a linked habit's time target is reached
  const[showCustomExtend,setShowCustomExtend]=useState(false);
  const[customExtendVal,setCustomExtendVal]=useState("");
  const timeHabits=(habits||[]).filter(h=>h.goalCount>0&&isTimeUnit(h.goalUnit));
  const[analyticsTab,setAnalyticsTab]=useState("week");
  const[showCloseWarning,setShowCloseWarning]=useState(false);
  const iv=useRef();
  const today=new Date().toLocaleDateString("en-CA");

  // Item 21: a session finished while the modal/app was closed — log it now and land on a fresh timer
  useEffect(()=>{
    if(restored&&restored.justCompleted){
      const label=restored.label||"Focus";
      const mins=Math.max(1,Math.round((restored.totalSecs||25*60)/60));
      const entry={id:Date.now(),label,mode:restored.mode,mins,time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),date:today};
      logSession(entry);
      if(restored.linkedHabitId&&restored.mode==="focus"&&logHabitTime){
        const res=logHabitTime(restored.linkedHabitId,mins);
        if(res&&res.justCompleted)setMoExtend(res);
      }
      setSecs(durations[restored.mode]*60);
      setTab("history");
      try{showToastGlobal("⚡ "+label+" session completed while you were away! 🎉");}catch(e){}
    }
  },[]);

  // Item 24: self-heal focusLog from local history immediately on mount (covers guests too, before any Firebase round-trip)
  useEffect(()=>{
    const healed=rebuildFocusLog(history,focusLog);
    if(JSON.stringify(healed)!==JSON.stringify(focusLog)){
      setFocusLog(healed);
      try{localStorage.setItem("hg_pomo_focuslog",JSON.stringify(healed));}catch(e){}
    }
  },[]);

  // Item 21: keep a lightweight snapshot of the active/paused session so it survives this modal unmounting — cleared automatically once fresh or finished
  useEffect(()=>{
    try{
      const totalSecs=durations[mode]*60;
      if(run||(secs>0&&secs<totalSecs)){
        localStorage.setItem("hg_pomo_active",JSON.stringify({mode,secs,totalSecs,running:run,label:customLabel||sessionLabel,linkedHabitId,timestamp:Date.now()}));
      }else{
        localStorage.removeItem("hg_pomo_active");
      }
    }catch(e){}
  },[secs,mode,run,sessionLabel,customLabel,linkedHabitId]);

  // #3: visibilitychange catch-up — a foreground setInterval gets throttled or fully suspended
  // the moment the screen locks or the tab backgrounds (the normal way people use a focus
  // timer: start it, put the phone down). The countdown can silently fall behind real time
  // while backgrounded. This corrects it the instant the app comes back to foreground, using
  // the same timestamped snapshot the mount-restore logic already relies on — so the person
  // finds out immediately on return instead of the display just being wrong until it happens
  // to self-correct. Doesn't help while the phone stays locked (see sw.js's SCHEDULE_POMODORO_NOTIF
  // for that half); this is specifically the "I came back and it should already be over" case.
  useEffect(()=>{
    function onVisible(){
      if(document.visibilityState!=="visible"||!run)return;
      try{
        const raw=localStorage.getItem("hg_pomo_active");
        if(!raw)return;
        const p=JSON.parse(raw);
        if(!p||typeof p.timestamp!=="number")return;
        const elapsed=Math.floor((Date.now()-p.timestamp)/1000);
        if(elapsed<=1)return;// nothing meaningful to correct
        const corrected=Math.max(0,p.secs-elapsed);
        setSecs(corrected);
        if(corrected===0)setRun(false);// triggers the normal completion flow via the secs===0 effect
      }catch(e){}
    }
    document.addEventListener("visibilitychange",onVisible);
    return()=>document.removeEventListener("visibilitychange",onVisible);
  },[run]);

  // Cross-device sync: MERGE local + Firebase — never overwrite local with stale cloud data (N3-E fix)
  useEffect(()=>{
    if(user?.uid&&window._fb){
      const fbR=window._fb;
      fbR.getDoc(fbR.doc(fbR.db,"users",user.uid)).then(snap=>{
        if(!snap.exists())return;
        const data=snap.data();
        // N3-E: MERGE strategy — union of local + Firebase by session ID, local wins on conflict
        // This prevents Firebase (which may have stale data) from wiping freshly-saved local sessions
        let mergedHistory=history;
        if(Array.isArray(data.pomoHistory)){
          const localIds=new Set(history.map(s=>s.id));
          const fbNew=data.pomoHistory.filter(s=>!localIds.has(s.id));
          mergedHistory=trim30DayHistory([...history,...fbNew]);
          setHistory(mergedHistory);
          try{localStorage.setItem("hg_pomo_history",JSON.stringify(mergedHistory));}catch(e){}
        }
        // Merge focusLog: local keys win (they're always more fresh)
        const fbFocusLog=data.focusLog&&typeof data.focusLog==="object"?data.focusLog:{};
        const mergedFocusLog={...fbFocusLog,...focusLog};// local wins per date
        const healedFocusLog=rebuildFocusLog(mergedHistory,mergedFocusLog);
        setFocusLog(healedFocusLog);
        try{localStorage.setItem("hg_pomo_focuslog",JSON.stringify(healedFocusLog));}catch(e){}
        // Push merged data back to Firebase to keep in sync
        fbR.setDoc(fbR.doc(fbR.db,"users",user.uid),{pomoHistory:mergedHistory,focusLog:healedFocusLog},{merge:true}).catch(e=>console.error("Pomodoro merge sync err:",e));
      }).catch(e=>console.error("Pomodoro sync load err:",e));
    }
  },[]);

  // Shared session-logging — updates capped history (recent list) + never-pruned focusLog aggregate, syncs both to Firebase
  function logSession(entry){
    const updatedHistory=trim30DayHistory([entry,...history]);
    setHistory(updatedHistory);
    try{localStorage.setItem("hg_pomo_history",JSON.stringify(updatedHistory));}catch(e){}

    const d=entry.date,lbl=entry.label||"Focus";
    const prev=focusLog[d]||{totalMin:0,sessions:0,byCategory:{}};
    const updatedFocusLog={...focusLog,[d]:{
      totalMin:(prev.totalMin||0)+entry.mins,
      sessions:(prev.sessions||0)+1,
      byCategory:{...(prev.byCategory||{}),[lbl]:((prev.byCategory&&prev.byCategory[lbl])||0)+entry.mins}
    }};
    setFocusLog(updatedFocusLog);
    try{localStorage.setItem("hg_pomo_focuslog",JSON.stringify(updatedFocusLog));}catch(e){}

    if(user?.uid&&window._fb){
      const fbR=window._fb;
      fbR.setDoc(fbR.doc(fbR.db,"users",user.uid),{pomoHistory:updatedHistory,focusLog:updatedFocusLog},{merge:true}).catch(e=>console.error("Pomodoro sync save err:",e));
    }
  }

  const MODE_ICONS={
    focus:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>,
    short:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>,
    long:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22V12M12 12C12 12 8 8 8 5a4 4 0 0 1 8 0c0 3-4 7-4 7z"/><path d="M12 22c-3 0-6-2-6-5h12c0 3-3 5-6 5z"/></svg>,
  };
  const MODES=[["focus","","Focus"],["short","","Short Break"],["long","","Long Break"]];
  const QUICK_LABELS=["Focus","Study","Work","Exercise","Reading","Meditation","Practice","Research"];
  const CHIPS=[15,30,45,60];

  const completedRef=useRef(false);
  const pomoSessionIdRef=useRef(null);

  // P3-A: keep a SW-scheduled backup notification in sync with the running timer.
  // This is a backup path only — see sw.js comment for the reliability caveat on long/backgrounded sessions.
  useEffect(()=>{
    const sw=navigator.serviceWorker;
    if(!sw||!sw.controller)return;
    if(run&&secs>0){
      if(!pomoSessionIdRef.current)pomoSessionIdRef.current="pomo_"+Date.now();
      const label=customLabel||sessionLabel;
      sw.controller.postMessage({type:"SCHEDULE_POMODORO_NOTIF",id:pomoSessionIdRef.current,fireAt:Date.now()+secs*1000,label,mins:durations[mode]});
    } else if(pomoSessionIdRef.current){
      sw.controller.postMessage({type:"CANCEL_POMODORO_NOTIF",id:pomoSessionIdRef.current});
      pomoSessionIdRef.current=null;
    }
    // Only re-schedule when run toggles or the session identity changes — not on every second tick
    // eslint-disable-next-line react-hooks/exhaustive-deps
  },[run]);

  useEffect(()=>{
    if(run){
      completedRef.current=false;
      iv.current=setInterval(()=>{
        setSecs(s=>{
          if(s<=1){
            clearInterval(iv.current);
            completedRef.current=true;
            return 0;
          }
          return s-1;
        });
      },1000);
    } else {
      clearInterval(iv.current);
      // Handle completion after run stops
      if(completedRef.current){
        completedRef.current=false;
        const label=customLabel||sessionLabel;
        const mins=durations[mode];
        const entry={id:Date.now(),label,mode,mins,time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),date:today};
        logSession(entry);
        if(linkedHabitId&&mode==="focus"&&logHabitTime){
          const res=logHabitTime(linkedHabitId,mins);
          if(res&&res.justCompleted)setMoExtend(res);
        }
        setTab("history");
        try{if(typeof Notification!=="undefined"&&Notification.permission==="granted")new Notification("⚡ Session Complete!",{body:label+" — "+mins+"m done! 🎉",icon:"/icon-192.png"});}catch(e){
          try{if(navigator.serviceWorker&&navigator.serviceWorker.controller){navigator.serviceWorker.ready.then(reg=>reg.showNotification("⚡ Session Complete!",{body:label+" — "+mins+"m done! 🎉",icon:"/icon-192.png"}));}}catch(e2){}
        }
        try{if(navigator.serviceWorker&&navigator.serviceWorker.controller&&pomoSessionIdRef.current){navigator.serviceWorker.controller.postMessage({type:"CANCEL_POMODORO_NOTIF",id:pomoSessionIdRef.current});pomoSessionIdRef.current=null;}}catch(e){}
      }
    }
    return()=>clearInterval(iv.current);
  },[run]);

  // When timer hits 0, stop running (triggers completion in run useEffect)
  useEffect(()=>{
    if(secs===0&&run){setRun(false);}
  },[secs]);

  function switchMode(m){setMode(m);setSecs(durations[m]*60);setRun(false);}
  function setChip(mins){const nd={...durations,[mode]:mins};setDurations(nd);setSecs(mins*60);setRun(false);}
  function saveAndReset(){
    const totalS=durations[mode]*60;
    const elapsedS=totalS-secs;
    if(elapsedS<60){setSecs(totalS);setRun(false);return;} // under 1 min — discard, don't clutter history
    const elapsedMins=Math.round(elapsedS/60);
    const label=customLabel||sessionLabel;
    const entry={id:Date.now(),label,mode,mins:elapsedMins,time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),date:today,partial:true};
    logSession(entry);
    if(linkedHabitId&&mode==="focus"&&logHabitTime){
      const res=logHabitTime(linkedHabitId,elapsedMins);
      if(res&&res.justCompleted)setMoExtend(res);
    }
    setSecs(totalS);setRun(false);
    showToastGlobal("💾 Saved "+elapsedMins+"m session!");
  }
  // B10: the two choices offered by the Resume-or-end prompt.
  function resumeRestoredSession(){setRun(true);setShowResumePrompt(false);}
  function endRestoredSession(){saveAndReset();setShowResumePrompt(false);}
  function startEdit(m){setEditing(m);setEditVal(String(durations[m]));}
  function saveEdit(m){
    const v=parseInt(editVal);
    if(v>0&&v<=240){const nd={...durations,[m]:v};setDurations(nd);if(mode===m){setSecs(v*60);setRun(false);}}
    setEditing(null);
  }

  const totalSecs=durations[mode]*60;
  const pct=((totalSecs-secs)/totalSecs)*100;
  const r2=80,ci=2*Math.PI*r2;
  // Item 25: show elapsed time counting up (00:00 → set limit) once started; show the full set duration while idle/never-started
  const elapsedSecs=secs===totalSecs?totalSecs:totalSecs-secs;
  const mm=String(Math.floor(elapsedSecs/60)).padStart(2,"0"),ss2=String(elapsedSecs%60).padStart(2,"0");
  const todayLog=focusLog[today]||{totalMin:0,sessions:0,byCategory:{}};
  const todaySessCount=todayLog.sessions;
  const todayMins=todayLog.totalMin;

  // ── ANALYTICS HELPERS — read from focusLog (never pruned, decoupled from 30-entry history cap) ──
  function getWeekData(){
    const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toLocaleDateString("en-CA"));}
    return days.map(d=>{
      const mins=(focusLog[d]&&focusLog[d].totalMin)||0;
      return{date:d,mins,label:new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"})};
    });
  }

  function getMonthData(){
    const now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
    const days=new Date(yr,mo+1,0).getDate();
    return Array.from({length:days},(_,i)=>{
      const d=yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(i+1).padStart(2,"0");
      const mins=(focusLog[d]&&focusLog[d].totalMin)||0;
      return{day:i+1,mins};
    });
  }

  function getYearData(){
    const yr=new Date().getFullYear();
    const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return MONTHS.map((m,mi)=>{
      const prefix=yr+"-"+String(mi+1).padStart(2,"0");
      const mins=Object.entries(focusLog).filter(([d])=>d.startsWith(prefix)).reduce((s,[,v])=>s+(v.totalMin||0),0);
      return{month:m,mins,hrs:Math.round(mins/60*10)/10};
    });
  }

  // dateFilter: null = all-time, or a function(dateStr)=>bool
  function getLabelBreakdown(dateFilter){
    const map={};
    Object.entries(focusLog).forEach(([d,v])=>{
      if(dateFilter&&!dateFilter(d))return;
      Object.entries(v.byCategory||{}).forEach(([label,mins])=>{map[label]=(map[label]||0)+mins;});
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,6);
  }

  function getSessionCount(dateFilter){
    return Object.entries(focusLog).filter(([d])=>!dateFilter||dateFilter(d)).reduce((s,[,v])=>s+(v.sessions||0),0);
  }

    </div>);

                  <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{mins}m · {Math.round(mins/60*10)/10}h</span>
                </div>
                <div style={{height:6,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:(mins/weekTotal)*100+"%",background:"linear-gradient(90deg,"+t.accent+","+t.accent2+")",borderRadius:4,boxShadow:"0 0 6px "+t.accent+"66"}}/></div>
              </div>
            ))}
          </div>}
        </div>}
      </div>}

      {/* Monthly view — Pro */}
      {analyticsTab==="month"&&plan.heat&&(()=>{
        const monthData=getMonthData();
        const monthTotal=monthData.reduce((s,d)=>s+d.mins,0);
        const now=new Date();
        const monthDateFilter=d=>{const dt=new Date(d+"T12:00:00");return dt.getFullYear()===now.getFullYear()&&dt.getMonth()===now.getMonth();};
        const monthSessionCount=getSessionCount(monthDateFilter);
        const monthLabels=getLabelBreakdown(monthDateFilter);
        const maxM=Math.max(...monthData.map(d=>d.mins),1);
        return(<div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {[[monthTotal+"m","This Month",t.accent],[monthSessionCount+"","Sessions",t.success],[Math.round(monthTotal/now.getDate())+"m","Daily Avg",t.info]].map(([v,l,c])=>(
              <div key={l} style={{flex:1,background:premiumCard(t,c),border:"1px solid "+t.border,borderRadius:12,padding:"10px 6px",textAlign:"center",boxShadow:premiumShadow(t,c)}}>
                <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:t.muted,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,marginBottom:14,boxShadow:premiumShadow(t)}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:12}}>Daily Focus — {now.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:1.5,height:60,overflowX:"auto"}}>
              {monthData.map((d,i)=>{
                const h2=d.mins>0?Math.max(6,(d.mins/maxM)*56):2;
                const isT=d.day===now.getDate();
                return(<div key={i} style={{minWidth:8,flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{width:"100%",height:h2,background:isT?"linear-gradient(180deg,"+t.accent+","+t.accent2+")":d.mins>0?t.success+"99":t.border,borderRadius:"2px 2px 0 0",boxShadow:d.mins>0?"0 0 5px "+(isT?t.accent:t.success)+"77":"none"}}/>
                  {(d.day===1||d.day%5===0)&&<span style={{fontSize:7,color:t.muted}}>{d.day}</span>}
                </div>);
              })}
            </div>
          </div>
          {monthLabels.length>0&&<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,boxShadow:premiumShadow(t)}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:10}}>By Activity — This Month</div>
            {monthLabels.map(([label,mins])=>(
              <div key={label} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:t.text,fontWeight:600}}>{label}</span>
                  <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{mins}m · {Math.round(mins/60*10)/10}h</span>
                </div>
                <div style={{height:6,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:(mins/monthTotal)*100+"%",background:"linear-gradient(90deg,"+t.accent+","+t.accent2+")",borderRadius:4,boxShadow:"0 0 6px "+t.accent+"66"}}/></div>
              </div>
            ))}
          </div>}
        </div>);
      })()}

      {/* Yearly view — Plus */}
      {analyticsTab==="year"&&(plan.yearReview?(()=>{
        const yearData=getYearData();
        const yearTotal=yearData.reduce((s,d)=>s+d.mins,0);
        const allLabels=getLabelBreakdown(null);
        const allSessionCount=getSessionCount(null);
        const maxY=Math.max(...yearData.map(d=>d.mins),1);
        const now=new Date();
        return(<div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {[[Math.round(yearTotal/60)+"h","Total Hours",t.accent],[allSessionCount+"","All Sessions",t.success],[Math.round(yearTotal/365)+"m","Daily Avg",t.info]].map(([v,l,c])=>(
              <div key={l} style={{flex:1,background:premiumCard(t,c),border:"1px solid "+t.border,borderRadius:12,padding:"10px 6px",textAlign:"center",boxShadow:premiumShadow(t,c)}}>
                <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:t.muted,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,marginBottom:14,boxShadow:premiumShadow(t)}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:12}}>Monthly Focus — {now.getFullYear()}</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:3,height:80}}>
              {yearData.map((d,i)=>{
                const h2=d.mins>0?Math.max(6,(d.mins/maxY)*72):3;
                const isPast=i<now.getMonth();
                const isCurrent=i===now.getMonth();
                const col=isCurrent?t.accent:d.mins>=120?t.success:d.mins>0?t.success+"66":t.border;
                return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  {d.hrs>0&&<span style={{fontSize:7,color:isCurrent?t.accent:t.muted,fontWeight:isCurrent?700:400}}>{d.hrs}h</span>}
                  <div style={{width:"100%",height:h2,background:isCurrent?"linear-gradient(180deg,"+t.accent+","+t.accent2+")":col,borderRadius:"3px 3px 0 0",opacity:!isPast&&!isCurrent?0.3:1,transition:"height 0.4s",boxShadow:d.mins>0?"0 0 6px "+col+"77":"none"}}/>
                  <span style={{fontSize:8,color:isCurrent?t.accent:t.muted,fontWeight:isCurrent?700:400}}>{d.month}</span>
                </div>);
              })}
            </div>
          </div>
          {allLabels.length>0&&<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,boxShadow:premiumShadow(t)}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:10}}>All-Time by Activity</div>
            {allLabels.map(([label,mins])=>(
              <div key={label} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:t.text,fontWeight:600}}>{label}</span>
                  <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{Math.round(mins/60*10)/10}h total</span>
                </div>
                <div style={{height:6,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:(mins/yearTotal)*100+"%",background:"linear-gradient(90deg,#a78bfa,#c084fc)",borderRadius:4,boxShadow:"0 0 6px #a78bfa66"}}/></div>
              </div>
            ))}
          </div>}
        </div>);
      })():<div style={{textAlign:"center",padding:32}}>
        <div style={{marginBottom:10}}>{IC.chartUp(t.muted,32)}</div>
        <div style={{fontSize:13,fontWeight:700,color:t.text,marginBottom:8}}>Yearly Pomodoro Analytics</div>
        <div style={{fontSize:11,color:t.muted,marginBottom:16}}>Full year focus trends — Plus feature</div>
        <button onClick={()=>showUp&&showUp("Yearly Pomodoro analytics is a Plus feature.")} style={{padding:"10px 24px",borderRadius:12,border:"none",background:"#a78bfa",color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>Get Coaching Plan</button>
      </div>)}
    </div>);
  }

  return(
    <div style={{position:"fixed",inset:0,background:t.bg,zIndex:1000,display:"flex",flexDirection:"column",fontFamily:"'Sora',system-ui,sans-serif"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px 0",flexShrink:0}}>
        <div style={{fontSize:18,fontWeight:800,display:"flex",alignItems:"center",gap:6}}>{IC.timer(t.accent,18)}<span style={gradText(t)}>Pomodoro</span></div>
        <button onClick={()=>{if(run){setShowCloseWarning(true);}else{close();}}} style={{background:t.surface,border:"1px solid "+t.border,borderRadius:"50%",width:32,height:32,cursor:"pointer",color:t.muted,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>

      {/* Tab switcher */}
      <div style={{display:"flex",gap:0,margin:"14px 20px 0",background:t.surface,borderRadius:12,padding:3,flexShrink:0}}>
{[
          ["timer",<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg> Timer</>],
          ["history",<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3h6l2 3h10v13H3z"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg> History</>],
          ["analytics",<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Analytics</>],
        ].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 4px",borderRadius:9,border:"none",cursor:"pointer",background:tab===k?t.accent:"none",color:tab===k?"#000":t.muted,fontWeight:tab===k?700:500,fontSize:11,boxShadow:tab===k?"0 0 8px "+t.accent+"66":"none",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>{l}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px 32px"}}>
        {tab==="timer"&&<TimerTab/>}
        {tab==="history"&&<HistoryTab/>}
        {tab==="analytics"&&<AnalyticsTab/>}
      </div>

      {/* Timer running close warning */}
      {showCloseWarning&&<div style={{position:"fixed",inset:0,background:"#000c",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}} onClick={()=>setShowCloseWarning(false)}>
        <div style={{background:t.card,border:"1px solid "+t.border,borderRadius:16,padding:20,width:"100%",maxWidth:340}} onClick={e=>e.stopPropagation()}>
          <div style={{textAlign:"center",marginBottom:8}}>{IC.timer(t.accent,32)}</div>
          <div style={{fontSize:14,fontWeight:800,color:t.text,textAlign:"center",marginBottom:6}}>Timer is running!</div>
          <div style={{fontSize:12,color:t.muted,textAlign:"center",marginBottom:18,lineHeight:1.5}}>Stop and save your progress, or keep it running and close anyway?</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <button onClick={()=>{setShowCloseWarning(false);saveAndReset();close();}} style={{width:"100%",padding:"11px",borderRadius:12,border:"1px solid "+t.success+"66",background:t.success+"15",color:t.success,fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:4}}>{IC.save("#fff",13)} Stop & Save Progress</button>
            <button onClick={()=>{setShowCloseWarning(false);close();}} style={{width:"100%",padding:"11px",borderRadius:12,border:"1px solid "+t.accent+"66",background:t.accent+"15",color:t.accent,fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>▶ Keep Running</button>
            <button onClick={()=>setShowCloseWarning(false)} style={{width:"100%",padding:"9px",borderRadius:12,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button>
          </div>
        </div>
      </div>}

      {/* B10: a session was still running when this was last closed — ask instead of silently
          auto-resuming or auto-discarding. */}
      {showResumePrompt&&<div style={{position:"fixed",inset:0,background:"#000c",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
        <div style={{background:t.card,border:"1px solid "+t.border,borderRadius:16,padding:20,width:"100%",maxWidth:340}}>
          <div style={{textAlign:"center",marginBottom:8}}><img src="/mo/mo-clock.png" alt="" style={{width:56,height:56,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/></div>
          <div style={{fontSize:14,fontWeight:800,color:t.text,textAlign:"center",marginBottom:6}}>Still on it?</div>
          <div style={{fontSize:12,color:t.muted,textAlign:"center",marginBottom:18,lineHeight:1.5}}>Your {customLabel||sessionLabel} session was still running with {Math.ceil(secs/60)}m left. Keep going, or end it here and save what you've done?</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <button onClick={resumeRestoredSession} style={{width:"100%",padding:"11px",borderRadius:12,border:"1px solid "+t.accent+"66",background:t.accent+"15",color:t.accent,fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>▶ Resume — {Math.ceil(secs/60)}m left</button>
            <button onClick={endRestoredSession} style={{width:"100%",padding:"11px",borderRadius:12,border:"1px solid "+t.success+"66",background:t.success+"15",color:t.success,fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:4}}>{IC.save("#fff",13)} End & Save Progress</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

function CalModal({t,close,habits,goals,plan,showUp}){
  const now=new Date();
  const[yr,setYr]=useState(now.getFullYear());
  const[mo,setMo]=useState(now.getMonth());
  const[selDay,setSelDay]=useState(null);
  const[dayNote,setDayNote]=useState("");
  const[saved,setSaved]=useState(false);
  // P4: Pro-only single-habit filter — recolors the grid to that habit's own completion
  // pattern instead of the aggregate intensity across all habits.
  const[filterHabitId,setFilterHabitId]=useState(null);
  const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const days=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay(),today=td();
  const ds=d=>yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

  function openDay(dateStr){
    setSelDay(dateStr);setSaved(false);
    try{const n=JSON.parse(localStorage.getItem("hg_day_notes")||"{}");setDayNote(n[dateStr]||"");}
    catch{setDayNote("");}
  }
  function saveNote(){
    try{const n=JSON.parse(localStorage.getItem("hg_day_notes")||"{}");n[selDay]=dayNote;localStorage.setItem("hg_day_notes",JSON.stringify(n));setSaved(true);setTimeout(()=>setSaved(false),1500);}
    catch{}
  }

  if(selDay){
    const isFuture=selDay>today;
    const isPast=selDay<=today;
    const doneHabits=habits.filter(h=>isFullDoneOn(h,selDay,h.log&&h.log[selDay]));
    const missedHabits=habits.filter(h=>!isFullDoneOn(h,selDay,h.log&&h.log[selDay]));
    const doneActions=goals.flatMap(g=>g.actions.filter(a=>a.doneAt===selDay).map(a=>({...a,goalTitle:g.title})));
    const deadlineGoals=goals.filter(g=>g.deadline===selDay);
    const actionsDue=goals.flatMap(g=>g.actions.filter(a=>a.dueDate===selDay&&!a.done).map(a=>({...a,goalTitle:g.title,goalPriority:g.priority})));
    const actionsDueBlock=actionsDue.length>0&&(<div style={{marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:700,color:"#f59e0b",textTransform:"uppercase",letterSpacing:1,marginBottom:7,display:"flex",alignItems:"center",gap:4}}>{IC.plan(t.muted,11)} Actions Due ({actionsDue.length})</div>
      {actionsDue.map(a=>{
        const pCol=a.goalPriority==="High"?t.danger:a.goalPriority==="Medium"?t.accent:t.success;
        return(<div key={a.id} style={{padding:"7px 10px",background:"linear-gradient(90deg,rgba(245,158,11,0.15),"+t.card+")",border:"1px solid rgba(245,158,11,0.2)",borderLeft:"3px solid #f59e0b",borderRadius:8,marginBottom:5,boxShadow:"0 4px 14px rgba(245,158,11,0.18)"}}>
          <div style={{fontSize:12,fontWeight:600,color:t.text,marginBottom:2}}>{a.action}</div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:9,color:t.muted}}>{a.goalTitle}</span>
            <span style={{fontSize:9,padding:"1px 6px",borderRadius:6,background:pCol+"22",color:pCol,fontWeight:700}}>{a.goalPriority}</span>
            {a.time&&<span style={{fontSize:9,color:"#f59e0b",fontWeight:700}}>⏰ {a.time}</span>}
          </div>
        </div>);
      })}
    </div>);
    const displayDate=new Date(selDay+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

    return(<Modal t={t} close={close} title={<span style={{display:"inline-flex",alignItems:"center",gap:6}}>{IC.calendar(t.accent,16)} Calendar</span>}>
      <button onClick={()=>setSelDay(null)} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:13,marginBottom:14,padding:0}}>← Back to {MN[mo]}</button>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:16,fontWeight:800,color:t.text,marginBottom:3}}>{displayDate}</div>
        <div style={{fontSize:11,fontWeight:600,color:selDay===today?t.accent:isFuture?t.info:t.muted}}>{selDay===today?"Today — check in below":isFuture?"Future — Day Planner":"Past day"}</div>
      </div>

      {/* PAST / TODAY: Day Detail */}
      {isPast&&<div>
        {doneHabits.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.success,textTransform:"uppercase",letterSpacing:1,marginBottom:7,display:"flex",alignItems:"center",gap:4}}>{IC.checkCircle(t.success,11)} Habits Done ({doneHabits.length})</div>
          {doneHabits.map(h=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"linear-gradient(90deg,"+t.success+"18,"+t.card+")",borderLeft:"3px solid "+t.success,borderRadius:8,marginBottom:5,fontSize:13,boxShadow:premiumShadow(t,t.success)}}>
              <span>{h.icon}</span><span style={{fontWeight:600}}>{h.name}</span>
            </div>
          ))}
        </div>}
        {missedHabits.length>0&&habits.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.danger,textTransform:"uppercase",letterSpacing:1,marginBottom:7,display:"flex",alignItems:"center",gap:4}}>{IC.xCircle(t.danger,11)} Missed ({missedHabits.length})</div>
          {missedHabits.map(h=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:t.danger+"12",borderRadius:8,marginBottom:5,fontSize:13,opacity:0.7}}>
              <span>{h.icon}</span><span>{h.name}</span>
            </div>
          ))}
        </div>}
        {doneActions.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.info,textTransform:"uppercase",letterSpacing:1,marginBottom:7,display:"flex",alignItems:"center",gap:4}}>{IC.target(t.info,11)} Actions Completed ({doneActions.length})</div>
          {doneActions.map(a=>(
            <div key={a.id} style={{padding:"7px 10px",background:"linear-gradient(90deg,"+t.info+"18,"+t.card+")",borderLeft:"3px solid "+t.info,borderRadius:8,marginBottom:5,boxShadow:premiumShadow(t,t.info)}}>
              <div style={{fontSize:12,fontWeight:600,color:t.text}}>{a.action}</div>
              <div style={{fontSize:10,color:t.muted}}>{a.goalTitle}</div>
            </div>
          ))}
        </div>}
        {/* Fix 17: Actions Due on this day */}
        {actionsDueBlock}
        {deadlineGoals.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.accent,textTransform:"uppercase",letterSpacing:1,marginBottom:7,display:"flex",alignItems:"center",gap:4}}>{IC.target(t.accent,11)} Goal Deadlines</div>
          {deadlineGoals.map(g=><div key={g.id} style={{fontSize:12,color:t.text,padding:"5px 10px",background:"linear-gradient(90deg,"+t.accent+"18,"+t.card+")",borderLeft:"3px solid "+t.accent,borderRadius:8,marginBottom:5,fontWeight:600,boxShadow:premiumShadow(t,t.accent)}}>{g.title}</div>)}
        </div>}
        {habits.length===0&&<div style={{textAlign:"center",color:t.muted,padding:20,fontSize:13}}>No habit data for this day yet.</div>}
        {/* Day note */}
        <div style={{marginTop:4}}>
          <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7,display:"flex",alignItems:"center",gap:4}}>{IC.note(t.muted,11)} Day Note</div>
          <textarea value={dayNote} onChange={e=>setDayNote(e.target.value)} placeholder="Add a personal note for this day..." maxLength={500} style={{width:"100%",height:72,padding:"9px 11px",borderRadius:10,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:13,resize:"none",lineHeight:1.5}}/>
          <button onClick={saveNote} style={{marginTop:7,padding:"8px 18px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>{saved?"Saved ✓":"Save Note"}</button>
        </div>
      </div>}

      {/* FUTURE: Day Planner */}
      {isFuture&&<div>
        {actionsDueBlock}
        {deadlineGoals.length>0&&<div style={{background:premiumCard(t,t.accent),border:"1px solid "+t.accent+"44",borderRadius:14,padding:"10px 12px",marginBottom:14,boxShadow:premiumShadow(t,t.accent)}}>
          <div style={{fontSize:11,fontWeight:700,color:t.accent,textTransform:"uppercase",letterSpacing:1,marginBottom:7,display:"flex",alignItems:"center",gap:4}}>{IC.target(t.accent,11)} Goal Deadlines on this day</div>
          {deadlineGoals.map(g=>{
            const gActions2=g.actions||[];
            const done=gActions2.filter(a=>a.done).length;
            const pct=gActions2.length>0?Math.round((done/gActions2.length)*100):0;
            const pCol=g.priority==="High"?t.danger:g.priority==="Medium"?t.accent:t.success;
            return(<div key={g.id} style={{padding:"8px 10px",background:t.card,borderRadius:9,marginBottom:6,borderLeft:"3px solid "+pCol,boxShadow:premiumShadow(t,pCol)}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <div style={{fontSize:13,fontWeight:700,color:t.text}}>{g.title}</div>
                <span style={{fontSize:12,fontWeight:700,color:pct===100?t.success:t.accent}}>{pct}%</span>
              </div>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>

    ))}
    {/* P4: Pro-only monthly insight — best weekday this month */}
    {plan.heat&&habits.length>0&&(()=>{
      const dayTotals=[0,0,0,0,0,0,0],dayPossible=[0,0,0,0,0,0,0];
      for(let d=1;d<=days;d++){
        const ds3=ds(d);
        if(ds3>today)continue;
        const wd=new Date(ds3+"T12:00:00").getDay();
        const doneCount=filterHabitId?(habits.find(h=>h.id===filterHabitId)&&isFullDoneOn(habits.find(h=>h.id===filterHabitId),ds3,habits.find(h=>h.id===filterHabitId).log&&habits.find(h=>h.id===filterHabitId).log[ds3])?1:0):habits.filter(h=>isFullDoneOn(h,ds3,h.log&&h.log[ds3])).length;
        const possibleCount=filterHabitId?1:habits.length;
        dayTotals[wd]+=doneCount;dayPossible[wd]+=possibleCount;
      }
      const rates=dayTotals.map((t2,i)=>dayPossible[i]>0?t2/dayPossible[i]:-1);
      const bestIdx=rates.indexOf(Math.max(...rates));
      if(bestIdx===-1||rates[bestIdx]<=0)return null;
      const WD=["Sundays","Mondays","Tuesdays","Wednesdays","Thursdays","Fridays","Saturdays"];
      return(<div style={{fontSize:11,color:t.accent,fontWeight:600,marginBottom:10,textAlign:"center",background:t.accent+"10",borderRadius:8,padding:"6px 8px"}}>{IC.chartUp?IC.chartUp(t.accent,11):"📈"} Your best day this month: {WD[bestIdx]} ({Math.round(rates[bestIdx]*100)}% completion)</div>);

        const d=i+1,ds2=ds(d);
        const filterHabit=filterHabitId?habits.find(h=>h.id===filterHabitId):null;
        const hd=filterHabit?(isFullDoneOn(filterHabit,ds2,filterHabit.log&&filterHabit.log[ds2])?1:0):habits.filter(h=>isFullDoneOn(h,ds2,h.log&&h.log[ds2])).length;
        const habitDivisor=filterHabit?1:habits.length;
        const deadlineGoalsOnDay=goals.filter(g=>g.deadline===ds2);
        const hasDeadline=deadlineGoalsOnDay.length>0;
        const isT=ds2===today,isFut=ds2>today;
        // Check if day has a note
        const hasNote=(()=>{try{const n=JSON.parse(localStorage.getItem("hg_day_notes")||"{}");return !!(n[ds2]&&n[ds2].trim());}catch{return false;}})();
        const intensity=habitDivisor>0?hd/habitDivisor:0;

        const textCol=isT?t.accent:isFut?t.info:intensity>=0.75?"#000":t.text;

        const cellBg=isT?"linear-gradient(135deg,"+t.accent+"40,"+t.accent+"15)":isFut?(hasDeadline?premiumCard(t,t.accent):t.surface):intensityBg;
        return(<div key={d} onClick={()=>openDay(ds2)} style={{borderRadius:6,padding:"3px 1px",textAlign:"center",background:cellBg,border:isT?"2px solid "+t.accent:isFut?"1px solid "+t.info+"33":intensity>=0.5?"1px solid rgba(74,222,128,0.4)":"1px solid "+t.border,minHeight:36,cursor:"pointer",transition:"all 0.2s",position:"relative",boxShadow:glowShadow}}>
          <div style={{fontSize:10,fontWeight:isT?800:400,color:textCol,lineHeight:1.4}}>{d}</div>
          {hd>0&&!isT&&<div style={{fontSize:7,color:intensity>=0.75?"#000":t.success,fontWeight:700}}>{hd}✓</div>}
          {isT&&hd>0&&<div style={{fontSize:7,color:t.accent,fontWeight:700}}>{hd}✓</div>}
          {/* Deadline indicator */}
          {hasDeadline&&<div style={{lineHeight:1}}>{IC.target(t.danger,8)}</div>}

          {isFut&&hasDeadline&&<div style={{fontSize:6,color:t.accent,lineHeight:1.1,overflow:"hidden",maxHeight:12,textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 2px"}}>{deadlineGoalsOnDay.map(g=>g.title).join(", ")}</div>}
        </div>);
      })}
    </div>
    <div style={{display:"flex",gap:6,marginTop:14,fontSize:10,color:t.muted,flexWrap:"wrap",alignItems:"center"}}>

  </Modal>);
}

// Fix 16: Journal mini calendar — proper component (not IIFE, hooks must be at top level)
function JournalMiniCal({t,journals,loadDate,parseEntry,fmt,MOODS,MCOLS,today2}){
  const[calMonth,setCalMonth]=useState(()=>{const n=new Date();return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0");});
  const[popupEntry,setPopupEntry]=useState(null);
  const[cmYr,cmMo]=calMonth.split("-").map(Number);
  const daysInMonth=new Date(cmYr,cmMo,0).getDate();
  const firstDay=new Date(cmYr,cmMo-1,1).getDay();
  const prevMonth=()=>{const d=new Date(cmYr,cmMo-2,1);setCalMonth(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));};
  const nextMonth=()=>{const d=new Date(cmYr,cmMo,1);const now=new Date();if(d<=new Date(now.getFullYear(),now.getMonth(),1))setCalMonth(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));};
  const mnName=new Date(cmYr,cmMo-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  return(<>
    <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:12,marginBottom:12,boxShadow:premiumShadow(t)}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <button onClick={prevMonth} style={{background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:16,padding:"0 6px"}}>‹</button>
        <div style={{fontSize:12,fontWeight:700,...gradText(t)}}>{mnName}</div>
        <button onClick={nextMonth} style={{background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:16,padding:"0 6px"}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,color:t.muted,fontWeight:700,padding:"2px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {Array.from({length:firstDay}).map((_,i)=><div key={"e"+i}/>)}
        {Array.from({length:daysInMonth}).map((_,i)=>{
          const day=i+1;
          const dateStr=cmYr+"-"+String(cmMo).padStart(2,"0")+"-"+String(day).padStart(2,"0");
          const hasEntry=!!journals[dateStr];
          const isToday3=dateStr===today2;
          const isFuture=dateStr>today2;
          const eMood=hasEntry?parseEntry(journals[dateStr]).mood:null;
          const mCol=eMood!=null?MCOLS[eMood]:t.accent;
          return(<div key={day} onClick={()=>{if(hasEntry){const raw=journals[dateStr];const e=parseEntry(raw);setPopupEntry({date:dateStr,entry:e});}else if(!isFuture){loadDate(dateStr);}}} style={{aspectRatio:"1",borderRadius:6,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:(!isFuture||hasEntry)?"pointer":"default",background:hasEntry?mCol+"22":"transparent",border:"1px solid "+(isToday3?t.accent:hasEntry?mCol+"55":"transparent"),opacity:isFuture?0.3:1,boxShadow:hasEntry?"0 0 6px "+mCol+"55":isToday3?"0 0 6px "+t.accent+"55":"none"}}>
            <span style={{fontSize:9,color:hasEntry?mCol:isToday3?t.accent:t.muted,fontWeight:hasEntry||isToday3?700:400}}>{day}</span>
            {hasEntry&&<div style={{width:4,height:4,borderRadius:"50%",background:mCol,marginTop:1,boxShadow:"0 0 4px "+mCol+"aa"}}/>}
          </div>);
        })}
      </div>
    </div>
    {popupEntry&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 20px"}} onClick={()=>setPopupEntry(null)}>
      <div style={{background:popupEntry.entry.mood!=null?premiumCard(t,MCOLS[popupEntry.entry.mood]):premiumCard(t),border:"1px solid "+t.border,borderLeft:popupEntry.entry.mood!=null?"4px solid "+MCOLS[popupEntry.entry.mood]:"4px solid "+t.accent,borderRadius:16,padding:"20px",width:"100%",maxWidth:360,maxHeight:"70vh",overflowY:"auto",boxShadow:popupEntry.entry.mood!=null?premiumShadow(t,MCOLS[popupEntry.entry.mood]):premiumShadow(t,t.accent)}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:800,color:t.accent}}>{fmt(popupEntry.date)}</div>
          <button onClick={()=>setPopupEntry(null)} style={{background:"none",border:"none",color:t.muted,fontSize:20,cursor:"pointer"}}>×</button>
        </div>
        {popupEntry.entry.mood!=null&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontSize:24}}>{MOODS[popupEntry.entry.mood]?.e}</span>
          <div style={{fontSize:13,fontWeight:700,color:MCOLS[popupEntry.entry.mood]}}>Feeling {["Rough","Low","Okay","Good","Great"][popupEntry.entry.mood]}</div>
        </div>}
        {popupEntry.entry.tags&&popupEntry.entry.tags.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
          {popupEntry.entry.tags.map(tag=><span key={tag} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:t.accent+"22",color:t.accent}}>{tag}</span>)}
        </div>}
        {popupEntry.entry.title&&<div style={{fontSize:13,fontWeight:700,color:t.text,marginBottom:8}}>{popupEntry.entry.title}</div>}
        {popupEntry.entry.note&&<div style={{fontSize:13,color:t.muted,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{popupEntry.entry.note}</div>}
        <button onClick={()=>{setPopupEntry(null);loadDate(popupEntry.date);}} style={{marginTop:14,padding:"8px 16px",borderRadius:10,border:"1px solid "+t.accent+"44",background:t.accent+"15",color:t.accent,fontWeight:700,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>✏️ Edit Entry</button>
      </div>
    </div>}
  </>);
}

function JournalModal({t,close,journals,onSave,plan,showUp}){
  const today=td();
  const MCOLS=["#f87171","#fb923c","#fbbf24","#86efac","#4ade80"];
  function parseEntry(raw){if(raw&&typeof raw==="object")return raw;return{note:raw||"",mood:null,tags:[],title:""};}
  const[sel,setSel]=useState(today);
  const init=parseEntry(journals[today]);
  const[note,setNote]=useState(init.note);
  const[mood,setMood]=useState(init.mood);
  const[tags,setTags]=useState(init.tags||[]);
  const[title,setTitle]=useState(init.title||"");
  const cutoff=plan.jDays===Infinity?null:new Date(Date.now()-plan.jDays*86400000).toLocaleDateString("en-CA");
  const entries=Object.entries(journals).sort((a,b)=>b[0].localeCompare(a[0])).filter(([d])=>!cutoff||d>=cutoff);
  const wordCount=note.trim().split(/\s+/).filter(Boolean).length;
  const prompt=JPROMPTS[new Date().getDate()%JPROMPTS.length];

  function loadDate(d){
    setSel(d);
    const e=parseEntry(journals[d]);
    setNote(e.note);setMood(e.mood);setTags(e.tags||[]);setTitle(e.title||"");
  }
  function toggleTag(tag){setTags(prev=>prev.includes(tag)?prev.filter(x=>x!==tag):[...prev,tag]);}
  function doSave(){onSave(sel,{note,mood,tags,title});}

  return(
  <div style={{position:"fixed",inset:0,background:t.bg,zIndex:900,display:"flex",flexDirection:"column",animation:"slideUp 0.25s ease"}}>
    {/* R11-A: Full-screen journal header */}
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 18px 12px",background:t.card,borderBottom:"1px solid "+t.border,flexShrink:0}}>

      <div style={{fontSize:16,fontWeight:800,color:t.text,flex:1}}>Journal</div>
      <button onClick={close} style={{background:"none",border:"none",color:t.muted,fontSize:22,cursor:"pointer",padding:"2px 6px",lineHeight:1}}>✕</button>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"14px 18px",paddingBottom:100}}>
    <input type="date" value={sel} onChange={e=>loadDate(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:14,marginBottom:9}}/>

    {/* Title */}
    <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Entry title (optional)..." maxLength={150} style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:13,marginBottom:9}}/>

    {/* Mood selector */}
    <div style={{marginBottom:9}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Mood</div>
      <div style={{display:"flex",gap:6}}>
        {MOODS.map((m,i)=>(
          <button key={i} onClick={()=>setMood(mood===i?null:i)} style={{flex:1,padding:"7px 4px",borderRadius:10,border:"2px solid "+(mood===i?MCOLS[i]:t.border),background:mood===i?premiumCard(t,MCOLS[i]):t.surface,cursor:"pointer",textAlign:"center",boxShadow:mood===i?premiumShadow(t,MCOLS[i]):"none"}}>
            <div style={{fontSize:18}}>{m.e}</div>
            <div style={{fontSize:9,color:mood===i?MCOLS[i]:t.muted,fontWeight:700,marginTop:2}}>{m.l}</div>
          </button>
        ))}
      </div>
    </div>

    {/* Tags */}
    <div style={{marginBottom:9}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Tags</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {JTAGS.map(tag=>(
          <button key={tag} onClick={()=>toggleTag(tag)} style={{padding:"4px 10px",borderRadius:20,border:"1px solid "+(tags.includes(tag)?t.accent:t.border),background:tags.includes(tag)?t.accent+"22":t.surface,color:tags.includes(tag)?t.accent:t.muted,cursor:"pointer",fontSize:11,fontWeight:tags.includes(tag)?700:400,boxShadow:tags.includes(tag)?"0 0 6px "+t.accent+"55":"none"}}>{tag}</button>
        ))}

    {/* Note textarea */}
    <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder={prompt} maxLength={5000} style={{width:"100%",height:100,background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:12,color:t.text,fontSize:13,resize:"vertical",lineHeight:1.6,boxShadow:premiumShadow(t)}}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4,marginBottom:10}}>
      <div style={{fontSize:10,color:t.muted}}>{wordCount} word{wordCount!==1?"s":""}</div>
      {cutoff&&(()=>{
        const daysUsed=entries.length;
        const oldest=entries.length>0?entries[entries.length-1][0]:null;
        return(<div onClick={()=>showUp("Unlock AI insights, score analysis, challenge creation, unlimited habits, goals, heatmaps & more!")} style={{background:premiumCard(t,t.accent),border:"1px solid "+t.accent+"33",borderRadius:12,padding:"8px 12px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",boxShadow:premiumShadow(t,t.accent)}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:t.accent,display:"flex",alignItems:"center",gap:4}}>{IC.lock(t.accent,11)} Free: last 7 days only</div>
            <div style={{fontSize:10,color:t.muted,marginTop:1}}>Upgrade Pro to unlock full history</div>
          </div>
          <span style={{fontSize:10,fontWeight:700,color:"#000",background:t.accent,padding:"3px 9px",borderRadius:12,flexShrink:0}}>Upgrade ⚡</span>
        </div>);
      })()}
    </div>

    <button onClick={doSave} style={{width:"100%",padding:"11px",borderRadius:12,border:"none",background:"linear-gradient(135deg,"+t.accent+","+t.accent2+")",color:"#000",fontWeight:700,cursor:"pointer",marginBottom:18,boxShadow:premiumShadow(t,t.accent)}}>Save ✓</button>

    {/* Fix 16: Mini monthly calendar — proper component (hooks at top level) */}
    {entries.length>0&&<div>
      <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:10,...gradText(t)}}>Past Entries</div>
      <JournalMiniCal t={t} journals={journals} loadDate={loadDate} parseEntry={parseEntry} fmt={fmt} MOODS={MOODS} MCOLS={MCOLS} today2={td()}/>
    </div>}
    </div>{/* end scroll area */}
  </div>
  );
}
