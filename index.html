<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Momentum — Habit & Goal Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#f5c842"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Momentum"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,signInWithRedirect,getRedirectResult,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc,getDoc,runTransaction}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyBjWGAnvq-ic-xSxGY3J9XlW9W1UxP8SgU",authDomain:"momentum-trackerapp.firebaseapp.com",projectId:"momentum-trackerapp",storageBucket:"momentum-trackerapp.firebasestorage.app",messagingSenderId:"886208482744",appId:"1:886208482744:web:aa21f2c4618eda384a934d"};
const app=initializeApp(cfg);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();
window._fb={auth,db,provider,signInWithPopup,signInWithRedirect,getRedirectResult,signOut,onAuthStateChanged,doc,setDoc,getDoc,runTransaction};
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d0f;font-family:'Sora',system-ui,sans-serif;}
input,textarea,select{outline:none;font-family:inherit;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sb{display:flex!important;}.bn{display:none!important;}.ma{padding:28px 22px 60px!important;}
@media(max-width:640px){.sb{display:none!important;}.bn{display:block!important;}.ma{padding:16px 14px 145px!important;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function ReviewsTab({t,habits,goals,journals,plan,showUp,today}){
  const[sub,setSub]=React.useState("day");
  const[showLeaderboard,setShowLeaderboard]=React.useState(false);
  const[pickedDate,setPickedDate]=React.useState(today);
  const[pickedWeekStart,setPickedWeekStart]=React.useState(null);
  const[pickedMonth,setPickedMonth]=React.useState(null);

  const now=new Date();
  const yr=now.getFullYear(),mo=now.getMonth();
  const MCOLS=["#f87171","#fb923c","#fbbf24","#86efac","#4ade80"];
  const MEMOJI=["😞","😕","😐","🙂","😄"];

  // ── Date helpers ──────────────────────────────────────────────
  function getWeek7(startDate){
    const arr=[];
    const base=startDate?new Date(startDate+"T12:00:00"):new Date();
    const dayOfWeek=base.getDay();
    const monday=new Date(base);monday.setDate(base.getDate()-dayOfWeek+1);
    for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);arr.push(d.toISOString().split("T")[0]);}
    return arr;
  }
  const currentWeek7=getWeek7(pickedWeekStart);
  const curMonthStr=pickedMonth||`${yr}-${String(mo+1).padStart(2,"0")}`;
  const [pmo_yr,pmo_mo]=curMonthStr.split("-").map(Number);
  const monthDates=Array.from({length:new Date(pmo_yr,pmo_mo,0).getDate()},(_,i)=>{
    const d=`${pmo_yr}-${String(pmo_mo).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;
    return d<=today?d:null;
  }).filter(Boolean);

  // ── Stat card ─────────────────────────────────────────────────
  const SC=({icon,value,label,sub2,color})=>(
    <div style={{flex:1,background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 6px",textAlign:"center",minWidth:0}}>
      <div style={{fontSize:14,marginBottom:2}}>{icon}</div>
      <div style={{fontSize:16,fontWeight:800,color:color||t.accent,lineHeight:1,wordBreak:"break-word"}}>{value}</div>
      {sub2&&<div style={{fontSize:9,color:color||t.accent,marginTop:1}}>{sub2}</div>}
      <div style={{fontSize:8,color:t.muted,marginTop:2,textTransform:"uppercase",letterSpacing:0.3}}>{label}</div>
    </div>
  );

  // ── Mood chart ────────────────────────────────────────────────
  function MoodChart({dates,label}){
    const moodData=dates.map(d=>{const e=journals[d];if(!e)return null;return typeof e==="object"?e.mood:null;});
    const hasAny=moodData.some(m=>m!=null);
    const avgMood=hasAny?Math.round(moodData.filter(m=>m!=null).reduce((s,m)=>s+m,0)/moodData.filter(m=>m!=null).length):null;
    const maxH=60;
    if(!hasAny)return(<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 12px",marginBottom:10}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:4}}>😊 Mood — {label}</div>
      <div style={{fontSize:11,color:t.muted,textAlign:"center",padding:"8px 0"}}>No mood logged for this period</div>
    </div>);
    return(<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 12px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:700,color:t.muted}}>😊 Mood — {label}</div>
        {avgMood!=null&&<div style={{fontSize:10,color:MCOLS[avgMood],fontWeight:700,background:MCOLS[avgMood]+"22",padding:"2px 8px",borderRadius:10}}>Avg: {MEMOJI[avgMood]}</div>}
      </div>
      <div style={{display:"flex",alignItems:"flex-end",gap:2,height:maxH+20}}>
        {dates.slice(-14).map((d,i)=>{
          const m=moodData[moodData.length-dates.slice(-14).length+i];
          const barH=m!=null?Math.max(8,((m+1)/5)*maxH):3;
          const col=m!=null?MCOLS[m]:t.border;
          const lbl=new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"narrow"});
          return(<div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            {m!=null&&<span style={{fontSize:9}}>{MEMOJI[m]}</span>}
            {m==null&&<span style={{fontSize:8,color:t.muted}}>—</span>}
            <div style={{width:"100%",height:barH,background:col,borderRadius:"3px 3px 0 0",opacity:m!=null?1:0.25}}/>
            <span style={{fontSize:7,color:t.muted}}>{lbl}</span>
          </div>);
        })}
      </div>
    </div>);
  }

  // ── Streak leaderboard (collapsible) ─────────────────────────
  function LeaderboardSection({dates,label}){
    const sorted=[...habits].sort((a,b)=>{
      const ad=dates.filter(d=>a.log&&a.log[d]).length;
      const bd=dates.filter(d=>b.log&&b.log[d]).length;
      return bd-ad;
    });
    const topHabit=sorted[0];
    return(<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 12px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showLeaderboard?10:0}}>
        <div style={{fontSize:11,fontWeight:700,color:t.muted}}>🏆 Streak Leaderboard — {label}</div>
        <button onClick={()=>setShowLeaderboard(s=>!s)} style={{background:"none",border:"none",cursor:"pointer",color:t.accent,fontSize:13,fontWeight:700,padding:"0 4px"}}>{showLeaderboard?"▲":"→"}</button>
      </div>
      {!showLeaderboard&&topHabit&&(
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
          <span style={{fontSize:9,fontWeight:800,color:t.accent}}>🥇</span>
          <span style={{fontSize:14}}>{topHabit.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text}}>{topHabit.name}</div>
            <div style={{fontSize:9,color:t.muted}}>{dates.filter(d=>topHabit.log&&topHabit.log[d]).length}/{dates.length} days · 🔥{topHabit.streak}d</div>
          </div>
        </div>
      )}
      {showLeaderboard&&sorted.map((h,i)=>(
        <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<sorted.length-1?`1px solid ${t.border}`:"none"}}>
          <span style={{fontSize:11,fontWeight:800,color:i===0?t.accent:t.muted,width:16,textAlign:"center"}}>{i+1}</span>
          <span style={{fontSize:15}}>{h.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:t.text}}>{h.name}</div>
            <div style={{fontSize:9,color:t.muted}}>{dates.filter(d=>h.log&&h.log[d]).length}/{dates.length} days · 🔥{h.streak}d</div>
          </div>
          {getBadge(h.streak)&&<span>{getBadge(h.streak).i}</span>}
        </div>
      ))}
    </div>);
  }

  // ── Day Review ────────────────────────────────────────────────
  function DayReview(){
    const d=pickedDate;
    const habDone=habits.filter(h=>{const v=h.log&&h.log[d];if(!v)return false;if(h.goalCount>0)return typeof v==="number"?v>=h.goalCount:false;return true;}).length;
    const habTotal=habits.length;
    const jEntry=journals[d];
    const jDone=jEntry?1:0;
    const moodVal=jEntry&&typeof jEntry==="object"?jEntry.mood:null;
    const actDue=goals.flatMap(g=>g.actions.filter(a=>a.dueDate===d));
    const actDone=actDue.filter(a=>a.done).length;
    const allTimeBadges=habits.reduce((s,h)=>{const b=getBadge(h.streak);return b&&!s.find(x=>x.d===b.d)?[...s,b]:s;},[]);
    const pomoH=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_history")||"[]").filter(s=>s.date===d).reduce((s,x)=>s+(x.mins||0),0);}catch{return 0;}})();

    return(<div>
      {/* Date picker */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:t.muted,flexShrink:0}}>Pick date:</div>
        <input type="date" value={pickedDate} max={today} onChange={e=>setPickedDate(e.target.value)} style={{flex:1,padding:"7px 10px",borderRadius:9,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:12,colorScheme:"dark"}}/>
      </div>
      <div style={{background:t.accent+"12",border:`1px solid ${t.accent}33`,borderRadius:11,padding:"10px 14px",marginBottom:10}}>
        <div style={{fontSize:14,fontWeight:800,color:t.accent}}>📅 {new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</div>
      </div>
      {/* Stats row */}
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <SC icon="🔥" value={`${habDone}/${habTotal}`} sub2={`${habTotal} habits set`} label="Habits Done" color={t.accent}/>
        <SC icon="⚡" value={`${actDone}/${actDue.length}`} sub2="actions due today" label="Actions" color={t.info}/>
        <SC icon="📓" value={jDone?"✅":"—"} label="Journaled" color={jDone?t.success:t.muted}/>
        <SC icon="⏱️" value={`${pomoH}m`} label="Focus" color={t.muted}/>
      </div>
      {/* Mood */}
      <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 12px",marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:4}}>😊 Mood — {d}</div>
        {moodVal!=null?(<div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:28}}>{MEMOJI[moodVal]}</span>
          <div><div style={{fontSize:13,fontWeight:700,color:MCOLS[moodVal]}}>Feeling {["Rough","Low","Okay","Good","Great"][moodVal]}</div><div style={{fontSize:10,color:t.muted}}>Mood score: {moodVal+1}/5</div></div>
        </div>):(<div style={{fontSize:11,color:t.muted,textAlign:"center",padding:"6px 0"}}>No mood logged for this day</div>)}
      </div>
      {/* Leaderboard */}
      <LeaderboardSection dates={[d]} label={d}/>
      {/* Badges collection */}
      {allTimeBadges.length>0&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 12px",marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:8}}>🏅 Badges Earned</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {allTimeBadges.map(b=><div key={b.d} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 8px",background:b.c+"18",borderRadius:9,border:`1px solid ${b.c}44`}}>
            <span style={{fontSize:18}}>{b.i}</span>
            <div style={{fontSize:8,fontWeight:700,color:b.c,textAlign:"center"}}>{b.l}</div>
          </div>)}
        </div>
      </div>}
    </div>);
  }

  // ── Week Review ───────────────────────────────────────────────
  function WeekReview(){
    const week7=getWeek7(pickedWeekStart);
    const wStart=week7[0],wEnd=week7[6];
    const habDone=habits.reduce((s,h)=>s+week7.filter(d=>h.log&&h.log[d]).length,0);
    const habTotal=habits.length*7;
    const jDays=week7.filter(d=>journals[d]).length;
    const actDue=goals.flatMap(g=>g.actions.filter(a=>a.dueDate&&week7.includes(a.dueDate)));
    const actDone=actDue.filter(a=>a.done).length;
    const pomoM=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_history")||"[]").filter(s=>week7.includes(s.date)).reduce((s,x)=>s+(x.mins||0),0);}catch{return 0;}})();
    const topStreak=habits.length>0?Math.max(...habits.map(h=>h.streak||0)):0;
    const allTimeBadges=habits.reduce((s,h)=>{const b=getBadge(h.streak);return b&&!s.find(x=>x.d===b.d)?[...s,b]:s;},[]);

    return(<div>
      {/* Week picker */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:t.muted,flexShrink:0}}>Week of:</div>
        <input type="date" value={pickedWeekStart||wStart} max={today} onChange={e=>setPickedWeekStart(e.target.value)} style={{flex:1,padding:"7px 10px",borderRadius:9,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:12,colorScheme:"dark"}}/>
      </div>
      <div style={{background:t.accent+"12",border:`1px solid ${t.accent}33`,borderRadius:11,padding:"10px 14px",marginBottom:10}}>
        <div style={{fontSize:14,fontWeight:800,color:t.accent}}>📅 Week Review</div>
        <div style={{fontSize:11,color:t.muted}}>{wStart} → {wEnd}</div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <SC icon="🔥" value={`${habDone}/${habTotal}`} sub2={`${habits.length} habits × 7 days`} label="Habits Done" color={t.accent}/>
        <SC icon="⚡" value={`${actDone}/${actDue.length}`} sub2="actions this week" label="Actions" color={t.info}/>
        <SC icon="📓" value={`${jDays}/7`} sub2="days journaled" label="Journal" color={t.success}/>
        <SC icon="⏱️" value={`${pomoM}m`} label="Focus" color={t.muted}/>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <SC icon="🔥" value={`${topStreak}d`} label="Top Streak" color={t.accent}/>
        <SC icon="📈" value={habTotal>0?`${Math.round(habDone/habTotal*100)}%`:"—"} label="Habit Rate" color={habDone/habTotal>=0.8?t.success:habDone/habTotal>=0.5?t.accent:t.danger}/>
        {allTimeBadges.length>0&&<div style={{flex:1,background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 6px",textAlign:"center"}}>
          <div style={{fontSize:14}}>{allTimeBadges[allTimeBadges.length-1].i}</div>
          <div style={{fontSize:8,fontWeight:700,color:allTimeBadges[allTimeBadges.length-1].c}}>{allTimeBadges[allTimeBadges.length-1].l}</div>
          <div style={{fontSize:8,color:t.muted,textTransform:"uppercase"}}>Top Badge</div>
        </div>}
      </div>
      <MoodChart dates={week7} label="This Week"/>
      <LeaderboardSection dates={week7} label="This Week"/>
      {allTimeBadges.length>0&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 12px",marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:8}}>🏅 Badges Collection</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
          {allTimeBadges.map(b=><div key={b.d} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 8px",background:b.c+"18",borderRadius:9,border:`1px solid ${b.c}44`}}>
            <span style={{fontSize:18}}>{b.i}</span>
            <div style={{fontSize:8,fontWeight:700,color:b.c,textAlign:"center"}}>{b.l}</div>
          </div>)}
        </div>
      </div>}
    </div>);
  }

  // ── Month Review ──────────────────────────────────────────────
  function MonthReview(){
    const habDone=habits.reduce((s,h)=>s+monthDates.filter(d=>h.log&&h.log[d]).length,0);
    const habTotal=habits.length*monthDates.length;
    const jDays=monthDates.filter(d=>journals[d]).length;
    const actDue=goals.flatMap(g=>g.actions.filter(a=>a.dueDate&&monthDates.includes(a.dueDate)));
    const actDone=actDue.filter(a=>a.done).length;
    const topStreak=habits.length>0?Math.max(...habits.map(h=>h.streak||0)):0;
    const allTimeBadges=habits.reduce((s,h)=>{const b=getBadge(h.streak);return b&&!s.find(x=>x.d===b.d)?[...s,b]:s;},[]);
    const monthLabel=new Date(pmo_yr,pmo_mo-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});

    return(<div>
      {/* Month picker */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:t.muted,flexShrink:0}}>Month:</div>
        <input type="month" value={curMonthStr} max={`${yr}-${String(mo+1).padStart(2,"0")}`} onChange={e=>setPickedMonth(e.target.value)} style={{flex:1,padding:"7px 10px",borderRadius:9,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:12,colorScheme:"dark"}}/>
      </div>
      <div style={{background:t.accent+"12",border:`1px solid ${t.accent}33`,borderRadius:11,padding:"10px 14px",marginBottom:10}}>
        <div style={{fontSize:14,fontWeight:800,color:t.accent}}>🗓 {monthLabel}</div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <SC icon="🔥" value={`${habDone}/${habTotal}`} sub2={`${habits.length} habits × ${monthDates.length} days`} label="Habits Done" color={t.accent}/>
        <SC icon="⚡" value={`${actDone}/${actDue.length}`} sub2="actions this month" label="Actions" color={t.info}/>
        <SC icon="📓" value={`${jDays}/${monthDates.length}`} sub2="days journaled" label="Journal" color={t.success}/>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <SC icon="🔥" value={`${topStreak}d`} label="Top Streak" color={t.accent}/>
        <SC icon="📈" value={habTotal>0?`${Math.round(habDone/habTotal*100)}%`:"—"} label="Habit Rate" color={habDone/habTotal>=0.75?t.success:habDone/habTotal>=0.5?t.accent:t.danger}/>
        {allTimeBadges.length>0&&<div style={{flex:1,background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 6px",textAlign:"center"}}>
          <div style={{fontSize:14}}>{allTimeBadges[allTimeBadges.length-1].i}</div>
          <div style={{fontSize:8,fontWeight:700,color:allTimeBadges[allTimeBadges.length-1].c}}>{allTimeBadges[allTimeBadges.length-1].l}</div>
          <div style={{fontSize:8,color:t.muted,textTransform:"uppercase"}}>Top Badge</div>
        </div>}
      </div>
      <MoodChart dates={monthDates} label={monthLabel}/>
      <LeaderboardSection dates={monthDates} label={monthLabel}/>
      {allTimeBadges.length>0&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 12px",marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:8}}>🏅 Badges Collection</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
          {allTimeBadges.map(b=><div key={b.d} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 8px",background:b.c+"18",borderRadius:9,border:`1px solid ${b.c}44`}}>
            <span style={{fontSize:18}}>{b.i}</span>
            <div style={{fontSize:8,fontWeight:700,color:b.c,textAlign:"center"}}>{b.l}</div>
          </div>)}
        </div>
      </div>}
      <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"10px 12px"}}>
        <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:8,textTransform:"uppercase"}}>Per Habit</div>

function Confetti({on,done}){
  const r=useRef();
  useEffect(()=>{
    if(!on)return;
    const c=r.current;if(!c)return;
    c.width=window.innerWidth;c.height=window.innerHeight;
    const ctx=c.getContext("2d");
    const cols=["#f5c842","#e8853d","#4ade80","#60a5fa","#a78bfa","#f87171"];
    const ps=Array.from({length:90},()=>({x:Math.random()*c.width,y:-20,r:3+Math.random()*5,spd:1.5+Math.random()*2,col:cols[Math.floor(Math.random()*6)],ang:0,ts:0.1+Math.random()*0.3}));
    let raf;
    const draw=()=>{ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.y+=p.spd;p.ang+=p.ts;ctx.beginPath();ctx.lineWidth=p.r;ctx.strokeStyle=p.col;ctx.moveTo(p.x+Math.sin(p.ang)*8,p.y);ctx.lineTo(p.x+Math.sin(p.ang)*8+p.r*2,p.y+p.r*2);ctx.stroke();});if(ps.some(p=>p.y<c.height))raf=requestAnimationFrame(draw);else{ctx.clearRect(0,0,c.width,c.height);done&&done();}};
    draw();return()=>cancelAnimationFrame(raf);
  },[on]);
  if(!on)return null;
  return React.createElement("canvas",{ref:r,style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999}});
}

function Pomodoro({t,close,plan,showUp}){
  const[tab,setTab]=useState("timer"); // timer | history | analytics
  const[mode,setMode]=useState("focus");
  const[run,setRun]=useState(false);
  const[secs,setSecs]=useState(25*60);
  const[durations,setDurations]=useState({focus:25,short:5,long:15});
  const[editing,setEditing]=useState(null);
  const[editVal,setEditVal]=useState("");
  const[sessionLabel,setSessionLabel]=useState("Focus");
  const[customLabel,setCustomLabel]=useState("");
  const[showLabelInput,setShowLabelInput]=useState(false);
  const[history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_history")||"[]");}catch{return[];}});
  const[analyticsTab,setAnalyticsTab]=useState("week");
  const iv=useRef();
  const today=new Date().toISOString().split("T")[0];

  const MODES=[["focus","⏱️","Focus"],["short","☕","Short Break"],["long","🌿","Long Break"]];
  const QUICK_LABELS=["Focus","Study","Work","Exercise","Reading","Meditation","Practice","Research"];
  const CHIPS=[15,30,45,60];

  const completedRef=useRef(false);

  useEffect(()=>{
    if(run){
      completedRef.current=false;
      iv.current=setInterval(()=>{
        setSecs(s=>{
          if(s<=1){
            clearInterval(iv.current);
            completedRef.current=true;
            return 0;
          }
          return s-1;
        });
      },1000);
    } else {
      clearInterval(iv.current);
      // Handle completion after run stops
      if(completedRef.current){
        completedRef.current=false;
        const label=customLabel||sessionLabel;
        const mins=durations[mode];
        const entry={id:Date.now(),label,mode,mins,time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),date:today};
        const updated=[entry,...history.slice(0,199)];
        setHistory(updated);
        setTab("history");
        try{localStorage.setItem("hg_pomo_history",JSON.stringify(updated));}catch(e){}
        try{if(typeof Notification!=="undefined"&&Notification.permission==="granted")new Notification("⚡ Session Complete!",{body:`${label} — ${mins}m done! 🎉`,icon:"/icon-192.png"});}catch(e){}
      }
    }
    return()=>clearInterval(iv.current);
  },[run]);

  // When timer hits 0, stop running (triggers completion in run useEffect)
  useEffect(()=>{
    if(secs===0&&run){setRun(false);}
  },[secs]);

  function switchMode(m){setMode(m);setSecs(durations[m]*60);setRun(false);}
  function setChip(mins){const nd={...durations,[mode]:mins};setDurations(nd);setSecs(mins*60);setRun(false);}
  function startEdit(m){setEditing(m);setEditVal(String(durations[m]));}
  function saveEdit(m){
    const v=parseInt(editVal);
    if(v>0&&v<=240){const nd={...durations,[m]:v};setDurations(nd);if(mode===m){setSecs(v*60);setRun(false);}}
    setEditing(null);
  }

  const totalSecs=durations[mode]*60;
  const pct=((totalSecs-secs)/totalSecs)*100;
  const r2=80,ci=2*Math.PI*r2;
  const mm=String(Math.floor(secs/60)).padStart(2,"0"),ss2=String(secs%60).padStart(2,"0");
  const todaySess=history.filter(s=>s.date===today);
  const todayMins=todaySess.reduce((s,x)=>s+(x.mins||0),0);

  // ── ANALYTICS HELPERS ──────────────────────────────────────────
  function getWeekData(){
    const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split("T")[0]);}
    return days.map(d=>{
      const sess=history.filter(s=>s.date===d);
      const mins=sess.reduce((s,x)=>s+(x.mins||0),0);
      return{date:d,mins,label:new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"})};
    });
  }

  function getMonthData(){
    const now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
    const days=new Date(yr,mo+1,0).getDate();
    return Array.from({length:days},(_,i)=>{
      const d=`${yr}-${String(mo+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;
      const mins=history.filter(s=>s.date===d).reduce((s,x)=>s+(x.mins||0),0);
      return{day:i+1,mins};
    });
  }

  function getYearData(){
    const yr=new Date().getFullYear();
    const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return MONTHS.map((m,mi)=>{
      const prefix=`${yr}-${String(mi+1).padStart(2,"0")}`;
      const mins=history.filter(s=>s.date&&s.date.startsWith(prefix)).reduce((s,x)=>s+(x.mins||0),0);
      return{month:m,mins,hrs:Math.round(mins/60*10)/10};
    });
  }

  function getLabelBreakdown(data){
    const map={};
    data.forEach(s=>{const k=s.label||"Focus";map[k]=(map[k]||0)+(s.mins||0);});
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,6);
  }

  // ── TIMER TAB ──────────────────────────────────────────────────
  function TimerTab(){
    return(<div>
      {/* Mode switcher */}
      <div style={{display:"flex",gap:6,background:t.surface,borderRadius:12,padding:4,marginBottom:20}}>
        {MODES.map(([m,ic,l])=>(
          <button key={m} onClick={()=>switchMode(m)} style={{flex:1,padding:"8px 4px",borderRadius:9,border:"none",cursor:"pointer",background:mode===m?t.accent:"none",color:mode===m?"#000":t.muted,fontWeight:700,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
            <span>{ic}</span><span>{l}</span>
          </button>
        ))}
      </div>

      {/* Session label */}
      <div style={{marginBottom:16,textAlign:"center"}}>
        {!showLabelInput?(
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
            {QUICK_LABELS.slice(0,6).map(l=>(
              <button key={l} onClick={()=>{setSessionLabel(l);setCustomLabel("");}} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${sessionLabel===l&&!customLabel?t.accent:t.border}`,background:sessionLabel===l&&!customLabel?t.accent+"18":t.surface,color:sessionLabel===l&&!customLabel?t.accent:t.muted,cursor:"pointer",fontSize:11,fontWeight:sessionLabel===l&&!customLabel?700:400}}>{l}</button>
            ))}
            <button onClick={()=>setShowLabelInput(true)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${t.border}`,background:t.surface,color:t.muted,cursor:"pointer",fontSize:11}}>✏️ Custom</button>
          </div>
        ):(
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <input autoFocus value={customLabel} onChange={e=>setCustomLabel(e.target.value)} placeholder="Session name..." style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1px solid ${t.accent}`,background:t.surface,color:t.text,fontSize:13}}/>
            <button onClick={()=>setShowLabelInput(false)} style={{padding:"8px 12px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>✓</button>
          </div>
        )}
      </div>

      {/* Duration chips */}
      <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:8,flexWrap:"wrap"}}>
        {CHIPS.map(c=>(
          <button key={c} onClick={()=>setChip(c)} style={{padding:"5px 14px",borderRadius:20,border:`1px solid ${durations[mode]===c?t.accent:t.border}`,background:durations[mode]===c?t.accent+"18":t.surface,color:durations[mode]===c?t.accent:t.muted,cursor:"pointer",fontSize:12,fontWeight:durations[mode]===c?700:400}}>{c}m</button>
        ))}
        {/* Custom duration */}
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          {editing===mode?(
            <>
              <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEdit(mode);if(e.key==="Escape")setEditing(null);}} style={{width:44,padding:"4px 6px",borderRadius:8,border:`1px solid ${t.accent}`,background:t.surface,color:t.text,fontSize:12,textAlign:"center"}}/>
              <span style={{fontSize:10,color:t.muted}}>m</span>
              <button onClick={()=>saveEdit(mode)} style={{background:"none",border:"none",color:t.success,cursor:"pointer",fontSize:13}}>✓</button>
            </>
          ):(
            <button onClick={()=>startEdit(mode)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${t.border}`,background:t.surface,color:t.muted,cursor:"pointer",fontSize:11}}>Custom</button>
          )}
        </div>
      </div>

      {/* Timer ring */}
      <div style={{position:"relative",width:200,height:200,margin:"16px auto 20px"}}>
        <svg width={200} height={200} style={{transform:"rotate(-90deg)"}}>
          <circle cx={100} cy={100} r={r2} fill="none" stroke={t.border} strokeWidth={12}/>
          <circle cx={100} cy={100} r={r2} fill="none" stroke={run?t.accent:secs===0?t.success:t.accent} strokeWidth={12} strokeDasharray={ci} strokeDashoffset={ci-(pct/100)*ci} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:42,fontWeight:800,color:secs===0?t.success:t.text,letterSpacing:-2,fontVariantNumeric:"tabular-nums"}}>{mm}:{ss2}</span>
          <span style={{fontSize:11,color:t.muted,textTransform:"uppercase",letterSpacing:2,marginTop:2}}>{customLabel||sessionLabel}</span>
          {run&&<span style={{fontSize:10,color:t.accent,marginTop:4,animation:"fadeIn 1s infinite alternate"}}>● LIVE</span>}
        </div>
      </div>

      {/* Controls */}
      <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
        <button onClick={()=>setRun(r=>!r)} style={{padding:"13px 36px",borderRadius:14,border:"none",cursor:"pointer",background:t.accent,color:"#000",fontWeight:700,fontSize:17}}>{run?"⏸ Pause":"▶ Start"}</button>
        <button onClick={()=>{setSecs(durations[mode]*60);setRun(false);}} style={{padding:"13px 18px",borderRadius:14,border:`1px solid ${t.border}`,cursor:"pointer",background:"none",color:t.text,fontWeight:600}}>↺ Reset</button>
      </div>

      {/* Today stats */}
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        {[[`${todaySess.length}`,"Sessions Today",t.accent],[`${todayMins}m`,"Focus Today",t.success],[`${Math.round(todayMins/60*10)/10}h`,"Hours",t.info]].map(([v,l,c])=>(
          <div key={l} style={{flex:1,background:t.surface,border:`1px solid ${t.border}`,borderRadius:10,padding:"8px 6px",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:9,color:t.muted,marginTop:2,textTransform:"uppercase",letterSpacing:0.3}}>{l}</div>
          </div>
        ))}
      </div>
    </div>);
  }

  // ── HISTORY TAB ────────────────────────────────────────────────
  function HistoryTab(){
    const grouped={};
    history.forEach(s=>{
      const k=s.date||today;
      if(!grouped[k])grouped[k]=[];
      grouped[k].push(s);
    });
    const sortedDates=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
    if(history.length===0)return(
      <div style={{textAlign:"center",padding:"48px 16px"}}>
        <div style={{fontSize:40,marginBottom:12}}>⏱️</div>
        <div style={{fontSize:15,fontWeight:700,color:t.text,marginBottom:6}}>No sessions yet</div>
        <div style={{fontSize:13,color:t.muted}}>Complete a session to see your history</div>
      </div>
    );
    return(<div>
      {sortedDates.map(date=>{
        const sess=grouped[date];
        const totalM=sess.reduce((s,x)=>s+(x.mins||0),0);
        const label=date===today?"Today":timeAgo(date);
        return(<div key={date} style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:t.accent}}>{label}</div>
            <div style={{fontSize:11,color:t.muted,background:t.surface,padding:"2px 8px",borderRadius:10}}>{sess.length} session{sess.length!==1?"s":""} · {totalM}m</div>
          </div>
          {sess.map((s,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:t.card,border:`1px solid ${t.border}`,borderRadius:10,marginBottom:6}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:s.mode==="focus"?t.accent:s.mode==="short"?t.success:t.info,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:t.text}}>{s.label||"Focus"}</div>
                <div style={{fontSize:10,color:t.muted,marginTop:1}}>{s.mode==="focus"?"⏱️ Focus":s.mode==="short"?"☕ Short Break":"🌿 Long Break"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:13,fontWeight:700,color:t.success}}>{s.mins}m</div>
                <div style={{fontSize:10,color:t.muted}}>{s.time||""}</div>
              </div>
            </div>
          ))}
        </div>);
      })}
    </div>);
  }

  // ── ANALYTICS TAB ──────────────────────────────────────────────
  function AnalyticsTab(){
    const weekData=getWeekData();
    const weekTotal=weekData.reduce((s,d)=>s+d.mins,0);
    const weekSessions=history.filter(s=>{const d=new Date(s.date+"T12:00:00");return(new Date()-d)/86400000<=7;});
    const weekLabels=getLabelBreakdown(weekSessions);
    const maxBar=Math.max(...weekData.map(d=>d.mins),1);

    return(<div>
      {/* Week selector — Free for all */}
      <div style={{display:"flex",gap:6,background:t.surface,borderRadius:10,padding:3,marginBottom:16}}>
        {[["week","Week",true],["month","Month",plan.heat],["year","Year",plan.yearReview]].map(([k,l,allowed])=>(
          <button key={k} onClick={()=>allowed?setAnalyticsTab(k):showUp&&showUp(k==="month"?"📊 Monthly Pomodoro analytics is a Pro feature!":"💎 Yearly Pomodoro analytics is a Plus feature!")} style={{flex:1,padding:"7px",borderRadius:8,border:"none",cursor:allowed?"pointer":"default",background:analyticsTab===k?t.accent:"none",color:analyticsTab===k?"#000":allowed?t.muted:t.border,fontWeight:analyticsTab===k?700:400,fontSize:12,position:"relative"}}>
            {l}{!allowed&&<span style={{fontSize:8,marginLeft:3,color:k==="month"?t.accent:"#a78bfa"}}>{k==="month"?"PRO":"PLUS"}</span>}
          </button>
        ))}
      </div>

      {/* Weekly view */}
      {analyticsTab==="week"&&<div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[[`${weekTotal}m`,"This Week",t.accent],[`${weekSessions.length}`,"Sessions",t.success],[`${Math.round(weekTotal/7)}m`,"Daily Avg",t.info]].map(([v,l,c])=>(
            <div key={l} style={{flex:1,background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:9,color:t.muted,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
        {/* Bar chart */}
        <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:12}}>Daily Focus Time</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80}}>
            {weekData.map((d,i)=>{
              const h2=d.mins>0?Math.max(8,(d.mins/maxBar)*72):3;
              const isT=d.date===today;
              return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                {d.mins>0&&<span style={{fontSize:8,color:isT?t.accent:t.muted,fontWeight:700}}>{d.mins}m</span>}
                <div style={{width:"100%",height:h2,background:isT?t.accent:d.mins>0?t.success+"88":t.border,borderRadius:"4px 4px 0 0",transition:"height 0.4s"}}/>
                <span style={{fontSize:9,color:isT?t.accent:t.muted,fontWeight:isT?700:400}}>{d.label}</span>
              </div>);
            })}
          </div>
        </div>
        {/* Per-label breakdown */}
        {weekLabels.length>0&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14}}>
          <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:10}}>By Activity</div>
          {weekLabels.map(([label,mins])=>(
            <div key={label} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:12,color:t.text,fontWeight:600}}>{label}</span>
                <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{mins}m · {Math.round(mins/60*10)/10}h</span>
              </div>
              <div style={{height:5,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:`${(mins/weekTotal)*100}%`,background:t.accent,borderRadius:4}}/></div>
            </div>
          ))}
        </div>}
      </div>}

      {/* Monthly view — Pro */}
      {analyticsTab==="month"&&plan.heat&&(()=>{
        const monthData=getMonthData();
        const monthTotal=monthData.reduce((s,d)=>s+d.mins,0);
        const now=new Date();
        const monthSessions=history.filter(s=>{const d=new Date(s.date+"T12:00:00");return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();});
        const monthLabels=getLabelBreakdown(monthSessions);
        const maxM=Math.max(...monthData.map(d=>d.mins),1);
        return(<div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {[[`${monthTotal}m`,"This Month",t.accent],[`${monthSessions.length}`,"Sessions",t.success],[`${Math.round(monthTotal/now.getDate())}m`,"Daily Avg",t.info]].map(([v,l,c])=>(
              <div key={l} style={{flex:1,background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:t.muted,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:12}}>Daily Focus — {now.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:1.5,height:60,overflowX:"auto"}}>
              {monthData.map((d,i)=>{
                const h2=d.mins>0?Math.max(6,(d.mins/maxM)*56):2;
                const isT=d.day===now.getDate();
                return(<div key={i} style={{minWidth:8,flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{width:"100%",height:h2,background:isT?t.accent:d.mins>0?t.success+"99":t.border,borderRadius:"2px 2px 0 0"}}/>
                  {(d.day===1||d.day%5===0)&&<span style={{fontSize:7,color:t.muted}}>{d.day}</span>}
                </div>);
              })}
            </div>
          </div>
          {monthLabels.length>0&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:10}}>By Activity — This Month</div>
            {monthLabels.map(([label,mins])=>(
              <div key={label} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:t.text,fontWeight:600}}>{label}</span>
                  <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{mins}m · {Math.round(mins/60*10)/10}h</span>
                </div>
                <div style={{height:5,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:`${(mins/monthTotal)*100}%`,background:t.accent,borderRadius:4}}/></div>
              </div>
            ))}
          </div>}
        </div>);
      })()}

      {/* Yearly view — Plus */}
      {analyticsTab==="year"&&(plan.yearReview?(()=>{
        const yearData=getYearData();
        const yearTotal=yearData.reduce((s,d)=>s+d.mins,0);
        const allLabels=getLabelBreakdown(history);
        const maxY=Math.max(...yearData.map(d=>d.mins),1);
        const now=new Date();
        return(<div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {[[`${Math.round(yearTotal/60)}h`,"Total Hours",t.accent],[`${history.length}`,"All Sessions",t.success],[`${Math.round(yearTotal/365)}m`,"Daily Avg",t.info]].map(([v,l,c])=>(
              <div key={l} style={{flex:1,background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:t.muted,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:12}}>Monthly Focus — {now.getFullYear()}</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:3,height:80}}>
              {yearData.map((d,i)=>{
                const h2=d.mins>0?Math.max(6,(d.mins/maxY)*72):3;
                const isPast=i<now.getMonth();
                const isCurrent=i===now.getMonth();
                const col=isCurrent?t.accent:d.mins>=120?t.success:d.mins>0?t.success+"66":t.border;
                return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  {d.hrs>0&&<span style={{fontSize:7,color:isCurrent?t.accent:t.muted,fontWeight:isCurrent?700:400}}>{d.hrs}h</span>}
                  <div style={{width:"100%",height:h2,background:col,borderRadius:"3px 3px 0 0",opacity:!isPast&&!isCurrent?0.3:1,transition:"height 0.4s"}}/>
                  <span style={{fontSize:8,color:isCurrent?t.accent:t.muted,fontWeight:isCurrent?700:400}}>{d.month}</span>
                </div>);
              })}
            </div>
          </div>
          {allLabels.length>0&&<div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:14}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:10}}>All-Time by Activity</div>
            {allLabels.map(([label,mins])=>(
              <div key={label} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:t.text,fontWeight:600}}>{label}</span>
                  <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{Math.round(mins/60*10)/10}h total</span>
                </div>
                <div style={{height:5,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:`${(mins/yearTotal)*100}%`,background:"#a78bfa",borderRadius:4}}/></div>
              </div>
            ))}
          </div>}
        </div>);
      })():<div style={{textAlign:"center",padding:32}}>
        <div style={{fontSize:32,marginBottom:10}}>📊</div>
        <div style={{fontSize:13,fontWeight:700,color:t.text,marginBottom:8}}>Yearly Pomodoro Analytics</div>
        <div style={{fontSize:11,color:t.muted,marginBottom:16}}>Full year focus trends — Plus feature</div>
        <button onClick={()=>showUp&&showUp("💎 Yearly Pomodoro analytics is a Plus feature!")} style={{padding:"10px 24px",borderRadius:12,border:"none",background:"#a78bfa",color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>💎 Upgrade to Plus</button>
      </div>)}
    </div>);
  }

  return(
    <div style={{position:"fixed",inset:0,background:t.bg,zIndex:1000,display:"flex",flexDirection:"column",fontFamily:"'Sora',system-ui,sans-serif"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px 0",flexShrink:0}}>
        <div style={{fontSize:18,fontWeight:800,color:t.text}}>⏱️ Pomodoro</div>
        <button onClick={close} style={{background:`${t.surface}`,border:`1px solid ${t.border}`,borderRadius:"50%",width:32,height:32,cursor:"pointer",color:t.muted,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>

      {/* Tab switcher */}
      <div style={{display:"flex",gap:0,margin:"14px 20px 0",background:t.surface,borderRadius:12,padding:3,flexShrink:0}}>
        {[["timer","⏱️ Timer"],["history","📋 History"],["analytics","📊 Analytics"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px",borderRadius:9,border:"none",cursor:"pointer",background:tab===k?t.accent:"none",color:tab===k?"#000":t.muted,fontWeight:tab===k?700:500,fontSize:12}}>{l}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px 32px"}}>
        {tab==="timer"&&<TimerTab/>}
        {tab==="history"&&<HistoryTab/>}
        {tab==="analytics"&&<AnalyticsTab/>}
      </div>
    </div>
  );
}

function CalModal({t,close,habits,goals}){
  const now=new Date();
  const[yr,setYr]=useState(now.getFullYear());
  const[mo,setMo]=useState(now.getMonth());
  const[selDay,setSelDay]=useState(null);
  const[dayNote,setDayNote]=useState("");
  const[saved,setSaved]=useState(false);
  const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const days=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay(),today=td();
  const ds=d=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

  function openDay(dateStr){
    setSelDay(dateStr);setSaved(false);
    try{const n=JSON.parse(localStorage.getItem("hg_day_notes")||"{}");setDayNote(n[dateStr]||"");}
    catch{setDayNote("");}
  }
  function saveNote(){
    try{const n=JSON.parse(localStorage.getItem("hg_day_notes")||"{}");n[selDay]=dayNote;localStorage.setItem("hg_day_notes",JSON.stringify(n));setSaved(true);setTimeout(()=>setSaved(false),1500);}
    catch{}
  }

  if(selDay){
    const isFuture=selDay>today;
    const isPast=selDay<=today;
    const doneHabits=habits.filter(h=>h.log&&h.log[selDay]);
    const missedHabits=habits.filter(h=>!h.log||!h.log[selDay]);
    const doneActions=goals.flatMap(g=>g.actions.filter(a=>a.doneAt===selDay).map(a=>({...a,goalTitle:g.title})));
    const deadlineGoals=goals.filter(g=>g.deadline===selDay);
    const displayDate=new Date(selDay+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

    return(<Modal t={t} close={close} title="📅 Calendar">
      <button onClick={()=>setSelDay(null)} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:13,marginBottom:14,padding:0}}>← Back to {MN[mo]}</button>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:16,fontWeight:800,color:t.text,marginBottom:3}}>{displayDate}</div>
        <div style={{fontSize:11,fontWeight:600,color:selDay===today?t.accent:isFuture?t.info:t.muted}}>{selDay===today?"Today — check in below":isFuture?"Future — Day Planner":"Past day"}</div>
      </div>

      {/* PAST / TODAY: Day Detail */}
      {isPast&&<div>
        {doneHabits.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.success,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>✅ Habits Done ({doneHabits.length})</div>
          {doneHabits.map(h=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:t.success+"18",borderRadius:8,marginBottom:5,fontSize:13}}>
              <span>{h.icon}</span><span style={{fontWeight:600}}>{h.name}</span>
            </div>
          ))}
        </div>}
        {missedHabits.length>0&&habits.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.danger,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>❌ Missed ({missedHabits.length})</div>
          {missedHabits.map(h=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:t.danger+"12",borderRadius:8,marginBottom:5,fontSize:13,opacity:0.7}}>
              <span>{h.icon}</span><span>{h.name}</span>
            </div>
          ))}
        </div>}
        {doneActions.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.info,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>🎯 Actions Completed ({doneActions.length})</div>
          {doneActions.map(a=>(
            <div key={a.id} style={{padding:"7px 10px",background:t.info+"18",borderRadius:8,marginBottom:5}}>
              <div style={{fontSize:12,fontWeight:600,color:t.text}}>{a.action}</div>
              <div style={{fontSize:10,color:t.muted}}>{a.goalTitle}</div>
            </div>
          ))}
        </div>}
        {deadlineGoals.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.accent,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>📌 Goal Deadlines</div>
          {deadlineGoals.map(g=><div key={g.id} style={{fontSize:12,color:t.text,padding:"5px 10px",background:t.accent+"18",borderRadius:8,marginBottom:5,fontWeight:600}}>{g.title}</div>)}
        </div>}
        {habits.length===0&&<div style={{textAlign:"center",color:t.muted,padding:20,fontSize:13}}>No habit data for this day yet.</div>}
        {/* Day note */}
        <div style={{marginTop:4}}>
          <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>📝 Day Note</div>
          <textarea value={dayNote} onChange={e=>setDayNote(e.target.value)} placeholder="Add a personal note for this day..." style={{width:"100%",height:72,padding:"9px 11px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,resize:"none",lineHeight:1.5}}/>
          <button onClick={saveNote} style={{marginTop:7,padding:"8px 18px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>{saved?"Saved ✓":"Save Note"}</button>
        </div>
      </div>}

      {/* FUTURE: Day Planner */}
      {isFuture&&<div>
        {deadlineGoals.length>0&&<div style={{background:t.accent+"18",border:`1px solid ${t.accent}44`,borderRadius:10,padding:"10px 12px",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.accent,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>📌 Goal Deadlines on this day</div>
          {deadlineGoals.map(g=>{
            const done=g.actions.filter(a=>a.done).length;
            const pct=g.actions.length>0?Math.round((done/g.actions.length)*100):0;
            const pCol=g.priority==="High"?t.danger:g.priority==="Medium"?t.accent:t.success;
            return(<div key={g.id} style={{padding:"8px 10px",background:t.card,borderRadius:9,marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <div style={{fontSize:13,fontWeight:700,color:t.text}}>{g.title}</div>
                <span style={{fontSize:12,fontWeight:700,color:pct===100?t.success:t.accent}}>{pct}%</span>
              </div>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                <span style={{fontSize:9,padding:"1px 6px",borderRadius:8,background:pCol+"22",color:pCol,fontWeight:700}}>{g.priority}</span>
                <div style={{fontSize:9,color:t.muted}}>{done}/{g.actions.length} actions done</div>
              </div>
            </div>);
          })}
        </div>}
        <div style={{background:t.info+"18",border:`1px solid ${t.info}44`,borderRadius:10,padding:"9px 12px",marginBottom:14,fontSize:12,color:t.info}}>📋 Plan your day ahead — notes save locally</div>
        <textarea value={dayNote} onChange={e=>setDayNote(e.target.value)} placeholder="Plan your day, set intentions, list tasks..." style={{width:"100%",height:110,padding:"10px 12px",borderRadius:12,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,resize:"none",lineHeight:1.6,marginBottom:10}}/>
        <button onClick={saveNote} style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>{saved?"Saved ✓ ":"Save Plan"}</button>
      </div>}
    </Modal>);
  }

  // Calendar grid view
  return(<Modal t={t} close={close} title="📅 Calendar">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <button onClick={()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}} style={{background:t.surface,border:"none",color:t.text,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:18}}>‹</button>
      <span style={{fontWeight:700,fontSize:15,color:t.text}}>{MN[mo]} {yr}</span>
      <button onClick={()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}} style={{background:t.surface,border:"none",color:t.text,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:18}}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:5}}>
      {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:t.muted}}>{d}</div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
      {Array.from({length:fd}).map((_,i)=><div key={`e${i}`}/>)}
      {Array.from({length:days}).map((_,i)=>{
        const d=i+1,ds2=ds(d);
        const hd=habits.filter(h=>h.log&&h.log[ds2]).length;
        const deadlineGoalsOnDay=goals.filter(g=>g.deadline===ds2);
        const hasDeadline=deadlineGoalsOnDay.length>0;
        const isT=ds2===today,isFut=ds2>today;
        // Check if day has a note
        const hasNote=(()=>{try{const n=JSON.parse(localStorage.getItem("hg_day_notes")||"{}");return !!(n[ds2]&&n[ds2].trim());}catch{return false;}})();
        const intensity=habits.length>0?hd/habits.length:0;
        const intensityBg=intensity>=1?"rgba(74,222,128,0.95)":intensity>=0.75?"rgba(74,222,128,0.75)":intensity>=0.5?"rgba(74,222,128,0.5)":intensity>0?"rgba(74,222,128,0.25)":t.surface;
        const textCol=isT?t.accent:isFut?t.info:intensity>=0.75?"#000":t.text;
        return(<div key={d} onClick={()=>openDay(ds2)} style={{borderRadius:6,padding:"3px 1px",textAlign:"center",background:isT?t.accent+"30":isFut?t.surface:intensityBg,border:isT?`2px solid ${t.accent}`:isFut?`1px solid ${t.info}33`:intensity>=0.5?`1px solid rgba(74,222,128,0.4)`:`1px solid ${t.border}`,minHeight:36,cursor:"pointer",transition:"background 0.2s",position:"relative"}}>
          <div style={{fontSize:10,fontWeight:isT?800:400,color:textCol,lineHeight:1.4}}>{d}</div>
          {hd>0&&!isT&&<div style={{fontSize:7,color:intensity>=0.75?"#000":t.success,fontWeight:700}}>{hd}✓</div>}
          {isT&&hd>0&&<div style={{fontSize:7,color:t.accent,fontWeight:700}}>{hd}✓</div>}
          {/* Deadline indicator */}
          {hasDeadline&&<div style={{fontSize:8,lineHeight:1}}>📌</div>}
          {/* Note indicator dot */}
          {hasNote&&<div style={{position:"absolute",top:2,right:2,width:5,height:5,borderRadius:"50%",background:"#60a5fa"}}/>}
          {/* Goal names on future deadline dates (tooltip-style) */}
          {isFut&&hasDeadline&&<div style={{fontSize:6,color:t.accent,lineHeight:1.1,overflow:"hidden",maxHeight:12,textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 2px"}}>{deadlineGoalsOnDay.map(g=>g.title).join(", ")}</div>}
        </div>);
      })}
    </div>
    <div style={{display:"flex",gap:6,marginTop:14,fontSize:10,color:t.muted,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:10,height:10,borderRadius:2,background:"rgba(74,222,128,0.25)",display:"inline-block"}}/>1-25%</span>
      <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:10,height:10,borderRadius:2,background:"rgba(74,222,128,0.5)",display:"inline-block"}}/>50%</span>
      <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:10,height:10,borderRadius:2,background:"rgba(74,222,128,0.95)",display:"inline-block"}}/>100%</span>
      <span>📌 Deadline</span>
      <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:"50%",background:"#60a5fa",display:"inline-block"}}/>Note</span>
      <span style={{color:t.accent}}>● Today</span>
    </div>
    <div style={{marginTop:10,fontSize:11,color:t.muted,textAlign:"center"}}>Tap any date for details or to plan ahead</div>
  </Modal>);
}

const MOODS=[{e:"😞",l:"Rough"},{e:"😕",l:"Low"},{e:"😐",l:"Okay"},{e:"🙂",l:"Good"},{e:"😄",l:"Great"}];
const JTAGS=["Motivated","Peaceful","Focused","Grateful","Sad","Anxious","Excited","Tired"];
const JPROMPTS=["What made today meaningful?","What are you grateful for today?","What challenged you and how did you handle it?","What's one thing you'd do differently tomorrow?","Describe your energy and mood today."];

function JournalModal({t,close,journals,onSave,plan}){
  const today=td();
  function parseEntry(raw){if(raw&&typeof raw==="object")return raw;return{note:raw||"",mood:null,tags:[],title:""};}
  const[sel,setSel]=useState(today);
  const init=parseEntry(journals[today]);
  const[note,setNote]=useState(init.note);
  const[mood,setMood]=useState(init.mood);
  const[tags,setTags]=useState(init.tags||[]);
  const[title,setTitle]=useState(init.title||"");
  const cutoff=plan.jDays===Infinity?null:new Date(Date.now()-plan.jDays*86400000).toISOString().split("T")[0];
  const entries=Object.entries(journals).sort((a,b)=>b[0].localeCompare(a[0])).filter(([d])=>!cutoff||d>=cutoff);
  const wordCount=note.trim().split(/\s+/).filter(Boolean).length;
  const prompt=JPROMPTS[new Date().getDate()%JPROMPTS.length];

  function loadDate(d){
    setSel(d);
    const e=parseEntry(journals[d]);
    setNote(e.note);setMood(e.mood);setTags(e.tags||[]);setTitle(e.title||"");
  }
  function toggleTag(tag){setTags(prev=>prev.includes(tag)?prev.filter(x=>x!==tag):[...prev,tag]);}
  function doSave(){onSave(sel,{note,mood,tags,title});}

  return(<Modal t={t} close={close} title="📓 Journal">
    <input type="date" value={sel} onChange={e=>loadDate(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:14,marginBottom:9}}/>

    {/* Title */}
    <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Entry title (optional)..." style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,marginBottom:9}}/>

    {/* Mood selector */}
    <div style={{marginBottom:9}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Mood</div>
      <div style={{display:"flex",gap:6}}>
        {MOODS.map((m,i)=>(
          <button key={i} onClick={()=>setMood(mood===i?null:i)} style={{flex:1,padding:"7px 4px",borderRadius:10,border:`2px solid ${mood===i?t.accent:t.border}`,background:mood===i?t.accent+"22":t.surface,cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:18}}>{m.e}</div>
            <div style={{fontSize:9,color:mood===i?t.accent:t.muted,fontWeight:700,marginTop:2}}>{m.l}</div>
          </button>
        ))}
      </div>
    </div>

    {/* Tags */}
    <div style={{marginBottom:9}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Tags</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {JTAGS.map(tag=>(
          <button key={tag} onClick={()=>toggleTag(tag)} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${tags.includes(tag)?t.accent:t.border}`,background:tags.includes(tag)?t.accent+"22":t.surface,color:tags.includes(tag)?t.accent:t.muted,cursor:"pointer",fontSize:11,fontWeight:tags.includes(tag)?700:400}}>{tag}</button>
        ))}
      </div>
    </div>

    {/* Note textarea */}
    <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder={prompt} style={{width:"100%",height:100,background:t.surface,border:`1px solid ${t.border}`,borderRadius:12,padding:12,color:t.text,fontSize:13,resize:"vertical",lineHeight:1.6}}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4,marginBottom:10}}>
      <div style={{fontSize:10,color:t.muted}}>{wordCount} word{wordCount!==1?"s":""}</div>
      {cutoff&&(()=>{
        const daysUsed=entries.length;
        const oldest=entries.length>0?entries[entries.length-1][0]:null;
        return(<div onClick={()=>showUp("Upgrade to Pro for full journal history!")} style={{background:t.accent+"12",border:`1px solid ${t.accent}33`,borderRadius:10,padding:"8px 12px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:t.accent}}>📅 Free: last 7 days only</div>
            <div style={{fontSize:10,color:t.muted,marginTop:1}}>Upgrade Pro to unlock full history</div>
          </div>
          <span style={{fontSize:10,fontWeight:700,color:"#000",background:t.accent,padding:"3px 9px",borderRadius:12,flexShrink:0}}>Upgrade ⚡</span>
        </div>);
      })()}
    </div>

    <button onClick={doSave} style={{width:"100%",padding:"11px",borderRadius:12,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",marginBottom:18}}>Save ✓</button>

    {/* Past entries — improved */}
    {entries.length>0&&<div>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Past Entries</div>
      {entries.map(([date,raw])=>{
        const e=parseEntry(raw);
        return(
          <div key={date} onClick={()=>loadDate(date)} style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 12px",marginBottom:8,cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
              <span style={{fontSize:11,color:t.accent,fontWeight:700}}>{fmt(date)}</span>
              {e.mood!=null&&<span style={{fontSize:15}}>{MOODS[e.mood]?.e}</span>}
              {e.title&&<span style={{fontSize:11,fontWeight:700,color:t.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</span>}
            </div>
            {e.tags&&e.tags.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>
              {e.tags.map(tag=><span key={tag} style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:t.accent+"22",color:t.accent}}>{tag}</span>)}
            </div>}
            {e.note&&<div style={{fontSize:12,color:t.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.note}</div>}
          </div>
        );
      })}
    </div>}
  </Modal>);
}

let showToastGlobal=(msg)=>{};// set by App

function AIModal({t,close,plan,showUp,habits,goals,journals,user,setGoals,save,tk}){
  const[tab,setTab]=useState("insights");
  const[credits,setCredits]=useState(null);
  const[insightCache,setInsightCache]=useState(null);
  const[insights,setInsights]=useState([]);
  const[insLoading,setInsLoading]=useState(false);
  const[expandedIns,setExpandedIns]=useState({});
  const[chatHistory,setChatHistory]=useState([]);
  const[chatInput,setChatInput]=useState("");
  const[chatLoading,setChatLoading]=useState(false);
  const[planInput,setPlanInput]=useState("");
  const[planDifficulty,setPlanDifficulty]=useState("medium");
  const[planDeadlineDays,setPlanDeadlineDays]=useState(60);
  const[planResult,setPlanResult]=useState(null);
  const[planLoading,setPlanLoading]=useState(false);
  const[aiHistory,setAiHistory]=useState([]);
  const[openHistItem,setOpenHistItem]=useState(null);
  const[tone,setTone]=useState(localStorage.getItem("hg_ai_tone")||"direct");
  const today=td();
  const MODEL="claude-haiku-4-5-20251001";
  const PLUS_MAX=50;
  const HIST_MAX=20;

  // Load credits from localStorage (Firestore sync deferred)
  useEffect(()=>{
    const key=`hg_ai_credits_${user?.uid||"guest"}`;
    const resetKey=`hg_ai_reset_${user?.uid||"guest"}`;
    const stored=localStorage.getItem(key);
    const resetDate=localStorage.getItem(resetKey);
    const thisMonth=today.slice(0,7);
    if(resetDate!==thisMonth){
      // New month — reset credits
      const maxC=plan.plus?PLUS_MAX:0;
      localStorage.setItem(key,String(maxC));
      localStorage.setItem(resetKey,thisMonth);
      setCredits(maxC);
    } else {
      setCredits(parseInt(stored||"0"));
    }
    // Load history
    try{const h=JSON.parse(localStorage.getItem(`hg_ai_hist_${user?.uid||"guest"}`)||"[]");setAiHistory(h);}catch{}
  },[]);

  function deductCredit(n=1){
    const key=`hg_ai_credits_${user?.uid||"guest"}`;
    const newC=Math.max(0,(credits||0)-n);
    setCredits(newC);
    localStorage.setItem(key,String(newC));
    return newC>=0;
  }

  function saveHistory(type,summary,data){
    const h=[{type,summary,data,date:new Date().toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})},...aiHistory].slice(0,HIST_MAX);
    setAiHistory(h);
    localStorage.setItem(`hg_ai_hist_${user?.uid||"guest"}`,JSON.stringify(h));
  }

  // Build user data context string for AI
  function buildUserContext(){
    const habitSummary=habits.map(h=>{
      const logs=Object.entries(h.log||{}).filter(([,v])=>!!v);
      const recentDays=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
      const now=new Date();
      const dayPattern=Array.from({length:7},(_,i)=>{const d=new Date(now);d.setDate(d.getDate()-i);const day=d.toLocaleDateString("en-US",{weekday:"short"});const key=d.toISOString().split("T")[0];return{day,done:!!(h.log&&h.log[key])};}).reverse();
      const missedDays=dayPattern.filter(d=>!d.done).map(d=>d.day);
      return `- ${h.icon} ${h.name} (streak: ${h.streak}d, total: ${logs.length} days done${missedDays.length?`, missed: ${missedDays.join("/")}`:""})`;
    }).join("\n");

    const goalSummary=goals.map(g=>{
      const doneActs=(g.actions||[]).filter(a=>a.done).length;
      const totalActs=(g.actions||[]).length;
      const pct=totalActs?Math.round(doneActs/totalActs*100):0;
      const daysLeft=g.deadline?Math.ceil((new Date(g.deadline)-new Date())/86400000):null;
      return `- ${g.title} (priority: ${g.priority||"medium"}, ${pct}% done${daysLeft!==null?`, ${daysLeft}d to deadline`:""}${daysLeft<0?" OVERDUE":""})`;
    }).join("\n");

    const recentMoods=Object.entries(journals||{}).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7).map(([d,j])=>`${d}: mood ${j.mood||"-"}/5`).join(", ");

    return `User's habits:\n${habitSummary||"No habits yet"}\n\nUser's goals:\n${goalSummary||"No goals yet"}\n\nRecent mood (last 7 days): ${recentMoods||"No journal entries"}\n\nToday: ${today}\nPlan: ${plan.plus?"Plus":plan.heat?"Pro":"Free"}`;
  }

  const toneInstructions={
    gentle:"You are a warm, supportive habit coach. Be encouraging, never judgmental. Celebrate small wins.",
    direct:"You are a data-driven coach. Be concise and specific. Focus on patterns and actionable steps.",
    strict:"You are a tough-love accountability coach. Be direct and honest. Hold the user to high standards.",
  };

  // ── INSIGHTS ──────────────────────────────────────────────
  async function generateInsights(forceRefresh=false){
    const cacheKey=`hg_ai_insights_${user?.uid||"guest"}`;
    const cacheTime=`hg_ai_insights_time_${user?.uid||"guest"}`;
    const lastTime=parseInt(localStorage.getItem(cacheTime)||"0");
    const sixHours=6*60*60*1000;

    if(!forceRefresh&&Date.now()-lastTime<sixHours&&insightCache){
      setInsights(insightCache);
      return;
    }

    if(forceRefresh&&!deductCredit(2)){
      showToastGlobal("❌ Not enough credits to refresh insights.");
      return;
    }

    setInsLoading(true);
    try{
      const ctx=buildUserContext();
      const resp=await fetch("/api/ai",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:MODEL,
          max_tokens:1200,
          system:`You are an AI habit and goal coach. Analyze the user's data carefully. Return ONLY a JSON array — no markdown, no extra text. Each item MUST follow this exact format: {"icon":"emoji","label":"SHORT TITLE IN CAPS","points":["short point 1","short point 2","short point 3"]}. Rules: each point max 12 words, 3-5 points per insight, NO paragraphs anywhere. Generate exactly 5 insights in this order: 1) Consistency Patterns — which habits/days are weak 2) Goal Risk Alert — deadlines at risk, overdue items 3) Mood-Habit Connection — mood vs habit correlation 4) Priority Focus — what to do TODAY to make progress without burnout, one step at a time 5) Suggestions — priority order from highest to lowest urgency, specific tips to stay consistent, flag any unrealistic goals. Be specific to user's actual data.\n\n${toneInstructions[tone]}`,
          messages:[{role:"user",content:`Analyze my data and give 5 insights:\n\n${ctx}`}]
        })
      });
      const data=await resp.json();
      const raw=data.content[0].text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(raw);
      setInsights(parsed);
      setInsightCache(parsed);
      localStorage.setItem(cacheKey,JSON.stringify(parsed));
      localStorage.setItem(cacheTime,String(Date.now()));
      // ❌ NO auto-save to history — only saved when user taps ⭐
    }catch(e){
      setInsights([{icon:"⚠️",label:"Error",points:["Could not generate insights — please try again","Check your internet connection","Make sure you have habits and goals added"]},{icon:"💡",label:"Tip",points:["Add at least 2-3 habits first","Log your progress for a few days","Then insights will be personalised to your data"]}]);
    }
    setInsLoading(false);
  }

  function starInsights(){
    if(!insights.length)return;
    saveHistory("insights","⭐ Starred insights",insights);
    showToastGlobal("⭐ Insights saved to History!");
  }

  useEffect(()=>{
    if(tab==="insights"&&insights.length===0&&(credits||0)>0){
      // Try cache first (free)
      const cacheKey=`hg_ai_insights_${user?.uid||"guest"}`;
      const cacheTime=`hg_ai_insights_time_${user?.uid||"guest"}`;
      const cached=localStorage.getItem(cacheKey);
      const lastTime=parseInt(localStorage.getItem(cacheTime)||"0");
      if(cached&&Date.now()-parseInt(lastTime)<6*60*60*1000){
        try{setInsights(JSON.parse(cached));setInsightCache(JSON.parse(cached));return;}catch{}
      }
      generateInsights(false);
    }
  },[tab,credits]);

  // ── GOAL PLANNER ──────────────────────────────────────────
  async function generatePlan(){
    if(!planInput.trim())return;
    if((credits||0)<2){showToastGlobal("❌ Need 2 credits to generate a plan.");return;}
    if(!deductCredit(2))return;
    setPlanLoading(true);setPlanResult(null);
    try{
      const deadline=new Date();deadline.setDate(deadline.getDate()+planDeadlineDays);
      const deadlineStr=deadline.toISOString().split("T")[0];
      const resp=await fetch("/api/ai",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:MODEL,
          max_tokens:1200,
          system:`You are an expert goal planning coach. Create a detailed, realistic ${planDeadlineDays}-day action plan. Return ONLY valid JSON, no markdown backticks. Format: {"title":"goal title","priority":"High|Medium|Low","deadline":"${deadlineStr}","notes":"brief AI note about this plan","actions":[{"action":"step name","dueDate":"YYYY-MM-DD","result":"expected outcome"}]} — generate 6-10 actions spread across the timeframe.`,
          messages:[{role:"user",content:`Create a ${planDeadlineDays}-day ${planDifficulty} difficulty plan for: "${planInput}"\n\nToday: ${today}\nDeadline: ${deadlineStr}`}]
        })
      });
      const data=await resp.json();
      const raw=data.content[0].text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(raw);
      setPlanResult(parsed);
      saveHistory("plan",`Generated plan: ${parsed.title}`,parsed);
    }catch(e){
      showToastGlobal("❌ Could not generate plan. Try again.");
    }
    setPlanLoading(false);
  }

  function addPlanToGoals(){
    if(!planResult)return;
    const newGoal={
      id:Date.now(),
      title:planResult.title,
      priority:planResult.priority||"High",
      deadline:planResult.deadline||"",
      notes:(planResult.notes||"")+" [AI-generated plan]",
      done:false,
      createdAt:today,
      actions:(planResult.actions||[]).map((a,i)=>({
        id:i+1,
        action:a.action,
        done:false,
        dueDate:a.dueDate||"",
        result:a.result||"",
      }))
    };
    const updated=[...goals,newGoal];
    setGoals(updated);
    save(habits,updated,journals,tk);
    showToastGlobal(`✅ "${planResult.title}" added to Goals! 🎯`);
    setPlanResult(null);setPlanInput("");
  }

  // ── CHAT ──────────────────────────────────────────────────
  async function sendChat(){
    if(!chatInput.trim()||chatLoading)return;
    if((credits||0)<1){showToastGlobal("❌ Need 1 credit to chat.");return;}
    if(!deductCredit(1))return;
    const userMsg={role:"user",content:chatInput.trim()};
    const updated=[...chatHistory,userMsg];
    setChatHistory(updated);
    setChatInput("");
    setChatLoading(true);
    try{
      const ctx=buildUserContext();
      const resp=await fetch("/api/ai",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:MODEL,
          max_tokens:600,
          system:`You are a personal habit and productivity coach. You know this user's data:\n\n${ctx}\n\n${toneInstructions[tone]}\n\nIMPORTANT FORMATTING RULES: Always respond using bullet points only — never write paragraphs. Each bullet point must be on its own line starting with an emoji. Max 5 bullet points. Each point max 12 words. Be specific to the user's actual data.`,
          messages:updated.slice(-6)
        })
      });
      const data=await resp.json();
      const reply=data.content[0].text;
      const newHist=[...updated,{role:"assistant",content:reply}];
      setChatHistory(newHist);
      // ❌ NOT auto-saved — user must tap ⭐ to save this chat
    }catch(e){
      setChatHistory([...updated,{role:"assistant",content:"• Sorry, I couldn't connect\n• Please try again"}]);
    }
    setChatLoading(false);
  }

  const maxC=plan.plus?PLUS_MAX:0;
  const creditPct=credits!==null?Math.round((credits/maxC)*100):100;
  const creditColor=creditPct>50?t.success:creditPct>20?"#fb923c":t.danger;

  // Non-Plus users — upgrade prompt (but still show history if they have it)
  if(!plan.plus){
    return(<Modal t={t} close={close} title="🤖 AI Coach">
      <div style={{textAlign:"center",padding:"8px 0 16px"}}>
        <div style={{fontSize:48,marginBottom:12}}>🤖</div>
        <div style={{fontSize:16,fontWeight:800,color:"#a78bfa",marginBottom:8}}>AI Coach</div>
        <div style={{background:"#a78bfa18",border:"1px solid #a78bfa33",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#a78bfa",lineHeight:1.6}}>
          💎 AI Coach is exclusively available on the <strong>Plus plan</strong>.<br/>Not available on Free or Pro.
        </div>
        <div style={{fontSize:12,color:t.muted,marginBottom:16,lineHeight:1.6}}>Upgrade to Plus for smart insights, AI goal planner, and personal coaching chat — 50 credits/month.</div>
        <button onClick={()=>{close();showUp("💎 Upgrade to Plus to unlock AI Coach!");}} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:"#a78bfa",color:"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>💎 Upgrade to Plus — ₹149/month</button>
      </div>
    </Modal>);
  }

  return(<Modal t={t} close={close} title="🤖 AI Coach">
    {/* Credits bar */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,padding:"8px 12px",background:t.surface,borderRadius:10,border:`1px solid ${t.border}`}}>
      <div style={{fontSize:11,color:t.muted,fontWeight:600}}>
        {plan.plus?"💎 Plus":"Free"} · Tone:&nbsp;
        <span style={{cursor:"pointer",color:t.accent}} onClick={()=>{const tones=["gentle","direct","strict"];const i=(tones.indexOf(tone)+1)%3;setTone(tones[i]);localStorage.setItem("hg_ai_tone",tones[i]);}}>{tone==="gentle"?"🧘 Gentle":tone==="direct"?"🎯 Direct":"🔥 Strict"} ↻</span>
