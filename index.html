// AI prompt format strings — true top-level constants, accessible from AIModal
// A9: Mo's core voice — locked from the Mo Mascot Guide. Calm, stoic, quietly firm, forward-looking.
// Never hollow praise, never exclamation marks, never preachy — one observation, then silence.
const MO_VOICE="You are Mo — a calm, stoic personal discipline coach, not a hype-man. Quietly firm and always forward-looking: make one clear observation, then stop, never lecture. Never use exclamation marks. Never say hollow things like 'Great job! You're amazing!', 'Don't give up!', or 'I believe in you!'. Speak in short, grounded sentences — warm, but earned, never gushing.";
// B8-Open1: single source of truth for the AI model string — was previously duplicated as a separate
// hardcoded literal in Score Analysis (MomentumScorePage) and the PDF Report (ExportPanel) since those
// live in different functions and couldn't see AIModal's old local const. Now one place to change it.
const MODEL="claude-haiku-4-5-20251001";
// B37: single source of truth for the app's user-facing version number — was previously hardcoded
// separately in the About modal footer and out of sync with what the Updates tab was announcing.
const APP_VERSION="2.0.0";
const PLAN_FORMAT_EXAMPLE='{"title":"goal title","priority":"High|Medium|Low","deadline":"YYYY-MM-DD","successProbability":74,"overview":"1-2 sentence summary of what success looks like","phases":[{"title":"Phase 1: name","dayRange":"Days 1-7","tasks":[{"action":"specific small action","dueDate":"YYYY-MM-DD","time":"30 mins","successCriteria":"measurable outcome"}]}],"todayTask":{"action":"...","time":"...","successCriteria":"..."},"riskFactors":["specific reason this goal commonly fails"],"recoveryPlan":["step if user falls 3+ days behind"],"suggestedHabits":[{"name":"habit name","icon":"emoji","cat":"Health|Learning|Work|Personal","goalCount":0,"goalUnit":""}]}';

// A11: shown when Pro taps a Plus-only AI Coach tab (Planner/Chat/History) instead of the real feature
function LockedAITab({t,showUp,feature,desc}){
  return(
    <div style={{textAlign:"center",padding:"32px 12px"}}>
      <img src="/mo/mo-wink.png" alt="Mo" style={{width:56,height:56,objectFit:"contain",marginBottom:12}} onError={e=>{e.target.style.display="none";}}/>
      <div style={{fontSize:14,fontWeight:800,color:t.text,marginBottom:6}}>{feature} is a Plus feature</div>
      <div style={{fontSize:12,color:t.muted,marginBottom:18,lineHeight:1.6,maxWidth:280,marginLeft:"auto",marginRight:"auto"}}>{desc}</div>
      <button onClick={()=>showUp("Upgrade to Plus for full AI Coach, Planner, Chat and more.")} style={{padding:"10px 22px",borderRadius:11,border:"none",background:"linear-gradient(135deg,#a78bfa,#7c3aed)",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12,boxShadow:"0 4px 14px #a78bfa66"}}>Upgrade to Plus →</button>
    </div>
  );
}

function AIModal({t,close,plan,showUp,habits,goals,journals,user,setGoals,save,tk,navigateTo}){
  const[tab,setTab]=useState("insights");
  const[showAIWinback,setShowAIWinback]=useState(false); // A8: win-back sheet on Free-tier AI Coach dismiss
  const[credits,setCredits]=useState(null);
  const[coachCard,setCoachCard]=useState(null); // Item 8: AI-generated "Coach's Take" — the only part using AI credits
  const[coachCardTime,setCoachCardTime]=useState(()=>{
    try{return parseInt(localStorage.getItem("hg_ai_coach_time_"+(user?.uid||"guest"))||"0");}catch{return 0;}
  });
  const[insLoading,setInsLoading]=useState(false);
  const[expandedIns,setExpandedIns]=useState({});
  const[chatHistory,setChatHistory]=useState([]);
  const[chatInput,setChatInput]=useState("");
  const[chatLoading,setChatLoading]=useState(false);
  const[planInput,setPlanInput]=useState("");
  const[planDifficulty,setPlanDifficulty]=useState("medium");
  const[planDeadlineDays,setPlanDeadlineDays]=useState(60);
  const[planResult,setPlanResult]=useState(null);
  const[expandedPhase,setExpandedPhase]=useState(0); // Item 10: which phase is expanded (Phase 1 by default)
  const[selectedHabits,setSelectedHabits]=useState({}); // Item 10: Habit Bridge checkboxes
  const[planLoading,setPlanLoading]=useState(false);
  const[aiHistory,setAiHistory]=useState([]);
  const[openHistItem,setOpenHistItem]=useState(null);
  const[tone,setTone]=useState(localStorage.getItem("hg_ai_tone")||"direct");
  const today=td();
  const PLUS_MAX=50;
  const PRO_MAX=10; // A4: Pro tier AI Insights credits/month
  const HIST_MAX=20;
  const QUICK_PROMPTS=[["score","Analyze my last week"],["trend","Why did my Momentum drop?"],["trash","Which habit should I delete?"],["refresh","Build a recovery plan for tomorrow"],["target","Review my goals"]];

  // ── Item 8: client-side analytics — instant, free, recomputed on every render from current data ──
  const focusLog=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_focuslog")||"{}");}catch{return{};}})();
  // R14: single source of truth — use getScoreWithDelta (0-1000 scale)
  const _aiScoreData=getScoreWithDelta(habits,goals,journals,focusLog,{active:false,wins:0,activeDays:0});
  const momentumScore=_aiScoreData.score;
  const momentumDelta=_aiScoreData.delta;
  const patterns=detectPatterns(habits,focusLog);
  const forecasts=getGoalForecasts(goals);
  const oneMove=getOneMove(habits,goals,today);
  const momentumLabel=momentumScore>=700?"Strong momentum — keep it up! 🚀":momentumScore>=400?"Building momentum, stay consistent.":"Let's rebuild together, one day at a time.";
  const forecastPoints=forecasts.length>0?forecasts.map(f=>{
    if(f.status==="overdue")return"⚠️ \""+f.title+"\" is overdue — "+f.remaining+" action(s) left.";
    if(f.status==="on-track")return"✅ \""+f.title+"\" on track — "+f.currentPace+"/"+f.neededPace+" actions/week needed.";
    if(f.status==="behind")return"🐢 \""+f.title+"\" behind pace — doing "+f.currentPace+"/wk, needs "+f.neededPace+"/wk.";
    return"▶️ \""+f.title+"\" — "+f.done+"/"+f.total+" actions done, "+f.remaining+" remaining.";
  }):["No active goals with remaining actions to forecast."];
  const patternPoints=patterns.length>0?patterns:["Keep logging for ~2 weeks — patterns will appear here once there's enough data."];
  const momentumCard={icon:"score",label:"MOMENTUM SCORE",points:[momentumScore+"/1000 ("+(momentumDelta>=0?"↑ +":"↓ ")+Math.abs(momentumDelta)+" vs last week)",momentumLabel]};
  const oneMoveCard={icon:"bolt",label:"TODAY'S ONE MOVE",points:[oneMove.text]};
  const patternsCard={icon:"search",label:"PATTERNS DETECTED",points:patternPoints};
  const forecastCard={icon:"target",label:"GOAL FORECAST",points:forecastPoints};
  // A4: Pro = 3 cards (One Move, Patterns, Forecast). Plus = 5 cards (adds Momentum Score + Coach's Take).
  // Momentum Score Analysis stays a separate Pro-only paid action on the Score page (A6/A13) — not part of Pro's Insights set.
  const insights=(plan.plus?[momentumCard,oneMoveCard,patternsCard,forecastCard,coachCard]:[momentumCard,oneMoveCard,patternsCard,forecastCard]).filter(Boolean); // tier-scoped set, used for ⭐ save/history and rendering
  const collapsibleCards=[patternsCard,forecastCard]; // Coach's Take now renders in its own dedicated section (Item 6), not this generic loop

  // Credits: Firebase is source of truth (fixes localStorage-clear causing false resets to 50); localStorage = fast cache
  useEffect(()=>{
    const key="hg_ai_credits_"+(user?.uid||"guest");
    const resetKey="hg_ai_reset_"+(user?.uid||"guest");
    const thisMonth=today.slice(0,7);
    const maxC=plan.plus?PLUS_MAX:(plan.ai?PRO_MAX:0);
    const stored=localStorage.getItem(key);
    const resetDate=localStorage.getItem(resetKey);
    // Instant display from cache while Firebase loads
    if(resetDate===thisMonth&&stored!==null){
      setCredits(parseInt(stored));
    } else {
      setCredits(maxC);
    }
    // Load history (local cache, instant display)
    try{const h=JSON.parse(localStorage.getItem("hg_ai_hist_"+(user?.uid||"guest"))||"[]");setAiHistory(h);}catch{}
    // Firebase is source of truth — sync/reconcile (credits + history, one read)
    if(user?.uid&&window._fb){
      const fbR=window._fb;
      fbR.getDoc(fbR.doc(fbR.db,"users",user.uid)).then(snap=>{
        const data=snap.exists()?snap.data():{};
        const fbMonth=data.aiCreditsResetMonth;
        let finalCredits;
        if(fbMonth!==thisMonth){
          finalCredits=maxC;
          // Reset monthly credits only — aiCreditsBonus carries forward, NOT reset here
          fbR.setDoc(fbR.doc(fbR.db,"users",user.uid),{aiCredits:finalCredits,aiCreditsResetMonth:thisMonth},{merge:true}).catch(e=>console.error("AI credit reset err:",e));
        } else {
          finalCredits=typeof data.aiCredits==="number"?data.aiCredits:maxC;
        }
        setCredits(finalCredits);
        localStorage.setItem(key,String(finalCredits));
        localStorage.setItem(resetKey,thisMonth);
        // Item 22: merge this device's local-only history with Firebase's, so nothing from either device is lost
        const fbHist=Array.isArray(data.aiHistory)?data.aiHistory:[];
        let localHist=[];
        try{localHist=JSON.parse(localStorage.getItem("hg_ai_hist_"+user.uid)||"[]");}catch{}
        const seen=new Set();
        const merged=[...fbHist,...localHist].filter(h=>{
          const hk=(h.type||"")+"|"+(h.summary||"")+"|"+(h.date||"");
          if(seen.has(hk))return false;
          seen.add(hk);return true;
        }).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,HIST_MAX);
        setAiHistory(merged);
        localStorage.setItem("hg_ai_hist_"+user.uid,JSON.stringify(merged));
        fbR.setDoc(fbR.doc(fbR.db,"users",user.uid),{aiHistory:merged},{merge:true}).catch(e=>console.error("AI history sync err:",e));
      }).catch(e=>console.error("AI credit load err:",e));
    }
  },[]);

  function deductCredit(n=1){
    const key="hg_ai_credits_"+(user?.uid||"guest");
    const newC=Math.max(0,(credits||0)-n);
    setCredits(newC);
    localStorage.setItem(key,String(newC));
    if(user?.uid&&window._fb){
      const fbR=window._fb;
      fbR.setDoc(fbR.doc(fbR.db,"users",user.uid),{aiCredits:newC,aiCreditsResetMonth:today.slice(0,7)},{merge:true}).catch(e=>console.error("AI credit save err:",e));
    }
    return newC>=0;
  }

  function saveHistory(type,summary,data){
    const entry={type,summary,data,date:new Date().toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}),ts:Date.now()};
    const h=[entry,...aiHistory].slice(0,HIST_MAX);
    setAiHistory(h);
    localStorage.setItem("hg_ai_hist_"+(user?.uid||"guest"),JSON.stringify(h));
    if(user?.uid&&window._fb){
      const fbR=window._fb;
      fbR.setDoc(fbR.doc(fbR.db,"users",user.uid),{aiHistory:h},{merge:true}).catch(e=>console.error("AI history save err:",e));
    }
  }

  // Build user data context string for AI
  // A10: Challenge-aware AI context (Phase 9 Block 3) — summarizes the user's active friend
  // challenges (own rank + days behind leader) so Insights/Chat can reference real standings.
  async function buildChallengeContext(){
    if(!user?.uid)return "";
    try{
      const snap=await window._fb.getDocs(window._fb.query(window._fb.collection(window._fb.db,"challenges"),window._fb.where("participants","array-contains",user.uid)));
      const active=[];snap.forEach(d=>{const c=d.data();if(c.endDate>=today)active.push({id:d.id,...c});});
      if(active.length===0)return "User has no active friend challenges right now.";
      const lines=await Promise.all(active.slice(0,3).map(async c=>{
        try{
          const pSnap=await window._fb.getDocs(window._fb.collection(window._fb.db,"challenges",c.id,"progress"));
          const prog=[];pSnap.forEach(p=>prog.push(p.data()));
          prog.sort((a,b)=>(b.daysCompleted||0)-(a.daysCompleted||0));
          const myIdx=prog.findIndex(p=>p.uid===user.uid);
          const mine=prog[myIdx];
          const leader=prog[0];
          const behind=leader&&mine?(leader.daysCompleted||0)-(mine.daysCompleted||0):0;
          return "- \""+c.title+"\" ("+c.durationDays+"d): user is rank "+(myIdx+1)+"/"+prog.length+(behind>0?", "+behind+" day(s) behind the leader":behind===0&&prog.length>1?", currently tied for the lead":", currently leading");
        }catch(e){return null;}
      }));
      return "User's active friend challenges:\n"+lines.filter(Boolean).join("\n");
    }catch(e){return "";}// challenges collection/rules unavailable — omit silently, never block the AI call
  }

  async function buildUserContext(){
    const habitSummary=habits.map(h=>{
      const logs=Object.entries(h.log||{}).filter(([,v])=>!!v);
      const recentDays=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
      const now=new Date();
      const dayPattern=Array.from({length:7},(_,i)=>{const d=new Date(now);d.setDate(d.getDate()-i);const day=d.toLocaleDateString("en-US",{weekday:"short"});const key=d.toLocaleDateString("en-CA");return{day,done:!!(h.log&&h.log[key])};}).reverse();
      const missedDays=dayPattern.filter(d=>!d.done).map(d=>d.day);
      return "- "+h.icon+" "+h.name+" (streak: "+h.streak+"d, total: "+logs.length+" days done"+(missedDays.length?", missed: "+missedDays.join("/"):"")+")";
    }).join("\n");

    const goalSummary=goals.map(g=>{
      const doneActs=(g.actions||[]).filter(a=>a.done).length;
      const totalActs=(g.actions||[]).length;
      const pct=totalActs?Math.round(doneActs/totalActs*100):0;
      const daysLeft=g.deadline?Math.ceil((new Date(g.deadline)-new Date())/86400000):null;
      return "- "+g.title+" (priority: "+(g.priority||"medium")+", "+pct+"% done"+(daysLeft!==null?", "+daysLeft+"d to deadline":"")+(daysLeft<0?" OVERDUE":"")+")";
    }).join("\n");

    const recentMoods=Object.entries(journals||{}).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7).map(([d,j])=>d+": mood "+(j.mood??"-")+"/5").join(", ");

    const challengeSummary=await buildChallengeContext();

    return "User's habits:\n"+(habitSummary||"No habits yet")+"\n\nUser's goals:\n"+(goalSummary||"No goals yet")+"\n\nRecent mood (last 7 days): "+(recentMoods||"No journal entries")+"\n\n"+challengeSummary+"\n\nToday: "+today+"\nPlan: "+(plan.plus?"Plus":plan.heat?"Pro":"Free");
  }

  const toneInstructions={
    gentle:MO_VOICE+" Lean warmer here — acknowledge real effort plainly, without gushing.",
    direct:MO_VOICE+" Lean data-first here — lead with the pattern, then the one thing to do about it.",
    strict:MO_VOICE+" Lean firmer here — name what isn't working plainly, then move straight to the next action. Still never shame.",
  };

  // ── INSIGHTS ──────────────────────────────────────────────
  // ── INSIGHTS — Item 6: fully manual now. No auto-generation, ever. Always 2 credits per real
  // generation (first tap or Regenerate) — cached 6h for free re-viewing, blank again after. ──
  async function generateCoachCard(forceRefresh=false){
    const cacheKey="hg_ai_coach_"+(user?.uid||"guest");
    const cacheTime="hg_ai_coach_time_"+(user?.uid||"guest");
    const lastTime=parseInt(localStorage.getItem(cacheTime)||"0");
    const sixHours=6*60*60*1000;

    if(!forceRefresh&&Date.now()-lastTime<sixHours){
      const cached=localStorage.getItem(cacheKey);
      if(cached){try{setCoachCard(JSON.parse(cached));return;}catch{}}
    }

    if(!deductCredit(2)){
      showToastGlobal("❌ Need 2 credits to generate Coach's Take.");
      return;
    }

    setInsLoading(true);
    try{
      const ctx=await buildUserContext();
      const computedSummary="Momentum Score: "+momentumScore+"/1000 ("+(momentumDelta>=0?"+":"")+momentumDelta+" vs last week).\n"
        +"Today's suggested ONE Move: "+oneMove.text+"\n"
        +"Detected patterns: "+(patterns.length?patterns.join(" "):"none yet — not enough data")+"\n"
        +"Goal forecasts: "+forecastPoints.join(" ");
      const idToken1=await window._fb.auth.currentUser.getIdToken();
      const resp=await fetch("/api/ai",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+idToken1},
        body:JSON.stringify({
          creditCost:2,
          usageType:"insights",
          model:MODEL,
          max_tokens:300,
          system:"The app already computed a Momentum Score, a detected pattern, a goal forecast, and a suggested 'one move' for the user — do NOT repeat these numbers back. Your only job is to add the human coaching perspective on top of them. Return ONLY a JSON object — no markdown, no extra text — in this exact format: {\"icon\":\"emoji\",\"label\":\"COACH'S TAKE\",\"points\":[\"short point\",\"short point\"]}. Rules: exactly 2-3 points, each max 14 words, no paragraphs. Point 1: explain the ROOT CAUSE behind why momentum moved (or affirm what's driving good momentum), using the user's actual data — not the score itself. Point 2 (and optional 3): one specific, forward-looking next step tied to their data, reinforcing or building on the suggested ONE Move.\n\n"+toneInstructions[tone],
          messages:[{role:"user",content:"Computed coaching context:\n"+computedSummary+"\n\nMy raw data:\n"+ctx}]
        })
      });
      if(!resp.ok){const errBody=await resp.text();throw new Error("HTTP "+resp.status+": "+errBody.slice(0,180));}
      const data=await resp.json();
      if(data.error)throw new Error("API error: "+(data.error.message||JSON.stringify(data.error)).slice(0,180));
      if(!data.content||!data.content[0]||typeof data.content[0].text!=="string")throw new Error("Unexpected response shape: "+JSON.stringify(data).slice(0,180));
      const raw=data.content[0].text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(raw);
      setCoachCard(parsed);
      localStorage.setItem(cacheKey,JSON.stringify(parsed));
      localStorage.setItem(cacheTime,String(Date.now()));
      setCoachCardTime(Date.now());
      try{window.trackEvent&&window.trackEvent("ai_used",{feature:"insights"});}catch(e){}
      // ❌ NO auto-save to history — only saved when user taps ⭐
    }catch(e){
      console.error("AI coach card error:",e);
      setCoachCard({icon:"⚠️",label:"Coach's Take — Error",points:["Could not reach AI coach — try again","Error: "+String(e.message||e).slice(0,80)]});
    }
    setInsLoading(false);
  }

  function starInsights(){
    if(!insights.length)return;
    const hasCoach=insights.includes(coachCard);
    saveHistory("insights","⭐ Saved insights",insights);
    showToastGlobal(hasCoach?("⭐ Saved "+insights.length+" insights, including Coach's Take"):("⭐ Saved "+insights.length+" insights"));
  }

  // Item 6: passive cache-only preload — shows an already-paid-for result if still within its free
  // 6h re-view window. Never auto-generates a new one; that always requires an explicit tap now.
  useEffect(()=>{
    if(!plan.plus)return;
    const cacheKey="hg_ai_coach_"+(user?.uid||"guest");
    const cacheTime="hg_ai_coach_time_"+(user?.uid||"guest");
    const lastTime=parseInt(localStorage.getItem(cacheTime)||"0");
    if(Date.now()-lastTime<6*60*60*1000){
      const cached=localStorage.getItem(cacheKey);
      if(cached){try{setCoachCard(JSON.parse(cached));}catch{}}
    }
  },[]);

  async function generatePlan(){
    if(!planInput.trim())return;
    if((credits||0)<4){showToastGlobal("❌ Need 4 credits to generate a plan.");return;}
    if(!deductCredit(4))return;
    setPlanLoading(true);setPlanResult(null);setExpandedPhase(0);setSelectedHabits({});
    try{
      const deadline=new Date();deadline.setDate(deadline.getDate()+planDeadlineDays);
      const deadlineStr=deadline.toISOString().split("T")[0];
      const idToken2=await window._fb.auth.currentUser.getIdToken();
      const resp=await fetch("/api/ai",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+idToken2},
        body:JSON.stringify({
          creditCost:4,
          usageType:"planner",
          model:MODEL,
          max_tokens:4000,
          system:"You are an expert execution-focused goal coach. Create a "+planDeadlineDays+"-day "+planDifficulty+"-difficulty plan. Return ONLY valid JSON, no markdown backticks. Format: "+PLAN_FORMAT_EXAMPLE+". Rules: exactly 4 phases covering the full "+planDeadlineDays+"-day timeframe with non-overlapping 'dayRange' values (e.g. 'Days 1-7'); each phase has 2-4 SMALL SPECIFIC tasks (not vague milestones) with realistic 'time' estimates and measurable 'successCriteria', dueDate within that phase's range; 8-16 tasks total across all phases; 'todayTask' = the first task of Phase 1; 'riskFactors' = 2-3 specific reasons THIS goal commonly fails; 'recoveryPlan' = 2-3 concrete steps if the user falls 3+ days behind; 'suggestedHabits' = 1-3 daily/weekly habits that support this goal long-term (goalCount/goalUnit only if count-based, else 0/\"\"); 'successProbability' = realistic 0-100 based on difficulty and timeframe.",
          messages:[{role:"user",content:"Create a "+planDeadlineDays+"-day "+planDifficulty+" difficulty plan for: "+planInput+"\n\nToday: "+today+"\nDeadline: "+deadlineStr}]
        })
      });
      if(!resp.ok){const errBody=await resp.text();throw new Error("HTTP "+resp.status+": "+errBody.slice(0,180));}
      const data=await resp.json();
      if(data.error)throw new Error("API error: "+(data.error.message||JSON.stringify(data.error)).slice(0,180));
      if(!data.content||!data.content[0]||typeof data.content[0].text!=="string")throw new Error("Unexpected response shape: "+JSON.stringify(data).slice(0,180));
      if(data.stop_reason==="max_tokens")throw new Error("Plan was too long to finish — try a shorter duration or a simpler goal.");
      const raw=data.content[0].text.replace(/```json|```/g,"").trim();
      let parsed;
      try{
        parsed=JSON.parse(raw);
      }catch(parseErr){
        throw new Error("Plan generation was cut off — try a shorter duration or a simpler goal.");
      }
      setPlanResult(parsed);
      // Default: all suggested habits pre-checked
      const initSel={};(parsed.suggestedHabits||[]).forEach((h,i)=>initSel[i]=true);
      setSelectedHabits(initSel);
      saveHistory("plan","Generated plan: "+parsed.title,parsed);
      try{window.trackEvent&&window.trackEvent("ai_used",{feature:"planner"});}catch(e){}
    }catch(e){
      console.error("AI plan error:",e);
      showToastGlobal("❌ Plan error: "+String(e.message||e).slice(0,100));
    }
    setPlanLoading(false);
  }

  // Item 10: flatten phases→tasks into the flat actions[] format the Goals system expects (backward-compatible with pre-Item-10 history entries)
  function flattenPlanToActions(data){
    if(data.phases&&data.phases.length>0){
      let id=1;const actions=[];
      data.phases.forEach(ph=>(ph.tasks||[]).forEach(task=>{actions.push({id:id++,action:task.action,done:false,dueDate:task.dueDate||"",result:task.successCriteria||""});}));
      return actions;
    }
    return (data.actions||[]).map((a,i)=>({id:i+1,action:a.action,done:false,dueDate:a.dueDate||"",result:a.result||""}));
  }

  function addPlanToGoals(data){
    data=data||planResult;
    if(!data)return;
    const newGoal={
      id:Date.now(),
      title:data.title,
      priority:data.priority||"High",
      deadline:data.deadline||"",
      notes:(data.overview||"")+" [AI-generated plan]",
      done:false,
      createdAt:today,
      actions:flattenPlanToActions(data)
    };
    const updated=[...goals,newGoal];
    setGoals(updated);
    save(habits,updated,journals,tk);
    showToastGlobal("✅ "+data.title+" added to Goals! 🎯");
    try{window.trackEvent&&window.trackEvent("goal_created",{source:"ai_plan"});}catch(e){}
    if(data===planResult){setPlanResult(null);setPlanInput("");}
  }

  // Item 10: Habit Bridge — inject AI-suggested habits directly into the habit tracker
  function addSuggestedHabits(){
    if(!planResult)return;
    const toAdd=(planResult.suggestedHabits||[]).filter((_,i)=>selectedHabits[i]);
    if(toAdd.length===0)return;
    const newHabits=toAdd.map((h,i)=>{
      const gc=parseInt(h.goalCount)||0;
      return{id:Date.now()+i,name:h.name,cat:h.cat||"Personal",icon:h.icon||"⭐",color:HABIT_COLORS[Math.floor(Math.random()*HABIT_COLORS.length)],freq:"daily",freqDays:[],freqTimes:3,goalCount:gc,goalUnit:h.goalUnit||"",goalCountHistory:[{date:today,count:gc}],reminder:{enabled:false,time:""},streak:0,best:0,log:{}};
    });
    const updated=[...habits,...newHabits];
    save(updated,goals,journals,tk);
    showToastGlobal("✅ "+newHabits.length+" habit"+(newHabits.length>1?"s":"")+" added! 💪");

  // ── CHAT ──────────────────────────────────────────────────
  async function sendChat(quickText){

    if(!deductCredit(1))return;
    const userMsg={role:"user",content:text};
    const updated=[...chatHistory,userMsg];
    setChatHistory(updated);
    setChatInput("");
    setChatLoading(true);
    try{
      const ctx=await buildUserContext();
      const idToken3=await window._fb.auth.currentUser.getIdToken();
      const resp=await fetch("/api/ai",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+idToken3},
        body:JSON.stringify({
          creditCost:1,
          usageType:"chat",
          model:MODEL,
          max_tokens:600,
          system:"Here's this user's data:\n\n"+ctx+"\n\n"+toneInstructions[tone]+"\n\nIMPORTANT FORMATTING RULES: Always respond using bullet points only — never write paragraphs. Each bullet point must be on its own line starting with an emoji. Max 5 bullet points. Each point max 12 words. Be specific to the user's actual data.",
          messages:updated.slice(-6)
        })
      });
      if(!resp.ok){const errBody=await resp.text();throw new Error("HTTP "+resp.status+": "+errBody.slice(0,180));}
      const data=await resp.json();
      if(data.error)throw new Error("API error: "+(data.error.message||JSON.stringify(data.error)).slice(0,180));
      if(!data.content||!data.content[0]||typeof data.content[0].text!=="string")throw new Error("Unexpected response shape: "+JSON.stringify(data).slice(0,180));
      const reply=data.content[0].text;
      const newHist=[...updated,{role:"assistant",content:reply}];
      setChatHistory(newHist);
      try{window.trackEvent&&window.trackEvent("ai_used",{feature:"chat"});}catch(e){}
      // ❌ NOT auto-saved — user must tap ⭐ to save this chat
    }catch(e){
      console.error("AI chat error:",e);
      setChatHistory([...updated,{role:"assistant",content:"• Sorry, I couldn't connect\n• "+String(e.message||e).slice(0,100)}]);
    }
    setChatLoading(false);
  }

function HabitDetailPage({t,habit,habits,setHabits,saveF,back,onShare,onFreeze,plan}){
  const today=td();
  const log=habit.log||{};
  const doneToday=!!log[today];
  const total=Object.entries(log).filter(([d,v])=>isFullDoneOn(habit,d,v)).length;
  const createdDaysAgo=habit.createdAt?Math.max(1,Math.ceil((new Date()-new Date(habit.createdAt))/86400000)):Math.max(1,Object.keys(log).length);
  const rate=Math.min(100,Math.round((total/createdDaysAgo)*100));
  const hColor=habit.color||t.accent;
  const hasGoal=habit.goalCount>0&&habit.goalUnit;
  // Tile count per date — stored in habit log as number or true
  const todayCount=typeof log[today]==="number"?log[today]:doneToday?habit.goalCount:0;
  const goalCount=habit.goalCount||1;
  const tilePct=hasGoal?Math.min(100,Math.round((todayCount/goalCount)*100)):doneToday?100:0;
  // This week
  const week7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week7.push(d.toLocaleDateString("en-CA"));}
  const WLBLS=["Mo","Tu","We","Th","Fr","Sa","Su"];
  // Month calendar
  const now=new Date();const yr=now.getFullYear();const mo=now.getMonth();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const firstDay=new Date(yr,mo,1).getDay();
  const monthDone=Array.from({length:daysInMonth}).filter((_,i)=>{const d=yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(i+1).padStart(2,"0");const v=log[d];return isFullDoneOn(habit,d,v);}).length;
  // Week/month rates — full completion only

// Web Audio sound player
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Resume context (required after user gesture on mobile)
    if(ctx.state==="suspended")ctx.resume();
    const master=ctx.createGain();
    master.connect(ctx.destination);

    if(type==="bell"){
      // Rich bell — doubled oscillators for fullness, much louder
      [880,1760].forEach((freq,layer)=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="sine";
        o.frequency.setValueAtTime(freq,ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(freq/2,ctx.currentTime+1.2);
        g.gain.setValueAtTime(layer===0?0.9:0.4,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.4);
        o.start();o.stop(ctx.currentTime+1.4);
      });

    }else if(type==="beep"){
      // 3 loud sharp beeps
      [0,0.25,0.5].forEach(t2=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="square";o.frequency.value=1000;
        g.gain.setValueAtTime(0.8,ctx.currentTime+t2);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t2+0.18);
        o.start(ctx.currentTime+t2);o.stop(ctx.currentTime+t2+0.2);
      });

    }else if(type==="chime"){
      // Ascending chime — C5 E5 G5 C6
      [523,659,784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="sine";o.frequency.value=f;
        g.gain.setValueAtTime(0,ctx.currentTime+i*0.18);
        g.gain.linearRampToValueAtTime(0.85,ctx.currentTime+i*0.18+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.55);
        o.start(ctx.currentTime+i*0.18);o.stop(ctx.currentTime+i*0.18+0.6);
      });

    }else if(type==="alarm"){
      // Urgent pulsing alarm — 8 fast bursts
      for(let i=0;i<8;i++){
        const f=i%2===0?880:1100;
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="sawtooth";o.frequency.value=f;
        g.gain.setValueAtTime(0.85,ctx.currentTime+i*0.13);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.13+0.11);
        o.start(ctx.currentTime+i*0.13);o.stop(ctx.currentTime+i*0.13+0.12);
      }

    }else if(type==="siren"){
      // Rising siren — good for important reminders
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(master);o.type="sawtooth";
      o.frequency.setValueAtTime(300,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(900,ctx.currentTime+0.4);
      o.frequency.linearRampToValueAtTime(300,ctx.currentTime+0.8);
      o.frequency.linearRampToValueAtTime(900,ctx.currentTime+1.2);
      g.gain.setValueAtTime(0.8,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.4);
      o.start();o.stop(ctx.currentTime+1.4);

    }else if(type==="ding"){
      // Single sharp high ding — minimal, clean
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(master);o.type="sine";o.frequency.value=1400;
      g.gain.setValueAtTime(0.95,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);
      o.start();o.stop(ctx.currentTime+0.85);

    }else if(type==="drum"){
      // Bold percussion thud — great on mobile speakers
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(master);o.type="sine";
      o.frequency.setValueAtTime(200,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(40,ctx.currentTime+0.3);
      g.gain.setValueAtTime(1.0,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
      o.start();o.stop(ctx.currentTime+0.4);
      // noise layer
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.1,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.4;
      const src=ctx.createBufferSource();src.buffer=buf;
      const ng=ctx.createGain();src.connect(ng);ng.connect(master);
      ng.gain.setValueAtTime(0.6,ctx.currentTime);
      ng.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1);
      src.start();

    }else if(type==="trumpet"){
      // Bold fanfare — memorable, hard to miss
      [[392,0],[523,0.15],[659,0.3],[784,0.45]].forEach(([f,t2])=>{
        const o=ctx.createOscillator();const g=ctx.createGain();
        o.connect(g);g.connect(master);o.type="square";o.frequency.value=f;
        g.gain.setValueAtTime(0,ctx.currentTime+t2);
        g.gain.linearRampToValueAtTime(0.7,ctx.currentTime+t2+0.05);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t2+0.35);
        o.start(ctx.currentTime+t2);o.stop(ctx.currentTime+t2+0.4);
      });
    }

    setTimeout(()=>ctx.close(),3000);
  }catch(e){console.log("Sound error:",e);}
}

function fmt12(timeStr){
  if(!timeStr)return"";
  const[h,m]=timeStr.split(":").map(Number);
  const ampm=h>=12?"PM":"AM";
  const h12=h%12||12;
  return h12+":"+String(m).padStart(2,"0")+" "+ampm;
}

// ── C3: FCM SUBSCRIBE HELPER ─────────────────────────────────────
// Requests an FCM registration token and stores it (plus the user's chosen
// check-in time and timezone offset) on their user doc, so the hourly cron
// (/api/push.js) can deliver a single daily push at the right local hour even
// when the app is fully closed. Returns true on success, false otherwise.
// Safe to call repeatedly — getToken is idempotent and returns the same token.
async function subscribeToPush(uid,checkInTime){
  try{
    const fb=window._fb;
    if(!fb||!fb.messaging||!fb.getToken||!uid)return false;
    if(typeof Notification==="undefined"||Notification.permission!=="granted")return false;
    // The SW must be registered & ready before FCM can bind a token to it.
    const reg=await navigator.serviceWorker.ready;
    const token=await fb.getToken(fb.messaging,{vapidKey:fb.VAPID_KEY,serviceWorkerRegistration:reg});
    if(!token)return false;
    // Parse "HH:MM" → hour/minute. Default to 20:00 if missing/invalid.
    let hh=20,mm=0;
    if(typeof checkInTime==="string"&&/^\d{2}:\d{2}$/.test(checkInTime)){
      const p=checkInTime.split(":").map(Number);hh=p[0];mm=p[1];
    }
    // tzOffsetMin: minutes to ADD to UTC to get local time (IST = +330).
    const tzOffsetMin=-new Date().getTimezoneOffset();
    await fb.setDoc(fb.doc(fb.db,"users",uid),{
      fcmToken:token,
      notifEnabled:true,
      checkInHour:hh,
      checkInMinute:mm,
      tzOffsetMin:tzOffsetMin,
      fcmUpdatedAt:new Date().toISOString(),
    },{merge:true});
    return true;
  }catch(e){console.warn("subscribeToPush failed:",e?.message);return false;}
}

    if(!isPaidPlan)return;// Free: view-only, cannot edit
    const next={...prefs,[key]:prefs[key]===false?true:false};
    setPrefsLocal(next);
    _notifStore.prefs=next;
    try{await window._fb.setDoc(window._fb.doc(window._fb.db,"users",uid),{notifPrefs:next},{merge:true});}catch(e){}
  }

  async function enable(){
    if(typeof Notification==="undefined"){
      alert("Notifications not supported here.\n\nTry:\n1. Install app (Add to Home Screen)\n2. Use Chrome on Android\n3. Use desktop Chrome/Firefox");
      return;
    }
    if(Notification.permission==="denied"){
      alert("Notifications blocked!\n\nTo fix:\n1. Tap 🔒 in address bar\n2. Set Notifications → Allow\n3. Refresh page");
      return;
    }
    const p=await Notification.requestPermission();
    setStatus(p);
    if(p==="granted"){setEnabled(true);localStorage.setItem("hg_notif","1");localStorage.setItem("hg_push_asked","1");
      // Sentry JAVASCRIPT-3: new Notification() throws "Illegal constructor" once a service
      // worker is registered, on a real chunk of Chrome/Android users — this was completely
      // unguarded before, so it crashed the whole enable() flow right after permission was
      // already granted. reg.showNotification() is what's actually required in that case.
      try{
        if('serviceWorker' in navigator){
          navigator.serviceWorker.ready.then(reg=>{
            reg.showNotification("⚡ Momentum",{body:"Notifications enabled! 🎉",icon:"/icon-192.png"}).catch(()=>{});
          }).catch(()=>{});
        }else{
          new Notification("⚡ Momentum",{body:"Notifications enabled! 🎉",icon:"/icon-192.png"});
        }
      }catch(e){}
      // C3: register for closed-app FCM push. Use the earliest custom reminder as
      // the daily check-in time; fall back to 20:00 if none set.
      const custom=(reminders||[]).filter(r=>!r.isHabit&&r.time).map(r=>r.time).sort();
      subscribeToPush(uid,custom[0]||"20:00").catch(()=>{});
    }
  }
  function disable(){
    setEnabled(false);
    localStorage.setItem("hg_notif","0");
    // Cross-check finding: this only ever updated local state. The server-side daily
    // push cron (api/push.js) checks Firestore's notifEnabled flag, not anything local —
    // without this write, disabling here did nothing server-side and the daily check-in
    // would keep arriving forever regardless of what the app showed.
    try{
      if(uid&&window._fb){
        window._fb.setDoc(window._fb.doc(window._fb.db,"users",uid),{notifEnabled:false},{merge:true}).catch(()=>{});
      }
    }catch(e){}
  }
  function addReminder(){
    if(!newTime)return;
    if(customReminders.length>=maxReminders&&maxReminders!==Infinity)return;

    setNewTime("08:00");setNewLabel("");

  function removeReminder(id){const u=reminders.filter(r=>r.id!==id);setReminders(u);localStorage.setItem("hg_reminders",JSON.stringify(u));}
  function toggleReminder(id){const u=reminders.map(r=>r.id===id?{...r,enabled:!r.enabled}:r);setReminders(u);localStorage.setItem("hg_reminders",JSON.stringify(u));}

        <span style={{fontSize:12.5,fontWeight:800,color:t.success,display:"inline-flex",alignItems:"center",gap:5}}>✅ Enabled</span>
      </div>
      <button onClick={disable} style={{flexShrink:0,padding:"9px 14px",borderRadius:11,border:"1px solid "+t.danger+"44",background:t.danger+"12",color:t.danger,fontWeight:700,cursor:"pointer",fontSize:12.5,display:"inline-flex",alignItems:"center",gap:5}}>{IC.bellOff(t.danger,14)} Disable</button>
    </div>}
    {/* #36: OS permission may already be granted (installed PWA, earlier interaction) without
        the person ever actually choosing to enable in-app — that's not real opt-in, so show

    {!(status==="granted"&&enabled)&&status!=="denied"&&<button onClick={enable} style={{width:"100%",padding:"12px",borderRadius:11,border:"1px solid "+t.accent,background:t.accent,color:"#000",fontWeight:800,cursor:"pointer",fontSize:14,marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>{IC.bell("#000",15)} Enable Notifications</button>}
    {status==="denied"&&<div style={{background:t.danger+"12",border:"1px solid "+t.danger+"44",borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:11,color:t.danger}}>⚠️ Blocked by browser. Tap 🔒 in address bar → Notifications → Allow, then refresh.</div>}

    {/* N.3: Manage Notifications — per-type toggle list. Pro/Plus can edit; Free
        can view but not edit (soft upsell). Check-in is always locked ON. */}
    {status==="granted"&&<div style={{marginBottom:14}}>
      <button onClick={()=>setShowManage(v=>!v)} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:20,border:"1px solid "+t.border,background:t.surface,color:t.text,cursor:"pointer",fontSize:11.5,fontWeight:700}}>
        <span style={{display:"inline-flex",alignItems:"center",gap:5}}>{IC.sliders(t.text,12)} Manage Notifications</span>
        <span style={{color:t.muted,fontSize:10}}>{showManage?"▲":"▼"}</span>
      </button>
      {showManage&&<div style={{marginTop:8,background:t.surface,borderRadius:11,padding:"10px 12px",display:"flex",flexDirection:"column",gap:10}}>
        {!isPaidPlan&&<div style={{fontSize:10.5,color:t.muted,background:t.accent+"12",border:"1px solid "+t.accent+"33",borderRadius:8,padding:"7px 9px",marginBottom:2}}>
          Free plan shows what's available. <span style={{color:t.accent,fontWeight:700}}>Upgrade to Pro</span> to customize which notifications you get.
        </div>}
        {visibleTypes.map(nt=>{
          const isOn=nt.locked?true:(prefs[nt.key]!==false);
          const editable=isPaidPlan&&!nt.locked;
          return(<div key={nt.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
            <div style={{minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,color:t.text,display:"flex",alignItems:"center",gap:5}}>{nt.label}{nt.locked&&<span style={{fontSize:9,color:t.muted}}>🔒</span>}</div>
              <div style={{fontSize:10,color:t.muted,marginTop:1}}>{nt.desc}</div>
            </div>
            <button
              onClick={()=>editable&&togglePref(nt.key)}

              style={{flexShrink:0,width:40,height:22,borderRadius:11,border:"none",cursor:editable?"pointer":"default",background:isOn?t.accent:t.border,position:"relative",opacity:editable?1:0.6,transition:"background 0.15s"}}>
              <span style={{position:"absolute",top:2,left:isOn?20:2,width:18,height:18,borderRadius:9,background:"#fff",transition:"left 0.15s"}}/>
            </button>
          </div>);
        })}
      </div>}
    </div>}

    {/* Sound selector */}
    {status==="granted"&&<div style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Notification Sound</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {SOUNDS.map(([id,lbl])=>(
          <button key={id} onClick={()=>pickSound(id)} style={{padding:"6px 12px",borderRadius:20,border:"2px solid "+(notifSound===id?t.accent:t.border),background:notifSound===id?t.accent+"22":t.surface,color:notifSound===id?t.accent:t.muted,cursor:"pointer",fontSize:11,fontWeight:notifSound===id?700:400}}>{lbl}</button>
        ))}
      </div>
    </div>}

    {/* Reminders */}
    {status==="granted"&&<>
      <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Reminders ({reminders.filter(r=>!r.isHabit).length}/{maxReminders===Infinity?"∞":maxReminders})</div>
      {reminders.filter(r=>r.isHabit).length>0&&<>
        <div style={{fontSize:10,fontWeight:700,color:t.accent,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6,display:"flex",alignItems:"center",gap:4}}>{IC.flame(t.accent,10)} From Habits</div>
        {reminders.filter(r=>r.isHabit).map(r=>(
        <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 11px",background:r.enabled?t.accent+"10":t.surface,border:"1px solid "+(r.enabled?t.accent+"33":t.border),borderRadius:10,marginBottom:7}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:t.text}}>{r.label}</div>
            <div style={{fontSize:11,color:t.muted,display:"flex",alignItems:"center",gap:3}}>{IC.timer(t.muted,11)} {fmt12(r.time)} · via Habit</div>
          </div>
          <button onClick={()=>toggleReminder(r.id)} style={{background:r.enabled?t.accent+"22":"none",border:"1px solid "+(r.enabled?t.accent:t.border),borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,color:r.enabled?t.accent:t.muted,fontWeight:600}}>{r.enabled?"ON":"OFF"}</button>
        </div>
        ))}
        <div style={{fontSize:10,color:t.muted,marginBottom:10}}>To change or remove habit reminders, edit the habit directly.</div>
      </>}
      {reminders.filter(r=>!r.isHabit).length>0&&<div style={{fontSize:10,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6,display:"flex",alignItems:"center",gap:4}}>{IC.bell(t.muted,10)} Custom</div>}
      {reminders.filter(r=>!r.isHabit).map(r=>(<div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 11px",background:r.enabled?t.accent+"10":t.surface,border:"1px solid "+(r.enabled?t.accent+"33":t.border),borderRadius:10,marginBottom:7}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:t.text}}>{r.label}</div>
            <div style={{fontSize:11,color:t.muted,display:"flex",alignItems:"center",gap:3}}>{IC.timer(t.muted,11)} {fmt12(r.time)}</div>
          </div>
          <button onClick={()=>toggleReminder(r.id)} style={{background:r.enabled?t.accent+"22":"none",border:"1px solid "+(r.enabled?t.accent:t.border),borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,color:r.enabled?t.accent:t.muted,fontWeight:600}}>{r.enabled?"ON":"OFF"}</button>

        </div>

      {!canAdd&&maxReminders!==Infinity&&<div style={{background:t.accent+"12",borderRadius:9,padding:"8px 12px",marginBottom:10,fontSize:11,color:t.accent}}>Upgrade to Pro for unlimited reminders</div>}

        <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="Label (optional)" style={{padding:"8px 10px",borderRadius:9,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:13,flex:1,minWidth:100}}/>
        <button onClick={addReminder} style={{padding:"8px 14px",borderRadius:9,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:13,flexShrink:0}}>+ Add</button>
      </div>}
    </>}
    {/* How it Works — expandable */}
    <div style={{marginTop:12,background:t.surface,border:"1px solid "+t.border,borderRadius:11,overflow:"hidden"}}>
      <button onClick={()=>setShowHowTo(v=>!v)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"none",border:"none",cursor:"pointer",color:t.muted,fontSize:12,fontWeight:600}}>
        <span style={{display:"inline-flex",alignItems:"center",gap:4}}>{IC.info(t.muted,13)} How do notifications work?</span>
        <span style={{fontSize:11}}>{showHowTo?"▲":"▼"}</span>
      </button>
      {showHowTo&&<div style={{padding:"0 14px 14px",fontSize:11,color:t.muted,lineHeight:1.8}}>

        <div style={{fontWeight:700,color:t.text,fontSize:12,marginBottom:8}}>Two kinds of notifications</div>
        <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:14}}>
          {[
            ["bell","Daily check-in from Mo — one motivating nudge a day at your chosen time. Reaches you even when the app is closed."],
            ["check","Your own reminders — habit & custom reminders you set, delivered while the app is open."],
          ].map(([icKey,txt])=>(
            <div key={txt} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
              <span style={{flexShrink:0,display:"flex",alignItems:"center",marginTop:1}}>{IC[icKey]?.(t.accent,12)||icKey}</span>
              <span>{txt}</span>
            </div>
          ))}
        </div>

        <div style={{fontWeight:700,color:t.text,fontSize:12,marginBottom:8}}>Works best when…</div>
        <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:14}}>
          {[
            ["mobile","Using the Momentum app (or added to your home screen) — the daily check-in reaches you even when the app is fully closed."],
            ["bell","Notifications are allowed for Momentum in your phone settings."],
            ["globe","Phone isn't on silent or Do Not Disturb — otherwise it shows silently, no sound."],
          ].map(([icKey,txt])=>(
            <div key={txt} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
              <span style={{flexShrink:0,display:"flex",alignItems:"center",marginTop:1}}>{IC[icKey]?.(t.success,12)||icKey}</span>
              <span>{txt}</span>
            </div>
          ))}
        </div>

        <div style={{fontWeight:700,color:t.text,fontSize:12,marginBottom:8}}>Good to know</div>
        <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:10}}>
          {[
            ["warning","Your daily check-in arrives within your chosen hour, not to the exact minute."],
            ["warning","On iPhone, add Momentum to your Home Screen first — Apple only allows notifications for installed web apps (iOS 16.4+)."],
            ["warning","Your own reminders fire while the app is open; the daily check-in is the one that reaches a closed app."],
          ].map(([icKey,txt])=>(
            <div key={txt} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
              <span style={{flexShrink:0,display:"flex",alignItems:"center",marginTop:1}}>{IC[icKey]?.(t.accent,12)||icKey}</span>
              <span>{txt}</span>
            </div>
          ))}
        </div>

        <div style={{background:t.accent+"12",border:"1px solid "+t.accent+"33",borderRadius:9,padding:"9px 11px",fontSize:11,color:t.accent,lineHeight:1.6}}>
           Tip: install Momentum to your home screen (⋮ → Add to Home Screen), open it from there, and allow notifications — that's the most reliable setup for background alerts.
        </div>
      </div>}
    </div>
  </Modal>);
}

function ChallengeCard({t,habits,user}){
  const CHALLENGE_LIMIT=100; // First 100 completions only
  const KEY="hg_challenge";
  const[data,setData]=useState(()=>{try{return JSON.parse(localStorage.getItem(KEY)||"null");}catch{return null;}});
  const[selectedHabit,setSelectedHabit]=useState(null);
  const[winnerCount,setWinnerCount]=useState(null);
  const today=td();
  const PROOF_DAYS=[1,4,7];

  // Load winner count from Firestore app_stats
  useEffect(()=>{
    const cached=parseInt(localStorage.getItem("hg_challenge_winners")||"0");
    setWinnerCount(cached);
    try{
      if(fb&&fb.getDoc&&fb.doc&&fb.db){
        fb.getDoc(fb.doc(fb.db,"app_stats","challenge")).then(snap=>{
          const c=snap.exists()?(snap.data().winners||0):0;
          setWinnerCount(c);
          localStorage.setItem("hg_challenge_winners",String(c));
        }).catch(()=>{});
      }
    }catch(e){}
  },[]);

  const spotsLeft=winnerCount===null?null:Math.max(0,CHALLENGE_LIMIT-winnerCount);
  const challengeClosed=winnerCount!==null&&winnerCount>=CHALLENGE_LIMIT;

  function save7(d){setData(d);localStorage.setItem(KEY,JSON.stringify(d));}
  function startChallenge(habit){save7({habitId:habit.id,habitName:habit.name,habitIcon:habit.icon,startDate:today,days:{},status:"active"});}
  function resetChallenge(){localStorage.removeItem(KEY);setData(null);setSelectedHabit(null);}

  function markDay(){
    if(!data)return;
    const dayNum=Math.floor((new Date(today+"T12:00:00")-new Date(data.startDate+"T12:00:00"))/86400000)+1;
    if(dayNum<1||dayNum>7||data.days[dayNum])return;
    const habit=habits.find(h=>h.id===data.habitId);
    if(!habit||!habit.log||!habit.log[today]){showToastGlobal("✅ Complete your habit first, then mark the day!");return;}
    const updated={...data,days:{...data.days,[dayNum]:{date:today}}};
    if(Object.keys(updated.days).length>=7)updated.status="completed";
    save7(updated);
  }

  function checkMissed(){
    if(!data||data.status!=="active")return false;
    const dayNum=Math.floor((new Date(today+"T12:00:00")-new Date(data.startDate+"T12:00:00"))/86400000)+1;
    const lastMarked=Math.max(0,...Object.keys(data.days).map(Number));
    return lastMarked>0&&dayNum>lastMarked+1;
  }

  const missed=checkMissed();
  const dayNum=data?Math.min(7,Math.floor((new Date(today+"T12:00:00")-new Date(data.startDate+"T12:00:00"))/86400000)+1):0;
  const daysMarked=data?Object.keys(data.days).length:0;
  const habit=data?habits.find(h=>h.id===data.habitId):null;
  const todayMarked=data&&data.days[dayNum]&&data.days[dayNum].date===today;
  const habitDoneToday=habit&&habit.log&&habit.log[today];
  const isProofDay=PROOF_DAYS.includes(dayNum);

  // ── NOT STARTED ──────────────────────────────────────────────
  if(!data){
    const[showDetails,setShowDetails]=useState(false);
    return(
      <div style={{background:"linear-gradient(135deg,"+t.accent+"14,"+t.accent+"03)",border:"1px solid "+t.accent+"33",borderRadius:12,padding:16}}>
        {/* Minimized header — always visible */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span>{IC.trophy(t.accent,24)}</span>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:challengeClosed?t.muted:t.accent}}>
                {challengeClosed?"7-Day Challenge — Closed":"7-Day Streak Challenge"}
              </div>
              <div style={{fontSize:10,marginTop:1}}>
                {challengeClosed
                  ?<span style={{color:t.danger}}>All 100 spots filled — closed</span>
                  :<span style={{color:t.muted}}>Win <strong style={{color:t.success}}>14 Days Pro FREE</strong>
                    {spotsLeft!==null&&<span style={{color:spotsLeft<=20?t.danger:t.accent}}> · {spotsLeft} spots left</span>}
                  </span>
                }
              </div>
            </div>
          </div>
          {!challengeClosed&&<button onClick={()=>setShowDetails(v=>!v)} style={{padding:"5px 12px",borderRadius:9,border:"1px solid "+t.accent+"33",background:showDetails?t.accent+"22":"none",color:t.accent,cursor:"pointer",fontSize:11,fontWeight:700}}>
            {showDetails?"▲ Hide":"View ▼"}
          </button>}
        </div>

        {/* Closed state */}
        {challengeClosed&&<div style={{marginTop:12,padding:"12px 14px",background:t.danger+"12",border:"1px solid "+t.danger+"33",borderRadius:10,textAlign:"center"}}>
          <div style={{fontSize:13,fontWeight:700,color:t.danger,marginBottom:4,display:"flex",alignItems:"center",gap:4}}>{IC.lock(t.danger,13)} Challenge Closed</div>
          <div style={{fontSize:11,color:t.muted,lineHeight:1.6}}>All 100 early winner spots have been filled. The challenge is no longer accepting new completions. Stay tuned for the next challenge!</div>

  // ── MISSED DAY ──────────────────────────────────────────────

  // ── COMPLETED ──────────────────────────────────────────────

        {challengeClosed
          ?<div style={{padding:"14px",borderRadius:12,background:t.danger+"18",border:"1px solid "+t.danger+"44",textAlign:"center",marginBottom:10}}>

            <div style={{fontSize:12,color:t.muted,lineHeight:1.7}}>All 100 spots have been claimed. You completed the challenge but unfortunately the limit was reached before your submission. Stay tuned for the next round!</div>
          </div>
          :<>
            {spotsLeft!==null&&spotsLeft<=20&&spotsLeft>0&&<div style={{background:t.danger+"12",border:"1px solid "+t.danger+"33",borderRadius:10,padding:"9px 12px",marginBottom:12,fontSize:11,color:t.danger,fontWeight:700,textAlign:"center"}}>

            <a href={CHALLENGE_FORM} target="_blank" style={{display:"block",width:"100%",padding:"14px",borderRadius:12,background:t.success,color:"#000",fontWeight:700,fontSize:15,textAlign:"center",textDecoration:"none",marginBottom:10}}>

        <div style={{fontSize:10,color:t.muted,textAlign:"center",marginBottom:12}}>We verify within 48 hours · No payment needed</div>
        <button onClick={resetChallenge} style={{width:"100%",padding:"9px",borderRadius:12,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:12}}>Start New Challenge</button>
      </div>
    );
  }

  // ── ACTIVE ──────────────────────────────────────────────────
  return(
    <div style={{background:"linear-gradient(135deg,"+t.accent+"14,"+t.accent+"03)",border:"1px solid "+t.accent+"33",borderRadius:12,padding:16}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontSize:13,fontWeight:800,color:t.accent,display:"flex",alignItems:"center",gap:5}}>{IC.trophy(t.accent,14)} Challenge Active</div>
          <div style={{fontSize:11,color:t.muted,marginTop:2}}>{data.habitIcon} {data.habitName}</div>
          <div style={{fontSize:10,color:t.muted,marginTop:1}}>Started {data.startDate}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:22,fontWeight:800,color:t.accent}}>Day {dayNum}<span style={{fontSize:13,color:t.muted,fontWeight:400}}>/7</span></div>
          <div style={{fontSize:10,color:t.muted}}>{daysMarked} of 7 marked</div>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{height:4,background:t.border,borderRadius:4,marginBottom:14}}>
        <div style={{height:"100%",width:(daysMarked/7)*100+"%",background:t.accent,borderRadius:4,transition:"width 0.4s"}}/>
      </div>

      {/* 7-day dot grid */}
      <div style={{display:"flex",gap:4,marginBottom:14}}>
        {Array.from({length:7}).map((_,i)=>{
          const marked=data.days[i+1];
          const isToday2=(i+1)===dayNum;
          const isPast=(i+1)<dayNum&&!marked;
          const isFuture=(i+1)>dayNum;
          const isProof=PROOF_DAYS.includes(i+1);
          return(<div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{width:"100%",aspectRatio:"1",borderRadius:8,background:marked?"#4ade8033":isToday2?t.accent+"22":isPast?t.danger+"22":t.surface,border:"2px solid "+(marked?"#4ade80":isToday2?t.accent:isPast?t.danger:t.border),display:"flex",alignItems:"center",justifyContent:"center",marginBottom:3,position:"relative",transition:"all 0.2s"}}>
              <span style={{fontSize:11}}>{marked?"✅":isToday2?"👆":isPast?"❌":""}</span>
              {isProof&&!isFuture&&<span style={{position:"absolute",top:-5,right:-5,fontSize:8,background:isProof&&marked?t.success:t.accent,borderRadius:4,padding:"0 2px",color:"#000",fontWeight:700}}>📸</span>}
            </div>
            <span style={{fontSize:9,color:isToday2?t.accent:t.muted,fontWeight:isToday2?700:400}}>D{i+1}</span>
          </div>);
        })}
      </div>

      {/* Proof day reminder */}
      {isProofDay&&!todayMarked&&(
        <div style={{background:t.accent+"18",border:"1px solid "+t.accent+"44",borderRadius:10,padding:"9px 12px",marginBottom:12,display:"flex",gap:8,alignItems:"flex-start"}}>
          <span style={{flexShrink:0}}>{IC.camera(t.muted,16)}</span>
          <div style={{fontSize:11,color:t.text,lineHeight:1.6}}>
            <strong>Day {dayNum} is a proof day!</strong> After completing your habit, post it on Instagram/WhatsApp Stories — you'll need this screenshot for the form.
          </div>
        </div>
      )}

      {/* Today's action */}
      {!todayMarked&&dayNum<=7&&(
        <div style={{marginBottom:12}}>
          {!habitDoneToday
            ?<div style={{background:t.surface,borderRadius:10,padding:12,fontSize:12,color:t.muted,textAlign:"center",lineHeight:1.6}}>
                ⏳ Complete <strong style={{color:t.text}}>{data.habitIcon} {data.habitName}</strong> today first, then come back to mark Day {dayNum}
              </div>
            :<button onClick={markDay} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:14,animation:"fadeIn 0.3s ease"}}>
                ✅ Mark Day {dayNum} Complete!{isProofDay?" (don't forget your screenshot!)":""}
              </button>}
        </div>
      )}
      {todayMarked&&(
        <div style={{background:t.success+"18",border:"1px solid "+t.success+"44",borderRadius:10,padding:10,textAlign:"center",marginBottom:12,fontSize:12,color:t.success,fontWeight:700}}>
          ✅ Day {dayNum} marked! {7-daysMarked>0?7-daysMarked+" more days to go 💪":"All 7 done! Submit below 🎉"}
        </div>
      )}

      {/* Proof checklist */}
      <div style={{background:t.surface,borderRadius:10,padding:12,marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>📸 Screenshot Checklist</div>
        {PROOF_DAYS.map(d=>{
          const done=data.days[d];
          const future=d>dayNum;
          return(
            <div key={d} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:d!==7?"1px solid "+t.border:"none",opacity:future?0.4:1}}>
              <span style={{fontSize:14}}>{done?"✅":future?"⬜":"❌"}</span>
              <div style={{flex:1}}>
                <span style={{fontSize:11,color:done?t.success:future?t.muted:t.text,fontWeight:done?700:400}}>Day {d} post screenshot</span>
                {done&&<span style={{fontSize:9,color:t.muted,marginLeft:6}}>{done.date}</span>}
                {!done&&!future&&<span style={{fontSize:9,color:t.danger,marginLeft:6}}>Post on Instagram/WhatsApp now!</span>}
                {future&&<span style={{fontSize:9,color:t.muted,marginLeft:6}}>upcoming</span>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Submit + restart */}
      <div style={{display:"flex",gap:8}}>
        <a href={CHALLENGE_FORM} target="_blank" style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid "+t.accent+"44",background:t.accent+"12",color:t.accent,fontWeight:700,fontSize:11,textAlign:"center",textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
          <span style={{display:"inline-flex",alignItems:"center",gap:5}}>{IC.plan("#000",13)} Submit Form</span>
        </a>
        <button onClick={resetChallenge} style={{padding:"10px 12px",borderRadius:10,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:11,fontWeight:600}}>Restart</button>
      </div>
    </div>
  );
}

function ExportPanel({t,habits,goals,journals,goalStats,displayName,canPDF=false,user,isPlus=false}){
  const[exporting,setExporting]=useState(null); // null | "habits_csv_plain" | "goals_csv" | "journal_csv" | "pdf"
  const[range,setRange]=useState("30"); // "30" | "90" | "all"

  function downloadCSV(filename,rows,skipBOM){
    const csv=rows.map(r=>r.map(cell=>{
      const s=String(cell==null?"":cell);
      return s.includes(",") || s.includes('"')||s.includes("\n") ? '"'+s.replace(/"/g,'""')+'"' : s;
    }).join(",")).join("\n");
    // Item 33: prepend UTF-8 BOM — without it, Excel/Sheets misreads emoji/multi-byte characters as garbled text.
    // B17: pure-ASCII exports (Goals — no emoji anywhere in its data) skip the BOM entirely, since some
    // apps that don't recognize a BOM render its raw bytes as a visible "ï»¿" artifact — and an export
    // with no multi-byte content doesn't need the signal in the first place.
    const blob=new Blob([(skipBOM?"":"\uFEFF")+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
  }

  // Item 36: strips emoji/symbols down to plain ASCII — used by the Plain Text fallback export for apps (e.g. Google Sheets Android) that misrender emoji on import
  function toPlainAscii(str){
    return String(str||"")
      .replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{2190}-\u{21FF}\u{FE0F}\u{200D}]/gu,"")
      .replace(/\s{2,}/g," ")
      .trim();
  }

  // Item: extracted so both the standalone Habits CSV export and the new Data Pack ZIP can reuse identical logic
  function habitSummaryRows(plain){
    const cutoffDays=range==="all"?3650:parseInt(range);
    const rows=[["Habit","Category","Streak","Best Streak","Total Done","Completion Rate","Days Tracked","Created On"]];
    habits.forEach(h=>{
      const total=Object.keys(h.log||{}).filter(d=>isFullDoneOn(h,d,h.log[d])).length;
      const createdAt=h.createdAt||Object.keys(h.log||{}).sort()[0]||new Date().toLocaleDateString("en-CA");
      const createdDaysAgo=Math.max(1,Math.ceil((new Date()-new Date(createdAt+"T00:00:00"))/86400000));
      const daysTracked=Math.min(cutoffDays,createdDaysAgo);
      const rate=Math.min(100,Math.round((total/createdDaysAgo)*100));
      rows.push([plain?toPlainAscii(h.name):(h.icon||"")+" "+h.name,h.cat||"",(h.streak||0)+"d",(h.best||0)+"d",total,rate+"%",daysTracked+" days",createdAt]);
    });
    return rows;
  }
  function habitDailyLogRows(datesAsc,plain){
    const rows=[["Date",...habits.map(h=>plain?toPlainAscii(h.name):(h.icon||"")+" "+h.name)]];
    datesAsc.forEach(date=>{
      const row=[date];
      habits.forEach(h=>{
        const v=h.log&&h.log[date];
        if(!v){row.push("");}
        else if(goalCountAt(h,date)>0&&h.goalUnit){const gc=goalCountAt(h,date);row.push(typeof v==="number"?v+"/"+gc:"✓");}
        else{row.push("✓");}
      });
      rows.push(row);
    });
    return rows;
  }


  // Item 36: plain-ASCII fallback — identical data, habit names stripped of emoji for apps that misrender them on CSV import
  function exportHabitsCSVPlain(){
    setExporting("habits_csv_plain");
    const cutoffDays=range==="all"?3650:parseInt(range);
    const dates=[];
    for(let i=0;i<cutoffDays;i++){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toLocaleDateString("en-CA"));}
    const datesAsc=[...dates].reverse();
    const rows=[["HABIT SUMMARY"],...habitSummaryRows(true),[],["DAILY LOG"],...habitDailyLogRows(datesAsc,true)];
    downloadCSV("momentum-habits-plain-"+range+"days-"+new Date().toISOString().split("T")[0]+".csv",rows);
    setTimeout(()=>setExporting(null),1000);
  }

  function goalsRows(){
    const rows=[["Goal","Priority","Deadline","Created","Progress%","Actions Total","Actions Done","Action","Action Done","Completed Date","Expected Result"]];
    goals.forEach(g=>{
      const done=g.actions.filter(a=>a.done).length;
      const pct=g.actions.length>0?Math.round(done/g.actions.length*100):0;
      if(g.actions.length===0){
        rows.push([g.title,g.priority||"",g.deadline||"",g.createdAt||"",pct+"%",0,0,"","","",""]);
      } else {
        g.actions.forEach((a,i)=>{
          rows.push([i===0?g.title:"",i===0?g.priority||"":"",i===0?g.deadline||"":"",i===0?g.createdAt||"":"",i===0?pct+"%":"",i===0?g.actions.length:"",i===0?done:"",a.action||"",a.done?"Yes":"No",a.doneAt||"",a.result||""]);
        });
      }
    });
    return rows;
  }
  function exportGoalsCSV(){
    setExporting("goals_csv");
    downloadCSV("momentum-goals-"+new Date().toISOString().split("T")[0]+".csv",goalsRows(),true);
    setTimeout(()=>setExporting(null),1000);
  }

  function journalRows(){
    const MOODS=["Rough","Low","Okay","Good","Great"];
    const cutoffDays=range==="all"?3650:parseInt(range);
    const rows=[["Date","Title","Mood","Mood Score","Tags","Entry","Word Count"]];
    Object.entries(journals).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,raw])=>{
      const daysAgo=Math.floor((new Date()-new Date(date+"T12:00:00"))/86400000);
      if(daysAgo>cutoffDays)return;
      const e=typeof raw==="object"?raw:{note:raw||"",mood:null,tags:[],title:""};
      const wc=(e.note||"").trim().split(/\s+/).filter(Boolean).length;
      rows.push([date,e.title||"",e.mood!=null?MOODS[e.mood]:"",e.mood!=null?e.mood+1:"",(e.tags||[]).join("; "),e.note||"",wc]);
    });
    return rows;
  }
  function exportJournalCSV(){
    setExporting("journal_csv");
    downloadCSV("momentum-journal-"+range+"days-"+new Date().toISOString().split("T")[0]+".csv",journalRows());
    setTimeout(()=>setExporting(null),1000);
  }

  // AI Coach Review credit check — reads/writes the SAME shared credit pool AIModal uses (hg_ai_credits_{uid} / Firebase aiCredits), Firebase as source of truth
  async function checkAndDeductAICredits(n){
    const uid=user?.uid;
    const thisMonth=new Date().toISOString().slice(0,7);
    const key="hg_ai_credits_"+(uid||"guest");
    const resetKey="hg_ai_reset_"+(uid||"guest");
    const maxC=isPlus?50:0;
    let current=maxC;
    if(uid&&window._fb){
      try{
        const fbR=window._fb;
        const snap=await fbR.getDoc(fbR.doc(fbR.db,"users",uid));
        const data=snap.exists()?snap.data():{};
        current=data.aiCreditsResetMonth===thisMonth&&typeof data.aiCredits==="number"?data.aiCredits:maxC;
      }catch(e){
        const stored=localStorage.getItem(key),resetDate=localStorage.getItem(resetKey);
        current=resetDate===thisMonth&&stored!==null?parseInt(stored):maxC;
      }
    } else {
      const stored=localStorage.getItem(key),resetDate=localStorage.getItem(resetKey);
      current=resetDate===thisMonth&&stored!==null?parseInt(stored):maxC;
    }
    if(current<n)return false;
    const newC=current-n;
    localStorage.setItem(key,String(newC));
    localStorage.setItem(resetKey,thisMonth);
    if(uid&&window._fb){
      const fbR=window._fb;
      fbR.setDoc(fbR.doc(fbR.db,"users",uid),{aiCredits:newC,aiCreditsResetMonth:thisMonth},{merge:true}).catch(e=>console.error("PDF AI credit save err:",e));
    }
    return true;
  }
  // 3 credits per report — only this section costs anything; the rest of the PDF is pure calculation
  async function buildAICoachReview(habitRows,goalRiskRows,moodSummary){
    if(!isPlus)return{error:"plus"};
    const got=await checkAndDeductAICredits(3);
    if(!got)return{error:"credits"};
    try{
      const habitCtx=habitRows.slice(0,8).map(r=>r.name+": "+r.rate+"% ("+r.streak+"d streak)").join("; ");
      const goalCtx=goalRiskRows.slice(0,6).map(r=>r.title+": "+r.pct+"% done, "+r.riskLabel).join("; ");
      const idToken4=await window._fb.auth.currentUser.getIdToken();
      const resp=await fetch("/api/ai",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+idToken4},
        body:JSON.stringify({
          creditCost:3,
          usageType:"pdf_report",
          model:MODEL,
          max_tokens:900,
          system:"You are an AI habit and goal coach reviewing a user's Momentum app performance data. Return ONLY valid JSON, no markdown backticks. Format: {\"wentWell\":[\"...\"],\"needsImprovement\":[\"...\"],\"bottleneck\":\"...\",\"strategy\":[\"...\"]}. Rules: wentWell = 2-3 specific observations (max 15 words each) using the actual habit/goal names given; needsImprovement = 2-3 specific observations (max 15 words each); bottleneck = one sentence (max 22 words) naming the single biggest blocker; strategy = exactly 4 short concrete actions (max 14 words each) for the next 30 days. Be specific and direct, not generic.",
          messages:[{role:"user",content:"Habits (rate, streak): "+(habitCtx||"none")+"\nGoals (progress, risk): "+(goalCtx||"none")+"\nMood: "+moodSummary}]
        })
      });
      if(!resp.ok){const errBody=await resp.text();throw new Error("HTTP "+resp.status+": "+errBody.slice(0,180));}
      const data=await resp.json();
      if(data.error)throw new Error("API error");
      const raw=data.content[0].text.replace(/```json|```/g,"").trim();
      const parsedReview=JSON.parse(raw);
      try{window.trackEvent&&window.trackEvent("ai_used",{feature:"pdf_report"});}catch(e){}
      return parsedReview;
    }catch(e){
      console.error("AI Coach Review error:",e);
      return{error:"failed"};
    }
  }

  async function exportPDF(){
    setExporting("pdf");
    const MOODS=["Rough","Low","Okay","Good","Great"];

    const WD=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const cutoffDays=range==="all"?3650:parseInt(range);
    const cutoffDate=(()=>{const d=new Date();d.setDate(d.getDate()-(cutoffDays-1));return d.toLocaleDateString("en-CA");})();
    const totalHabitDone=habits.reduce((s,h)=>s+Object.keys(h.log||{}).filter(d=>d>=cutoffDate&&isFullDoneOn(h,d,h.log[d])).length,0);
    const recentJournals=Object.entries(journals).sort((a,b)=>b[0].localeCompare(a[0])).filter(([d])=>Math.floor((new Date()-new Date(d+"T12:00:00"))/86400000)<=cutoffDays).slice(0,10);

    // ── Habit ranking + category performance (pure calc) ──
    const habitRows=habits.map(h=>{
      const total=Object.keys(h.log||{}).filter(d=>isFullDoneOn(h,d,h.log[d])).length;
      const firstDay=h.createdAt||Object.keys(h.log||{}).sort()[0]||new Date().toISOString().split("T")[0];
      const days=Math.max(1,Math.ceil((new Date()-new Date(firstDay+"T00:00:00"))/86400000));
      const rate=Math.min(100,Math.round(total/days*100));
      return{name:h.name,cat:h.cat||"Other",streak:h.streak||0,best:h.best||0,total,rate};
    }).sort((a,b)=>b.rate-a.rate);
    const catMap={};
    habitRows.forEach(r=>{if(!catMap[r.cat])catMap[r.cat]={sum:0,n:0};catMap[r.cat].sum+=r.rate;catMap[r.cat].n++;});
    const catRows=Object.entries(catMap).map(([cat,v])=>({cat,avg:Math.round(v.sum/v.n)})).sort((a,b)=>b.avg-a.avg);
    const bestStreakEver=habits.length>0?Math.max(0,...habits.map(h=>h.best||0)):0;

    // ── Goal deadline-risk analysis (pure calc — threshold logic, not AI) ──
    const goalRiskRows=goals.map(g=>{

      return{title:g.title,priority:g.priority||"",pct,deadline:g.deadline||"-",done,total:g.actions.length,risk,riskLabel};

    // Goals Completed — from goalStats (permanent, never capped), since completed goals move out of the active goals array

    // ── Mood distribution (pure calc) ──

    const dayMins={};
    rangeDates.forEach(d=>{const m=(focusLogPdf[d]&&focusLogPdf[d].totalMin)||0;if(m>0)dayMins[d]=m;});
    const wdFocusTot=[0,0,0,0,0,0,0],wdFocusCnt=[0,0,0,0,0,0,0];

    let mostProdDay="-",bestFocusAvg=-1;
    wdFocusTot.forEach((tot,i)=>{if(wdFocusCnt[i]===0)return;const avg=tot/wdFocusCnt[i];if(avg>bestFocusAvg){bestFocusAvg=avg;mostProdDay=WD[i];}});

    // ── Executive Summary: real Momentum Score (matches the app everywhere else now — was

    const priorStart=(()=>{const d=new Date();d.setDate(d.getDate()-(cutoffDays*2-1));return d.toLocaleDateString("en-CA");})();

  // ── Analytics Summary CSV — single-page rollup, pure calculation, no AI cost ──
  function analyticsSummaryRows(){
    const cutoffDays=range==="all"?3650:parseInt(range);
    const todayStr=new Date().toLocaleDateString("en-CA");
    const cutoffDate=(()=>{const d=new Date();d.setDate(d.getDate()-(cutoffDays-1));return d.toLocaleDateString("en-CA");})();

    // Aggregate completion rate across all habits within the selected range
    let totalDone=0,totalTracked=0;
    habits.forEach(h=>{
      const createdAt=h.createdAt||Object.keys(h.log||{}).sort()[0]||todayStr;
      const createdDaysAgo=Math.max(1,Math.ceil((new Date()-new Date(createdAt+"T00:00:00"))/86400000));
      const daysTracked=Math.min(cutoffDays,createdDaysAgo);
      const done=Object.keys(h.log||{}).filter(d=>d>=cutoffDate&&isFullDoneOn(h,d,h.log[d])).length;
      totalDone+=done;totalTracked+=daysTracked;
    });
    const completionRate=totalTracked>0?Math.round((totalDone/totalTracked)*100):0;
    const bestStreakEver=habits.length>0?Math.max(0,...habits.map(h=>h.best||0)):0;

    // Focus hours from Pomodoro history (localStorage — same source FocusChart uses)
    let focusMins=0;
    try{
      const hist=JSON.parse(localStorage.getItem("hg_pomo_history")||"[]");
      focusMins=hist.filter(s=>s.date&&s.date>=cutoffDate).reduce((s,x)=>s+(x.mins||0),0);
    }catch(e){}

    // Journal days with actual content, within range
    const journalDays=Object.entries(journals).filter(([d,e])=>{
      if(d<cutoffDate)return false;
      const entry=typeof e==="object"?e:{note:e||"",mood:null};
      return (entry.note&&entry.note.trim())||entry.mood!=null;
    }).length;

    const weekdayTotals=[0,0,0,0,0,0,0],weekdayCounts=[0,0,0,0,0,0,0];
    for(let i=0;i<cutoffDays;i++){
