  // ── UI-MS1–MS9: Momentum Score Full Page ─────────────────────────────────────
  function MomentumScorePage(){
    const flNow=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_focuslog")||"{}");}catch{return{};}})();
    const scoreData=getScoreWithDelta(habits,goals,journals,flNow,{active:false,wins:0,activeDays:0},goalStats);
    const score=scoreData.score;
    const delta=scoreData.delta;
    const comp=scoreData.components;

    // A6/A13 nav: scroll to the Score Analysis section when arriving here via AIModal's Momentum Score box
    const scoreAnalysisSectionRef=React.useRef(null);
    React.useEffect(()=>{
      if(scrollToScoreAnalysisFlag){
        scrollToScoreAnalysisFlag=false;
        setTimeout(()=>{scoreAnalysisSectionRef.current?.scrollIntoView({behavior:"smooth",block:"start"});},150);
      }
    },[]);

    // ── MS2: Mo expression based on score/delta
    const moImg=score>800?"/mo/mo-celebrate.png":delta<-20?"/mo/mo-concerned.png":delta>20?"/mo/mo-jump.png":"/mo/mo-analyse.png";

    // R6-B: staggered bar animation state
    const [animate, setAnimate] = React.useState(false);
    React.useEffect(()=>{const timer=setTimeout(()=>setAnimate(true),80);return()=>clearTimeout(timer);},[]);

    // ── MS8: 7-day daily habit completion % (for weekly trend bars)
    const week7=(()=>{const a=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(d.toLocaleDateString("en-CA"));}return a;})();
    const dailyBars=week7.map(d=>{
      const total=habits.length;
      if(total===0)return{d,pct:0,label:new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"narrow"})};
      const done=habits.filter(h=>isFullDoneOn(h,d,h.log&&h.log[d])).length;
      return{d,pct:Math.round(done/total*100),label:new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"narrow"}),isToday:d===today};
    });
    const maxBar=Math.max(...dailyBars.map(b=>b.pct),1);

    // ── MS5: Mo's Assessment — JS template, no API, works all tiers
    const compArr=[
      {key:"habitConsistency",label:"Habit Consistency",val:comp.habitConsistency,max:250},
      {key:"currentStreak",label:"Current Streak",val:comp.currentStreak,max:120},
      {key:"goalCompletion",label:"Goal Completion",val:comp.goalCompletion,max:200},
      {key:"journalHabit",label:"Journal Habit",val:comp.journalHabit,max:100},
      {key:"moodAverage",label:"Mood Average",val:comp.moodAverage,max:50},
      {key:"focusSessions",label:"Focus Sessions",val:comp.focusSessions,max:50},
      {key:"friendChallenges",label:"Friend Challenges",val:comp.friendChallenges,max:50},
      {key:"mastery",label:"Mastery",val:comp.mastery,max:180},
    ];
    const weakest=compArr.reduce((a,b)=>(b.val/b.max)<(a.val/a.max)?b:a,compArr[0]);
    const assessmentMap={
      habitConsistency:"Your habit completion dropped this week — that's costing you the most points right now. Even 1 more habit per day would move the needle.",
      currentStreak:"Your current streak is your biggest lever. Every day you check in adds directly to this score.",
      goalCompletion:"Goal actions are behind this week. Pick the smallest action on your list and do it today — momentum compounds.",
      journalHabit:"You journaled fewer than 4 days this week. Even a one-line entry counts — consistency here is easy points.",
      moodAverage:"Your mood log is incomplete this week. Tracking mood takes 2 seconds and gives Mo more to work with.",
      focusSessions:"No focus sessions logged this week. One 25-minute Pomodoro today adds directly to your score.",
      friendChallenges:"No active challenges this week. Starting one could add up to 50 points by the end of the month.",
      mastery:"Mastery is built from your best-ever streak, goals completed, journal days, lifetime focus hours, and lifetime consistency — all permanent, none of it resets. Every one adds up for good.",
    };
    const isAllStrong=compArr.every(c=>c.val/c.max>=0.6);
    const assessmentText=isAllStrong
      ?"Every component is above 60%. Your Momentum is building — keep this consistency for 2 more weeks."
      :assessmentMap[weakest.key]||"Keep tracking daily — consistency is what moves the score.";

    // Component icons
    const ICONS={habitConsistency:"flame",currentStreak:"bolt",goalCompletion:"target",journalHabit:"journal",moodAverage:"mood",focusSessions:"pomodoro",friendChallenges:"challenge",mastery:"trophy",focusSessions:"⏱️",friendChallenges:"🥊"};

    // ── A6/A13: real AI Score Analysis — separate feature from the free client-computed assessmentText above.
    // Pro: 2 credits per generation, always — 6h cache is just a "don't double-charge for re-viewing" window.
    // Plus: first generation per rolling 12h window is FREE; generating again inside that window costs 2 credits.
    //       Every successful generation (free or paid) restarts a fresh 12h window.
    // Shares the SAME credit pool AIModal uses (hg_ai_credits_{uid} / Firestore aiCredits).
    const[scoreAnalysis,setScoreAnalysis]=React.useState(null);
    const[scoreAnalysisLoading,setScoreAnalysisLoading]=React.useState(false);
    const[scoreAnalysisTime,setScoreAnalysisTime]=React.useState(()=>{
      try{return parseInt(localStorage.getItem("hg_ai_scoreanalysis_time_"+(user?.uid||"guest"))||"0");}catch{return 0;}
    });
    const[nowTick,setNowTick]=React.useState(Date.now()); // ticks every 60s so the "Free in Xh Ym" countdown stays live
    React.useEffect(()=>{const iv=setInterval(()=>setNowTick(Date.now()),60000);return()=>clearInterval(iv);},[]);
    const scoreWindowMs=12*60*60*1000; // Item 5: unified 12h window for both Pro (re-view cache) and Plus (free/paid gate)
    const scoreWithinWindow=(nowTick-scoreAnalysisTime)<scoreWindowMs;
    const scoreMsLeft=Math.max(0,scoreWindowMs-(nowTick-scoreAnalysisTime));
    const scoreHoursLeft=Math.floor(scoreMsLeft/3600000);
    const scoreMinsLeft=Math.floor((scoreMsLeft%3600000)/60000);
    async function deductScoreCredit(n){
      const uid=user?.uid;
      const thisMonth=new Date().toISOString().slice(0,7);
      const key="hg_ai_credits_"+(uid||"guest");
      const resetKey="hg_ai_reset_"+(uid||"guest");
      const maxC=plan.plus?50:(plan.ai?10:0);
      let current=maxC;
      if(uid&&window._fb){
        try{
          const fbR=window._fb;
          const snap=await fbR.getDoc(fbR.doc(fbR.db,"users",uid));
          const data=snap.exists()?snap.data():{};
          current=data.aiCreditsResetMonth===thisMonth&&typeof data.aiCredits==="number"?data.aiCredits:maxC;
        }catch(e){
          const stored=localStorage.getItem(key),resetDate=localStorage.getItem(resetKey);
          current=resetDate===thisMonth&&stored!==null?parseInt(stored):maxC;
        }
      } else {
        const stored=localStorage.getItem(key),resetDate=localStorage.getItem(resetKey);
        current=resetDate===thisMonth&&stored!==null?parseInt(stored):maxC;
      }
      if(current<n)return false;
      const newC=current-n;
      localStorage.setItem(key,String(newC));
      localStorage.setItem(resetKey,thisMonth);
      if(uid&&window._fb){
        const fbR=window._fb;
        fbR.setDoc(fbR.doc(fbR.db,"users",uid),{aiCredits:newC,aiCreditsResetMonth:thisMonth},{merge:true}).catch(e=>console.error("Score analysis credit save err:",e));
      }
      return true;
    }
    // forcePaid: Plus's explicit "Regenerate now (2 credits)" tap. For Pro this plays the role the old forceRefresh did.
    async function generateScoreAnalysis(forcePaid=false){
      const cacheKey="hg_ai_scoreanalysis_"+(user?.uid||"guest");
      const cacheTimeKey="hg_ai_scoreanalysis_time_"+(user?.uid||"guest");

      if(plan.plus){
        // Plus: free unless explicitly forcing a paid regenerate within the still-active window.
        if(forcePaid){
          const got=await deductScoreCredit(2);
          if(!got){showToastGlobal("❌ Not enough credits to regenerate now.");return;}
        }
        // else: free path — no deduction, no cache short-circuit needed since the button that calls
        // this with forcePaid=false is only ever shown once the free window has actually reset.
      } else {
        // Pro: within 12h of last gen, re-viewing is free (no new call); otherwise always 2 credits.
        if(!forcePaid){
          const lastTime=parseInt(localStorage.getItem(cacheTimeKey)||"0");
          if(Date.now()-lastTime<12*60*60*1000){
            const cached=localStorage.getItem(cacheKey);
            if(cached){try{setScoreAnalysis(JSON.parse(cached));return;}catch{}}
          }
        }
        const got=await deductScoreCredit(2);
        if(!got){showToastGlobal("❌ Not enough AI credits for Score Analysis.");return;}
      }
      setScoreAnalysisLoading(true);
      try{
        const compSummary=compArr.map(c=>c.label+": "+c.val+"/"+c.max+" ("+Math.round(c.val/c.max*100)+"%)").join("; ");
        const idToken=await window._fb.auth.currentUser.getIdToken();
        const resp=await fetch("/api/ai",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+idToken},
          body:JSON.stringify({
            creditCost:plan.plus?(forcePaid?2:0):2,
            usageType:"score_analysis",
            model:MODEL,
            max_tokens:250,
            system:"Analyze the user's Momentum Score component breakdown and explain WHY the score is what it is. Return ONLY a JSON object — no markdown, no extra text — in this exact format: {\"icon\":\"emoji\",\"label\":\"SCORE ANALYSIS\",\"points\":[\"point\",\"point\",\"point\"]}. Rules: exactly 3 points, each max 16 words, no paragraphs. Point 1: the single biggest driver of the current score. Point 2: what's holding it back most. Point 3: one specific action that raises it fastest.\n\n"+MO_VOICE,
            messages:[{role:"user",content:"Momentum Score: "+score+"/1000 ("+(delta>=0?"+":"")+delta+" vs last week).\nComponent breakdown: "+compSummary}]
          })
        });
        if(!resp.ok){const errBody=await resp.text();throw new Error("HTTP "+resp.status+": "+errBody.slice(0,180));}
        const data=await resp.json();
        if(data.error)throw new Error("API error: "+(data.error.message||JSON.stringify(data.error)).slice(0,180));
        if(!data.content||!data.content[0]||typeof data.content[0].text!=="string")throw new Error("Unexpected response shape");
        const raw=data.content[0].text.replace(/```json|```/g,"").trim();
        const parsed=JSON.parse(raw);
        setScoreAnalysis(parsed);
        localStorage.setItem(cacheKey,JSON.stringify(parsed));
        localStorage.setItem(cacheTimeKey,String(Date.now()));
        setScoreAnalysisTime(Date.now());
        try{window.trackEvent&&window.trackEvent("ai_used",{feature:"score_analysis"});}catch(e){}
      }catch(e){
        console.error("Score analysis error:",e);
        setScoreAnalysis({icon:"⚠️",label:"Score Analysis — Error",points:["Could not reach Mo — try again."]});
      }
      setScoreAnalysisLoading(false);
    }
    React.useEffect(()=>{
      const cacheKey="hg_ai_scoreanalysis_"+(user?.uid||"guest");
      const cacheTimeKey="hg_ai_scoreanalysis_time_"+(user?.uid||"guest");
      const lastTime=parseInt(localStorage.getItem(cacheTimeKey)||"0");
      const windowMs=12*60*60*1000; // Item 5: unified window
      if(Date.now()-lastTime<windowMs){
        const cached=localStorage.getItem(cacheKey);
        if(cached){try{setScoreAnalysis(JSON.parse(cached));}catch{}}
      }
      // Plus: if the free window has already expired, leave scoreAnalysis blank — "resets to free-generate-again."
    },[]);

    return(
    <div style={{position:"fixed",inset:0,background:t.bg,zIndex:800,display:"flex",flexDirection:"column",animation:"slideInRight 0.25s ease"}}>

      {/* ── MS1: Header bar with back arrow */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px 12px",background:t.card,borderBottom:"1px solid "+t.border,flexShrink:0}}>
        <button onClick={()=>navigateTo("dashboard")} style={{background:"none",border:"none",color:t.muted,fontSize:22,cursor:"pointer",padding:"2px 6px",lineHeight:1}}>‹</button>
        <div style={{fontSize:16,fontWeight:800,color:t.text}}>Momentum Score</div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px 20px 100px"}}>

        {/* ── MS2: Score header — Mo + big number (R5 polish, simplified) */}
        {(()=>{
          // SCORE-8: a true, sustained 1000 is a retention moment, not a dead end — a distinct
          // Legend tier once it's been held for 7+ consecutive days, rather than just another day at Elite.
          const legendDays=(()=>{
            if(score<1000)return 0;
            let d2=0;
            for(let i=0;i<365;i++){
              const dd=new Date();dd.setDate(dd.getDate()-i);
              const key=dd.toLocaleDateString("en-CA");
              const s=i===0?score:_scoreStore.history[key];
              if(s===1000)d2++;else break;
            }
            return d2;
          })();
          const isLegend=legendDays>=7;
          const tierData=isLegend?{label:"Legend 👑",bg:"linear-gradient(135deg,#f5c842,#fff8dc,#f5c842)"}:
            score>=850?{label:"Elite",bg:"linear-gradient(135deg,#f5c842,#f59e0b)"}:
            score>=650?{label:"Momentum",bg:"linear-gradient(135deg,#a78bfa,#7c3aed)"}:
            score>=450?{label:"Strong",bg:"linear-gradient(135deg,#34d399,#10b981)"}:
            score>=250?{label:"Rising",bg:"linear-gradient(135deg,#60a5fa,#3b82f6)"}:
            score>=100?{label:"Building",bg:"linear-gradient(135deg,#f59e0b,#d97706)"}:
            {label:"Dormant",bg:"linear-gradient(135deg,#9ca3af,#6b7280)"};

  // Habits page — Updates 11-14: stats bar, day nav, week dots, category filter
  function HabitsPage(){
    const isToday=viewD===today;
    const[arrowsForId,setArrowsForId]=useState(null); // H2 rework: id of habit currently showing ↑/↓ reorder arrows

    // Day navigation helpers
    function prevDay(){const d=new Date(viewD+"T12:00:00");d.setDate(d.getDate()-1);setViewD(d.toISOString().split("T")[0]);}
    function nextDay(){if(isToday)return;const d=new Date(viewD+"T12:00:00");d.setDate(d.getDate()+1);setViewD(d.toISOString().split("T")[0]);}

    // Update 11: stats bar values
    const doneForDay=habits.filter(h=>{const v=h.log&&h.log[viewD];return isFullDoneOn(h,viewD,v);}).length;
    const bestStreak=habits.length>0?Math.max(...habits.map(h=>h.streak||0)):0;
    // TODAY% — count-based for current day, or past day's completion %
    const viewDUnitsTotal=habits.reduce((s,h)=>{const gc=goalCountAt(h,viewD);if(gc>0)return s+gc;return s+1;},0);
    const viewDUnitsDone=habits.reduce((s,h)=>{const v=h.log&&h.log[viewD];if(!v)return s;const gc=goalCountAt(h,viewD);if(gc>0)return s+(typeof v==="number"?Math.min(v,gc):0);return s+1;},0);
    const todayPctBar=viewDUnitsTotal>0?Math.round(viewDUnitsDone/viewDUnitsTotal*100):0;
    // Streak on that day — for past days, recalculate from that date
    const streakOnDay=isToday?bestStreak:(()=>{
      const best=habits.length>0?Math.max(...habits.map(h=>{
        let s=0;const d=new Date(viewD+"T12:00:00");
        while(true){const ds=d.toLocaleDateString("en-CA");const v=h.log&&h.log[ds];const full=isFullDoneOn(h,ds,v);if(!full)break;s++;d.setDate(d.getDate()-1);}
        return s;
      }),0):0;
      return best;
    })();

    // Update 13: last 7 days for week dots
    function getLast7(){const arr=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);arr.push(d.toLocaleDateString("en-CA"));}return arr;}
    const week7=getLast7();

    // Update 14: unique cats for filter tabs
    const allCats=["All",...[...new Set(habits.map(h=>h.cat))].filter(Boolean)];
    const filtered=catFilter==="All"?habits:habits.filter(h=>h.cat===catFilter);

    // H2 rework: tap-arrows reorder replaces the old continuous-drag system.
    // Long-press a capsule → ↑/↓ arrows appear on it → tap an arrow to move it one position → arrows
    // auto-dismiss on any tap outside them, or on browser/phone back navigation.
    function moveHabit(hid,dir){
      setHabits(prev=>{
        const arr=[...prev];
        const idx=arr.findIndex(h=>h.id===hid);
        const swapIdx=idx+dir;
        if(idx===-1||swapIdx<0||swapIdx>=arr.length)return prev;
        [arr[idx],arr[swapIdx]]=[arr[swapIdx],arr[idx]];
        save(arr,goals,journals,tk);
        return arr;
      });
    }
    useEffect(()=>{
      if(!arrowsForId)return;
      function handleOutside(e){
        if(e.target.closest&&e.target.closest('[data-reorder-arrows="1"]'))return;
        setArrowsForId(null);
      }
      function handlePop(){setArrowsForId(null);}
      document.addEventListener("pointerdown",handleOutside,true);
      window.addEventListener("popstate",handlePop);
      return()=>{
        document.removeEventListener("pointerdown",handleOutside,true);
        window.removeEventListener("popstate",handlePop);
      };
    },[arrowsForId]);

    // Long-press the capsule itself to reveal the reorder arrows — replaces the old always-visible grip-dot handle.
    // Buttons and the checkbox are excluded so normal taps still work; a real drag/scroll gesture cancels the timer before it fires.
    const longPressTimer=useRef(null);
    const longPressStart=useRef({x:0,y:0});
    function startLongPress(e,hid){
      if(e.target.closest&&e.target.closest("button,[data-checkbox]"))return;
      const pt=e.touches?e.touches[0]:e;
      longPressStart.current={x:pt.clientX,y:pt.clientY};
      longPressTimer.current=setTimeout(()=>{
        if(navigator.vibrate)navigator.vibrate(20);
        setArrowsForId(hid);
        longPressTimer.current=null;
      },3500);
    }
    function moveLongPress(e){
      if(!longPressTimer.current)return;
      const pt=e.touches?e.touches[0]:e;
      if(Math.abs(pt.clientX-longPressStart.current.x)>10||Math.abs(pt.clientY-longPressStart.current.y)>10){
        clearTimeout(longPressTimer.current);longPressTimer.current=null;
      }
    }
    function endLongPress(){
      if(longPressTimer.current){clearTimeout(longPressTimer.current);longPressTimer.current=null;}
    }

    return(
    <div>
      {/* ── UI-H1: Shared AppHeader ── */}
      <AppHeader t={t} user={user} displayName={displayName} pk={pk} onCalendar={()=>openModal("calendar")} onNotif={()=>openModal("notif")} onProfile={()=>{window.history.pushState({showHamburger:true,page:page},"","/");setShowHamburger(true);}} navMuted={navMuted} onUp={()=>showUp("Unlock AI insights, score analysis, challenge creation, unlimited habits, goals, heatmaps & more!")}/>

      {isToday&&habits.length>0&&doneForDay===habits.length&&<div style={{background:premiumCard(t,t.success),border:"1px solid "+t.success+"44",borderRadius:14,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:10,animation:"fadeIn 0.4s ease",boxShadow:premiumShadow(t,t.success)}}>
        <span style={{fontSize:22}}>🎉</span>
        <div>
          <div style={{fontSize:13,fontWeight:800,color:t.success}}>All Habits Done Today!</div>
          <div style={{fontSize:11,color:t.muted}}>Incredible discipline. Keep the streak alive! 🔥</div>
        </div>
      </div>}

      {/* Update 11: Stats bar */}

              <button key={p} onClick={()=>{_newGPriority.current=p;setNewGPriorityState(p);}} style={{flex:1,padding:"7px 4px",borderRadius:9,border:"1px solid "+(newGPriorityState===p?(p==="High"?t.danger:p==="Medium"?t.accent:t.success):t.border),background:newGPriorityState===p?(p==="High"?t.danger+"18":p==="Medium"?t.accent+"18":t.success+"18"):t.surface,color:newGPriorityState===p?(p==="High"?t.danger:p==="Medium"?t.accent:t.success):t.muted,cursor:"pointer",fontSize:11,fontWeight:newGPriorityState===p?700:400,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:4}}><span style={{width:7,height:7,borderRadius:"50%",background:col,display:"inline-block",flexShrink:0}}/>{p}</button>
            ))}
          </div>
        </div>

        {/* Deadline */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:t.muted,fontWeight:700,marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>Deadline <span style={{fontWeight:400,textTransform:"none"}}>(optional)</span></div>
          <input type="date" defaultValue={_newGDeadline.current} onChange={e=>_newGDeadline.current=e.target.value} style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid "+t.border,background:t.surface,color:t.text,colorScheme:t.mode||"dark"}}/>
        </div>

        {/* Notes */}
        <textarea defaultValue={_newGNotes.current} onChange={e=>_newGNotes.current=e.target.value} placeholder="Notes, motivation, context..." maxLength={500} style={{width:"100%",height:56,padding:"9px 12px",borderRadius:10,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:13,resize:"none",marginBottom:14}}/>

        {/* Action Steps — use refs to prevent keyboard dismiss */}
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:t.text,textTransform:"uppercase",letterSpacing:0.5,display:"flex",alignItems:"center",gap:4}}>{IC.bolt(t.accent,11)} Action Steps</div>
            <button onClick={()=>setNewGActions(a=>[...a,{action:"",result:"",dueDate:"",dueTime:""}])} style={{padding:"4px 10px",borderRadius:8,border:"1px solid "+t.accent+"44",background:t.accent+"12",color:t.accent,cursor:"pointer",fontSize:11,fontWeight:700}}>+ Add Step</button>
          </div>
          {newGActions.length===0&&<div style={{fontSize:12,color:t.muted,padding:"10px 12px",background:t.surface,borderRadius:9,textAlign:"center"}}>No steps yet — tap "+ Add Step" to break this goal down</div>}
          {newGActions.map((a,i)=>(
            <div key={i} style={{background:t.surface,borderRadius:10,padding:10,marginBottom:8,border:"1px solid "+t.border}}>
              <div style={{display:"flex",gap:7,marginBottom:7,alignItems:"center"}}>
                <span style={{fontSize:11,color:t.muted,fontWeight:700,flexShrink:0}}>#{i+1}</span>
                <input
                  defaultValue={a.action}
                  onBlur={e=>{const u=[...newGActions];u[i]={...u[i],action:e.target.value};setNewGActions(u);}}
                  placeholder="Action step..."
                  style={{flex:1,padding:"7px 10px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:13}}
                />
                <button onClick={()=>setNewGActions(aa=>aa.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:t.danger,cursor:"pointer",fontSize:16,flexShrink:0,padding:"0 2px"}}>×</button>
              </div>
              <input
                defaultValue={a.result}
                onBlur={e=>{const u=[...newGActions];u[i]={...u[i],result:e.target.value};setNewGActions(u);}}
                placeholder="Expected result (optional)"
                style={{width:"100%",padding:"6px 10px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:12,marginBottom:7}}
              />
              <div style={{display:"flex",gap:6}}>
                <input type="date" defaultValue={a.dueDate} onBlur={e=>{const u=[...newGActions];u[i]={...u[i],dueDate:e.target.value};setNewGActions(u);}} style={{flex:1,padding:"6px 8px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:11,colorScheme:t.mode||"dark"}}/>
                <input type="time" defaultValue={a.dueTime} onBlur={e=>{const u=[...newGActions];u[i]={...u[i],dueTime:e.target.value};setNewGActions(u);}} style={{flex:1,padding:"6px 8px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:11,colorScheme:t.mode||"dark"}}/>
              </div>
            </div>
          ))}
        </div>

        {/* Actions */}
        <div style={{display:"flex",gap:8}}>
          <button onClick={addG} style={{flex:1,padding:"11px",borderRadius:11,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:14,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:5}}>{IC.target("#000",14)} Create Goal{newGActions.length>0?" + "+newGActions.length+" Steps":""}</button>
          <button onClick={()=>{setShowGF(false);setNewGActions([]);setNewGPriorityState("Medium");}} style={{padding:"11px 14px",borderRadius:11,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:13}}>Cancel</button>
        </div>
      </div>}
      {goals.length===0&&<div style={{textAlign:"center",color:t.muted,padding:36}}>
        <img src="/mo/mo-determined.png" alt="" style={{width:110,height:110,objectFit:"contain",marginBottom:8}} onError={e=>e.target.style.display="none"}/>
        <div>No goals yet. Create your first!</div>
      </div>}

      {/* B6: sort control — priority (default), deadline, or creation order */}
      {goals.length>1&&<div style={{display:"flex",gap:6,marginBottom:12}}>
        {[["priority","Priority"],["deadline","Deadline"],["creation","Newest"]].map(([k,l])=>(
          <button key={k} onClick={()=>setGoalSortMode(k)} style={{flex:1,padding:"6px 8px",borderRadius:9,border:"1px solid "+(goalSortMode===k?t.accent:t.border),background:goalSortMode===k?t.accent+"18":t.surface,color:goalSortMode===k?t.accent:t.muted,cursor:"pointer",fontSize:11,fontWeight:goalSortMode===k?700:400}}>{l}</button>
        ))}
      </div>}

      {sortGoalsBy(goals,goalSortMode).map((g,gIdx)=>{
        const gActions=g.actions||[];
        const done=gActions.filter(a=>a.done).length,pct=gActions.length>0?Math.round((done/gActions.length)*100):0;
        const dl=g.deadline?Math.ceil((new Date(g.deadline)-new Date())/86400000):null;
        const exp=expG===g.id,pCol=g.priority==="High"?t.danger:g.priority==="Medium"?t.accent:t.success;
        const isEditing=editG===g.id;
        return(<div key={g.id} data-tour={gIdx===0?"goal-card-0":undefined} style={{background:pct===100?premiumCard(t,t.success):premiumCard(t,pCol),border:"1px solid "+t.border,borderRadius:"8px 14px 14px 8px",overflow:"hidden",marginBottom:10,borderLeft:"4px solid "+(pct===100?t.success:pCol),boxShadow:pct===100?premiumShadow(t,t.success):premiumShadow(t,pCol)}}>
          <div style={{padding:"13px 13px"}}>
            {/* G1: Controlled edit mode — all saved together on Done ✓ */}
            {isEditing?(
              <div>
                <div style={{fontSize:11,fontWeight:700,color:t.accent,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Editing Goal</div>
                <input defaultValue={_editGTitle.current} onChange={e=>setEditGTitle(e.target.value)} placeholder="Goal title..." maxLength={150} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:"1px solid "+t.accent,background:t.surface,color:t.text,fontSize:14,fontWeight:700,marginBottom:9}}/>
                <div style={{display:"flex",gap:7,marginBottom:9}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:t.muted,marginBottom:4,fontWeight:600}}>Priority</div>
                    <select defaultValue={_editGPriority.current} onChange={e=>setEditGPriority(e.target.value)} style={{width:"100%",padding:"8px 9px",borderRadius:9,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12}}>
                      {["High","Medium","Low"].map(p=><option key={p}>{p}</option>)}
                    </select>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:t.muted,marginBottom:4,fontWeight:600}}>Deadline <span style={{fontWeight:400}}>(optional)</span></div>
                    <input type="date" defaultValue={_editGDeadline.current} onChange={e=>setEditGDeadline(e.target.value)} style={{width:"100%",padding:"8px 9px",borderRadius:9,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12}}/>
                  </div>
                </div>
                <textarea defaultValue={_editGNotes.current} onChange={e=>setEditGNotes(e.target.value)} placeholder="Notes (optional)..." maxLength={500} style={{width:"100%",height:52,padding:"8px 9px",borderRadius:9,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12,resize:"none",marginBottom:9}}/>
                <div style={{display:"flex",gap:7}}>
                  <button onClick={saveEditG} style={{padding:"9px 20px",borderRadius:9,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>Save Changes ✓</button>
                  <button onClick={()=>setEditG(null)} style={{padding:"9px 12px",borderRadius:9,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:12}}>Cancel</button>
                </div>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"flex-start",gap:7}}>
                <div style={{flex:1,cursor:"pointer"}} onClick={()=>setExpG(exp?null:g.id)}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:14}}>{g.title}</span>
                    <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20,background:pCol+"22",color:pCol}}>{g.priority}</span>
                    {pct===100&&<span>✅</span>}
                  </div>
                  {g.deadline&&<div style={{fontSize:11,color:dl!==null&&dl<3?t.danger:t.muted,marginBottom:7,display:"flex",alignItems:"center",gap:4}}>{IC.calendar(dl!==null&&dl<3?t.danger:t.muted,11)} {dl===null?"":dl<0?"Overdue!":dl===0?"Due today!":dl+"d left"} · {fmt(g.deadline)}</div>}
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:t.muted,marginBottom:3}}><span>{done}/{gActions.length} actions</span><span style={{fontWeight:700,color:t.accent}}>{pct}%</span></div>
                  <div style={{height:6,background:t.surface,borderRadius:10}}><div style={{height:"100%",width:pct+"%",background:pct===100?t.success:"linear-gradient(90deg,"+t.accent+","+t.accent2+")",borderRadius:10,transition:"width 0.5s",boxShadow:pct===100?"0 0 8px "+t.success+"99":"0 0 8px "+t.accent+"66"}}/></div>
                </div>
                <div style={{display:"flex",gap:3,flexShrink:0}}>
                  <button onClick={()=>openEditG(g)} style={{background:t.surface,border:"none",color:navMuted,cursor:"pointer",borderRadius:8,padding:"4px 8px",display:"flex",alignItems:"center"}}>{IC.edit(navMuted,15)}</button>
                  <button onClick={()=>setExpG(exp?null:g.id)} style={{background:t.surface,border:"none",color:t.muted,cursor:"pointer",borderRadius:8,padding:"4px 8px",fontSize:11}}>{exp?"▲":"▼"}</button>
                  <button onClick={()=>delG(g.id)} style={{background:"none",border:"none",color:t.danger,cursor:"pointer",padding:"0 2px",display:"flex",alignItems:"center"}}>{IC.trash(t.danger,15)}</button>
                </div>
              </div>
            )}
          </div>
          {exp&&!isEditing&&<div style={{borderTop:"1px solid "+t.border,padding:"12px 13px",background:t.surface}}>
            {g.notes&&<div style={{fontSize:12,color:t.muted,fontStyle:"italic",marginBottom:10,padding:"7px 10px",background:t.card,borderRadius:8,display:"flex",alignItems:"flex-start",gap:5}}>{IC.note(t.muted,11)}{g.notes}</div>}
            {sortActions(gActions).map(a=>(
              editA===a.id?(
              <div key={a.id} style={{padding:"10px 11px",borderRadius:10,marginBottom:5,background:t.card,border:"1px solid "+t.accent}}>
                <input defaultValue={_editAAction.current} onChange={e=>setEditAAction(e.target.value)} placeholder="Action step..." style={{width:"100%",padding:"7px 9px",borderRadius:8,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12,marginBottom:6}}/>
                <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                  <input type="date" defaultValue={_editADueDate.current} onChange={e=>setEditADueDate(e.target.value)} style={{padding:"6px 9px",borderRadius:7,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12,colorScheme:t.mode||"dark"}}/>
                  <input type="time" defaultValue={_editADueTime.current} onChange={e=>setEditADueTime(e.target.value)} style={{padding:"6px 9px",borderRadius:7,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12,colorScheme:t.mode||"dark"}}/>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={saveEditA} style={{padding:"7px 16px",borderRadius:8,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>Save ✓</button>
                  <button onClick={()=>setEditA(null)} style={{padding:"7px 12px",borderRadius:8,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:12}}>Cancel</button>
                </div>
              </div>
              ):(
              <div key={a.id} style={{display:"flex",alignItems:"flex-start",gap:9,padding:"9px 10px",borderRadius:10,marginBottom:5,background:a.done?"linear-gradient(90deg,"+t.success+"15,"+t.card+")":t.card,border:"1px solid "+(a.done?t.success+"44":t.border),boxShadow:a.done?premiumShadow(t,t.success):"none"}}>
                <div onClick={()=>toggleA(g.id,a.id)} style={{width:16,height:16,borderRadius:4,border:"2px solid "+(a.done?t.success:t.muted),background:a.done?t.success:"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2,cursor:"pointer"}}>
                  {a.done&&<span style={{color:"#000",fontSize:10,fontWeight:900}}>✓</span>}
                </div>
                <div style={{flex:1,cursor:"pointer"}} onClick={()=>toggleA(g.id,a.id)}>
                  <div style={{fontSize:13,color:a.done?t.muted:t.text,textDecoration:a.done?"line-through":"none"}}>{a.action}</div>
                  {a.result&&<div style={{fontSize:11,color:t.info,marginTop:1}}>→ {a.result}</div>}
                  {/* G2: Show due date + time */}
                  {(a.dueDate||a.dueTime)&&<div style={{fontSize:10,color:a.dueDate===today?t.danger:t.accent,marginTop:3,fontWeight:600,display:"flex",alignItems:"center",gap:3}}>
                    {IC.calendar(a.dueDate===today?t.danger:t.accent,10)} {a.dueDate?fmt(a.dueDate):""}{a.dueTime?" · "+fmt12(a.dueTime):""}
                    {a.dueDate===today&&!a.done&&<span style={{marginLeft:4,color:t.danger}}>— Due today!</span>}
                  </div>}
                </div>
                <button onClick={()=>openEditA(g.id,a)} style={{background:"none",border:"none",color:navMuted,cursor:"pointer",padding:"0 2px",flexShrink:0,display:"flex",alignItems:"center"}}>{IC.edit(navMuted,14)}</button>
                <button onClick={()=>delA(g.id,a.id)} style={{background:"none",border:"none",color:t.danger,cursor:"pointer",fontSize:13,padding:"0 2px",flexShrink:0,opacity:0.7}}>✕</button>
              </div>
              )
            ))}
            {/* G2: Add action row with optional due date + time */}
            <div style={{marginTop:9,marginBottom:7}}>
              <div style={{display:"flex",gap:5,marginBottom:5,flexWrap:"wrap"}}>
                <input value={getAddDraft(g.id).action} onChange={e=>setAddDraftField(g.id,"action",e.target.value)} onKeyDown={e=>e.key==="Enter"&&addA(g.id)} placeholder="Action step..." style={{flex:2,minWidth:100,padding:"7px 9px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:12}}/>
                <input value={getAddDraft(g.id).result} onChange={e=>setAddDraftField(g.id,"result",e.target.value)} placeholder="Expected result..." style={{flex:2,minWidth:100,padding:"7px 9px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:12}}/>
                <button onClick={()=>addA(g.id)} style={{padding:"7px 12px",borderRadius:8,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer"}}>+</button>
              </div>
              {/* Due date + time toggle */}
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <button onClick={()=>setShowNewAExtra(showNewAExtra===g.id?null:g.id)} style={{fontSize:11,color:t.info,background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:3}}>
                  {IC.calendar(t.muted,11)} {showNewAExtra===g.id?"Hide":"Add due date & time"}
                </button>
                {showNewAExtra===g.id&&<>
                  <input type="date" value={getAddDraft(g.id).dueDate} onChange={e=>setAddDraftField(g.id,"dueDate",e.target.value)} style={{padding:"6px 10px",borderRadius:7,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12,colorScheme:t.mode||"dark"}}/>
                  <input type="time" value={getAddDraft(g.id).dueTime} onChange={e=>setAddDraftField(g.id,"dueTime",e.target.value)} style={{padding:"6px 10px",borderRadius:7,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:12,colorScheme:t.mode||"dark"}}/>
                </>}
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:2}}>
              <button onClick={()=>setShowBulk(showBulk===g.id?null:g.id)} style={{fontSize:12,color:t.info,background:"none",border:"none",cursor:"pointer",padding:0,display:"inline-flex",alignItems:"center",gap:3}}>{IC.plan(t.muted,11)} Bulk upload</button>
              <button onClick={()=>completeGoal(g.id)} style={{padding:"5px 12px",borderRadius:20,border:"1px solid "+t.success+"66",background:t.success+"15",color:t.success,fontWeight:700,cursor:"pointer",fontSize:10,fontFamily:"inherit",flexShrink:0}}>✅ Complete</button>
            </div>
            {showBulk===g.id&&<div style={{marginTop:7}}>
              <textarea defaultValue="" onChange={e=>setBulk(e.target.value)} placeholder={"ACTION | EXPECTED RESULT\nStudy Chapter 1 | Understand basics"} style={{width:"100%",height:70,padding:"8px 9px",borderRadius:8,border:"1px solid "+t.border,background:t.card,color:t.text,fontSize:12,resize:"none",marginBottom:7}}/>
              <button onClick={()=>bulkUp(g.id)} style={{padding:"7px 14px",borderRadius:8,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>Upload</button>
            </div>}
          </div>}
        </div>);
      })}
    </div>
  </>);}

  // Analytics page — Update 18: 4 tabs
  function AnalyticsPage(){
    const TABS=[["reviews","Reviews"],["habits","Habits"],["goals","Goals"],["cards","Cards"]];
    
    function getLast7(){const arr=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);arr.push(d.toLocaleDateString("en-CA"));}return arr;}
    const week7=getLast7();
    return(
    <div>
      {/* N7-A: AppHeader — missing from Analytics page */}
      <AppHeader t={t} user={user} displayName={displayName} pk={pk} onCalendar={()=>openModal("calendar")} onNotif={()=>openModal("notif")} onProfile={()=>{window.history.pushState({showHamburger:true,page:page},"","/");setShowHamburger(true);}} navMuted={navMuted} onUp={()=>showUp("Unlock AI insights, score analysis, challenge creation, unlimited habits, goals, heatmaps & more!")}/>
      <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:2}}>
        {TABS.map(([id,lbl])=>(
          <button key={id} data-tour={id+"-tab"} onClick={()=>setAnalyticsTab(id)} style={{padding:"7px 14px",borderRadius:20,border:"1px solid "+(analyticsTab===id?t.accent:t.border),background:analyticsTab===id?t.accent+"22":t.surface,color:analyticsTab===id?t.accent:t.text+"b3",cursor:"pointer",fontSize:12,fontWeight:analyticsTab===id?700:400,flexShrink:0,boxShadow:analyticsTab===id?"0 0 8px "+t.accent+"55":"none"}}>{lbl}</button>
        ))}
      </div>
      {analyticsTab==="reviews"&&<ReviewsTab t={t} habits={habits} goals={goals} journals={journals} plan={plan} showUp={showUp} today={today}/>}
      {analyticsTab==="habits"&&<div>
        {habits.length===0&&<div style={{textAlign:"center",color:t.muted,padding:36}}>Add habits to see habit analytics! {IC.flame(t.muted,16)}</div>}
        {habits.length>0&&<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,marginBottom:14,boxShadow:premiumShadow(t)}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:5}}>{IC.calendar(t.text,13)} This Week</div>
            <div style={{fontSize:10,color:t.muted}}>{week7.filter(d=>habits.some(h=>{const v=h.log&&h.log[d];return isFullDoneOn(h,d,v);})).length}/7 active days</div>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:260}}>
              <thead><tr>
                <th style={{textAlign:"left",color:t.muted,padding:"3px 6px",fontWeight:600,width:80}}>Habit</th>
                {week7.map(d=><th key={d} style={{textAlign:"center",color:d===today?t.accent:t.muted,padding:"3px 2px",fontWeight:d===today?800:500,fontSize:10,minWidth:24}}>
                  {new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"narrow"})}<br/><span style={{fontSize:9}}>{new Date(d+"T12:00:00").getDate()}</span>
                </th>)}
                <th style={{textAlign:"center",color:t.muted,padding:"3px 3px",fontWeight:600,fontSize:10}}>Rate</th>
                <th style={{textAlign:"center",color:t.muted,padding:"3px 3px",fontWeight:600,fontSize:10}}>{IC.flame(t.muted,10)}</th>
              </tr></thead>
              <tbody>{habits.map(h=>{
                const wd=week7.filter(d=>{const v=h.log&&h.log[d];return isFullDoneOn(h,d,v);}).length;
                const rate=Math.round(wd/7*100);
                return(<tr key={h.id}>
                  <td style={{color:t.text,padding:"5px 6px",fontWeight:600,fontSize:11,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.icon} {h.name}</td>
                  {week7.map(d=>{const v=h.log&&h.log[d];const isFullDone=isFullDoneOn(h,d,v);return(<td key={d} style={{textAlign:"center",padding:"4px 2px"}}>
                    <div style={{width:16,height:16,borderRadius:4,background:isFullDone?t.success:t.surface,border:"1px solid "+(d===today?t.accent:t.border),margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {isFullDone&&<span style={{fontSize:9,color:"#000",fontWeight:900}}>✓</span>}
                    </div>
                  </td>);})}
                  <td style={{textAlign:"center",padding:"4px 3px",fontSize:10,fontWeight:700,color:rate>=71?t.success:rate>=43?t.accent:t.danger}}>{rate}%</td>
                  <td style={{textAlign:"center",padding:"4px 3px",fontSize:11,fontWeight:700,color:t.accent}}>{h.streak>0?h.streak:"-"}</td>
                </tr>);
              })}</tbody>
            </table>
          </div>
        </div>}
        {/* Item 29: Monthly Habits Completed graph (replaces redundant 90-Day Heatmaps — per-habit heatmaps remain on each habit's detail page) */}
        {habits.length>0&&<MonthlyHabitsGraph habits={habits} t={t} monthOffset={habitsMonthOffset} setMonthOffset={setHabitsMonthOffset}/>}

        {/* V3: Yearly Bar Chart — Plus only */}
        {(()=>{
          if(!plan.plus) return(
            <div onClick={()=>showUp("Yearly analytics is a Plus feature.")} style={{background:t.card,border:"1px dashed "+t.border,borderRadius:12,padding:16,marginBottom:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:t.text,marginBottom:2,display:"flex",alignItems:"center",gap:5}}>{IC.calendar(t.muted,13)} Yearly Completion Chart</div>
                <div style={{fontSize:11,color:t.muted}}>12-month habit completion overview</div>
              </div>
              <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:10,fontWeight:700,color:"#a78bfa",background:"#a78bfa22",padding:"3px 9px",borderRadius:12,flexShrink:0}}>{IC.gem("#a78bfa",10)} Plus</span>
            </div>
          );
          const yr=new Date().getFullYear();
          const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
          const monthData=MONTHS.map((_,mi)=>{
            const daysInMonth=new Date(yr,mi+1,0).getDate();
            let done=0;
            const possible=habits.length*daysInMonth;
            habits.forEach(h=>{
              for(let d=1;d<=daysInMonth;d++){
                const key=yr+"-"+String(mi+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
                if(isFullDoneOn(h,key,h.log&&h.log[key]))done++;
              }
            });
            const rate=possible>0?Math.round((done/possible)*100):null;
            return{month:MONTHS[mi],rate};
          });
          const hasData=monthData.some(m=>m.rate!==null&&m.rate>0);
          const currentMonth=new Date().getMonth();
          return(
            <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,marginBottom:12,boxShadow:premiumShadow(t)}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:5}}>{IC.calendar(t.muted,13)} {yr} — Yearly Overview</div>
                <div style={{display:"flex",gap:8,fontSize:9,color:t.muted}}>
                  <span style={{display:"flex",alignItems:"center",gap:2}}><span style={{width:8,height:8,borderRadius:2,background:t.success,display:"inline-block"}}/>≥70%</span>
                  <span style={{display:"flex",alignItems:"center",gap:2}}><span style={{width:8,height:8,borderRadius:2,background:t.accent,display:"inline-block"}}/>≥40%</span>
                  <span style={{display:"flex",alignItems:"center",gap:2}}><span style={{width:8,height:8,borderRadius:2,background:t.danger,display:"inline-block"}}/>&lt;40%</span>
                </div>
              </div>
              {!hasData?<div style={{textAlign:"center",color:t.muted,fontSize:12,padding:"12px 0"}}>Track habits for a month to see your yearly overview</div>:(
                <div style={{display:"flex",alignItems:"flex-end",gap:3,height:80}}>
                  {monthData.map(({month,rate},i)=>{
                    const isFuture=i>currentMonth;
                    const barH=rate!==null&&!isFuture?Math.max(6,rate*0.72):0;
                    const col=rate===null||isFuture?t.border:rate>=70?t.success:rate>=40?t.accent:t.danger;
                    const isNow=i===currentMonth;
                    return(
                      <div key={month} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                        {rate!==null&&!isFuture&&<span style={{fontSize:8,color:col,fontWeight:700}}>{rate}%</span>}
                        {(rate===null||isFuture)&&<span style={{fontSize:8,color:t.border}}>—</span>}
                        <div style={{width:"100%",height:barH||4,background:col,borderRadius:"3px 3px 0 0",opacity:isFuture?0.2:1,border:isNow?"1px solid "+t.accent:"none",boxShadow:!isFuture&&rate!==null?"0 0 6px "+col+"77":"none",transition:"height 0.4s"}}/>
                        <span style={{fontSize:8,color:isNow?t.accent:t.muted,fontWeight:isNow?800:400}}>{month}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })()}

        {/* V4: Quarterly Summary Cards — Plus only */}
        {(()=>{
          if(!plan.plus) return(
            <div onClick={()=>showUp("Quarterly summary is a Plus feature.")} style={{background:t.card,border:"1px dashed "+t.border,borderRadius:12,padding:16,marginBottom:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:t.text,marginBottom:2,display:"flex",alignItems:"center",gap:5}}>{IC.chartUp(t.muted,13)} Quarterly Summary</div>
                <div style={{fontSize:11,color:t.muted}}>Best habit & completion rate per quarter</div>
              </div>
              <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:10,fontWeight:700,color:"#a78bfa",background:"#a78bfa22",padding:"3px 9px",borderRadius:12,flexShrink:0}}>{IC.gem("#a78bfa",10)} Plus</span>
            </div>
          );
          const yr=new Date().getFullYear();
          const QUARTERS=[
            {label:"Q1",months:[0,1,2],name:"Jan–Mar"},
            {label:"Q2",months:[3,4,5],name:"Apr–Jun"},
            {label:"Q3",months:[6,7,8],name:"Jul–Sep"},
            {label:"Q4",months:[9,10,11],name:"Oct–Dec"},
          ];
          const currentMonth=new Date().getMonth();
          const qData=QUARTERS.map(q=>{
            let done=0,possible=0;
            habits.forEach(h=>{
              q.months.forEach(mi=>{
                const daysInMonth=new Date(yr,mi+1,0).getDate();
                for(let d=1;d<=daysInMonth;d++){
                  const key=yr+"-"+String(mi+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
                  possible++;
                  if(isFullDoneOn(h,key,h.log&&h.log[key]))done++;
                }
              });
            });
            const rate=possible>0?Math.round(done/possible*100):null;
            const isPast=q.months[2]<currentMonth;
            const isCurrent=q.months.includes(currentMonth);
            const isFuture=q.months[0]>currentMonth;
            return{...q,rate,isPast,isCurrent,isFuture};
          });
          const hasAny=qData.some(q=>q.rate!==null&&q.rate>0);
          return(
            <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,marginBottom:12,boxShadow:premiumShadow(t)}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:12,display:"flex",alignItems:"center",gap:5}}>{IC.chartUp(t.accent,13)} Quarterly Summary — {yr}</div>
              {!hasAny?<div style={{textAlign:"center",color:t.muted,fontSize:12,padding:"8px 0"}}>Track habits for a quarter to see summaries</div>:(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {qData.map(q=>{
                    const col=q.rate===null||q.isFuture?t.border:q.rate>=70?t.success:q.rate>=40?t.accent:t.danger;
                    return(
                      <div key={q.label} style={{background:q.isCurrent?premiumCard(t,col):t.surface,border:"1px solid "+(q.isCurrent?col+"66":t.border),borderRadius:10,padding:"10px 10px",opacity:q.isFuture?0.4:1,boxShadow:q.isCurrent?premiumShadow(t,col):"none"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                          <span style={{fontSize:12,fontWeight:800,color:q.isCurrent?col:t.text}}>{q.label}</span>
                          {q.isCurrent&&<span style={{fontSize:8,fontWeight:700,color:col,background:col+"22",padding:"1px 5px",borderRadius:8}}>NOW</span>}
                          {q.isPast&&!q.isCurrent&&<span style={{fontSize:8,color:t.muted}}>Done</span>}
                          {q.isFuture&&<span style={{fontSize:8,color:t.muted}}>Upcoming</span>}
                        </div>
                        <div style={{fontSize:9,color:t.muted,marginBottom:6}}>{q.name}</div>
                        {q.rate!==null&&!q.isFuture?(
                          <>
                            <div style={{fontSize:20,fontWeight:800,color:col,marginBottom:4}}>{q.rate}%</div>
                            <div style={{height:5,background:t.border,borderRadius:4,marginBottom:6}}><div style={{height:"100%",width:q.rate+"%",background:col,borderRadius:4,boxShadow:"0 0 6px "+col+"77"}}/></div>
                          </>
                        ):(
                          <div style={{fontSize:12,color:t.muted}}>—</div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })()}
      </div>}
      {analyticsTab==="goals"&&<div>
        {/* Summary bar */}
        {totalGY>0&&(()=>{
          const overdueGoals=overdueGY;
          return(<>
            {overdueGoals>0&&<div style={{background:t.danger+"18",border:"1px solid "+t.danger+"44",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>⚠️</span>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:t.danger}}>{overdueGoals} Overdue Goal{overdueGoals>1?"s":""}</div>
                <div style={{fontSize:11,color:t.muted}}>Past deadline and not yet complete</div>
              </div>
            </div>}
            <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
              {[
                [compGY+"/"+totalGY,"Goals Done",t.success],
                [doneAY+"/"+totalAY,"Actions Done",t.info],
                [overdueGoals+"","Overdue",overdueGoals>0?t.danger:t.muted],
              ].map(([v,l,c])=>(
                <div key={l} style={{flex:1,minWidth:70,background:l==="Overdue"&&overdueGoals>0?premiumCard(t,t.danger):premiumCard(t,c),border:"1px solid "+(l==="Overdue"&&overdueGoals>0?t.danger+"44":t.border),borderRadius:12,padding:"10px 6px",textAlign:"center",boxShadow:l==="Overdue"&&overdueGoals>0?premiumShadow(t,t.danger):premiumShadow(t)}}>
                  <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
                  <div style={{fontSize:9,color:t.muted,marginTop:2,textTransform:"uppercase",letterSpacing:0.4}}>{l}</div>
                </div>
              ))}
              <div onClick={()=>setShowGoalHistory(true)} style={{flex:1,minWidth:70,background:premiumCard(t,t.accent),border:"1px solid "+t.accent+"44",borderRadius:12,padding:"10px 6px",textAlign:"center",cursor:"pointer",boxShadow:premiumShadow(t,t.accent)}}>
                <div style={{fontSize:18}}>📋</div>
                <div style={{fontSize:9,color:t.accent,marginTop:2,textTransform:"uppercase",letterSpacing:0.4,fontWeight:700}}>History</div>
              </div>
            </div>
          </>);
        })()}
        {totalGY===0&&<div style={{textAlign:"center",color:t.muted,padding:36}}>
          <img src="/mo/mo-magnify.png" alt="" style={{width:100,height:100,objectFit:"contain",marginBottom:8}} onError={e=>e.target.style.display="none"}/>
          <div>Add goals to see analytics!</div>
        </div>}

        {/* Fix 14: Only show active (incomplete) goals — completed moved to history */}
        {/* Item 23: priority-first sort, matching the main Goals page (Item 17) */}
        {sortGoals(goals.filter(g=>!(g.actions.length>0&&g.actions.every(x=>x.done)))).map(g=>{
          const done=g.actions.filter(a=>a.done),remaining=g.actions.filter(a=>!a.done);
          const pct=g.actions.length>0?Math.round((done.length/g.actions.length)*100):0;
          const dl2=g.deadline?dLeft(g.deadline):null;
          const pCol=g.priority==="High"?t.danger:g.priority==="Medium"?t.accent:t.success;
          const isOverdue=dl2!==null&&dl2<0&&pct<100;
          const isComplete=pct===100;
          const status=isComplete?"completed":isOverdue?"overdue":dl2!==null&&dl2<=7?"due_soon":"active";
          const sCols={completed:t.success,overdue:t.danger,due_soon:t.accent,active:t.info};
          const sLabels={completed:"Completed",overdue:Math.abs(dl2)+"d overdue",due_soon:"Due in "+dl2+"d",active:"Active"};
          const thisWeek7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);thisWeek7.push(d.toLocaleDateString("en-CA"));}
          const weekActsDone=done.filter(a=>a.doneAt&&thisWeek7.includes(a.doneAt)).length;
          const weekActsDue=g.actions.filter(a=>a.dueDate&&thisWeek7.includes(a.dueDate)).length;
          return(<div key={g.id} style={{background:isComplete?premiumCard(t,t.success):premiumCard(t,sCols[status]),border:"1px solid "+(isOverdue?t.danger+"66":isComplete?t.success+"44":t.border),borderRadius:"8px 14px 14px 8px",padding:14,marginBottom:12,opacity:isComplete?0.85:1,borderLeft:"4px solid "+sCols[status],boxShadow:premiumShadow(t,sCols[status])}}>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,marginBottom:5}}>{g.title}</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:pCol+"22",color:pCol,fontWeight:700}}>{g.priority}</span>
                  <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:sCols[status]+"22",color:sCols[status],fontWeight:700}}>{sLabels[status]}</span>
                  {weekActsDue>0&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:t.info+"22",color:t.info,fontWeight:700,display:"inline-flex",alignItems:"center",gap:3}}>{IC.calendar(t.info,9)} {weekActsDone}/{weekActsDue} done this week</span>}
                </div>
              </div>
              <span style={{fontSize:18,fontWeight:800,color:isComplete?t.success:isOverdue?t.danger:t.accent,flexShrink:0,marginLeft:8}}>{pct}%</span>
            </div>
            {/* Progress bar */}
            <div style={{height:6,background:t.surface,borderRadius:10,marginBottom:12}}><div style={{height:"100%",width:pct+"%",background:isComplete?t.success:isOverdue?t.danger:"linear-gradient(90deg,"+t.accent+","+t.accent2+")",borderRadius:10,transition:"width 0.5s",boxShadow:"0 0 8px "+(isComplete?t.success:isOverdue?t.danger:t.accent)+"77"}}/></div>
            {/* Remaining actions — collapsible */}
            {remaining.length>0&&<details style={{marginBottom:done.length>0?10:0}}>
              <summary style={{fontSize:11,fontWeight:700,color:t.muted,marginBottom:6,cursor:"pointer",listStyle:"none",display:"flex",alignItems:"center",gap:5}}>
                <span>⏳ Remaining ({remaining.length})</span>
                <span style={{fontSize:9,color:t.muted}}>▼ tap to view</span>
              </summary>
              <div style={{marginTop:8}}>
              {sortActions(remaining).map(a=>{
                const aDL=a.dueDate?dLeft(a.dueDate):null;
                const aDLLabel=aDL===null?"":aDL<0?Math.abs(aDL)+"d overdue!":aDL===0?"Due today!":aDL===1?"Due tomorrow!":a.dueDate?aDL+"d left · "+a.dueDate:"";
                return(<div key={a.id} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"6px 9px",background:isOverdue?t.danger+"0a":t.surface,borderRadius:8,marginBottom:4,border:isOverdue?"1px solid "+t.danger+"22":"none"}}>
                  <span style={{fontSize:12,color:t.muted,flexShrink:0,marginTop:1}}>○</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:t.text}}>{a.action}</div>
                    {a.result&&<div style={{fontSize:10,color:t.muted}}>→ {a.result}</div>}
                    {aDLLabel&&<div style={{fontSize:10,color:aDL!==null&&aDL<0?t.danger:aDL===0?t.danger:aDL<=3?t.accent:t.muted,marginTop:2,fontWeight:600}}>{aDLLabel}</div>}
                  </div>
                </div>);
              })}
              </div>
            </details>}
            {/* Completed actions — collapsible */}
            {done.length>0&&<details style={{marginBottom:0}}>
              <summary style={{fontSize:11,fontWeight:700,color:t.success,marginBottom:6,cursor:"pointer",listStyle:"none",display:"flex",alignItems:"center",gap:5}}>
                <span>✅ Completed ({done.length})</span>
                <span style={{fontSize:9,color:t.muted}}>▼ tap to view</span>
              </summary>
              <div style={{marginTop:8}}>
              {done.map(a=>(
                <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 9px",background:t.success+"12",borderRadius:8,marginBottom:4}}>
                  <span style={{fontSize:12,color:t.success,flexShrink:0}}>✓</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:t.text,fontWeight:500}}>{a.action}</div>
                    {a.result&&<div style={{fontSize:10,color:t.muted}}>→ {a.result}</div>}
                  </div>
                  {a.doneAt&&<span style={{fontSize:10,color:t.muted,flexShrink:0}}>{timeAgo(a.doneAt)}</span>}
                </div>
              ))}
              </div>
            </details>}
            {g.actions.length===0&&<div style={{fontSize:12,color:t.muted,textAlign:"center",padding:"8px 0"}}>No action steps added yet</div>}
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:10}}>
              <button onClick={()=>completeGoal(g.id)} style={{padding:"5px 12px",borderRadius:20,border:"1px solid "+t.success+"66",background:t.success+"15",color:t.success,fontWeight:700,cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>✅ Complete</button>
            </div>
          </div>);
        })}
      </div>}
      {/* H-Cards: milestone streak cards — same snapshots that popped up via Mo, reopenable/shareable anytime */}
      {analyticsTab==="cards"&&<div>
        {streakCards.length===0&&<div style={{textAlign:"center",color:t.muted,padding:36}}>
          <img src="/mo/mo-trophy.png" alt="" style={{width:100,height:100,objectFit:"contain",marginBottom:8}} onError={e=>e.target.style.display="none"}/>
          <div>No streak cards yet — hit a badge milestone (3d, 7d, 14d...) on any habit and a shareable card lands here automatically!</div>
        </div>}
        {streakCards.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10}}>
          {[...streakCards].sort((a,b)=>b.id-a.id).map(c=>(
            <div key={c.id} onClick={()=>setViewCard(c)} style={{background:premiumCard(t,c.color),border:"1px solid "+(c.color||t.border)+"55",borderRadius:14,padding:"14px 10px",textAlign:"center",cursor:"pointer",boxShadow:premiumShadow(t,c.color)}}>
              <div style={{fontSize:26,marginBottom:4}}>{c.icon}</div>
              <div style={{fontSize:22,fontWeight:900,color:c.color||t.accent}}>{c.streak}d</div>
              <div style={{fontSize:11,fontWeight:700,color:t.text,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.habitName}</div>
              <div style={{fontSize:9,color:t.muted,marginTop:3}}>{new Date(c.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
              <div style={{fontSize:9,color:c.shared?t.success:t.muted,marginTop:5,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>{c.shared?<>{IC.check(t.success,9)} Shared</>:<>{IC.share(t.muted,9)} Tap to share</>}</div>
            </div>
          ))}
        </div>}
      </div>}

    </div>
  );}

  return(
    <div style={{minHeight:"100vh",background:t.bg,fontFamily:"'Sora',system-ui,sans-serif",color:t.text}}>
      <style>{"*{box-sizing:border-box;}input,textarea,select{outline:none;font-family:inherit;}\n      @keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}\n      .page-content{animation:pageIn 0.22s ease;}\n      .cat-tabs-scroll{scrollbar-width:none;-ms-overflow-style:none;}\n      .cat-tabs-scroll::-webkit-scrollbar{display:none;height:0;}\n      "}</style>
      {saving&&<div style={{position:"fixed",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,"+t.accent+","+t.accent+"88,"+t.accent+")",zIndex:9999,animation:"slideIn 0.3s ease"}}/>}
      {toast&&<div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",zIndex:9998,background:toast.type==="badge"?t.accent:toast.type==="err"?(t.danger||"#ef4444"):t.success,color:"#000",padding:"9px 18px",borderRadius:20,fontWeight:700,fontSize:13,boxShadow:"0 8px 32px rgba(0,0,0,0.3)",whiteSpace:"nowrap",animation:"slideIn 0.3s ease"}}>{toast.msg}</div>}
      <Confetti on={confetti} done={()=>setConfetti(false)}/>
      {showReview&&<ReviewPopup t={t} onClose={()=>setShowReview(false)}/>}
      {milestoneCard&&<MilestonePopup t={t} card={milestoneCard} onShare={()=>{setViewCard(milestoneCard);setMilestoneCard(null);}} onDismiss={()=>setMilestoneCard(null)}/>}

                  {locked&&<span style={{fontSize:9,fontWeight:700,color:isPlusTheme?"#a78bfa":t.accent,background:isPlusTheme?"#a78bfa22":t.accent+"22",padding:"2px 6px",borderRadius:8}}>{lockLabel}</span>}
                  {!locked&&isPending&&<span style={{color:th.accent,fontSize:16}}>✓</span>}
                </button>
              );
            })}
          </div>
          <button onClick={()=>{chTheme(panelPendingTheme);setShowPanelTheme(false);}}
            style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:"linear-gradient(135deg,"+(TH[panelPendingTheme]?.accent||t.accent)+","+(TH[panelPendingTheme]?.accent2||t.accent2)+")",color:"#000",fontWeight:800,fontSize:14,cursor:"pointer",boxShadow:"0 4px 20px "+(TH[panelPendingTheme]?.accent||t.accent)+"66"}}>
            ✓ Apply {TH[panelPendingTheme]?.name} Theme
          </button>
        </div>
      </div>}

      {/* ── PANEL: Refer & Earn Bottom Sheet ── */}
      {showPanelRefer&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:9300,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setShowPanelRefer(false)}>
        <div style={{background:t.card,borderRadius:"22px 22px 0 0",padding:"22px 20px 44px",width:"100%",maxWidth:480,animation:"slideUp 0.25s ease",maxHeight:"85vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
          <div style={{width:36,height:4,borderRadius:2,background:t.border,margin:"0 auto 16px"}}/>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <div style={{fontSize:16,fontWeight:800,color:t.text}}>Refer & Earn</div>
          </div>
          <div style={{fontSize:11,color:t.muted,marginBottom:16}}>Invite friends · Earn Pro rewards</div>
          <ReferralCard t={t} user={user} pk={pk} plan={plan}/>
          <button onClick={()=>setShowPanelRefer(false)}
            style={{width:"100%",padding:"12px",borderRadius:12,border:"1px solid "+t.border,background:"none",color:t.muted,fontWeight:600,fontSize:13,cursor:"pointer",marginTop:14}}>
            Close
          </button>
        </div>
      </div>}

      {/* ── PANEL: Data & Export Bottom Sheet ── */}
      {showPanelExport&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:9300,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setShowPanelExport(false)}>
        <div style={{background:t.card,borderRadius:"22px 22px 0 0",padding:"22px 20px 44px",width:"100%",maxWidth:480,animation:"slideUp 0.25s ease",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
          <div style={{width:36,height:4,borderRadius:2,background:t.border,margin:"0 auto 16px"}}/>
          <div style={{fontSize:16,fontWeight:800,color:t.text,marginBottom:4}}>Data & Export</div>
          <div style={{fontSize:11,color:t.muted,marginBottom:16}}>Download your Momentum data</div>
          {plan.csv
            ?<ExportPanel t={t} habits={habits||[]} goals={goals||[]} journals={journals||{}} goalStats={goalStats||[]} displayName={displayName||user?.displayName||"User"} canPDF={plan.pdf} user={user} isPlus={plan.plus}/>
            :<div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{marginBottom:12}}>{IC.package(t.muted,40)}</div>
              <div style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:8}}>Export your data</div>
              <div style={{fontSize:12,color:t.muted,marginBottom:16,lineHeight:1.6}}>CSV export is a Pro feature — unlocks your full habit history, goals, and journal as downloadable files. The AI Coach PDF Report needs Plus.</div>
              <button onClick={()=>{setShowPanelExport(false);showUp("CSV export is a Pro feature! Upgrade to export your data.");}}
                style={{padding:"11px 24px",borderRadius:12,border:"none",background:t.accent,color:"#000",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                {IC.bolt("#000",13)} Upgrade to Pro →
              </button>
            </div>
          }
          <button onClick={()=>setShowPanelExport(false)}
            style={{width:"100%",padding:"12px",borderRadius:12,border:"1px solid "+t.border,background:"none",color:t.muted,fontWeight:600,fontSize:13,cursor:"pointer",marginTop:14}}>
            Close
          </button>
        </div>
      </div>}

      {/* ── UI-H1/H5: BOTTOM NAV — clean 4 tabs only (N3: SVG icons) ── */}
      {offlineBanner&&(
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:9100,background:isOffline?"#92400e":"#14532d",color:isOffline?"#fef3c7":"#dcfce7",padding:"9px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:11,fontWeight:600,gap:8}}>
          <span style={{display:"flex",alignItems:"center",gap:5}}>
            {isOffline
              ?<>{IC.warning("#fef3c7",11)} Offline — changes saved locally</>
              :<>{IC.check("#dcfce7",11)} Back online — syncing…</>
            }
          </span>
          {isOffline&&<button onClick={()=>setOfflineBanner(false)} style={{background:"none",border:"none",color:"#fef3c7",cursor:"pointer",fontSize:16,padding:"0",lineHeight:1}}>×</button>}
        </div>
      )}
      {!showOnboarding&&<div className="bn" style={{position:"fixed",bottom:0,left:0,right:0,background:t.card,borderTop:"1px solid "+t.border,zIndex:500}}>
        <div style={{display:"flex",justifyContent:"space-around",padding:"5px 4px 7px"}}>
          {NAV.map(item=>{
            const active=page===item.id;
            const col=active?t.accent:navMuted;
            return(
            <button key={item.id} data-tour={item.id==="habits"?"habits-nav":undefined} onClick={()=>navigateTo(item.id)}
              style={{background:"none",border:"none",cursor:"pointer",padding:"3px 6px",
                display:"flex",flexDirection:"column",alignItems:"center",gap:2,flex:1}}>
              <span style={{color:col,display:"flex",alignItems:"center"}}>{IC[item.icon]?.(col,22)}</span>
              <span style={{fontSize:9,fontWeight:active?800:400,color:col,letterSpacing:0.2}}>{item.label}</span>
              {active&&<div style={{width:18,height:3,borderRadius:2,background:t.accent,marginTop:1}}/>}
            </button>
            );
          })}
        </div>
      </div>}
      {user&&!showOnboarding&&<FloatingMo user={user} habits={habits} goals={goals} openAIModal={openAIModal} activeModal={modal}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
<script>
(function(){
  function runApp(){
    try{
      var src=document.getElementById('app-src').textContent;
      var out=Babel.transform(src,{presets:[["react",{runtime:"classic"}]]}).code;
      var s=document.createElement('script');
      s.textContent=out;
      document.body.appendChild(s);
    }catch(e){
      console.error('App transform/execute failed:',e);
      var st=document.getElementById('splash-status');
      if(st)st.textContent='Error loading app — check console';
    }
  }
  function waitBabel(tries){
    if(typeof Babel!=='undefined'&&typeof Babel.transform==='function'){
      runApp();
    } else if(tries>0){
      setTimeout(function(){waitBabel(tries-1);},200);
    } else {
      console.error('Babel failed to load after timeout');
    }
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){waitBabel(75);});
  } else {
    waitBabel(75);
  }
})();
</script>
<script>
// ── PWA Install prompt handler ──────────────────────────────────────────────
let _deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  // Exposed globally
  window._pwaInstallPrompt = e;
});
window.addEventListener('appinstalled', () => {
  _deferredInstallPrompt = null;
  window._pwaInstallPrompt = null;
  console.log('✅ Momentum PWA installed');
});

if('serviceWorker' in navigator){
  window.addEventListener('load',async()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(r=>{
        console.log('⚡ SW ready:',r.scope);
        // Force check for SW update immediately
        r.update();
        r.addEventListener('updatefound',()=>{
          const nw=r.installing;
          nw.addEventListener('statechange',()=>{
            if(nw.state==='installed'&&navigator.serviceWorker.controller){
              nw.postMessage({type:'SKIP_WAITING'});
            }
          });
        });
        let refreshing=false;
        navigator.serviceWorker.addEventListener('controllerchange',()=>{
          if(!refreshing){refreshing=true;window.location.reload();}
        });
        navigator.serviceWorker.ready.then(reg=>{
          if(reg.active){
            const rem=localStorage.getItem('hg_reminders');
            const notifOn=localStorage.getItem('hg_notif');
            if(rem)reg.active.postMessage({type:'SYNC_STORAGE',key:'hg_reminders',value:rem});
            if(notifOn)reg.active.postMessage({type:'SYNC_STORAGE',key:'hg_notif',value:notifOn});
            reg.active.postMessage({type:'UPDATE_REMINDERS'});
          }
        });
      })
      .catch(e=>console.error('SW error:',e));
  });
}
</script>
