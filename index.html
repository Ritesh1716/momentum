                  <div style={{fontSize:12,fontWeight:600,color:t.text}}>{s.label||"Focus"}{s.partial&&<span style={{fontSize:9,color:t.muted,fontWeight:400}}> · partial</span>}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:12,fontWeight:700,color:t.success}}>{s.mins}m</div>
                  <div style={{fontSize:9,color:t.muted}}>{s.time||""}</div>
                </div>
              </div>);
            })}
          </div>}
        </div>
      </div>);
    })()}
  </>);
}

function Pomodoro({t,close,plan,showUp,user}){
  // Item 21: restore an in-progress session (if any) so closing/reopening this modal doesn't reset the timer
  const restoredRef=useRef(undefined);
  if(restoredRef.current===undefined){
    restoredRef.current=(()=>{
      try{
        const raw=localStorage.getItem("hg_pomo_active");
        if(!raw)return null;
        const p=JSON.parse(raw);
        if(!p||typeof p.secs!=="number")return null;
        if(p.running){
          const elapsed=Math.floor((Date.now()-p.timestamp)/1000);
          const remaining=p.secs-elapsed;
          return{...p,secs:Math.max(0,remaining),justCompleted:remaining<=0};
        }
        return{...p,justCompleted:false};
      }catch(e){return null;}
    })();
  }
  const restored=restoredRef.current;
  const[tab,setTab]=useState("timer"); // timer | history | analytics
  const[mode,setMode]=useState(restored?restored.mode:"focus");
  const[run,setRun]=useState(restored?(restored.justCompleted?false:restored.running):false);
  const[secs,setSecs]=useState(restored?restored.secs:25*60);
  const[durations,setDurations]=useState({focus:25,short:5,long:15});
  const[editing,setEditing]=useState(null);
  const[editVal,setEditVal]=useState("");
  const[sessionLabel,setSessionLabel]=useState(restored&&restored.label?restored.label:"Focus");
  const[customLabel,setCustomLabel]=useState(()=>{
    const quick=["Focus","Study","Work","Exercise","Reading","Meditation","Practice","Research"];
    return restored&&restored.label&&!quick.includes(restored.label)?restored.label:"";
  });
  const[showLabelInput,setShowLabelInput]=useState(false);
  const[history,setHistory]=useState(()=>{try{return trim30DayHistory(JSON.parse(localStorage.getItem("hg_pomo_history")||"[]"));}catch{return[];}});
  const[focusLog,setFocusLog]=useState(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_focuslog")||"{}");}catch{return{};}}); // date-keyed aggregate, never pruned — decouples analytics from the 30-entry history cap
  const[analyticsTab,setAnalyticsTab]=useState("week");
  const[showCloseWarning,setShowCloseWarning]=useState(false);
  const iv=useRef();
  const today=new Date().toLocaleDateString("en-CA");

  // Item 21: a session finished while the modal/app was closed — log it now and land on a fresh timer
  useEffect(()=>{
    if(restored&&restored.justCompleted){
      const label=restored.label||"Focus";
      const mins=Math.max(1,Math.round((restored.totalSecs||25*60)/60));
      const entry={id:Date.now(),label,mode:restored.mode,mins,time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),date:today};
      logSession(entry);
      setSecs(durations[restored.mode]*60);
      setTab("history");
      try{showToastGlobal("⚡ "+label+" session completed while you were away! 🎉");}catch(e){}
    }
  },[]);

  // Item 24: self-heal focusLog from local history immediately on mount (covers guests too, before any Firebase round-trip)
  useEffect(()=>{
    const healed=rebuildFocusLog(history,focusLog);
    if(JSON.stringify(healed)!==JSON.stringify(focusLog)){
      setFocusLog(healed);
      try{localStorage.setItem("hg_pomo_focuslog",JSON.stringify(healed));}catch(e){}
    }
  },[]);

  // Item 21: keep a lightweight snapshot of the active/paused session so it survives this modal unmounting — cleared automatically once fresh or finished
  useEffect(()=>{
    try{
      const totalSecs=durations[mode]*60;
      if(run||(secs>0&&secs<totalSecs)){
        localStorage.setItem("hg_pomo_active",JSON.stringify({mode,secs,totalSecs,running:run,label:customLabel||sessionLabel,timestamp:Date.now()}));
      }else{
        localStorage.removeItem("hg_pomo_active");
      }
    }catch(e){}
  },[secs,mode,run,sessionLabel,customLabel]);

  // Cross-device sync: MERGE local + Firebase — never overwrite local with stale cloud data (N3-E fix)
  useEffect(()=>{
    if(user?.uid&&window._fb){
      const fbR=window._fb;
      fbR.getDoc(fbR.doc(fbR.db,"users",user.uid)).then(snap=>{
        if(!snap.exists())return;
        const data=snap.data();
        // N3-E: MERGE strategy — union of local + Firebase by session ID, local wins on conflict
        // This prevents Firebase (which may have stale data) from wiping freshly-saved local sessions
        let mergedHistory=history;
        if(Array.isArray(data.pomoHistory)){
          const localIds=new Set(history.map(s=>s.id));
          const fbNew=data.pomoHistory.filter(s=>!localIds.has(s.id));
          mergedHistory=trim30DayHistory([...history,...fbNew]);
          setHistory(mergedHistory);
          try{localStorage.setItem("hg_pomo_history",JSON.stringify(mergedHistory));}catch(e){}
        }
        // Merge focusLog: local keys win (they're always more fresh)
        const fbFocusLog=data.focusLog&&typeof data.focusLog==="object"?data.focusLog:{};
        const mergedFocusLog={...fbFocusLog,...focusLog};// local wins per date
        const healedFocusLog=rebuildFocusLog(mergedHistory,mergedFocusLog);
        setFocusLog(healedFocusLog);
        try{localStorage.setItem("hg_pomo_focuslog",JSON.stringify(healedFocusLog));}catch(e){}
        // Push merged data back to Firebase to keep in sync
        fbR.setDoc(fbR.doc(fbR.db,"users",user.uid),{pomoHistory:mergedHistory,focusLog:healedFocusLog},{merge:true}).catch(e=>console.error("Pomodoro merge sync err:",e));
      }).catch(e=>console.error("Pomodoro sync load err:",e));
    }
  },[]);

  // Shared session-logging — updates capped history (recent list) + never-pruned focusLog aggregate, syncs both to Firebase
  function logSession(entry){
    const updatedHistory=trim30DayHistory([entry,...history]);
    setHistory(updatedHistory);
    try{localStorage.setItem("hg_pomo_history",JSON.stringify(updatedHistory));}catch(e){}

    const d=entry.date,lbl=entry.label||"Focus";
    const prev=focusLog[d]||{totalMin:0,sessions:0,byCategory:{}};
    const updatedFocusLog={...focusLog,[d]:{
      totalMin:(prev.totalMin||0)+entry.mins,
      sessions:(prev.sessions||0)+1,
      byCategory:{...(prev.byCategory||{}),[lbl]:((prev.byCategory&&prev.byCategory[lbl])||0)+entry.mins}
    }};
    setFocusLog(updatedFocusLog);
    try{localStorage.setItem("hg_pomo_focuslog",JSON.stringify(updatedFocusLog));}catch(e){}

    if(user?.uid&&window._fb){
      const fbR=window._fb;
      fbR.setDoc(fbR.doc(fbR.db,"users",user.uid),{pomoHistory:updatedHistory,focusLog:updatedFocusLog},{merge:true}).catch(e=>console.error("Pomodoro sync save err:",e));
    }
  }

  const MODE_ICONS={
    focus:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>,
    short:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>,
    long:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22V12M12 12C12 12 8 8 8 5a4 4 0 0 1 8 0c0 3-4 7-4 7z"/><path d="M12 22c-3 0-6-2-6-5h12c0 3-3 5-6 5z"/></svg>,
  };
  const MODES=[["focus","","Focus"],["short","","Short Break"],["long","","Long Break"]];
  const QUICK_LABELS=["Focus","Study","Work","Exercise","Reading","Meditation","Practice","Research"];
  const CHIPS=[15,30,45,60];

  const completedRef=useRef(false);

  useEffect(()=>{
    if(run){
      completedRef.current=false;
      iv.current=setInterval(()=>{
        setSecs(s=>{
          if(s<=1){
            clearInterval(iv.current);
            completedRef.current=true;
            return 0;
          }
          return s-1;
        });
      },1000);
    } else {
      clearInterval(iv.current);
      // Handle completion after run stops
      if(completedRef.current){
        completedRef.current=false;
        const label=customLabel||sessionLabel;
        const mins=durations[mode];
        const entry={id:Date.now(),label,mode,mins,time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),date:today};
        logSession(entry);
        setTab("history");
        try{if(typeof Notification!=="undefined"&&Notification.permission==="granted")new Notification("⚡ Session Complete!",{body:label+" — "+mins+"m done! 🎉",icon:"/icon-192.png"});}catch(e){}
      }
    }
    return()=>clearInterval(iv.current);
  },[run]);

  // When timer hits 0, stop running (triggers completion in run useEffect)
  useEffect(()=>{
    if(secs===0&&run){setRun(false);}
  },[secs]);

  function switchMode(m){setMode(m);setSecs(durations[m]*60);setRun(false);}
  function setChip(mins){const nd={...durations,[mode]:mins};setDurations(nd);setSecs(mins*60);setRun(false);}
  function saveAndReset(){
    const totalS=durations[mode]*60;
    const elapsedS=totalS-secs;
    if(elapsedS<60){setSecs(totalS);setRun(false);return;} // under 1 min — discard, don't clutter history
    const elapsedMins=Math.round(elapsedS/60);
    const label=customLabel||sessionLabel;
    const entry={id:Date.now(),label,mode,mins:elapsedMins,time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),date:today,partial:true};
    logSession(entry);
    setSecs(totalS);setRun(false);
    showToastGlobal("💾 Saved "+elapsedMins+"m session!");
  }
  function startEdit(m){setEditing(m);setEditVal(String(durations[m]));}
  function saveEdit(m){
    const v=parseInt(editVal);
    if(v>0&&v<=240){const nd={...durations,[m]:v};setDurations(nd);if(mode===m){setSecs(v*60);setRun(false);}}
    setEditing(null);
  }

  const totalSecs=durations[mode]*60;
  const pct=((totalSecs-secs)/totalSecs)*100;
  const r2=80,ci=2*Math.PI*r2;
  // Item 25: show elapsed time counting up (00:00 → set limit) once started; show the full set duration while idle/never-started
  const elapsedSecs=secs===totalSecs?totalSecs:totalSecs-secs;
  const mm=String(Math.floor(elapsedSecs/60)).padStart(2,"0"),ss2=String(elapsedSecs%60).padStart(2,"0");
  const todayLog=focusLog[today]||{totalMin:0,sessions:0,byCategory:{}};
  const todaySessCount=todayLog.sessions;
  const todayMins=todayLog.totalMin;

  // ── ANALYTICS HELPERS — read from focusLog (never pruned, decoupled from 30-entry history cap) ──
  function getWeekData(){
    const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toLocaleDateString("en-CA"));}
    return days.map(d=>{
      const mins=(focusLog[d]&&focusLog[d].totalMin)||0;
      return{date:d,mins,label:new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"})};
    });
  }

  function getMonthData(){
    const now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
    const days=new Date(yr,mo+1,0).getDate();
    return Array.from({length:days},(_,i)=>{
      const d=yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(i+1).padStart(2,"0");
      const mins=(focusLog[d]&&focusLog[d].totalMin)||0;
      return{day:i+1,mins};
    });
  }

  function getYearData(){
    const yr=new Date().getFullYear();
    const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return MONTHS.map((m,mi)=>{
      const prefix=yr+"-"+String(mi+1).padStart(2,"0");
      const mins=Object.entries(focusLog).filter(([d])=>d.startsWith(prefix)).reduce((s,[,v])=>s+(v.totalMin||0),0);
      return{month:m,mins,hrs:Math.round(mins/60*10)/10};
    });
  }

  // dateFilter: null = all-time, or a function(dateStr)=>bool
  function getLabelBreakdown(dateFilter){
    const map={};
    Object.entries(focusLog).forEach(([d,v])=>{
      if(dateFilter&&!dateFilter(d))return;
      Object.entries(v.byCategory||{}).forEach(([label,mins])=>{map[label]=(map[label]||0)+mins;});
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,6);
  }

  function getSessionCount(dateFilter){
    return Object.entries(focusLog).filter(([d])=>!dateFilter||dateFilter(d)).reduce((s,[,v])=>s+(v.sessions||0),0);
  }

  // ── TIMER TAB ──────────────────────────────────────────────────
  function TimerTab(){
    return(<div>
      {/* Mode switcher */}
      <div style={{display:"flex",gap:6,background:t.surface,borderRadius:12,padding:4,marginBottom:20}}>
        {MODES.map(([m,ic,l])=>(
          <button key={m} onClick={()=>switchMode(m)} style={{flex:1,padding:"8px 4px",borderRadius:9,border:"none",cursor:"pointer",background:mode===m?t.accent:"none",color:mode===m?"#000":t.muted,fontWeight:700,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4,boxShadow:mode===m?"0 0 8px "+t.accent+"66":"none"}}>
            <span style={{display:"flex",alignItems:"center"}}>{MODE_ICONS[m]}</span><span>{l}</span>
          </button>
        ))}
      </div>

      {/* Session label */}
      <div style={{marginBottom:16,textAlign:"center"}}>
        {!showLabelInput?(
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
            {QUICK_LABELS.slice(0,6).map(l=>(
              <button key={l} onClick={()=>{setSessionLabel(l);setCustomLabel("");}} style={{padding:"5px 12px",borderRadius:20,border:"1px solid "+(sessionLabel===l&&!customLabel?t.accent:t.border),background:sessionLabel===l&&!customLabel?t.accent+"18":t.surface,color:sessionLabel===l&&!customLabel?t.accent:t.muted,cursor:"pointer",fontSize:11,fontWeight:sessionLabel===l&&!customLabel?700:400}}>{l}</button>
            ))}
            <button onClick={()=>setShowLabelInput(true)} style={{padding:"5px 12px",borderRadius:20,border:"1px solid "+t.border,background:t.surface,color:t.muted,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",gap:4}}>{IC.edit(t.muted,12)} Custom</button>
          </div>
        ):(
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <input autoFocus value={customLabel} onChange={e=>setCustomLabel(e.target.value)} placeholder="Session name..." style={{flex:1,padding:"8px 12px",borderRadius:10,border:"1px solid "+t.accent,background:t.surface,color:t.text,fontSize:13}}/>
            <button onClick={()=>setShowLabelInput(false)} style={{padding:"8px 12px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>✓</button>
          </div>
        )}
      </div>

      {/* Duration chips */}
      <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:8,flexWrap:"wrap"}}>
        {CHIPS.map(c=>(
          <button key={c} onClick={()=>setChip(c)} style={{padding:"5px 14px",borderRadius:20,border:"1px solid "+(durations[mode]===c?t.accent:t.border),background:durations[mode]===c?t.accent+"18":t.surface,color:durations[mode]===c?t.accent:t.muted,cursor:"pointer",fontSize:12,fontWeight:durations[mode]===c?700:400}}>{c}m</button>
        ))}
        {/* Custom duration */}
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          {editing===mode?(
            <>
              <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEdit(mode);if(e.key==="Escape")setEditing(null);}} style={{width:44,padding:"4px 6px",borderRadius:8,border:"1px solid "+t.accent,background:t.surface,color:t.text,fontSize:12,textAlign:"center"}}/>
              <span style={{fontSize:10,color:t.muted}}>m</span>
              <button onClick={()=>saveEdit(mode)} style={{background:"none",border:"none",color:t.success,cursor:"pointer",fontSize:13}}>✓</button>
            </>
          ):(
            <button onClick={()=>startEdit(mode)} style={{padding:"5px 12px",borderRadius:20,border:"1px solid "+t.border,background:t.surface,color:t.muted,cursor:"pointer",fontSize:11}}>Custom</button>
          )}
        </div>
      </div>

      {/* Timer ring */}
      <div style={{position:"relative",width:200,height:200,margin:"16px auto 20px",filter:"drop-shadow(0 0 "+(run?"16px":"8px")+" "+(secs===0?t.success:t.accent)+(run?"aa":"66")+")",transition:"filter 0.5s"}}>
        <svg width={200} height={200} style={{transform:"rotate(-90deg)"}}>
          <circle cx={100} cy={100} r={r2} fill="none" stroke={t.border} strokeWidth={12}/>
          <circle cx={100} cy={100} r={r2} fill="none" stroke={run?t.accent:secs===0?t.success:t.accent} strokeWidth={12} strokeDasharray={ci} strokeDashoffset={ci-(pct/100)*ci} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:42,fontWeight:800,color:secs===0?t.success:t.text,letterSpacing:-2,fontVariantNumeric:"tabular-nums"}}>{mm}:{ss2}</span>
          <span style={{fontSize:11,color:t.muted,textTransform:"uppercase",letterSpacing:2,marginTop:2}}>{customLabel||sessionLabel}</span>
          {run&&<span style={{fontSize:10,color:t.accent,marginTop:4,animation:"fadeIn 1s infinite alternate"}}>● LIVE</span>}
        </div>
      </div>

      {/* Controls */}
      <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16,flexWrap:"wrap"}}>
        <button onClick={()=>setRun(r=>!r)} style={{padding:"13px 36px",borderRadius:14,border:"none",cursor:"pointer",background:"linear-gradient(135deg,"+t.accent+","+t.accent2+")",color:"#000",fontWeight:700,fontSize:17,boxShadow:"0 4px 18px "+t.accent+"66"}}>{run?"⏸ Pause":"▶ Start"}</button>
        <button onClick={()=>{setSecs(durations[mode]*60);setRun(false);}} style={{padding:"13px 18px",borderRadius:14,border:"1px solid "+t.border,cursor:"pointer",background:"none",color:t.text,fontWeight:600}}>↺ Reset</button>
        {secs<durations[mode]*60&&<button onClick={saveAndReset} style={{padding:"13px 18px",borderRadius:14,border:"1px solid "+t.accent+"66",cursor:"pointer",background:t.accent+"15",color:t.accent,fontWeight:700,fontSize:13}}>💾 Save & Reset</button>}
      </div>

      {/* Today stats */}
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        {[[todaySessCount+"","Sessions Today",t.accent],[todayMins+"m","Focus Today",t.success],[Math.round(todayMins/60*10)/10+"h","Hours",t.info]].map(([v,l,c])=>(
          <div key={l} style={{flex:1,background:premiumCard(t,c),border:"1px solid "+t.border,borderRadius:12,padding:"8px 6px",textAlign:"center",boxShadow:premiumShadow(t,c)}}>
            <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:9,color:t.muted,marginTop:2,textTransform:"uppercase",letterSpacing:0.3}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:9,color:t.muted,textAlign:"center",opacity:0.7,marginBottom:4}}>⏱️ Sessions under 1 minute aren't saved to history</div>
    </div>);
  }

  // ── HISTORY TAB ────────────────────────────────────────────────
  function HistoryTab(){
    return(<div>
      <PomodoroMiniCal t={t} focusLog={focusLog} history={history} today2={today}/>
      {Object.keys(focusLog||{}).length===0&&(
        <div style={{textAlign:"center",padding:"48px 16px"}}>
          <div style={{fontSize:40,marginBottom:12}}>⏱️</div>
          <div style={{fontSize:15,fontWeight:700,color:t.text,marginBottom:6}}>No sessions yet</div>
          <div style={{fontSize:13,color:t.muted}}>Complete a session to see your history</div>
        </div>
      )}
    </div>);
  }

  // ── ANALYTICS TAB ──────────────────────────────────────────────
  function AnalyticsTab(){
    const weekData=getWeekData();
    const weekTotal=weekData.reduce((s,d)=>s+d.mins,0);
    const weekDateFilter=d=>{const dt=new Date(d+"T12:00:00");return(new Date()-dt)/86400000<=7;};
    const weekSessionCount=getSessionCount(weekDateFilter);
    const weekLabels=getLabelBreakdown(weekDateFilter);
    const maxBar=Math.max(...weekData.map(d=>d.mins),1);

    return(<div>
      {/* Week selector — Free for all */}
      <div style={{display:"flex",gap:6,background:t.surface,borderRadius:10,padding:3,marginBottom:16}}>
        {[["week","Week",true],["month","Month",plan.heat],["year","Year",plan.yearReview]].map(([k,l,allowed])=>(
          <button key={k} onClick={()=>allowed?setAnalyticsTab(k):showUp&&showUp(k==="month"?"📊 Monthly Pomodoro analytics is a Pro feature!":"💎 Yearly Pomodoro analytics is a Plus feature!")} style={{flex:1,padding:"7px",borderRadius:8,border:"none",cursor:allowed?"pointer":"default",background:analyticsTab===k?t.accent:"none",color:analyticsTab===k?"#000":allowed?t.muted:t.border,fontWeight:analyticsTab===k?700:400,fontSize:12,position:"relative",boxShadow:analyticsTab===k?"0 0 8px "+t.accent+"66":"none"}}>
            {l}{!allowed&&<span style={{fontSize:8,marginLeft:3,color:k==="month"?t.accent:"#a78bfa"}}>{k==="month"?"PRO":"PLUS"}</span>}
          </button>
        ))}
      </div>

      {/* Weekly view */}
      {analyticsTab==="week"&&<div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[[weekTotal+"m","This Week",t.accent],[weekSessionCount+"","Sessions",t.success],[Math.round(weekTotal/7)+"m","Daily Avg",t.info]].map(([v,l,c])=>(
            <div key={l} style={{flex:1,background:premiumCard(t,c),border:"1px solid "+t.border,borderRadius:12,padding:"10px 6px",textAlign:"center",boxShadow:premiumShadow(t,c)}}>
              <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:9,color:t.muted,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
        {/* N3-D: Empty state when no sessions yet */}
        {weekTotal===0&&weekSessionCount===0&&<div style={{textAlign:"center",padding:"28px 16px",background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,marginBottom:14}}>
          <img src="/mo/mo-meditate.png" alt="Mo" style={{width:56,height:56,objectFit:"contain",marginBottom:12}} onError={e=>e.target.style.display="none"}/>
          <div style={{fontSize:13,fontWeight:700,color:t.text,marginBottom:6}}>No focus sessions yet</div>
          <div style={{fontSize:11,color:t.muted,lineHeight:1.6,marginBottom:14}}>Start your first Pomodoro timer to see your focus analytics here.</div>
          <button onClick={()=>setTab("timer")} style={{padding:"9px 20px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,fontSize:12,cursor:"pointer"}}>Start Focusing →</button>
        </div>}
        {/* Bar chart */}
        {weekTotal>0&&<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,marginBottom:14,boxShadow:premiumShadow(t)}}>
          <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:12}}>Daily Focus Time</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80}}>
            {weekData.map((d,i)=>{
              const h2=d.mins>0?Math.max(8,(d.mins/maxBar)*72):3;
              const isT=d.date===today;
              return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                {d.mins>0&&<span style={{fontSize:8,color:isT?t.accent:t.muted,fontWeight:700}}>{d.mins}m</span>}
                <div style={{width:"100%",height:h2,background:isT?"linear-gradient(180deg,"+t.accent+","+t.accent2+")":d.mins>0?t.success+"88":t.border,borderRadius:"4px 4px 0 0",transition:"height 0.4s",boxShadow:d.mins>0?"0 0 6px "+(isT?t.accent:t.success)+"77":"none"}}/>
                <span style={{fontSize:9,color:isT?t.accent:t.muted,fontWeight:isT?700:400}}>{d.label}</span>
              </div>);
            })}
          </div>
          {weekLabels.length>0&&<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,marginTop:14,boxShadow:premiumShadow(t)}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:10}}>By Activity</div>
            {weekLabels.map(([label,mins])=>(
              <div key={label} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:t.text,fontWeight:600}}>{label}</span>
                  <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{mins}m · {Math.round(mins/60*10)/10}h</span>
                </div>
                <div style={{height:6,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:(mins/weekTotal)*100+"%",background:"linear-gradient(90deg,"+t.accent+","+t.accent2+")",borderRadius:4,boxShadow:"0 0 6px "+t.accent+"66"}}/></div>
              </div>
            ))}
          </div>}
        </div>}
      </div>}

      {/* Monthly view — Pro */}
      {analyticsTab==="month"&&plan.heat&&(()=>{
        const monthData=getMonthData();
        const monthTotal=monthData.reduce((s,d)=>s+d.mins,0);
        const now=new Date();
        const monthDateFilter=d=>{const dt=new Date(d+"T12:00:00");return dt.getFullYear()===now.getFullYear()&&dt.getMonth()===now.getMonth();};
        const monthSessionCount=getSessionCount(monthDateFilter);
        const monthLabels=getLabelBreakdown(monthDateFilter);
        const maxM=Math.max(...monthData.map(d=>d.mins),1);
        return(<div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {[[monthTotal+"m","This Month",t.accent],[monthSessionCount+"","Sessions",t.success],[Math.round(monthTotal/now.getDate())+"m","Daily Avg",t.info]].map(([v,l,c])=>(
              <div key={l} style={{flex:1,background:premiumCard(t,c),border:"1px solid "+t.border,borderRadius:12,padding:"10px 6px",textAlign:"center",boxShadow:premiumShadow(t,c)}}>
                <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:t.muted,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,marginBottom:14,boxShadow:premiumShadow(t)}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:12}}>Daily Focus — {now.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:1.5,height:60,overflowX:"auto"}}>
              {monthData.map((d,i)=>{
                const h2=d.mins>0?Math.max(6,(d.mins/maxM)*56):2;
                const isT=d.day===now.getDate();
                return(<div key={i} style={{minWidth:8,flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{width:"100%",height:h2,background:isT?"linear-gradient(180deg,"+t.accent+","+t.accent2+")":d.mins>0?t.success+"99":t.border,borderRadius:"2px 2px 0 0",boxShadow:d.mins>0?"0 0 5px "+(isT?t.accent:t.success)+"77":"none"}}/>
                  {(d.day===1||d.day%5===0)&&<span style={{fontSize:7,color:t.muted}}>{d.day}</span>}
                </div>);
              })}
            </div>
          </div>
          {monthLabels.length>0&&<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,boxShadow:premiumShadow(t)}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:10}}>By Activity — This Month</div>
            {monthLabels.map(([label,mins])=>(
              <div key={label} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:t.text,fontWeight:600}}>{label}</span>
                  <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{mins}m · {Math.round(mins/60*10)/10}h</span>
                </div>
                <div style={{height:6,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:(mins/monthTotal)*100+"%",background:"linear-gradient(90deg,"+t.accent+","+t.accent2+")",borderRadius:4,boxShadow:"0 0 6px "+t.accent+"66"}}/></div>
              </div>
            ))}
          </div>}
        </div>);
      })()}

      {/* Yearly view — Plus */}
      {analyticsTab==="year"&&(plan.yearReview?(()=>{
        const yearData=getYearData();
        const yearTotal=yearData.reduce((s,d)=>s+d.mins,0);
        const allLabels=getLabelBreakdown(null);
        const allSessionCount=getSessionCount(null);
        const maxY=Math.max(...yearData.map(d=>d.mins),1);
        const now=new Date();
        return(<div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {[[Math.round(yearTotal/60)+"h","Total Hours",t.accent],[allSessionCount+"","All Sessions",t.success],[Math.round(yearTotal/365)+"m","Daily Avg",t.info]].map(([v,l,c])=>(
              <div key={l} style={{flex:1,background:premiumCard(t,c),border:"1px solid "+t.border,borderRadius:12,padding:"10px 6px",textAlign:"center",boxShadow:premiumShadow(t,c)}}>
                <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:t.muted,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,marginBottom:14,boxShadow:premiumShadow(t)}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:12}}>Monthly Focus — {now.getFullYear()}</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:3,height:80}}>
              {yearData.map((d,i)=>{
                const h2=d.mins>0?Math.max(6,(d.mins/maxY)*72):3;
                const isPast=i<now.getMonth();
                const isCurrent=i===now.getMonth();
                const col=isCurrent?t.accent:d.mins>=120?t.success:d.mins>0?t.success+"66":t.border;
                return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  {d.hrs>0&&<span style={{fontSize:7,color:isCurrent?t.accent:t.muted,fontWeight:isCurrent?700:400}}>{d.hrs}h</span>}
                  <div style={{width:"100%",height:h2,background:isCurrent?"linear-gradient(180deg,"+t.accent+","+t.accent2+")":col,borderRadius:"3px 3px 0 0",opacity:!isPast&&!isCurrent?0.3:1,transition:"height 0.4s",boxShadow:d.mins>0?"0 0 6px "+col+"77":"none"}}/>
                  <span style={{fontSize:8,color:isCurrent?t.accent:t.muted,fontWeight:isCurrent?700:400}}>{d.month}</span>
                </div>);
              })}
            </div>
          </div>
          {allLabels.length>0&&<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:14,padding:14,boxShadow:premiumShadow(t)}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text,marginBottom:10}}>All-Time by Activity</div>
            {allLabels.map(([label,mins])=>(
              <div key={label} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:t.text,fontWeight:600}}>{label}</span>
                  <span style={{fontSize:12,color:t.accent,fontWeight:700}}>{Math.round(mins/60*10)/10}h total</span>
                </div>
                <div style={{height:6,background:t.surface,borderRadius:4}}><div style={{height:"100%",width:(mins/yearTotal)*100+"%",background:"linear-gradient(90deg,#a78bfa,#c084fc)",borderRadius:4,boxShadow:"0 0 6px #a78bfa66"}}/></div>
              </div>
            ))}
          </div>}
        </div>);
      })():<div style={{textAlign:"center",padding:32}}>
        <div style={{fontSize:32,marginBottom:10}}>📊</div>
        <div style={{fontSize:13,fontWeight:700,color:t.text,marginBottom:8}}>Yearly Pomodoro Analytics</div>
        <div style={{fontSize:11,color:t.muted,marginBottom:16}}>Full year focus trends — Plus feature</div>
        <button onClick={()=>showUp&&showUp("💎 Yearly Pomodoro analytics is a Plus feature!")} style={{padding:"10px 24px",borderRadius:12,border:"none",background:"#a78bfa",color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>💎 Upgrade to Plus</button>
      </div>)}
    </div>);
  }

  return(
    <div style={{position:"fixed",inset:0,background:t.bg,zIndex:1000,display:"flex",flexDirection:"column",fontFamily:"'Sora',system-ui,sans-serif"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px 0",flexShrink:0}}>
        <div style={{fontSize:18,fontWeight:800,display:"flex",alignItems:"center",gap:6}}><span>⏱️</span><span style={gradText(t)}>Pomodoro</span></div>
        <button onClick={()=>{if(run){setShowCloseWarning(true);}else{close();}}} style={{background:t.surface,border:"1px solid "+t.border,borderRadius:"50%",width:32,height:32,cursor:"pointer",color:t.muted,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>

      {/* Tab switcher */}
      <div style={{display:"flex",gap:0,margin:"14px 20px 0",background:t.surface,borderRadius:12,padding:3,flexShrink:0}}>
{[
          ["timer",<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg> Timer</>],
          ["history",<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3h6l2 3h10v13H3z"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg> History</>],
          ["analytics",<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Analytics</>],
        ].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 4px",borderRadius:9,border:"none",cursor:"pointer",background:tab===k?t.accent:"none",color:tab===k?"#000":t.muted,fontWeight:tab===k?700:500,fontSize:11,boxShadow:tab===k?"0 0 8px "+t.accent+"66":"none",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>{l}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px 32px"}}>
        {tab==="timer"&&<TimerTab/>}
        {tab==="history"&&<HistoryTab/>}
        {tab==="analytics"&&<AnalyticsTab/>}
      </div>

      {/* Timer running close warning */}
      {showCloseWarning&&<div style={{position:"fixed",inset:0,background:"#000c",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}} onClick={()=>setShowCloseWarning(false)}>
        <div style={{background:t.card,border:"1px solid "+t.border,borderRadius:16,padding:20,width:"100%",maxWidth:340}} onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:32,textAlign:"center",marginBottom:8}}>⏱️</div>
          <div style={{fontSize:14,fontWeight:800,color:t.text,textAlign:"center",marginBottom:6}}>Timer is running!</div>
          <div style={{fontSize:12,color:t.muted,textAlign:"center",marginBottom:18,lineHeight:1.5}}>Stop and save your progress, or keep it running and close anyway?</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <button onClick={()=>{setShowCloseWarning(false);saveAndReset();close();}} style={{width:"100%",padding:"11px",borderRadius:12,border:"1px solid "+t.success+"66",background:t.success+"15",color:t.success,fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>💾 Stop & Save Progress</button>
            <button onClick={()=>{setShowCloseWarning(false);close();}} style={{width:"100%",padding:"11px",borderRadius:12,border:"1px solid "+t.accent+"66",background:t.accent+"15",color:t.accent,fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>▶ Keep Running</button>
            <button onClick={()=>setShowCloseWarning(false)} style={{width:"100%",padding:"9px",borderRadius:12,border:"1px solid "+t.border,background:"none",color:t.muted,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

function CalModal({t,close,habits,goals}){
  const now=new Date();
  const[yr,setYr]=useState(now.getFullYear());
  const[mo,setMo]=useState(now.getMonth());
  const[selDay,setSelDay]=useState(null);
  const[dayNote,setDayNote]=useState("");
  const[saved,setSaved]=useState(false);
  const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const days=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay(),today=td();
  const ds=d=>yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

  function openDay(dateStr){
    setSelDay(dateStr);setSaved(false);
    try{const n=JSON.parse(localStorage.getItem("hg_day_notes")||"{}");setDayNote(n[dateStr]||"");}
    catch{setDayNote("");}
  }
  function saveNote(){
    try{const n=JSON.parse(localStorage.getItem("hg_day_notes")||"{}");n[selDay]=dayNote;localStorage.setItem("hg_day_notes",JSON.stringify(n));setSaved(true);setTimeout(()=>setSaved(false),1500);}
    catch{}
  }

  if(selDay){
    const isFuture=selDay>today;
    const isPast=selDay<=today;
    const doneHabits=habits.filter(h=>isFullDoneOn(h,selDay,h.log&&h.log[selDay]));
    const missedHabits=habits.filter(h=>!isFullDoneOn(h,selDay,h.log&&h.log[selDay]));
    const doneActions=goals.flatMap(g=>g.actions.filter(a=>a.doneAt===selDay).map(a=>({...a,goalTitle:g.title})));
    const deadlineGoals=goals.filter(g=>g.deadline===selDay);
    const actionsDue=goals.flatMap(g=>g.actions.filter(a=>a.dueDate===selDay&&!a.done).map(a=>({...a,goalTitle:g.title,goalPriority:g.priority})));
    const actionsDueBlock=actionsDue.length>0&&(<div style={{marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:700,color:"#f59e0b",textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>📋 Actions Due ({actionsDue.length})</div>
      {actionsDue.map(a=>{
        const pCol=a.goalPriority==="High"?t.danger:a.goalPriority==="Medium"?t.accent:t.success;
        return(<div key={a.id} style={{padding:"7px 10px",background:"linear-gradient(90deg,rgba(245,158,11,0.15),"+t.card+")",border:"1px solid rgba(245,158,11,0.2)",borderLeft:"3px solid #f59e0b",borderRadius:8,marginBottom:5,boxShadow:"0 4px 14px rgba(245,158,11,0.18)"}}>
          <div style={{fontSize:12,fontWeight:600,color:t.text,marginBottom:2}}>{a.action}</div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:9,color:t.muted}}>{a.goalTitle}</span>
            <span style={{fontSize:9,padding:"1px 6px",borderRadius:6,background:pCol+"22",color:pCol,fontWeight:700}}>{a.goalPriority}</span>
            {a.time&&<span style={{fontSize:9,color:"#f59e0b",fontWeight:700}}>⏰ {a.time}</span>}
          </div>
        </div>);
      })}
    </div>);
    const displayDate=new Date(selDay+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

    return(<Modal t={t} close={close} title="📅 Calendar">
      <button onClick={()=>setSelDay(null)} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:13,marginBottom:14,padding:0}}>← Back to {MN[mo]}</button>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:16,fontWeight:800,color:t.text,marginBottom:3}}>{displayDate}</div>
        <div style={{fontSize:11,fontWeight:600,color:selDay===today?t.accent:isFuture?t.info:t.muted}}>{selDay===today?"Today — check in below":isFuture?"Future — Day Planner":"Past day"}</div>
      </div>

      {/* PAST / TODAY: Day Detail */}
      {isPast&&<div>
        {doneHabits.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.success,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>✅ Habits Done ({doneHabits.length})</div>
          {doneHabits.map(h=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"linear-gradient(90deg,"+t.success+"18,"+t.card+")",borderLeft:"3px solid "+t.success,borderRadius:8,marginBottom:5,fontSize:13,boxShadow:premiumShadow(t,t.success)}}>
              <span>{h.icon}</span><span style={{fontWeight:600}}>{h.name}</span>
            </div>
          ))}
        </div>}
        {missedHabits.length>0&&habits.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.danger,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>❌ Missed ({missedHabits.length})</div>
          {missedHabits.map(h=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:t.danger+"12",borderRadius:8,marginBottom:5,fontSize:13,opacity:0.7}}>
              <span>{h.icon}</span><span>{h.name}</span>
            </div>
          ))}
        </div>}
        {doneActions.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.info,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>🎯 Actions Completed ({doneActions.length})</div>
          {doneActions.map(a=>(
            <div key={a.id} style={{padding:"7px 10px",background:"linear-gradient(90deg,"+t.info+"18,"+t.card+")",borderLeft:"3px solid "+t.info,borderRadius:8,marginBottom:5,boxShadow:premiumShadow(t,t.info)}}>
              <div style={{fontSize:12,fontWeight:600,color:t.text}}>{a.action}</div>
              <div style={{fontSize:10,color:t.muted}}>{a.goalTitle}</div>
            </div>
          ))}
        </div>}
        {/* Fix 17: Actions Due on this day */}
        {actionsDueBlock}
        {deadlineGoals.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:t.accent,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>📌 Goal Deadlines</div>
          {deadlineGoals.map(g=><div key={g.id} style={{fontSize:12,color:t.text,padding:"5px 10px",background:"linear-gradient(90deg,"+t.accent+"18,"+t.card+")",borderLeft:"3px solid "+t.accent,borderRadius:8,marginBottom:5,fontWeight:600,boxShadow:premiumShadow(t,t.accent)}}>{g.title}</div>)}
        </div>}
        {habits.length===0&&<div style={{textAlign:"center",color:t.muted,padding:20,fontSize:13}}>No habit data for this day yet.</div>}
        {/* Day note */}
        <div style={{marginTop:4}}>
          <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>📝 Day Note</div>
          <textarea value={dayNote} onChange={e=>setDayNote(e.target.value)} placeholder="Add a personal note for this day..." maxLength={500} style={{width:"100%",height:72,padding:"9px 11px",borderRadius:10,border:"1px solid "+t.border,background:t.surface,color:t.text,fontSize:13,resize:"none",lineHeight:1.5}}/>
          <button onClick={saveNote} style={{marginTop:7,padding:"8px 18px",borderRadius:10,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>{saved?"Saved ✓":"Save Note"}</button>
        </div>
      </div>}

      {/* FUTURE: Day Planner */}
      {isFuture&&<div>
        {actionsDueBlock}
        {deadlineGoals.length>0&&<div style={{background:premiumCard(t,t.accent),border:"1px solid "+t.accent+"44",borderRadius:14,padding:"10px 12px",marginBottom:14,boxShadow:premiumShadow(t,t.accent)}}>
          <div style={{fontSize:11,fontWeight:700,color:t.accent,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>📌 Goal Deadlines on this day</div>
          {deadlineGoals.map(g=>{
            const done=g.actions.filter(a=>a.done).length;
            const pct=g.actions.length>0?Math.round((done/g.actions.length)*100):0;
            const pCol=g.priority==="High"?t.danger:g.priority==="Medium"?t.accent:t.success;
            return(<div key={g.id} style={{padding:"8px 10px",background:t.card,borderRadius:9,marginBottom:6,borderLeft:"3px solid "+pCol,boxShadow:premiumShadow(t,pCol)}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <div style={{fontSize:13,fontWeight:700,color:t.text}}>{g.title}</div>
                <span style={{fontSize:12,fontWeight:700,color:pct===100?t.success:t.accent}}>{pct}%</span>
              </div>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>

    {icon:"⚡",label:"TODAY'S ONE MOVE",points:[oneMove.icon+" "+oneMove.text]},
    {icon:"🔍",label:"PATTERNS DETECTED",points:patternPoints},
    {icon:"🎯",label:"GOAL FORECAST",points:forecastPoints},
  ];
  const insights=[...computedCards,coachCard].filter(Boolean); // full set, used for ⭐ save/history
  const displayCards=insights.slice(1); // skip Momentum (shown as header instead)

  // Credits: Firebase is source of truth (fixes localStorage-clear causing false resets to 50); localStorage = fast cache
  useEffect(()=>{
    const key="hg_ai_credits_"+(user?.uid||"guest");
    const resetKey="hg_ai_reset_"+(user?.uid||"guest");
    const thisMonth=today.slice(0,7);
    const maxC=plan.plus?PLUS_MAX:0;
    const stored=localStorage.getItem(key);
    const resetDate=localStorage.getItem(resetKey);
    // Instant display from cache while Firebase loads
    if(resetDate===thisMonth&&stored!==null){
      setCredits(parseInt(stored));
    } else {
      setCredits(maxC);
    }
    // Load history (local cache, instant display)
    try{const h=JSON.parse(localStorage.getItem("hg_ai_hist_"+(user?.uid||"guest"))||"[]");setAiHistory(h);}catch{}
    // Firebase is source of truth — sync/reconcile (credits + history, one read)
    if(user?.uid&&window._fb){
      const fbR=window._fb;
      fbR.getDoc(fbR.doc(fbR.db,"users",user.uid)).then(snap=>{
        const data=snap.exists()?snap.data():{};
        const fbMonth=data.aiCreditsResetMonth;
        let finalCredits;
        if(fbMonth!==thisMonth){
          finalCredits=maxC;
          fbR.setDoc(fbR.doc(fbR.db,"users",user.uid),{aiCredits:finalCredits,aiCreditsResetMonth:thisMonth},{merge:true}).catch(e=>console.error("AI credit reset err:",e));
        } else {
          finalCredits=typeof data.aiCredits==="number"?data.aiCredits:maxC;
        }
        setCredits(finalCredits);
        localStorage.setItem(key,String(finalCredits));
        localStorage.setItem(resetKey,thisMonth);
        // Item 22: merge this device's local-only history with Firebase's, so nothing from either device is lost
        const fbHist=Array.isArray(data.aiHistory)?data.aiHistory:[];
        let localHist=[];
        try{localHist=JSON.parse(localStorage.getItem("hg_ai_hist_"+user.uid)||"[]");}catch{}
        const seen=new Set();
        const merged=[...fbHist,...localHist].filter(h=>{
          const hk=(h.type||"")+"|"+(h.summary||"")+"|"+(h.date||"");
          if(seen.has(hk))return false;
          seen.add(hk);return true;
        }).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,HIST_MAX);
        setAiHistory(merged);
        localStorage.setItem("hg_ai_hist_"+user.uid,JSON.stringify(merged));
        fbR.setDoc(fbR.doc(fbR.db,"users",user.uid),{aiHistory:merged},{merge:true}).catch(e=>console.error("AI history sync err:",e));
      }).catch(e=>console.error("AI credit load err:",e));
    }
  },[]);

  function deductCredit(n=1){
    const key="hg_ai_credits_"+(user?.uid||"guest");
    const newC=Math.max(0,(credits||0)-n);
    setCredits(newC);
    localStorage.setItem(key,String(newC));
    if(user?.uid&&window._fb){
      const fbR=window._fb;
      fbR.setDoc(fbR.doc(fbR.db,"users",user.uid),{aiCredits:newC,aiCreditsResetMonth:today.slice(0,7)},{merge:true}).catch(e=>console.error("AI credit save err:",e));
    }
    return newC>=0;
  }

  function saveHistory(type,summary,data){
    const entry={type,summary,data,date:new Date().toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}),ts:Date.now()};
    const h=[entry,...aiHistory].slice(0,HIST_MAX);
    setAiHistory(h);
    localStorage.setItem("hg_ai_hist_"+(user?.uid||"guest"),JSON.stringify(h));
    if(user?.uid&&window._fb){
      const fbR=window._fb;
      fbR.setDoc(fbR.doc(fbR.db,"users",user.uid),{aiHistory:h},{merge:true}).catch(e=>console.error("AI history save err:",e));
    }
  }

  // Build user data context string for AI
  function buildUserContext(){
    const habitSummary=habits.map(h=>{
      const logs=Object.entries(h.log||{}).filter(([,v])=>!!v);
      const recentDays=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
      const now=new Date();
      const dayPattern=Array.from({length:7},(_,i)=>{const d=new Date(now);d.setDate(d.getDate()-i);const day=d.toLocaleDateString("en-US",{weekday:"short"});const key=d.toLocaleDateString("en-CA");return{day,done:!!(h.log&&h.log[key])};}).reverse();
      const missedDays=dayPattern.filter(d=>!d.done).map(d=>d.day);
      return "- "+h.icon+" "+h.name+" (streak: "+h.streak+"d, total: "+logs.length+" days done"+(missedDays.length?", missed: "+missedDays.join("/"):"")+")";
    }).join("\n");

    const goalSummary=goals.map(g=>{
      const doneActs=(g.actions||[]).filter(a=>a.done).length;
      const totalActs=(g.actions||[]).length;
      const pct=totalActs?Math.round(doneActs/totalActs*100):0;
      const daysLeft=g.deadline?Math.ceil((new Date(g.deadline)-new Date())/86400000):null;
      return "- "+g.title+" (priority: "+(g.priority||"medium")+", "+pct+"% done"+(daysLeft!==null?", "+daysLeft+"d to deadline":"")+(daysLeft<0?" OVERDUE":"")+")";
    }).join("\n");

    const recentMoods=Object.entries(journals||{}).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7).map(([d,j])=>d+": mood "+(j.mood??"-")+"/5").join(", ");

    return "User's habits:\n"+(habitSummary||"No habits yet")+"\n\nUser's goals:\n"+(goalSummary||"No goals yet")+"\n\nRecent mood (last 7 days): "+(recentMoods||"No journal entries")+"\n\nToday: "+today+"\nPlan: "+(plan.plus?"Plus":plan.heat?"Pro":"Free");
  }

  const toneInstructions={
    gentle:"You are a warm, supportive habit coach. Be encouraging, never judgmental. Celebrate small wins.",
    direct:"You are a data-driven coach. Be concise and specific. Focus on patterns and actionable steps.",
    strict:"You are a tough-love accountability coach. Be direct and honest. Hold the user to high standards.",
  };

  // ── INSIGHTS ──────────────────────────────────────────────
  // ── INSIGHTS — Item 8: single consolidated AI call ("Coach's Take"), built on top of the
  // free client-computed Momentum Score / Patterns / Forecast / One-Move above. Same 2-credit
  // cost as before; auto-refresh every 6h is free, manual "Refresh" button costs 2 credits. ──
  async function generateCoachCard(forceRefresh=false){
    const cacheKey="hg_ai_coach_"+(user?.uid||"guest");
    const cacheTime="hg_ai_coach_time_"+(user?.uid||"guest");
    const lastTime=parseInt(localStorage.getItem(cacheTime)||"0");
    const sixHours=6*60*60*1000;

    if(!forceRefresh&&Date.now()-lastTime<sixHours){
      const cached=localStorage.getItem(cacheKey);
      if(cached){try{setCoachCard(JSON.parse(cached));return;}catch{}}
    }

    if(forceRefresh&&!deductCredit(2)){
      showToastGlobal("❌ Not enough credits to refresh.");
      return;
    }

    setInsLoading(true);
    try{
      const ctx=buildUserContext();
      const computedSummary="Momentum Score: "+momentumScore+"/1000 ("+(momentumDelta>=0?"+":"")+momentumDelta+" vs last week).\n"
        +"Today's suggested ONE Move: "+oneMove.text+"\n"
        +"Detected patterns: "+(patterns.length?patterns.join(" "):"none yet — not enough data")+"\n"
        +"Goal forecasts: "+forecastPoints.join(" ");
      const idToken1=await firebase.auth().currentUser.getIdToken();
      const resp=await fetch("/api/ai",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+idToken1},
        body:JSON.stringify({
          creditCost:2,
          usageType:"insights",
          model:MODEL,
          max_tokens:300,
          system:"You are a personal habit and goal coach. The app already computed a Momentum Score, a detected pattern, a goal forecast, and a suggested 'one move' for the user — do NOT repeat these numbers back. Your only job is to add the human coaching perspective on top of them. Return ONLY a JSON object — no markdown, no extra text — in this exact format: {\"icon\":\"emoji\",\"label\":\"COACH'S TAKE\",\"points\":[\"short point\",\"short point\"]}. Rules: exactly 2-3 points, each max 14 words, no paragraphs. Point 1: explain the ROOT CAUSE behind why momentum moved (or affirm what's driving good momentum), using the user's actual data — not the score itself. Point 2 (and optional 3): one specific, encouraging next step tied to their data, reinforcing or building on the suggested ONE Move.\n\n"+toneInstructions[tone],
          messages:[{role:"user",content:"Computed coaching context:\n"+computedSummary+"\n\nMy raw data:\n"+ctx}]
        })
      });
      if(!resp.ok){const errBody=await resp.text();throw new Error("HTTP "+resp.status+": "+errBody.slice(0,180));}
      const data=await resp.json();
      if(data.error)throw new Error("API error: "+(data.error.message||JSON.stringify(data.error)).slice(0,180));
      if(!data.content||!data.content[0]||typeof data.content[0].text!=="string")throw new Error("Unexpected response shape: "+JSON.stringify(data).slice(0,180));
      const raw=data.content[0].text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(raw);
      setCoachCard(parsed);
      localStorage.setItem(cacheKey,JSON.stringify(parsed));
      localStorage.setItem(cacheTime,String(Date.now()));
      // ❌ NO auto-save to history — only saved when user taps ⭐
    }catch(e){
      console.error("AI coach card error:",e);
      setCoachCard({icon:"⚠️",label:"Coach's Take — Error",points:["Could not reach AI coach — try again","Error: "+String(e.message||e).slice(0,80)]});
    }
    setInsLoading(false);
  }

  function starInsights(){
    if(!insights.length)return;
    saveHistory("insights","⭐ Saved insights",insights);
    showToastGlobal("⭐ Saved to History!");
  }

  useEffect(()=>{
    if(tab==="insights"&&coachCard===null&&(credits||0)>0){
      const cacheKey="hg_ai_coach_"+(user?.uid||"guest");
      const cacheTime="hg_ai_coach_time_"+(user?.uid||"guest");
      const cached=localStorage.getItem(cacheKey);
      const lastTime=parseInt(localStorage.getItem(cacheTime)||"0");
      if(cached&&Date.now()-lastTime<6*60*60*1000){
        try{setCoachCard(JSON.parse(cached));return;}catch{}
      }
      generateCoachCard(false);
    }
  },[tab,credits]);

  async function generatePlan(){
    if(!planInput.trim())return;
    if((credits||0)<2){showToastGlobal("❌ Need 2 credits to generate a plan.");return;}
    if(!deductCredit(2))return;
    setPlanLoading(true);setPlanResult(null);setExpandedPhase(0);setSelectedHabits({});
    try{
      const deadline=new Date();deadline.setDate(deadline.getDate()+planDeadlineDays);
      const deadlineStr=deadline.toISOString().split("T")[0];
      const idToken2=await firebase.auth().currentUser.getIdToken();
      const resp=await fetch("/api/ai",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+idToken2},
        body:JSON.stringify({
          creditCost:3,
          usageType:"planner",
          model:MODEL,
          max_tokens:2000,
          system:"You are an expert execution-focused goal coach. Create a "+planDeadlineDays+"-day "+planDifficulty+"-difficulty plan. Return ONLY valid JSON, no markdown backticks. Format: "+PLAN_FORMAT_EXAMPLE+". Rules: exactly 4 phases covering the full "+planDeadlineDays+"-day timeframe with non-overlapping 'dayRange' values (e.g. 'Days 1-7'); each phase has 2-4 SMALL SPECIFIC tasks (not vague milestones) with realistic 'time' estimates and measurable 'successCriteria', dueDate within that phase's range; 8-16 tasks total across all phases; 'todayTask' = the first task of Phase 1; 'riskFactors' = 2-3 specific reasons THIS goal commonly fails; 'recoveryPlan' = 2-3 concrete steps if the user falls 3+ days behind; 'suggestedHabits' = 1-3 daily/weekly habits that support this goal long-term (goalCount/goalUnit only if count-based, else 0/\"\"); 'successProbability' = realistic 0-100 based on difficulty and timeframe.",
          messages:[{role:"user",content:"Create a "+planDeadlineDays+"-day "+planDifficulty+" difficulty plan for: "+planInput+"\n\nToday: "+today+"\nDeadline: "+deadlineStr}]
        })
      });
      const data=await resp.json();
      if(!resp.ok){throw new Error("HTTP "+resp.status+": "+JSON.stringify(data).slice(0,180));}
      if(data.error)throw new Error("API error: "+(data.error.message||JSON.stringify(data.error)).slice(0,180));
      if(!data.content||!data.content[0]||typeof data.content[0].text!=="string")throw new Error("Unexpected response shape: "+JSON.stringify(data).slice(0,180));
      const raw=data.content[0].text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(raw);
      setPlanResult(parsed);
      // Default: all suggested habits pre-checked
      const initSel={};(parsed.suggestedHabits||[]).forEach((h,i)=>initSel[i]=true);
      setSelectedHabits(initSel);
      saveHistory("plan","Generated plan: "+parsed.title,parsed);
    }catch(e){
      console.error("AI plan error:",e);
      showToastGlobal("❌ Plan error: "+String(e.message||e).slice(0,100));
    }
    setPlanLoading(false);
  }

  // Item 10: flatten phases→tasks into the flat actions[] format the Goals system expects (backward-compatible with pre-Item-10 history entries)
  function flattenPlanToActions(data){
    if(data.phases&&data.phases.length>0){
      let id=1;const actions=[];
      data.phases.forEach(ph=>(ph.tasks||[]).forEach(task=>{actions.push({id:id++,action:task.action,done:false,dueDate:task.dueDate||"",result:task.successCriteria||""});}));
      return actions;
    }
    return (data.actions||[]).map((a,i)=>({id:i+1,action:a.action,done:false,dueDate:a.dueDate||"",result:a.result||""}));
  }

  function addPlanToGoals(data){
    data=data||planResult;
    if(!data)return;
    const newGoal={
      id:Date.now(),
      title:data.title,
      priority:data.priority||"High",
      deadline:data.deadline||"",
      notes:(data.overview||"")+" [AI-generated plan]",
      done:false,
      createdAt:today,
      actions:flattenPlanToActions(data)
    };
    const updated=[...goals,newGoal];
    setGoals(updated);
    save(habits,updated,journals,tk);
    showToastGlobal("✅ "+data.title+" added to Goals! 🎯");
    if(data===planResult){setPlanResult(null);setPlanInput("");}
  }

  // Item 10: Habit Bridge — inject AI-suggested habits directly into the habit tracker
  function addSuggestedHabits(){
    if(!planResult)return;
    const toAdd=(planResult.suggestedHabits||[]).filter((_,i)=>selectedHabits[i]);
    if(toAdd.length===0)return;
    const newHabits=toAdd.map((h,i)=>{
      const gc=parseInt(h.goalCount)||0;
      return{id:Date.now()+i,name:h.name,cat:h.cat||"Personal",icon:h.icon||"⭐",color:HABIT_COLORS[Math.floor(Math.random()*HABIT_COLORS.length)],freq:"daily",freqDays:[],freqTimes:3,goalCount:gc,goalUnit:h.goalUnit||"",goalCountHistory:[{date:today,count:gc}],reminder:{enabled:false,time:""},streak:0,best:0,log:{}};
    });
    const updated=[...habits,...newHabits];
    save(updated,goals,journals,tk);
    showToastGlobal("✅ "+newHabits.length+" habit"+(newHabits.length>1?"s":"")+" added! 💪");
    setSelectedHabits({});
  }

  // ── CHAT ──────────────────────────────────────────────────
  async function sendChat(quickText){
    const text=(quickText!==undefined?quickText:chatInput).trim();
    if(!text||chatLoading)return;
    if((credits||0)<1){showToastGlobal("❌ Need 1 credit to chat.");return;}
    if(!deductCredit(1))return;
    const userMsg={role:"user",content:text};
    const updated=[...chatHistory,userMsg];
    setChatHistory(updated);
    setChatInput("");
    setChatLoading(true);
    try{
      const ctx=buildUserContext();
      const idToken3=await firebase.auth().currentUser.getIdToken();
      const resp=await fetch("/api/ai",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+idToken3},
        body:JSON.stringify({
          creditCost:1,
          usageType:"chat",
          model:MODEL,
          max_tokens:600,
          system:"You are a personal habit and productivity coach. You know this user's data:\n\n"+ctx+"\n\n"+toneInstructions[tone]+"\n\nIMPORTANT FORMATTING RULES: Always respond using bullet points only — never write paragraphs. Each bullet point must be on its own line starting with an emoji. Max 5 bullet points. Each point max 12 words. Be specific to the user's actual data.",
          messages:updated.slice(-6)
        })
      });
      const data=await resp.json();
      if(!resp.ok){throw new Error("HTTP "+resp.status+": "+JSON.stringify(data).slice(0,180));}
      if(data.error)throw new Error("API error: "+(data.error.message||JSON.stringify(data.error)).slice(0,180));
      if(!data.content||!data.content[0]||typeof data.content[0].text!=="string")throw new Error("Unexpected response shape: "+JSON.stringify(data).slice(0,180));
      const reply=data.content[0].text;
      const newHist=[...updated,{role:"assistant",content:reply}];
      setChatHistory(newHist);
      // ❌ NOT auto-saved — user must tap ⭐ to save this chat
    }catch(e){
      console.error("AI chat error:",e);
      setChatHistory([...updated,{role:"assistant",content:"• Sorry, I couldn't connect\n• "+String(e.message||e).slice(0,100)}]);
    }
    setChatLoading(false);
  }

  const maxC=plan.plus?PLUS_MAX:0;
  const creditPct=credits!==null?Math.round((credits/maxC)*100):100;
  const creditColor=creditPct>50?t.success:creditPct>20?"#fb923c":t.danger;

  // Non-Plus users — upgrade prompt (but still show history if they have it)
  if(!plan.plus){
    return(<Modal t={t} close={close} title="🤖 AI Coach">
      <div style={{textAlign:"center",padding:"8px 0 16px"}}>
        <div style={{fontSize:48,marginBottom:12}}>🤖</div>
        <div style={{fontSize:16,fontWeight:800,color:"#a78bfa",marginBottom:8}}>AI Coach</div>
        <div style={{background:"#a78bfa18",border:"1px solid #a78bfa33",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#a78bfa",lineHeight:1.6}}>
          💎 AI Coach is exclusively available on the <strong>Plus plan</strong>.<br/>Not available on Free or Pro.
        </div>
        <div style={{fontSize:12,color:t.muted,marginBottom:16,lineHeight:1.6}}>Upgrade to Plus for smart insights, AI goal planner, and personal coaching chat — 50 credits/month.</div>
        <button onClick={()=>showUp("💎 Upgrade to Plus to unlock AI Coach!")} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:"#a78bfa",color:"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>💎 Upgrade to Plus — ₹149/month</button>
      </div>
    </Modal>);
  }

  return(<Modal t={t} close={close} title="🤖 AI Coach">
    {/* Credits bar */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,padding:"8px 12px",background:premiumCard(t,creditColor),borderRadius:12,border:"1px solid "+t.border,boxShadow:premiumShadow(t,creditColor)}}>
      <div style={{fontSize:11,color:t.muted,fontWeight:600}}>
        {plan.plus?"💎 Plus":"Free"} · Tone:&nbsp;
        <span style={{cursor:"pointer",color:t.accent}} onClick={()=>{const tones=["gentle","direct","strict"];const i=(tones.indexOf(tone)+1)%3;setTone(tones[i]);localStorage.setItem("hg_ai_tone",tones[i]);}}>{tone==="gentle"?"🧘 Gentle":tone==="direct"?"🎯 Direct":"🔥 Strict"} ↻</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <div style={{width:60,height:5,background:t.border,borderRadius:3,overflow:"hidden"}}>

        </div>

      </div>
    </div>

    {/* Sub-tabs */}
    <div style={{display:"flex",gap:4,background:t.surface,borderRadius:12,padding:3,marginBottom:16}}>
      {[
        ["insights",<><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a7 7 0 0 1 7 7c0 3.5-2.5 5.5-3 7H8c-.5-1.5-3-3.5-3-7a7 7 0 0 1 7-7z"/><path d="M9 21h6M10 17h4"/></svg> Insights</>],
        ["planner",<><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="12" y2="15"/></svg> Planner</>],
        ["chat",<><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Chat</>],
        ["history",<><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> History</>],
      ].map(([k,l])=>(
        <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 2px",borderRadius:9,border:"none",cursor:"pointer",background:tab===k?t.accent:"none",color:tab===k?"#000":t.muted,fontWeight:tab===k?700:400,fontSize:10,fontFamily:"inherit",boxShadow:tab===k?"0 0 8px "+t.accent+"66":"none",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>{l}</button>
      ))}
    </div>

    {/* ── TAB: INSIGHTS ── */}
    {tab==="insights"&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:12,color:t.muted}}>Momentum &amp; patterns update instantly · Coach's Take refreshes every 6h</div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={starInsights} title="Save to History" style={{padding:"5px 9px",borderRadius:9,border:"1px solid "+t.border,background:"none",color:"#f5c842",cursor:"pointer",lineHeight:1,display:"flex",alignItems:"center"}}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f5c842" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
          <button onClick={()=>generateCoachCard(true)} disabled={insLoading||(credits||0)<2} style={{padding:"5px 10px",borderRadius:9,border:"1px solid "+t.border,background:"none",color:t.accent,cursor:"pointer",fontSize:11,fontWeight:700,opacity:(credits||0)<2?0.5:1,display:"flex",alignItems:"center",gap:4}}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Refresh (2)</button>
        </div>
