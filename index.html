<!-- Mo Splash Animation -->
<script>
(function(){
  var HIDDEN=false, ANIM_DONE=false, APP_READY=false;

  // ── Hide only when BOTH animation done AND app ready ──
  function tryHide(){
    if(HIDDEN||!ANIM_DONE||!APP_READY)return;
    HIDDEN=true;
    ['splash','lc','sf'].forEach(function(id){
      var el=document.getElementById(id);
      if(!el)return;
      el.style.transition='opacity 0.8s ease';
      el.style.opacity='0';
      setTimeout(function(){try{el.parentNode.removeChild(el);}catch(e){}},900);
    });
  }
  function markAnimDone(){ANIM_DONE=true;tryHide();}
  function markAppReady(){APP_READY=true;tryHide();}
  setTimeout(function(){ANIM_DONE=true;APP_READY=true;tryHide();},15000);

  // ── Watch React mount — check immediately + observe ──
  function watchRoot(){
    var _r=document.getElementById('root');
    if(!_r)return;
    // Already mounted (cached load)?
    if(_r.children.length>0){markAppReady();return;}
    var _o=new MutationObserver(function(){
      if(_r.children.length>0){_o.disconnect();markAppReady();}
    });
    _o.observe(_r,{childList:true,subtree:true});
  }
  watchRoot();
  // Also check every 200ms as extra safety
  var _rCheck=setInterval(function(){
    var _r=document.getElementById('root');
    if(_r&&_r.children.length>0){clearInterval(_rCheck);markAppReady();}
  },200);

  // ── Screen flash (impact only) ──
  function flash(op){
    var f=document.getElementById('sf');
    if(!f)return;
    f.style.transition='none';f.style.opacity=op;
    setTimeout(function(){f.style.transition='opacity 150ms ease';f.style.opacity='0';},16);
  }

  // ── Draw image on canvas with white pixels removed ──
  function drawTransparent(imgEl, canvasEl, cb){
    if(!imgEl||!canvasEl){cb&&cb(false);return;}
    var W=300, H=300;
    canvasEl.width=W; canvasEl.height=H;
    var ctx=canvasEl.getContext('2d');
    ctx.clearRect(0,0,W,H);
    ctx.drawImage(imgEl,0,0,W,H);
    try{
      var d=ctx.getImageData(0,0,W,H);
      var px=d.data;
      var w=W,h=H;

      // Step 1: Flood-fill from all 4 corners to mark background pixels
      var visited=new Uint8Array(w*h);
      var queue=[];
      function enqueue(x,y){
        if(x<0||x>=w||y<0||y>=h)return;
        var idx=y*w+x;
        if(visited[idx])return;
        var pi=idx*4;
        var r=px[pi],g=px[pi+1],b=px[pi+2];
        // Is this a background pixel? (white/light grey)
        if(r>200&&g>200&&b>200&&Math.abs(r-g)<30&&Math.abs(g-b)<30){
          visited[idx]=1;
          queue.push(x,y);
        }
      }
      // Seed from all 4 edges
      for(var x=0;x<w;x++){enqueue(x,0);enqueue(x,h-1);}
      for(var y=0;y<h;y++){enqueue(0,y);enqueue(w-1,y);}
      // BFS flood fill
      while(queue.length>0){
        var cx2=queue.shift(),cy2=queue.shift();
        enqueue(cx2+1,cy2);enqueue(cx2-1,cy2);
        enqueue(cx2,cy2+1);enqueue(cx2,cy2-1);
      }
      // Step 2: Make all flood-filled pixels transparent
      for(var i=0;i<w*h;i++){
        if(visited[i]){px[i*4+3]=0;}
      }
      // Step 3: Also remove interior near-white pixels (checkered bg artifacts)
      for(var i=0;i<px.length;i+=4){
        var r=px[i],g=px[i+1],b=px[i+2],a=px[i+3];
        if(a===0)continue;
        if(r>215&&g>215&&b>215){px[i+3]=0;}
        // Feather semi-transparent edge pixels
        else if(r>185&&g>185&&b>185&&a>50){
          px[i+3]=Math.round(a*(1-(r-185)/70));
        }
      }
      ctx.putImageData(d,0,0);
      cb&&cb(true);
    }catch(e){cb&&cb(false);}
  }

  // ── Load img then draw to canvas ──
  function loadToCanvas(imgId, canvasId, cb){
    var img=document.getElementById(imgId);
    var canvas=document.getElementById(canvasId);
    if(!img||!canvas){cb&&cb();return;}
    function doDraw(){
      drawTransparent(img,canvas,function(){cb&&cb();});
    }
    if(img.complete&&img.naturalWidth>0){doDraw();}
    else{
      img.onload=doDraw;
      img.onerror=function(){cb&&cb();};
    }
  }

  // ── Lightning comet — smooth S-curve with easing ──
  function runComet(onDone){
    var canvas=document.getElementById('lc');
    if(!canvas){onDone&&onDone();return;}
    var W=window.innerWidth, H=window.innerHeight;
    canvas.width=W; canvas.height=H;
    var ctx=canvas.getContext('2d');

    // Mo is centered. Chest target = center_x, center_y + offset
    // On phone (portrait): Mo center is at ~45% height, chest ~52%
    // On laptop (landscape): Mo center is at ~40% height
    var isPortrait = H > W;
    var moCenterY = isPortrait ? H*0.44 : H*0.40;
    var moChestY  = moCenterY + (isPortrait ? 15 : 10); // medallion/chest — higher
    var cx = W/2;
    var cy = moChestY;

    // Arc radius based on screen width — looks same on all screens
    var R = W * 0.42;

    // S-curve: top-right corner → long arc left → bottom arc → right arc → Mo chest
    // All points calculated relative to W so portrait/landscape look identical
    var pts=[
      {x:W*0.90, y:H*0.04},          // 1. start: top-right
      {x:W*0.58, y:H*0.12},          // 2. sweep left
      {x:W*0.15, y:H*0.26},          // 3. far left upper
      {x:W*0.06, y:H*0.45},          // 4. far left middle
      {x:W*0.18, y:H*0.62},          // 5. bottom-left
      {x:W*0.45, y:H*0.70},          // 6. bottom center
      {x:W*0.76, y:H*0.63},          // 7. bottom-right
      {x:W*0.86, y:H*0.48},          // 8. right middle
      {x:W*0.72, y:H*0.36},          // 9. right-center coming in
      {x:cx,     y:cy}               // 10. Mo chest — final target
    ];

    var DUR=2200;
    var TRAIL=20;
    var hist=[];
    var startTs=null;

    function ease(t){
      // Smooth ease-in-out
      return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    }

    function catmull(t){
      var n=pts.length-1;
      var s=ease(t)*n;
      var i=Math.min(Math.floor(s),n-1);
      var lt=s-i;
      var p0=pts[Math.max(i-1,0)],p1=pts[i],
          p2=pts[Math.min(i+1,n)],p3=pts[Math.min(i+2,n)];
      var t2=lt*lt,t3=t2*lt;
      return{
        x:0.5*((2*p1.x)+(-p0.x+p2.x)*lt+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
        y:0.5*((2*p1.y)+(-p0.y+p2.y)*lt+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
      };
    }

    function frame(ts){
      if(!startTs)startTs=ts;
      var elapsed=ts-startTs;
      var raw=Math.min(elapsed/DUR,1);
      var pos=catmull(raw);
      hist.push({x:pos.x,y:pos.y});
      if(hist.length>TRAIL)hist.shift();

      ctx.clearRect(0,0,W,H);

      // Comet tail — bright gold, fading behind
      for(var i=1;i<hist.length;i++){
        var frac=i/hist.length;
        var alpha=(frac*frac*0.85).toFixed(3);
        ctx.beginPath();
        ctx.moveTo(hist[i-1].x,hist[i-1].y);
        ctx.lineTo(hist[i].x,hist[i].y);
        ctx.strokeStyle='rgba(255,200,30,'+alpha+')';
        ctx.lineWidth=frac*8;
        ctx.lineCap='round';
        ctx.shadowBlur=18;
        ctx.shadowColor='rgba(255,170,0,0.7)';
        ctx.stroke();
        ctx.shadowBlur=0;
      }

      // Glow halo at tip
      var g=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,24);
      g.addColorStop(0,'rgba(255,235,80,1)');
      g.addColorStop(0.5,'rgba(255,170,20,0.6)');
      g.addColorStop(1,'rgba(255,120,0,0)');
      ctx.beginPath();ctx.arc(pos.x,pos.y,24,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();

      // ⚡ tip
      ctx.save();
      ctx.font='bold 26px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowBlur=12;ctx.shadowColor='#f5c842';
      ctx.fillStyle='#fff7a0';
      ctx.fillText('⚡',pos.x,pos.y);
      ctx.restore();

      if(raw<1){
        requestAnimationFrame(frame);
      } else {
        // No flash on impact
        // Fade trail out
        var fo=1;
        var fi=setInterval(function(){
          fo-=0.12;
          if(fo<=0){clearInterval(fi);ctx.clearRect(0,0,W,H);onDone&&onDone();return;}
          ctx.clearRect(0,0,W,H);
          ctx.globalAlpha=fo;
          var g2=ctx.createRadialGradient(cx,cy,0,cx,cy,28);
          g2.addColorStop(0,'rgba(255,230,80,0.9)');
          g2.addColorStop(1,'rgba(255,120,0,0)');
          ctx.beginPath();ctx.arc(cx,cy,28,0,Math.PI*2);
          ctx.fillStyle=g2;ctx.fill();
          ctx.globalAlpha=1;
        },25);
      }
    }
    requestAnimationFrame(frame);
  }

  // ── Glow around Mo via CSS filter (no separate div) ──
  function showAuraRing(){
    var wrap=document.getElementById('mo-wrap');
    if(!wrap)return;
    wrap.classList.add('glowing');
    // Breathing animation via JS interval
    var glowHigh=false;
    setInterval(function(){
      glowHigh=!glowHigh;
      var s=glowHigh
        ? 'drop-shadow(0 0 22px rgba(245,185,50,0.85)) drop-shadow(0 0 44px rgba(245,185,50,0.4)) drop-shadow(0 0 8px rgba(255,220,80,1))'
        : 'drop-shadow(0 0 14px rgba(245,185,50,0.55)) drop-shadow(0 0 28px rgba(245,185,50,0.22)) drop-shadow(0 0 4px rgba(255,220,80,0.7))';
      wrap.style.transition='filter 1.2s ease';
      wrap.style.filter=s;
    },1400);
  }

  // ── Main animation ──
  function startAnim(){
    var canvasClosed=document.getElementById('mo-canvas');
    var canvasOpen=document.getElementById('mo-canvas-open');
    var title=document.getElementById('splash-title');
    var sub=document.getElementById('splash-sub');

    // Load BOTH images to canvas (transparent) then animate
    var ready=0;
    function onReady(){
      ready++;
      if(ready>=2)go();
    }

    loadToCanvas('mo-closed-img','mo-canvas',onReady);
    loadToCanvas('mo-open-img','mo-canvas-open',onReady);
    // Fallback: start after 1.5s even if images slow
    setTimeout(function(){if(ready<2){ready=2;go();}},1500);

    var started=false;
    function go(){
      if(started)return; started=true;

      // Mo closed eyes already drawn on canvas — visible immediately
      // Small delay then comet starts
      setTimeout(function(){
        runComet(function(){
          // Impact — eyes open INSTANTLY
          if(canvasClosed){canvasClosed.style.transition='opacity 0.15s ease';canvasClosed.style.opacity='0';}
          if(canvasOpen){canvasOpen.style.transition='opacity 0.2s ease';canvasOpen.style.opacity='1';}

          // Aura slowly glows in after eyes open
          setTimeout(showAuraRing,150);

          // Float
          setTimeout(function(){
            var w=document.getElementById('mo-wrap');
            if(w)w.style.animation='moFloat 3s ease-in-out infinite';
          },400);

          // Title premium entrance — slide up + scale
          setTimeout(function(){
            if(title){
              title.style.opacity='1';
              title.style.transform='translateY(0) scale(1)';
            }
            setTimeout(function(){
              if(sub){
                sub.style.opacity='1';
                sub.style.transform='translateY(0)';
              }
            },280);
          },900);

          setTimeout(markAnimDone,3200);
        });
      },200);
    }
  }

  setTimeout(startAnim,30);
})();
</script>
<script type="text/plain" id="app-src">
function ReviewsTab({t,habits,goals,journals,plan,showUp,today}){
  const[sub,setSub]=React.useState("day");
  const[showLeaderboard,setShowLeaderboard]=React.useState(false);
  const[pickedDate,setPickedDate]=React.useState(today);
  const[pickedWeekStart,setPickedWeekStart]=React.useState(null);

  const[pickedMonth,setPickedMonth]=React.useState(null);

  const now=new Date();
  const yr=now.getFullYear(),mo=now.getMonth();
  const MCOLS=["#f87171","#fb923c","#fbbf24","#86efac","#4ade80"];
  const MEMOJI=["😞","😕","😐","🙂","😄"];

  // ── Date helpers ──────────────────────────────────────────────
  function getWeek7(startDate){
    const arr=[];
    const base=startDate?new Date(startDate+"T12:00:00"):new Date();
    const dayOfWeek=base.getDay();
    const monday=new Date(base);monday.setDate(base.getDate()-dayOfWeek+1);
    for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);arr.push(d.toLocaleDateString("en-CA"));}
    return arr;
  }
  const currentWeek7=getWeek7(pickedWeekStart);
  const curMonthStr=pickedMonth||yr+"-"+String(mo+1).padStart(2,"0");
  const [pmo_yr,pmo_mo]=curMonthStr.split("-").map(Number);
  const monthDates=Array.from({length:new Date(pmo_yr,pmo_mo,0).getDate()},(_,i)=>{
    const d=pmo_yr+"-"+String(pmo_mo).padStart(2,"0")+"-"+String(i+1).padStart(2,"0");
    return d;
  });

  // ── Stat card ─────────────────────────────────────────────────
  const SC=({icon,value,label,sub2,color})=>(
    <div style={{flex:1,background:premiumCard(t,color||t.accent),border:"1px solid "+t.border,borderRadius:12,padding:"10px 6px",textAlign:"center",minWidth:0,boxShadow:premiumShadow(t,color||t.accent)}}>
      <div style={{display:"flex",justifyContent:"center",marginBottom:4}}>{icon}</div>
      <div style={{fontSize:16,fontWeight:800,color:color||t.accent,lineHeight:1,wordBreak:"break-word"}}>{value}</div>
      {sub2&&<div style={{fontSize:9,color:color||t.accent,marginTop:1}}>{sub2}</div>}
      <div style={{fontSize:8,color:t.muted,marginTop:2,textTransform:"uppercase",letterSpacing:0.3}}>{label}</div>
    </div>
  );

  // ── Mood chart ────────────────────────────────────────────────
  function MoodChart({dates,label}){
    const moodData=dates.map(d=>{const e=journals[d];if(!e)return null;return typeof e==="object"?e.mood:null;});
    const hasAny=moodData.some(m=>m!=null);
    const avgMood=hasAny?Math.round(moodData.filter(m=>m!=null).reduce((s,m)=>s+m,0)/moodData.filter(m=>m!=null).length):null;
    const maxH=60;
    if(!hasAny)return(<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:13,padding:"10px 12px",marginBottom:10,boxShadow:premiumShadow(t)}}>
      <div style={{fontSize:11,fontWeight:700,color:t.text+"b3",marginBottom:4,display:"flex",alignItems:"center",gap:4}}>{IC.mood(t.text+"b3",11)} Mood — {label}</div>
      <div style={{fontSize:11,color:t.muted,textAlign:"center",padding:"8px 0"}}>No mood logged for this period</div>
    </div>);
    return(<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:13,padding:"10px 12px",marginBottom:10,boxShadow:premiumShadow(t)}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:700,color:t.text+"b3",display:"flex",alignItems:"center",gap:4}}>{IC.mood(t.text+"b3",11)} Mood — {label}</div>
        {avgMood!=null&&<div style={{fontSize:10,color:MCOLS[avgMood],fontWeight:700,background:MCOLS[avgMood]+"22",padding:"2px 8px",borderRadius:10}}>Avg: {MEMOJI[avgMood]}</div>}
      </div>
      <div style={{display:"flex",alignItems:"flex-end",gap:2,height:maxH+20}}>
        {dates.slice(-14).map((d,i)=>{
          const m=moodData[moodData.length-dates.slice(-14).length+i];
          const barH=m!=null?Math.max(8,((m+1)/5)*maxH):3;
          const col=m!=null?MCOLS[m]:t.border;
          const lbl=new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"narrow"});
          return(<div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            {m!=null&&<span style={{fontSize:9}}>{MEMOJI[m]}</span>}
            {m==null&&<span style={{fontSize:8,color:t.muted}}>—</span>}
            <div style={{width:"100%",height:barH,background:col,borderRadius:"3px 3px 0 0",opacity:m!=null?1:0.25}}/>
            <span style={{fontSize:7,color:t.muted}}>{lbl}</span>
          </div>);
        })}
      </div>
    </div>);
  }

  // ── Focus Time Chart (replaces Mood chart in Week/Month/Year reviews) ──
  function FocusChart({dates,label}){
    const pomHist=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_history")||"[]");}catch{return[];}})();
    // Build per-date focus minutes map
    const focusMap={};
    pomHist.forEach(s=>{if(s.date&&s.mins){focusMap[s.date]=(focusMap[s.date]||0)+(s.mins||0);}});
    const totalMins=dates.reduce((s,d)=>s+(focusMap[d]||0),0);
    const sessions=pomHist.filter(s=>dates.includes(s.date)).length;
    const avgMins=dates.length>0?Math.round(totalMins/dates.length):0;
    const hasAny=totalMins>0;
    const maxH=60;
    const today2=td();

    // Determine chart mode based on dates count
    const isYear=dates.length>60;// year = 365 dates → aggregate to 12 monthly bars
    const isMonth=dates.length>7&&dates.length<=31;// month = 28-31 dates → one bar per day
    // isWeek = 7 dates → one bar per day

    // For year: aggregate to 12 months
    const MONTH_LABELS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const yearlyData=isYear?MONTH_LABELS.map((mn,mi)=>{
      const monthDays=dates.filter(d=>parseInt(d.split("-")[1])-1===mi);
      const mins=monthDays.reduce((s,d)=>s+(focusMap[d]||0),0);
      const sess=pomHist.filter(s=>monthDays.includes(s.date)).length;
      return{label:mn,mins,sessions:sess};
    }):null;

    const displayDates=isYear?null:dates;// use full dates for week/month
    const maxVal=isYear
      ? Math.max(1,...yearlyData.map(m=>m.mins))
      : Math.max(1,...dates.map(d=>focusMap[d]||0));

    return(<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:13,padding:"10px 12px",marginBottom:10,boxShadow:premiumShadow(t)}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:700,color:t.text+"b3",display:"flex",alignItems:"center",gap:5}}>{IC.pomodoro(t.text+"b3",13)} Focus Time — {label}</div>
        {hasAny&&<div style={{fontSize:10,color:t.accent,fontWeight:700,background:t.accent+"22",padding:"2px 8px",borderRadius:10}}>{totalMins>=60?Math.floor(totalMins/60)+"h "+totalMins%60+"m":totalMins+"m"} total</div>}
      </div>
      {!hasAny
        ? <div style={{fontSize:11,color:t.muted,textAlign:"center",padding:"8px 0"}}>No focus sessions logged for this period</div>
        : (<>
          <div style={{display:"flex",alignItems:"flex-end",gap:isMonth?1:2,height:maxH+20,marginBottom:4}}>
            {isYear
              // ── YEAR: 12 monthly bars ──
              ? yearlyData.map((m,i)=>{
                  const barH=m.mins>0?Math.max(6,Math.round((m.mins/maxVal)*maxH)):2;
                  const isCurMonth=i===new Date().getMonth()&&dates[0].startsWith(String(new Date().getFullYear()));
                  return(<div key={m.label} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    {m.mins>0&&<span style={{fontSize:7,color:t.accent,fontWeight:700}}>{m.mins>=60?Math.floor(m.mins/60)+"h":m.mins+"m"}</span>}
                    {m.mins===0&&<span style={{fontSize:7,color:t.muted}}>—</span>}
                    <div style={{width:"100%",height:barH,background:m.mins>0?t.accent:"transparent",borderRadius:"3px 3px 0 0",opacity:m.mins>0?1:0.15,border:m.mins===0?"1px solid "+t.border:"none"}}/>
                    <span style={{fontSize:7,color:isCurMonth?t.accent:t.muted,fontWeight:isCurMonth?700:400}}>{m.label}</span>
                  </div>);
                })
              // ── WEEK (7 bars) or MONTH (30/31 bars) ──
              : displayDates.map((d,i)=>{
                  const mins=focusMap[d]||0;
                  const barH=mins>0?Math.max(6,Math.round((mins/maxVal)*maxH)):2;
                  const isToday3=d===today2;
                  // Week: show weekday narrow. Month: show day number, but only every 5th to avoid crowding
                  const lbl=isMonth
                    ? (parseInt(d.split("-")[2])%5===1||parseInt(d.split("-")[2])===dates.length?String(parseInt(d.split("-")[2])):"")
                    : new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"narrow"});
                  return(<div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    {mins>0&&<span style={{fontSize:isMonth?6:8,color:t.accent,fontWeight:700}}>{mins>=60?Math.floor(mins/60)+"h":mins+"m"}</span>}
                    {mins===0&&<span style={{fontSize:isMonth?6:8,color:t.muted}}>—</span>}
                    <div style={{width:"100%",height:barH,background:mins>0?t.accent:"transparent",borderRadius:"3px 3px 0 0",opacity:mins>0?1:0.15,border:mins===0?"1px solid "+t.border:"none"}}/>
                    <span style={{fontSize:isMonth?6:7,color:isToday3?t.accent:t.muted,fontWeight:isToday3?700:400}}>{lbl}</span>
                  </div>);
                })
            }
          </div>
          <div style={{display:"flex",gap:14,fontSize:10,color:t.muted,justifyContent:"center"}}>
            <span style={{display:"inline-flex",alignItems:"center",gap:3}}>{IC.chartUp(t.muted,11)} {sessions} session{sessions!==1?"s":""}</span>
            <span style={{display:"inline-flex",alignItems:"center",gap:3}}>{IC.calendar(t.muted,11)} Avg {avgMins}m/day</span>
          </div>
        </>)
      }
    </div>);
  }

  // ── Momentum Score chart (mirrors FocusChart; reads dated score history) ──────
  // Week/Month: one bar per day from _scoreStore.history (0–1000).
  // Year: 12 monthly bars from _scoreStore.monthly (month-end value, kept forever).
  function ScoreChart({dates,label}){
    const hist=_scoreStore.history||{};
    const monthly=_scoreStore.monthly||{};
    const today2=td();
    const maxH=60;
    const isYear=dates.length>60;
    const isMonth=dates.length>7&&dates.length<=31;
    const MONTH_LABELS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    // Year: pull each month's stored final value (YYYY-MM).
    const yr0=dates.length>0?dates[0].slice(0,4):String(new Date().getFullYear());
    const yearlyData=isYear?MONTH_LABELS.map((mn,mi)=>{
      const key=yr0+"-"+String(mi+1).padStart(2,"0");
      return{label:mn,score:monthly[key]!=null?monthly[key]:null};
    }):null;

    const dayVals=isYear?[]:dates.map(d=>hist[d]!=null?hist[d]:null);
    const hasAny=isYear?yearlyData.some(m=>m.score!=null):dayVals.some(v=>v!=null);
    const maxVal=1000;// fixed 0–1000 scale so bar heights are comparable across periods
    // Latest available score in this period (for the header pill).
    const latest=isYear
      ?(()=>{for(let i=yearlyData.length-1;i>=0;i--)if(yearlyData[i].score!=null)return yearlyData[i].score;return null;})()
      :(()=>{for(let i=dayVals.length-1;i>=0;i--)if(dayVals[i]!=null)return dayVals[i];return null;})();

    return(<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:13,padding:"10px 12px",marginBottom:10,boxShadow:premiumShadow(t)}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:700,color:t.text+"b3",display:"flex",alignItems:"center",gap:5}}>{IC.score("#a78bfa",13)} Momentum Score — {label}</div>
        {latest!=null&&<div style={{fontSize:10,color:"#a78bfa",fontWeight:700,background:"#a78bfa22",padding:"2px 8px",borderRadius:10}}>{latest} latest</div>}
      </div>
      {!hasAny
        ? <div style={{fontSize:11,color:t.muted,textAlign:"center",padding:"8px 0"}}>No score history yet for this period — it fills in as you use the app.</div>
        : (<>
          <div style={{display:"flex",alignItems:"flex-end",gap:isMonth?1:2,height:maxH+20,marginBottom:4}}>
            {isYear
              ? yearlyData.map((m,i)=>{
                  const barH=m.score!=null?Math.max(6,Math.round((m.score/maxVal)*maxH)):2;
                  const isCurMonth=i===new Date().getMonth()&&yr0===String(new Date().getFullYear());
                  return(<div key={m.label} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    {m.score!=null&&<span style={{fontSize:7,color:"#a78bfa",fontWeight:700}}>{m.score}</span>}
                    {m.score==null&&<span style={{fontSize:7,color:t.muted}}>—</span>}
                    <div style={{width:"100%",height:barH,background:m.score!=null?"#a78bfa":"transparent",borderRadius:"3px 3px 0 0",opacity:m.score!=null?1:0.15,border:m.score==null?"1px solid "+t.border:"none"}}/>
                    <span style={{fontSize:7,color:isCurMonth?"#a78bfa":t.muted,fontWeight:isCurMonth?700:400}}>{m.label}</span>
                  </div>);
                })
              : dates.map((d,i)=>{
                  const val=hist[d];
                  const barH=val!=null?Math.max(6,Math.round((val/maxVal)*maxH)):2;
                  const isToday3=d===today2;
                  const lbl=isMonth
                    ? (parseInt(d.split("-")[2])%5===1||parseInt(d.split("-")[2])===dates.length?String(parseInt(d.split("-")[2])):"")
                    : new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"narrow"});
                  return(<div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:0}}>
                    {val!=null&&<span style={{fontSize:isMonth?5.5:8,color:"#a78bfa",fontWeight:700,lineHeight:1}}>{val}</span>}
                    <div style={{width:"100%",height:barH,background:val!=null?(isToday3?"#a78bfa":"#a78bfacc"):"transparent",borderRadius:"3px 3px 0 0",opacity:val!=null?1:0.15,border:val==null?"1px solid "+t.border:"none"}}/>
                    <span style={{fontSize:isMonth?6:8,color:isToday3?"#a78bfa":t.muted,fontWeight:isToday3?700:400}}>{lbl}</span>
                  </div>);
                })
            }
          </div>
          <div style={{fontSize:9,color:t.muted,textAlign:"center",marginTop:2}}>Score range 0–1000{isYear?" · month-end values":""}</div>
        </>)
      }
    </div>);
  }

  // ── Streak leaderboard (collapsible) ─────────────────────────
  function LeaderboardSection({dates,label}){
    // Item 31: count only FULLY completed days (matches isFullDoneOn used elsewhere — e.g. calendar), not just any truthy log entry
    const fullCount=h=>dates.filter(d=>isFullDoneOn(h,d,h.log&&h.log[d])).length;
    // Item 30: rank by highest CURRENT STREAK first, completion count as tiebreaker — not by habit array order
    const sorted=[...habits].sort((a,b)=>{
      const streakDiff=(b.streak||0)-(a.streak||0);
      if(streakDiff!==0)return streakDiff;
      return fullCount(b)-fullCount(a);
    });
    const topHabit=sorted[0];
    return(<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:13,padding:"10px 12px",marginBottom:10,boxShadow:premiumShadow(t)}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showLeaderboard?10:0}}>
        <div style={{fontSize:11,fontWeight:700,color:t.text+"b3",display:"flex",alignItems:"center",gap:5}}>{IC.trophy(t.text+"b3",13)} Streak Leaderboard — {label}</div>
        <button onClick={()=>setShowLeaderboard(s=>!s)} style={{background:"none",border:"none",cursor:"pointer",color:t.accent,fontSize:13,fontWeight:700,padding:"0 4px"}}>{showLeaderboard?"▲":"→"}</button>
      </div>
      {!showLeaderboard&&topHabit&&(
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
          <span style={{color:t.accent,display:"flex",alignItems:"center"}}>{IC.medal(t.accent,14)}</span>
          <span style={{fontSize:14}}>{topHabit.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:t.text}}>{topHabit.name}</div>
            <div style={{fontSize:9,color:t.muted,display:"flex",alignItems:"center",gap:2}}>{fullCount(topHabit)}/{dates.length} days · {IC.flame(t.accent,9)}{topHabit.streak}d</div>
          </div>
        </div>
      )}
      {showLeaderboard&&sorted.map((h,i)=>(
        <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<sorted.length-1?"1px solid "+t.border:"none"}}>
          <span style={{fontSize:11,fontWeight:800,color:i===0?t.accent:t.muted,width:16,textAlign:"center"}}>{i+1}</span>
          <span style={{fontSize:15}}>{h.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:t.text}}>{h.name}</div>
            <div style={{fontSize:9,color:t.muted,display:"flex",alignItems:"center",gap:2}}>{fullCount(h)}/{dates.length} days · {IC.flame(t.accent,9)}{h.streak}d</div>
          </div>
          {getBadge(h.streak)&&<span>{getBadge(h.streak).i}</span>}
        </div>
      ))}
    </div>);
  }

  // ── Day Review ────────────────────────────────────────────────
  function DayReview(){
    const d=pickedDate;
    const habDone=habits.filter(h=>{const v=h.log&&h.log[d];return isFullDoneOn(h,d,v);}).length;
    const habTotal=habits.length;
    const jEntry=journals[d];
    const jDone=jEntry?1:0;
    const actDue=goals.flatMap(g=>g.actions.filter(a=>a.dueDate===d));
    const actDone=actDue.filter(a=>a.done).length;
    const allTimeBadges=habits.reduce((s,h)=>{const b=getBadge(h.streak);return b&&!s.find(x=>x.d===b.d)?[...s,b]:s;},[]);

  // ── Week Review ───────────────────────────────────────────────
  function WeekReview(){
    const week7=getWeek7(pickedWeekStart);

    const habDone=habits.reduce((s,h)=>s+week7.filter(d=>{const v=h.log&&h.log[d];return isFullDoneOn(h,d,v);}).length,0);
    const habTotal=habits.length*7;

    const actDone=actDue.filter(a=>a.done).length;
    const pomoM=(()=>{try{return JSON.parse(localStorage.getItem("hg_pomo_history")||"[]").filter(s=>week7.includes(s.date)).reduce((s,x)=>s+(x.mins||0),0);}catch{return 0;}})();

        {allTimeBadges.length>0&&<div style={{flex:1,background:t.card,border:"1px solid "+t.border,borderRadius:11,padding:"10px 6px",textAlign:"center"}}>
          <div style={{fontSize:14}}>{allTimeBadges[allTimeBadges.length-1].i}</div>
          <div style={{fontSize:8,fontWeight:700,color:allTimeBadges[allTimeBadges.length-1].c}}>{allTimeBadges[allTimeBadges.length-1].l}</div>
          <div style={{fontSize:8,color:t.muted,textTransform:"uppercase"}}>Top Badge</div>
        </div>}
      </div>

      <FocusChart dates={week7} label="This Week"/>
      <LeaderboardSection dates={week7} label="This Week"/>
      {allTimeBadges.length>0&&<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:13,padding:"10px 12px",marginBottom:10,boxShadow:premiumShadow(t)}}>
        <div style={{fontSize:11,fontWeight:700,color:t.text+"b3",marginBottom:8,display:"flex",alignItems:"center",gap:5}}>{IC.badge(t.text+"b3",13)} Badges Collection</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
          {allTimeBadges.map(b=><div key={b.d} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 8px",background:b.c+"18",borderRadius:9,border:"1px solid "+b.c+"44"}}>
            <span style={{fontSize:18}}>{b.i}</span>
            <div style={{fontSize:8,fontWeight:700,color:b.c,textAlign:"center"}}>{b.l}</div>
          </div>)}

  // ── Month Review ──────────────────────────────────────────────
  function MonthReview(){
    const habDone=habits.reduce((s,h)=>s+monthDates.filter(d=>{const v=h.log&&h.log[d];return isFullDoneOn(h,d,v);}).length,0);
    const habTotal=habits.length*monthDates.length;
    const jDays=monthDates.filter(d=>journals[d]).length;
    const actDue=goals.flatMap(g=>g.actions.filter(a=>a.dueDate&&monthDates.includes(a.dueDate)));
    const actDone=actDue.filter(a=>a.done).length;
    const topStreak=habits.length>0?Math.max(...habits.map(h=>h.streak||0)):0;
    const allTimeBadges=habits.reduce((s,h)=>{const b=getBadge(h.streak);return b&&!s.find(x=>x.d===b.d)?[...s,b]:s;},[]);
    const monthLabel=new Date(pmo_yr,pmo_mo-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});

        <SC icon={IC.score(t.info,16)} value={actDone+"/"+actDue.length} sub2="actions this month" label="Actions" color={t.info}/>
        <SC icon={IC.journal(t.success,16)} value={jDays+"/"+monthDates.length} sub2="days journaled" label="Journal" color={t.success}/>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <SC icon={IC.flame(t.accent,16)} value={topStreak+"d"} label="Top Streak" color={t.accent}/>

        {allTimeBadges.length>0&&<div style={{flex:1,background:t.card,border:"1px solid "+t.border,borderRadius:11,padding:"10px 6px",textAlign:"center"}}>

        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
          {allTimeBadges.map(b=><div key={b.d} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 8px",background:b.c+"18",borderRadius:9,border:"1px solid "+b.c+"44"}}>
            <span style={{fontSize:18}}>{b.i}</span>
            <div style={{fontSize:8,fontWeight:700,color:b.c,textAlign:"center"}}>{b.l}</div>

  // ── Year Review ────────────────────────────────────────────────
  function YearReview(){
    const yearDates=[];
    for(let m=0;m<12;m++){
      const dim=new Date(yr,m+1,0).getDate();
      for(let d=1;d<=dim;d++){
        const ds=yr+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
        yearDates.push(ds);
      }
    }
    const habDone=habits.reduce((s,h)=>s+yearDates.filter(d=>{const v=h.log&&h.log[d];return isFullDoneOn(h,d,v);}).length,0);
    const habTotal=habits.length*yearDates.length;
    const jDays=yearDates.filter(d=>journals[d]).length;
    const actDue=goals.flatMap(g=>g.actions.filter(a=>a.dueDate&&yearDates.includes(a.dueDate)));
    const actDone=actDue.filter(a=>a.done).length;
    const topStreak=habits.length>0?Math.max(...habits.map(h=>h.best||h.streak||0)):0;
    const allTimeBadges=habits.reduce((s,h)=>{const b=getBadge(h.best||h.streak||0);return b&&!s.find(x=>x.d===b.d)?[...s,b]:s;},[]);

    return(<div>
      <div style={{background:"#a78bfa18",border:"1px solid #a78bfa44",borderRadius:11,padding:"10px 14px",marginBottom:10}}>

        <div style={{fontSize:11,color:t.muted}}>{yearDates.length} days · {new Date().getFullYear()===yr?Math.round((new Date()-new Date(yr,0,1))/(1000*60*60*24))+" days in so far":"Full year"}</div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <SC icon={IC.flame("#a78bfa",16)} value={habDone+"/"+habTotal} sub2={habits.length+" habits × "+yearDates.length+" days"} label="Habits Done" color={"#a78bfa"}/>
        <SC icon={IC.score(t.info,16)} value={actDone+"/"+actDue.length} sub2="actions this year" label="Actions" color={t.info}/>
        <SC icon={IC.journal(t.success,16)} value={jDays+"/"+yearDates.length} sub2="days journaled" label="Journal" color={t.success}/>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <SC icon={IC.trophy(t.accent,16)} value={topStreak+"d"} label="Best Streak" color={t.accent}/>
        <SC icon={IC.trend("#a78bfa",16)} value={habTotal>0?Math.round(habDone/habTotal*100)+"%":"—"} label="Year Rate" color={"#a78bfa"}/>
        {allTimeBadges.length>0&&<div style={{flex:1,background:t.card,border:"1px solid "+t.border,borderRadius:11,padding:"10px 6px",textAlign:"center"}}>
          <div style={{fontSize:18}}>{allTimeBadges[allTimeBadges.length-1].i}</div>
          <div style={{fontSize:8,fontWeight:700,color:allTimeBadges[allTimeBadges.length-1].c}}>{allTimeBadges[allTimeBadges.length-1].l}</div>
          <div style={{fontSize:8,color:t.muted,textTransform:"uppercase"}}>Top Badge</div>
        </div>}
      </div>
      <ScoreChart dates={yearDates} label={"Year "+yr}/>
      <FocusChart dates={yearDates} label={"Year "+yr}/>
      <LeaderboardSection dates={yearDates} label={"Year "+yr}/>
      {allTimeBadges.length>0&&<div style={{background:premiumCard(t),border:"1px solid "+t.border,borderRadius:13,padding:"10px 12px",marginBottom:10,boxShadow:premiumShadow(t)}}>
        <div style={{fontSize:11,fontWeight:700,color:t.text+"b3",marginBottom:8,display:"flex",alignItems:"center",gap:5}}>{IC.badge(t.text+"b3",13)} All Badges Earned</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
          {allTimeBadges.map(b=><div key={b.d} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 8px",background:b.c+"18",borderRadius:9,border:"1px solid "+b.c+"44"}}>
            <span style={{fontSize:20}}>{b.i}</span>
            <div style={{fontSize:8,fontWeight:700,color:b.c,textAlign:"center"}}>{b.l}</div>
          </div>)}
        </div>
      </div>}
    </div>);
  }

  return(<div>
    {/* Sub-tabs: Day / Week / Month / Year */}
    <div style={{display:"flex",gap:4,background:t.surface,borderRadius:12,padding:3,marginBottom:14}}>
      {[["day","Day",true],["week","Week",true],["month","Month",plan.heat],["year","Year",plan.yearReview]].map(([k,l,allowed])=>(
        <button key={k} onClick={()=>{
          if(!allowed){
            showUp(k==="month"?"Month Review is a Pro feature — unlock monthly analytics.":"Yearly Review is a Plus feature — unlock full yearly analytics.");
            return;
          }
          setSub(k);setShowLeaderboard(false);
        }} style={{flex:1,padding:"8px 2px",borderRadius:9,border:"none",cursor:allowed?"pointer":"default",background:sub===k?t.accent:"none",color:sub===k?"#000":allowed?t.text+"b3":t.border,fontWeight:sub===k?700:400,fontSize:10,position:"relative"}}>
          {l}
          {!allowed&&k==="month"&&<span style={{position:"absolute",top:-2,right:2,fontSize:7,fontWeight:700,color:t.accent}}>{IC.bolt(t.accent,7)}</span>}
          {!allowed&&k==="year"&&<span style={{position:"absolute",top:-2,right:2,fontSize:7,fontWeight:700,color:"#a78bfa"}}>{IC.gem("#a78bfa",7)}</span>}
        </button>
      ))}
    </div>
    {sub==="day"&&<DayReview/>}
    {sub==="week"&&<WeekReview/>}
    {sub==="month"&&(plan.heat?<MonthReview/>:<div style={{textAlign:"center",padding:32}}>
      <div style={{fontSize:36,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center"}}>{IC.plan(t.accent,36)}</div>
      <div style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:8}}>Month Review</div>
      <div style={{fontSize:12,color:t.muted,marginBottom:16}}>Monthly analytics is a Pro feature</div>
      <button onClick={()=>showUp("Month Review is a Pro feature.")} style={{padding:"10px 24px",borderRadius:12,border:"none",background:t.accent,color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>Upgrade to Pro</button>
    </div>)}
    {sub==="year"&&(plan.yearReview?<YearReview/>:<div style={{textAlign:"center",padding:32}}>
      <div style={{fontSize:36,marginBottom:12}}>📊</div>
      <div style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:8}}>Year Review</div>
      <div style={{fontSize:12,color:t.muted,marginBottom:16}}>Full 12-month analytics, year-over-year comparison</div>
      <button onClick={()=>showUp("Yearly Review is a Plus feature.")} style={{padding:"10px 24px",borderRadius:12,border:"none",background:"#a78bfa",color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>Get Coaching Plan</button>
    </div>)}
  </div>);
}

function rebuildFocusLog(history,existingFocusLog){

// Item 17: sort goals — priority always outranks deadline; within same priority, closest deadline first, undated last
function sortGoals(goalsArr){
  goalsArr=goalsArr||[];
  const pRank={High:0,Medium:1,Low:2};
  return [...goalsArr].sort((a,b)=>{
    const pa=pRank[a.priority]??1,pb=pRank[b.priority]??1;
    if(pa!==pb)return pa-pb;
    const aHas=!!a.deadline,bHas=!!b.deadline;
    if(aHas&&!bHas)return -1;
    if(!aHas&&bHas)return 1;
    if(!aHas&&!bHas)return 0;
    return a.deadline<b.deadline?-1:a.deadline>b.deadline?1:0;
  });
}
// B6: user-selectable goal sort — priority (existing default), deadline (pure date order,
// undated goals last), creation (newest added first).
function sortGoalsBy(goalsArr,mode){
  if(mode==="deadline"){
    return [...goalsArr].sort((a,b)=>{
      const aHas=!!a.deadline,bHas=!!b.deadline;
      if(aHas&&!bHas)return -1;
      if(!aHas&&bHas)return 1;
      if(!aHas&&!bHas)return 0;
      return a.deadline<b.deadline?-1:a.deadline>b.deadline?1:0;
    });
  }
  if(mode==="creation"){
    return [...goalsArr].sort((a,b)=>(b.id||0)-(a.id||0));// id is a Date.now() timestamp — newest first
  }
  return sortGoals(goalsArr);// "priority" — the original default
}

// Item 7: dated goalCount history — raising a habit's target doesn't retroactively mark past days incomplete.
// goalCountHistory: [{date:"YYYY-MM-DD", count:N}, ...] sorted ascending by date. Falls back to habit.goalCount for habits without history.
function goalCountAt(habit,date){
  const hist=habit.goalCountHistory;
  if(!hist||hist.length===0)return habit.goalCount||0;
  let result=hist[0].count;
  for(let i=0;i<hist.length;i++){
    if(hist[i].date<=date)result=hist[i].count;
    else break;
  }
  return result;
}
// Full-completion check for a specific date, using the goalCount that was effective on that date
function isFullDoneOn(habit,date,value){
  if(!value)return false;
  const gc=goalCountAt(habit,date);
  if(gc>0&&habit.goalUnit)return typeof value==="number"&&value>=gc;
  return !!value;
}

// Called when saving a habit edit — returns the updated goalCountHistory if goalCount changed, else unchanged
function updateGoalCountHistory(habit,newGoalCount){
  const oldGoalCount=habit.goalCount||0;
  if(newGoalCount===oldGoalCount)return habit.goalCountHistory;
  const todayStr=td();
  let hist=habit.goalCountHistory;
  if(!hist||hist.length===0){
    const createdDate=habit.id?new Date(habit.id).toLocaleDateString("en-CA"):todayStr;
    hist=[{date:createdDate,count:oldGoalCount}];
  }else{
    hist=[...hist];
  }
  if(hist.length>0&&hist[hist.length-1].date===todayStr){
    hist[hist.length-1]={date:todayStr,count:newGoalCount};
  }else{
    hist.push({date:todayStr,count:newGoalCount});
  }
  return hist;
}

// ── Item 8: AI Coach overhaul — client-side analytics engine (free, instant, no AI credits) ──

// 0-100 composite score: habit completion (45%), goal pacing (25%), streak health (20%), journal consistency (10%)
// weekOffset=0 → this week (last 7 days incl. today), weekOffset=1 → the 7 days before that
// ── SC1: calculateMomentumScore — 0–1000 scale ────────────────────────────────
// Returns {total, components{habitConsistency,currentStreak,goalCompletion,
//   journalHabit,moodAverage,focusSessions,friendChallenges,mastery}}
// SC5: all tiers calculate — gating is only on AI analysis display, never the number
//
// Phase 6-SCORE rework — rebuilt to match the two design-review documents exactly:
//   Doc 1: fix the Goal Completion fallback to overall goal progress (not a flat weekly pace);
//          stretch long-horizon caps (current streak → 60d, longest streak → 365d) via a
//          diminishing-returns curve instead of a hard cap; Legend tier once 1000 is held.
//   Doc 2: split into a volatile Momentum layer + a cumulative, monotonic Mastery layer
//          (goals ever completed, journal days ever, longest streak ever, lifetime consistency %);
//          replace the hard 7-day cliff with EMA decay across ALL rolling components (not just
//          habit consistency) — the EMA weighting is also what delivers "missing one day costs
//          less than a full 1/7th," since a recent-but-not-most-recent day already carries less
//          than 1/7 of the total weight under decay, so no separate discrete grace mechanic is
//          needed on top of it; soft floor on daily drops; surface which day(s) drove a drop.
//
// Total budget stays 1000: Momentum layer 820 (Habit Consistency 250, Current Streak 120,
// Goal Completion 200, Journal 100, Mood 50, Focus 50, Challenges 50) + Mastery layer 180
// (Lifetime Goals 35, Lifetime Journal Days 35, Longest Streak Ever 45, Lifetime Consistency% 35,
// Lifetime Focus Hours 30). Rebalanced from the original 900/100 split — Current Streak dropped
// 200→120 since it's redundant with Longest Streak Ever, and that freed weight moved into
// Mastery so growth doesn't flatline once the fast-moving Momentum components max out (~2 months
// for a consistent user) — more of the budget now lives in the layer that never resets.
function calculateMomentumScore(habits,goals,journals,focusLog,challenges,goalStats){
  focusLog=focusLog||{};challenges=challenges||{active:false,wins:0,activeDays:0};goalStats=goalStats||[];
  const today=new Date().toLocaleDateString("en-CA");
  // Shared decay curve for every EMA-based component below: half-life 5 days over a 30-day
  // lookback window. Today matters most; a day 5 days ago counts about half as much; a day
  // 30 days ago barely registers at all — no component below has a hard cliff anymore.
  const decay=Math.pow(0.5,1/5);
  const last30=[];for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);last30.push(d.toLocaleDateString("en-CA"));}

  // ═══════════════════ MOMENTUM LAYER (volatile, 900 pts) ═══════════════════

  // 1. Habit Consistency — max 250 (EMA)
  let habitWDone=0,habitWPossible=0;
  last30.forEach((dKey,i)=>{
    const w=Math.pow(decay,i);
    habits.forEach(h=>{
      habitWPossible+=w;
      if(isFullDoneOn(h,dKey,h.log&&h.log[dKey]))habitWDone+=w;
    });
  });
  const habitConsistency=habitWPossible>0?Math.round((habitWDone/habitWPossible)*250):0;

  // 2. Current Streak — max 120 (was 200 — see rebalance note in Mastery below).
  // Asymptotic diminishing-returns curve, horizon=60 per Doc 1: "current streak cap 30→60 days".
  // pts = max * streak/(streak+horizon) — fast early growth, then slower-but-never-fully-flat
  // growth well past a year.
  const bestActive=habits.length>0?Math.max(...habits.map(h=>h.streak||0)):0;
  const currentStreak=Math.round(120*(bestActive/(bestActive+60)));

  // 3. Goal Completion — max 200 (EMA-weighted due/done ratio, decay-weighted over 30 days
  // instead of a hard "last 7 days" cutoff)
  const decayWeight=dateStr=>{
    const days=Math.floor((Date.now()-new Date(dateStr+"T12:00:00").getTime())/86400000);
    return (days>=0&&days<30)?Math.pow(decay,days):0;
  };
  const allActions=goals.flatMap(g=>g.actions||[]);
  const wDoneActions=allActions.filter(a=>a.doneAt).reduce((s,a)=>s+decayWeight(a.doneAt),0);
  const wDueActions=allActions.filter(a=>a.dueDate).reduce((s,a)=>s+decayWeight(a.dueDate),0);
  // Doc 1 fix: when there's no due-date baseline to measure against, fall back to OVERALL
  // goal progress (actions done ÷ total actions, across all active goals) — proportional to
  // how much of the goal is actually done, not an automatic 100% for completing any one thing.
  const goalPct=wDueActions>0
    ?Math.min(1,wDoneActions/wDueActions)
    :(allActions.length>0?allActions.filter(a=>a.done).length/allActions.length:0);
  const goalCompletion=Math.round(goalPct*200);

  // 4. Journal Habit — max 100 (EMA)
  let journalWDone=0,journalWPossible=0;
  last30.forEach((dKey,i)=>{
    const w=Math.pow(decay,i);
    journalWPossible+=w;
    if(journals&&journals[dKey])journalWDone+=w;
  });
  const journalHabit=journalWPossible>0?Math.round((journalWDone/journalWPossible)*100):0;

  // 5. Mood Average — max 50 (EMA-weighted average, mood is 0–4 scale)
  let moodWSum=0,moodWTotal=0;
  last30.forEach((dKey,i)=>{
    const e=journals&&journals[dKey];
    if(!e)return;
    let m=null;
    if(typeof e==="object")m=e.mood??null;else{try{m=JSON.parse(e).mood??null;}catch{m=null;}}
    if(m==null)return;
    const w=Math.pow(decay,i);
    moodWSum+=m*w;moodWTotal+=w;
  });
  const moodAverage=moodWTotal>0?Math.round((moodWSum/moodWTotal/4)*50):0;

  // 6. Focus Sessions — max 50 (EMA-weighted session count. A sustained ~1 session/day pace,
  // decay-weighted over 30 days, converges to ≈7.73 — that's the "full marks" denominator,
  // roughly preserving the old "7 sessions/week = max" feel without a hard weekly cliff.)
  let focusWSum=0;
  last30.forEach((dKey,i)=>{
    const w=Math.pow(decay,i);
    focusWSum+=((focusLog[dKey]&&focusLog[dKey].sessions)||0)*w;
  });
  const focusSessions=Math.round(Math.min(1,focusWSum/7.73)*50);

  // 7. Friend Challenges — max 50 (unchanged — neither doc flags this component)
  let challengePts=0;
  if(challenges.active)challengePts+=10;
  if(challenges.wins>0)challengePts+=25;
  challengePts+=Math.min(challenges.activeDays||0,15);
  const friendChallenges=Math.min(challengePts,50);

  // ═══════════════════ MASTERY LAYER (cumulative, monotonic, 180 pts) ═══════════════════
  // Rebalanced from Doc 2's original 4-input/100pt version: Current Streak above dropped from
  // 200→120 (freeing 80pts) because it's conceptually redundant with "longest streak ever"
  // here — both measure streak achievement, just one resets and one doesn't. Moving weight
  // from the volatile version to the permanent one directly addresses the "growth basically
  // stops after ~2 months once the fast-moving Momentum components max out" problem: the more
  // of the budget lives in a layer that only ever grows, the less the score flatlines once
  // Habit Consistency/Goal Completion/Journal/Mood/Focus/Challenges are already near their caps.
  // Also added a 5th input (lifetime focus hours) so Mastery isn't just the same 4 things
  // growing slower — broadens what "permanent progress" means.

  // 7a. Lifetime goals completed — 35 (was 25)
  const lifetimeGoalsDone=(goalStats||[]).length;
  const masteryGoals=35*(lifetimeGoalsDone/(lifetimeGoalsDone+8));

  // 7b. Lifetime journal days — 35 (was 25)
  const lifetimeJournalDays=Object.keys(journals||{}).length;
  const masteryJournal=35*(lifetimeJournalDays/(lifetimeJournalDays+60));

  // 7c. Longest streak ever — 45 (was 25 — biggest single increase, since this is what's
  // absorbing Current Streak's reduced weight above). horizon=365 per Doc 1.
  const bestEver=habits.length>0?Math.max(...habits.map(h=>h.best||h.streak||0)):0;
  const masteryStreak=45*(bestEver/(bestEver+365));

  // 7d. Lifetime consistency % — 35 (was 25). For each habit, look from its creation date (or
  // its earliest log entry if no creation date is on record) through today, and measure what
  // fraction of those possible days were fully completed. Summed across all habits.
  let lifeDone=0,lifePossible=0;
  habits.forEach(h=>{
    const logKeys=Object.keys(h.log||{});
    if(logKeys.length===0)return;
    const startStr=h.createdAt?new Date(h.createdAt).toLocaleDateString("en-CA"):logKeys.sort()[0];
    const start=new Date(startStr+"T12:00:00");
    const end=new Date();
    const totalDays=Math.max(1,Math.round((end-start)/86400000)+1);
    let doneDays=0;
    for(let i=0;i<totalDays;i++){
      const d=new Date(start);d.setDate(d.getDate()+i);
      const dKey=d.toLocaleDateString("en-CA");
      if(isFullDoneOn(h,dKey,h.log&&h.log[dKey]))doneDays++;
    }
    lifeDone+=doneDays;lifePossible+=totalDays;
  });
  const lifetimeConsistencyPct=lifePossible>0?lifeDone/lifePossible:0;
  const masteryConsistency=35*lifetimeConsistencyPct;

  // 7e. Lifetime focus hours ever — 30 (NEW). focusLog is never pruned, so this sums every
  // session across the account's whole lifetime, not just the last 30 days. horizon=40 hours
  // (roughly a few months of regular Pomodoro use for 50% credit).
  const lifetimeFocusMin=Object.values(focusLog||{}).reduce((s,d)=>s+((d&&d.totalMin)||0),0);
  const lifetimeFocusHours=lifetimeFocusMin/60;
  const masteryFocusHours=30*(lifetimeFocusHours/(lifetimeFocusHours+40));

  const mastery=Math.round(masteryGoals+masteryJournal+masteryStreak+masteryConsistency+masteryFocusHours);

  let total=habitConsistency+currentStreak+goalCompletion+journalHabit+moodAverage+focusSessions+friendChallenges+mastery;
  total=Math.round(Math.max(0,Math.min(1000,total)));
  const rawTotal=total;

  // SCORE-6 (Doc 2 #3): soft floor on how far the score can drop in one day. Cap max single-day
  // loss at 60pts vs yesterday's recorded score, so a bad day doesn't feel catastrophic while
  // the trend is still visible. Only applies when there's a real yesterday to compare against.
  const yesterday=(()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toLocaleDateString("en-CA");})();
  const yesterdayScore=_scoreStore.history[yesterday];
  const MAX_DAILY_DROP=60;
  if(typeof yesterdayScore==="number"&&total<yesterdayScore-MAX_DAILY_DROP){
    total=Math.max(0,yesterdayScore-MAX_DAILY_DROP);
  }

  // Bug fix: components used to be returned as the raw, unclamped values even when the floor
  // above bumped `total` upward — so the Score Breakdown bars could silently stop summing to
  // the headline number, or even show a component going down while the total stayed flat/rose,
  // which is exactly the kind of "the numbers don't add up" inconsistency that erodes trust.
  // Scale every component by the same ratio so the breakdown always sums back to what's shown.
  const scale=rawTotal>0?total/rawTotal:1;
  const scaledComponents=scale===1
    ? {habitConsistency,currentStreak,goalCompletion,journalHabit,moodAverage,focusSessions,friendChallenges,mastery}
    : {
        habitConsistency:Math.round(habitConsistency*scale),
        currentStreak:Math.round(currentStreak*scale),
        goalCompletion:Math.round(goalCompletion*scale),
        journalHabit:Math.round(journalHabit*scale),
        moodAverage:Math.round(moodAverage*scale),
        focusSessions:Math.round(focusSessions*scale),
        friendChallenges:Math.round(friendChallenges*scale),
        mastery:Math.round(mastery*scale),
      };

  return{
    total,
    components:scaledComponents
  };
}

// SCORE-7 (Doc 2 #5): compares the live component breakdown against the last-saved one (loaded
// from Firestore's scoreComponents field) and names the single biggest negative mover. For
// Habit Consistency and Journal Habit specifically, also names which recent day(s) were missed —
// "your Habit Consistency dipped because Tuesday and Wednesday were missed" — matching the
// day-level example in the doc, not just a component-level number.
function explainScoreChange(components,habits,journals){
  if(!_scoreStore.prevComponents)return null;
  const LABELS={habitConsistency:"Habit Consistency",currentStreak:"Current Streak",goalCompletion:"Goal Completion",journalHabit:"Journal Habit",moodAverage:"Mood Average",focusSessions:"Focus Sessions",friendChallenges:"Friend Challenges",mastery:"Mastery"};
  let biggestKey=null,biggestDelta=0;
  Object.keys(components).forEach(k=>{
    const d=(components[k]||0)-(_scoreStore.prevComponents[k]||0);
    if(d<biggestDelta){biggestDelta=d;biggestKey=k;}
  });
  if(!biggestKey||biggestDelta>=-3)return null;// ignore noise
  let dayDetail=null;
  if(biggestKey==="habitConsistency"&&habits&&habits.length>0){
    const missedDays=[];
    for(let i=1;i<=3;i++){
      const d=new Date();d.setDate(d.getDate()-i);
      const dKey=d.toLocaleDateString("en-CA");
      const anyMissed=habits.some(h=>!isFullDoneOn(h,dKey,h.log&&h.log[dKey]));
      if(anyMissed)missedDays.push(d.toLocaleDateString("en-US",{weekday:"long"}));
    }
    if(missedDays.length>0)dayDetail=missedDays.join(" and ")+" were missed";
  }else if(biggestKey==="journalHabit"&&journals){
    const missedDays=[];
    for(let i=1;i<=3;i++){
      const d=new Date();d.setDate(d.getDate()-i);
      const dKey=d.toLocaleDateString("en-CA");
      if(!journals[dKey])missedDays.push(d.toLocaleDateString("en-US",{weekday:"long"}));
    }
    if(missedDays.length>0)dayDetail=missedDays.join(" and ")+" had no journal entry";
  }
  return{component:biggestKey,label:LABELS[biggestKey]||biggestKey,delta:biggestDelta,dayDetail};
}

// SC2: Weekly delta helper — now reads REAL dated score history from Firestore
// (threaded in via _scoreStore below) instead of a fabricated localStorage baseline.
// ── Score history store (module-level; loaded from user doc, read on save/delta) ──
// scoreHistory: { "YYYY-MM-DD": score }  — daily, pruned to last 365 days
// scoreMonthly: { "YYYY-MM": score }     — month-end value, kept permanently
const _scoreStore={history:{},monthly:{},prevComponents:null};
function loadScoreStore(d){
  _scoreStore.history=(d&&d.scoreHistory&&typeof d.scoreHistory==="object")?{...d.scoreHistory}:{};
  _scoreStore.monthly=(d&&d.scoreMonthly&&typeof d.scoreMonthly==="object")?{...d.scoreMonthly}:{};
  // SCORE-7: scoreComponents was already being written to Firestore on every save but never
  // read back. Loading it here gives us a "components as of last save" reference to diff
  // against the live computation, so we can explain *which* component moved, not just that
  // the total changed.
  _scoreStore.prevComponents=(d&&d.scoreComponents&&typeof d.scoreComponents==="object")?{...d.scoreComponents}:null;
  // Backfill: existing users have no history yet. Seed today's value in-memory from
  // the last persisted momentumScore so there's an immediate baseline (no fake past
  // data — delta reads 0 until real history accrues). Persisted on next save().
  const today=new Date().toLocaleDateString("en-CA");
  if(_scoreStore.history[today]==null&&d&&typeof d.momentumScore==="number"){
    _scoreStore.history[today]=d.momentumScore;
    const month=today.slice(0,7);
    if(_scoreStore.monthly[month]==null)_scoreStore.monthly[month]=d.momentumScore;
  }
}
// Record today's score, keep the month-end value, prune daily history to 365 entries.
// Returns the {scoreHistory, scoreMonthly} to persist. Last write of a day/month wins.
function recordScoreSnapshot(score){
  const today=new Date().toLocaleDateString("en-CA");        // YYYY-MM-DD local
  const month=today.slice(0,7);                              // YYYY-MM
  _scoreStore.history[today]=score;
  _scoreStore.monthly[month]=score;                          // last save of month = month's final
  // Prune daily history to the most recent 365 dates (monthly is never pruned).
  const keys=Object.keys(_scoreStore.history).sort();        // ascending date order
  if(keys.length>365){
    for(const k of keys.slice(0,keys.length-365))delete _scoreStore.history[k];
  }
  return{scoreHistory:{..._scoreStore.history},scoreMonthly:{..._scoreStore.monthly}};
}
// Find the score nearest to `daysAgo` days back, within ±tolerance days (handles gaps).
function scoreNear(daysAgo,tolerance){
  const base=new Date();base.setDate(base.getDate()-daysAgo);
  for(let off=0;off<=tolerance;off++){
    for(const sign of (off===0?[0]:[-1,1])){                 // check exact, then ±1, ±2...
      const d=new Date(base);d.setDate(d.getDate()+sign*off);
      const key=d.toLocaleDateString("en-CA");
      if(_scoreStore.history[key]!=null)return _scoreStore.history[key];
    }
  }
  return null;
}
function getScoreWithDelta(habits,goals,journals,focusLog,challenges,goalStats){
  const result=calculateMomentumScore(habits,goals,journals,focusLog,challenges,goalStats);
  const current=result.total;
  // Real "last week" = nearest recorded score to 7 days ago, within ±2 days.
  // Falls back to current (delta 0) until real history has accrued.
  const lastWeek=scoreNear(7,2);
  const lastWeekScore=lastWeek!=null?lastWeek:current;
  return{score:current,lastWeekScore,delta:current-lastWeekScore,components:result.components};
}

// Fill {name} → ", Name" or "" (leading-comma-safe for mid-sentence tokens).
function n2Fill(tpl,name){
  if(name)return tpl.replace(/\{name\}/g,", "+name).replace(/,\s*,/g,",");
  return tpl.replace(/\{name\}/g,"");
}
function n2Today(){return new Date().toLocaleDateString("en-CA");}
function n2DaysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
// Has enough time passed since this type last fired? (interval in days)
function n2GateOpen(lastShown,type,intervalDays){
  const last=lastShown&&lastShown[type];
  if(!last)return true;
  return n2DaysBetween(last,n2Today())>=intervalDays;
}
// True current streak from log (mirrors app logic; freeze marker counts as done).
function n2TrueStreak(habit){
  let s=0;const d=new Date();
  for(let i=0;i<400;i++){
    const k=d.toLocaleDateString("en-CA");
    const v=habit.log&&habit.log[k];
    const ok=v==="freeze"||(habit.goalCount>0&&habit.goalUnit?(typeof v==="number"&&v>=habit.goalCount):!!v);
    if(ok)s++;else break;
    d.setDate(d.getDate()-1);
  }
  return s;
}
function n2ActiveWithin(habits,days){
  const d=new Date();
  for(let i=0;i<days;i++){
    const k=d.toLocaleDateString("en-CA");
    if(habits.some(h=>h.log&&h.log[k]))return true;
    d.setDate(d.getDate()-1);
  }
  return false;
}

// Build the ordered list of ELIGIBLE situational notifications right now.
// Returns [{type, slot:'reward'|'nudge', body, tab, extra}], highest priority first.
function n2Evaluate(ctx){
  const out=[];
  const today=n2Today();
  const habits=ctx.habits||[];
  const pref=(t)=>ctx.prefs?ctx.prefs[t]!==false:true; // default on
  const gate=(t,d)=>n2GateOpen(ctx.lastShown,t,d);
  const isPaid=ctx.pk==="pro"||ctx.pk==="plus";
  const undone=habits.filter(h=>{const v=h.log&&h.log[today];return h.goalCount>0&&h.goalUnit?!(typeof v==="number"&&v>=h.goalCount):!v;});
  const allDone=habits.length>0&&undone.length===0;

  // ── REWARD-slot candidates (informational / celebratory; shown on open) ──
  // #2 Milestone — any habit crossed a badge threshold not yet notified.
  if(pref("milestones")){
    for(const h of habits){
      const st=n2TrueStreak(h);
      if(N2_BADGES_REF.includes(st)&&!(ctx.milestonesNotified||[]).includes(st)){
        const meta=N2_BADGE_META[st];
        out.push({type:"milestone",slot:"reward",tab:"habits",
          body:n2Fill(meta[0]+" "+st+" days{name}! You're a "+meta[1]+". That's real consistency.",ctx.name),
          extra:{streak:st}});
        break;
      }
    }
  }
  // #13 Perfect day — everything done today.
  if(pref("perfectday")&&allDone&&gate("perfectday",1)){
    out.push({type:"perfectday",slot:"reward",tab:"dashboard",
      body:n2Fill("🙌 Every habit done today{name}. THAT'S a perfect day. See you tomorrow.",ctx.name)});
  }
  // #7 Score digest — Pro/Plus only, every 2 days (Sunday = week review tone).
  if(isPaid&&pref("scoredigest")&&gate("scoredigest",2)&&ctx.scoreVal!=null){
    const d=ctx.scoreDelta||0;
    let body;
    if(ctx.dowSun) body=n2Fill("🧘 Your week in review: Momentum at "+ctx.scoreVal+". Solid work{name}.",ctx.name);
    else if(d>0) body=n2Fill("📈 Momentum's at "+ctx.scoreVal+" — up "+d+" this week. Compounding{name}.",ctx.name);
    else if(d<0) body=n2Fill("📉 Momentum dipped to "+ctx.scoreVal+", down "+Math.abs(d)+". One good day turns it around.",ctx.name);
    else body=n2Fill("📊 Momentum's holding at "+ctx.scoreVal+"{name}. Steady. Let's push it up.",ctx.name);
    out.push({type:"scoredigest",slot:"reward",tab:"analytics",body});
  }

  // ── NUDGE-slot candidates (forward-looking; shown only if still active) ──
  // #6 Comeback — dormant 3+ days.
  if(pref("comeback")&&habits.length>0&&!n2ActiveWithin(habits,3)&&gate("comeback",3)){
    out.push({type:"comeback",slot:"nudge",tab:"dashboard",
      body:n2Fill("🤗 Missed you{name}. One habit today picks your momentum right back up.",ctx.name)});
  }
  // #8 Challenge nudge — Pro/Plus, has friends but no active challenge (~every 3-4 days).
  // Reads the cheap _challengeSummary populated by FriendsPage's own load — no duplicate
  // challenge/progress queries run from this engine.
  if(isPaid&&pref("challengenudge")&&ctx.challengeSummary&&ctx.challengeSummary.hasFriendsNoChallenge&&gate("challengenudge",4)){
    out.push({type:"challengenudge",slot:"nudge",tab:"friends",
      body:n2Fill("🏆 Challenge a friend this week{name}? First to a 7-day streak wins bragging rights.",ctx.name)});
  }
  // #9 Challenge status — Pro/Plus, active challenge with a standings change (~every 2 days).
  if(isPaid&&pref("challengestatus")&&ctx.challengeSummary&&ctx.challengeSummary.standings&&ctx.challengeSummary.standings.length>0&&gate("challengestatus",2)){
    const s=ctx.challengeSummary.standings[0];
    if(!s.tied){
      out.push({type:"challengestatus",slot:"nudge",tab:"friends",
        body:s.leading
          ?n2Fill("⚔️ You're leading "+s.friendName+" by "+s.diff+". Keep the pressure on. 🔥",ctx.name)
          :n2Fill(s.friendName+" just pulled ahead in your challenge. Time to catch up{name}. ⚔️",ctx.name)});
    }
  }
  // #11 Feature discovery — rotate through unused features (~every 3 days).
  if(pref("features")&&gate("features",3)){
    const jUsed=ctx.journals&&Object.keys(ctx.journals).length>0;
    const feat=N2_FEATURES.find(f=>f.key==="journal"?!jUsed:true);
    if(feat)out.push({type:"features",slot:"nudge",tab:feat.tab,body:n2Fill(feat.msg,ctx.name)});
  }
  // #12 AI Coach teaser — Free only, after drip complete (~every 4 days).
  if(!isPaid&&pref("aiteaser")&&ctx.dripDone&&gate("aiteaser",4)){
    out.push({type:"aiteaser",slot:"nudge",tab:"coach",
      body:n2Fill("💬 Mo's got something to say about your progress{name}. Unlock AI Coaching to hear it.",ctx.name)});
  }
  // #7pool Encouragement — lowest-priority filler (~every 2 days).
  if(pref("encouragement")&&gate("encouragement",2)){
    const idx=parseInt(today.replace(/-/g,""),10)%N2_ENCOURAGE.length;
    out.push({type:"encouragement",slot:"nudge",tab:"dashboard",body:n2Fill(N2_ENCOURAGE[idx],ctx.name)});
  }
  return out;
}


// Returns up to 3 plain-language pattern strings — day-of-week, habit correlation, focus-timer correlation
function detectPatterns(habits,focusLog){
  const patterns=[];
  if(!habits||habits.length===0)return patterns;
  const last28=[];for(let i=0;i<28;i++){const d=new Date();d.setDate(d.getDate()-i);last28.push(d.toLocaleDateString("en-CA"));}

  // 1. Day-of-week completion pattern
  const dowStats={};
  last28.forEach(d=>{
    const dow=new Date(d+"T12:00:00").getDay();
    if(!dowStats[dow])dowStats[dow]={done:0,total:0};
    habits.forEach(h=>{
      dowStats[dow].total++;
      if(isFullDoneOn(h,d,h.log&&h.log[d]))dowStats[dow].done++;
    });
  });
  const DOW=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const dowRates=Object.entries(dowStats).map(([dow,s])=>({dow:Number(dow),rate:s.total>0?s.done/s.total:0,total:s.total})).filter(d=>d.total>=4);
  if(dowRates.length>=3){
    dowRates.sort((a,b)=>b.rate-a.rate);
    const best=dowRates[0],worst=dowRates[dowRates.length-1];
    if(best.rate-worst.rate>=0.15){
      patterns.push("You complete "+Math.round(best.rate*100)+"% of habits on "+DOW[best.dow]+"s vs only "+Math.round(worst.rate*100)+"% on "+DOW[worst.dow]+"s.");
    }
  }

  // 2. Habit-pair correlation — does completing A make B more likely?
  if(habits.length>=2){
    let bestPair=null;
    for(let i=0;i<habits.length;i++){
      for(let j=0;j<habits.length;j++){
        if(i===j)continue;
        const a=habits[i],b=habits[j];
        let aDoneB=0,aDone=0,aNotB=0,aNot=0;
        last28.forEach(d=>{
          const ad=isFullDoneOn(a,d,a.log&&a.log[d]);
          const bd=isFullDoneOn(b,d,b.log&&b.log[d]);
          if(ad){aDone++;if(bd)aDoneB++;}else{aNot++;if(bd)aNotB++;}
        });
        if(aDone>=4&&aNot>=4){
          const diff=(aDoneB/aDone)-(aNotB/aNot);
          if(diff>=0.25&&(!bestPair||diff>bestPair.diff))bestPair={a,b,diff};
        }
      }
    }
    if(bestPair){
      patterns.push("When you complete "+bestPair.a.icon+" "+bestPair.a.name+", "+bestPair.b.icon+" "+bestPair.b.name+" completion rises by "+Math.round(bestPair.diff*100)+"%.");
    }
  }

  // 3. Focus-timer correlation (focusLog from Pomodoro, Item 5)
  const focusEntries=Object.entries(focusLog||{}).filter(([d])=>last28.includes(d));
  if(focusEntries.length>=6){
    const high=focusEntries.filter(([,v])=>(v.totalMin||0)>=45).map(([d])=>d);
    const low=focusEntries.filter(([,v])=>(v.totalMin||0)<45).map(([d])=>d);
    if(high.length>=3&&low.length>=3){
      const rate=list=>{let done=0,total=0;list.forEach(d=>{habits.forEach(h=>{total++;if(isFullDoneOn(h,d,h.log&&h.log[d]))done++;});});return total>0?done/total:0;};
      const hr=rate(high),lr=rate(low);
      if(hr-lr>=0.15){
        patterns.push("On days with 45+ min of focus time, your habit completion is "+Math.round((hr-lr)*100)+"% higher.");
      }
    }
  }

  return patterns.slice(0,3);
}

// Per-goal pacing forecast: actions done/week vs needed pace to hit the deadline
function getGoalForecasts(goals){
  const week7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week7.push(d.toLocaleDateString("en-CA"));}
  return (goals||[]).filter(g=>!g.movedToHistory&&g.actions&&g.actions.length>0&&!g.actions.every(a=>a.done)).map(g=>{
    const total=g.actions.length;
    const done=g.actions.filter(a=>a.done).length;
    const remaining=total-done;
    const daysLeft=g.deadline?dLeft(g.deadline):null;
    const currentPace=g.actions.filter(a=>a.doneAt&&week7.includes(a.doneAt)).length;
    let status="active",neededPace=null;
    if(daysLeft!==null){
      if(daysLeft<0)status="overdue";
      else{
        const weeksLeft=Math.max(daysLeft/7,0.5);
        neededPace=Math.max(1,Math.ceil(remaining/weeksLeft));
        status=currentPace>=neededPace?"on-track":"behind";
      }
    }
    return{title:g.title,total,done,remaining,daysLeft,currentPace,neededPace,status,priority:g.priority||"Medium"};
  });
}

// Rule-based "Today's ONE Move" — single highest-leverage action: streak-at-risk > overdue priority action > most-skipped habit
function getOneMove(habits,goals,today){
  const atRisk=(habits||[]).filter(h=>(h.streak||0)>=3&&!isFullDoneOn(h,today,h.log&&h.log[today])).sort((a,b)=>(b.streak||0)-(a.streak||0));
  if(atRisk.length>0){
    return{icon:atRisk[0].icon||"🔥",text:"Complete "+atRisk[0].name+" — protect your "+atRisk[0].streak+"-day streak!"};
  }
  const urgent=(goals||[]).flatMap(g=>(g.actions||[]).filter(a=>!a.done&&a.dueDate&&a.dueDate<=today).map(a=>({...a,goalTitle:g.title,priority:g.priority||"Medium"})));
  const prOrder={High:0,Medium:1,Low:2};
  urgent.sort((a,b)=>(prOrder[a.priority]??1)-(prOrder[b.priority]??1));
  if(urgent.length>0){
    return{icon:"🎯",text:urgent[0].action+" (for \""+urgent[0].goalTitle+"\")"};
  }
  const week7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);week7.push(d.toLocaleDateString("en-CA"));}
  const candidates=(habits||[]).filter(h=>!isFullDoneOn(h,today,h.log&&h.log[today])).map(h=>({h,doneCount:week7.filter(d=>isFullDoneOn(h,d,h.log&&h.log[d])).length})).sort((a,b)=>a.doneCount-b.doneCount);
  if(candidates.length>0){
    return{icon:candidates[0].h.icon||"⭐",text:"Complete "+candidates[0].h.name+" — rebuild momentum on your most-skipped habit."};
  }
  return{icon:"🎉",text:"You're all caught up — nothing urgent today!"};
}

function Confetti({on,done}){
  const r=useRef();
  useEffect(()=>{
    if(!on)return;
    const c=r.current;if(!c)return;
    c.width=window.innerWidth;c.height=window.innerHeight;
    const ctx=c.getContext("2d");
    const cols=["#f5c842","#e8853d","#4ade80","#60a5fa","#a78bfa","#f87171"];
    const ps=Array.from({length:90},()=>({x:Math.random()*c.width,y:-20,r:3+Math.random()*5,spd:1.5+Math.random()*2,col:cols[Math.floor(Math.random()*6)],ang:0,ts:0.1+Math.random()*0.3}));
    let raf;
    const draw=()=>{ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.y+=p.spd;p.ang+=p.ts;ctx.beginPath();ctx.lineWidth=p.r;ctx.strokeStyle=p.col;ctx.moveTo(p.x+Math.sin(p.ang)*8,p.y);ctx.lineTo(p.x+Math.sin(p.ang)*8+p.r*2,p.y+p.r*2);ctx.stroke();});if(ps.some(p=>p.y<c.height))raf=requestAnimationFrame(draw);else{ctx.clearRect(0,0,c.width,c.height);done&&done();}};
    draw();return()=>cancelAnimationFrame(raf);
  },[on]);
  if(!on)return null;
  return React.createElement("canvas",{ref:r,style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999}});
}

// Premium UI: per-habit color identity palette + glow-enabled Ring
const HABIT_COLORS=["#f472b6","#818cf8","#34d399","#fbbf24","#60a5fa","#fb923c","#a78bfa","#4ade80","#f87171","#22d3ee","#facc15","#c084fc"];
function habitColor(h){
  const str=String(h&&h.id!=null?h.id:(h&&h.name)||"x");
  let hash=0;for(let i=0;i<str.length;i++)hash=(hash*31+str.charCodeAt(i))>>>0;
  return HABIT_COLORS[hash%HABIT_COLORS.length];
}

// Theme-aware elevated shadow + premium gradient card background
function premiumShadow(t,col){
  if(col)return t.mode==="light"?"0 4px 18px "+col+"22":"0 4px 18px "+col+"33";
  return t.mode==="light"?"0 4px 16px rgba(0,0,0,0.05)":"0 4px 16px rgba(0,0,0,0.35)";
}
function premiumCard(t,tint){
  if(tint)return "linear-gradient(145deg,"+tint+"12 0%,"+t.card+" 60%)";
  return "linear-gradient(145deg,"+t.card+" 0%,"+t.surface+" 100%)";
}
function gradText(t,a,b){
  return {background:"linear-gradient(135deg,"+(a||t.accent)+","+(b||t.accent2)+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"};
}

function Ring({pct,sz=80,sw=8,col,lbl,sub,t,glow=false}){
  const r=(sz-sw)/2,ci=2*Math.PI*r;
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
    <div style={{position:"relative",width:sz,height:sz,filter:glow?"drop-shadow(0 0 6px "+col+"88)":"none"}}>
      <svg width={sz} height={sz} style={{transform:"rotate(-90deg)"}}>
        <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={t.border} strokeWidth={sw}/>
        <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={col} strokeWidth={sw} strokeDasharray={ci} strokeDashoffset={ci-(pct/100)*ci} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.6s"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:sz>70?15:11,fontWeight:800,color:t.text}}>{pct}%</span>

    {lbl&&<span style={{fontSize:11,color:t.muted,marginTop:4,textAlign:"center"}}>{lbl}</span>}
    {sub&&<span style={{fontSize:10,color:col,fontWeight:700}}>{sub}</span>}
  </div>);
}

function Heatmap({h,t}){
  const days=[];const now=new Date();
  for(let i=89;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);days.push(d.toLocaleDateString("en-CA"));}
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:t.muted,marginBottom:3,padding:"0 1px"}}>
        <span>90 days ago</span><span>Today →</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(15,1fr)",gap:3}}>
        {days.map(d=>{
          const v=h.log&&h.log[d];
          const isFull=isFullDoneOn(h,d,v);
          const isPartial=v&&!isFull&&goalCountAt(h,d)>0;
          const bg=isFull?t.success:isPartial?(t.success+"55"):"transparent";
          const border=isFull?t.success:isPartial?(t.success+"88"):t.border;
          return(<div key={d} title={d} style={{aspectRatio:"1",borderRadius:2,background:bg,border:"1px solid "+border,flexShrink:0}}/>);
        })}
      </div>
      <div style={{display:"flex",gap:8,marginTop:5,fontSize:8,color:t.muted,alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:8,height:8,borderRadius:2,background:t.success}}/> Done</div>
        {h.goalCount>0&&<div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:8,height:8,borderRadius:2,background:t.success+"55",border:"1px solid "+t.success+"88"}}/> Partial</div>}
        <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:8,height:8,borderRadius:2,border:"1px solid "+t.border}}/> Missed</div>
      </div>
    </div>
  );
}

// PAY-A: Free→Pro/Plus paywall  (score-led, blurred teasers, outcome CTAs)
// PAY-B: Pro→Plus paywall       (graduation-framed, proration math, bonus days)
// PAY-C: Win-back sheets        (Free version + Pro version, 7-day cooldown)

// PAY-D: Proration helpers
function calcProration(pk,pe,targetCycle,aiCredits,aiCreditsBonus){
  // Remaining Pro days
  const today=new Date();today.setHours(0,0,0,0);
  const expiry=pe?new Date(pe):today;expiry.setHours(0,0,0,0);
  const proRemDays=Math.max(0,Math.floor((expiry-today)/86400000));
  // Daily rates
  const isProYearly=pk==="pro"&&proRemDays>60;// heuristic: >60 days left = was yearly
  const proDailyRate=isProYearly?(699/365):(79/30);
  const plusDailyRate=targetCycle==="yearly"?(1499/365):(149/30);
  // Pro credit value → bonus Plus days
  const proCredit=proRemDays*proDailyRate;
  const bonusDays=Math.floor(proCredit/plusDailyRate);
  // New expiry
  const baseDays=targetCycle==="yearly"?365:30;
  const newExpiry=new Date();newExpiry.setDate(newExpiry.getDate()+baseDays+bonusDays);
  const newExpiryStr=newExpiry.toLocaleDateString("en-CA");
  const newExpiryFmt=newExpiry.toLocaleDateString("en-US",{day:"numeric",month:"short",year:"numeric"});
  // AI credits: monthly Pro→Plus: add remaining (0-10) to first month 50
  // Yearly Pro→Plus: full bonus pool = remaining this month + (remaining months×10)
  const carryCredits=Math.min(aiCredits||0,10);
  let bonusPool=aiCreditsBonus||0;
  if(isProYearly){
    const remMonths=Math.max(0,Math.floor(proRemDays/30));
    bonusPool=(aiCredits||0)+(remMonths*10);
  }
  return{proRemDays,bonusDays,baseDays,newExpiryStr,newExpiryFmt,carryCredits,bonusPool,isProYearly,proDailyRate:proDailyRate.toFixed(2),plusDailyRate:plusDailyRate.toFixed(2)};
}

function UpgradeModal({t,close,reason,user,habits,goals,pk,pe,momentumScore,scoreDropThisWeek,aiCredits,aiCreditsBonus}){
  const[billingCycle,setBillingCycle]=React.useState("monthly");

  // Personalised data
  const habitCount=habits?habits.length:0;

  const scoreDrop=typeof scoreDropThisWeek==="number"&&scoreDropThisWeek>0?scoreDropThisWeek:null;

  // momentum to lose. A brand-new user with ~1 habit and no streak yet never had that — showing
  // them a "you're losing" headline is a callout, not encouragement. Distinct case, checked first.
  const isNewUser=habitCount<=1&&bestStreak===0;

  // PAY-C: 7-day cooldown gate
  function tryClose(){
    // No cooldown — winback always shows when "Maybe later" is tapped
    setShowWinback(true);
  }

  // Build Razorpay links with upgrade metadata in notes
  function proLink(cycle){return payLink(cycle==="yearly"?PRO_Y_BASE:PRO_M_BASE,user?.email,user?.uid,cycle==="yearly"?"pro_yearly":"pro_monthly");}
  function plusLink(cycle){return payLink(cycle==="yearly"?PLUS_Y_BASE:PLUS_M_BASE,user?.email,user?.uid,cycle==="yearly"?"plus_yearly":"plus_monthly");}

  return(
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:1000,display:"flex",flexDirection:"column",overflowY:"auto"}}
