<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page Not Found — Momentum</title>
<meta name="robots" content="noindex"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    height:100%;
    background:#0A0F1E;
    font-family:'Sora',system-ui,-apple-system,sans-serif;
    color:#EDEFF5;
  }
  body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:32px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .glow {
    position:absolute;
    top:50%; left:50%;
    width:520px; height:520px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(245,200,66,0.14) 0%, rgba(245,200,66,0) 65%);
    pointer-events:none;
  }
  .mo-wrap {
    position:relative;
    width:180px;
    margin-bottom:8px;
  }
  .mo-wrap img {
    width:100%;
    display:block;
    filter:drop-shadow(0 0 24px rgba(245,185,50,0.35));
    animation: bob 3.2s ease-in-out infinite;
  }
  @keyframes bob {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-10px); }
  }
  .code {
    position:relative;
    font-size:22px;
    font-weight:700;
    letter-spacing:6px;
    color:rgba(245,200,66,0.55);
    margin-top:10px;
  }
  h1 {
    position:relative;
    font-size:clamp(26px,5vw,36px);
    font-weight:800;
    letter-spacing:-0.5px;
    margin-top:10px;
    background:linear-gradient(135deg,#ffe066 0%,#f5c842 40%,#e8853d 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }
  p {
    position:relative;
    font-size:16px;
    color:rgba(237,239,245,0.65);
    max-width:340px;
    margin-top:12px;
    line-height:1.5;
  }
  a.home-btn {
    position:relative;
    display:inline-block;
    margin-top:28px;
    padding:14px 32px;
    border-radius:14px;
    background:linear-gradient(135deg,#ffe066 0%,#f5c842 40%,#e8853d 100%);
    color:#0A0F1E;
    font-weight:700;
    font-size:15px;
    text-decoration:none;
    letter-spacing:0.2px;
    box-shadow:0 8px 24px rgba(245,185,50,0.25);
  }
  a.home-btn:active { transform:scale(0.97); }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="mo-wrap">
    <img src="https://raw.githubusercontent.com/Ritesh1716/momentum/main/mo/mo-shrug.png" alt="Mo shrugging" onerror="this.style.display='none'"/>
  </div>
  <div class="code">404</div>
  <h1>Even Mo couldn't find this one</h1>
  <p>The page you're looking for doesn't exist or may have moved. Let's get you back on track.</p>
  <a class="home-btn" href="/">Back to Momentum</a>
</body>
</html>
